<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carbon Footprint Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2d6a4f;
      --secondary: #40916c;
      --accent: #52b788;
      --warning: #d62828;
      --dark: #0f2818;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, var(--dark) 0%, #1b4332 50%, #0f2818 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      animation: fadeInUp 0.8s cubic-bezier(.16,1,.3,1);
    }

    .hero {
      text-align: center;
      margin-bottom: 40px;
    }

    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(36px, 8vw, 64px);
      font-weight: 400;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #40916c, #52b788);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 1.1rem;
      font-weight: 500;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 40px;
    }

    @media (max-width: 768px) {
      .content {
        grid-template-columns: 1fr;
        gap: 20px;
      }
    }

    .input-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(82, 183, 136, 0.2);
      border-radius: 16px;
      padding: 28px;
      animation: slideInLeft 0.8s cubic-bezier(.16,1,.3,1) forwards;
    }

    .input-card:nth-child(2) {
      animation-delay: 0.1s;
    }

    .input-group {
      margin-bottom: 24px;
    }

    .input-group:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #52b788;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(82, 183, 136, 0.3);
      border-radius: 8px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    input:focus, select:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.12);
      border-color: #52b788;
      box-shadow: 0 0 12px rgba(82, 183, 136, 0.2);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    select option {
      background: var(--dark);
      color: #fff;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .btn-calculate {
      background: linear-gradient(135deg, #40916c, #52b788);
      color: #fff;
    }

    .btn-calculate:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(82, 183, 136, 0.3);
    }

    .btn-calculate:active {
      transform: translateY(0);
    }

    .btn-reset {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-reset:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    .results-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(82, 183, 136, 0.2);
      border-radius: 16px;
      padding: 28px;
      animation: slideInRight 0.8s cubic-bezier(.16,1,.3,1) forwards;
      min-height: 500px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .results-card.hidden {
      display: none;
    }

    .results-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      margin-bottom: 24px;
      color: #52b788;
    }

    .total-emissions {
      text-align: center;
      margin-bottom: 28px;
      padding: 20px;
      background: rgba(82, 183, 136, 0.1);
      border-radius: 12px;
      border: 1px solid rgba(82, 183, 136, 0.2);
    }

    .total-value {
      font-size: clamp(2.4rem, 6vw, 3.2rem);
      font-weight: 700;
      color: #52b788;
      margin-bottom: 8px;
    }

    .total-label {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .breakdown {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .breakdown-item {
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideUp 0.6s cubic-bezier(.16,1,.3,1) both;
    }

    .breakdown-item:nth-child(1) { animation-delay: 0.1s; }
    .breakdown-item:nth-child(2) { animation-delay: 0.2s; }
    .breakdown-item:nth-child(3) { animation-delay: 0.3s; }
    .breakdown-item:nth-child(4) { animation-delay: 0.4s; }
    .breakdown-item:nth-child(5) { animation-delay: 0.5s; }

    .breakdown-label {
      flex: 0 0 80px;
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
    }

    .breakdown-bar {
      flex: 1;
      height: 24px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    .breakdown-fill {
      height: 100%;
      background: linear-gradient(90deg, #40916c, #52b788);
      width: 0;
      animation: fillBar 0.8s cubic-bezier(.16,1,.3,1) both;
      position: relative;
    }

    .breakdown-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
    }

    .breakdown-value {
      flex: 0 0 60px;
      text-align: right;
      font-size: 0.9rem;
      font-weight: 600;
      color: #52b788;
    }

    .comparison {
      margin-top: 24px;
      padding: 16px;
      background: rgba(214, 40, 40, 0.1);
      border-left: 3px solid #d62828;
      border-radius: 8px;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.8);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fillBar {
      from {
        width: 0;
      }
      to {
        width: var(--width, 100%);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Carbon Footprint</h1>
      <p>Calculate your annual CO₂ emissions</p>
    </div>

    <div class="content">
      <div class="input-card">
        <div class="input-group">
          <label>Electricity (kWh/month)</label>
          <input type="number" id="electricity" placeholder="e.g., 450" value="450" min="0">
        </div>

        <div class="input-group">
          <label>Natural Gas (therms/month)</label>
          <input type="number" id="gas" placeholder="e.g., 35" value="35" min="0">
        </div>

        <div class="input-group">
          <label>Miles Driven (per month)</label>
          <input type="number" id="miles" placeholder="e.g., 800" value="800" min="0">
        </div>

        <div class="input-group">
          <label>Flights (hours/year)</label>
          <input type="number" id="flights" placeholder="e.g., 10" value="10" min="0">
        </div>

        <div class="input-group">
          <label>Diet Type</label>
          <select id="diet">
            <option value="omnivore">Omnivore</option>
            <option value="vegetarian">Vegetarian</option>
            <option value="vegan">Vegan</option>
          </select>
        </div>

        <div class="button-group">
          <button class="btn-calculate" onclick="calculateFootprint()">Calculate</button>
          <button class="btn-reset" onclick="resetForm()">Reset</button>
        </div>
      </div>

      <div class="results-card hidden" id="results">
        <div class="results-title">Your Emissions</div>
        <div class="total-emissions">
          <div class="total-value" id="totalValue">0</div>
          <div class="total-label">kg CO₂e per year</div>
        </div>

        <div class="breakdown" id="breakdown"></div>

        <div class="comparison" id="comparison"></div>
      </div>
    </div>
  </div>

  <script>
    // Conversion factors (kg CO2e per unit)
    const factors = {
      electricity: 0.385,  // kg CO2e per kWh
      gas: 5.3,            // kg CO2e per therm
      miles: 0.411,        // kg CO2e per mile (average car)
      flight: 0.255,       // kg CO2e per hour (commercial flight)
      diet: {
        omnivore: 2700,    // kg CO2e per year
        vegetarian: 1900,
        vegan: 1500
      }
    };

    const usAverage = 16000; // kg CO2e per year (average American)

    function calculateFootprint() {
      const electricity = parseFloat(document.getElementById('electricity').value) || 0;
      const gas = parseFloat(document.getElementById('gas').value) || 0;
      const miles = parseFloat(document.getElementById('miles').value) || 0;
      const flights = parseFloat(document.getElementById('flights').value) || 0;
      const diet = document.getElementById('diet').value;

      // Annual calculations
      const elecYear = electricity * 12 * factors.electricity;
      const gasYear = gas * 12 * factors.gas;
      const milesYear = miles * 12 * factors.miles;
      const flightsYear = flights * factors.flight;
      const dietYear = factors.diet[diet];

      const breakdown = {
        'Electricity': elecYear,
        'Natural Gas': gasYear,
        'Driving': milesYear,
        'Flights': flightsYear,
        'Diet': dietYear
      };

      const total = Object.values(breakdown).reduce((a, b) => a + b, 0);

      // Display results
      const resultsCard = document.getElementById('results');
      resultsCard.classList.remove('hidden');

      document.getElementById('totalValue').textContent = Math.round(total).toLocaleString();

      // Breakdown bars
      const breakdownDiv = document.getElementById('breakdown');
      breakdownDiv.innerHTML = '';

      const maxValue = Math.max(...Object.values(breakdown));

      Object.entries(breakdown).forEach(([label, value], idx) => {
        const percentage = (value / maxValue) * 100;
        const item = document.createElement('div');
        item.className = 'breakdown-item';
        item.style.animationDelay = (idx * 0.1) + 's';
        item.innerHTML = `
          <div class="breakdown-label">${label}</div>
          <div class="breakdown-bar">
            <div class="breakdown-fill" style="--width: ${percentage}%"></div>
          </div>
          <div class="breakdown-value">${Math.round(value)} kg</div>
        `;
        breakdownDiv.appendChild(item);
      });

      // Comparison
      const comparison = document.getElementById('comparison');
      const ratio = (total / usAverage * 100).toFixed(1);
      const diff = Math.round(total - usAverage);
      const status = diff < 0 ? `${Math.abs(diff)} kg below average ✓` : `${diff} kg above average`;

      comparison.innerHTML = `
        <strong>U.S. Average: ${usAverage.toLocaleString()} kg CO₂e/year</strong><br>
        Your footprint is <strong>${ratio}%</strong> of the average. ${status}
      `;

      // Scroll to results on mobile
      if (window.innerWidth < 768) {
        resultsCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function resetForm() {
      document.getElementById('electricity').value = '450';
      document.getElementById('gas').value = '35';
      document.getElementById('miles').value = '800';
      document.getElementById('flights').value = '10';
      document.getElementById('diet').value = 'omnivore';
      document.getElementById('results').classList.add('hidden');
    }

    // Auto-calculate on load
    window.addEventListener('load', () => {
      setTimeout(() => calculateFootprint(), 100);
    });

    // Recalculate on input change (debounced)
    let recalcTimeout;
    ['electricity', 'gas', 'miles', 'flights', 'diet'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => {
        clearTimeout(recalcTimeout);
        recalcTimeout = setTimeout(calculateFootprint, 300);
      });
    });
  </script>
</body>
</html>
