<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Strength Heatmap — Real-Time Global FX Matrix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(135deg, #0a1428 0%, #1a2849 50%, #0d1f3c 100%);
      color: #e8e8ff;
      min-height: 100vh;
      padding: 20px;
      overflow-x: auto;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Hero */
    .hero {
      text-align: center;
      margin-bottom: 40px;
      animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero h1 {
      font-size: clamp(32px, 8vw, 56px);
      font-weight: 700;
      background: linear-gradient(135deg, #ffd700 0%, #ffed4e 50%, #ffb700 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .hero p {
      font-size: 14px;
      color: #a0a8d8;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .status-bar {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 20px;
      flex-wrap: wrap;
      font-size: 12px;
      color: #8a92bb;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00ff88;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Heatmap Container */
    .heatmap-wrapper {
      background: rgba(15, 31, 60, 0.5);
      border: 1px solid rgba(255, 215, 0, 0.2);
      border-radius: 12px;
      padding: 24px;
      backdrop-filter: blur(10px);
      overflow-x: auto;
      animation: fadeIn 1s 0.3s both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .heatmap {
      display: inline-grid;
      gap: 8px;
      min-width: fit-content;
      grid-auto-flow: dense;
    }

    .heatmap-header {
      display: grid;
      grid-template-columns: 60px repeat(auto-fit, minmax(50px, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }

    .heatmap-header-cell {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: #ffed4e;
      text-transform: uppercase;
      padding: 8px 4px;
      letter-spacing: 0.5px;
    }

    .heatmap-row {
      display: grid;
      grid-template-columns: 60px repeat(auto-fit, minmax(50px, 1fr));
      gap: 8px;
      align-items: center;
    }

    .heatmap-label {
      font-size: 11px;
      font-weight: 600;
      color: #ffed4e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .heatmap-cell {
      width: 50px;
      height: 40px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 500;
      font-family: 'IBM Plex Mono', monospace;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
    }

    .heatmap-cell:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
      z-index: 10;
    }

    .heatmap-cell-weak {
      background: rgba(71, 110, 220, 0.6);
      color: #b0d4ff;
    }

    .heatmap-cell-medium {
      background: rgba(153, 130, 255, 0.5);
      color: #e0d8ff;
    }

    .heatmap-cell-strong {
      background: rgba(255, 150, 0, 0.6);
      color: #fff;
    }

    .heatmap-cell-vstrong {
      background: rgba(255, 80, 80, 0.6);
      color: #fff;
    }

    /* Legend */
    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 24px;
      flex-wrap: wrap;
      font-size: 12px;
      animation: fadeIn 1s 0.6s both;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-box {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .legend-weak {
      background: rgba(71, 110, 220, 0.6);
    }

    .legend-medium {
      background: rgba(153, 130, 255, 0.5);
    }

    .legend-strong {
      background: rgba(255, 150, 0, 0.6);
    }

    .legend-vstrong {
      background: rgba(255, 80, 80, 0.6);
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-top: 24px;
    }

    .stat-card {
      background: rgba(20, 40, 80, 0.6);
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .stat-label {
      font-size: 11px;
      color: #a0a8d8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 700;
      color: #ffed4e;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px 20px;
      color: #a0a8d8;
      font-size: 14px;
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 2px solid rgba(255, 215, 0, 0.2);
      border-top: 2px solid #ffed4e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 10px;
      }

      .heatmap-wrapper {
        padding: 16px;
      }

      .heatmap-header, .heatmap-row {
        grid-template-columns: 50px repeat(4, minmax(40px, 1fr));
      }

      .heatmap-cell {
        width: 40px;
        height: 35px;
        font-size: 9px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Currency Strength Heatmap</h1>
      <p>Real-Time Global FX Matrix</p>
      <div class="status-bar">
        <div class="status-item">
          <div class="dot"></div>
          <span>Live Rates</span>
        </div>
        <div class="status-item">
          <span id="last-update">Last updated: —</span>
        </div>
      </div>
    </div>

    <div class="heatmap-wrapper">
      <div id="heatmap-container" class="loading">
        <div class="spinner"></div>
        <p>Fetching live FX data…</p>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-box legend-weak"></div>
        <span>Weak</span>
      </div>
      <div class="legend-item">
        <div class="legend-box legend-medium"></div>
        <span>Moderate</span>
      </div>
      <div class="legend-item">
        <div class="legend-box legend-strong"></div>
        <span>Strong</span>
      </div>
      <div class="legend-item">
        <div class="legend-box legend-vstrong"></div>
        <span>Very Strong</span>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Strongest Currency</div>
        <div class="stat-value" id="stat-strongest">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Weakest Currency</div>
        <div class="stat-value" id="stat-weakest">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Most Volatile Pair</div>
        <div class="stat-value" id="stat-volatile">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Update Frequency</div>
        <div class="stat-value">Auto 30s</div>
      </div>
    </div>
  </div>

  <script>
    const currencies = ['USD', 'EUR', 'GBP', 'JPY', 'CAD', 'AUD', 'CHF', 'CNY', 'INR', 'SGD', 'NZD', 'SEK'];

    let ratesData = {};
    let strengthMatrix = {};

    async function fetchRates() {
      try {
        const response = await fetch('https://api.frankfurter.dev/v1/latest?base=USD&symbols=' + currencies.join(','));
        if (!response.ok) throw new Error('FX API fetch failed');
        
        const data = await response.json();
        ratesData = { 'USD': 1, ...data.rates };
        
        return true;
      } catch (err) {
        console.error('Fetch error:', err);
        return false;
      }
    }

    function calculateStrengthMatrix() {
      strengthMatrix = {};
      
      // Normalize all rates to a 0–100 strength scale
      // Higher rate = currency is weaker (more units of that currency per USD)
      // So we invert: strength = 1 / rate, then normalize
      
      const strengths = {};
      Object.keys(ratesData).forEach(curr => {
        const rate = ratesData[curr];
        strengths[curr] = 1 / rate; // invert
      });
      
      const minStrength = Math.min(...Object.values(strengths));
      const maxStrength = Math.max(...Object.values(strengths));
      const range = maxStrength - minStrength || 1;
      
      Object.keys(strengths).forEach(curr => {
        strengthMatrix[curr] = ((strengths[curr] - minStrength) / range) * 100;
      });
    }

    function getColorClass(strength) {
      if (strength >= 75) return 'heatmap-cell-vstrong';
      if (strength >= 50) return 'heatmap-cell-strong';
      if (strength >= 25) return 'heatmap-cell-medium';
      return 'heatmap-cell-weak';
    }

    function renderHeatmap() {
      calculateStrengthMatrix();
      
      let html = '<div class="heatmap">';
      
      // Header row
      html += '<div class="heatmap-header">';
      html += '<div class="heatmap-header-cell"></div>';
      currencies.forEach(c => {
        html += `<div class="heatmap-header-cell">${c}</div>`;
      });
      html += '</div>';
      
      // Data rows
      currencies.forEach(row => {
        html += '<div class="heatmap-row">';
        html += `<div class="heatmap-label">${row}</div>`;
        
        currencies.forEach(col => {
          const rate = ratesData[col] / ratesData[row];
          const strength = strengthMatrix[col];
          const colorClass = getColorClass(strength);
          const displayRate = rate.toFixed(3);
          
          html += `<div class="heatmap-cell ${colorClass}" title="${row}/${col} = ${displayRate}">${displayRate}</div>`;
        });
        
        html += '</div>';
      });
      
      html += '</div>';
      
      document.getElementById('heatmap-container').innerHTML = html;
      updateStats();
      updateTimestamp();
    }

    function updateStats() {
      // Strongest currency
      const strongest = Object.keys(strengthMatrix).reduce((a, b) => 
        strengthMatrix[a] > strengthMatrix[b] ? a : b
      );
      
      // Weakest currency
      const weakest = Object.keys(strengthMatrix).reduce((a, b) => 
        strengthMatrix[a] < strengthMatrix[b] ? a : b
      );
      
      // Most volatile pair (highest variance in a row)
      let maxVolatility = 0;
      let mostVolatilePair = 'N/A';
      currencies.forEach(row => {
        const values = currencies.map(col => ratesData[col] / ratesData[row]);
        const mean = values.reduce((a, b) => a + b) / values.length;
        const variance = values.reduce((a, b) => a + Math.pow(b - mean, 2)) / values.length;
        const volatility = Math.sqrt(variance);
        
        if (volatility > maxVolatility) {
          maxVolatility = volatility;
          mostVolatilePair = row;
        }
      });
      
      document.getElementById('stat-strongest').textContent = strongest;
      document.getElementById('stat-weakest').textContent = weakest;
      document.getElementById('stat-volatile').textContent = mostVolatilePair;
    }

    function updateTimestamp() {
      const now = new Date();
      const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      document.getElementById('last-update').textContent = `Last updated: ${time}`;
    }

    async function init() {
      const success = await fetchRates();
      if (success) {
        renderHeatmap();
        
        // Auto-refresh every 30 seconds
        setInterval(async () => {
          await fetchRates();
          renderHeatmap();
        }, 30000);
      } else {
        document.getElementById('heatmap-container').innerHTML = '<p style="color: #ff6b6b;">Failed to fetch live FX data. Please refresh.</p>';
      }
    }

    init();
  </script>
</body>
</html>
