<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Strength Heatmap</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Sora', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0d0d1b 100%);
      color: #e8e8f5;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 900px;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero {
      text-align: center;
      margin-bottom: 40px;
    }

    .hero h1 {
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #00d9ff, #7b2cbf, #ff006e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeIn 0.8s ease-out;
    }

    .hero p {
      font-size: 14px;
      color: #a8a8b8;
      animation: fadeIn 0.8s ease-out 0.1s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
      animation: slideUp 0.6s ease-out 0.2s both;
    }

    .input-group {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 1;
      min-width: 250px;
      max-width: 500px;
    }

    .currency-select {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #7b2cbf;
      border-radius: 8px;
      background: rgba(123, 44, 191, 0.1);
      color: #e8e8f5;
      font-size: 14px;
      font-family: 'IBM Plex Mono', monospace;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .currency-select:hover,
    .currency-select:focus {
      border-color: #00d9ff;
      background: rgba(0, 217, 255, 0.1);
      outline: none;
      box-shadow: 0 0 12px rgba(0, 217, 255, 0.3);
    }

    .btn-fetch {
      padding: 12px 24px;
      border: 2px solid #00d9ff;
      border-radius: 8px;
      background: rgba(0, 217, 255, 0.1);
      color: #00d9ff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Sora', sans-serif;
    }

    .btn-fetch:hover {
      background: rgba(0, 217, 255, 0.2);
      box-shadow: 0 0 16px rgba(0, 217, 255, 0.4);
      transform: translateY(-2px);
    }

    .btn-fetch:active {
      transform: translateY(0);
    }

    .btn-fetch:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .heatmap-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 12px;
      margin-bottom: 30px;
      animation: slideUp 0.6s ease-out 0.3s both;
    }

    .currency-card {
      position: relative;
      padding: 16px;
      border-radius: 10px;
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .currency-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--heat-color, rgba(0, 217, 255, 0.2));
      z-index: 0;
      pointer-events: none;
      transition: background 0.5s ease;
    }

    .currency-card > * {
      position: relative;
      z-index: 1;
    }

    .currency-code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 6px;
    }

    .currency-rate {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: #d0d0e0;
      margin-bottom: 4px;
    }

    .currency-change {
      font-size: 11px;
      font-weight: 600;
    }

    .currency-strength {
      font-size: 10px;
      color: #a8a8b8;
      margin-top: 4px;
    }

    .currency-card:hover {
      transform: translateY(-4px);
      border-color: rgba(0, 217, 255, 0.5);
      box-shadow: 0 8px 24px rgba(0, 217, 255, 0.2);
    }

    .stats-panel {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-top: 30px;
      animation: slideUp 0.6s ease-out 0.4s both;
    }

    .stat-card {
      padding: 16px;
      border: 1px solid rgba(0, 217, 255, 0.3);
      border-radius: 8px;
      background: rgba(0, 217, 255, 0.05);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .stat-label {
      font-size: 11px;
      color: #a8a8b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      color: #00d9ff;
      font-weight: 700;
    }

    .loading {
      text-align: center;
      padding: 30px;
      color: #a8a8b8;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(0, 217, 255, 0.3);
      border-top-color: #00d9ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      padding: 16px;
      border: 1px solid rgba(255, 0, 110, 0.3);
      border-radius: 8px;
      background: rgba(255, 0, 110, 0.05);
      color: #ff006e;
      text-align: center;
      margin-top: 20px;
    }

    .legend {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 30px;
      font-size: 12px;
      color: #a8a8b8;
      flex-wrap: wrap;
      animation: fadeIn 0.6s ease-out 0.5s both;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 3px;
    }

    @media (max-width: 600px) {
      .hero h1 {
        font-size: 32px;
      }

      .heatmap-grid {
        grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
        gap: 8px;
      }

      .currency-card {
        padding: 12px;
      }

      .input-group {
        flex-direction: column;
        max-width: 100%;
      }

      .currency-select,
      .btn-fetch {
        width: 100%;
      }

      .stats-panel {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>💱 Currency Strength Heatmap</h1>
      <p>Compare live forex rates and discover currency strength rankings</p>
    </div>

    <div class="controls">
      <div class="input-group">
        <select id="baseCurrency" class="currency-select">
          <option value="USD">USD - US Dollar</option>
          <option value="EUR">EUR - Euro</option>
          <option value="GBP">GBP - British Pound</option>
          <option value="JPY">JPY - Japanese Yen</option>
          <option value="AUD">AUD - Australian Dollar</option>
          <option value="CAD">CAD - Canadian Dollar</option>
          <option value="CHF">CHF - Swiss Franc</option>
          <option value="CNY">CNY - Chinese Yuan</option>
          <option value="INR">INR - Indian Rupee</option>
          <option value="MXN">MXN - Mexican Peso</option>
          <option value="NZD">NZD - New Zealand Dollar</option>
          <option value="SGD">SGD - Singapore Dollar</option>
        </select>
        <button class="btn-fetch" id="fetchBtn">Fetch Rates</button>
      </div>
    </div>

    <div id="content">
      <div class="loading">
        <span class="spinner"></span>
        Initializing with USD...
      </div>
    </div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-color" style="background: #ff4444;"></div>
        <span>Weakest</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background: #ffaa00;"></div>
        <span>Moderate</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background: #00cc44;"></div>
        <span>Strong</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background: #00d9ff;"></div>
        <span>Strongest</span>
      </div>
    </div>
  </div>

  <script>
    const majorCurrencies = ['EUR', 'GBP', 'JPY', 'AUD', 'CAD', 'CHF', 'CNY', 'INR', 'MXN', 'NZD', 'SGD'];

    function getHeatColor(strength) {
      // strength: 0 (weakest) to 1 (strongest)
      if (strength > 0.8) {
        return `rgba(0, 217, 255, 0.4)`;
      } else if (strength > 0.6) {
        return `rgba(0, 204, 68, 0.4)`;
      } else if (strength > 0.4) {
        return `rgba(255, 170, 0, 0.4)`;
      } else {
        return `rgba(255, 68, 68, 0.4)`;
      }
    }

    function getStrengthLabel(strength) {
      if (strength > 0.8) return 'Strongest';
      if (strength > 0.6) return 'Strong';
      if (strength > 0.4) return 'Moderate';
      return 'Weakest';
    }

    async function fetchRates(baseCurrency) {
      try {
        const response = await fetch(`https://open.er-api.com/v6/latest/${baseCurrency}`);
        if (!response.ok) throw new Error('Failed to fetch rates');
        const data = await response.json();
        return data.rates || {};
      } catch (error) {
        console.error('Error:', error);
        return null;
      }
    }

    function renderHeatmap(baseCurrency, rates) {
      if (!rates) {
        document.getElementById('content').innerHTML = `
          <div class="error">
            ⚠️ Unable to fetch rates. Please try again.
          </div>
        `;
        return;
      }

      // Filter and rank currencies by strength
      const currencyPairs = majorCurrencies
        .filter(cur => cur !== baseCurrency && rates[cur])
        .map(cur => ({
          code: cur,
          rate: rates[cur],
          inverse: 1 / rates[cur]
        }))
        .sort((a, b) => a.rate - b.rate);

      // Normalize strengths (inverse rates: higher = stronger against base)
      const maxInverse = Math.max(...currencyPairs.map(p => p.inverse));
      const minInverse = Math.min(...currencyPairs.map(p => p.inverse));
      const range = maxInverse - minInverse || 1;

      // Calculate stats
      const avgRate = currencyPairs.reduce((sum, p) => sum + p.rate, 0) / currencyPairs.length;
      const strongest = currencyPairs[currencyPairs.length - 1];
      const weakest = currencyPairs[0];

      let html = '<div class="heatmap-grid">';
      currencyPairs.forEach(pair => {
        const strength = (pair.inverse - minInverse) / range;
        const color = getHeatColor(strength);
        const label = getStrengthLabel(strength);
        const percentageChange = ((pair.rate - 1) * 100).toFixed(2);

        html += `
          <div class="currency-card" style="--heat-color: ${color}">
            <div class="currency-code">${pair.code}</div>
            <div class="currency-rate">${pair.rate.toFixed(4)}</div>
            <div class="currency-change">${percentageChange > 0 ? '+' : ''}${percentageChange}%</div>
            <div class="currency-strength">📊 ${label}</div>
          </div>
        `;
      });
      html += '</div>';

      html += `
        <div class="stats-panel">
          <div class="stat-card">
            <div class="stat-label">Base Currency</div>
            <div class="stat-value">${baseCurrency}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Strongest Against Base</div>
            <div class="stat-value">${strongest.code}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Weakest Against Base</div>
            <div class="stat-value">${weakest.code}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Currencies Tracked</div>
            <div class="stat-value">${currencyPairs.length}</div>
          </div>
        </div>
      `;

      document.getElementById('content').innerHTML = html;
    }

    async function loadRates() {
      const baseCurrency = document.getElementById('baseCurrency').value;
      document.getElementById('content').innerHTML = `
        <div class="loading">
          <span class="spinner"></span>
          Fetching rates for ${baseCurrency}...
        </div>
      `;

      const rates = await fetchRates(baseCurrency);
      renderHeatmap(baseCurrency, rates);
    }

    document.getElementById('fetchBtn').addEventListener('click', loadRates);
    document.getElementById('baseCurrency').addEventListener('change', loadRates);

    // Load on page load with USD
    window.addEventListener('load', loadRates);
  </script>
</body>
</html>
