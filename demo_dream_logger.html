<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dream Logger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Source+Sans+3:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: linear-gradient(135deg, #0f1419 0%, #1a0f2e 50%, #0d1f2d 100%);
      color: #e0e0ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    .container {
      max-width: 900px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: stretch;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
        gap: 30px;
      }
    }

    /* HERO SECTION */
    .hero {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      animation: slideInLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(40px, 6vw, 72px);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 20px;
      background: linear-gradient(120deg, #00d4ff, #b344ff, #ff6b9d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeIn 0.6s ease 0.1s backwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .hero p {
      font-size: 16px;
      line-height: 1.6;
      color: #b0b0ff;
      margin-bottom: 30px;
      animation: fadeIn 0.6s ease 0.2s backwards;
    }

    .dream-input {
      margin-bottom: 20px;
      animation: fadeIn 0.6s ease 0.3s backwards;
    }

    .dream-input label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #00d4ff;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .dream-input textarea {
      width: 100%;
      padding: 16px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 15px;
      color: #e0e0ff;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 12px;
      resize: none;
      height: 120px;
      transition: all 0.3s ease;
    }

    .dream-input textarea:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.08);
      border-color: #00d4ff;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
    }

    .submit-btn {
      width: 100%;
      padding: 14px 24px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: #000;
      background: linear-gradient(135deg, #00d4ff, #b344ff);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      animation: fadeIn 0.6s ease 0.4s backwards;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0, 212, 255, 0.3);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    /* STARFIELD SECTION */
    .starfield-container {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      min-height: 400px;
      animation: slideInRight 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .starfield-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 600;
      color: #b344ff;
      text-align: center;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.5s forwards;
    }

    .starfield-sky {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      max-width: 300px;
      background: radial-gradient(circle at 50% 50%, rgba(30, 20, 60, 0.6), #0f1419);
      border-radius: 50%;
      border: 2px solid rgba(179, 68, 255, 0.4);
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0, 212, 255, 0.15), inset 0 0 40px rgba(179, 68, 255, 0.1);
      opacity: 0;
      animation: fadeIn 0.6s ease 0.6s forwards;
    }

    svg {
      width: 100%;
      height: 100%;
    }

    .emotion-stats {
      width: 100%;
      margin-top: 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.7s forwards;
    }

    .stat-box {
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border-left: 3px solid #00d4ff;
      border-radius: 8px;
      text-align: center;
    }

    .stat-box.joy {
      border-left-color: #ff6b9d;
    }

    .stat-box.sorrow {
      border-left-color: #00a8e8;
    }

    .stat-box.surreal {
      border-left-color: #b344ff;
    }

    .stat-box.fear {
      border-left-color: #ffaa00;
    }

    .stat-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #e0e0ff;
    }

    .empty-state {
      text-align: center;
      color: #888;
      font-size: 15px;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.6s forwards;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div>
        <h1>✨ Dream Logger</h1>
        <p>Capture your night visions and watch them bloom into a constellation of emotions. Each dream becomes a unique starfield.</p>
      </div>
      <div class="dream-input">
        <label for="dreamText">Describe Your Dream</label>
        <textarea
          id="dreamText"
          placeholder="I was flying through clouds made of cotton, and then..."
        ></textarea>
      </div>
      <button class="submit-btn">Log Dream & Generate Sky</button>
    </div>

    <div class="starfield-container">
      <div class="starfield-title">Your Dream Sky</div>
      <div id="starfieldWrapper">
        <div class="starfield-sky">
          <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" id="starfieldSVG">
            <defs>
              <filter id="glow">
                <feGaussianBlur stdDeviation="2" result="coloredBlur" />
                <feMerge>
                  <feMergeNode in="coloredBlur" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
            </defs>
          </svg>
        </div>
      </div>
      <div class="emotion-stats" id="emotionStats"></div>
      <div class="empty-state" id="emptyState">
        Start by describing a dream above →
      </div>
    </div>
  </div>

  <script>
    // ==== SENTIMENT LOGIC (headless-testable, pure functions) ====
    const emotionMap = {
      joy: { words: ['happy', 'joy', 'laugh', 'smile', 'wonderful', 'amazing', 'love', 'beautiful', 'flying'], hue: 330, color: '#ff6b9d' },
      sorrow: { words: ['sad', 'cry', 'dark', 'lost', 'lonely', 'scared', 'broken', 'dying', 'fall'], hue: 200, color: '#00a8e8' },
      surreal: { words: ['dream', 'float', 'strange', 'surreal', 'magic', 'shimmer', 'twist', 'warp', 'fractal'], hue: 280, color: '#b344ff' },
      fear: { words: ['chase', 'run', 'danger', 'monster', 'scream', 'trapped', 'panic', 'nightmare', 'horror'], hue: 40, color: '#ffaa00' }
    };

    function computeSentiment(text) {
      const lower = text.toLowerCase();
      const scores = { joy: 0, sorrow: 0, surreal: 0, fear: 0 };
      
      for (const [emotion, data] of Object.entries(emotionMap)) {
        data.words.forEach(word => {
          const regex = new RegExp(`\\b${word}\\b`, 'g');
          const matches = lower.match(regex) || [];
          scores[emotion] += matches.length;
        });
      }
      
      return scores;
    }

    function generateStars(scores) {
      const totalScore = Object.values(scores).reduce((a, b) => a + b, 0) || 1;
      const starCount = Math.min(80, Math.max(10, Math.round(totalScore * 3)));
      
      const stars = [];
      for (let i = 0; i < starCount; i++) {
        const emotionKey = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        const emotion = emotionMap[emotionKey];
        const hueVariation = emotion.hue + (Math.random() - 0.5) * 40;
        
        stars.push({
          x: Math.random() * 300,
          y: Math.random() * 300,
          r: Math.random() * 1.5 + 0.5,
          hue: hueVariation,
          saturation: Math.random() * 30 + 70,
          emotion: emotionKey
        });
      }
      
      return stars;
    }

    // ==== DOM & INTERACTION ====
    const dreamTextarea = document.getElementById('dreamText');
    const submitBtn = document.querySelector('.submit-btn');
    const starfieldSVG = document.getElementById('starfieldSVG');
    const emotionStatsDiv = document.getElementById('emotionStats');
    const emptyStateDiv = document.getElementById('emptyState');

    submitBtn.addEventListener('click', () => {
      const dreamText = dreamTextarea.value.trim();
      if (!dreamText) return;

      const scores = computeSentiment(dreamText);
      const stars = generateStars(scores);

      // Clear SVG
      const existingStars = starfieldSVG.querySelectorAll('circle');
      existingStars.forEach((star, idx) => {
        setTimeout(() => star.remove(), idx * 30);
      });

      // Render new stars with stagger
      stars.forEach((star, idx) => {
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', star.x);
        circle.setAttribute('cy', star.y);
        circle.setAttribute('r', star.r);
        circle.setAttribute('fill', `hsl(${star.hue}, ${star.saturation}%, 70%)`);
        circle.setAttribute('filter', 'url(#glow)');
        circle.setAttribute('opacity', '0');
        circle.style.animation = `starFade 0.6s ease ${idx * 0.02}s forwards`;
        starfieldSVG.appendChild(circle);
      });

      // Add starFade animation if not present
      if (!document.getElementById('starFadeStyle')) {
        const style = document.createElement('style');
        style.id = 'starFadeStyle';
        style.textContent = `
          @keyframes starFade {
            from {
              opacity: 0;
              r: 0.1;
            }
            to {
              opacity: 0.9;
              r: 1;
            }
          }
        `;
        document.head.appendChild(style);
      }

      // Update stats
      emotionStatsDiv.innerHTML = Object.entries(scores)
        .map(([emotion, score]) => `
          <div class="stat-box ${emotion}">
            <div class="stat-label">${emotion}</div>
            <div class="stat-value">${score}</div>
          </div>
        `)
        .join('');

      emptyStateDiv.style.display = 'none';
    });

    // ==== TEST (headless-verifiable, no DOM) ====
    // Uncomment to run in Node or console
    // console.log('TEST: sentiment("happy dream", "sad fall")');
    // const test1 = computeSentiment('I was happy and flying through a beautiful dream');
    // console.assert(test1.joy > 0, 'joy should score > 0');
    // console.assert(test1.surreal > 0, 'surreal should score > 0');
    // const test2 = computeSentiment('I was trapped and chased by a monster, screaming');
    // console.assert(test2.fear > 0, 'fear should score > 0');
    // console.assert(test2.sorrow > 0, 'sorrow should score > 0');
    // const test3 = generateStars({ joy: 3, sorrow: 1, surreal: 2, fear: 1 });
    // console.assert(test3.length > 0, 'stars should generate');
    // console.assert(test3[0].x >= 0 && test3[0].x <= 300, 'star x in bounds');
    // console.assert(test3[0].y >= 0 && test3[0].y <= 300, 'star y in bounds');
    // console.log('✅ all tests pass');
  </script>
</body>
</html>
