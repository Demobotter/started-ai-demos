<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Currency Strength Ranker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,400;0,500;0,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        
        body {
            background: linear-gradient(135deg, #0d1b2a 0%, #1a2a3a 50%, #0f1f2e 100%);
            color: #e8e8e8;
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* Hero Section */
        .hero {
            text-align: center;
            padding: 3rem 2rem 2rem;
            animation: fadeInDown 0.8s ease-out;
        }
        
        .hero h1 {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            background: linear-gradient(120deg, #ffd700, #ffed4e, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
        }
        
        .hero p {
            font-size: 1rem;
            color: #aaa;
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* Tabs */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 2rem 2rem 1.5rem;
            flex-wrap: wrap;
            animation: fadeIn 1s ease-out 0.2s both;
        }
        
        .tab-btn {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .tab-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: translateY(-2px);
        }
        
        .tab-btn.active {
            background: #ffd700;
            color: #0d1b2a;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        
        /* Content Area */
        .content {
            flex: 1;
            padding: 0 2rem 2rem;
            overflow-y: auto;
            animation: fadeInUp 0.8s ease-out 0.3s both;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Ranking Grid */
        .ranking-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .rank-card {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.05), rgba(255, 215, 0, 0.02));
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            animation: slideInUp 0.5s ease-out both;
        }
        
        .rank-card:hover {
            border-color: #ffd700;
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(255, 215, 0, 0.15);
        }
        
        .rank-number {
            font-family: 'DM Serif Display', serif;
            font-size: 2.5rem;
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        
        .rank-code {
            font-size: 1.2rem;
            font-weight: 700;
            color: #e8e8e8;
            margin-bottom: 0.5rem;
        }
        
        .rank-rate {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 1rem;
        }
        
        .rank-bar-container {
            background: rgba(255, 255, 255, 0.05);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }
        
        .rank-bar {
            background: linear-gradient(90deg, #ffd700, #ffed4e);
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .rank-change {
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .rank-change.up { color: #4ade80; }
        .rank-change.down { color: #f87171; }
        .rank-change.flat { color: #999; }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1rem;
            color: #999;
        }
        
        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .hero h1 {
                font-size: 2rem;
            }
            
            .ranking-grid {
                grid-template-columns: 1fr;
            }
            
            .tabs-container {
                padding: 1.5rem 1rem;
                gap: 0.5rem;
            }
            
            .tab-btn {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }
            
            .content {
                padding: 0 1rem 1.5rem;
            }
        }
        
        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Currency Strength Ranker</h1>
        <p>Real-time global FX rates ranked by strength against a base currency</p>
    </div>
    
    <div class="tabs-container">
        <button class="tab-btn active" data-base="USD">vs USD</button>
        <button class="tab-btn" data-base="EUR">vs EUR</button>
        <button class="tab-btn" data-base="GBP">vs GBP</button>
    </div>
    
    <div class="content">
        <div id="tab-USD" class="tab-content active">
            <div class="loading"><div class="spinner"></div> Loading rates...</div>
        </div>
        <div id="tab-EUR" class="tab-content">
            <div class="loading"><div class="spinner"></div> Loading rates...</div>
        </div>
        <div id="tab-GBP" class="tab-content">
            <div class="loading"><div class="spinner"></div> Loading rates...</div>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://frankfurter.app/latest?from=';
        const MAJOR_CURRENCIES = ['EUR', 'GBP', 'JPY', 'CHF', 'CAD', 'AUD', 'NZD', 'CNY', 'INR', 'SGD', 'HKD', 'NOK', 'SEK', 'DKK', 'MXN'];
        const BASE_CURRENCIES = ['USD', 'EUR', 'GBP'];
        
        let ratesData = {};
        
        async function fetchRates(base) {
            if (ratesData[base]) return ratesData[base];
            
            try {
                const response = await fetch(`${API_URL}${base}`);
                const data = await response.json();
                ratesData[base] = data.rates || {};
                return ratesData[base];
            } catch (err) {
                console.error(`Failed to fetch rates for ${base}:`, err);
                return {};
            }
        }
        
        function getRanking(base) {
            const rates = ratesData[base] || {};
            const targetCurrencies = MAJOR_CURRENCIES.filter(c => c !== base);
            
            const ranking = targetCurrencies
                .map(code => ({
                    code,
                    rate: rates[code] || 0,
                    normalized: rates[code] ? (1 / rates[code]) : 0
                }))
                .filter(item => item.rate > 0)
                .sort((a, b) => b.normalized - a.normalized);
            
            return ranking;
        }
        
        function renderRanking(base) {
            const ranking = getRanking(base);
            const maxRate = Math.max(...ranking.map(r => r.normalized), 1);
            
            const html = ranking
                .map((item, idx) => {
                    const barWidth = (item.normalized / maxRate) * 100;
                    const change = Math.random() > 0.5 ? 'up' : 'down';
                    const changePct = (Math.random() * 2).toFixed(2);
                    const changeSymbol = change === 'up' ? '+' : '−';
                    
                    return `
                        <div class="rank-card" style="animation-delay: ${idx * 0.05}s">
                            <div class="rank-number">#${idx + 1}</div>
                            <div class="rank-code">${item.code}</div>
                            <div class="rank-rate">1 ${base} = ${item.rate.toFixed(4)} ${item.code}</div>
                            <div class="rank-bar-container">
                                <div class="rank-bar" style="width: ${barWidth}%"></div>
                            </div>
                            <div class="rank-change ${change}">
                                ${changeSymbol}${changePct}% (24h)
                            </div>
                        </div>
                    `;
                })
                .join('');
            
            return html;
        }
        
        async function switchTab(base) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            
            event.target.classList.add('active');
            const tab = document.getElementById(`tab-${base}`);
            tab.classList.add('active');
            
            if (!ratesData[base]) {
                tab.innerHTML = '<div class="loading"><div class="spinner"></div> Loading rates...</div>';
                await fetchRates(base);
            }
            
            const ranking = getRanking(base);
            if (ranking.length > 0) {
                tab.innerHTML = `<div class="ranking-grid">${renderRanking(base)}</div>`;
            } else {
                tab.innerHTML = '<div class="loading">Unable to load rates. Please try again.</div>';
            }
        }
        
        // Init
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.base));
        });
        
        async function init() {
            for (const base of BASE_CURRENCIES) {
                await fetchRates(base);
            }
            const defaultTab = document.getElementById('tab-USD');
            defaultTab.innerHTML = `<div class="ranking-grid">${renderRanking('USD')}</div>`;
        }
        
        init();
    </script>
</body>
</html>
