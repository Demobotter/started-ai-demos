<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Currency Strength Ranker</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@100;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 50%, #0d1117 100%);
            color: #e8ecf1;
            font-family: 'Geist', sans-serif;
            overflow-x: hidden;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            min-height: 100vh;
        }

        /* HERO */
        .hero {
            text-align: center;
            animation: fadeDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(32px, 7vw, 56px);
            font-weight: 400;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #00d9ff 0%, #00a8cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 15px;
            color: #b4bcc4;
            margin-bottom: 24px;
            font-weight: 400;
        }

        /* STATS CARDS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            animation: fadeUp 0.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 8px;
            padding: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgba(0, 217, 255, 0.6);
            background: rgba(30, 41, 59, 0.8);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 12px;
            color: #7a8288;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .stat-value {
            font-family: 'Geist', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #00d9ff;
        }

        /* RANKER CHART */
        .ranker-section {
            animation: fadeUp 0.8s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .ranker-title {
            font-family: 'Instrument Serif', serif;
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 20px;
            color: #e8ecf1;
            letter-spacing: -0.5px;
        }

        .strength-bars {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .strength-bar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .strength-bar-item:nth-child(1) { animation-delay: 0.08s; }
        .strength-bar-item:nth-child(2) { animation-delay: 0.16s; }
        .strength-bar-item:nth-child(3) { animation-delay: 0.24s; }
        .strength-bar-item:nth-child(4) { animation-delay: 0.32s; }
        .strength-bar-item:nth-child(5) { animation-delay: 0.40s; }
        .strength-bar-item:nth-child(6) { animation-delay: 0.48s; }
        .strength-bar-item:nth-child(7) { animation-delay: 0.56s; }
        .strength-bar-item:nth-child(8) { animation-delay: 0.64s; }

        .strength-currency {
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 50px;
            text-align: right;
            color: #b4bcc4;
        }

        .strength-bar-container {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            height: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            position: relative;
        }

        .strength-bar-fill {
            height: 100%;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.6s ease;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        /* STRENGTH COLOR BANDS */
        .strength-strong { background: linear-gradient(90deg, #22c55e 0%, #16a34a 100%); }
        .strength-moderate { background: linear-gradient(90deg, #3b82f6 0%, #1d4ed8 100%); }
        .strength-weak { background: linear-gradient(90deg, #ef4444 0%, #b91c1c 100%); }

        .strength-score {
            font-weight: 600;
            font-size: 12px;
            width: 40px;
            text-align: right;
            color: #7a8288;
        }

        /* TIMESTAMP */
        .timestamp {
            text-align: center;
            font-size: 12px;
            color: #7a8288;
            margin-top: 20px;
            animation: fadeUp 0.8s 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* LEGEND */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
            animation: fadeUp 0.8s 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #b4bcc4;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        /* LOADING */
        .loading {
            text-align: center;
            color: #7a8288;
            font-size: 14px;
            padding: 40px;
        }

        .pulse {
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .hero h1 {
                font-size: 28px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .strength-currency {
                width: 45px;
                font-size: 12px;
            }

            .strength-score {
                font-size: 11px;
                width: 35px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Currency Strength Ranker</h1>
            <p>Live forex pair analysis • Auto-updates every 30 seconds</p>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-label">Strongest Currency</div>
                <div class="stat-value" id="strongestCurr">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Weakest Currency</div>
                <div class="stat-value" id="weakestCurr">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Strongest Pair</div>
                <div class="stat-value" id="strongestPair">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Weakest Pair</div>
                <div class="stat-value" id="weakestPair">—</div>
            </div>
        </div>

        <div class="ranker-section">
            <div class="ranker-title">Currency Strength Index</div>
            <div class="strength-bars" id="strengthBars">
                <div class="loading pulse">Loading live forex data…</div>
            </div>
            <div class="timestamp" id="timestamp">—</div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot" style="background: #22c55e;"></div>
                <span>Strong (Index ≥ 0.3)</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #3b82f6;"></div>
                <span>Moderate (-0.3 to 0.3)</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #ef4444;"></div>
                <span>Weak (≤ -0.3)</span>
            </div>
        </div>
    </div>

    <script>
        // ===== CORE LOGIC (headless-testable) =====

        // Normalize value to [-1, 1] scale
        function normalize(value, minVal, maxVal) {
            if (minVal === maxVal) return 0;
            return (value - minVal) / (maxVal - minVal) * 2 - 1;
        }

        // Calculate currency strength from forex pairs
        // Higher exchange rate = base currency strong, quote currency weak
        function calcCurrencyStrengths(pairs) {
            const strengths = {};
            const allCurrencies = new Set();

            // Collect all currencies
            pairs.forEach(p => {
                allCurrencies.add(p.base);
                allCurrencies.add(p.quote);
            });

            // Initialize strength scores to 0
            allCurrencies.forEach(c => {
                strengths[c] = 0;
            });

            // For each pair, allocate strength
            // If rate is HIGH: base is strong, quote is weak
            // If rate is LOW: base is weak, quote is strong
            pairs.forEach(p => {
                const normalized = normalize(p.rate, 0.8, 1.2); // Typical range
                strengths[p.base] += normalized;
                strengths[p.quote] -= normalized;
            });

            // Normalize across all currencies
            const rates = Object.values(strengths);
            const minRate = Math.min(...rates);
            const maxRate = Math.max(...rates);

            Object.keys(strengths).forEach(c => {
                strengths[c] = normalize(strengths[c], minRate, maxRate);
            });

            return strengths;
        }

        function getStrengthClass(score) {
            if (score >= 0.3) return 'strength-strong';
            if (score <= -0.3) return 'strength-weak';
            return 'strength-moderate';
        }

        // ===== END HEADLESS LOGIC =====

        const majorCurrencies = ['EUR', 'GBP', 'JPY', 'CHF', 'CAD', 'AUD', 'NZD', 'USD'];

        async function fetchForexData() {
            try {
                // Build pairs: all major currencies vs USD as reference
                const pairs = [
                    'EUR/USD', 'GBP/USD', 'JPY/USD', 'CHF/USD',
                    'CAD/USD', 'AUD/USD', 'NZD/USD'
                ];

                const rateData = {};

                for (const pair of pairs) {
                    try {
                        const [base, quote] = pair.split('/');
                        const url = `https://api.frankfurter.dev/v1/latest?from=${base}&to=${quote}`;
                        const res = await fetch(url);
                        const json = await res.json();
                        rateData[pair] = json.rates[quote];
                    } catch (e) {
                        console.error(`Failed to fetch ${pair}:`, e);
                    }
                }

                return rateData;
            } catch (e) {
                console.error('Forex fetch failed:', e);
                return null;
            }
        }

        async function updateRanker() {
            const rateData = await fetchForexData();

            if (!rateData || Object.keys(rateData).length === 0) {
                document.getElementById('strengthBars').innerHTML =
                    '<div class="loading">API error. Retrying in 30s…</div>';
                return;
            }

            // Convert rateData to pairs array
            const pairs = Object.entries(rateData).map(([pair, rate]) => {
                const [base, quote] = pair.split('/');
                return { pair, base, quote, rate };
            });

            // Calculate strengths
            const strengths = calcCurrencyStrengths(pairs);

            // Sort by strength (descending)
            const sorted = Object.entries(strengths)
                .sort((a, b) => b[1] - a[1]);

            // Find extremes
            const strongest = sorted[0][0];
            const weakest = sorted[sorted.length - 1][0];
            const strongestPair = pairs.reduce((a, b) =>
                b.rate > a.rate ? b : a
            );
            const weakestPair = pairs.reduce((a, b) =>
                b.rate < a.rate ? b : a
            );

            // Update stat cards
            document.getElementById('strongestCurr').textContent = strongest;
            document.getElementById('weakestCurr').textContent = weakest;
            document.getElementById('strongestPair').textContent = strongestPair.pair;
            document.getElementById('weakestPair').textContent = weakestPair.pair;

            // Render strength bars
            const barsHtml = sorted.map(([curr, score], idx) => {
                const width = Math.max(10, (score + 1) * 50); // Map [-1,1] to [10%, 100%]
                const strengthClass = getStrengthClass(score);
                return `
                    <div class="strength-bar-item">
                        <div class="strength-currency">${curr}</div>
                        <div class="strength-bar-container">
                            <div class="strength-bar-fill ${strengthClass}" style="width: ${width}%">
                                ${Math.round(score * 100)}
                            </div>
                        </div>
                        <div class="strength-score">${score.toFixed(2)}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('strengthBars').innerHTML = barsHtml;

            // Update timestamp
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-AU', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            });
            document.getElementById('timestamp').textContent = `Last updated: ${timeStr}`;
        }

        // Initial load + auto-refresh every 30s
        updateRanker();
        setInterval(updateRanker, 30000);
    </script>
</body>
</html>
