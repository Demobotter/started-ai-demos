<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Strength Ranker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f1729 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* Subtle noise texture */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" /><feColorMatrix in="noise" type="saturate" values="0" /></filter><rect width="100%" height="100%" fill="%23fff" filter="url(%23n)" opacity="0.02"/></svg>');
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1200px;
      width: 100%;
      position: relative;
      z-index: 1;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Hero */
    .hero {
      text-align: center;
      margin-bottom: 50px;
      animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero h1 {
      font-size: clamp(36px, 8vw, 72px);
      font-weight: 700;
      background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1.2px;
      margin-bottom: 8px;
      line-height: 1.1;
    }

    .hero p {
      font-size: 16px;
      color: #94a3b8;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .hero-emoji {
      font-size: 48px;
      margin-bottom: 12px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    /* Control */
    .control-section {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .base-label {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #cbd5e1;
    }

    .base-selector {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .base-btn {
      padding: 8px 14px;
      border: 1px solid #334155;
      background: rgba(30, 41, 59, 0.8);
      color: #cbd5e1;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    .base-btn:hover {
      border-color: #06b6d4;
      background: rgba(6, 182, 212, 0.1);
      color: #06b6d4;
      box-shadow: 0 0 12px rgba(6, 182, 212, 0.2);
      transform: translateY(-2px);
    }

    .base-btn.active {
      border-color: #06b6d4;
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.2), rgba(139, 92, 246, 0.1));
      color: #06b6d4;
      box-shadow: 0 0 16px rgba(6, 182, 212, 0.3);
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .card {
      padding: 16px;
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid #334155;
      border-radius: 8px;
      cursor: default;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, var(--grad-color1) 0%, var(--grad-color2) 100%);
      opacity: 0.05;
      pointer-events: none;
      z-index: 0;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .card:hover {
      border-color: var(--color);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3), 0 0 1px var(--color);
      transform: translateY(-4px);
    }

    .pair-name {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      color: var(--color);
    }

    .change-pct {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--color);
    }

    .strength-bar {
      width: 100%;
      height: 4px;
      background: rgba(148, 163, 184, 0.2);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .strength-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--grad-color1), var(--grad-color2));
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    .strength-label {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      font-weight: 600;
    }

    /* Status */
    .status {
      text-align: center;
      font-size: 13px;
      color: #94a3b8;
      margin-top: 30px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .status.loading {
      color: #06b6d4;
    }

    .status.error {
      color: #ef4444;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .hero h1 {
        font-size: 40px;
      }

      .control-section {
        flex-direction: column;
        gap: 16px;
      }

      .base-selector {
        width: 100%;
      }

      .grid {
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 10px;
      }

      .card {
        padding: 12px;
      }

      .pair-name {
        font-size: 11px;
      }

      .change-pct {
        font-size: 16px;
      }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }

      .hero-emoji {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="hero-emoji">💱</div>
      <h1>Currency Strength Ranker</h1>
      <p>Live FX heatmap — see which currencies are strongest today</p>
    </div>

    <div class="control-section">
      <div class="base-label">Base Currency:</div>
      <div class="base-selector" id="baseSelector"></div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="status" id="status">Loading live FX rates...</div>
  </div>

  <script>
    // Major currencies
    const currencies = ['USD', 'EUR', 'GBP', 'JPY', 'CAD', 'AUD', 'CHF', 'CNY', 'INR', 'BRL', 'RUB', 'MXN', 'SGD', 'HKD', 'NZD'];
    const colorMap = {
      USD: { grad1: '#06b6d4', grad2: '#0891b2', name: 'USD' },
      EUR: { grad1: '#8b5cf6', grad2: '#6d28d9', name: 'EUR' },
      GBP: { grad1: '#ec4899', grad2: '#be185d', name: 'GBP' },
      JPY: { grad1: '#f59e0b', grad2: '#d97706', name: 'JPY' },
      CAD: { grad1: '#10b981', grad2: '#047857', name: 'CAD' },
      AUD: { grad1: '#f43f5e', grad2: '#be185d', name: 'AUD' },
      CHF: { grad1: '#06b6d4', grad2: '#0d9488', name: 'CHF' },
      CNY: { grad1: '#ef4444', grad2: '#991b1b', name: 'CNY' },
      INR: { grad1: '#fbbf24', grad2: '#d97706', name: 'INR' },
      BRL: { grad1: '#84cc16', grad2: '#4ade80', name: 'BRL' },
      RUB: { grad1: '#a78bfa', grad2: '#7c3aed', name: 'RUB' },
      MXN: { grad1: '#22d3ee', grad2: '#06b6d4', name: 'MXN' },
      SGD: { grad1: '#c084fc', grad2: '#a855f7', name: 'SGD' },
      HKD: { grad1: '#fb923c', grad2: '#f97316', name: 'HKD' },
      NZD: { grad1: '#4f46e5', grad2: '#4338ca', name: 'NZD' }
    };

    let baseCurrency = 'USD';
    let rates = {};

    async function fetchRates(base) {
      try {
        document.getElementById('status').textContent = `Loading live FX rates (base: ${base})...`;
        document.getElementById('status').classList.add('loading');
        document.getElementById('status').classList.remove('error');

        const resp = await fetch(`https://api.frankfurter.app/latest?base=${base}`);
        if (!resp.ok) throw new Error('API fetch failed');

        const data = await resp.json();
        rates = data.rates || {};
        renderGrid();

        const ts = new Date(data.date).toLocaleString();
        document.getElementById('status').textContent = `Live rates as of ${ts}`;
        document.getElementById('status').classList.remove('loading');
      } catch (err) {
        document.getElementById('status').textContent = `Error fetching rates: ${err.message}`;
        document.getElementById('status').classList.add('error');
      }
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      // Calculate strength: for each pair, strength = (1 / rate) normalized
      const pairs = currencies.filter(c => c !== baseCurrency).map(cur => ({
        pair: `${baseCurrency}/${cur}`,
        code: cur,
        rate: rates[cur] || 1,
        strength: rates[cur] ? 1 / rates[cur] : 0.5
      }));

      // Normalize strength to 0-100
      const minStr = Math.min(...pairs.map(p => p.strength));
      const maxStr = Math.max(...pairs.map(p => p.strength));
      const range = maxStr - minStr || 1;

      pairs.forEach(p => {
        const normalized = ((p.strength - minStr) / range) * 100;
        const change = ((1 / p.rate - 1) * 100).toFixed(1);

        const card = document.createElement('div');
        card.className = 'card';
        card.style.setProperty('--color', colorMap[p.code].grad1);
        card.style.setProperty('--grad-color1', colorMap[p.code].grad1);
        card.style.setProperty('--grad-color2', colorMap[p.code].grad2);

        const fill = Math.max(0, Math.min(100, normalized));
        card.innerHTML = `
          <div class="pair-name">${p.code}</div>
          <div class="change-pct">${change > 0 ? '+' : ''}${change}%</div>
          <div class="strength-bar">
            <div class="strength-fill" style="width: ${fill}%"></div>
          </div>
          <div class="strength-label">Strength</div>
        `;

        grid.appendChild(card);
      });
    }

    function initBaseSelector() {
      const selector = document.getElementById('baseSelector');
      currencies.forEach(cur => {
        const btn = document.createElement('button');
        btn.className = 'base-btn';
        if (cur === baseCurrency) btn.classList.add('active');
        btn.textContent = cur;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.base-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          baseCurrency = cur;
          fetchRates(cur);
        });
        selector.appendChild(btn);
      });
    }

    // Headless self-test: logic verification
    function selfTest() {
      // Test 1: strength calculation for a known rate
      const testRate = 1.1;
      const testStr = 1 / testRate; // = ~0.909
      console.assert(Math.abs(testStr - 0.909) < 0.01, 'Strength calc correct');

      // Test 2: normalize function
      const vals = [0.8, 1.0, 1.2];
      const min = Math.min(...vals);
      const max = Math.max(...vals);
      const range = max - min;
      const normalized = (vals[1] - min) / range * 100; // should be 50%
      console.assert(Math.abs(normalized - 50) < 1, 'Normalization correct');

      // Test 3: change pct
      const rate = 1.05;
      const changePct = (1 / rate - 1) * 100; // should be ~-4.76%
      console.assert(Math.abs(changePct - (-4.76)) < 0.1, 'Change pct correct');

      console.log('✓ Headless self-tests passed');
    }

    selfTest();
    initBaseSelector();
    fetchRates('USD');
  </script>
</body>
</html>
