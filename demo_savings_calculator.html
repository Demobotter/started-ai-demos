<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💰 Savings Growth Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Geist', sans-serif;
      overflow-x: hidden;
    }

    body {
      background: linear-gradient(135deg, #1a2f4a 0%, #0d1f2d 50%, #162338 100%);
      min-height: 100vh;
      padding: 40px 20px;
      color: #e0e8f0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* HERO */
    .hero {
      text-align: center;
      margin-bottom: 60px;
      animation: heroFade 0.8s ease-out;
    }

    @keyframes heroFade {
      from {
        opacity: 0;
        transform: translateY(-20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .hero h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(42px, 8vw, 72px);
      font-weight: 700;
      background: linear-gradient(135deg, #4dd9ff 0%, #8b5cf6 50%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .hero p {
      font-size: 16px;
      color: #a8b5c1;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    /* MAIN GRID */
    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .main {
        grid-template-columns: 1fr;
        gap: 30px;
      }
    }

    /* CONTROLS */
    .controls {
      background: rgba(13, 31, 45, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(77, 217, 255, 0.2);
      border-radius: 16px;
      padding: 32px;
      animation: controlsSlideUp 0.8s ease-out 0.1s both;
    }

    @keyframes controlsSlideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .control-group {
      margin-bottom: 28px;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: #a8b5c1;
    }

    .control-value {
      font-family: 'Courier New', monospace;
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(135deg, #4dd9ff 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* SLIDER */
    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, rgba(77, 217, 255, 0.3) 0%, rgba(139, 92, 246, 0.3) 100%);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4dd9ff 0%, #8b5cf6 100%);
      cursor: pointer;
      box-shadow: 0 0 12px rgba(77, 217, 255, 0.6), inset 0 0 4px rgba(0, 0, 0, 0.3);
      transition: all 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 20px rgba(77, 217, 255, 0.8), inset 0 0 4px rgba(0, 0, 0, 0.3);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4dd9ff 0%, #8b5cf6 100%);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 12px rgba(77, 217, 255, 0.6), inset 0 0 4px rgba(0, 0, 0, 0.3);
      transition: all 0.2s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      box-shadow: 0 0 20px rgba(77, 217, 255, 0.8), inset 0 0 4px rgba(0, 0, 0, 0.3);
    }

    /* CHART CONTAINER */
    .chart-container {
      background: rgba(13, 31, 45, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(77, 217, 255, 0.2);
      border-radius: 16px;
      padding: 32px;
      animation: chartFadeUp 0.8s ease-out 0.2s both;
    }

    @keyframes chartFadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .chart-title {
      font-size: 16px;
      font-weight: 600;
      color: #a8b5c1;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }

    /* SVG CHART */
    svg {
      width: 100%;
      height: auto;
      max-height: 400px;
    }

    /* STATS FOOTER */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 24px;
    }

    .stat-card {
      background: rgba(77, 217, 255, 0.08);
      border: 1px solid rgba(77, 217, 255, 0.2);
      border-radius: 12px;
      padding: 16px;
      animation: statsFadeIn 0.6s ease-out 0.5s both;
    }

    @keyframes statsFadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .stat-label {
      font-size: 11px;
      font-weight: 500;
      color: #7a8a98;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #4dd9ff 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-family: 'Courier New', monospace;
    }

    /* ACCESSIBILITY */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- HERO -->
    <div class="hero">
      <h1>💰 Savings Growth</h1>
      <p>Watch your money grow with compound interest over time</p>
    </div>

    <!-- MAIN GRID -->
    <div class="main">
      <!-- CONTROLS (LEFT) -->
      <div class="controls">
        <div class="control-group">
          <div class="control-label">
            <span>Starting Amount</span>
            <span class="control-value" id="startVal">$5,000</span>
          </div>
          <input type="range" id="startSlider" min="1000" max="100000" step="1000" value="5000">
        </div>

        <div class="control-group">
          <div class="control-label">
            <span>Monthly Contribution</span>
            <span class="control-value" id="monthlyVal">$200</span>
          </div>
          <input type="range" id="monthlySlider" min="10" max="5000" step="50" value="200">
        </div>

        <div class="control-group">
          <div class="control-label">
            <span>Annual Return Rate</span>
            <span class="control-value" id="rateVal">7.0%</span>
          </div>
          <input type="range" id="rateSlider" min="0" max="20" step="0.5" value="7">
        </div>

        <div class="control-group">
          <div class="control-label">
            <span>Time Horizon</span>
            <span class="control-value" id="yearsVal">20 years</span>
          </div>
          <input type="range" id="yearsSlider" min="1" max="50" step="1" value="20">
        </div>
      </div>

      <!-- CHART (RIGHT) -->
      <div class="chart-container">
        <div class="chart-title">Projected Growth</div>
        <svg id="chart" viewBox="0 0 500 300">
          <!-- Grid lines will be drawn by JS -->
        </svg>
        
        <div class="stats">
          <div class="stat-card">
            <div class="stat-label">Final Balance</div>
            <div class="stat-value" id="finalBalance">$0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Interest Earned</div>
            <div class="stat-value" id="interestEarned">$0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Contributions</div>
            <div class="stat-value" id="totalContribs">$0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Growth Multiple</div>
            <div class="stat-value" id="multiple">1.0x</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== CORE MATH LOGIC (pure functions, headless-testable) =====
    function* calculateSavingsYear(startAmount, monthlyContrib, annualRatePercent, maxYears) {
      let balance = startAmount;
      const monthlyRate = annualRatePercent / 100 / 12;
      for (let year = 0; year <= maxYears; year++) {
        yield balance;
        for (let month = 0; month < 12; month++) {
          balance = balance * (1 + monthlyRate) + monthlyContrib;
        }
      }
    }

    function formatCurrency(val) {
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      }).format(val);
    }

    // ===== DOM UPDATES =====
    const startSlider = document.getElementById('startSlider');
    const monthlySlider = document.getElementById('monthlySlider');
    const rateSlider = document.getElementById('rateSlider');
    const yearsSlider = document.getElementById('yearsSlider');

    const startVal = document.getElementById('startVal');
    const monthlyVal = document.getElementById('monthlyVal');
    const rateVal = document.getElementById('rateVal');
    const yearsVal = document.getElementById('yearsVal');

    const chartSvg = document.getElementById('chart');
    const finalBalance = document.getElementById('finalBalance');
    const interestEarned = document.getElementById('interestEarned');
    const totalContribs = document.getElementById('totalContribs');
    const multiple = document.getElementById('multiple');

    function updateChart() {
      const start = parseInt(startSlider.value);
      const monthly = parseInt(monthlySlider.value);
      const rate = parseFloat(rateSlider.value);
      const years = parseInt(yearsSlider.value);

      // Update label values
      startVal.textContent = formatCurrency(start);
      monthlyVal.textContent = formatCurrency(monthly);
      rateVal.textContent = rate.toFixed(1) + '%';
      yearsVal.textContent = years + ' year' + (years === 1 ? '' : 's');

      // Calculate trajectory
      const data = Array.from(calculateSavingsYear(start, monthly, rate, years));
      
      // Chart dimensions (SVG viewBox is 500x300)
      const width = 500, height = 300;
      const padding = 40;
      const plotWidth = width - 2 * padding;
      const plotHeight = height - 2 * padding;
      
      const maxBalance = Math.max(...data, start);
      const minBalance = start;
      
      // Generate path points
      let pathData = '';
      let pathPoints = [];
      for (let i = 0; i < data.length; i++) {
        const x = padding + (i / (data.length - 1 || 1)) * plotWidth;
        const y = height - padding - ((data[i] - minBalance) / (maxBalance - minBalance || 1)) * plotHeight;
        pathPoints.push({ x, y });
        pathData += (i === 0 ? 'M' : 'L') + x + ' ' + y;
      }

      // Clear SVG
      chartSvg.innerHTML = '';

      // Draw grid lines
      const gridGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      
      for (let i = 0; i <= 5; i++) {
        const y = padding + (i / 5) * plotHeight;
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', padding);
        line.setAttribute('y1', y);
        line.setAttribute('x2', width - padding);
        line.setAttribute('y2', y);
        line.setAttribute('stroke', 'rgba(77, 217, 255, 0.1)');
        line.setAttribute('stroke-width', '1');
        gridGroup.appendChild(line);
      }
      chartSvg.appendChild(gridGroup);

      // Draw curve
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', pathData);
      path.setAttribute('stroke', 'url(#gradCurve)');
      path.setAttribute('stroke-width', '3');
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke-linecap', 'round');
      path.setAttribute('stroke-linejoin', 'round');
      chartSvg.appendChild(path);

      // Add gradient def
      const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
      const grad = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
      grad.setAttribute('id', 'gradCurve');
      grad.setAttribute('x1', '0%');
      grad.setAttribute('y1', '0%');
      grad.setAttribute('x2', '100%');
      grad.setAttribute('y2', '100%');
      
      const stop1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
      stop1.setAttribute('offset', '0%');
      stop1.setAttribute('stop-color', '#4dd9ff');
      grad.appendChild(stop1);
      
      const stop2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
      stop2.setAttribute('offset', '100%');
      stop2.setAttribute('stop-color', '#ec4899');
      grad.appendChild(stop2);
      
      defs.appendChild(grad);
      chartSvg.appendChild(defs);

      // Fill area under curve
      let fillPath = pathData + ' L' + (width - padding) + ' ' + (height - padding) + ' L' + padding + ' ' + (height - padding) + ' Z';
      const area = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      area.setAttribute('d', fillPath);
      area.setAttribute('fill', 'url(#gradFill)');
      area.setAttribute('opacity', '0.2');
      chartSvg.insertBefore(area, chartSvg.firstChild.nextSibling);

      // Add gradient for area
      const gradFill = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
      gradFill.setAttribute('id', 'gradFill');
      gradFill.setAttribute('x1', '0%');
      gradFill.setAttribute('y1', '0%');
      gradFill.setAttribute('x2', '0%');
      gradFill.setAttribute('y2', '100%');
      
      const fill1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
      fill1.setAttribute('offset', '0%');
      fill1.setAttribute('stop-color', '#4dd9ff');
      gradFill.appendChild(fill1);
      
      const fill2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
      fill2.setAttribute('offset', '100%');
      fill2.setAttribute('stop-color', '#4dd9ff');
      fill2.setAttribute('stop-opacity', '0');
      gradFill.appendChild(fill2);
      
      defs.appendChild(gradFill);

      // Draw points
      for (let pt of pathPoints) {
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', pt.x);
        circle.setAttribute('cy', pt.y);
        circle.setAttribute('r', '3');
        circle.setAttribute('fill', '#4dd9ff');
        circle.setAttribute('opacity', '0.6');
        chartSvg.appendChild(circle);
      }

      // Update stats
      const finalVal = data[data.length - 1];
      const totalContributed = start + (monthly * 12 * years);
      const interest = finalVal - totalContributed;
      const mult = totalContributed > 0 ? (finalVal / totalContributed) : 1;

      finalBalance.textContent = formatCurrency(finalVal);
      interestEarned.textContent = formatCurrency(Math.max(0, interest));
      totalContribs.textContent = formatCurrency(totalContributed);
      multiple.textContent = mult.toFixed(2) + 'x';
    }

    // Event listeners
    startSlider.addEventListener('input', updateChart);
    monthlySlider.addEventListener('input', updateChart);
    rateSlider.addEventListener('input', updateChart);
    yearsSlider.addEventListener('input', updateChart);

    // Initial render
    updateChart();
  </script>
</body>
</html>
