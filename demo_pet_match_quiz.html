<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Match Quiz — Find Your Perfect Pet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #ffefd5 0%, #fcf0e4 50%, #ffe8d6 100%);
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }
    
    .container {
      width: 100%;
      max-width: 600px;
    }
    
    .hero {
      text-align: center;
      margin-bottom: 2rem;
      animation: heroFadeIn 0.8s ease-out;
    }
    
    .hero h1 {
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(2.5rem, 8vw, 3.5rem);
      font-weight: 700;
      background: linear-gradient(135deg, #ff9a56, #ffb366, #ff8a4d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      letter-spacing: -1px;
    }
    
    .hero .emoji {
      display: inline-block;
      font-size: 4rem;
      animation: bounce 2s ease-in-out infinite;
      margin-bottom: 0.5rem;
    }
    
    .hero p {
      font-size: 1.1rem;
      color: #777;
      line-height: 1.5;
    }
    
    .form-card {
      background: white;
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(10px);
      margin-bottom: 1.5rem;
      animation: cardSlideUp 0.6s ease-out;
    }
    
    .progress-bar {
      height: 6px;
      background: #f0f0f0;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff9a56, #ffb366);
      width: 0%;
      border-radius: 10px;
      transition: width 0.4s ease;
    }
    
    .question {
      margin-bottom: 1.5rem;
      display: none;
    }
    
    .question.active {
      display: block;
      animation: questionFadeIn 0.4s ease-out;
    }
    
    .question h3 {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.3rem;
      color: #333;
      margin-bottom: 1rem;
      font-weight: 600;
    }
    
    .options {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    
    .option {
      display: flex;
      align-items: center;
      padding: 1rem;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .option:hover {
      border-color: #ff9a56;
      background: #fff9f5;
    }
    
    .option input[type="radio"] {
      margin-right: 1rem;
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #ff9a56;
    }
    
    .option input[type="radio"]:checked + label {
      color: #ff9a56;
      font-weight: 600;
    }
    
    .option label {
      cursor: pointer;
      flex: 1;
      transition: color 0.2s ease;
    }
    
    .option.selected {
      border-color: #ff9a56;
      background: #fff9f5;
    }
    
    .controls {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
      justify-content: space-between;
    }
    
    button {
      font-family: 'Fredoka', sans-serif;
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .btn-prev {
      background: #f0f0f0;
      color: #333;
      flex: 1;
    }
    
    .btn-prev:hover:not(:disabled) {
      background: #e0e0e0;
      transform: translateY(-2px);
    }
    
    .btn-prev:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .btn-next {
      background: linear-gradient(135deg, #ff9a56, #ffb366);
      color: white;
      flex: 2;
    }
    
    .btn-next:hover:not(:disabled) {
      box-shadow: 0 10px 25px rgba(255, 154, 86, 0.3);
      transform: translateY(-2px);
    }
    
    .btn-next:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .result-screen {
      display: none;
      text-align: center;
      animation: resultFadeIn 0.6s ease-out;
    }
    
    .result-screen.active {
      display: block;
    }
    
    .result-emoji {
      font-size: 5rem;
      margin-bottom: 1rem;
      animation: emojiPop 0.5s cubic-bezier(0.36, 0, 0.66, 1);
    }
    
    .result-name {
      font-family: 'Fredoka', sans-serif;
      font-size: 2.2rem;
      color: #333;
      margin-bottom: 0.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ff9a56, #ffb366);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .result-badge {
      display: inline-block;
      background: linear-gradient(135deg, #ff9a56, #ffb366);
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 20px;
      font-weight: 600;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }
    
    .result-card {
      background: white;
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      text-align: left;
      margin-top: 1rem;
    }
    
    .result-card h4 {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.2rem;
      color: #333;
      margin-bottom: 1rem;
      text-align: center;
    }
    
    .fact-row {
      display: flex;
      justify-content: space-between;
      padding: 0.8rem 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.95rem;
    }
    
    .fact-row:last-child {
      border-bottom: none;
    }
    
    .fact-label {
      font-weight: 600;
      color: #555;
    }
    
    .fact-value {
      color: #ff9a56;
      font-weight: 600;
    }
    
    @keyframes heroFadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes cardSlideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes questionFadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes resultFadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    
    @keyframes emojiPop {
      0% {
        transform: scale(0);
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
      }
    }
    
    @media (max-width: 600px) {
      .form-card {
        padding: 1.5rem;
      }
      
      .hero h1 {
        font-size: 2rem;
      }
      
      .option {
        padding: 0.8rem;
      }
    }
    
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="emoji">🐾</div>
      <h1>Pet Match Quiz</h1>
      <p>Find your perfect pet companion in just 10 questions!</p>
    </div>
    
    <div class="form-card" id="formCard">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      
      <div id="questionsContainer"></div>
      
      <div class="controls">
        <button class="btn-prev" id="btnPrev" disabled>Back</button>
        <button class="btn-next" id="btnNext" disabled>Next</button>
      </div>
    </div>
    
    <div class="result-screen" id="resultScreen">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="result-name" id="resultName"></div>
      <div class="result-badge">Perfect Match! 🎉</div>
      <div class="result-card">
        <h4>Why This Pet?</h4>
        <div id="resultFacts"></div>
      </div>
    </div>
  </div>
  
  <script>
    // ========== PET DATA & SCORING LOGIC ==========
    const PETS = [
      {
        id: 'golden_retriever',
        name: 'Golden Retriever',
        emoji: '🐕',
        traits: { energy: 5, apartmentFriendly: 2, grooming: 2, family: 5, sociable: 5, noiseLevel: 3 },
        facts: {
          'Energy Level': 'High',
          'Living Space': 'Needs room (house)',
          'Grooming': 'Daily brushing',
          'Lifespan': '10–15 years',
          'Best for': 'Families & active folks'
        }
      },
      {
        id: 'labrador',
        name: 'Labrador Retriever',
        emoji: '🐕',
        traits: { energy: 5, apartmentFriendly: 2, grooming: 2, family: 5, sociable: 5, noiseLevel: 3 },
        facts: {
          'Energy Level': 'High',
          'Living Space': 'Needs room',
          'Grooming': 'Regular brushing',
          'Lifespan': '10–12 years',
          'Best for': 'Active families'
        }
      },
      {
        id: 'chihuahua',
        name: 'Chihuahua',
        emoji: '🐕',
        traits: { energy: 2, apartmentFriendly: 5, grooming: 3, family: 2, sociable: 2, noiseLevel: 4 },
        facts: {
          'Energy Level': 'Low–Medium',
          'Living Space': 'Perfect for apartments',
          'Grooming': 'Light maintenance',
          'Lifespan': '14–18 years',
          'Best for': 'Single owners, elders'
        }
      },
      {
        id: 'german_shepherd',
        name: 'German Shepherd',
        emoji: '🐕',
        traits: { energy: 5, apartmentFriendly: 1, grooming: 3, family: 4, sociable: 3, noiseLevel: 5 },
        facts: {
          'Energy Level': 'Very high',
          'Living Space': 'Needs big yard',
          'Grooming': 'Frequent shedding',
          'Lifespan': '9–13 years',
          'Best for': 'Active, experienced owners'
        }
      },
      {
        id: 'french_bulldog',
        name: 'French Bulldog',
        emoji: '🐕',
        traits: { energy: 2, apartmentFriendly: 5, grooming: 2, family: 4, sociable: 4, noiseLevel: 2 },
        facts: {
          'Energy Level': 'Low–Medium',
          'Living Space': 'Apartment-friendly',
          'Grooming': 'Minimal',
          'Lifespan': '10–12 years',
          'Best for': 'Urban dwellers'
        }
      },
      {
        id: 'tabby_cat',
        name: 'Tabby Cat',
        emoji: '🐱',
        traits: { energy: 2, apartmentFriendly: 5, grooming: 3, family: 3, sociable: 2, noiseLevel: 1 },
        facts: {
          'Energy Level': 'Medium',
          'Living Space': 'Perfect for apartments',
          'Grooming': 'Weekly brushing',
          'Lifespan': '12–18 years',
          'Best for': 'Quiet households'
        }
      },
      {
        id: 'siamese_cat',
        name: 'Siamese Cat',
        emoji: '🐱',
        traits: { energy: 3, apartmentFriendly: 5, grooming: 2, family: 3, sociable: 4, noiseLevel: 4 },
        facts: {
          'Energy Level': 'Medium–High',
          'Living Space': 'Apartment-friendly',
          'Grooming': 'Minimal shedding',
          'Lifespan': '12–20 years',
          'Best for': 'People seeking attention'
        }
      },
      {
        id: 'rabbit',
        name: 'Rabbit',
        emoji: '🐰',
        traits: { energy: 2, apartmentFriendly: 5, grooming: 2, family: 2, sociable: 1, noiseLevel: 1 },
        facts: {
          'Energy Level': 'Low–Medium',
          'Living Space': 'Great for apartments',
          'Grooming': 'Light maintenance',
          'Lifespan': '8–12 years',
          'Best for': 'Quiet, patient owners'
        }
      },
      {
        id: 'hamster',
        name: 'Hamster',
        emoji: '🐹',
        traits: { energy: 3, apartmentFriendly: 5, grooming: 1, family: 1, sociable: 1, noiseLevel: 2 },
        facts: {
          'Energy Level': 'Medium',
          'Living Space': 'Cage-based',
          'Grooming': 'Self-cleaning',
          'Lifespan': '2–4 years',
          'Best for': 'Kids learning pet care'
        }
      },
      {
        id: 'cockatiel',
        name: 'Cockatiel',
        emoji: '🦜',
        traits: { energy: 4, apartmentFriendly: 3, grooming: 2, family: 2, sociable: 5, noiseLevel: 4 },
        facts: {
          'Energy Level': 'Medium–High',
          'Living Space': 'Cage + space to fly',
          'Grooming': 'Light maintenance',
          'Lifespan': '15–20 years',
          'Best for': 'Social, interactive owners'
        }
      },
      {
        id: 'beagle',
        name: 'Beagle',
        emoji: '🐕',
        traits: { energy: 4, apartmentFriendly: 3, grooming: 2, family: 4, sociable: 4, noiseLevel: 4 },
        facts: {
          'Energy Level': 'High',
          'Living Space': 'Medium–large space',
          'Grooming': 'Regular brushing',
          'Lifespan': '12–15 years',
          'Best for': 'Active families'
        }
      }
    ];
    
    const QUESTIONS = [
      {
        text: 'Describe your typical weekend:',
        options: [
          { text: 'Outdoor adventures, hiking, super active!', scores: { energy: 2, apartmentFriendly: -1 } },
          { text: 'Mix of indoors and outdoors', scores: { energy: 1 } },
          { text: 'Couch time, Netflix, relaxing', scores: { energy: -2, apartmentFriendly: 1 } }
        ]
      },
      {
        text: 'What\'s your living situation?',
        options: [
          { text: 'House with a big yard', scores: { apartmentFriendly: -2, family: 1 } },
          { text: 'House without yard / medium space', scores: { apartmentFriendly: 0 } },
          { text: 'Apartment / small space', scores: { apartmentFriendly: 2 } }
        ]
      },
      {
        text: 'How much grooming commitment are you willing to do?',
        options: [
          { text: 'Daily brushing—bring it on!', scores: { grooming: 2 } },
          { text: 'A couple times a week is fine', scores: { grooming: 1 } },
          { text: 'Minimal—I prefer low maintenance', scores: { grooming: -2 } }
        ]
      },
      {
        text: 'Do you have kids or plan to?',
        options: [
          { text: 'Yes, and family-friendly is key', scores: { family: 2 } },
          { text: 'Maybe someday', scores: { family: 1 } },
          { text: 'No, prefer a pet that\'s just for me', scores: { family: -2, sociable: 1 } }
        ]
      },
      {
        text: 'How much noise tolerance do you have?',
        options: [
          { text: 'Love a noisy, expressive pet', scores: { noiseLevel: 2 } },
          { text: 'Some barking is okay', scores: { noiseLevel: 0 } },
          { text: 'Quiet is essential', scores: { noiseLevel: -2 } }
        ]
      },
      {
        text: 'How often are you home?',
        options: [
          { text: 'Most of the time', scores: { sociable: 1, energy: 0 } },
          { text: 'About half the time', scores: {} },
          { text: 'I travel a lot', scores: { sociable: -2, apartmentFriendly: 1 } }
        ]
      },
      {
        text: 'Do you want a social, interactive pet?',
        options: [
          { text: 'Absolutely—constant companion!', scores: { sociable: 2, family: 1 } },
          { text: 'Moderately social is fine', scores: { sociable: 0 } },
          { text: 'Independent, low-fuss', scores: { sociable: -2 } }
        ]
      },
      {
        text: 'What\'s your budget for vet care?',
        options: [
          { text: 'Willing to spend whatever needed', scores: { family: 1 } },
          { text: 'Moderate budget', scores: {} },
          { text: 'Budget-conscious', scores: { apartmentFriendly: 1 } }
        ]
      },
      {
        text: 'How do you feel about shedding?',
        options: [
          { text: 'Hair everywhere—no problem!', scores: { grooming: -1 } },
          { text: 'Some shedding is manageable', scores: {} },
          { text: 'Allergic or strongly prefer minimal shed', scores: { grooming: 2, apartmentFriendly: 1 } }
        ]
      },
      {
        text: 'What draws you most to a pet?',
        options: [
          { text: 'Their energy and playfulness', scores: { energy: 2, sociable: 1 } },
          { text: 'Their calm, steady presence', scores: { energy: -2 } },
          { text: 'Their unique personality', scores: { sociable: 1, family: 0 } }
        ]
      }
    ];
    
    // Pure scoring logic — testable without DOM
    function computeScores(answers) {
      const traitTotals = { energy: 0, apartmentFriendly: 0, grooming: 0, family: 0, sociable: 0, noiseLevel: 0 };
      for (const ans of answers) {
        for (const trait in ans.scores) {
          traitTotals[trait] += ans.scores[trait];
        }
      }
      const userVector = Object.values(traitTotals);
      let bestMatch = null;
      let bestScore = -Infinity;
      for (const pet of PETS) {
        const petVector = Object.values(pet.traits);
        let dotProduct = 0;
        for (let i = 0; i < userVector.length; i++) {
          dotProduct += userVector[i] * petVector[i];
        }
        if (dotProduct > bestScore) {
          bestScore = dotProduct;
          bestMatch = pet;
        }
      }
      return bestMatch;
    }
    
    // ========== UI LOGIC ==========
    let currentQuestion = 0;
    const answers = [];
    
    const questionsContainer = document.getElementById('questionsContainer');
    const progressFill = document.getElementById('progressFill');
    const btnPrev = document.getElementById('btnPrev');
    const btnNext = document.getElementById('btnNext');
    const formCard = document.getElementById('formCard');
    const resultScreen = document.getElementById('resultScreen');
    
    // Build question DOM
    QUESTIONS.forEach((q, idx) => {
      const div = document.createElement('div');
      div.className = 'question';
      div.id = `question-${idx}`;
      const h3 = document.createElement('h3');
      h3.textContent = q.text;
      div.appendChild(h3);
      const optionsDiv = document.createElement('div');
      optionsDiv.className = 'options';
      q.options.forEach((opt, optIdx) => {
        const label = document.createElement('label');
        label.className = 'option';
        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = `question-${idx}`;
        radio.value = optIdx;
        radio.addEventListener('change', () => selectOption(idx, opt));
        const span = document.createElement('span');
        span.style.marginLeft = '0.5rem';
        span.textContent = opt.text;
        label.appendChild(radio);
        label.appendChild(span);
        optionsDiv.appendChild(label);
      });
      div.appendChild(optionsDiv);
      questionsContainer.appendChild(div);
    });
    
    function selectOption(qIdx, opt) {
      answers[qIdx] = opt;
      updateProgress();
      updateButtons();
    }
    
    function updateProgress() {
      const pct = ((currentQuestion + 1) / QUESTIONS.length) * 100;
      progressFill.style.width = pct + '%';
    }
    
    function updateButtons() {
      btnPrev.disabled = currentQuestion === 0;
      btnNext.disabled = !answers[currentQuestion];
    }
    
    function showQuestion(idx) {
      document.querySelectorAll('.question').forEach(q => q.classList.remove('active'));
      document.getElementById(`question-${idx}`).classList.add('active');
      currentQuestion = idx;
      updateProgress();
      updateButtons();
    }
    
    function showResult() {
      const bestMatch = computeScores(answers);
      const resultEmoji = document.getElementById('resultEmoji');
      const resultName = document.getElementById('resultName');
      const resultFacts = document.getElementById('resultFacts');
      
      resultEmoji.textContent = bestMatch.emoji;
      resultName.textContent = bestMatch.name;
      
      let factsHTML = '';
      for (const [label, value] of Object.entries(bestMatch.facts)) {
        factsHTML += `
          <div class="fact-row">
            <span class="fact-label">${label}</span>
            <span class="fact-value">${value}</span>
          </div>
        `;
      }
      resultFacts.innerHTML = factsHTML;
      
      formCard.style.display = 'none';
      resultScreen.classList.add('active');
    }
    
    btnNext.addEventListener('click', () => {
      if (currentQuestion < QUESTIONS.length - 1) {
        showQuestion(currentQuestion + 1);
      } else {
        showResult();
      }
    });
    
    btnPrev.addEventListener('click', () => {
      if (currentQuestion > 0) {
        showQuestion(currentQuestion - 1);
      }
    });
    
    // Init
    showQuestion(0);
  </script>
</body>
</html>
