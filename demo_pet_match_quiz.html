<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Match Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #ffefd5 0%, #fcf0e4 50%, #ffe8d6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      backdrop-filter: blur(10px);
      overflow: hidden;
      padding: 60px 40px;
    }

    .hero {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeInUp 0.8s cubic-bezier(.16,1,.3,1);
    }

    .hero-emoji {
      font-size: 80px;
      margin-bottom: 20px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    h1 {
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 700;
      background: linear-gradient(135deg, #ff6b9d 0%, #ffa500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 16px;
      color: #666;
      margin-bottom: 0;
    }

    .form-section {
      animation: slideUp 0.8s cubic-bezier(.16,1,.3,1) 0.2s both;
    }

    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .progress-bar {
      height: 4px;
      background: #f0f0f0;
      border-radius: 2px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff6b9d 0%, #ffa500 100%);
      transition: width 0.5s cubic-bezier(.16,1,.3,1);
    }

    .question {
      margin-bottom: 30px;
    }

    .question-label {
      font-family: 'Fredoka', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 20px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option {
      position: relative;
    }

    .option input {
      display: none;
    }

    .option label {
      display: block;
      padding: 16px 18px;
      background: #f8f8f8;
      border: 2px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      color: #555;
      transition: all 0.3s cubic-bezier(.16,1,.3,1);
    }

    .option input:checked + label {
      background: #ffe0ed;
      border-color: #ff6b9d;
      color: #333;
      font-weight: 600;
    }

    .option label:hover {
      background: #f0f0f0;
      border-color: #ffb3d9;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-top: 30px;
      justify-content: flex-end;
    }

    button {
      padding: 12px 24px;
      font-family: 'Fredoka', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(.16,1,.3,1);
    }

    .btn-primary {
      background: linear-gradient(135deg, #ff6b9d 0%, #ffa500 100%);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255, 107, 157, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #666;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .result-screen {
      display: none;
      text-align: center;
      animation: fadeIn 0.6s cubic-bezier(.16,1,.3,1);
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .result-emoji {
      font-size: 100px;
      margin-bottom: 20px;
      animation: scaleIn 0.6s cubic-bezier(.16,1,.3,1);
    }

    @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

    .result-name {
      font-family: 'Fredoka', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: #333;
      margin-bottom: 12px;
    }

    .result-badge {
      display: inline-block;
      padding: 10px 20px;
      background: linear-gradient(135deg, #ff6b9d 0%, #ffa500 100%);
      color: white;
      border-radius: 20px;
      font-weight: 600;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .fact-card {
      background: #f8f8f8;
      border-radius: 16px;
      padding: 24px;
      text-align: left;
      margin-bottom: 20px;
    }

    .fact-title {
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      font-size: 16px;
      color: #333;
      margin-bottom: 16px;
    }

    .fact-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #e8e8e8;
      font-size: 14px;
    }

    .fact-row:last-child {
      border-bottom: none;
    }

    .fact-label {
      color: #888;
      font-weight: 600;
    }

    .fact-value {
      color: #333;
      font-weight: 500;
    }

    .reset-btn {
      background: linear-gradient(135deg, #ff6b9d 0%, #ffa500 100%);
      color: white;
      padding: 14px 32px;
    }

    .reset-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255, 107, 157, 0.3);
    }

    @media (max-width: 480px) {
      .container {
        padding: 40px 24px;
      }
      h1 { font-size: 28px; }
      .option label {
        padding: 14px 14px;
        font-size: 14px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="hero-emoji">🐾</div>
      <h1>Pet Match Quiz</h1>
      <p class="tagline">Find your perfect pet companion in just 10 questions!</p>
    </div>

    <div id="formSection" class="form-section">
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>

      <div class="question">
        <div class="question-label" id="questionLabel"></div>
        <div id="optionsContainer" class="options"></div>
      </div>

      <div class="controls">
        <button id="backBtn" class="btn-secondary" onclick="previousQuestion()">← Back</button>
        <button id="nextBtn" class="btn-primary" disabled onclick="nextQuestion()">Next →</button>
      </div>
    </div>

    <div id="resultScreen" class="result-screen">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="result-name" id="resultName"></div>
      <div class="result-badge">Perfect Match! 🎉</div>
      <div class="fact-card">
        <div class="fact-title">Why This Pet?</div>
        <div id="factContent"></div>
      </div>
      <button class="reset-btn" onclick="resetQuiz()">Try Again</button>
    </div>
  </div>

  <script>
    // ========== PURE LOGIC (headless-testable) ==========
    const PETS = {
      germanShepherd: {
        name: 'German Shepherd',
        emoji: '🐕',
        traits: { activity: 9, space: 7, maintenance: 6, family: 8, social: 8, noise: 6 },
        facts: { energy: 'Very High', space: 'Needs Yard', groom: 'Daily Brushing', life: '10–12 years', cost: '$$$', best: 'Active Families, Security' }
      },
      goldenRetriever: {
        name: 'Golden Retriever',
        emoji: '🐕',
        traits: { activity: 8, space: 7, maintenance: 7, family: 10, social: 10, noise: 5 },
        facts: { energy: 'High', space: 'Needs Room', groom: 'Frequent Brushing', life: '10–12 years', cost: '$$$', best: 'Families & Outdoor Lovers' }
      },
      chihuahua: {
        name: 'Chihuahua',
        emoji: '🐕',
        traits: { activity: 5, space: 10, maintenance: 4, family: 5, social: 6, noise: 7 },
        facts: { energy: 'Medium', space: 'Apartment-Friendly', groom: 'Minimal', life: '12–20 years', cost: '$', best: 'Individuals, Apartment Dwellers' }
      },
      tabby: {
        name: 'Tabby Cat',
        emoji: '🐱',
        traits: { activity: 6, space: 9, maintenance: 3, family: 6, social: 5, noise: 3 },
        facts: { energy: 'Medium', space: 'Apartment OK', groom: 'Occasional', life: '12–18 years', cost: '$', best: 'Balanced Households' }
      },
      siamese: {
        name: 'Siamese Cat',
        emoji: '🐱',
        traits: { activity: 7, space: 8, maintenance: 4, family: 6, social: 9, noise: 8 },
        facts: { energy: 'High', space: 'Indoor OK', groom: 'Minimal', life: '8–15 years', cost: '$$', best: 'Social, Interactive Owners' }
      },
      cockatiel: {
        name: 'Cockatiel',
        emoji: '🦜',
        traits: { activity: 6, space: 8, maintenance: 5, family: 5, social: 8, noise: 9 },
        facts: { energy: 'Medium', space: 'Cage+Room', groom: 'Regular', life: '15–20 years', cost: '$$', best: 'Patient, Social People' }
      },
      rabbit: {
        name: 'Rabbit',
        emoji: '🐰',
        traits: { activity: 5, space: 8, maintenance: 6, family: 5, social: 4, noise: 2 },
        facts: { energy: 'Low-Medium', space: 'Enclosure', groom: 'Regular', life: '8–12 years', cost: '$$', best: 'Quiet Homes' }
      },
      hamster: {
        name: 'Hamster',
        emoji: '🐹',
        traits: { activity: 4, space: 10, maintenance: 3, family: 3, social: 2, noise: 6 },
        facts: { energy: 'Low', space: 'Small Cage', groom: 'Minimal', life: '2–4 years', cost: '$', best: 'Low-Commitment Keepers' }
      },
      labrador: {
        name: 'Labrador Retriever',
        emoji: '🐕',
        traits: { activity: 9, space: 8, maintenance: 6, family: 10, social: 9, noise: 5 },
        facts: { energy: 'Very High', space: 'Needs Space', groom: 'Regular', life: '10–12 years', cost: '$$$', best: 'Active Families' }
      },
      greyhound: {
        name: 'Greyhound',
        emoji: '🐕',
        traits: { activity: 8, space: 6, maintenance: 2, family: 7, social: 7, noise: 3 },
        facts: { energy: 'High (Sprints)', space: 'Medium', groom: 'Minimal', life: '10–13 years', cost: '$$', best: 'Active but Independent' }
      },
      pug: {
        name: 'Pug',
        emoji: '🐕',
        traits: { activity: 3, space: 10, maintenance: 5, family: 8, social: 7, noise: 4 },
        facts: { energy: 'Low', space: 'Perfect for Apartments', groom: 'Minimal', life: '12–15 years', cost: '$$', best: 'Families, Apartment Dwellers' }
      },
      bengal: {
        name: 'Bengal Cat',
        emoji: '🐱',
        traits: { activity: 9, space: 7, maintenance: 6, family: 5, social: 7, noise: 7 },
        facts: { energy: 'Very High', space: 'Needs Play', groom: 'Regular', life: '10–15 years', cost: '$$$', best: 'Active, Interactive Owners' }
      }
    };

    const QUESTIONS = [
      {
        q: 'Describe your typical weekend:',
        options: [
          { text: 'Outdoor adventures, hiking, active fun', delta: { activity: 2, space: 1, social: 1 } },
          { text: 'Mix of indoors and outdoors', delta: { activity: 1, space: 0, social: 0 } },
          { text: 'Couch time, Netflix, relaxing at home', delta: { activity: -2, space: 1, maintenance: 1 } }
        ]
      },
      {
        q: 'Your living situation is:',
        options: [
          { text: 'House with a yard', delta: { space: 2 } },
          { text: 'Small apartment or condo', delta: { space: 2, maintenance: 1 } },
          { text: 'Medium place, flexible layout', delta: { space: 0 } }
        ]
      },
      {
        q: 'How much time can you dedicate to pet care daily?',
        options: [
          { text: '1–2 hours', delta: { maintenance: 2, social: 1 } },
          { text: '30 minutes–1 hour', delta: { maintenance: 1, social: 0 } },
          { text: 'Less than 30 minutes', delta: { maintenance: -1, activity: -1 } }
        ]
      },
      {
        q: 'Noise tolerance in your home:',
        options: [
          { text: 'I love a noisy, lively home!', delta: { noise: 2, social: 1 } },
          { text: 'Some noise is fine', delta: { noise: 0 } },
          { text: 'Prefer quiet and calm', delta: { noise: -2, maintenance: 1 } }
        ]
      },
      {
        q: 'Your ideal pet personality:',
        options: [
          { text: 'Highly social, loves constant interaction', delta: { social: 3, activity: 1 } },
          { text: 'Independent but friendly', delta: { social: 1 } },
          { text: 'Calm, low-key, self-sufficient', delta: { social: -2, maintenance: -1 } }
        ]
      },
      {
        q: 'Allergies?',
        options: [
          { text: 'No allergies', delta: {} },
          { text: 'Mild dog/cat allergy (can manage with low-shed)', delta: { maintenance: 1 } },
          { text: 'Severe allergies (need non-furry pet)', delta: { maintenance: 2 } }
        ]
      },
      {
        q: 'Budget comfort level:',
        options: [
          { text: 'Happy to spend on premium care', delta: { maintenance: 1 } },
          { text: 'Moderate spending OK', delta: {} },
          { text: 'Need a budget-friendly option', delta: { maintenance: -1 } }
        ]
      },
      {
        q: 'Ideal activity level for your pet:',
        options: [
          { text: 'Constant playtime, needs lots of exercise', delta: { activity: 3 } },
          { text: 'Moderate activity, occasional play', delta: { activity: 0 } },
          { text: 'Low energy, mostly relaxing', delta: { activity: -3 } }
        ]
      },
      {
        q: 'Pet independence preference:',
        options: [
          { text: 'Wants a shadow that follows everywhere', delta: { social: 2 } },
          { text: 'Balanced (together sometimes, independent sometimes)', delta: { social: 0 } },
          { text: 'Prefers independent pet', delta: { social: -2, activity: -1 } }
        ]
      },
      {
        q: 'Long-term commitment:',
        options: [
          { text: 'Ready for 10–20+ year commitment', delta: { family: 2 } },
          { text: '5–10 years is good', delta: { family: 0 } },
          { text: 'Prefer shorter lifespans (2–5 years)', delta: { family: -1, maintenance: -1 } }
        ]
      }
    ];

    // ========== SCORING FUNCTION (headless-testable) ==========
    function calculateBestMatch(answers) {
      const scores = {};
      Object.keys(PETS).forEach(petKey => {
        const pet = PETS[petKey];
        let score = 0;
        Object.keys(pet.traits).forEach(trait => {
          const traitValue = answers[trait] || 0;
          const petValue = pet.traits[trait] || 0;
          score += Math.abs(traitValue - petValue) * -1; // closer match = higher score
        });
        scores[petKey] = score;
      });
      const best = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
      return best;
    }

    // ========== DOM STATE ==========
    let currentQuestion = 0;
    let answers = { activity: 0, space: 0, maintenance: 0, family: 0, social: 0, noise: 0 };

    function updateProgress() {
      const percent = ((currentQuestion + 1) / QUESTIONS.length) * 100;
      document.getElementById('progressFill').style.width = percent + '%';
    }

    function showQuestion() {
      const q = QUESTIONS[currentQuestion];
      document.getElementById('questionLabel').textContent = q.q;
      const container = document.getElementById('optionsContainer');
      container.innerHTML = '';
      q.options.forEach((opt, idx) => {
        const optId = `opt-${currentQuestion}-${idx}`;
        const div = document.createElement('div');
        div.className = 'option';
        div.innerHTML = `
          <input type="radio" id="${optId}" name="q${currentQuestion}">
          <label for="${optId}">${opt.text}</label>
        `;
        div.querySelector('input').addEventListener('change', () => {
          document.getElementById('nextBtn').disabled = false;
        });
        container.appendChild(div);
      });
      document.getElementById('backBtn').disabled = currentQuestion === 0;
      document.getElementById('nextBtn').disabled = true;
      updateProgress();
    }

    function nextQuestion() {
      const q = QUESTIONS[currentQuestion];
      const selectedIdx = Array.from(document.querySelectorAll(`input[name="q${currentQuestion}"]`)).findIndex(r => r.checked);
      if (selectedIdx >= 0) {
        const delta = q.options[selectedIdx].delta;
        Object.keys(delta).forEach(key => {
          answers[key] = (answers[key] || 0) + delta[key];
        });
      }
      if (currentQuestion < QUESTIONS.length - 1) {
        currentQuestion++;
        showQuestion();
      } else {
        showResult();
      }
    }

    function previousQuestion() {
      if (currentQuestion > 0) {
        currentQuestion--;
        showQuestion();
      }
    }

    function showResult() {
      const bestPetKey = calculateBestMatch(answers);
      const pet = PETS[bestPetKey];
      document.getElementById('formSection').style.display = 'none';
      document.getElementById('resultScreen').style.display = 'block';
      document.getElementById('resultEmoji').textContent = pet.emoji;
      document.getElementById('resultName').textContent = pet.name;
      let factHTML = '';
      Object.entries(pet.facts).forEach(([k, v]) => {
        const label = k.charAt(0).toUpperCase() + k.slice(1).replace(/([A-Z])/g, ' $1');
        factHTML += `<div class="fact-row"><div class="fact-label">${label}</div><div class="fact-value">${v}</div></div>`;
      });
      document.getElementById('factContent').innerHTML = factHTML;
    }

    function resetQuiz() {
      currentQuestion = 0;
      answers = { activity: 0, space: 0, maintenance: 0, family: 0, social: 0, noise: 0 };
      document.getElementById('formSection').style.display = 'block';
      document.getElementById('resultScreen').style.display = 'none';
      showQuestion();
    }

    // INIT
    showQuestion();
  </script>
</body>
</html>
