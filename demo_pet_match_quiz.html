<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 Pet Match Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #ffefd5 0%, #fcf0e4 50%, #ffe8d6 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
        }
        
        .hero {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInScale 0.8s cubic-bezier(0.16,1,0.3,1);
        }
        
        .hero-emoji {
            font-size: clamp(60px, 12vw, 100px);
            margin-bottom: 16px;
            display: inline-block;
            animation: bounce 0.8s ease-out;
        }
        
        h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: clamp(32px, 8vw, 52px);
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff9a56 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .tagline {
            font-size: 16px;
            color: #666;
            font-weight: 400;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            backdrop-filter: blur(10px);
            margin-bottom: 24px;
            animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.15s both;
        }
        
        .progress-bar {
            height: 4px;
            background: #ffe8d6;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 28px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b9d 0%, #ff9a56 100%);
            width: 0%;
            transition: width 0.4s ease;
        }
        
        .question-num {
            font-size: 13px;
            color: #999;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        
        .question-text {
            font-family: 'Fredoka', sans-serif;
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 24px;
            line-height: 1.4;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .radio-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
            border: 2px solid #f0f0f0;
        }
        
        .radio-label:hover {
            background: #fff5f1;
            border-color: #ffdfce;
        }
        
        .radio-label input[type="radio"] {
            margin-right: 12px;
            cursor: pointer;
            width: 20px;
            height: 20px;
            accent-color: #ff6b9d;
        }
        
        .radio-label input[type="radio"]:checked + .option-text {
            color: #ff6b9d;
            font-weight: 600;
        }
        
        .radio-label input[type="radio"]:checked {
            accent-color: #ff6b9d;
        }
        
        .option-text {
            flex: 1;
            color: #666;
            transition: color 0.3s ease;
            font-weight: 500;
        }
        
        .buttons {
            display: flex;
            gap: 12px;
            justify-content: space-between;
        }
        
        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Fredoka', sans-serif;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
            transform: translateY(-2px);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ff6b9d 0%, #ff9a56 100%);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(255,107,157,0.3);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result-screen {
            text-align: center;
            animation: fadeIn 0.6s ease;
            display: none;
        }
        
        .result-emoji {
            font-size: clamp(80px, 20vw, 140px);
            margin-bottom: 24px;
            display: inline-block;
            animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
        }
        
        .result-name {
            font-family: 'Fredoka', sans-serif;
            font-size: 36px;
            font-weight: 700;
            color: #ff6b9d;
            margin-bottom: 12px;
        }
        
        .result-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff9a56 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 32px;
        }
        
        .fact-card {
            background: #fff5f1;
            border-left: 4px solid #ff6b9d;
            padding: 24px;
            border-radius: 8px;
            text-align: left;
            margin-bottom: 24px;
        }
        
        .fact-title {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            color: #333;
            margin-bottom: 16px;
        }
        
        .fact-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #ffe8d6;
            font-size: 14px;
        }
        
        .fact-row:last-child {
            border-bottom: none;
        }
        
        .fact-label {
            color: #999;
            font-weight: 600;
        }
        
        .fact-value {
            color: #333;
            font-weight: 600;
        }
        
        .btn-restart {
            background: linear-gradient(135deg, #ff6b9d 0%, #ff9a56 100%);
            color: white;
            padding: 14px 32px;
            margin-top: 16px;
        }
        
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.7); }
            to { opacity: 1; transform: scale(1); }
        }
        
        @media (max-width: 480px) {
            .card {
                padding: 24px;
            }
            
            .result-name {
                font-size: 28px;
            }
            
            .buttons {
                flex-direction: column;
            }
        }
        
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <div class="hero-emoji">🐾</div>
            <h1>Pet Match Quiz</h1>
            <p class="tagline">Find your perfect pet companion in just 10 questions!</p>
        </div>
        
        <div class="card" id="formCard">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <div id="questionContainer">
                <div class="question-num" id="questionNum"></div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="options"></div>
            </div>
            
            <div class="buttons">
                <button class="btn-secondary" id="backBtn" onclick="previousQuestion()">← Back</button>
                <button class="btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>Next →</button>
            </div>
        </div>
        
        <div class="card result-screen" id="resultScreen">
            <div class="result-emoji" id="resultEmoji"></div>
            <div class="result-name" id="resultName"></div>
            <div class="result-badge">Perfect Match! 🎉</div>
            
            <div class="fact-card">
                <div class="fact-title">Why This Pet?</div>
                <div id="factRows"></div>
            </div>
            
            <button class="btn-restart" onclick="restartQuiz()">Take Quiz Again</button>
        </div>
    </div>
    
    <script>
        // === PETS DATABASE ===
        const PETS = [
            {
                id: 'golden_retriever',
                name: 'Golden Retriever',
                emoji: '🐕',
                traits: { active: 5, apartment: 1, lowMaint: 1, family: 5, social: 5, quiet: 2 }
            },
            {
                id: 'german_shepherd',
                name: 'German Shepherd',
                emoji: '🐕',
                traits: { active: 5, apartment: 2, lowMaint: 1, family: 4, social: 4, quiet: 2 }
            },
            {
                id: 'tabby_cat',
                name: 'Tabby Cat',
                emoji: '🐱',
                traits: { active: 3, apartment: 5, lowMaint: 3, family: 4, social: 3, quiet: 5 }
            },
            {
                id: 'siamese_cat',
                name: 'Siamese Cat',
                emoji: '😸',
                traits: { active: 4, apartment: 5, lowMaint: 3, family: 3, social: 5, quiet: 2 }
            },
            {
                id: 'cockatiel',
                name: 'Cockatiel',
                emoji: '🦜',
                traits: { active: 4, apartment: 4, lowMaint: 2, family: 3, social: 5, quiet: 1 }
            },
            {
                id: 'rabbit',
                name: 'Rabbit',
                emoji: '🐰',
                traits: { active: 3, apartment: 5, lowMaint: 2, family: 3, social: 2, quiet: 5 }
            },
            {
                id: 'chihuahua',
                name: 'Chihuahua',
                emoji: '🐕',
                traits: { active: 3, apartment: 5, lowMaint: 4, family: 2, social: 3, quiet: 1 }
            },
            {
                id: 'hamster',
                name: 'Hamster',
                emoji: '🐹',
                traits: { active: 2, apartment: 5, lowMaint: 4, family: 2, social: 1, quiet: 5 }
            },
            {
                id: 'labrador',
                name: 'Labrador',
                emoji: '🐕',
                traits: { active: 5, apartment: 2, lowMaint: 2, family: 5, social: 5, quiet: 2 }
            },
            {
                id: 'persian_cat',
                name: 'Persian Cat',
                emoji: '🐱',
                traits: { active: 1, apartment: 5, lowMaint: 1, family: 3, social: 2, quiet: 5 }
            },
            {
                id: 'husky',
                name: 'Husky',
                emoji: '🐕',
                traits: { active: 5, apartment: 1, lowMaint: 1, family: 4, social: 4, quiet: 1 }
            },
            {
                id: 'fish',
                name: 'Aquarium Fish',
                emoji: '🐠',
                traits: { active: 0, apartment: 5, lowMaint: 3, family: 2, social: 0, quiet: 5 }
            }
        ];

        // === QUESTIONS ===
        const QUESTIONS = [
            {
                text: 'Describe your typical weekend:',
                options: [
                    { text: 'Outdoor adventures, hiking, active fun', traits: { active: 3 } },
                    { text: 'Mix of indoors and outdoors', traits: { active: 1 } },
                    { text: 'Couch time, Netflix, relaxing', traits: { active: -2 } }
                ]
            },
            {
                text: "What's your living situation?",
                options: [
                    { text: 'House with a big yard', traits: { apartment: -3 } },
                    { text: 'House with a small yard', traits: { apartment: -1 } },
                    { text: 'Apartment or condo', traits: { apartment: 3 } }
                ]
            },
            {
                text: 'How much time do you spend at home daily?',
                options: [
                    { text: 'Most of the day (8+ hours)', traits: { family: 2, social: 2 } },
                    { text: 'Half the day (4-8 hours)', traits: { family: 0, social: 0 } },
                    { text: 'Less than 4 hours', traits: { lowMaint: 2 } }
                ]
            },
            {
                text: 'How comfortable are you with grooming and maintenance?',
                options: [
                    { text: 'Love it! Daily brushing is fine', traits: { lowMaint: -2 } },
                    { text: 'Weekly maintenance okay', traits: { lowMaint: 0 } },
                    { text: 'Minimal effort preferred', traits: { lowMaint: 3 } }
                ]
            },
            {
                text: 'Do you have kids or plan to?',
                options: [
                    { text: 'Yes, kids are important', traits: { family: 3 } },
                    { text: 'Maybe, not sure yet', traits: { family: 1 } },
                    { text: 'No, prefer no kids', traits: { family: -2 } }
                ]
            },
            {
                text: 'How social are you?',
                options: [
                    { text: 'Very social, love company', traits: { social: 3 } },
                    { text: 'Moderate, enjoy people', traits: { social: 1 } },
                    { text: 'Prefer quiet solitude', traits: { social: -2, quiet: 2 } }
                ]
            },
            {
                text: 'How do you feel about noise?',
                options: [
                    { text: 'Love noise! Music, activity', traits: { quiet: -3 } },
                    { text: 'Neutral, doesn\'t bother me', traits: { quiet: 0 } },
                    { text: 'Prefer quiet, silence is golden', traits: { quiet: 3 } }
                ]
            },
            {
                text: 'How much budget do you have for pet care?',
                options: [
                    { text: 'Premium care, no limits', traits: { family: 1 } },
                    { text: 'Moderate budget, comfortable', traits: { family: 0 } },
                    { text: 'Budget-conscious', traits: { lowMaint: 2 } }
                ]
            },
            {
                text: 'Do you travel frequently?',
                options: [
                    { text: 'Yes, often away from home', traits: { lowMaint: 2 } },
                    { text: 'Occasionally', traits: { lowMaint: 0 } },
                    { text: 'Rarely, mostly stay home', traits: { family: 2 } }
                ]
            },
            {
                text: 'What\'s most important to you in a pet?',
                options: [
                    { text: 'Companionship & bonding', traits: { social: 3, family: 2 } },
                    { text: 'Entertainment & fun', traits: { active: 2 } },
                    { text: 'Low maintenance & independence', traits: { lowMaint: 3 } }
                ]
            }
        ];

        let currentQuestion = 0;
        let answers = new Array(QUESTIONS.length).fill(null);
        let scores = { active: 0, apartment: 0, lowMaint: 0, family: 0, social: 0, quiet: 0 };

        // === INIT ===
        function init() {
            renderQuestion();
        }

        // === RENDER QUESTION ===
        function renderQuestion() {
            const q = QUESTIONS[currentQuestion];
            const progress = ((currentQuestion) / QUESTIONS.length) * 100;
            
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('questionNum').textContent = `Question ${currentQuestion + 1} of ${QUESTIONS.length}`;
            document.getElementById('questionText').textContent = q.text;
            
            const optionsHtml = q.options.map((opt, idx) => `
                <label class="radio-label">
                    <input type="radio" name="option" value="${idx}" ${answers[currentQuestion] === idx ? 'checked' : ''} onchange="selectOption(${idx})">
                    <span class="option-text">${opt.text}</span>
                </label>
            `).join('');
            
            document.getElementById('options').innerHTML = optionsHtml;
            document.getElementById('nextBtn').disabled = answers[currentQuestion] === null;
            document.getElementById('backBtn').disabled = currentQuestion === 0;
        }

        // === SELECT OPTION ===
        function selectOption(idx) {
            answers[currentQuestion] = idx;
            document.getElementById('nextBtn').disabled = false;
        }

        // === NEXT QUESTION ===
        function nextQuestion() {
            if (currentQuestion < QUESTIONS.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResult();
            }
        }

        // === PREVIOUS QUESTION ===
        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        // === CALCULATE SCORE ===
        function calculateScores() {
            scores = { active: 0, apartment: 0, lowMaint: 0, family: 0, social: 0, quiet: 0 };
            
            answers.forEach((answerIdx, qIdx) => {
                const option = QUESTIONS[qIdx].options[answerIdx];
                Object.keys(option.traits).forEach(trait => {
                    scores[trait] += option.traits[trait];
                });
            });
        }

        // === FIND BEST MATCH ===
        function findBestMatch() {
            let bestMatch = null;
            let bestScore = -Infinity;
            
            PETS.forEach(pet => {
                let dotProduct = 0;
                Object.keys(scores).forEach(trait => {
                    dotProduct += scores[trait] * (pet.traits[trait] || 0);
                });
                
                if (dotProduct > bestScore) {
                    bestScore = dotProduct;
                    bestMatch = pet;
                }
            });
            
            return bestMatch;
        }

        // === SHOW RESULT ===
        function showResult() {
            calculateScores();
            const bestPet = findBestMatch();
            
            document.getElementById('formCard').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            document.getElementById('resultEmoji').textContent = bestPet.emoji;
            document.getElementById('resultName').textContent = bestPet.name;
            
            const factTexts = [
                { label: 'Energy Level', value: bestPet.traits.active > 3 ? 'High' : bestPet.traits.active > 1 ? 'Medium' : 'Low' },
                { label: 'Living Space', value: bestPet.traits.apartment > 3 ? 'Flexible' : bestPet.traits.apartment > 1 ? 'Medium space' : 'Needs room' },
                { label: 'Grooming', value: bestPet.traits.lowMaint > 3 ? 'Minimal' : bestPet.traits.lowMaint > 1 ? 'Weekly' : 'Daily brushing' },
                { label: 'Lifespan', value: bestPet.id.includes('fish') ? '5-10 years' : bestPet.id.includes('hamster') ? '2-3 years' : bestPet.id.includes('rabbit') ? '8-12 years' : '10-15 years' },
                { label: 'Best for', value: bestPet.traits.family > 3 ? 'Families & active' : bestPet.traits.social > 3 ? 'Social & interactive' : 'Independent living' }
            ];
            
            document.getElementById('factRows').innerHTML = factTexts.map(fact => `
                <div class="fact-row">
                    <span class="fact-label">${fact.label}</span>
                    <span class="fact-value">${fact.value}</span>
                </div>
            `).join('');
        }

        // === RESTART ===
        function restartQuiz() {
            currentQuestion = 0;
            answers = new Array(QUESTIONS.length).fill(null);
            scores = { active: 0, apartment: 0, lowMaint: 0, family: 0, social: 0, quiet: 0 };
            document.getElementById('formCard').style.display = 'block';
            document.getElementById('resultScreen').style.display = 'none';
            renderQuestion();
        }

        init();
    </script>
</body>
</html>
