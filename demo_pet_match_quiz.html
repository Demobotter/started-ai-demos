<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐾 Pet Match Quiz — Find Your Perfect Pet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #ffefd5 0%, #fcf0e4 50%, #ffe8d6 100%);
      overflow-x: hidden;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* HERO */
    .hero {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .hero h1 {
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(2.5rem, 8vw, 3.5rem);
      font-weight: 700;
      background: linear-gradient(135deg, #ff6b9d 0%, #ffa66d 50%, #ffb366 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }
    .hero .emoji {
      font-size: 3rem;
      display: inline-block;
      margin-right: 0.5rem;
      animation: bounce 3s infinite;
    }
    .hero p {
      color: #666;
      font-size: 1.1rem;
      margin-top: 0.5rem;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* FORM */
    .form-container {
      background: white;
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(255, 107, 157, 0.1);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* PROGRESS BAR */
    .progress-section {
      margin-bottom: 2rem;
    }
    .progress-text {
      font-size: 0.9rem;
      color: #999;
      margin-bottom: 0.75rem;
      font-weight: 600;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #f0f0f0;
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff6b9d, #ffa66d);
      transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      border-radius: 100px;
    }

    /* QUESTION */
    .question-text {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }

    /* OPTIONS */
    .options {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .option {
      position: relative;
    }
    .option input[type="radio"] {
      display: none;
    }
    .option label {
      display: flex;
      align-items: center;
      padding: 1rem 1.25rem;
      background: #f9f9f9;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 1rem;
      color: #666;
    }
    .option label:hover {
      background: #fff5f5;
      border-color: #ff6b9d;
    }
    .option input[type="radio"]:checked + label {
      background: linear-gradient(135deg, #fff0f6, #fff5f0);
      border-color: #ff6b9d;
      color: #ff6b9d;
      font-weight: 600;
    }
    .option label::before {
      content: '';
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #ddd;
      margin-right: 1rem;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .option input[type="radio"]:checked + label::before {
      background: linear-gradient(135deg, #ff6b9d, #ffa66d);
      border-color: #ff6b9d;
    }

    /* BUTTONS */
    .button-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    button {
      padding: 0.85rem 1.75rem;
      border: none;
      border-radius: 12px;
      font-family: 'Fredoka', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #ff6b9d, #ffa66d);
      color: white;
      flex: 1;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(255, 107, 157, 0.3);
    }
    .btn-primary:active {
      transform: translateY(0);
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #666;
      flex: 1;
    }
    .btn-secondary:hover {
      background: #e8e8e8;
      color: #333;
    }
    .btn-secondary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* RESULT SCREEN */
    .result-screen {
      text-align: center;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .result-emoji {
      font-size: 4rem;
      display: inline-block;
      margin-bottom: 1rem;
      animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    @keyframes popIn {
      0% {
        transform: scale(0);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
    .result-name {
      font-family: 'Fredoka', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: #ff6b9d;
      margin-bottom: 0.75rem;
    }
    .result-badge {
      display: inline-block;
      background: linear-gradient(135deg, #ff6b9d, #ffa66d);
      color: white;
      padding: 0.5rem 1.25rem;
      border-radius: 100px;
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 2rem;
    }
    .result-card {
      background: linear-gradient(135deg, #fff9f0, #fffbf5);
      border: 2px solid #ffe8d6;
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      text-align: left;
    }
    .result-card h3 {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 1.25rem;
      text-align: center;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid #f0e8e0;
      font-size: 0.95rem;
    }
    .stat-row:last-child {
      border-bottom: none;
    }
    .stat-label {
      font-weight: 600;
      color: #ff6b9d;
    }
    .stat-value {
      color: #666;
    }
    .result-footer {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 2px solid #ffe8d6;
      font-size: 0.95rem;
      color: #999;
      font-style: italic;
    }
    .btn-restart {
      background: linear-gradient(135deg, #ff6b9d, #ffa66d);
      color: white;
      padding: 1rem 2rem;
      margin-top: 1.5rem;
    }
    .btn-restart:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(255, 107, 157, 0.3);
    }

    /* HIDDEN */
    .hidden {
      display: none !important;
    }

    /* MOBILE */
    @media (max-width: 640px) {
      .container {
        padding: 1.5rem;
      }
      .form-container {
        padding: 1.75rem;
      }
      .hero h1 {
        font-size: 2rem;
      }
      .result-emoji {
        font-size: 3rem;
      }
      .result-name {
        font-size: 1.8rem;
      }
    }

    /* PREFERS REDUCED MOTION */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- HERO -->
    <div class="hero">
      <div>
        <span class="emoji">🐾</span>
        <h1>Pet Match Quiz</h1>
      </div>
      <p>Find your perfect pet companion in just 5 questions!</p>
    </div>

    <!-- FORM -->
    <div class="form-container" id="formContainer">
      <div class="progress-section">
        <div class="progress-text" id="progressText">Question 1 of 5</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
        </div>
      </div>

      <div id="questionSection">
        <div class="question-text" id="questionText"></div>
        <div class="options" id="optionsContainer"></div>
      </div>

      <div class="button-group">
        <button class="btn-secondary" id="backBtn" onclick="previousQuestion()" disabled>← Back</button>
        <button class="btn-primary" id="nextBtn" onclick="nextQuestion()">Next →</button>
      </div>
    </div>

    <!-- RESULT -->
    <div class="form-container hidden" id="resultContainer">
      <div class="result-screen" id="resultScreen"></div>
      <button class="btn-restart" onclick="restartQuiz()">Take Quiz Again</button>
    </div>
  </div>

  <script>
    // PET DATA
    const pets = {
      "german_shepherd": {
        name: "German Shepherd",
        emoji: "🐕‍🦺",
        traits: { activity: 0.95, apartment: 0.1, maintenance: 0.6, family: 0.9, social: 0.9, noise: 0.8 },
        energy: "High",
        space: "Needs room",
        groom: "Weekly brushing",
        lifespan: "9–13 years",
        cost: "$$$",
        best: "Active families, work/service dogs"
      },
      "golden_retriever": {
        name: "Golden Retriever",
        emoji: "🐕",
        traits: { activity: 0.85, apartment: 0.2, maintenance: 0.8, family: 1.0, social: 1.0, noise: 0.8 },
        energy: "High",
        space: "Needs room",
        groom: "Daily brushing",
        lifespan: "10–12 years",
        cost: "$$$",
        best: "Families, social & outdoorsy"
      },
      "chihuahua": {
        name: "Chihuahua",
        emoji: "🐕‍🦺",
        traits: { activity: 0.5, apartment: 0.95, maintenance: 0.2, family: 0.5, social: 0.6, noise: 0.3 },
        energy: "Medium",
        space: "Apartment-friendly",
        groom: "Minimal",
        lifespan: "14–18 years",
        cost: "$",
        best: "Singles, seniors, small spaces"
      },
      "tabby_cat": {
        name: "Tabby Cat",
        emoji: "🐱",
        traits: { activity: 0.4, apartment: 1.0, maintenance: 0.3, family: 0.6, social: 0.5, noise: 0.2 },
        energy: "Low–Medium",
        space: "Apartment-perfect",
        groom: "Occasional",
        lifespan: "12–18 years",
        cost: "$$",
        best: "Everyone, independent"
      },
      "siamese_cat": {
        name: "Siamese Cat",
        emoji: "🐈",
        traits: { activity: 0.65, apartment: 0.95, maintenance: 0.5, family: 0.8, social: 0.95, noise: 0.5 },
        energy: "Medium",
        space: "Apartment-friendly",
        groom: "Weekly brushing",
        lifespan: "12–17 years",
        cost: "$$",
        best: "Talkative, social owners"
      },
      "cockatiel": {
        name: "Cockatiel",
        emoji: "🦜",
        traits: { activity: 0.6, apartment: 0.7, maintenance: 0.7, family: 0.7, social: 0.8, noise: 0.4 },
        energy: "Medium",
        space: "Cage space OK",
        groom: "Regular",
        lifespan: "15–20 years",
        cost: "$$",
        best: "Patient, committed owners"
      },
      "rabbit": {
        name: "Rabbit",
        emoji: "🐰",
        traits: { activity: 0.5, apartment: 0.9, maintenance: 0.6, family: 0.7, social: 0.5, noise: 0.7 },
        energy: "Medium",
        space: "Apartment-friendly",
        groom: "Daily",
        lifespan: "9–12 years",
        cost: "$$",
        best: "Gentle, patient homes"
      },
      "hamster": {
        name: "Hamster",
        emoji: "🐹",
        traits: { activity: 0.3, apartment: 1.0, maintenance: 0.2, family: 0.5, social: 0.2, noise: 0.95 },
        energy: "Low",
        space: "Cage-only",
        groom: "None",
        lifespan: "2–3 years",
        cost: "$",
        best: "First pet, small kids with supervision"
      }
    };

    // QUESTIONS
    const questions = [
      {
        text: "Describe your typical weekend:",
        answers: [
          { text: "Outdoor adventures, hiking, active fun", vectors: { activity: 1.0, apartment: 0.1, maintenance: 0.2, family: 0.6, social: 0.9, noise: 0.7 } },
          { text: "Mix of indoors and outdoors", vectors: { activity: 0.5, apartment: 0.6, maintenance: 0.5, family: 0.5, social: 0.6, noise: 0.5 } },
          { text: "Couch time, Netflix, quiet relaxation", vectors: { activity: 0.0, apartment: 1.0, maintenance: 0.8, family: 0.4, social: 0.2, noise: 0.1 } }
        ]
      },
      {
        text: "What's your living situation?",
        answers: [
          { text: "House with a yard", vectors: { activity: 0.5, apartment: 0.1, maintenance: 0.5, family: 0.8, social: 0.7, noise: 0.7 } },
          { text: "Apartment or condo", vectors: { activity: 0.2, apartment: 1.0, maintenance: 0.4, family: 0.4, social: 0.3, noise: 0.3 } },
          { text: "Other (farm, town house, etc.)", vectors: { activity: 0.6, apartment: 0.3, maintenance: 0.6, family: 0.6, social: 0.8, noise: 0.7 } }
        ]
      },
      {
        text: "How much grooming are you willing to do?",
        answers: [
          { text: "Love pampering, daily grooming is fine", vectors: { activity: 0.2, apartment: 0.5, maintenance: 1.0, family: 0.6, social: 0.8, noise: 0.5 } },
          { text: "Moderate upkeep, weekly is OK", vectors: { activity: 0.5, apartment: 0.7, maintenance: 0.5, family: 0.5, social: 0.5, noise: 0.5 } },
          { text: "Minimal—low-maintenance only", vectors: { activity: 0.8, apartment: 0.9, maintenance: 0.1, family: 0.3, social: 0.2, noise: 0.2 } }
        ]
      },
      {
        text: "What's your noise tolerance?",
        answers: [
          { text: "Love activity and sound", vectors: { activity: 0.7, apartment: 0.1, maintenance: 0.3, family: 0.7, social: 0.8, noise: 1.0 } },
          { text: "Moderate noise is fine", vectors: { activity: 0.4, apartment: 0.6, maintenance: 0.5, family: 0.5, social: 0.5, noise: 0.5 } },
          { text: "Very quiet, please", vectors: { activity: 0.1, apartment: 1.0, maintenance: 0.5, family: 0.3, social: 0.1, noise: 0.0 } }
        ]
      },
      {
        text: "What's your ideal pet personality?",
        answers: [
          { text: "Outgoing, social, always by my side", vectors: { activity: 0.9, apartment: 0.1, maintenance: 0.3, family: 0.8, social: 1.0, noise: 0.6 } },
          { text: "Balanced—playful but also calm", vectors: { activity: 0.5, apartment: 0.6, maintenance: 0.5, family: 0.5, social: 0.5, noise: 0.5 } },
          { text: "Independent, low-key, quiet", vectors: { activity: 0.1, apartment: 1.0, maintenance: 0.7, family: 0.3, social: 0.1, noise: 0.1 } }
        ]
      }
    ];

    // STATE
    let currentQuestion = 0;
    let answers = {};

    // INIT
    function init() {
      renderQuestion();
      document.addEventListener('change', updateNextButton);
    }

    // RENDER QUESTION
    function renderQuestion() {
      const q = questions[currentQuestion];
      document.getElementById('questionText').textContent = q.text;
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
      document.getElementById('progressFill').style.width = ((currentQuestion + 1) / questions.length) * 100 + '%';

      const container = document.getElementById('optionsContainer');
      container.innerHTML = '';
      q.answers.forEach((ans, i) => {
        const optionDiv = document.createElement('div');
        optionDiv.className = 'option';
        optionDiv.innerHTML = `
          <input type="radio" id="option-${i}" name="question-${currentQuestion}" value="${i}" ${answers[currentQuestion] === i ? 'checked' : ''}>
          <label for="option-${i}">${ans.text}</label>
        `;
        container.appendChild(optionDiv);
      });

      document.getElementById('backBtn').disabled = currentQuestion === 0;
      updateNextButton();
    }

    // UPDATE NEXT BUTTON
    function updateNextButton() {
      const selected = document.querySelector(`input[name="question-${currentQuestion}"]:checked`);
      document.getElementById('nextBtn').disabled = !selected;
    }

    // NEXT QUESTION
    function nextQuestion() {
      const selected = document.querySelector(`input[name="question-${currentQuestion}"]:checked`);
      if (!selected) return;
      answers[currentQuestion] = parseInt(selected.value);

      if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        renderQuestion();
      } else {
        showResult();
      }
    }

    // PREVIOUS QUESTION
    function previousQuestion() {
      if (currentQuestion > 0) {
        currentQuestion--;
        renderQuestion();
      }
    }

    // SHOW RESULT
    function showResult() {
      // Compute combined trait vector
      const combined = { activity: 0, apartment: 0, maintenance: 0, family: 0, social: 0, noise: 0 };
      for (let i = 0; i < questions.length; i++) {
        const answerIdx = answers[i];
        const vectors = questions[i].answers[answerIdx].vectors;
        for (const trait of Object.keys(combined)) {
          combined[trait] += vectors[trait];
        }
      }

      // Find best-matching pet
      let bestPet = null, bestScore = -Infinity;
      for (const [pid, pet] of Object.entries(pets)) {
        let score = 0;
        for (const trait of Object.keys(combined)) {
          score += combined[trait] * pet.traits[trait];
        }
        if (score > bestScore) {
          bestScore = score;
          bestPet = { id: pid, pet };
        }
      }

      // Render result
      const resultScreen = document.getElementById('resultScreen');
      resultScreen.innerHTML = `
        <div class="result-emoji">${bestPet.pet.emoji}</div>
        <div class="result-name">${bestPet.pet.name}</div>
        <div class="result-badge">Perfect Match! 🎉</div>
        <div class="result-card">
          <h3>Why This Pet?</h3>
          <div class="stat-row">
            <span class="stat-label">Energy Level:</span>
            <span class="stat-value">${bestPet.pet.energy}</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Living Space:</span>
            <span class="stat-value">${bestPet.pet.space}</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Grooming:</span>
            <span class="stat-value">${bestPet.pet.groom}</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Lifespan:</span>
            <span class="stat-value">${bestPet.pet.lifespan}</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Cost Level:</span>
            <span class="stat-value">${bestPet.pet.cost}</span>
          </div>
          <div class="result-footer">Best for: ${bestPet.pet.best}</div>
        </div>
      `;

      document.getElementById('formContainer').classList.add('hidden');
      document.getElementById('resultContainer').classList.remove('hidden');
    }

    // RESTART
    function restartQuiz() {
      currentQuestion = 0;
      answers = {};
      document.getElementById('formContainer').classList.remove('hidden');
      document.getElementById('resultContainer').classList.add('hidden');
      renderQuestion();
    }

    // INIT ON LOAD
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
