<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loan Calculator — Real-Time Monthly Payments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #0d0d1b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e0e0e0;
      padding: 20px;
      overflow-x: hidden;
    }

    .container {
      max-width: 900px;
      width: 100%;
      animation: fadeInScale 0.8s cubic-bezier(.16,1,.3,1);
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .hero {
      text-align: center;
      margin-bottom: 50px;
      animation: slideDown 0.6s cubic-bezier(.16,1,.3,1) 0.1s both;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero h1 {
      font-size: clamp(40px, 8vw, 64px);
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #00d9ff, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    .hero p {
      font-size: 16px;
      color: #b0b0c0;
      font-weight: 400;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .content {
        grid-template-columns: 1fr;
        gap: 30px;
      }
    }

    .controls {
      animation: slideInLeft 0.6s cubic-bezier(.16,1,.3,1) 0.2s both;
    }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .control-group {
      margin-bottom: 35px;
    }

    .label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a0a0b0;
    }

    .value {
      color: #00d9ff;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      font-size: 15px;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #1a3a3f, #3f2a1a);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d9ff, #ffd700);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
      transition: box-shadow 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.8);
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d9ff, #ffd700);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
      transition: box-shadow 0.2s;
    }

    input[type="range"]::-moz-range-thumb:hover {
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.8);
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }

    .results {
      animation: slideInRight 0.6s cubic-bezier(.16,1,.3,1) 0.3s both;
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .result-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      transition: all 0.3s cubic-bezier(.16,1,.3,1);
    }

    .result-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(0, 217, 255, 0.4);
      box-shadow: 0 8px 32px rgba(0, 217, 255, 0.15);
    }

    .result-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #80808a;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .result-value {
      font-size: clamp(24px, 5vw, 36px);
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 700;
      color: #ffd700;
    }

    .result-value.cyan {
      color: #00d9ff;
    }

    .result-value.pink {
      color: #ff6b9d;
    }

    .chart-container {
      margin-top: 30px;
      padding: 24px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 16px;
      animation: fadeIn 0.8s cubic-bezier(.16,1,.3,1) 0.4s both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .chart-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #80808a;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .amortization-bar {
      display: flex;
      height: 40px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .principal-portion {
      background: linear-gradient(90deg, #00d9ff, #0099cc);
      transition: width 0.4s cubic-bezier(.16,1,.3,1);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0 12px;
      min-width: 40px;
    }

    .principal-portion.small {
      min-width: 0;
    }

    .interest-portion {
      background: linear-gradient(90deg, #ffd700, #ff9500);
      transition: width 0.4s cubic-bezier(.16,1,.3,1);
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 12px;
    }

    .bar-label {
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      white-space: nowrap;
    }

    .bar-label.small {
      font-size: 9px;
    }

    .legend {
      display: flex;
      gap: 24px;
      margin-top: 16px;
      font-size: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #b0b0c0;
    }

    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }

    .legend-color.principal {
      background: linear-gradient(90deg, #00d9ff, #0099cc);
    }

    .legend-color.interest {
      background: linear-gradient(90deg, #ffd700, #ff9500);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Loan Calculator</h1>
      <p>Drag the sliders to explore your monthly payment</p>
    </div>

    <div class="content">
      <div class="controls">
        <div class="control-group">
          <div class="label">
            <span>Principal Amount</span>
            <span class="value" id="principal-display">$300,000</span>
          </div>
          <input type="range" id="principal" min="10000" max="1000000" step="5000" value="300000">
        </div>

        <div class="control-group">
          <div class="label">
            <span>Annual Interest Rate</span>
            <span class="value" id="rate-display">5.50%</span>
          </div>
          <input type="range" id="rate" min="0.5" max="15" step="0.1" value="5.5">
        </div>

        <div class="control-group">
          <div class="label">
            <span>Loan Term (Months)</span>
            <span class="value" id="term-display">360 months</span>
          </div>
          <input type="range" id="term" min="6" max="480" step="1" value="360">
        </div>
      </div>

      <div class="results">
        <div class="result-card">
          <div class="result-label">Monthly Payment</div>
          <div class="result-value cyan" id="monthly-payment">$1,520.06</div>
        </div>

        <div class="result-card">
          <div class="result-label">Total Interest Paid</div>
          <div class="result-value pink" id="total-interest">$247,221.80</div>
        </div>

        <div class="result-card">
          <div class="result-label">Total Repayment</div>
          <div class="result-value" id="total-repayment">$547,221.80</div>
        </div>

        <div class="chart-container">
          <div class="chart-label">Loan Composition</div>
          <div class="amortization-bar">
            <div class="principal-portion" id="principal-bar">
              <span class="bar-label" id="principal-label">Principal</span>
            </div>
            <div class="interest-portion" id="interest-bar">
              <span class="bar-label" id="interest-label">Interest</span>
            </div>
          </div>
          <div class="legend">
            <div class="legend-item">
              <div class="legend-color principal"></div>
              <span>Principal</span>
            </div>
            <div class="legend-item">
              <div class="legend-color interest"></div>
              <span>Interest</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const principalSlider = document.getElementById('principal');
    const rateSlider = document.getElementById('rate');
    const termSlider = document.getElementById('term');

    const principalDisplay = document.getElementById('principal-display');
    const rateDisplay = document.getElementById('rate-display');
    const termDisplay = document.getElementById('term-display');

    const monthlyPayment = document.getElementById('monthly-payment');
    const totalInterest = document.getElementById('total-interest');
    const totalRepayment = document.getElementById('total-repayment');

    const principalBar = document.getElementById('principal-bar');
    const interestBar = document.getElementById('interest-bar');
    const principalLabel = document.getElementById('principal-label');
    const interestLabel = document.getElementById('interest-label');

    function formatCurrency(value) {
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      }).format(value);
    }

    function formatPercent(value) {
      return (Math.round(value * 100) / 100).toFixed(2) + '%';
    }

    function calculateLoan() {
      const P = parseFloat(principalSlider.value);
      const annualRate = parseFloat(rateSlider.value);
      const months = parseInt(termSlider.value);

      // Monthly interest rate
      const monthlyRate = annualRate / 100 / 12;

      // Monthly payment formula: M = P * [r(1+r)^n] / [(1+r)^n - 1]
      let M;
      if (monthlyRate === 0) {
        M = P / months;
      } else {
        const numerator = monthlyRate * Math.pow(1 + monthlyRate, months);
        const denominator = Math.pow(1 + monthlyRate, months) - 1;
        M = P * (numerator / denominator);
      }

      const totalRepay = M * months;
      const totalInt = totalRepay - P;

      // Update displays
      principalDisplay.textContent = formatCurrency(P);
      rateDisplay.textContent = formatPercent(annualRate);
      termDisplay.textContent = months + ' months';

      monthlyPayment.textContent = formatCurrency(M);
      totalInterest.textContent = formatCurrency(totalInt);
      totalRepayment.textContent = formatCurrency(totalRepay);

      // Update amortization bar
      const principalPercent = (P / totalRepay) * 100;
      const interestPercent = 100 - principalPercent;

      principalBar.style.width = principalPercent + '%';
      interestBar.style.width = interestPercent + '%';

      if (principalPercent < 15) {
        principalBar.classList.add('small');
        principalLabel.classList.add('small');
      } else {
        principalBar.classList.remove('small');
        principalLabel.classList.remove('small');
      }

      if (interestPercent < 15) {
        interestLabel.classList.add('small');
      } else {
        interestLabel.classList.remove('small');
      }

      // Update labels
      principalLabel.textContent = principalPercent.toFixed(0) + '%';
      interestLabel.textContent = interestPercent.toFixed(0) + '%';
    }

    principalSlider.addEventListener('input', calculateLoan);
    rateSlider.addEventListener('input', calculateLoan);
    termSlider.addEventListener('input', calculateLoan);

    // Initial calculation
    calculateLoan();
  </script>
</body>
</html>
