<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enneagram Quiz — Find Your Type</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Sora', sans-serif;
      background: linear-gradient(135deg, #5b21b6 0%, #ec4899 50%, #00d9ff 100%);
      color: #fff;
      overflow-x: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      width: 100%;
      animation: fadeIn 0.6s cubic-bezier(.16,1,.3,1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero {
      text-align: center;
      margin-bottom: 3rem;
      animation: slideDown 0.8s cubic-bezier(.16,1,.3,1);
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero h1 {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 700;
      background: linear-gradient(120deg, #fbbf24, #ec4899, #00d9ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      margin-bottom: 0.5rem;
    }

    .hero p {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.85);
      font-weight: 400;
      margin-bottom: 2rem;
    }

    .quiz-section {
      display: none;
      animation: slideIn 0.5s cubic-bezier(.16,1,.3,1);
    }

    .quiz-section.active {
      display: block;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .question-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

    .question-number {
      font-size: 0.9rem;
      font-weight: 600;
      color: #fbbf24;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    .question-text {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .option {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 1.25rem;
      font-size: 1rem;
      color: #fff;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(.16,1,.3,1);
      font-family: 'Sora', sans-serif;
      text-align: left;
    }

    .option:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.3);
      transform: translateX(4px);
    }

    .option:active {
      transform: translateX(8px) scale(0.98);
    }

    .progress-bar {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #fbbf24, #ec4899, #00d9ff);
      transition: width 0.5s ease;
    }

    /* Result Modal */
    .result-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.4s ease;
    }

    .result-overlay.active {
      display: flex;
    }

    .result-modal {
      background: linear-gradient(135deg, rgba(91, 33, 182, 0.95), rgba(236, 72, 153, 0.95));
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 3rem;
      max-width: 500px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: popIn 0.6s cubic-bezier(.16,1,.3,1);
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    .result-emoji {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .result-type {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }

    .result-descriptor {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.9);
      margin-bottom: 1.5rem;
      font-style: italic;
    }

    .result-section {
      text-align: left;
      margin: 1.5rem 0;
    }

    .result-section-title {
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #fbbf24;
      margin-bottom: 0.75rem;
    }

    .result-list {
      list-style: none;
      font-size: 0.95rem;
    }

    .result-list li {
      padding: 0.5rem 0;
      padding-left: 1.5rem;
      position: relative;
    }

    .result-list li:before {
      content: "✦";
      position: absolute;
      left: 0;
      color: #00d9ff;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Sora', sans-serif;
    }

    .btn-primary {
      background: linear-gradient(120deg, #fbbf24, #ec4899);
      color: #000;
      flex: 1;
      min-width: 150px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(251, 191, 36, 0.3);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      flex: 1;
      min-width: 150px;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.5);
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 0;
      }

      .hero h1 {
        font-size: 2rem;
      }

      .question-card {
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }

      .question-text {
        font-size: 1.2rem;
      }

      .option {
        padding: 1rem;
        font-size: 0.95rem;
      }

      .result-modal {
        padding: 2rem;
      }

      .result-type {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Enneagram Quiz</h1>
      <p>Discover your personality type in 9 questions</p>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="quiz-section active" id="quizSection">
      <!-- Questions will be inserted here -->
    </div>

    <div class="result-overlay" id="resultOverlay">
      <div class="result-modal" id="resultModal">
        <!-- Result will be inserted here -->
      </div>
    </div>
  </div>

  <script>
    const questions = [
      {
        text: "When under pressure, I tend to...",
        options: [
          { text: "Become focused and assertive", types: [0, 1, 2] },
          { text: "Withdraw and analyze", types: [4, 5, 1] },
          { text: "Seek harmony and avoid conflict", types: [9, 2, 6] }
        ]
      },
      {
        text: "I feel most fulfilled when I'm...",
        options: [
          { text: "Helping others and being appreciated", types: [2, 1, 9] },
          { text: "Accomplishing goals and being recognized", types: [3, 8, 1] },
          { text: "Exploring ideas and understanding myself", types: [4, 5, 6] }
        ]
      },
      {
        text: "My friends would describe me as...",
        options: [
          { text: "Confident and direct", types: [8, 3, 7] },
          { text: "Thoughtful and sensitive", types: [4, 1, 2] },
          { text: "Friendly and adaptable", types: [7, 9, 3] }
        ]
      },
      {
        text: "When facing a problem, I...",
        options: [
          { text: "Jump in and take charge", types: [8, 3, 1] },
          { text: "Think deeply before acting", types: [5, 4, 6] },
          { text: "Consider others' perspectives", types: [2, 9, 6] }
        ]
      },
      {
        text: "I'm most motivated by...",
        options: [
          { text: "Making an impact", types: [8, 1, 3] },
          { text: "Authentic connection", types: [4, 2, 6] },
          { text: "Freedom and excitement", types: [7, 5, 9] }
        ]
      },
      {
        text: "In a group, I usually...",
        options: [
          { text: "Lead or influence decisions", types: [8, 3, 1] },
          { text: "Support others quietly", types: [2, 9, 6] },
          { text: "Observe and contribute thoughtfully", types: [5, 4, 7] }
        ]
      },
      {
        text: "I worry most about...",
        options: [
          { text: "Being incompetent or ineffective", types: [3, 1, 5] },
          { text: "Being rejected or unloved", types: [2, 4, 6] },
          { text: "Losing control or being vulnerable", types: [8, 5, 6] }
        ]
      },
      {
        text: "My ideal weekend involves...",
        options: [
          { text: "Adventure or trying something new", types: [7, 3, 8] },
          { text: "Relaxing with loved ones", types: [9, 2, 4] },
          { text: "Deep work or meaningful projects", types: [1, 5, 4] }
        ]
      },
      {
        text: "When things don't go as planned, I...",
        options: [
          { text: "Get frustrated and push harder", types: [1, 8, 3] },
          { text: "Feel disappointed or withdraw", types: [4, 6, 9] },
          { text: "Adapt and find a new angle", types: [7, 2, 5] }
        ]
      }
    ];

    const types = [
      {
        number: 1,
        name: "The Reformer",
        emoji: "⚖️",
        descriptor: "Principled, purposeful, self-controlled",
        strengths: ["High moral standards", "Reliable and responsible", "Dedicated to improvement"],
        blindspots: ["Can be rigid and judgmental", "Perfectionism leads to burnout", "Difficulty accepting imperfection in others"],
        growth: "Learn to embrace flexibility and accept that progress beats perfection"
      },
      {
        number: 2,
        name: "The Helper",
        emoji: "🤝",
        descriptor: "Generous, warm-hearted, eager to help",
        strengths: ["Genuinely caring and empathetic", "Creates strong relationships", "Always ready to support"],
        blindspots: ["Can be manipulative when needy", "Struggles setting boundaries", "Resentment when generosity isn't returned"],
        growth: "Practice self-care and learn that your worth isn't tied to helping others"
      },
      {
        number: 3,
        name: "The Achiever",
        emoji: "🏆",
        descriptor: "Adaptable, driven, success-oriented",
        strengths: ["Goal-oriented and efficient", "Inspiring motivator", "Excellent at execution"],
        blindspots: ["Overly focused on image and status", "Can be deceptive or inauthentic", "Workaholic tendencies"],
        growth: "Develop deeper connections and learn that rest is productive"
      },
      {
        number: 4,
        name: "The Individualist",
        emoji: "🎨",
        descriptor: "Creative, expressive, emotionally aware",
        strengths: ["Deeply authentic and original", "Exceptional emotional intelligence", "Artistically talented"],
        blindspots: ["Melancholic and envious tendencies", "Can be overly dramatic", "Withdrawn and isolated"],
        growth: "Channel emotions into action and balance introspection with engagement"
      },
      {
        number: 5,
        name: "The Investigator",
        emoji: "🔬",
        descriptor: "Perceptive, analytical, intense",
        strengths: ["Brilliant and knowledgeable", "Great problem-solver", "Independent thinker"],
        blindspots: ["Can be detached and cold", "Analysis paralysis", "Shares knowledge reluctantly"],
        growth: "Balance thinking with feeling and practice connecting with others emotionally"
      },
      {
        number: 6,
        name: "The Loyalist",
        emoji: "🛡️",
        descriptor: "Committed, security-conscious, reliable",
        strengths: ["Deeply loyal and trustworthy", "Responsible and careful", "Excellent team player"],
        blindspots: ["Anxious and suspicious of others", "Can be defensive or rigid", "Excessive doubt and indecision"],
        growth: "Build confidence in yourself and trust that uncertainty is part of life"
      },
      {
        number: 7,
        name: "The Enthusiast",
        emoji: "✨",
        descriptor: "Spontaneous, optimistic, adventure-seeking",
        strengths: ["Energetic and fun-loving", "Sees potential in everything", "Great storyteller"],
        blindspots: ["Avoids pain and difficult emotions", "Can be scattered and unfocused", "Impulsive and undisciplined"],
        growth: "Develop depth by sitting with discomfort and committing to long-term goals"
      },
      {
        number: 8,
        name: "The Challenger",
        emoji: "💪",
        descriptor: "Assertive, powerful, commanding",
        strengths: ["Strong-willed and confident", "Protects those they care about", "Natural leader"],
        blindspots: ["Domineering and aggressive", "Difficulty with vulnerability", "Harsh and confrontational"],
        growth: "Soften your approach and understand that gentleness is strength"
      },
      {
        number: 9,
        name: "The Peacemaker",
        emoji: "☮️",
        descriptor: "Agreeable, accepting, emotionally stable",
        strengths: ["Great mediator and listener", "Unites different perspectives", "Calm and steady"],
        blindspots: ["Passive and avoidant", "Prioritizes others' needs over own", "Stubborn resistance"],
        growth: "Develop your voice and learn that your opinions matter"
      }
    ];

    let currentQuestion = 0;
    let scores = new Array(9).fill(0);
    const quizSection = document.getElementById("quizSection");
    const resultOverlay = document.getElementById("resultOverlay");
    const progressFill = document.getElementById("progressFill");

    function renderQuestion() {
      const q = questions[currentQuestion];
      let html = `
        <div class="question-card">
          <div class="question-number">Question ${currentQuestion + 1} of ${questions.length}</div>
          <div class="question-text">${q.text}</div>
          <div class="options">
      `;

      q.options.forEach((opt, idx) => {
        html += `<button class="option" onclick="selectOption(${idx})">${opt.text}</button>`;
      });

      html += `</div></div>`;
      quizSection.innerHTML = html;
      updateProgress();
    }

    function selectOption(idx) {
      const q = questions[currentQuestion];
      const option = q.options[idx];
      option.types.forEach(type => scores[type]++);
      
      currentQuestion++;
      if (currentQuestion >= questions.length) {
        showResult();
      } else {
        renderQuestion();
      }
    }

    function updateProgress() {
      const percent = ((currentQuestion) / questions.length) * 100;
      progressFill.style.width = percent + "%";
    }

    function showResult() {
      quizSection.style.display = "none";
      const maxScore = Math.max(...scores);
      const resultType = types[scores.indexOf(maxScore)];
      
      let html = `
        <div class="result-emoji">${resultType.emoji}</div>
        <div class="result-type">${resultType.name}</div>
        <div class="result-descriptor">Type ${resultType.number}</div>
        <div class="result-descriptor">"${resultType.descriptor}"</div>
        
        <div class="result-section">
          <div class="result-section-title">Your Strengths</div>
          <ul class="result-list">
            ${resultType.strengths.map(s => `<li>${s}</li>`).join('')}
          </ul>
        </div>
        
        <div class="result-section">
          <div class="result-section-title">Potential Blindspots</div>
          <ul class="result-list">
            ${resultType.blindspots.map(b => `<li>${b}</li>`).join('')}
          </ul>
        </div>
        
        <div class="result-section">
          <div class="result-section-title">Path to Growth</div>
          <p style="font-size: 0.95rem; line-height: 1.6;">${resultType.growth}</p>
        </div>
        
        <div class="buttons">
          <button class="btn btn-primary" onclick="tryAgain()">Try Again</button>
          <button class="btn btn-secondary" onclick="learnMore()">Learn More Online</button>
        </div>
      `;
      
      document.getElementById("resultModal").innerHTML = html;
      resultOverlay.classList.add("active");
    }

    function tryAgain() {
      currentQuestion = 0;
      scores = new Array(9).fill(0);
      quizSection.style.display = "block";
      resultOverlay.classList.remove("active");
      renderQuestion();
    }

    function learnMore() {
      // Stay on page, no external link (per spec)
      alert("Visit the Enneagram Institute (enneagraminstitute.com) for deeper learning!");
    }

    // Start
    renderQuestion();
  </script>
</body>
</html>
