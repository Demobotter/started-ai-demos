<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freelance Rate Calculator — What to Actually Charge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #faf9f6 0%, #f5f0e8 100%);
      color: #1a1a1a;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      padding: 2rem 1rem;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    header {
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(32px, 6vw, 52px);
      line-height: 1.1;
      margin-bottom: 0.5rem;
      color: #1a1a1a;
      letter-spacing: -0.02em;
    }

    header p {
      font-size: 1rem;
      color: #555;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .form-section {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s backwards;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
    }

    .input-group {
      margin-bottom: 1.5rem;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) calc(0.15s + var(--delay, 0s)) backwards;
    }

    .input-group:nth-child(1) { --delay: 0s; }
    .input-group:nth-child(2) { --delay: 0.05s; }
    .input-group:nth-child(3) { --delay: 0.1s; }
    .input-group:nth-child(4) { --delay: 0.15s; }
    .input-group:nth-child(5) { --delay: 0.2s; }
    .input-group:nth-child(6) { --delay: 0.25s; }

    label {
      display: block;
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #2a2a2a;
    }

    .label-hint {
      font-size: 0.8rem;
      color: #888;
      font-weight: 400;
      margin-top: 0.25rem;
    }

    input, select {
      width: 100%;
      padding: 0.75rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      border: 1px solid #d0c8b8;
      border-radius: 6px;
      background: #fefdfb;
      color: #1a1a1a;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #8b7355;
      box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.1);
    }

    .button-group {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s backwards;
    }

    button {
      flex: 1;
      padding: 0.875rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    button.calculate {
      background: #8b7355;
      color: white;
    }

    button.calculate:hover {
      background: #6b5545;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(139, 115, 85, 0.2);
    }

    button.calculate:active {
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(139, 115, 85, 0.15);
    }

    button.reset {
      background: #e8e0d4;
      color: #2a2a2a;
    }

    button.reset:hover {
      background: #d8d0c4;
    }

    .result-section {
      background: linear-gradient(135deg, rgba(139, 115, 85, 0.05), rgba(139, 115, 85, 0.02));
      border: 1px solid rgba(139, 115, 85, 0.2);
      border-radius: 12px;
      padding: 2rem;
      margin-top: 1.5rem;
      animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      display: none;
    }

    .result-section.show {
      display: block;
    }

    .rate-display {
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .rate-label {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 500;
    }

    .rate-number {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(36px, 8vw, 56px);
      color: #8b7355;
      margin: 0.5rem 0;
      animation: countUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .rate-per {
      font-size: 1rem;
      color: #555;
      font-weight: 500;
    }

    .divider {
      height: 1px;
      background: rgba(139, 115, 85, 0.2);
      margin: 2rem 0;
    }

    .breakdown {
      margin: 1.5rem 0;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.6);
      border-left: 3px solid #8b7355;
      border-radius: 4px;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .breakdown-label {
      font-weight: 600;
      color: #2a2a2a;
      margin-bottom: 0.5rem;
    }

    .breakdown-text {
      color: #555;
    }

    .warning {
      background: rgba(220, 150, 50, 0.08);
      border-left: 3px solid #dc9632;
      color: #8b6f47;
      padding: 1rem;
      border-radius: 4px;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-top: 1rem;
    }

    @media (max-width: 480px) {
      body {
        padding: 1.5rem 1rem;
      }

      header h1 {
        font-size: 28px;
      }

      .form-section, .result-section {
        padding: 1.5rem;
      }

      .button-group {
        flex-direction: column;
      }

      .rate-number {
        font-size: 36px;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes countUp {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>What to Actually Charge</h1>
      <p>Stop underpricing. Enter your real numbers and see the rates you need to hit your target income.</p>
    </header>

    <div class="form-section">
      <div class="input-group">
        <label for="takeHome">Annual Take-Home Goal <span class="label-hint">(after tax)</span></label>
        <input type="number" id="takeHome" placeholder="e.g., 75000" value="75000" min="0" step="1000">
      </div>

      <div class="input-group">
        <label for="expenses">Annual Business Expenses <span class="label-hint">(tools, equipment, software, etc.)</span></label>
        <input type="number" id="expenses" placeholder="e.g., 6000" value="6000" min="0" step="500">
      </div>

      <div class="input-group">
        <label for="taxRate">Effective Tax Rate <span class="label-hint">(federal + state + self-employment, %)</span></label>
        <input type="number" id="taxRate" placeholder="e.g., 32" value="32" min="0" max="100" step="1">
      </div>

      <div class="input-group">
        <label for="timeOff">Weeks Off Per Year <span class="label-hint">(vacation, sick, holidays, admin time)</span></label>
        <input type="number" id="timeOff" placeholder="e.g., 5" value="5" min="0" max="52" step="0.5">
      </div>

      <div class="input-group">
        <label for="billableHours">Billable Hours Per Week <span class="label-hint">(realistic client work hours)</span></label>
        <input type="number" id="billableHours" placeholder="e.g., 30" value="30" min="0" max="70" step="1">
      </div>

      <div class="input-group">
        <label for="profitMargin">Profit Margin Buffer <span class="label-hint">(%, extra cushion for growth/emergency)</span></label>
        <input type="number" id="profitMargin" placeholder="e.g., 10" value="10" min="0" max="100" step="1">
      </div>

      <div class="button-group">
        <button class="calculate" onclick="calculate()">Calculate My Rates</button>
        <button class="reset" onclick="reset()">Reset</button>
      </div>
    </div>

    <div class="result-section" id="results">
      <div class="rate-display">
        <div class="rate-label">Your Hourly Rate</div>
        <div class="rate-number" id="hourlyRate">—</div>
        <div class="rate-per">per hour</div>
      </div>

      <div class="divider"></div>

      <div class="rate-display">
        <div class="rate-label">Your Daily Rate (8h)</div>
        <div class="rate-number" id="dailyRate">—</div>
        <div class="rate-per">per day</div>
      </div>

      <div class="breakdown">
        <div class="breakdown-label">Your Reality Check</div>
        <div class="breakdown-text" id="breakdown">—</div>
      </div>

      <div id="warningBox"></div>
    </div>
  </div>

  <script>
    function calculate() {
      // Get inputs
      const takeHome = parseFloat(document.getElementById('takeHome').value) || 0;
      const expenses = parseFloat(document.getElementById('expenses').value) || 0;
      const taxRate = parseFloat(document.getElementById('taxRate').value) / 100 || 0;
      const timeOff = parseFloat(document.getElementById('timeOff').value) || 0;
      const billableHours = parseFloat(document.getElementById('billableHours').value) || 0;
      const profitMargin = parseFloat(document.getElementById('profitMargin').value) / 100 || 0;

      // Validation
      if (takeHome <= 0 || billableHours <= 0) {
        alert('Please enter valid values for take-home goal and billable hours.');
        return;
      }

      // Calculate working weeks and billable hours per year
      const workingWeeks = 52 - timeOff;
      const billableHrsPerYear = workingWeeks * billableHours;

      // Calculate gross revenue needed
      const grossNeeded = (takeHome / (1 - taxRate)) + expenses;

      // Apply profit margin
      const grossWithMargin = grossNeeded * (1 + profitMargin);

      // Calculate hourly and daily rates
      const hourlyRate = grossWithMargin / billableHrsPerYear;
      const dailyRate = hourlyRate * 8;

      // Display results
      const resultsDiv = document.getElementById('results');
      document.getElementById('hourlyRate').textContent = '$' + hourlyRate.toFixed(2);
      document.getElementById('dailyRate').textContent = '$' + dailyRate.toFixed(2);

      // Breakdown
      const billWeekPercentage = ((workingWeeks / 52) * 100).toFixed(0);
      const breakdownText = `You're billing <strong>${workingWeeks}</strong> weeks per year (${billWeekPercentage}% of the calendar). 
      That's <strong>${billableHrsPerYear.toFixed(0)}</strong> billable hours annually at <strong>${billableHours}</strong> hrs/week. 
      To cover a ${taxRate * 100}% tax burden, ${Math.round(expenses)} in annual expenses, and hit $${takeHome.toLocaleString()} take-home, 
      you need <strong>$${hourlyRate.toFixed(2)}/hr</strong> minimum.`;
      document.getElementById('breakdown').innerHTML = breakdownText;

      // Warning if billable hours are unrealistic
      let warning = '';
      if (billableHours > 45) {
        warning = '⚠️ <strong>Unrealistic hours?</strong> Billing 45+ hours/week leaves little room for admin, learning, or breaks. Consider raising rates or reducing billable targets.';
      }
      if (hourlyRate < 25) {
        warning = '⚠️ <strong>Very low rate.</strong> At $' + hourlyRate.toFixed(2) + '/hour, ensure this reflects your market and skill level. You may be undervaluing yourself.';
      }
      if (billableHours < 10) {
        warning = '⚠️ <strong>Very few billable hours.</strong> At ' + billableHours + ' hours/week, your rate must be quite high to sustain the income goal. Feasible?';
      }

      const warningBox = document.getElementById('warningBox');
      if (warning) {
        warningBox.innerHTML = '<div class="warning">' + warning + '</div>';
      } else {
        warningBox.innerHTML = '';
      }

      resultsDiv.classList.add('show');
      resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function reset() {
      document.getElementById('takeHome').value = '75000';
      document.getElementById('expenses').value = '6000';
      document.getElementById('taxRate').value = '32';
      document.getElementById('timeOff').value = '5';
      document.getElementById('billableHours').value = '30';
      document.getElementById('profitMargin').value = '10';
      document.getElementById('results').classList.remove('show');
    }

    // Allow Enter key to calculate
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') calculate();
      });
    });
  </script>
</body>
</html>
