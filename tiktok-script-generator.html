<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScriptLab — Shorts Script Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@10..48,400;10..48,600;10..48,700&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf9f7;--surface:#fff;--s2:#f2f0ed;--border:#e4e1db;--text:#1a1916;--muted:#8a8680;--accent:#2563eb;--al:rgba(37,99,235,.08);--r:10px;--max:720px}
body{font-family:'Hanken Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased}
header{border-bottom:1px solid var(--border);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.logo{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:-.02em}
.logo span{color:var(--accent)}
.badge{font-size:.7rem;font-weight:600;color:var(--muted);border:1px solid var(--border);padding:4px 10px;border-radius:20px;letter-spacing:.05em;text-transform:uppercase}
.wrap{max-width:var(--max);margin:0 auto;padding:0 24px}
.hero{padding:52px 0 40px;text-align:center}
.hero h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(1.8rem,5vw,2.8rem);letter-spacing:-.03em;line-height:1.1;margin-bottom:12px}
.hero h1 em{font-style:normal;color:var(--accent)}
.hero p{color:var(--muted);max-width:440px;margin:0 auto}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.field+.field{margin-top:22px}
label{display:block;font-size:.74rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
textarea,input,select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Hanken Grotesk',sans-serif;font-size:.95rem;padding:12px 14px;line-height:1.5;transition:border-color .15s;appearance:none}
textarea:focus,input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea::placeholder,input::placeholder{color:#c8c3bb}
textarea{min-height:100px;resize:vertical}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:540px){.two{grid-template-columns:1fr}}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.chip{font-family:'Hanken Grotesk',sans-serif;font-size:.74rem;font-weight:600;background:var(--s2);border:1px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:20px;cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--accent);color:var(--accent);background:var(--al)}
.btn{width:100%;margin-top:24px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:.95rem;padding:15px;cursor:pointer;transition:background .15s,transform .1s}
.btn:hover{background:#1d4ed8}
.btn:active{transform:scale(.99)}
.loading{display:none;text-align:center;padding:52px 0}
.loading.on{display:block}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--muted);font-size:.88rem}
#results{display:none}
#results.on{display:block}
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.rh h2{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1.05rem;letter-spacing:-.02em}
.rbtn{font-family:'Hanken Grotesk',sans-serif;font-size:.74rem;font-weight:600;background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .15s}
.rbtn:hover{border-color:var(--text);color:var(--text)}
.script{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:12px}
.sth{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-bottom:10px}
.sh{font-family:'Bricolage Grotesque',sans-serif;font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.tag{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:3px 8px;border-radius:20px;background:var(--s2);color:var(--muted);border:1px solid var(--border)}
.sbtn{font-family:'Hanken Grotesk',sans-serif;font-size:.72rem;font-weight:600;background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 11px;border-radius:20px;cursor:pointer;transition:all .15s}
.sbtn:hover{border-color:var(--accent);color:var(--accent)}
.sbtn.ok{border-color:#22c55e;color:#22c55e}
.text{font-size:.92rem;line-height:1.6;color:var(--text);margin-bottom:8px}
.meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.insight{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-top:12px}
.insight h3{font-family:'Bricolage Grotesque',sans-serif;font-size:.74rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.insight p{font-size:.88rem;line-height:1.55}
footer{border-top:1px solid var(--border);padding:28px 24px;text-align:center;color:var(--muted);font-size:.74rem;margin-top:48px}
</style>
</head>
<body>
<header>
  <div class="logo">Script<span>Lab</span></div>
  <div class="badge">Demo</div>
</header>
<div class="wrap">
  <div class="hero">
    <h1>Turn products into <em>scroll-stopping</em> scripts</h1>
    <p>Describe your product. Get 5 30-second Shorts scripts optimized for retention hooks and algorithm engagement.</p>
  </div>

  <div id="inp">
    <div class="card">
      <div class="field">
        <label>What's the product?</label>
        <div class="chips">
          <button type="button" class="chip" data-template="saas">SaaS tool</button>
          <button type="button" class="chip" data-template="physical">Physical product</button>
          <button type="button" class="chip" data-template="service">Service</button>
          <button type="button" class="chip" data-template="course">Course/info product</button>
        </div>
        <textarea id="prod" placeholder="e.g. A no-code email marketing platform for creators — drag-and-drop templates, $29/mo, integrates with Stripe..."></textarea>
      </div>
      <div class="two field">
        <div>
          <label>Target audience</label>
          <input id="aud" type="text" placeholder="e.g. Indie creators, online coaches">
        </div>
        <div>
          <label>Hook style</label>
          <select id="hook">
            <option value="pattern">Pattern interrupt</option>
            <option value="story">Story-driven</option>
            <option value="value">Value proposition</option>
            <option value="curiosity">Curiosity gap</option>
          </select>
        </div>
      </div>
      <button type="button" class="btn" id="genBtn">Generate 5 Scripts →</button>
    </div>
  </div>

  <div class="loading" id="load">
    <div class="spinner"></div>
    <p>Crafting scroll-stopping scripts…</p>
  </div>

  <div id="results">
    <div class="rh">
      <h2>5 Shorts Scripts</h2>
      <button type="button" class="rbtn" id="resetBtn">← Start over</button>
    </div>
    <div id="list"></div>
    <div class="insight" id="insight"></div>
  </div>
</div>
<footer>ScriptLab · Demo by Started AI · Not a real service</footer>

<script>
const TEMPLATES = {
  saas: {prod: "A no-code email marketing platform for creators — drag-and-drop templates, $29/mo, integrates with Stripe. Average creator recovers 3.2x their monthly cost in recovered sales.", aud: "Indie creators, online coaches"},
  physical: {prod: "Sustainable bamboo water bottles with built-in time markers — keeps you hydrated, $34.99, ships worldwide.", aud: "Fitness enthusiasts, eco-conscious buyers"},
  service: {prod: "LinkedIn profile optimization service — we rewrite your headline, summary, and pinned post. $199 all-in, results in 2 weeks.", aud: "Job seekers, career changers"},
  course: {prod: "12-week coding bootcamp for beginners — learn JavaScript, React, Node.js. $497 lifetime access, 95% of graduates land jobs within 3 months.", aud: "Career switchers, self-taught learners"}
};

const SCRIPTS = {
  pattern: [
    {opening: "Nobody tells you this about software tools...", mid: "But drag-and-drop automation changes everything", cta: "We made it dead simple. Link in bio."},
    {opening: "Your current approach is probably costing you.", mid: "This does it 10x faster — here's why", cta: "Try it free for 7 days."},
    {opening: "The setup everyone uses? I switched.", mid: "Results speak louder than marketing.", cta: "See for yourself →"},
    {opening: "Stop wasting time on this.", mid: "This solves it in 60 seconds.", cta: "Link in bio."},
    {opening: "One feature changed how I work.", mid: "Been using it for 3 months — can't go back.", cta: "Free trial. No credit card."}
  ],
  story: [
    {opening: "I used to spend 4 hours a week on admin work.", mid: "Then I found the right tool. Changed my business.", cta: "Link in bio if you want this."},
    {opening: "Real talk: nobody wants to do this manually.", mid: "This fixed it for me — now I have time back.", cta: "DM or click link to see how."},
    {opening: "My biggest frustration was finally solved.", mid: "Tried 3 tools before this one just worked.", cta: "Worth sharing with anyone who struggles with this."},
    {opening: "Spent $500 trying other solutions.", mid: "This one is half the price and twice as good.", cta: "Link in bio. Seriously."},
    {opening: "Changed how I run things completely.", mid: "Now my team has actual time to focus on what matters.", cta: "Free trial — see if it works for you."}
  ],
  value: [
    {opening: "Save 3 hours per week?", mid: "This does it. Tested across 500 teams.", cta: "Numbers don't lie. Link below."},
    {opening: "Your current setup costs you $2k/year in wasted time.", mid: "This costs $240 and saves you 200+ hours.", cta: "Do the math — link in bio."},
    {opening: "65% faster than the alternative.", mid: "Same results. Way less friction.", cta: "Try it free. Link in bio."},
    {opening: "Cut our operational costs by 40%.", mid: "Seriously. We measured it.", cta: "See our case study — link in bio."},
    {opening: "You're probably overpaying for this.", mid: "We do the same thing for 1/3 the cost.", cta: "Free comparison tool in bio."}
  ],
  curiosity: [
    {opening: "This productivity trend blew up in 2026…", mid: "And this one tool is why everyone switched.", cta: "See why → link in bio."},
    {opening: "What if you could cut your workload in half?", mid: "Thousands are. Here's how →", cta: "Link in bio."},
    {opening: "The #1 reason founders switch tools?", mid: "They tried ours and never looked back.", cta: "Curious? Link in bio."},
    {opening: "We noticed something interesting…", mid: "Teams that use this are 3x more productive.", cta: "Here's why → link in bio."},
    {opening: "The tool nobody expected to work this well.", mid: "But look — the retention rate is 94%.", cta: "What are people doing with it? Link in bio."}
  ]
};

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderScripts() {
  const prod = document.getElementById('prod').value.trim();
  const hook = document.getElementById('hook').value;
  
  if (!prod) {
    document.getElementById('prod').focus();
    return;
  }
  
  document.getElementById('inp').style.display = 'none';
  document.getElementById('load').classList.add('on');
  document.getElementById('results').classList.remove('on');
  
  setTimeout(() => {
    const scripts = SCRIPTS[hook];
    const hookNames = {pattern: 'Pattern', story: 'Story', value: 'Value', curiosity: 'Curiosity'};
    const hookName = hookNames[hook];
    
    let html = '';
    scripts.forEach((it, i) => {
      const fullText = it.opening + ' ' + it.mid + ' ' + it.cta;
      html += `
        <div class="script">
          <div class="sth"><span class="sh">Script ${i+1}</span><span class="tag">${hookName}</span></div>
          <div class="text"><strong>"${esc(it.opening)}"</strong></div>
          <div class="text">${esc(it.mid)}</div>
          <div class="text"><em>${esc(it.cta)}</em></div>
          <div class="meta" style="margin-top:12px"><button type="button" class="sbtn copy-btn" data-text="${esc(fullText)}">Copy script</button></div>
        </div>`;
    });
    
    document.getElementById('list').innerHTML = html;
    
    const hookDesc = {
      pattern: 'pattern interrupts',
      story: 'narrative framing',
      value: 'value comparison',
      curiosity: 'curiosity gaps'
    }[hook];
    
    document.getElementById('insight').innerHTML = `<h3>Hook breakdown</h3><p>All 5 scripts use <strong>${hookDesc}</strong> to stop the scroll in the first 3 seconds. The middle section delivers your unique angle, and the CTA keeps friction low ('link in bio' beats hard sells for faceless content).</p>`;
    
    document.getElementById('load').classList.remove('on');
    document.getElementById('results').classList.add('on');
    
    // Attach copy handlers
    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const text = this.getAttribute('data-text');
        navigator.clipboard.writeText(text).then(() => {
          this.textContent = 'Copied ✓';
          this.classList.add('ok');
          setTimeout(() => {
            this.textContent = 'Copy script';
            this.classList.remove('ok');
          }, 2000);
        });
      });
    });
  }, 1200);
}

// Event listeners
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', function() {
    const template = this.getAttribute('data-template');
    const data = TEMPLATES[template];
    document.getElementById('prod').value = data.prod;
    document.getElementById('aud').value = data.aud;
  });
});

document.getElementById('genBtn').addEventListener('click', renderScripts);

document.getElementById('resetBtn').addEventListener('click', function() {
  document.getElementById('results').classList.remove('on');
  document.getElementById('inp').style.display = 'block';
  document.getElementById('prod').value = '';
  document.getElementById('aud').value = '';
});
</script>
</body>
</html>
