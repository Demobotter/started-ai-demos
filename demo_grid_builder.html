<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Builder — CSS Layout Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Manrope', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f0f2e 0%, #1a1a4d 50%, #0f2644 100%);
      color: #fff;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    /* Hero */
    .hero {
      text-align: center;
      animation: fadeScale 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeScale {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(-20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(36px, 8vw, 72px);
      font-weight: 700;
      letter-spacing: -1.2px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #00d9ff 0%, #00ff88 50%, #ffaa00 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeScale 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .hero p {
      font-size: 16px;
      color: #a0a0c0;
      max-width: 600px;
      margin: 0 auto;
      animation: fadeScale 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.1s;
      opacity: 0;
    }

    /* Main grid */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 30px;
      animation: fadeScale 1.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.2s;
      opacity: 0;
    }

    @media (max-width: 900px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Canvas area */
    .canvas-area {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 16px;
      padding: 30px;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .canvas-label {
      font-size: 13px;
      color: #00d9ff;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .grid-preview {
      flex: 1;
      min-height: 400px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(0, 217, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      display: grid;
      grid-auto-rows: 1fr;
      position: relative;
      overflow: hidden;
    }

    .grid-cell {
      background: linear-gradient(135deg, rgba(0, 217, 255, 0.3), rgba(0, 255, 136, 0.3));
      border: 1px solid rgba(0, 217, 255, 0.3);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #00d9ff;
      position: relative;
      overflow: hidden;
    }

    .grid-cell:hover {
      background: linear-gradient(135deg, rgba(0, 217, 255, 0.6), rgba(0, 255, 136, 0.6));
      border-color: rgba(0, 217, 255, 0.8);
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.1);
      transform: scale(1.02);
    }

    .grid-cell.colored {
      background: var(--cell-color, linear-gradient(135deg, rgba(255, 170, 0, 0.6), rgba(255, 100, 200, 0.6)));
      border-color: var(--cell-color-border, rgba(255, 170, 0, 0.8));
    }

    .grid-cell.colored:hover {
      box-shadow: 0 0 20px var(--cell-color-border, rgba(255, 170, 0, 0.6)), inset 0 0 10px rgba(255, 255, 255, 0.2);
    }

    /* Code panel */
    .code-panel {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(0, 255, 136, 0.2);
      border-radius: 12px;
      padding: 16px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #00ff88;
      line-height: 1.4;
      max-height: 200px;
      overflow-y: auto;
      word-break: break-all;
      white-space: pre-wrap;
      animation: fadeScale 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.3s;
      opacity: 0;
    }

    .code-label {
      font-size: 11px;
      color: #00ff88;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    /* Controls sidebar */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 24px;
      animation: fadeScale 1.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.4s;
      opacity: 0;
    }

    .control-group {
      background: rgba(0, 217, 255, 0.05);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 12px;
      padding: 16px;
      backdrop-filter: blur(10px);
    }

    .control-label {
      font-size: 12px;
      color: #00d9ff;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
      display: block;
    }

    .control-value {
      font-size: 24px;
      font-weight: 700;
      color: #00ff88;
      margin-bottom: 12px;
      font-family: 'Syne', sans-serif;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(0, 217, 255, 0.2);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d9ff, #00ff88);
      cursor: pointer;
      box-shadow: 0 0 12px rgba(0, 217, 255, 0.6);
      transition: all 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.3);
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.8);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d9ff, #00ff88);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 12px rgba(0, 217, 255, 0.6);
      transition: all 0.2s;
    }

    .color-picker-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .color-swatch {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid rgba(0, 217, 255, 0.3);
      transition: all 0.3s;
    }

    .color-swatch:hover {
      border-color: rgba(0, 217, 255, 0.8);
      transform: scale(1.2);
      box-shadow: 0 0 15px rgba(0, 217, 255, 0.5);
    }

    .color-swatch.active {
      border-color: #fff;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
    }

    .reset-btn {
      background: linear-gradient(135deg, #ff6b00, #ff1493);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 16px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 15px rgba(255, 107, 0, 0.3);
    }

    .reset-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(255, 107, 0, 0.5);
    }

    .reset-btn:active {
      transform: translateY(0);
    }

    .copy-btn {
      background: linear-gradient(135deg, #00d9ff, #00ff88);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'Manrope', sans-serif;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
    }

    .copy-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(0, 217, 255, 0.4);
    }

    .copy-btn:active {
      transform: translateY(0);
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>⚙️ Grid Builder</h1>
      <p>Design responsive CSS grids in real-time. Adjust columns, gaps, and cell colors—copy the code instantly.</p>
    </div>

    <div class="main-grid">
      <div class="canvas-area">
        <div class="canvas-label">Grid Preview</div>
        <div class="grid-preview" id="gridPreview"></div>
        <div style="display: flex; gap: 10px; align-items: center;">
          <div class="code-label">CSS</div>
          <button class="copy-btn" id="copyBtn">Copy Code</button>
        </div>
        <div class="code-panel" id="codePanel">grid-template-columns: repeat(3, 1fr);</div>
      </div>

      <div class="controls">
        <div class="control-group">
          <label class="control-label">Columns</label>
          <div class="control-value" id="colValue">3</div>
          <input type="range" id="colSlider" min="1" max="8" value="3">
        </div>

        <div class="control-group">
          <label class="control-label">Gap (px)</label>
          <div class="control-value" id="gapValue">16</div>
          <input type="range" id="gapSlider" min="0" max="40" value="16">
        </div>

        <div class="control-group">
          <label class="control-label">Cell Color</label>
          <div class="color-picker-group">
            <div class="color-swatch active" data-color="#00d9ff" style="background: #00d9ff;"></div>
            <div class="color-swatch" data-color="#00ff88" style="background: #00ff88;"></div>
            <div class="color-swatch" data-color="#ffaa00" style="background: #ffaa00;"></div>
            <div class="color-swatch" data-color="#ff1493" style="background: #ff1493;"></div>
            <div class="color-swatch" data-color="#9d4edd" style="background: #9d4edd;"></div>
          </div>
        </div>

        <button class="reset-btn" id="resetBtn">Reset Grid</button>
      </div>
    </div>
  </div>

  <script>
    // Pure logic: grid state management + CSS generation
    let state = {
      columns: 3,
      gap: 16,
      selectedColor: '#00d9ff',
      cellColors: {}
    };

    const colors = {
      '#00d9ff': { bg: 'linear-gradient(135deg, rgba(0, 217, 255, 0.6), rgba(0, 255, 136, 0.6))', border: 'rgba(0, 217, 255, 0.8)' },
      '#00ff88': { bg: 'linear-gradient(135deg, rgba(0, 255, 136, 0.6), rgba(0, 217, 255, 0.6))', border: 'rgba(0, 255, 136, 0.8)' },
      '#ffaa00': { bg: 'linear-gradient(135deg, rgba(255, 170, 0, 0.6), rgba(255, 100, 0, 0.6))', border: 'rgba(255, 170, 0, 0.8)' },
      '#ff1493': { bg: 'linear-gradient(135deg, rgba(255, 20, 147, 0.6), rgba(255, 100, 200, 0.6))', border: 'rgba(255, 20, 147, 0.8)' },
      '#9d4edd': { bg: 'linear-gradient(135deg, rgba(157, 78, 221, 0.6), rgba(200, 100, 255, 0.6))', border: 'rgba(157, 78, 221, 0.8)' }
    };

    function generateCSS() {
      return `grid-template-columns: repeat(${state.columns}, 1fr);\ngrid-gap: ${state.gap}px;`;
    }

    function generateGridHTML() {
      let html = '';
      const totalCells = state.columns * 3; // 3 rows default
      for (let i = 0; i < totalCells; i++) {
        const color = state.cellColors[i];
        const colorStyle = color ? ` style="--cell-color: ${colors[color].bg}; --cell-color-border: ${colors[color].border};" class="grid-cell colored"` : ' class="grid-cell"';
        html += `<div${colorStyle}></div>`;
      }
      return html;
    }

    function updateGrid() {
      const preview = document.getElementById('gridPreview');
      preview.style.gridTemplateColumns = `repeat(${state.columns}, 1fr)`;
      preview.style.gap = `${state.gap}px`;
      preview.innerHTML = generateGridHTML();

      // Re-attach click handlers
      document.querySelectorAll('.grid-cell').forEach((cell, idx) => {
        cell.addEventListener('click', () => toggleCellColor(idx));
      });

      // Update code
      document.getElementById('codePanel').textContent = generateCSS();
    }

    function toggleCellColor(idx) {
      if (state.cellColors[idx] === state.selectedColor) {
        delete state.cellColors[idx];
      } else {
        state.cellColors[idx] = state.selectedColor;
      }
      updateGrid();
    }

    // Event listeners
    document.getElementById('colSlider').addEventListener('input', (e) => {
      state.columns = parseInt(e.target.value);
      document.getElementById('colValue').textContent = state.columns;
      state.cellColors = {}; // Reset colors on column change
      updateGrid();
    });

    document.getElementById('gapSlider').addEventListener('input', (e) => {
      state.gap = parseInt(e.target.value);
      document.getElementById('gapValue').textContent = state.gap;
      updateGrid();
    });

    document.querySelectorAll('.color-swatch').forEach(swatch => {
      swatch.addEventListener('click', () => {
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        swatch.classList.add('active');
        state.selectedColor = swatch.dataset.color;
      });
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      state.columns = 3;
      state.gap = 16;
      state.cellColors = {};
      document.getElementById('colSlider').value = 3;
      document.getElementById('gapSlider').value = 16;
      document.getElementById('colValue').textContent = 3;
      document.getElementById('gapValue').textContent = 16;
      updateGrid();
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      const code = generateCSS();
      navigator.clipboard.writeText(code).then(() => {
        const btn = document.getElementById('copyBtn');
        const original = btn.textContent;
        btn.textContent = '✓ Copied!';
        setTimeout(() => { btn.textContent = original; }, 2000);
      });
    });

    // Initialize
    updateGrid();
  </script>
</body>
</html>
