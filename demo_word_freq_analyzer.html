<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Frequency Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0d1b2a 0%, #16213e 50%, #1a0033 100%); color: #e0e0e0; min-height: 100vh; overflow-x: hidden; }
        
        /* Starfield texture overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #00ffff, rgba(0,255,255,0)),
                radial-gradient(2px 2px at 60px 70px, #ff00ff, rgba(255,0,255,0)),
                radial-gradient(1px 1px at 50px 50px, #00ffff, rgba(0,255,255,0)),
                radial-gradient(1px 1px at 130px 80px, #ff00ff, rgba(255,0,255,0));
            background-size: 200px 200px;
            background-position: 0 0;
            opacity: 0.15;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .hero {
            text-align: center;
            margin-bottom: 50px;
            animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .hero h1 {
            font-family: 'Fraunces', serif;
            font-size: clamp(48px, 8vw, 72px);
            font-weight: 700;
            background: linear-gradient(90deg, #00ffff, #ff00ff, #ff6ec7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 18px;
            color: #999;
            font-weight: 400;
        }

        .main-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s backwards;
        }

        @media (max-width: 768px) {
            .main-section {
                grid-template-columns: 1fr;
                gap: 30px;
            }
        }

        .input-panel {
            background: rgba(20, 40, 70, 0.7);
            border: 2px solid #00ffff;
            border-radius: 12px;
            padding: 30px;
            backdrop-filter: blur(20px);
        }

        .input-panel h2 {
            font-family: 'Fraunces', serif;
            font-size: 28px;
            margin-bottom: 20px;
            color: #00ffff;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: rgba(10, 20, 40, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            padding: 16px;
            font-family: 'Inter', sans-serif;
            color: #00ffff;
            font-size: 14px;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 16px rgba(0, 255, 255, 0.4);
        }

        .textarea-label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .stat-box {
            background: rgba(10, 20, 40, 0.8);
            border-left: 3px solid #ff00ff;
            padding: 12px;
            border-radius: 6px;
        }

        .stat-box.active {
            border-left-color: #00ffff;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stat-value {
            font-family: 'Inter', monospace;
            font-size: 24px;
            font-weight: 600;
            color: #00ffff;
        }

        .stat-box.active .stat-value {
            color: #ff00ff;
        }

        .chart-panel {
            background: rgba(20, 40, 70, 0.7);
            border: 2px solid #ff00ff;
            border-radius: 12px;
            padding: 30px;
            backdrop-filter: blur(20px);
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .chart-panel h2 {
            font-family: 'Fraunces', serif;
            font-size: 28px;
            margin-bottom: 20px;
            color: #ff00ff;
        }

        #chart {
            flex: 1;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 20px;
        }

        .bar-wrapper {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 40px;
            opacity: 0;
            animation: barRise 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .bar-wrapper:nth-child(1) { animation-delay: 0.1s; }
        .bar-wrapper:nth-child(2) { animation-delay: 0.15s; }
        .bar-wrapper:nth-child(3) { animation-delay: 0.2s; }
        .bar-wrapper:nth-child(4) { animation-delay: 0.25s; }
        .bar-wrapper:nth-child(5) { animation-delay: 0.3s; }
        .bar-wrapper:nth-child(6) { animation-delay: 0.35s; }
        .bar-wrapper:nth-child(7) { animation-delay: 0.4s; }
        .bar-wrapper:nth-child(8) { animation-delay: 0.45s; }
        .bar-wrapper:nth-child(9) { animation-delay: 0.5s; }
        .bar-wrapper:nth-child(10) { animation-delay: 0.55s; }

        .bar {
            width: 36px;
            background: linear-gradient(180deg, #00ffff, #ff00ff);
            border-radius: 4px 4px 0 0;
            min-height: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.3);
        }

        .bar:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
        }

        .bar-label {
            font-size: 11px;
            color: #888;
            margin-top: 6px;
            text-align: center;
            white-space: nowrap;
            max-width: 40px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bar-count {
            font-size: 12px;
            color: #00ffff;
            margin-top: 2px;
            font-weight: 600;
            font-family: 'Inter', monospace;
        }

        .empty-chart {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
            font-style: italic;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes barRise {
            from { opacity: 0; transform: scaleY(0); }
            to { opacity: 1; transform: scaleY(1); }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #555;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>📊 Word Frequency Analyzer</h1>
            <p>Paste text and watch the words come alive</p>
        </div>

        <div class="main-section">
            <div class="input-panel">
                <h2>Paste Your Text</h2>
                <label class="textarea-label">Input</label>
                <textarea id="textInput" placeholder="Paste text here to analyze word frequencies..."></textarea>
                
                <div class="stats-row">
                    <div class="stat-box active">
                        <div class="stat-label">Total Words</div>
                        <div class="stat-value" id="wordCount">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Unique Words</div>
                        <div class="stat-value" id="uniqueCount">0</div>
                    </div>
                </div>
            </div>

            <div class="chart-panel">
                <h2>Top 10 Words</h2>
                <div id="chart" class="empty-chart">
                    Paste text to analyze
                </div>
            </div>
        </div>

        <div class="footer">
            Stop words (a, the, and, is, etc.) are filtered out
        </div>
    </div>

    <script>
        // Pure word frequency logic
        function analyzeText(text) {
            const stopWords = new Set([
                'a', 'an', 'and', 'are', 'as', 'at', 'be', 'but', 'by', 'for', 'from',
                'has', 'he', 'in', 'is', 'it', 'its', 'of', 'on', 'or', 'that', 'the',
                'this', 'to', 'was', 'with', 'you', 'i', 'we', 'they', 'them', 'your',
                'have', 'had', 'do', 'does', 'did', 'will', 'would', 'could', 'should',
                'been', 'which', 'who', 'what', 'where', 'when', 'why', 'how'
            ]);

            const words = text
                .toLowerCase()
                .match(/\b[a-z']+\b/g) || [];
            
            const filtered = words.filter(w => !stopWords.has(w) && w.length > 2);
            
            const freq = {};
            filtered.forEach(word => {
                freq[word] = (freq[word] || 0) + 1;
            });

            const sorted = Object.entries(freq)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);

            return {
                totalWords: filtered.length,
                uniqueWords: Object.keys(freq).length,
                topWords: sorted
            };
        }

        // Test logic headless
        function testLogic() {
            const testText = "the quick brown fox jumps over the lazy dog the quick fox jumps again and again";
            const result = analyzeText(testText);
            console.assert(result.totalWords === 13, 'Word count failed');
            console.assert(result.uniqueWords > 0, 'Unique count failed');
            console.assert(result.topWords[0][0] === 'quick', 'Top word not correct');
            console.assert(result.topWords[0][1] === 2, 'Top word frequency not correct');
            console.log('✅ Logic tests passed');
        }
        testLogic();

        // DOM rendering
        const textInput = document.getElementById('textInput');
        const chart = document.getElementById('chart');
        const wordCountEl = document.getElementById('wordCount');
        const uniqueCountEl = document.getElementById('uniqueCount');

        function renderChart(topWords) {
            if (topWords.length === 0) {
                chart.innerHTML = '<div class="empty-chart">Paste text to analyze</div>';
                return;
            }

            const maxCount = topWords[0][1];
            chart.innerHTML = topWords.map(([word, count]) => {
                const height = Math.max(40, (count / maxCount) * 300);
                return `
                    <div class="bar-wrapper">
                        <div class="bar" style="height: ${height}px;"></div>
                        <div class="bar-label">${word}</div>
                        <div class="bar-count">${count}</div>
                    </div>
                `;
            }).join('');
        }

        function updateAnalysis() {
            const text = textInput.value;
            const result = analyzeText(text);
            
            wordCountEl.textContent = result.totalWords;
            uniqueCountEl.textContent = result.uniqueWords;
            renderChart(result.topWords);
        }

        textInput.addEventListener('input', updateAnalysis);
        
        // Preload with sample
        textInput.value = 'The quick brown fox jumps over the lazy dog. The dog was very lazy and liked to sleep all day long. The fox was quick and clever and always jumped over the dog. Sometimes the dog would wake up and chase the fox, but the fox was always too quick.';
        updateAnalysis();
    </script>
</body>
</html>
