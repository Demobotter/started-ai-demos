<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reaction Time Tester</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Albert+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff006e;
      --secondary: #8338ec;
      --accent: #3a86ff;
      --dark: #0a0e27;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Albert Sans', sans-serif;
      background: linear-gradient(135deg, var(--dark) 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 600px;
      animation: fadeInUp .7s cubic-bezier(.16,1,.3,1);
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(255, 0, 110, .7); } 70% { box-shadow: 0 0 0 30px rgba(255, 0, 110, 0); } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    
    .header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeInUp .7s .1s both;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -2px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      font-size: 14px;
      color: #aaa;
      letter-spacing: .5px;
    }
    
    .game-zone {
      background: rgba(255, 0, 110, .05);
      border: 2px solid var(--primary);
      border-radius: 16px;
      padding: 40px 20px;
      text-align: center;
      min-height: 300px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin-bottom: 30px;
      animation: slideInRight .6s .2s both;
      position: relative;
      overflow: hidden;
    }
    
    .game-zone.ready {
      background: rgba(58, 134, 255, .05);
      border-color: var(--accent);
    }
    
    .game-zone.active {
      background: linear-gradient(135deg, rgba(255, 0, 110, .2) 0%, rgba(131, 56, 236, .2) 100%);
      border-color: var(--secondary);
    }
    
    .ready-text {
      font-size: 18px;
      color: var(--accent);
      margin-bottom: 16px;
      font-weight: 500;
    }
    
    .start-btn {
      background: linear-gradient(135deg, var(--accent) 0%, var(--secondary) 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 8px 24px rgba(58, 134, 255, .3);
    }
    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(58, 134, 255, .5);
    }
    .start-btn:active {
      transform: translateY(0);
    }
    
    .waiting {
      font-size: 24px;
      color: #aaa;
      font-weight: 500;
    }
    
    .flash-area {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      color: #555;
      transition: background .05s;
      margin-bottom: 20px;
    }
    
    .flash-area.active {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      box-shadow: 0 0 40px rgba(255, 0, 110, .8), inset 0 0 40px rgba(255, 0, 110, .3);
      color: #fff;
      font-size: 48px;
      font-weight: 700;
      animation: pulse 1s infinite;
    }
    
    .status {
      font-size: 16px;
      color: #aaa;
      margin-top: 20px;
    }
    
    .result-card {
      background: rgba(255, 255, 255, .05);
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
      animation: slideInRight .5s both;
    }
    
    .result-time {
      font-size: 42px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
      font-family: 'Syne', sans-serif;
    }
    
    .result-label {
      font-size: 13px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .stat-box {
      background: rgba(255, 0, 110, .1);
      border-left: 3px solid var(--primary);
      border-radius: 8px;
      padding: 16px;
      text-align: left;
    }
    
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
      font-family: 'Syne', sans-serif;
    }
    
    .stat-label {
      font-size: 12px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    
    .attempts-list {
      background: rgba(255, 255, 255, .02);
      border-radius: 8px;
      padding: 16px;
      max-height: 150px;
      overflow-y: auto;
      margin-bottom: 16px;
    }
    
    .attempt-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, .05);
      font-size: 13px;
    }
    
    .attempt-num {
      color: #666;
    }
    
    .attempt-time {
      color: var(--accent);
      font-weight: 600;
    }
    
    .reset-btn {
      background: rgba(131, 56, 236, .2);
      border: 1px solid var(--secondary);
      color: var(--secondary);
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: all .3s;
      width: 100%;
    }
    
    .reset-btn:hover {
      background: var(--secondary);
      color: #fff;
    }
    
    .info-text {
      font-size: 13px;
      color: #888;
      margin-top: 16px;
      line-height: 1.5;
    }
    
    @media (max-width: 600px) {
      .game-zone { min-height: 280px; padding: 30px 15px; }
      .flash-area { width: 160px; height: 160px; }
      .stats-grid { grid-template-columns: 1fr; }
      h1 { font-size: 32px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚡ Reaction Time</h1>
      <p class="tagline">How fast are you? Test your reflexes.</p>
    </div>
    
    <div class="game-zone" id="gameZone">
      <div class="ready-text" id="readyText">Ready?</div>
      <button class="start-btn" id="startBtn" onclick="startGame()">Start Test</button>
    </div>
    
    <div id="statsContainer" style="display: none;">
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-value" id="avgVal">-</div>
          <div class="stat-label">Avg Time</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="bestVal">-</div>
          <div class="stat-label">Best Time</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="worstVal">-</div>
          <div class="stat-label">Worst Time</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="countVal">0</div>
          <div class="stat-label">Attempts</div>
        </div>
      </div>
      
      <div class="attempts-list" id="attemptsList"></div>
      
      <button class="reset-btn" onclick="resetGame()">Reset All</button>
      
      <div class="info-text">
        💡 Wait for the circle to light up, then click as fast as you can. Try multiple times to improve your average.
      </div>
    </div>
  </div>
  
  <script>
    let attempts = [];
    let gameActive = false;
    let testStarted = false;
    let delayTimer = null;
    
    function startGame() {
      testStarted = true;
      gameActive = false;
      const gameZone = document.getElementById('gameZone');
      gameZone.className = 'game-zone ready';
      document.getElementById('readyText').textContent = 'Get ready...';
      document.getElementById('startBtn').style.display = 'none';
      
      const delay = Math.random() * 3000 + 1000; // 1-4 seconds
      delayTimer = setTimeout(() => {
        activateFlash();
      }, delay);
    }
    
    function activateFlash() {
      const gameZone = document.getElementById('gameZone');
      gameZone.innerHTML = `
        <div class="flash-area active" id="flashArea">CLICK!</div>
        <div class="status">React now!</div>
      `;
      gameZone.className = 'game-zone active';
      document.getElementById('statsContainer').style.display = 'block';
      gameActive = true;
      
      const flashTime = Date.now();
      document.getElementById('flashArea').onclick = () => recordTime(flashTime);
      
      setTimeout(() => {
        if (gameActive) {
          endRound(true);
        }
      }, 2000);
    }
    
    function recordTime(flashTime) {
      if (!gameActive) return;
      gameActive = false;
      const time = Date.now() - flashTime;
      attempts.push(time);
      
      const gameZone = document.getElementById('gameZone');
      gameZone.innerHTML = `
        <div class="result-card">
          <div class="result-time">${time}ms</div>
          <div class="result-label">Reaction Time</div>
        </div>
        <button class="start-btn" onclick="startGame()" style="width: 100%;">Test Again</button>
      `;
      gameZone.className = 'game-zone';
      
      updateStats();
    }
    
    function endRound(missed) {
      gameActive = false;
      const gameZone = document.getElementById('gameZone');
      gameZone.innerHTML = `
        <div class="result-card" style="background: rgba(255,0,110,.15); border: 1px solid rgba(255,0,110,.3);">
          <div class="result-time">💤</div>
          <div class="result-label">Missed! Too slow.</div>
        </div>
        <button class="start-btn" onclick="startGame()" style="width: 100%;">Try Again</button>
      `;
      gameZone.className = 'game-zone';
    }
    
    function updateStats() {
      const avg = Math.round(attempts.reduce((a, b) => a + b, 0) / attempts.length);
      const best = Math.min(...attempts);
      const worst = Math.max(...attempts);
      
      document.getElementById('avgVal').textContent = avg + 'ms';
      document.getElementById('bestVal').textContent = best + 'ms';
      document.getElementById('worstVal').textContent = worst + 'ms';
      document.getElementById('countVal').textContent = attempts.length;
      
      let listHTML = attempts.map((t, i) => `
        <div class="attempt-item">
          <span class="attempt-num">#${i + 1}</span>
          <span class="attempt-time">${t}ms</span>
        </div>
      `).reverse().join('');
      
      document.getElementById('attemptsList').innerHTML = listHTML;
    }
    
    function resetGame() {
      attempts = [];
      gameActive = false;
      testStarted = false;
      clearTimeout(delayTimer);
      
      const gameZone = document.getElementById('gameZone');
      gameZone.className = 'game-zone';
      gameZone.innerHTML = `
        <div class="ready-text">Ready?</div>
        <button class="start-btn" onclick="startGame()">Start Test</button>
      `;
      
      document.getElementById('statsContainer').style.display = 'none';
    }
  </script>
</body>
</html>
