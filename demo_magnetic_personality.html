<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Personality Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3f 50%, #0d1b2a 100%);
            color: #e0e0ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 700px;
        }

        .hero {
            text-align: center;
            margin-bottom: 50px;
            animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(32px, 8vw, 56px);
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #00d9ff 0%, #ff00ff 50%, #00d9ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 18px;
            color: #a8a8d0;
            font-weight: 400;
        }

        .quiz-section {
            display: none;
            animation: fadeIn 0.6s ease-out;
        }

        .quiz-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .question-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .progress {
            margin-bottom: 20px;
            font-size: 13px;
            color: #8888bb;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-bar {
            width: 100%;
            height: 2px;
            background: rgba(0, 217, 255, 0.1);
            border-radius: 1px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff 0%, #ff00ff 100%);
            border-radius: 1px;
            transition: width 0.4s ease-out;
        }

        .question-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 25px;
            color: #ffffff;
            line-height: 1.4;
        }

        .choice-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .choice-btn {
            flex: 1;
            min-width: 150px;
            padding: 16px 20px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            background: rgba(0, 217, 255, 0.05);
            color: #e0e0ff;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: 'Manrope', sans-serif;
        }

        .choice-btn:hover {
            border-color: #00d9ff;
            background: rgba(0, 217, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 217, 255, 0.2);
        }

        .choice-btn:active {
            transform: translateY(0);
        }

        .choice-btn.selected {
            border-color: #ff00ff;
            background: rgba(255, 0, 255, 0.2);
            box-shadow: 0 0 16px rgba(255, 0, 255, 0.4);
        }

        .result-section {
            display: none;
            text-align: center;
        }

        .result-section.active {
            display: block;
            animation: fadeIn 0.6s ease-out;
        }

        .aura-circle {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 60px currentColor, inset 0 0 30px rgba(255, 255, 255, 0.1);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .aura-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 2;
        }

        .archetype-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(28px, 6vw, 42px);
            font-weight: 700;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .archetype-description {
            font-size: 18px;
            color: #a8a8d0;
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .radar-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        svg {
            width: 280px;
            height: 280px;
        }

        .restart-btn {
            padding: 14px 32px;
            background: linear-gradient(135deg, #00d9ff 0%, #ff00ff 100%);
            border: none;
            color: #0f0f23;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Manrope', sans-serif;
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 217, 255, 0.3);
        }

        .restart-btn:active {
            transform: translateY(0);
        }

        @media (max-width: 600px) {
            .choice-buttons {
                flex-direction: column;
            }

            .choice-btn {
                min-width: auto;
            }

            .aura-circle {
                width: 160px;
                height: 160px;
            }

            svg {
                width: 240px;
                height: 240px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Magnetic Personality</h1>
            <p>Discover your archetype in 10 rapid questions</p>
        </div>

        <div class="quiz-section active" id="quizSection">
            <div class="question-card">
                <div class="progress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <span id="progressText">Question 1 of 10</span>
                </div>
                <div class="question-text" id="questionText"></div>
                <div class="choice-buttons" id="choiceButtons"></div>
            </div>
        </div>

        <div class="result-section" id="resultSection">
            <div class="aura-circle" id="auraCircle">
                <div class="aura-text" id="auraText"></div>
            </div>
            <div class="archetype-name" id="archetypeName"></div>
            <div class="archetype-description" id="archetypeDescription"></div>
            <div class="radar-container" id="radarContainer"></div>
            <button class="restart-btn" onclick="restartQuiz()">Take Quiz Again</button>
        </div>
    </div>

    <script>
        // Quiz data
        const questions = [
            { q: "When facing a new problem, do you:", a: "Analyze it logically", b: "Imagine creative solutions", dimension: 'analytical' },
            { q: "In group settings, do you:", a: "Lead the conversation", b: "Listen and observe", dimension: 'introversion' },
            { q: "Making decisions, you rely on:", a: "Facts and logic", b: "Intuition and feeling", dimension: 'logic' },
            { q: "You prefer:", a: "Structure and planning", b: "Flexibility and spontaneity", dimension: 'structure' },
            { q: "When learning, you focus on:", a: "How things work step-by-step", b: "The big picture and meaning", dimension: 'detail' },
            { q: "In conflict, you tend to:", a: "State your viewpoint directly", b: "Seek harmony and consensus", dimension: 'introversion' },
            { q: "Your ideal work environment is:", a: "Quiet and focused", b: "Collaborative and energetic", dimension: 'introversion' },
            { q: "When things go wrong, you:", a: "Troubleshoot methodically", b: "Adapt and pivot quickly", dimension: 'structure' },
            { q: "Others describe you as:", a: "Practical and grounded", b: "Imaginative and dreamy", dimension: 'analytical' },
            { q: "You're most motivated by:", a: "Mastery and competence", b: "Impact and connection", dimension: 'logic' }
        ];

        const archetypes = [
            { name: 'The Analyst', desc: 'Logical, precise, and detail-focused. You solve problems systematically and lead with data.', color: '#00d9ff', dimensions: { analytical: 90, introversion: 70, logic: 90, structure: 80, detail: 85 } },
            { name: 'The Visionary', desc: 'Creative, big-picture thinker who imagines bold possibilities. You inspire others with your ideas.', color: '#ff00ff', dimensions: { analytical: 20, introversion: 40, logic: 30, structure: 30, detail: 20 } },
            { name: 'The Diplomat', desc: 'Empathetic, collaborative, and emotionally intelligent. You build bridges and unite people.', color: '#00ff88', dimensions: { analytical: 40, introversion: 35, logic: 35, structure: 55, detail: 50 } },
            { name: 'The Pioneer', desc: 'Bold, action-oriented, and unafraid of risk. You charge forward and rally teams to your vision.', color: '#ffaa00', dimensions: { analytical: 50, introversion: 20, logic: 50, structure: 35, detail: 30 } },
            { name: 'The Architect', desc: 'Strategic, organized, and focused on execution. You build systems that last and lead with purpose.', color: '#aa00ff', dimensions: { analytical: 75, introversion: 65, logic: 70, structure: 90, detail: 75 } }
        ];

        let currentQuestion = 0;
        let scores = {
            analytical: 0,
            introversion: 0,
            logic: 0,
            structure: 0,
            detail: 0
        };

        function startQuiz() {
            currentQuestion = 0;
            scores = { analytical: 0, introversion: 0, logic: 0, structure: 0, detail: 0 };
            showQuestion();
        }

        function showQuestion() {
            if (currentQuestion >= questions.length) {
                showResult();
                return;
            }

            const q = questions[currentQuestion];
            document.getElementById('questionText').textContent = q.q;
            document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} of 10`;
            document.getElementById('progressFill').style.width = ((currentQuestion + 1) / 10 * 100) + '%';

            const btns = document.getElementById('choiceButtons');
            btns.innerHTML = '';

            const btnA = document.createElement('button');
            btnA.className = 'choice-btn';
            btnA.textContent = q.a;
            btnA.onclick = () => answerQuestion(true);

            const btnB = document.createElement('button');
            btnB.className = 'choice-btn';
            btnB.textContent = q.b;
            btnB.onclick = () => answerQuestion(false);

            btns.appendChild(btnA);
            btns.appendChild(btnB);
        }

        function answerQuestion(isA) {
            const q = questions[currentQuestion];
            if (isA) {
                scores[q.dimension] += 50;
            } else {
                scores[q.dimension] -= 50;
            }
            currentQuestion++;
            showQuestion();
        }

        function getArchetype() {
            const archetypesWithScores = archetypes.map(a => {
                let distance = 0;
                for (let dim in scores) {
                    const userVal = Math.max(0, Math.min(100, (scores[dim] + 250) / 5));
                    const archVal = a.dimensions[dim];
                    distance += Math.abs(userVal - archVal) ** 2;
                }
                return { ...a, distance: Math.sqrt(distance) };
            });
            archetypesWithScores.sort((a, b) => a.distance - b.distance);
            return archetypesWithScores[0];
        }

        function showResult() {
            const archetype = getArchetype();
            const dimensions = Object.keys(scores).map(k => Math.max(0, Math.min(100, (scores[k] + 250) / 5)));

            document.getElementById('quizSection').classList.remove('active');
            document.getElementById('resultSection').classList.add('active');

            const auraCircle = document.getElementById('auraCircle');
            auraCircle.style.color = archetype.color;
            document.getElementById('auraText').textContent = archetype.name.toUpperCase();
            document.getElementById('archetypeName').textContent = archetype.name;
            document.getElementById('archetypeDescription').textContent = archetype.desc;

            // Radar chart (SVG)
            const radarSvg = createRadarChart(dimensions, archetype.color);
            document.getElementById('radarContainer').innerHTML = radarSvg;
        }

        function createRadarChart(values, color) {
            const dims = ['Analytical', 'Introverted', 'Logical', 'Structured', 'Detailed'];
            const centerX = 140, centerY = 140, maxRadius = 100, levels = 5;

            let svg = `<svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">`;
            
            // Grid
            for (let i = 1; i <= levels; i++) {
                const r = (i / levels) * maxRadius;
                svg += `<circle cx="${centerX}" cy="${centerY}" r="${r}" fill="none" stroke="rgba(0,217,255,0.1)" stroke-width="1"/>`;
            }

            // Axes
            for (let i = 0; i < 5; i++) {
                const angle = (i * 72 - 90) * Math.PI / 180;
                const x = centerX + maxRadius * Math.cos(angle);
                const y = centerY + maxRadius * Math.sin(angle);
                svg += `<line x1="${centerX}" y1="${centerY}" x2="${x}" y2="${y}" stroke="rgba(0,217,255,0.2)" stroke-width="1"/>`;
            }

            // Data polygon
            let polygon = '';
            for (let i = 0; i < 5; i++) {
                const angle = (i * 72 - 90) * Math.PI / 180;
                const r = (values[i] / 100) * maxRadius;
                const x = centerX + r * Math.cos(angle);
                const y = centerY + r * Math.sin(angle);
                polygon += `${x},${y} `;
            }
            svg += `<polygon points="${polygon}" fill="${color}22" stroke="${color}" stroke-width="2"/>`;

            // Labels
            for (let i = 0; i < 5; i++) {
                const angle = (i * 72 - 90) * Math.PI / 180;
                const x = centerX + 120 * Math.cos(angle);
                const y = centerY + 120 * Math.sin(angle);
                svg += `<text x="${x}" y="${y}" text-anchor="middle" font-size="11" fill="#a8a8d0" font-weight="600">${dims[i]}</text>`;
            }

            svg += '</svg>';
            return svg;
        }

        function restartQuiz() {
            document.getElementById('resultSection').classList.remove('active');
            document.getElementById('quizSection').classList.add('active');
            startQuiz();
        }

        // Headless test exports (for node testing)
        if (typeof module !== 'undefined' && module.exports) {
            module.exports = { getArchetype, createRadarChart, questions, archetypes, scores };
        }

        // Start on load
        startQuiz();
    </script>
</body>
</html>
