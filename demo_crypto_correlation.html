<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Correlation Matrix</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #16213e 50%, #0f3460 100%);
      color: #e0e0e0;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
      animation: slideDown 0.6s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header h1 {
      font-size: clamp(32px, 8vw, 56px);
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #00d9ff 0%, #ffd700 50%, #00d9ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    .header p {
      font-size: 14px;
      color: #888;
      font-family: 'IBM Plex Mono', monospace;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 30px;
    }

    .heatmap-wrapper {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .heatmap-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 217, 255, 0.3);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 217, 255, 0.1);
      animation: slideUp 0.6s ease-out 0.1s both;
      overflow-x: auto;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .heatmap-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 15px;
      text-align: center;
      color: #00d9ff;
      font-family: 'IBM Plex Mono', monospace;
    }

    .matrix-container {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .matrix-labels-y {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .matrix-label-y {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 600;
      color: #00d9ff;
      font-family: 'IBM Plex Mono', monospace;
      border-bottom: 1px solid rgba(0, 217, 255, 0.1);
    }

    .matrix-wrapper {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .matrix-labels-x {
      display: grid;
      grid-template-columns: repeat(10, 40px);
      gap: 0;
      margin-bottom: 0;
    }

    .matrix-label-cell {
      width: 40px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 600;
      color: #00d9ff;
      font-family: 'IBM Plex Mono', monospace;
      border-right: 1px solid rgba(0, 217, 255, 0.1);
    }

    .matrix-grid {
      display: grid;
      gap: 0;
      background: rgba(10, 14, 39, 0.5);
      border-radius: 4px;
      overflow: hidden;
    }

    .matrix-row {
      display: grid;
      grid-template-columns: repeat(10, 40px);
      gap: 0;
    }

    .matrix-cell {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      font-family: 'IBM Plex Mono', monospace;
      cursor: default;
      border: 1px solid rgba(0, 217, 255, 0.1);
      transition: all 0.2s ease;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
    }

    .matrix-cell:hover {
      transform: scale(1.1);
      border-color: rgba(0, 217, 255, 0.6);
      box-shadow: 0 0 15px rgba(0, 217, 255, 0.4);
      z-index: 10;
    }

    /* Correlation color scale */
    .corr-cold { background: #0048a3; }
    .corr-cool { background: #0066d9; }
    .corr-neutral { background: #444; }
    .corr-warm { background: #ff9500; }
    .corr-hot { background: #ff4500; }

    .stats-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 217, 255, 0.3);
      border-radius: 8px;
      padding: 15px;
      text-align: center;
      backdrop-filter: blur(10px);
      animation: slideUp 0.6s ease-out 0.2s both;
    }

    .stat-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #ffd700;
      margin-bottom: 4px;
    }

    .stat-detail {
      font-size: 12px;
      color: #aaa;
      font-family: 'IBM Plex Mono', monospace;
    }

    .loading {
      text-align: center;
      font-size: 14px;
      color: #888;
      padding: 20px;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(0, 217, 255, 0.3);
      border-top-color: #00d9ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .legend {
      margin-top: 30px;
      animation: slideUp 0.6s ease-out 0.3s both;
    }

    .legend-title {
      font-size: 12px;
      font-weight: 600;
      color: #00d9ff;
      margin-bottom: 10px;
      text-align: center;
      font-family: 'IBM Plex Mono', monospace;
    }

    .legend-items {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .legend-swatch {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      border: 1px solid rgba(0, 217, 255, 0.3);
    }

    @media (max-width: 900px) {
      .content {
        grid-template-columns: 1fr;
      }
      .stats-section {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }

    .timestamp {
      font-size: 11px;
      color: #666;
      text-align: center;
      margin-top: 20px;
      font-family: 'IBM Plex Mono', monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Crypto Correlation Matrix</h1>
      <p>Real-time correlation analysis of 10 major cryptocurrencies (30-day window)</p>
    </div>

    <div class="content">
      <div class="heatmap-wrapper">
        <div class="heatmap-card">
          <div class="heatmap-title">Correlation Heatmap</div>
          <div class="loading" id="loadingSpinner">
            <span class="spinner"></span>Fetching live price data...
          </div>
          <div id="heatmapContainer" style="display:none;">
            <div class="matrix-container">
              <div class="matrix-labels-y" id="labelsY"></div>
              <div class="matrix-wrapper">
                <div class="matrix-labels-x" id="labelsX"></div>
                <div class="matrix-grid" id="matrixGrid"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="legend">
          <div class="legend-title">Correlation Scale</div>
          <div class="legend-items">
            <div class="legend-item">
              <div class="legend-swatch corr-cold"></div>
              <span>-1.0</span>
            </div>
            <div class="legend-item">
              <div class="legend-swatch corr-cool"></div>
              <span>-0.5</span>
            </div>
            <div class="legend-item">
              <div class="legend-swatch corr-neutral"></div>
              <span>0.0</span>
            </div>
            <div class="legend-item">
              <div class="legend-swatch corr-warm"></div>
              <span>0.5</span>
            </div>
            <div class="legend-item">
              <div class="legend-swatch corr-hot"></div>
              <span>0.8+</span>
            </div>
          </div>
        </div>
      </div>

      <div class="stats-section" id="statsSection" style="display:none;">
        <div class="stat-card">
          <div class="stat-label">Strongest</div>
          <div class="stat-value" id="strongestCorr">-</div>
          <div class="stat-detail" id="strongestPair">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Weakest</div>
          <div class="stat-value" id="weakestCorr">-</div>
          <div class="stat-detail" id="weakestPair">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Average</div>
          <div class="stat-value" id="avgCorr">-</div>
          <div class="stat-detail">All pairs</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Data</div>
          <div class="stat-value">30d</div>
          <div class="stat-detail" id="dataDate">-</div>
        </div>
      </div>
    </div>

    <div class="timestamp" id="timestamp"></div>
  </div>

  <script>
    const CRYPTOS = ['BTC', 'ETH', 'SOL', 'XRP', 'ADA', 'DOGE', 'LINK', 'MATIC', 'AVAX', 'FTM'];
    const GECKO_IDS = ['bitcoin', 'ethereum', 'solana', 'ripple', 'cardano', 'dogecoin', 'chainlink', 'matic-network', 'avalanche-2', 'fantom'];

    function calculateCorrelation(arr1, arr2) {
      const n = arr1.length;
      if (n < 2) return 0;
      const mean1 = arr1.reduce((a, b) => a + b) / n;
      const mean2 = arr2.reduce((a, b) => a + b) / n;
      let num = 0, d1 = 0, d2 = 0;
      for (let i = 0; i < n; i++) {
        const x = arr1[i] - mean1, y = arr2[i] - mean2;
        num += x * y;
        d1 += x * x;
        d2 += y * y;
      }
      return Math.sqrt(d1 * d2) === 0 ? 0 : num / Math.sqrt(d1 * d2);
    }

    function getCorrelationClass(corr) {
      if (corr < -0.3) return 'corr-cold';
      if (corr < 0) return 'corr-cool';
      if (corr < 0.3) return 'corr-neutral';
      if (corr < 0.6) return 'corr-warm';
      return 'corr-hot';
    }

    function formatCorr(corr) {
      return corr.toFixed(2);
    }

    async function fetchCryptoData() {
      const pricesByAsset = {};
      try {
        const promises = GECKO_IDS.map((id, idx) =>
          fetch(`https://api.coingecko.com/api/v3/coins/${id}/market_chart?vs_currency=usd&days=30`)
            .then(r => r.json())
            .then(data => {
              pricesByAsset[CRYPTOS[idx]] = data.prices.map(p => p[1]);
            })
            .catch(err => console.log(`${id} fetch error:`, err.message))
        );
        await Promise.all(promises);
        return Object.keys(pricesByAsset).length === CRYPTOS.length ? pricesByAsset : null;
      } catch (err) {
        console.error('Data fetch failed:', err);
        return null;
      }
    }

    function renderHeatmap(prices) {
      const list = Object.keys(prices);
      const n = list.length;
      const matrix = Array(n).fill().map(() => Array(n).fill(0));
      for (let i = 0; i < n; i++) {
        for (let j = 0; j < n; j++) {
          matrix[i][j] = i === j ? 1.0 : calculateCorrelation(prices[list[i]], prices[list[j]]);
        }
      }

      document.getElementById('labelsY').innerHTML = list.map(c => `<div class="matrix-label-y">${c}</div>`).join('');
      document.getElementById('labelsX').innerHTML = list.map(c => `<div class="matrix-label-cell">${c}</div>`).join('');
      
      const grid = document.getElementById('matrixGrid');
      grid.innerHTML = '';
      for (let i = 0; i < n; i++) {
        const row = document.createElement('div');
        row.className = 'matrix-row';
        for (let j = 0; j < n; j++) {
          const cell = document.createElement('div');
          const corr = matrix[i][j];
          cell.className = `matrix-cell ${getCorrelationClass(corr)}`;
          cell.textContent = formatCorr(corr);
          cell.title = `${list[i]}/${list[j]}: ${formatCorr(corr)}`;
          row.appendChild(cell);
        }
        grid.appendChild(row);
      }

      return matrix;
    }

    function computeStats(matrix, list) {
      let maxC = -2, minC = 2, maxP = '', minP = '', sum = 0, cnt = 0;
      for (let i = 0; i < list.length; i++) {
        for (let j = i + 1; j < list.length; j++) {
          const c = matrix[i][j];
          sum += c;
          cnt++;
          if (c > maxC) { maxC = c; maxP = `${list[i]}/${list[j]}`; }
          if (c < minC) { minC = c; minP = `${list[i]}/${list[j]}`; }
        }
      }
      return { max: maxC, maxP, min: minC, minP, avg: sum / cnt };
    }

    async function main() {
      const prices = await fetchCryptoData();
      if (!prices) {
        document.getElementById('loadingSpinner').innerHTML = '<span style="color:#ff4444;">API failed. Try again.</span>';
        return;
      }

      const list = Object.keys(prices);
      const matrix = renderHeatmap(prices);
      const stats = computeStats(matrix, list);

      document.getElementById('strongestCorr').textContent = formatCorr(stats.max);
      document.getElementById('strongestPair').textContent = stats.maxP;
      document.getElementById('weakestCorr').textContent = formatCorr(stats.min);
      document.getElementById('weakestPair').textContent = stats.minP;
      document.getElementById('avgCorr').textContent = formatCorr(stats.avg);
      document.getElementById('dataDate').textContent = new Date().toLocaleTimeString();

      document.getElementById('loadingSpinner').style.display = 'none';
      document.getElementById('heatmapContainer').style.display = 'block';
      document.getElementById('statsSection').style.display = 'grid';
      document.getElementById('timestamp').textContent = '🔄 CoinGecko API • ' + new Date().toLocaleString();
    }

    main();
  </script>
</body>
</html>
