<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Chart Live — Nocturnal Sky Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'IBM Plex Mono', monospace;
            background: radial-gradient(circle at top, #0a0e27 0%, #050812 100%);
            color: #e8ecf1;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            align-items: start;
        }
        
        @media (max-width: 1000px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
        
        header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 30px;
            animation: fadeDown 0.8s cubic-bezier(.16,1,.3,1);
        }
        
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(32px, 8vw, 64px);
            font-weight: 900;
            background: linear-gradient(135deg, #00d9ff 0%, #ff006e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        
        .subtitle {
            font-size: 13px;
            color: #7a8ba8;
            letter-spacing: 1px;
        }
        
        .main {
            animation: fadeUp 0.8s 0.15s both cubic-bezier(.16,1,.3,1);
        }
        
        .canvas-wrapper {
            position: relative;
            background: linear-gradient(135deg, rgba(5,7,30,0.8) 0%, rgba(10,14,39,0.8) 100%);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 217, 255, 0.1), inset 0 0 40px rgba(255, 0, 110, 0.05);
            backdrop-filter: blur(4px);
        }
        
        #skyCanvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: crosshair;
        }
        
        .info-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            grid-column: 1 / -1;
            margin-top: 20px;
            animation: fadeUp 0.8s 0.3s both cubic-bezier(.16,1,.3,1);
        }
        
        @media (max-width: 1000px) {
            .info-panel {
                grid-template-columns: 1fr;
            }
        }
        
        .info-card {
            background: linear-gradient(135deg, rgba(0,217,255,0.1) 0%, rgba(255,0,110,0.05) 100%);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 8px;
            padding: 16px;
            backdrop-filter: blur(4px);
            font-size: 12px;
        }
        
        .info-card-title {
            font-weight: 600;
            color: #00d9ff;
            margin-bottom: 8px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }
        
        .info-card-value {
            color: #e8ecf1;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .sidebar {
            animation: fadeUp 0.8s 0.4s both cubic-bezier(.16,1,.3,1);
        }
        
        .control-group {
            background: linear-gradient(135deg, rgba(0,217,255,0.1) 0%, rgba(255,0,110,0.05) 100%);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 8px;
            padding: 16px;
            backdrop-filter: blur(4px);
            margin-bottom: 16px;
        }
        
        .control-label {
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            font-size: 11px;
            color: #00d9ff;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        input[type="text"],
        input[type="date"],
        input[type="time"],
        select {
            width: 100%;
            padding: 8px 12px;
            background: rgba(5, 7, 30, 0.6);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 4px;
            color: #e8ecf1;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            margin-bottom: 8px;
            transition: all 0.2s;
        }
        
        input[type="text"]:focus,
        input[type="date"]:focus,
        input[type="time"]:focus,
        select:focus {
            outline: none;
            border-color: #00d9ff;
            box-shadow: 0 0 12px rgba(0, 217, 255, 0.3);
            background: rgba(5, 7, 30, 0.8);
        }
        
        button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #00d9ff 0%, #00b8cc 100%);
            border: none;
            border-radius: 4px;
            color: #0a0e27;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 217, 255, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .legend {
            background: linear-gradient(135deg, rgba(0,217,255,0.1) 0%, rgba(255,0,110,0.05) 100%);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 8px;
            padding: 16px;
            backdrop-filter: blur(4px);
        }
        
        .legend-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            font-size: 11px;
            color: #00d9ff;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            font-size: 11px;
            margin-bottom: 8px;
            color: #a8b5c8;
        }
        
        .legend-marker {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            flex-shrink: 0;
        }
        
        .magnitude-1 { background: #ffffff; }
        .magnitude-2 { background: #ffff99; }
        .magnitude-3 { background: #ffaa00; }
        .magnitude-4 { background: #ff6b35; }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #7a8ba8;
            font-size: 13px;
        }
        
        .time-slider-container {
            margin-bottom: 16px;
        }
        
        input[type="range"] {
            width: 100%;
            height: 4px;
            background: rgba(0, 217, 255, 0.2);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: linear-gradient(135deg, #00d9ff 0%, #ff006e 100%);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 8px rgba(0, 217, 255, 0.5);
        }
        
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 12px rgba(0, 217, 255, 0.8);
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: linear-gradient(135deg, #00d9ff 0%, #ff006e 100%);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 8px rgba(0, 217, 255, 0.5);
        }
        
        input[type="range"]::-moz-range-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 12px rgba(0, 217, 255, 0.8);
        }
        
        .time-display {
            font-size: 11px;
            color: #00d9ff;
            text-align: center;
            margin-top: 6px;
            font-family: 'Orbitron', sans-serif;
        }
        
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>★ STAR CHART LIVE</h1>
            <p class="subtitle">NOCTURNAL SKY VIEWER — REAL-TIME STELLAR POSITIONS</p>
        </header>
        
        <div class="main">
            <div class="canvas-wrapper">
                <canvas id="skyCanvas"></canvas>
            </div>
            
            <div class="info-panel">
                <div class="info-card">
                    <div class="info-card-title">📍 LOCATION</div>
                    <div class="info-card-value" id="locationInfo">Melbourne, VIC</div>
                </div>
                <div class="info-card">
                    <div class="info-card-title">⏰ OBSERVATION TIME</div>
                    <div class="info-card-value" id="timeInfo">Calculating...</div>
                </div>
                <div class="info-card">
                    <div class="info-card-title">🌙 MOON PHASE</div>
                    <div class="info-card-value" id="moonInfo">Calculating...</div>
                </div>
                <div class="info-card">
                    <div class="info-card-title">⭐ VISIBLE STARS</div>
                    <div class="info-card-value" id="starCount">Loading...</div>
                </div>
            </div>
        </div>
        
        <div class="sidebar">
            <div class="control-group">
                <label class="control-label">City Lookup</label>
                <input type="text" id="cityInput" placeholder="e.g., Tokyo, Sydney, NYC">
                <button onclick="searchCity()">Search Location</button>
            </div>
            
            <div class="control-group">
                <label class="control-label">Date</label>
                <input type="date" id="dateInput">
            </div>
            
            <div class="control-group">
                <label class="control-label">Time of Night</label>
                <input type="time" id="timeInput">
                <div class="time-slider-container">
                    <input type="range" id="timeSlider" min="0" max="24" step="0.5" value="22">
                    <div class="time-display" id="timeDisplay">22:00</div>
                </div>
            </div>
            
            <div class="legend">
                <div class="legend-title">STAR MAGNITUDE</div>
                <div class="legend-item">
                    <div class="legend-marker magnitude-1"></div>
                    <span>Mag 0–2 (Brightest)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-marker magnitude-2"></div>
                    <span>Mag 2–4</span>
                </div>
                <div class="legend-item">
                    <div class="legend-marker magnitude-3"></div>
                    <span>Mag 4–6</span>
                </div>
                <div class="legend-item">
                    <div class="legend-marker magnitude-4"></div>
                    <span>Mag 6+ (Faintest visible)</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Bright star database (26 brightest stars with RA, Dec, magnitude, name)
        const STARS = [
            {ra:0.68,dec:16.51,mag:0.5,name:"Alrescha"},{ra:0.94,dec:60.72,mag:2.5,name:"Polaris Australis"},{ra:1.46,dec:88.96,mag:1.97,name:"Polaris"},{ra:3.37,dec:24.11,mag:0.85,name:"Sheratan"},{ra:5.92,dec:53.90,mag:1.63,name:"Capella"},{ra:5.28,dec:6.35,mag:2.76,name:"Nath"},{ra:5.44,dec:-2.40,mag:0.16,name:"Betelgeuse"},{ra:5.55,dec:7.41,mag:1.64,name:"Alnitak"},{ra:5.60,dec:-1.20,mag:0.12,name:"Rigel"},{ra:7.69,dec:5.17,mag:0.4,name:"Sirius"},{ra:7.94,dec:28.03,mag:1.30,name:"Procyon"},{ra:9.88,dec:-40.30,mag:0.61,name:"Canopus"},{ra:10.27,dec:19.18,mag:0.98,name:"Pollux"},{ra:10.46,dec:11.86,mag:1.14,name:"Castor"},{ra:11.09,dec:14.57,mag:1.95,name:"Regulus"},{ra:12.26,dec:63.06,mag:0.04,name:"Arcturus"},{ra:13.41,dec:-60.84,mag:0.77,name:"Alpha Centauri"},{ra:14.81,dec:62.41,mag:1.86,name:"Eltanin"},{ra:15.34,dec:-52.70,mag:0.61,name:"Agena"},{ra:16.20,dec:-19.82,mag:0.77,name:"Antares"},{ra:16.49,dec:36.76,mag:0.03,name:"Vega"},{ra:17.96,dec:-27.13,mag:0.98,name:"Shaula"},{ra:18.36,dec:38.78,mag:0.76,name:"Deneb"},{ra:19.85,dec:27.86,mag:0.96,name:"Altair"},{ra:21.44,dec:9.67,mag:2.04,name:"Enif"},{ra:23.15,dec:90.27,mag:2.02,name:"Polaris Minor"}
        ];

        let currentLat = -37.81;
        let currentLon = 144.96;
        let currentDate = new Date();
        let currentHour = 22;
        let mouseX = 0, mouseY = 0;
        let hoveredStar = null;

        const canvas = document.getElementById('skyCanvas');
        const ctx = canvas.getContext('2d');
        const cityInput = document.getElementById('cityInput');
        const dateInput = document.getElementById('dateInput');
        const timeInput = document.getElementById('timeInput');
        const timeSlider = document.getElementById('timeSlider');
        const timeDisplay = document.getElementById('timeDisplay');

        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = wrapper.clientWidth * dpr;
            canvas.height = Math.min(600, wrapper.clientWidth * 0.75) * dpr;
            ctx.scale(dpr, dpr);
        }

        function drawSky() {
            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);
            
            // Gradient sky
            const gradient = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h));
            gradient.addColorStop(0, '#1a1a3a');
            gradient.addColorStop(0.5, '#0a0e27');
            gradient.addColorStop(1, '#050812');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, w, h);
            
            // Draw stars
            const visibleCount = STARS.filter(star => {
                const alt = calculateAltitude(star.ra, star.dec, currentLat, currentLon, currentHour);
                return alt > 0;
            }).length;
            
            document.getElementById('starCount').textContent = `${visibleCount} stars above horizon`;
            
            // Draw horizon
            ctx.strokeStyle = 'rgba(0, 217, 255, 0.15)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, h/2);
            ctx.lineTo(w, h/2);
            ctx.stroke();
            
            // Draw cardinal directions
            ctx.fillStyle = 'rgba(122, 139, 168, 0.6)';
            ctx.font = '11px "IBM Plex Mono"';
            ctx.textAlign = 'center';
            ctx.fillText('N', w/2, 20);
            ctx.fillText('S', w/2, h-10);
            ctx.textAlign = 'left';
            ctx.fillText('E', w-20, h/2+4);
            ctx.textAlign = 'right';
            ctx.fillText('W', 20, h/2+4);
            
            // Draw stars
            STARS.forEach(star => {
                const alt = calculateAltitude(star.ra, star.dec, currentLat, currentLon, currentHour);
                if (alt < 0) return; // Below horizon
                
                const azim = calculateAzimuth(star.ra, star.dec, currentLat, currentLon, currentHour);
                const x = w/2 + (azim - 180) / 180 * (w/2);
                const y = h/2 - alt / 90 * (h/2);
                
                // Size by magnitude (brighter = larger)
                const size = Math.max(1, 4 - star.mag * 0.5);
                
                // Color by magnitude
                let color;
                if (star.mag < 2) color = '#ffffff';
                else if (star.mag < 4) color = '#ffff99';
                else if (star.mag < 6) color = '#ffaa00';
                else color = '#ff6b35';
                
                ctx.fillStyle = color;
                ctx.shadowColor = color;
                ctx.shadowBlur = size * 2;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
                
                // Check hover
                if (hoveredStar && hoveredStar.name === star.name) {
                    ctx.strokeStyle = 'rgba(0, 217, 255, 0.8)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(x, y, size + 4, 0, Math.PI * 2);
                    ctx.stroke();
                    
                    ctx.fillStyle = '#00d9ff';
                    ctx.font = 'bold 12px "IBM Plex Mono"';
                    ctx.textAlign = 'left';
                    ctx.fillText(star.name, x + 8, y - 4);
                }
            });
            
            ctx.shadowColor = 'transparent';
        }

        function calculateAltitude(ra, dec, lat, lon, hour) {
            const d2r = Math.PI / 180;
            const decRad = dec * d2r;
            const latRad = lat * d2r;
            const hourAngle = (hour * 15 - lon) * d2r;
            
            const sinAlt = Math.sin(decRad) * Math.sin(latRad) + Math.cos(decRad) * Math.cos(latRad) * Math.cos(hourAngle);
            return Math.asin(Math.max(-1, Math.min(1, sinAlt))) / d2r;
        }

        function calculateAzimuth(ra, dec, lat, lon, hour) {
            const d2r = Math.PI / 180;
            const decRad = dec * d2r;
            const latRad = lat * d2r;
            const hourAngle = (hour * 15 - lon) * d2r;
            
            const sinAz = -Math.sin(hourAngle) * Math.cos(decRad);
            const cosAz = Math.sin(decRad) * Math.cos(latRad) - Math.cos(decRad) * Math.sin(latRad) * Math.cos(hourAngle);
            return Math.atan2(sinAz, cosAz) / d2r + 180;
        }

        function updateTimeDisplay() {
            const hour = parseInt(timeSlider.value);
            const min = (timeSlider.value % 1) * 60;
            timeDisplay.textContent = `${String(hour).padStart(2, '0')}:${String(Math.round(min)).padStart(2, '0')}`;
            document.getElementById('timeInfo').textContent = timeDisplay.textContent;
            currentHour = parseFloat(timeSlider.value);
            drawSky();
        }

        function updateMoonInfo() {
            const phase = calculateMoonPhase(currentDate);
            const phases = ['🌑 New', '🌒 Waxing', '🌓 First Quarter', '🌔 Waxing', '🌕 Full', '🌖 Waning', '🌗 Last Quarter', '🌘 Waning'];
            document.getElementById('moonInfo').textContent = phases[Math.floor(phase * 8)];
        }

        function calculateMoonPhase(date) {
            const ref = new Date(2000, 0, 6, 18, 14, 0);
            const ms = date - ref;
            const cycle = 29.530588861 * 24 * 60 * 60 * 1000;
            return ((ms % cycle) + cycle) % cycle / cycle;
        }

        async function searchCity() {
            const city = cityInput.value.trim();
            if (!city) return;
            
            try {
                const response = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
                const data = await response.json();
                if (data.results && data.results[0]) {
                    currentLat = data.results[0].latitude;
                    currentLon = data.results[0].longitude;
                    const name = data.results[0].name;
                    const admin = data.results[0].admin1 || '';
                    const country = data.results[0].country || '';
                    document.getElementById('locationInfo').textContent = `${name}${admin ? ', ' + admin : ''}${country ? ', ' + country : ''}`;
                    drawSky();
                }
            } catch (e) {
                console.error('Geocode error:', e);
            }
        }

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
            
            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);
            
            hoveredStar = null;
            STARS.forEach(star => {
                const alt = calculateAltitude(star.ra, star.dec, currentLat, currentLon, currentHour);
                if (alt < 0) return;
                const azim = calculateAzimuth(star.ra, star.dec, currentLat, currentLon, currentHour);
                const x = w/2 + (azim - 180) / 180 * (w/2);
                const y = h/2 - alt / 90 * (h/2);
                
                const dist = Math.hypot(mouseX - x, mouseY - y);
                if (dist < 12) hoveredStar = star;
            });
            drawSky();
        });

        canvas.addEventListener('mouseleave', () => {
            hoveredStar = null;
            drawSky();
        });

        timeSlider.addEventListener('input', updateTimeDisplay);
        
        window.addEventListener('resize', () => {
            resizeCanvas();
            drawSky();
        });

        // Initialize
        const today = new Date();
        dateInput.valueAsDate = today;
        resizeCanvas();
        updateMoonInfo();
        updateTimeDisplay();
        drawSky();
    </script>
</body>
</html>
