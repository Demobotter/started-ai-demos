<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wind Compass — Live Direction & Speed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Manrope', sans-serif;
      overflow: hidden;
    }

    body {
      background: linear-gradient(135deg, #0a0f1f 0%, #1a1a3e 25%, #0f1a2e 50%, #1a0f2e 75%, #0a0f1f 100%);
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
      max-width: 500px;
      width: 100%;
      animation: heroSlideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes heroSlideDown {
      from {
        opacity: 0;
        transform: translateY(-40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero {
      text-align: center;
      animation: subtitleFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
      opacity: 0;
    }

    @keyframes subtitleFade {
      to {
        opacity: 1;
      }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(48px, 8vw, 72px);
      font-weight: 700;
      background: linear-gradient(90deg, #00d4ff, #ff00d4, #00d4ff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 1rem;
      color: #a0a0b0;
      font-weight: 400;
    }

    .input-section {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      animation: inputFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
      opacity: 0;
    }

    @keyframes inputFade {
      to {
        opacity: 1;
      }
    }

    label {
      font-size: 0.875rem;
      color: #00d4ff;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"] {
      padding: 0.875rem 1.25rem;
      border: 2px solid #00d4ff;
      background: rgba(10, 15, 31, 0.6);
      color: #fff;
      font-family: 'Manrope', sans-serif;
      font-size: 1rem;
      border-radius: 8px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      backdrop-filter: blur(8px);
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #ff00d4;
      box-shadow: 0 0 24px rgba(255, 0, 212, 0.4);
      background: rgba(10, 15, 31, 0.8);
    }

    button {
      padding: 0.75rem 2rem;
      background: linear-gradient(90deg, #00d4ff, #ff00d4);
      border: none;
      color: #0a0f1f;
      font-family: 'Manrope', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 16px rgba(0, 212, 255, 0.3);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(255, 0, 212, 0.5);
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(255, 0, 212, 0.3);
    }

    .compass-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      width: 100%;
      animation: compassFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
      opacity: 0;
    }

    @keyframes compassFade {
      to {
        opacity: 1;
      }
    }

    .compass-wrapper {
      position: relative;
      width: 280px;
      height: 280px;
      border: 2px solid #00d4ff;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, rgba(10, 15, 31, 0.4) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 32px rgba(0, 212, 255, 0.2), inset 0 0 32px rgba(255, 0, 212, 0.05);
    }

    .cardinal {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      font-weight: 700;
      color: #00d4ff;
      letter-spacing: 0.05em;
    }

    .cardinal.n { top: 16px; }
    .cardinal.s { bottom: 16px; }
    .cardinal.e { right: 16px; }
    .cardinal.w { left: 16px; }

    .compass-rose {
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      opacity: 0.4;
      pointer-events: none;
    }

    .needle {
      position: absolute;
      width: 8px;
      height: 120px;
      background: linear-gradient(180deg, #ff00d4 0%, #00d4ff 100%);
      border-radius: 4px;
      top: 50%;
      left: 50%;
      transform-origin: center -60px;
      transform: translateX(-50%) rotate(0deg);
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 16px rgba(255, 0, 212, 0.6);
    }

    .center-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff00d4;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      box-shadow: 0 0 12px rgba(255, 0, 212, 0.8);
    }

    .data-display {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      width: 100%;
    }

    .data-card {
      padding: 1.5rem;
      border: 2px solid #00d4ff;
      border-radius: 12px;
      background: rgba(10, 15, 31, 0.5);
      backdrop-filter: blur(8px);
      text-align: center;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .data-card:hover {
      border-color: #ff00d4;
      box-shadow: 0 0 24px rgba(255, 0, 212, 0.3);
      background: rgba(10, 15, 31, 0.7);
    }

    .data-label {
      font-size: 0.75rem;
      color: #a0a0b0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .data-value {
      font-size: 2rem;
      font-weight: 700;
      color: #00d4ff;
      font-family: 'Manrope', sans-serif;
    }

    .data-unit {
      font-size: 0.875rem;
      color: #ff00d4;
      margin-top: 0.25rem;
      font-weight: 500;
    }

    .status {
      font-size: 0.875rem;
      color: #a0a0b0;
      text-align: center;
      min-height: 1.5rem;
      animation: statusPulse 0.8s ease-in-out;
    }

    @keyframes statusPulse {
      0%, 100% { color: #a0a0b0; }
      50% { color: #ff00d4; }
    }

    .hidden {
      display: none;
    }

    .loading {
      display: inline-block;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .container {
        gap: 2rem;
      }
      h1 {
        font-size: clamp(36px, 7vw, 56px);
      }
      .compass-wrapper {
        width: 240px;
        height: 240px;
      }
      .data-display {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Wind Compass</h1>
      <p class="subtitle">Real-time wind direction & speed</p>
    </div>

    <div class="input-section">
      <label for="cityInput">Enter a city</label>
      <input type="text" id="cityInput" placeholder="e.g., London, Tokyo, Sydney" autocomplete="off">
      <button id="searchBtn">Get Wind Data</button>
      <div class="status" id="status"></div>
    </div>

    <div class="compass-section hidden" id="compassSection">
      <div class="compass-wrapper">
        <svg class="compass-rose" viewBox="0 0 240 240">
          <circle cx="120" cy="120" r="110" stroke="#00d4ff" stroke-width="0.5" fill="none" opacity="0.3"/>
          <circle cx="120" cy="120" r="80" stroke="#ff00d4" stroke-width="0.5" fill="none" opacity="0.2"/>
          <circle cx="120" cy="120" r="50" stroke="#00d4ff" stroke-width="0.5" fill="none" opacity="0.2"/>
          <line x1="120" y1="10" x2="120" y2="30" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
          <line x1="120" y1="210" x2="120" y2="230" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
          <line x1="10" y1="120" x2="30" y2="120" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
          <line x1="210" y1="120" x2="230" y2="120" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
        </svg>
        <div class="cardinal n">N</div>
        <div class="cardinal s">S</div>
        <div class="cardinal e">E</div>
        <div class="cardinal w">W</div>
        <div class="needle" id="needle"></div>
        <div class="center-dot"></div>
      </div>

      <div class="data-display">
        <div class="data-card">
          <div class="data-label">Direction</div>
          <div class="data-value" id="directionValue">—</div>
          <div class="data-unit" id="directionCardinal">—</div>
        </div>
        <div class="data-card">
          <div class="data-label">Speed</div>
          <div class="data-value" id="speedValue">—</div>
          <div class="data-unit">km/h</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const cityInput = document.getElementById('cityInput');
    const searchBtn = document.getElementById('searchBtn');
    const status = document.getElementById('status');
    const compassSection = document.getElementById('compassSection');
    const needle = document.getElementById('needle');
    const directionValue = document.getElementById('directionValue');
    const directionCardinal = document.getElementById('directionCardinal');
    const speedValue = document.getElementById('speedValue');

    const CARDINALS = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];

    function normalizeDirection(deg) {
      return ((deg % 360) + 360) % 360;
    }

    function getCardinalLabel(deg) {
      const normalized = normalizeDirection(deg);
      const index = Math.round(normalized / 22.5) % 16;
      return CARDINALS[index];
    }

    function formatSpeed(ms) {
      return (ms * 3.6).toFixed(1);
    }

    async function fetchWindData(city) {
      try {
        status.innerHTML = '<span class="loading">⟳</span> Fetching...';
        
        // Geocode city to lat/lon via Open-Meteo
        const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
        if (!geoRes.ok) throw new Error('Geocode failed');
        
        const geoData = await geoRes.json();
        if (!geoData.results || geoData.results.length === 0) {
          status.textContent = '❌ City not found. Try again.';
          compassSection.classList.add('hidden');
          return;
        }

        const { latitude, longitude, name, country } = geoData.results[0];

        // Fetch weather data
        const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=wind_direction_10m,wind_speed_10m&timezone=auto`);
        if (!weatherRes.ok) throw new Error('Weather fetch failed');

        const weatherData = await weatherRes.json();
        const { wind_direction_10m, wind_speed_10m } = weatherData.current;

        // Update UI
        const direction = normalizeDirection(wind_direction_10m);
        const cardinal = getCardinalLabel(direction);
        const speed = formatSpeed(wind_speed_10m);

        needle.style.transform = `translateX(-50%) rotate(${direction}deg)`;
        directionValue.textContent = direction.toFixed(0) + '°';
        directionCardinal.textContent = cardinal;
        speedValue.textContent = speed;

        status.textContent = `✅ ${name}, ${country}`;
        compassSection.classList.remove('hidden');
      } catch (err) {
        status.textContent = '❌ Error fetching data. Check city name.';
        compassSection.classList.add('hidden');
        console.error(err);
      }
    }

    searchBtn.addEventListener('click', () => {
      const city = cityInput.value.trim();
      if (city) {
        fetchWindData(city);
      } else {
        status.textContent = '⚠️ Enter a city name.';
      }
    });

    cityInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        searchBtn.click();
      }
    });

    // Demo on load: London
    window.addEventListener('load', () => {
      cityInput.value = 'London';
      setTimeout(() => fetchWindData('London'), 500);
    });
  </script>
</body>
</html>
