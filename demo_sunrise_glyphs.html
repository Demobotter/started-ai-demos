<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunrise Glyphs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Source Sans 3', sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #2d1b4e 100%);
      overflow-x: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
      position: relative;
    }
    /* Subtle animated bg texture */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(255, 179, 71, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(147, 51, 234, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 1;
    }
    .container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      max-width: 900px;
      width: 100%;
    }
    /* Hero section */
    .hero {
      text-align: center;
      animation: heroSlide 0.8s cubic-bezier(0.16, 1, 0.3, 1) backwards;
    }
    @keyframes heroSlide {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(48px, 10vw, 72px);
      font-weight: 700;
      color: #ffb347;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 10px;
      text-shadow: 0 0 30px rgba(255, 179, 71, 0.3);
    }
    .subtitle {
      font-size: 16px;
      color: #999;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 10px;
    }
    /* Input section */
    .input-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s backwards;
      width: 100%;
      max-width: 500px;
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    input {
      width: 100%;
      padding: 14px 18px;
      font-size: 16px;
      border: 2px solid rgba(255, 179, 71, 0.3);
      background: rgba(10, 14, 39, 0.6);
      color: #fff;
      border-radius: 8px;
      font-family: 'Source Sans 3', sans-serif;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    input:focus {
      outline: none;
      border-color: #ffb347;
      background: rgba(10, 14, 39, 0.8);
      box-shadow: 0 0 20px rgba(255, 179, 71, 0.2);
    }
    input::placeholder {
      color: #666;
    }
    .button-group {
      display: flex;
      gap: 12px;
      width: 100%;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      border: 2px solid rgba(255, 179, 71, 0.4);
      background: rgba(255, 179, 71, 0.1);
      color: #ffb347;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Source Sans 3', sans-serif;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    button:hover {
      border-color: #ffb347;
      background: rgba(255, 179, 71, 0.2);
      box-shadow: 0 0 15px rgba(255, 179, 71, 0.3);
      transform: translateY(-2px);
    }
    button:active {
      transform: translateY(0);
      box-shadow: 0 0 25px rgba(255, 179, 71, 0.4);
    }
    /* Glyph display */
    .glyph-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      width: 100%;
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.4s backwards;
    }
    .glyph-card {
      background: rgba(10, 14, 39, 0.7);
      border: 2px solid rgba(255, 179, 71, 0.2);
      border-radius: 12px;
      padding: 30px;
      backdrop-filter: blur(10px);
      text-align: center;
      transition: all 0.3s ease;
    }
    .glyph-card:hover {
      border-color: rgba(255, 179, 71, 0.5);
      box-shadow: 0 0 30px rgba(255, 179, 71, 0.2);
      transform: translateY(-4px);
    }
    .glyph-canvas {
      width: 100%;
      height: 200px;
      margin-bottom: 20px;
    }
    .glyph-label {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .glyph-time {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: #ffb347;
      margin-bottom: 8px;
    }
    .glyph-detail {
      font-size: 13px;
      color: #aaa;
    }
    /* Location display */
    .location-info {
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-bottom: 20px;
    }
    .location-info .lat-lon {
      color: #ffb347;
      font-family: monospace;
      font-weight: 600;
    }
    /* Status */
    .status {
      font-size: 13px;
      color: #999;
      min-height: 20px;
      text-align: center;
    }
    .status.error {
      color: #ff6b6b;
    }
    .status.success {
      color: #51cf66;
    }
    /* Responsive */
    @media (max-width: 700px) {
      .glyph-section {
        grid-template-columns: 1fr;
        gap: 24px;
      }
      .glyph-card {
        padding: 20px;
      }
      h1 {
        font-size: 40px;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .hero, .input-section, .glyph-section {
        animation: none;
      }
      .glyph-card {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Sunrise Glyphs</h1>
      <p class="subtitle">Celestial Light Visualization</p>
    </div>

    <div class="input-section">
      <input 
        type="text" 
        id="cityInput" 
        placeholder="Enter city name (e.g., Melbourne, Tokyo, New York)"
      >
      <div class="button-group">
        <button id="searchBtn">Search</button>
        <button id="geoBtn">Use My Location</button>
      </div>
      <div class="status" id="status"></div>
      <div class="location-info" id="locationInfo"></div>
    </div>

    <div class="glyph-section">
      <div class="glyph-card">
        <div class="glyph-label">🌅 Sunrise</div>
        <canvas id="sunriseCanvas" class="glyph-canvas"></canvas>
        <div class="glyph-time" id="sunriseTime">—:—</div>
        <div class="glyph-detail" id="sunriseDetail">—</div>
      </div>

      <div class="glyph-card">
        <div class="glyph-label">🌆 Sunset</div>
        <canvas id="sunsetCanvas" class="glyph-canvas"></canvas>
        <div class="glyph-time" id="sunsetTime">—:—</div>
        <div class="glyph-detail" id="sunsetDetail">—</div>
      </div>
    </div>
  </div>

  <script>
    // Hard-coded city database for demo
    const CITIES = {
      melbourne: { lat: -37.814, lon: 144.963, name: 'Melbourne, Australia' },
      sydney: { lat: -33.8688, lon: 151.2093, name: 'Sydney, Australia' },
      tokyo: { lat: 35.6762, lon: 139.6503, name: 'Tokyo, Japan' },
      london: { lat: 51.5074, lon: -0.1278, name: 'London, UK' },
      newyork: { lat: 40.7128, lon: -74.0060, name: 'New York, USA' },
      paris: { lat: 48.8566, lon: 2.3522, name: 'Paris, France' },
      mumbai: { lat: 19.0760, lon: 72.8777, name: 'Mumbai, India' },
      dubai: { lat: 25.2048, lon: 55.2708, name: 'Dubai, UAE' },
    };

    let currentLat = -37.814, currentLon = 144.963, currentCity = 'Melbourne';

    // Simple sunrise/sunset calculation (approximate for demo)
    function calculateSunTimes(lat, lon, date = new Date()) {
      const J2000 = 2451545.0;
      const jd = (date.getTime() / 86400000) + 2440587.5;
      const n = jd - J2000;
      
      const L = (280.46646 + 0.04856769 * n) % 360;
      const g = (357.52911 + 0.0328794 * n) % 360;
      const e = 0.016708634 - 0.000042037 * (n / 36525);
      
      const C = ((1.914602 - 0.004817 * (n / 36525)) * Math.sin(g * Math.PI / 180) +
                (0.019993 - 0.000101 * (n / 36525)) * Math.sin(2 * g * Math.PI / 180) +
                0.000293 * Math.sin(3 * g * Math.PI / 180));
      
      const theta = (L + C) % 360;
      const v = theta + 102.94719;
      const lambda = (v - 0.00569) % 360;
      
      const jTransit = J2000 + 0.0053 + 0.0061 * Math.sin((lon + lambda) * Math.PI / 180);
      
      const angle = Math.asin(Math.sin(-0.833 * Math.PI / 180) / Math.cos(lat * Math.PI / 180) / Math.cos(0));
      const cosH = -Math.tan(lat * Math.PI / 180) * Math.tan(Math.asin(Math.sin(lambda * Math.PI / 180) * Math.sin(23.44 * Math.PI / 180)));
      const H = Math.acos(Math.min(1, Math.max(-1, cosH))) * 180 / Math.PI / 15;
      
      const jRise = jTransit - H / 24;
      const jSet = jTransit + H / 24;
      
      const d = (jRise - 2451545) % 1;
      const sunrise = new Date((d + 0.5) * 86400000 + date.getTime() - (date.getTime() % 86400000));
      
      const d2 = (jSet - 2451545) % 1;
      const sunset = new Date((d2 + 0.5) * 86400000 + date.getTime() - (date.getTime() % 86400000));
      
      return { sunrise, sunset };
    }

    // Format time HH:MM
    function formatTime(date) {
      const h = String(date.getHours()).padStart(2, '0');
      const m = String(date.getMinutes()).padStart(2, '0');
      return `${h}:${m}`;
    }

    // Draw glyph on canvas
    function drawGlyph(canvas, sunTime, label) {
      const ctx = canvas.getContext('2d');
      const w = canvas.width = canvas.offsetWidth * window.devicePixelRatio;
      const h = canvas.height = canvas.offsetHeight * window.devicePixelRatio;
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
      
      const realW = canvas.offsetWidth;
      const realH = canvas.offsetHeight;
      const cx = realW / 2;
      const cy = realH / 2;
      
      // Clear
      ctx.fillStyle = 'transparent';
      ctx.fillRect(0, 0, realW, realH);
      
      // Outer arc (celestial horizon)
      ctx.strokeStyle = 'rgba(255, 179, 71, 0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, 60, 0, Math.PI, true);
      ctx.stroke();
      
      // Solar position glyph
      const hour = sunTime.getHours() + sunTime.getMinutes() / 60;
      const angle = ((hour - 6) / 12) * Math.PI;
      const sx = cx + Math.cos(angle) * 60;
      const sy = cy - Math.sin(angle) * 60;
      
      // Sun circle
      ctx.fillStyle = '#ffb347';
      ctx.beginPath();
      ctx.arc(sx, sy, 12, 0, Math.PI * 2);
      ctx.fill();
      
      // Glow
      ctx.fillStyle = 'rgba(255, 179, 71, 0.2)';
      ctx.beginPath();
      ctx.arc(sx, sy, 20, 0, Math.PI * 2);
      ctx.fill();
      
      // Connect to horizon
      ctx.strokeStyle = 'rgba(255, 179, 71, 0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx, cy);
      ctx.stroke();
    }

    // Update display
    function updateDisplay(lat, lon, city) {
      currentLat = lat;
      currentLon = lon;
      currentCity = city;
      
      const { sunrise, sunset } = calculateSunTimes(lat, lon);
      
      // Update UI
      document.getElementById('sunriseTime').textContent = formatTime(sunrise);
      document.getElementById('sunsetTime').textContent = formatTime(sunset);
      
      const dayLength = (sunset - sunrise) / (1000 * 60);
      const hours = Math.floor(dayLength / 60);
      const mins = dayLength % 60;
      
      document.getElementById('sunriseDetail').textContent = `Rises at ${formatTime(sunrise)}`;
      document.getElementById('sunsetDetail').textContent = `Sets at ${formatTime(sunset)}`;
      
      document.getElementById('locationInfo').innerHTML = 
        `<div>${city}</div><div class="lat-lon">Lat ${lat.toFixed(2)}° / Lon ${lon.toFixed(2)}°</div><div style="margin-top: 6px; color: #ffb347;">Day length: ${hours}h ${Math.round(mins)}m</div>`;
      
      drawGlyph(document.getElementById('sunriseCanvas'), sunrise, 'Rise');
      drawGlyph(document.getElementById('sunsetCanvas'), sunset, 'Set');
      
      document.getElementById('status').textContent = '';
      document.getElementById('status').className = 'status';
    }

    // Event handlers
    document.getElementById('searchBtn').addEventListener('click', () => {
      const input = document.getElementById('cityInput').value.trim().toLowerCase();
      if (CITIES[input]) {
        const c = CITIES[input];
        updateDisplay(c.lat, c.lon, c.name);
        document.getElementById('status').textContent = '';
      } else {
        document.getElementById('status').textContent = 'City not found. Try: melbourne, tokyo, london, newyork';
        document.getElementById('status').className = 'status error';
      }
    });

    document.getElementById('geoBtn').addEventListener('click', () => {
      if (navigator.geolocation) {
        document.getElementById('status').textContent = 'Locating...';
        document.getElementById('status').className = 'status';
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            updateDisplay(pos.coords.latitude, pos.coords.longitude, 'Your Location');
          },
          (err) => {
            document.getElementById('status').textContent = 'Geolocation denied. Using Melbourne.';
            document.getElementById('status').className = 'status error';
            updateDisplay(-37.814, 144.963, 'Melbourne');
          }
        );
      }
    });

    document.getElementById('cityInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('searchBtn').click();
    });

    // Init with Melbourne
    updateDisplay(-37.814, 144.963, 'Melbourne, Australia');
  </script>
</body>
</html>
