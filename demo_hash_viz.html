<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hash Visualizer — Real-Time Cryptographic Hash Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Lexend', sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a0a2e 50%, #0f1e3f 100%);
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* Starfield */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(2px 2px at 20px 30px, #0ff, rgba(0,255,255,0.2)),
        radial-gradient(2px 2px at 60px 70px, #f0f, rgba(255,0,255,0.2)),
        radial-gradient(1px 1px at 50px 50px, #0ff, rgba(0,255,255,0.15)),
        radial-gradient(1px 1px at 130px 80px, #f0f, rgba(255,0,255,0.15));
      background-size: 200px 200px;
      background-repeat: repeat;
      pointer-events: none;
      opacity: 0.3;
      z-index: -1;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      animation: containerFadeIn 0.6s ease-out 0.2s both;
    }

    @keyframes containerFadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero {
      text-align: center;
      margin-bottom: 40px;
      animation: heroSlideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes heroSlideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero h1 {
      font-size: clamp(36px, 8vw, 60px);
      font-weight: 700;
      background: linear-gradient(90deg, #0ff, #f0f, #0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .hero p {
      color: #a0a0b0;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 32px;
      animation: gridFadeIn 0.6s ease-out 0.3s both;
    }

    @keyframes gridFadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .panel {
      backdrop-filter: blur(20px);
      background: rgba(15, 30, 63, 0.4);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .panel.input-panel {
      border-left: 3px solid #0ff;
    }

    .panel.output-panel {
      border-left: 3px solid #f0f;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #0ff;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      height: 140px;
      background: rgba(10, 15, 40, 0.8);
      border: 1px solid rgba(0, 255, 255, 0.4);
      border-radius: 8px;
      color: #0ff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 12px;
      resize: none;
      outline: none;
      transition: all 0.3s ease;
      line-height: 1.5;
    }

    textarea:focus {
      border-color: #0ff;
      box-shadow: 0 0 16px rgba(0, 255, 255, 0.3);
    }

    textarea::placeholder {
      color: #506090;
    }

    .hash-display {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .hash-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hash-label {
      font-size: 11px;
      font-weight: 600;
      color: #a0a0b0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      width: 50px;
    }

    .hash-value {
      flex: 1;
      background: rgba(10, 15, 40, 0.9);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 6px;
      padding: 8px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #0ff;
      word-break: break-all;
      line-height: 1.3;
      max-height: 60px;
      overflow-y: auto;
    }

    .hash-value.empty {
      color: #506090;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-box {
      background: rgba(10, 15, 40, 0.6);
      border-left: 2px solid #0ff;
      border-radius: 6px;
      padding: 12px;
    }

    .stat-label {
      font-size: 11px;
      color: #a0a0b0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: #0ff;
    }

    .stat-box:nth-child(2n) {
      border-left-color: #f0f;
    }

    .stat-box:nth-child(2n) .stat-value {
      color: #f0f;
    }

    .gradient-preview {
      height: 40px;
      border-radius: 8px;
      border: 1px solid rgba(0, 255, 255, 0.2);
      background: linear-gradient(90deg, #000, #0ff);
      margin-bottom: 16px;
      animation: gradientPulse 2s ease-in-out infinite;
    }

    @keyframes gradientPulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }

    .gradient-preview.active {
      background: linear-gradient(90deg, #0ff, #f0f, #0ff, #f0f);
    }

    .grid-section {
      margin-top: 28px;
      animation: gridSectionFadeIn 0.6s ease-out 0.4s both;
    }

    @keyframes gridSectionFadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .grid-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a0a0b0;
      margin-bottom: 12px;
    }

    .bit-grid {
      display: grid;
      grid-template-columns: repeat(16, 1fr);
      gap: 4px;
      padding: 12px;
      background: rgba(10, 15, 40, 0.6);
      border-radius: 8px;
      border: 1px solid rgba(0, 255, 255, 0.1);
    }

    .bit {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 600;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      cursor: default;
      background: rgba(0, 0, 0, 0.4);
      color: #506090;
      transition: all 0.2s ease;
    }

    .bit.on {
      background: #0ff;
      color: #0a0e27;
      box-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-family: 'Lexend', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      text-transform: uppercase;
    }

    .btn-clear {
      background: rgba(255, 0, 255, 0.1);
      color: #f0f;
      border: 1px solid rgba(255, 0, 255, 0.3);
    }

    .btn-clear:hover {
      background: rgba(255, 0, 255, 0.2);
      box-shadow: 0 0 12px rgba(255, 0, 255, 0.3);
      transform: translateY(-2px);
    }

    .btn-copy {
      background: linear-gradient(90deg, #0ff, #f0f);
      color: #0a0e27;
      border: none;
    }

    .btn-copy:hover {
      box-shadow: 0 0 16px rgba(0, 255, 255, 0.4);
      transform: translateY(-2px);
    }

    .btn-copy:active {
      transform: translateY(0);
    }

    @media (max-width: 700px) {
      .main-grid {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .bit-grid {
        grid-template-columns: repeat(8, 1fr);
      }

      .hero h1 {
        font-size: clamp(28px, 7vw, 48px);
      }

      .panel {
        padding: 16px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>🔐 Hash Visualizer</h1>
      <p>Real-Time Cryptographic Hash Explorer</p>
    </div>

    <div class="main-grid">
      <div class="panel input-panel">
        <label for="input-text">Input Text</label>
        <textarea id="input-text" placeholder="Type or paste text to hash...">Welcome to Hash Visualizer</textarea>
      </div>

      <div class="panel output-panel">
        <label>SHA-256 Hash Output</label>
        <div class="hash-display">
          <div class="hash-row">
            <span class="hash-label">SHA256</span>
            <div class="hash-value empty" id="hash-output">—</div>
          </div>
        </div>
        <div class="stats-grid" style="margin-top: 16px;">
          <div class="stat-box">
            <div class="stat-label">Characters</div>
            <div class="stat-value" id="char-count">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Hex Digits</div>
            <div class="stat-value" id="hex-count">0</div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="grid-section">
        <div class="grid-title">Gradient Spectrum</div>
        <div class="gradient-preview" id="gradient-preview"></div>
      </div>

      <div class="grid-section">
        <div class="grid-title">Binary Bit Pattern (First 128 bits)</div>
        <div class="bit-grid" id="bit-grid"></div>
      </div>

      <div class="button-group">
        <button class="btn-clear" onclick="clearInput()">Clear</button>
        <button class="btn-copy" onclick="copyHash()">Copy Hash</button>
      </div>
    </div>
  </div>

  <script>
    // Pure logic function for testing
    function computeHash(text) {
      const hash = CryptoJS.SHA256(text).toString();
      return hash;
    }

    function hashToBinary(hash) {
      let binary = '';
      for (let i = 0; i < hash.length; i++) {
        const num = parseInt(hash[i], 16);
        binary += num.toString(2).padStart(4, '0');
      }
      return binary;
    }

    function hashToGradientColor(hash) {
      const hueStep = 360 / hash.length;
      const colors = [];
      for (let i = 0; i < hash.length; i++) {
        const val = parseInt(hash[i], 16);
        const hue = (i * hueStep + (val / 15) * 30) % 360;
        colors.push(`hsl(${hue}, 100%, 50%)`);
      }
      return colors;
    }

    function updateHash() {
      const input = document.getElementById('input-text').value;
      const hash = computeHash(input);
      const hashOutput = document.getElementById('hash-output');
      const charCount = document.getElementById('char-count');
      const hexCount = document.getElementById('hex-count');
      const gradientPreview = document.getElementById('gradient-preview');
      const bitGrid = document.getElementById('bit-grid');

      // Update hash display
      if (input.trim().length === 0) {
        hashOutput.textContent = '—';
        hashOutput.classList.add('empty');
        charCount.textContent = '0';
        hexCount.textContent = '0';
        gradientPreview.style.background = 'linear-gradient(90deg, #000, #0ff)';
        gradientPreview.classList.remove('active');
        bitGrid.innerHTML = '';
      } else {
        hashOutput.textContent = hash;
        hashOutput.classList.remove('empty');
        charCount.textContent = input.length;
        hexCount.textContent = hash.length;

        // Gradient
        const colors = hashToGradientColor(hash);
        const gradientStops = colors.map((c, i) => `${c} ${(i / colors.length) * 100}%`).join(', ');
        gradientPreview.style.background = `linear-gradient(90deg, ${gradientStops})`;
        gradientPreview.classList.add('active');

        // Bit grid
        const binary = hashToBinary(hash);
        bitGrid.innerHTML = '';
        for (let i = 0; i < Math.min(128, binary.length); i++) {
          const bit = document.createElement('div');
          bit.className = 'bit' + (binary[i] === '1' ? ' on' : '');
          bit.textContent = binary[i];
          bitGrid.appendChild(bit);
        }
      }
    }

    function clearInput() {
      document.getElementById('input-text').value = '';
      updateHash();
      document.getElementById('input-text').focus();
    }

    function copyHash() {
      const hash = document.getElementById('hash-output').textContent;
      if (hash !== '—') {
        navigator.clipboard.writeText(hash);
      }
    }

    // Event listeners
    document.getElementById('input-text').addEventListener('input', updateHash);
    document.getElementById('input-text').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) {
        e.preventDefault();
        clearInput();
      }
    });

    // Initial load
    updateHash();
  </script>
</body>
</html>
