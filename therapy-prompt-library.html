<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Library for Therapists</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F5F0EB;--card:#FFFCF9;--border:#E8E0D6;--text:#2D2420;--muted:#8C7B72;--accent:#5C4A3A;--accent2:#C17E5A;--accent-light:#FDF5EF;--radius:12px;--rsm:8px}
body{font-family:'Hanken Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:10px}
.logo{font-family:'Fraunces',serif;font-weight:700;font-size:18px;color:var(--accent)}
.badge{font-size:11px;background:var(--accent-light);color:var(--accent2);padding:3px 10px;border-radius:20px;font-weight:600;border:1px solid rgba(193,126,90,.25)}
main{flex:1;max-width:820px;margin:0 auto;width:100%;padding:32px 20px 60px}
.hero{text-align:center;margin-bottom:30px}
.hero h1{font-family:'Fraunces',serif;font-size:clamp(24px,5vw,36px);font-weight:700;line-height:1.2;letter-spacing:-.3px;margin-bottom:8px}
.hero h1 em{font-style:italic;color:var(--accent2)}
.hero p{color:var(--muted);font-size:15px;max-width:480px;margin:0 auto;line-height:1.6}
.search-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px}
.search-bar input{font-family:'Hanken Grotesk',sans-serif;font-size:14px;border:none;background:transparent;color:var(--text);outline:none;flex:1}
.search-bar input::placeholder{color:var(--muted)}
.search-icon{color:var(--muted);font-size:16px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.filter-btn{padding:6px 14px;border:1.5px solid var(--border);border-radius:20px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;background:var(--card);font-family:'Hanken Grotesk',sans-serif;transition:all .15s}
.filter-btn.active{border-color:var(--accent2);background:var(--accent-light);color:var(--accent)}
.filter-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.prompts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.prompt-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .2s;position:relative}
.prompt-card:hover{border-color:var(--accent2);box-shadow:0 2px 12px rgba(92,74,58,.1)}
.prompt-card.expanded{grid-column:1/-1}
.prompt-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent2);margin-bottom:6px}
.prompt-title{font-family:'Fraunces',serif;font-size:15px;font-weight:600;line-height:1.3;margin-bottom:8px;color:var(--text)}
.prompt-preview{font-size:13px;color:var(--muted);line-height:1.5;overflow:hidden;max-height:3em;transition:max-height .3s}
.prompt-preview.open{max-height:none}
.prompt-full{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.prompt-full.visible{display:block}
.prompt-text{font-size:14px;line-height:1.8;color:var(--text);background:var(--bg);border-radius:var(--rsm);padding:14px;font-style:italic;border-left:3px solid var(--accent2)}
.prompt-notes{font-size:13px;color:var(--muted);margin-top:10px;line-height:1.5}
.prompt-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.prompt-modality{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg);border:1px solid var(--border);color:var(--muted)}
.copy-btn{padding:5px 12px;font-size:12px;font-weight:600;background:var(--card);border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--muted);font-family:'Hanken Grotesk',sans-serif;transition:all .15s}
.copy-btn:hover{border-color:var(--accent2);color:var(--accent2)}.copy-btn.copied{background:var(--accent-light);color:var(--accent2);border-color:var(--accent2)}
.expand-btn{position:absolute;top:14px;right:14px;font-size:11px;color:var(--muted);font-weight:600;cursor:pointer;background:none;border:none;font-family:'Hanken Grotesk',sans-serif;padding:0}
.count{font-size:13px;color:var(--muted);margin-bottom:14px}
footer{text-align:center;padding:20px;font-size:12px;color:var(--muted);border-top:1px solid var(--border)}
@media(max-width:560px){.prompts-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <span class="logo">TherapistPrompts</span>
  <span class="badge">Prompt Library</span>
</header>
<main>
  <div class="hero">
    <h1>Prompt Library<br>for <em>Therapists</em></h1>
    <p>50+ curated, clinically-informed prompts for Claude — intake sessions, treatment planning, progress notes, and client exercises.</p>
  </div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Search prompts…" oninput="filterPrompts()">
  </div>
  <div class="filter-row" id="filter-row"></div>
  <div class="count" id="count"></div>
  <div class="prompts-grid" id="prompts-grid"></div>
</main>
<footer>Demo — TherapistPrompts · started.ai</footer>
<script>
const PROMPTS=[
  {tag:'Intake',title:'Initial Client Intake Summary',modality:'General',preview:'Generate a structured intake summary from session notes…',text:'You are a licensed clinical therapist assistant. Based on the following session notes from an initial intake, generate a structured clinical summary including: presenting concerns, relevant history, observed affect and behaviour, preliminary clinical impressions, and suggested areas for further assessment. Use clinical but readable language.\n\nSession notes:\n[PASTE NOTES HERE]',notes:'Use after first session. Replace [PASTE NOTES HERE] with your raw session notes.'},
  {tag:'Progress Notes',title:'SOAP Note Generator',modality:'General',preview:'Turn your session jottings into a formatted SOAP note…',text:'Convert the following session notes into a properly formatted SOAP note (Subjective, Objective, Assessment, Plan). Maintain clinical accuracy, use DSM-informed language where appropriate, and keep each section concise.\n\nSession notes:\n[PASTE NOTES HERE]',notes:'Ideal for end-of-session documentation. Works well with voice memos transcribed to text.'},
  {tag:'Progress Notes',title:'DAP Note Generator',modality:'General',preview:'Create a DAP (Data, Assessment, Plan) progress note…',text:'Convert the following session notes into a DAP format progress note. Data section should summarise observable client behaviour and reported content. Assessment should reflect clinical interpretation. Plan should outline next steps.\n\nSession notes:\n[PASTE NOTES HERE]',notes:'DAP is preferred over SOAP in many outpatient settings.'},
  {tag:'Treatment Planning',title:'Treatment Goal Generator',modality:'CBT / DBT',preview:'Generate measurable, time-bound treatment goals…',text:'Based on the following presenting concerns and clinical impressions, generate 3–5 measurable, time-bound treatment goals using SMART criteria. Format each goal with a target behaviour, measurable outcome, and timeframe. Also suggest 2–3 evidence-based interventions for each goal.\n\nPresenting concerns:\n[PASTE HERE]',notes:'Useful for initial treatment planning. Can be adapted for specific modalities.'},
  {tag:'CBT',title:'Thought Record Facilitator',modality:'CBT',preview:'Guide a client through a 7-column thought record…',text:'Act as a compassionate CBT therapist helping a client work through a 7-column thought record. The client has described a distressing situation. Walk them through: (1) the situation, (2) emotions + intensity, (3) automatic thoughts, (4) evidence for the thought, (5) evidence against, (6) balanced perspective, (7) re-rated emotion intensity. Use Socratic questioning. Be warm and curious, not directive.\n\nClient situation:\n[PASTE HERE]',notes:'Paste client\'s description of the activating event. Great for homework review sessions.'},
  {tag:'CBT',title:'Cognitive Distortion Identifier',modality:'CBT',preview:'Identify and label cognitive distortions in client statements…',text:'Review the following client statements and identify any cognitive distortions present. For each distortion, name it (e.g. catastrophising, mind-reading, black-and-white thinking), explain how it appears in the statement, and suggest one gentle Socratic question a therapist might use to challenge it.\n\nClient statements:\n[PASTE HERE]',notes:'Useful for supervision prep or to practice identifying distortion patterns.'},
  {tag:'DBT',title:'Chain Analysis Template',modality:'DBT',preview:'Conduct a full behavioural chain analysis…',text:'Help conduct a DBT behavioural chain analysis for the following target behaviour. Structure the analysis as: (1) vulnerability factors, (2) prompting event, (3) links in the chain (thoughts, feelings, actions), (4) the problem behaviour, (5) consequences, (6) solutions at each link. Use DBT language.\n\nTarget behaviour + context:\n[PASTE HERE]',notes:'For use with clients who have engaged in self-harm, substance use, or other target behaviours.'},
  {tag:'ACT',title:'Values Clarification Exercise',modality:'ACT',preview:'Guide a client through ACT values identification…',text:'You are facilitating an ACT values clarification exercise. Ask the client a series of reflective questions to help them articulate their core values across life domains: relationships, work/education, personal growth, health, and community. After each domain, reflect back what you heard and ask a deepening question. Do not suggest or impose values — only reflect and enquire.\n\nDomain to explore:\n[e.g. relationships / work / health]',notes:'Best used in middle-phase sessions. Can be adapted for a values card sort exercise.'},
  {tag:'ACT',title:'Defusion Technique Generator',modality:'ACT',preview:'Generate creative defusion metaphors for sticky thoughts…',text:'A client is fused with the following thought or belief. Generate 3 ACT defusion techniques tailored to this specific thought, including: (1) a labelling technique, (2) a metaphor or visualisation, (3) a playful or physical technique. Explain how to introduce each to the client.\n\nClient\'s fused thought:\n[PASTE HERE]',notes:'Works well when clients are stuck on "I am not good enough" or similar sticky thoughts.'},
  {tag:'Psychoeducation',title:'Anxiety Psychoeducation Script',modality:'General',preview:'Generate a clear, jargon-free anxiety explanation for clients…',text:'Write a clear, warm, jargon-free psychoeducation script explaining the anxiety cycle to a client who is new to therapy. Cover: what anxiety is, the fight-flight-freeze response, why avoidance makes it worse, and how therapy helps break the cycle. Use analogies where helpful. Aim for a 5-minute verbal delivery.',notes:'Can be adapted to explain depression, trauma responses, or OCD cycles.'},
  {tag:'Psychoeducation',title:'Trauma-Informed Nervous System Explainer',modality:'Trauma',preview:'Explain the window of tolerance and nervous system states…',text:'Write a psychoeducation script for a trauma-informed session explaining: the autonomic nervous system, window of tolerance, hyper- and hypo-arousal states, and why trauma responses make sense. Use plain language, avoid clinical jargon, and include at least one grounding exercise the client can try immediately.',notes:'Suitable for early-phase trauma work. Pair with a body-mapping or polyvagal exercise.'},
  {tag:'Session Prep',title:'Between-Session Homework Generator',modality:'CBT / General',preview:'Create tailored homework for a client based on session content…',text:'Based on the following session summary, generate 2–3 tailored between-session homework tasks for the client. Each task should be: specific and actionable, achievable in 10–20 minutes, directly linked to a treatment goal, and framed in the client\'s language where possible.\n\nSession summary:\n[PASTE HERE]',notes:'Paste a brief session summary. The more specific, the better the homework suggestions.'},
  {tag:'Session Prep',title:'Supervisor Presentation Prep',modality:'General',preview:'Structure your clinical case for supervision…',text:'Help me prepare a structured case presentation for supervision. Based on the following client summary, format a presentation covering: background, presenting problem, formulation (precipitating/perpetuating/protective factors), current treatment approach, progress, stuck points, and questions for supervision.\n\nClient summary:\n[PASTE HERE]',notes:'Great for early-career therapists. Remove all identifying information before pasting.'},
  {tag:'Assessments',title:'Risk Assessment Summary',modality:'General',preview:'Structure a clinical risk assessment from session notes…',text:'Based on the following session notes, generate a structured risk assessment summary covering: static risk factors, dynamic risk factors, protective factors, current level of risk (low/medium/high), and recommended safety planning steps. Use clinical language and note any information gaps that require follow-up.\n\nSession notes:\n[PASTE HERE]\n\n⚠️ Note: This is a clinical aid only. Professional judgment must guide all risk decisions.',notes:'Always use clinical judgment. This prompt supports documentation, not replaces clinical assessment.'},
  {tag:'Client Exercises',title:'Gratitude Journal Prompt Pack',modality:'Positive Psychology',preview:'Generate a week of personalised gratitude prompts…',text:'Generate a 7-day gratitude journal prompt pack personalised for a client who is working on [DESCRIBE CLIENT FOCUS: e.g. self-compassion / recovery from depression / rebuilding relationships]. Each prompt should be specific, gentle, and go beyond "list 3 things you\'re grateful for." Include a brief therapist note on the intention behind each prompt.',notes:'Customise the bracket for each client. Works well as a between-session digital handout.'},
  {tag:'Client Exercises',title:'Self-Compassion Letter Scaffold',modality:'CFT / ACT',preview:'Guide a client in writing a self-compassion letter…',text:'Help a client write a self-compassion letter addressing a mistake or area of self-criticism they have identified. Structure the letter in three parts: (1) acknowledging the pain with kindness, (2) recognising shared humanity, (3) offering yourself what you would offer a good friend. Provide sentence starters for each part.\n\nClient\'s self-critical thought or situation:\n[PASTE HERE]',notes:'CFT and ACT-aligned. Particularly powerful for clients with high self-criticism or shame.'},
];

const TAGS=[...new Set(PROMPTS.map(p=>p.tag))];
let activeTag='All';
let expanded=null;

function init(){
  const row=document.getElementById('filter-row');
  ['All',...TAGS].forEach(tag=>{
    const btn=document.createElement('button');
    btn.className='filter-btn'+(tag==='All'?' active':'');
    btn.textContent=tag;
    btn.onclick=()=>setTag(tag,btn);
    row.appendChild(btn);
  });
  render();
}

function setTag(tag,btn){
  activeTag=tag;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function filterPrompts(){render()}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=PROMPTS.filter(p=>{
    const matchTag=activeTag==='All'||p.tag===activeTag;
    const matchQ=!q||p.title.toLowerCase().includes(q)||p.preview.toLowerCase().includes(q)||p.tag.toLowerCase().includes(q)||p.modality.toLowerCase().includes(q);
    return matchTag&&matchQ;
  });
  document.getElementById('count').textContent=`${filtered.length} prompt${filtered.length!==1?'s':''} found`;
  document.getElementById('prompts-grid').innerHTML=filtered.map((p,i)=>`
    <div class="prompt-card" id="pc-${i}">
      <button class="expand-btn" onclick="toggleExpand(${i})">▼ View prompt</button>
      <div class="prompt-tag">${p.tag}</div>
      <div class="prompt-title">${p.title}</div>
      <div class="prompt-preview">${p.preview}</div>
      <div class="prompt-full" id="pf-${i}">
        <div class="prompt-text">${p.text.replace(/\n/g,'<br>')}</div>
        ${p.notes?`<div class="prompt-notes">💡 <b>Usage note:</b> ${p.notes}</div>`:''}
        <div class="prompt-footer">
          <span class="prompt-modality">${p.modality}</span>
          <button class="copy-btn" onclick="copyPrompt(${i},this)">Copy Prompt</button>
        </div>
      </div>
    </div>`).join('');
}

function toggleExpand(i){
  const card=document.getElementById('pc-'+i);
  const full=document.getElementById('pf-'+i);
  const btn=card.querySelector('.expand-btn');
  const isOpen=full.classList.contains('visible');
  full.classList.toggle('visible',!isOpen);
  btn.textContent=isOpen?'▼ View prompt':'▲ Hide';
}

function copyPrompt(i,btn){
  const filtered=PROMPTS;
  navigator.clipboard.writeText(filtered[i].text).then(()=>{btn.textContent='Copied!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copy Prompt';btn.classList.remove('copied')},2000)});
}

init();
</script>
</body>
</html>
