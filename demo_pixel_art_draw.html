<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Art Canvas — Create Your Pixel Art</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Sora', sans-serif;
      background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
      color: #fff;
      overflow-x: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      width: 100%;
      animation: fadeIn 0.6s cubic-bezier(.16,1,.3,1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero {
      text-align: center;
      margin-bottom: 2rem;
      animation: slideDown 0.8s cubic-bezier(.16,1,.3,1);
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      background: linear-gradient(120deg, #ff00ff, #00d9ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      margin-bottom: 0.5rem;
    }

    .hero p {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.7);
      font-weight: 400;
    }

    .canvas-frame {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      border: 2px solid;
      border-image: linear-gradient(135deg, #ff00ff, #00d9ff) 1;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 0 30px rgba(255,0,255,0.2), inset 0 0 30px rgba(0,217,255,0.1);
      animation: glowIn 0.8s cubic-bezier(.16,1,.3,1);
    }

    @keyframes glowIn {
      from { opacity: 0; box-shadow: 0 0 0 rgba(255,0,255,0.2), inset 0 0 0 rgba(0,217,255,0.1); }
      to { opacity: 1; box-shadow: 0 0 30px rgba(255,0,255,0.2), inset 0 0 30px rgba(0,217,255,0.1); }
    }

    canvas {
      display: block;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 4px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: crosshair;
      width: 320px;
      height: 320px;
      max-width: 100%;
    }

    .controls-section {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .color-picker-section {
      animation: slideUp 0.6s cubic-bezier(.16,1,.3,1) 0.1s both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-label {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #00d9ff;
      margin-bottom: 0.75rem;
    }

    .color-swatches {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(35px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .swatch {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .swatch:hover {
      border-color: #00d9ff;
      transform: scale(1.1);
      box-shadow: 0 0 15px currentColor;
    }

    .swatch.active {
      border-color: #00d9ff;
      box-shadow: 0 0 20px #00d9ff, inset 0 0 10px rgba(0,217,255,0.5);
    }

    .custom-color-controls {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .rgb-input {
      flex: 1;
      padding: 0.5rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: #fff;
      font-size: 0.85rem;
      transition: all 0.2s ease;
    }

    .rgb-input:focus {
      outline: none;
      background: rgba(255,255,255,0.1);
      border-color: #00d9ff;
    }

    .rgb-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      text-align: center;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .buttons-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      animation: slideUp 0.6s cubic-bezier(.16,1,.3,1) 0.2s both;
    }

    .btn {
      padding: 0.75rem 1rem;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(.16,1,.3,1);
      font-family: 'Sora', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: #00d9ff;
      box-shadow: 0 0 15px rgba(0,217,255,0.3);
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.btn-danger {
      grid-column: span 2;
      border-color: rgba(255,0,0,0.3);
    }

    .btn.btn-danger:hover {
      border-color: #ff0000;
      box-shadow: 0 0 15px rgba(255,0,0,0.3);
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 0;
      }

      .hero h1 {
        font-size: 1.75rem;
      }

      .canvas-frame {
        padding: 1rem;
      }

      canvas {
        width: 280px;
        height: 280px;
      }

      .buttons-section {
        grid-template-columns: 1fr;
      }

      .btn.btn-danger {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Pixel Art Canvas</h1>
      <p>Click to paint, drag to draw lines, create retro pixel art</p>
    </div>

    <div class="canvas-frame">
      <canvas id="pixelCanvas" width="320" height="320"></canvas>
    </div>

    <div class="controls-section">
      <div class="color-picker-section">
        <div class="section-label">Colors</div>
        <div class="color-swatches" id="swatches"></div>
        
        <div class="section-label" style="margin-top: 1rem;">Custom RGB</div>
        <div class="custom-color-controls">
          <div style="flex: 1;">
            <div class="rgb-label">R</div>
            <input type="range" id="rInput" min="0" max="255" value="0" class="rgb-input" style="width: 100%;">
          </div>
          <div style="flex: 1;">
            <div class="rgb-label">G</div>
            <input type="range" id="gInput" min="0" max="255" value="0" class="rgb-input" style="width: 100%;">
          </div>
          <div style="flex: 1;">
            <div class="rgb-label">B</div>
            <input type="range" id="bInput" min="0" max="255" value="0" class="rgb-input" style="width: 100%;">
          </div>
        </div>
      </div>

      <div class="buttons-section">
        <button class="btn" id="downloadBtn">⬇️ Download PNG</button>
        <button class="btn" id="randomBtn">🎲 Random Palette</button>
        <button class="btn btn-danger" id="clearBtn">🗑️ Clear Canvas</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('pixelCanvas');
    const ctx = canvas.getContext('2d');
    const GRID_SIZE = 16;
    const PIXEL_SIZE = canvas.width / GRID_SIZE;

    // Color palette
    const colors = [
      '#ff0000', // red
      '#0000ff', // blue
      '#00ff00', // green
      '#ffff00', // yellow
      '#ff00ff', // magenta
      '#00ffff', // cyan
      '#800080', // purple
      '#ffa500', // orange
      '#8b4513', // brown
      '#808080', // gray
      '#000000', // black
      '#ffffff'  // white
    ];

    let pixelGrid = Array(GRID_SIZE * GRID_SIZE).fill('#ffffff');
    let currentColor = '#000000';
    let isDrawing = false;

    // Initialize color swatches
    const swatchesContainer = document.getElementById('swatches');
    colors.forEach((color, idx) => {
      const swatch = document.createElement('div');
      swatch.className = 'swatch';
      swatch.style.backgroundColor = color;
      if (color === currentColor) swatch.classList.add('active');
      swatch.onclick = () => selectColor(color, idx);
      swatchesContainer.appendChild(swatch);
    });

    function selectColor(color, idx) {
      currentColor = color;
      document.querySelectorAll('.swatch').forEach((s, i) => {
        s.classList.toggle('active', i === idx);
      });
      updateRGBInputs(color);
    }

    function updateRGBInputs(color) {
      const hex = color.slice(1);
      const r = parseInt(hex.slice(0, 2), 16);
      const g = parseInt(hex.slice(2, 4), 16);
      const b = parseInt(hex.slice(4, 6), 16);
      document.getElementById('rInput').value = r;
      document.getElementById('gInput').value = g;
      document.getElementById('bInput').value = b;
    }

    document.getElementById('rInput').addEventListener('input', updateCustomColor);
    document.getElementById('gInput').addEventListener('input', updateCustomColor);
    document.getElementById('bInput').addEventListener('input', updateCustomColor);

    function updateCustomColor() {
      const r = parseInt(document.getElementById('rInput').value) || 0;
      const g = parseInt(document.getElementById('gInput').value) || 0;
      const b = parseInt(document.getElementById('bInput').value) || 0;
      currentColor = `rgb(${r}, ${g}, ${b})`;
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    }

    function getPixelIndex(x, y) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const px = Math.floor((x - rect.left) * scaleX / PIXEL_SIZE);
      const py = Math.floor((y - rect.top) * scaleY / PIXEL_SIZE);
      if (px >= 0 && px < GRID_SIZE && py >= 0 && py < GRID_SIZE) {
        return py * GRID_SIZE + px;
      }
      return -1;
    }

    function drawPixel(idx) {
      if (idx < 0 || idx >= pixelGrid.length) return;
      pixelGrid[idx] = currentColor;
      redraw();
    }

    function redraw() {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      for (let i = 0; i < pixelGrid.length; i++) {
        const x = (i % GRID_SIZE) * PIXEL_SIZE;
        const y = Math.floor(i / GRID_SIZE) * PIXEL_SIZE;
        ctx.fillStyle = pixelGrid[i];
        ctx.fillRect(x, y, PIXEL_SIZE, PIXEL_SIZE);
      }
    }

    canvas.addEventListener('mousedown', (e) => {
      isDrawing = true;
      const idx = getPixelIndex(e.clientX, e.clientY);
      drawPixel(idx);
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!isDrawing) return;
      const idx = getPixelIndex(e.clientX, e.clientY);
      drawPixel(idx);
    });

    canvas.addEventListener('mouseup', () => {
      isDrawing = false;
    });

    canvas.addEventListener('mouseleave', () => {
      isDrawing = false;
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = 'pixel-art.png';
      link.click();
    });

    document.getElementById('randomBtn').addEventListener('click', () => {
      for (let i = 0; i < pixelGrid.length; i++) {
        if (Math.random() > 0.3) {
          pixelGrid[i] = colors[Math.floor(Math.random() * colors.length)];
        } else {
          pixelGrid[i] = '#ffffff';
        }
      }
      redraw();
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      pixelGrid = Array(GRID_SIZE * GRID_SIZE).fill('#ffffff');
      redraw();
    });

    // Initial draw
    redraw();
  </script>
</body>
</html>
