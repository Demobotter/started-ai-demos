<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Art Canvas — Create Your Pixel Art</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Sora', sans-serif;
      background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
      color: #fff;
      overflow-x: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      width: 100%;
      animation: fadeIn 0.6s cubic-bezier(.16,1,.3,1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero {
      text-align: center;
      margin-bottom: 2rem;
      animation: slideDown 0.8s cubic-bezier(.16,1,.3,1);
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      background: linear-gradient(120deg, #ff00ff, #00d9ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      margin-bottom: 0.5rem;
    }

    .hero p {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.7);
      font-weight: 400;
    }

    .canvas-frame {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      border: 2px solid;
      border-image: linear-gradient(135deg, #ff00ff, #00d9ff) 1;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 0 30px rgba(255,0,255,0.2), inset 0 0 30px rgba(0,217,255,0.1);
      animation: glowIn 0.8s cubic-bezier(.16,1,.3,1);
    }

    @keyframes glowIn {
      from { opacity: 0; box-shadow: 0 0 0 rgba(255,0,255,0.2), inset 0 0 0 rgba(0,217,255,0.1); }
      to { opacity: 1; box-shadow: 0 0 30px rgba(255,0,255,0.2), inset 0 0 30px rgba(0,217,255,0.1); }
    }

    canvas {
      display: block;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 4px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: crosshair;
      max-width: 100%;
      height: auto;
    }

    .controls {
      animation: slideUp 0.8s cubic-bezier(.16,1,.3,1) 0.1s both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .color-picker {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .swatch {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.2);
      transition: all 0.2s ease;
    }

    .swatch:hover {
      transform: scale(1.1);
      border-color: rgba(255,255,255,0.5);
      box-shadow: 0 0 12px rgba(255,255,255,0.3);
    }

    .swatch.active {
      border-color: rgba(0,217,255,0.8);
      box-shadow: 0 0 20px rgba(0,217,255,0.6);
    }

    .rgb-controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.02);
      padding: 1rem;
      border-radius: 6px;
      animation: slideDown 0.4s cubic-bezier(.16,1,.3,1) 0.15s both;
    }

    .rgb-input-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .rgb-input-group label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .rgb-input-group input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,217,255,0.3);
      color: #fff;
      padding: 0.4rem;
      border-radius: 4px;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      transition: all 0.2s ease;
    }

    .rgb-input-group input:focus {
      outline: none;
      border-color: rgba(0,217,255,0.8);
      background: rgba(0,217,255,0.05);
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    button {
      background: rgba(255,0,255,0.1);
      border: 1px solid rgba(255,0,255,0.3);
      color: #fff;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Sora', sans-serif;
    }

    button:hover {
      background: rgba(255,0,255,0.2);
      border-color: rgba(255,0,255,0.6);
      box-shadow: 0 0 15px rgba(255,0,255,0.3);
    }

    button:active {
      transform: scale(0.98);
    }

    .controls-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .info-card {
      background: rgba(0,217,255,0.05);
      border: 1px solid rgba(0,217,255,0.2);
      border-radius: 6px;
      padding: 0.75rem;
      font-size: 0.85rem;
      text-align: center;
      color: rgba(255,255,255,0.7);
    }

    @media (max-width: 600px) {
      .hero h1 {
        font-size: 1.75rem;
      }

      .button-row {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Pixel Art Canvas</h1>
      <p>Click to paint, drag to draw — create retro pixel art</p>
    </div>

    <div class="canvas-frame">
      <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
      <div class="color-picker" id="colorPicker"></div>

      <div class="button-row">
        <button id="clearBtn">Clear</button>
        <button id="randomBtn">Randomize</button>
        <button id="downloadBtn">Download PNG</button>
      </div>

      <div class="controls-info">
        <div class="info-card">Click or drag to paint</div>
        <div class="info-card">Change color to erase</div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const GRID_SIZE = 16;
    const CANVAS_SIZE = 320;
    
    // Set canvas size in pixels (not CSS)
    canvas.width = CANVAS_SIZE;
    canvas.height = CANVAS_SIZE;
    
    const PIXEL_SIZE = CANVAS_SIZE / GRID_SIZE; // 20px per pixel

    const colors = ['#000000', '#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ff8800', '#ff0088', '#8800ff', '#888888', '#ffffff'];

    let pixelGrid = Array(GRID_SIZE * GRID_SIZE).fill('#ffffff');
    let currentColor = '#000000';
    let isDrawing = false;

    // Create color swatches
    const colorPicker = document.getElementById('colorPicker');
    colors.forEach((color) => {
      const swatch = document.createElement('div');
      swatch.className = 'swatch';
      swatch.style.backgroundColor = color;
      swatch.addEventListener('click', () => selectColor(color, swatch));
      if (color === currentColor) swatch.classList.add('active');
      colorPicker.appendChild(swatch);
    });

    // Add custom color swatch
    const customSwatch = document.createElement('div');
    customSwatch.className = 'swatch';
    customSwatch.style.backgroundColor = '#000000';
    customSwatch.innerHTML = '<span style="color: white; font-weight: bold; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">RGB</span>';
    customSwatch.addEventListener('click', toggleRGBControls);
    colorPicker.appendChild(customSwatch);

    let rgbControlsVisible = false;

    function toggleRGBControls() {
      rgbControlsVisible = !rgbControlsVisible;
      const existing = document.getElementById('rgbControls');
      if (existing) existing.remove();
      
      if (rgbControlsVisible) {
        const controls = document.createElement('div');
        controls.id = 'rgbControls';
        controls.className = 'rgb-controls';
        const r = Math.floor(parseInt(currentColor.substring(1,3), 16));
        const g = Math.floor(parseInt(currentColor.substring(3,5), 16));
        const b = Math.floor(parseInt(currentColor.substring(5,7), 16));
        
        controls.innerHTML = `
          <div class="rgb-input-group">
            <label>R</label>
            <input type="number" id="rInput" min="0" max="255" value="${r}">
          </div>
          <div class="rgb-input-group">
            <label>G</label>
            <input type="number" id="gInput" min="0" max="255" value="${g}">
          </div>
          <div class="rgb-input-group">
            <label>B</label>
            <input type="number" id="bInput" min="0" max="255" value="${b}">
          </div>
        `;
        
        const controlsDiv = document.querySelector('.controls');
        controlsDiv.insertBefore(controls, controlsDiv.querySelector('.button-row'));

        function updateCustomColor() {
          const r = parseInt(document.getElementById('rInput').value) || 0;
          const g = parseInt(document.getElementById('gInput').value) || 0;
          const b = parseInt(document.getElementById('bInput').value) || 0;
          currentColor = `rgb(${r}, ${g}, ${b})`;
          customSwatch.style.backgroundColor = currentColor;
          redraw();
        }

        document.getElementById('rInput').addEventListener('input', updateCustomColor);
        document.getElementById('gInput').addEventListener('input', updateCustomColor);
        document.getElementById('bInput').addEventListener('input', updateCustomColor);
      }
    }

    function selectColor(color, swatch) {
      currentColor = color;
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      swatch.classList.add('active');
      const existing = document.getElementById('rgbControls');
      if (existing) existing.remove();
      rgbControlsVisible = false;
    }

    function getPixelIndex(x, y) {
      const rect = canvas.getBoundingClientRect();
      // Use offset relative to canvas position
      const offsetX = x - rect.left;
      const offsetY = y - rect.top;
      
      // Scale to account for CSS scaling
      const scaleX = CANVAS_SIZE / rect.width;
      const scaleY = CANVAS_SIZE / rect.height;
      
      const px = Math.floor(offsetX * scaleX / PIXEL_SIZE);
      const py = Math.floor(offsetY * scaleY / PIXEL_SIZE);
      
      if (px >= 0 && px < GRID_SIZE && py >= 0 && py < GRID_SIZE) {
        return py * GRID_SIZE + px;
      }
      return -1;
    }

    function drawPixel(idx) {
      if (idx < 0 || idx >= pixelGrid.length) return;
      pixelGrid[idx] = currentColor;
      redraw();
    }

    function redraw() {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      for (let i = 0; i < pixelGrid.length; i++) {
        const x = (i % GRID_SIZE) * PIXEL_SIZE;
        const y = Math.floor(i / GRID_SIZE) * PIXEL_SIZE;
        ctx.fillStyle = pixelGrid[i];
        ctx.fillRect(x, y, PIXEL_SIZE, PIXEL_SIZE);
      }
    }

    canvas.addEventListener('mousedown', (e) => {
      isDrawing = true;
      const idx = getPixelIndex(e.clientX, e.clientY);
      drawPixel(idx);
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!isDrawing) return;
      const idx = getPixelIndex(e.clientX, e.clientY);
      drawPixel(idx);
    });

    canvas.addEventListener('mouseup', () => {
      isDrawing = false;
    });

    canvas.addEventListener('mouseleave', () => {
      isDrawing = false;
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = 'pixel-art.png';
      link.click();
    });

    document.getElementById('randomBtn').addEventListener('click', () => {
      pixelGrid = pixelGrid.map(() => colors[Math.floor(Math.random() * colors.length)]);
      redraw();
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      pixelGrid = Array(GRID_SIZE * GRID_SIZE).fill('#ffffff');
      redraw();
    });

    // Initial draw
    redraw();
  </script>
</body>
</html>
