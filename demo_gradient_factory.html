<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient Factory – Color Harmony Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Inter, sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 50%, #0d1117 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s cubic-bezier(.16,1,.3,1);
        }

        .hero h1 {
            font-family: Space Grotesk, sans-serif;
            font-size: clamp(36px, 8vw, 64px);
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(120deg, #ff6b6b, #4ecdc4, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 18px;
            color: #888;
        }

        .main {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 40px;
            margin-bottom: 50px;
        }

        @media (max-width: 900px) {
            .main {
                grid-template-columns: 1fr;
            }
        }

        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: fit-content;
            animation: fadeInLeft 0.8s cubic-bezier(.16,1,.3,1) 0.1s backwards;
        }

        .color-picker-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .color-picker-group label {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4ecdc4;
        }

        .color-input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #primaryColorPicker {
            width: 80px;
            height: 80px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        .color-value {
            font-family: Inter, monospace;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 12px;
            border-radius: 8px;
            flex: 1;
            color: #ffd93d;
        }

        .harmony-modes {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .mode-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #e0e0e0;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(.16,1,.3,1);
            text-align: left;
        }

        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .mode-btn.active {
            background: #4ecdc4;
            border-color: #4ecdc4;
            color: #0d1117;
            font-weight: 600;
        }

        .palettes {
            display: flex;
            flex-direction: column;
            gap: 24px;
            animation: fadeInRight 0.8s cubic-bezier(.16,1,.3,1) 0.2s backwards;
        }

        .palette {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            overflow: hidden;
        }

        .palette-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-weight: 600;
            font-size: 14px;
            color: #4ecdc4;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .palette-colors {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            min-height: 100px;
        }

        @media (max-width: 600px) {
            .palette-colors {
                grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            }
        }

        .swatch {
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .swatch:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .swatch-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            right: 8px;
            font-size: 11px;
            font-family: Space Grotesk, monospace;
            color: rgba(255, 255, 255, 0.7);
            word-break: break-all;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .copy-feedback {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4ecdc4;
            color: #0d1117;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            animation: slideIn 0.3s ease, slideOut 0.3s ease 2.7s;
            z-index: 1000;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(10px);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Gradient Factory</h1>
            <p>Pick a color. Get 5 harmony palettes.</p>
        </div>

        <div class="main">
            <div class="control-panel">
                <div class="color-picker-group">
                    <label>Primary Color</label>
                    <div class="color-input-wrapper">
                        <input type="color" id="primaryColorPicker" value="#FF6B6B">
                        <div class="color-value" id="colorHex">#FF6B6B</div>
                    </div>
                </div>

                <div>
                    <label style="display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #4ecdc4; margin-bottom: 12px;">Harmony Mode</label>
                    <div class="harmony-modes">
                        <button class="mode-btn active" data-mode="analogous">Analogous</button>
                        <button class="mode-btn" data-mode="complementary">Complementary</button>
                        <button class="mode-btn" data-mode="triadic">Triadic</button>
                        <button class="mode-btn" data-mode="split-complementary">Split-Complementary</button>
                        <button class="mode-btn" data-mode="tetradic">Tetradic</button>
                    </div>
                </div>
            </div>

            <div class="palettes">
                <div class="palette" id="palette-1">
                    <div class="palette-header">Analogous</div>
                    <div class="palette-colors" id="palette-1-colors"></div>
                </div>
                <div class="palette" id="palette-2">
                    <div class="palette-header">Complementary</div>
                    <div class="palette-colors" id="palette-2-colors"></div>
                </div>
                <div class="palette" id="palette-3">
                    <div class="palette-header">Triadic</div>
                    <div class="palette-colors" id="palette-3-colors"></div>
                </div>
                <div class="palette" id="palette-4">
                    <div class="palette-header">Split-Complementary</div>
                    <div class="palette-colors" id="palette-4-colors"></div>
                </div>
                <div class="palette" id="palette-5">
                    <div class="palette-header">Tetradic</div>
                    <div class="palette-colors" id="palette-5-colors"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="copy-feedback" id="copyFeedback">Copied!</div>

    <script>
        // Pure color harmony functions (headless-testable)
        function hexToHSL(hex) {
            let h = hex.substring(1).toUpperCase();
            let r = parseInt(h.substring(0, 2), 16) / 255;
            let g = parseInt(h.substring(2, 4), 16) / 255;
            let b = parseInt(h.substring(4, 6), 16) / 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let l = (max + min) / 2;
            let s, hue;
            if (max === min) {
                s = 0;
                hue = 0;
            } else {
                let d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: hue = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: hue = (b - r) / d + 2; break;
                    case b: hue = (r - g) / d + 4; break;
                }
                hue /= 6;
            }
            return {h: hue * 360, s: s * 100, l: l * 100};
        }

        function hslToHex(h, s, l) {
            h = (h % 360 + 360) % 360;
            s = s / 100;
            l = l / 100;
            let c = (1 - Math.abs(2 * l - 1)) * s;
            let x = c * (1 - Math.abs((h / 60) % 2 - 1));
            let m = l - c / 2;
            let r, g, b;
            if (h < 60) {r = c; g = x; b = 0;}
            else if (h < 120) {r = x; g = c; b = 0;}
            else if (h < 180) {r = 0; g = c; b = x;}
            else if (h < 240) {r = 0; g = x; b = c;}
            else if (h < 300) {r = x; g = 0; b = c;}
            else {r = c; g = 0; b = x;}
            r = Math.round((r + m) * 255).toString(16).padStart(2, '0').toUpperCase();
            g = Math.round((g + m) * 255).toString(16).padStart(2, '0').toUpperCase();
            b = Math.round((b + m) * 255).toString(16).padStart(2, '0').toUpperCase();
            return '#' + r + g + b;
        }

        function generateAnalogous(hsl) {
            return [
                hslToHex(hsl.h - 30, hsl.s, hsl.l),
                hslToHex(hsl.h, hsl.s, hsl.l),
                hslToHex(hsl.h + 30, hsl.s, hsl.l),
                hslToHex(hsl.h - 15, hsl.s - 10, hsl.l + 10),
                hslToHex(hsl.h + 15, hsl.s - 10, hsl.l + 10)
            ];
        }

        function generateComplementary(hsl) {
            return [
                hslToHex(hsl.h, hsl.s, hsl.l),
                hslToHex(hsl.h + 180, hsl.s, hsl.l),
                hslToHex(hsl.h, hsl.s - 20, hsl.l + 15),
                hslToHex(hsl.h + 180, hsl.s - 20, hsl.l + 15),
                hslToHex(hsl.h + 90, hsl.s - 30, hsl.l + 20)
            ];
        }

        function generateTriadic(hsl) {
            return [
                hslToHex(hsl.h, hsl.s, hsl.l),
                hslToHex(hsl.h + 120, hsl.s, hsl.l),
                hslToHex(hsl.h + 240, hsl.s, hsl.l),
                hslToHex(hsl.h + 60, hsl.s - 15, hsl.l + 10),
                hslToHex(hsl.h + 180, hsl.s - 15, hsl.l + 10)
            ];
        }

        function generateSplitComplementary(hsl) {
            return [
                hslToHex(hsl.h, hsl.s, hsl.l),
                hslToHex(hsl.h + 150, hsl.s, hsl.l),
                hslToHex(hsl.h + 210, hsl.s, hsl.l),
                hslToHex(hsl.h - 15, hsl.s - 10, hsl.l + 15),
                hslToHex(hsl.h + 165, hsl.s - 10, hsl.l + 15)
            ];
        }

        function generateTetradic(hsl) {
            return [
                hslToHex(hsl.h, hsl.s, hsl.l),
                hslToHex(hsl.h + 90, hsl.s, hsl.l),
                hslToHex(hsl.h + 180, hsl.s, hsl.l),
                hslToHex(hsl.h + 270, hsl.s, hsl.l),
                hslToHex(hsl.h + 45, hsl.s - 20, hsl.l + 15)
            ];
        }

        // UI Logic
        const colorPicker = document.getElementById('primaryColorPicker');
        const colorHex = document.getElementById('colorHex');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const paletteContainers = [
            document.getElementById('palette-1-colors'),
            document.getElementById('palette-2-colors'),
            document.getElementById('palette-3-colors'),
            document.getElementById('palette-4-colors'),
            document.getElementById('palette-5-colors')
        ];

        let currentMode = 'analogous';

        function updatePalettes() {
            const hsl = hexToHSL(colorPicker.value);
            const generators = [generateAnalogous, generateComplementary, generateTriadic, generateSplitComplementary, generateTetradic];
            const palettes = generators.map(gen => gen(hsl));

            paletteContainers.forEach((container, idx) => {
                container.innerHTML = '';
                palettes[idx].forEach(hex => {
                    const swatch = document.createElement('div');
                    swatch.className = 'swatch';
                    swatch.style.backgroundColor = hex;
                    swatch.innerHTML = `<div class="swatch-label">${hex.substring(1)}</div>`;
                    swatch.addEventListener('click', () => copySwatch(hex));
                    container.appendChild(swatch);
                });
            });
        }

        function copySwatch(hex) {
            navigator.clipboard.writeText(hex).then(() => {
                const feedback = document.getElementById('copyFeedback');
                feedback.style.opacity = '1';
                setTimeout(() => { feedback.style.opacity = '0'; }, 3000);
            });
        }

        colorPicker.addEventListener('change', () => {
            colorHex.textContent = colorPicker.value.toUpperCase();
            updatePalettes();
        });

        colorPicker.addEventListener('input', () => {
            colorHex.textContent = colorPicker.value.toUpperCase();
            updatePalettes();
        });

        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                modeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
            });
        });

        // Init
        updatePalettes();
    </script>
</body>
</html>
