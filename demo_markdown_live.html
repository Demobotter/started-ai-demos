<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Live Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(135deg, #0f1729 0%, #1a2847 50%, #0d1620 100%);
      color: #e0e6ed;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 20px;
      gap: 20px;
    }

    .header {
      text-align: center;
      animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .header h1 {
      font-size: clamp(32px, 6vw, 56px);
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #00d9ff 0%, #7c3aed 50%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      color: #8493a8;
      font-weight: 400;
    }

    .editor-pane {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      flex: 1;
      overflow: hidden;
      animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }

    .pane {
      display: flex;
      flex-direction: column;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 217, 255, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .pane-header {
      padding: 12px 16px;
      background: rgba(0, 217, 255, 0.08);
      border-bottom: 1px solid rgba(0, 217, 255, 0.1);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #00d9ff;
    }

    textarea {
      flex: 1;
      padding: 16px;
      border: none;
      background: transparent;
      color: #e0e6ed;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      line-height: 1.6;
      resize: none;
      outline: none;
    }

    textarea::placeholder {
      color: #4a5f7f;
    }

    .preview {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      font-family: 'Space Grotesk', sans-serif;
    }

    .preview::-webkit-scrollbar {
      width: 6px;
    }

    .preview::-webkit-scrollbar-track {
      background: transparent;
    }

    .preview::-webkit-scrollbar-thumb {
      background: rgba(0, 217, 255, 0.3);
      border-radius: 3px;
    }

    .preview::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 217, 255, 0.5);
    }

    .preview h1, .preview h2, .preview h3 {
      margin-top: 20px;
      margin-bottom: 12px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .preview h1 {
      font-size: 28px;
      color: #00d9ff;
    }

    .preview h2 {
      font-size: 22px;
      color: #7c3aed;
    }

    .preview h3 {
      font-size: 18px;
      color: #ec4899;
    }

    .preview p {
      margin-bottom: 12px;
      line-height: 1.7;
      color: #c5d1e0;
    }

    .preview strong {
      color: #00d9ff;
      font-weight: 700;
    }

    .preview em {
      color: #ec4899;
      font-style: italic;
    }

    .preview a {
      color: #7c3aed;
      text-decoration: none;
      border-bottom: 1px solid rgba(124, 58, 237, 0.4);
      transition: border-color 0.3s;
    }

    .preview a:hover {
      border-bottom-color: #7c3aed;
    }

    .preview code {
      background: rgba(0, 217, 255, 0.1);
      color: #00d9ff;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
    }

    .preview pre {
      background: rgba(0, 0, 0, 0.4);
      border-left: 3px solid #7c3aed;
      padding: 12px;
      border-radius: 6px;
      margin: 16px 0;
      overflow-x: auto;
    }

    .preview pre code {
      background: none;
      padding: 0;
      color: #00d9ff;
      display: block;
    }

    .preview ul {
      margin: 12px 0 12px 24px;
    }

    .preview li {
      margin-bottom: 6px;
      color: #c5d1e0;
    }

    .preview li::marker {
      color: #ec4899;
    }

    .preview hr {
      border: none;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0, 217, 255, 0.3), transparent);
      margin: 24px 0;
    }

    @media (max-width: 900px) {
      .editor-pane {
        grid-template-columns: 1fr;
      }
      
      .pane {
        max-height: 50vh;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📝 Markdown Live</h1>
      <p>Type Markdown on the left, see HTML preview on the right</p>
    </div>

    <div class="editor-pane">
      <div class="pane">
        <div class="pane-header">📄 Markdown Input</div>
        <textarea id="editor" placeholder="# Heading
## Subheading

**Bold** and *italic* text.

- Bullet point
- Another point

[Link](https://example.com)

`inline code`

\`\`\`
code block
\`\`\`"></textarea>
      </div>

      <div class="pane">
        <div class="pane-header">🎨 Live Preview</div>
        <div class="preview" id="preview"></div>
      </div>
    </div>
  </div>

  <script>
    // Markdown-to-HTML parser
    function markdownToHtml(md) {
      let html = md
        // Escape HTML chars first
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        // Code blocks (```...```)
        .replace(/```([\s\S]*?)```/g, (match, code) => {
          code = code.trim().replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
          return '<pre><code>' + code + '</code></pre>';
        })
        // Headers
        .replace(/^### (.*?)$/gm, '<h3>$1</h3>')
        .replace(/^## (.*?)$/gm, '<h2>$1</h2>')
        .replace(/^# (.*?)$/gm, '<h1>$1</h1>')
        // Horizontal rule
        .replace(/^---$/gm, '<hr />')
        // Bold **text**
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        // Italic *text*
        .replace(/(?<!\*)\*((?:[^*]|\*{2})*?)\*(?!\*)/g, '<em>$1</em>')
        // Links [text](url)
        .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2">$1</a>')
        // Inline code `code`
        .replace(/`(.*?)`/g, '<code>$1</code>')
        // Lists
        .split('\n').map(line => {
          if (line.trim().startsWith('-') && !line.includes('<')) {
            return '<li>' + line.replace(/^-\s*/, '') + '</li>';
          }
          return line;
        }).join('\n')
        // Wrap <li> in <ul>
        .replace(/(<li>.*?<\/li>)/gs, (match) => {
          return '<ul>' + match + '</ul>';
        })
        // Remove duplicate <ul>
        .replace(/<\/ul>\s*<ul>/g, '')
        // Paragraphs
        .split('\n').map(line => {
          line = line.trim();
          if (line && !line.match(/^<(h[1-6]|pre|ul|li|hr)/) && !line.match(/<\/(h[1-6]|pre|ul|li|hr)>$/)) {
            return '<p>' + line + '</p>';
          }
          return line;
        }).join('\n');

      return html;
    }

    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');

    function updatePreview() {
      const md = editor.value;
      const html = markdownToHtml(md);
      preview.innerHTML = html;
    }

    // Load default
    editor.value = `# 📝 Markdown Live Editor

Type **markdown** on the left to see the *live preview* on the right.

## Features

- **Bold** with \`**text**\`
- *Italic* with \`*text*\`
- [Links](https://example.com)
- \`inline code\`

### Code Blocks

\`\`\`
function hello() {
  console.log('Hello, world!');
}
\`\`\`

---

## Try it out

Edit the markdown and watch the preview update instantly!`;

    updatePreview();
    editor.addEventListener('input', updatePreview);
  </script>
</body>
</html>
