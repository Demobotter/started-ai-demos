<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earthquake Pulse — Live Activity Heatmap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Sora', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1628 100%);
            color: #e0e6ff;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        .hero {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeScale 0.8s ease-out;
        }
        
        .hero h1 {
            font-size: clamp(36px, 8vw, 64px);
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f, #c44569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }
        
        .hero p {
            font-size: 18px;
            color: #b0b8d4;
            font-weight: 400;
        }
        
        .content {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 40px;
            align-items: start;
        }
        
        .map-wrapper {
            position: relative;
            background: rgba(13, 13, 27, 0.6);
            border: 1px solid rgba(255, 107, 107, 0.2);
            border-radius: 16px;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out 0.1s both;
        }
        
        #map {
            width: 100%;
            height: 500px;
            display: block;
            background: #1a1a2e;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: slideInRight 0.8s ease-out 0.2s both;
        }
        
        .stat-card {
            background: rgba(255, 107, 107, 0.08);
            border: 1px solid rgba(255, 107, 107, 0.2);
            border-radius: 12px;
            padding: 16px;
            backdrop-filter: blur(20px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .stat-card:hover {
            background: rgba(255, 107, 107, 0.12);
            border-color: rgba(255, 107, 107, 0.4);
            transform: translateY(-4px);
        }
        
        .stat-label {
            font-size: 12px;
            color: #9da4c0;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 4px;
            font-family: 'IBM Plex Mono', monospace;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #ff6b6b;
        }
        
        .slider-group {
            background: rgba(255, 107, 107, 0.08);
            border: 1px solid rgba(255, 107, 107, 0.2);
            border-radius: 12px;
            padding: 16px;
            backdrop-filter: blur(20px);
        }
        
        .slider-label {
            font-size: 12px;
            color: #9da4c0;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
            font-family: 'IBM Plex Mono', monospace;
            display: flex;
            justify-content: space-between;
        }
        
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(90deg, rgba(255, 107, 107, 0.2), rgba(255, 107, 107, 0.6));
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.6);
            transition: box-shadow 0.3s;
        }
        
        input[type="range"]::-webkit-slider-thumb:hover {
            box-shadow: 0 0 25px rgba(255, 107, 107, 0.8);
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            cursor: pointer;
            border: none;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.6);
            transition: box-shadow 0.3s;
        }
        
        .quake-list {
            background: rgba(255, 107, 107, 0.08);
            border: 1px solid rgba(255, 107, 107, 0.2);
            border-radius: 12px;
            padding: 12px;
            backdrop-filter: blur(20px);
            max-height: 200px;
            overflow-y: auto;
        }
        
        .quake-item {
            font-size: 11px;
            color: #b0b8d4;
            padding: 8px;
            margin-bottom: 4px;
            background: rgba(255, 107, 107, 0.05);
            border-left: 3px solid #ff6b6b;
            border-radius: 4px;
            font-family: 'IBM Plex Mono', monospace;
        }
        
        .quake-mag {
            font-weight: 600;
            color: #ff6b6b;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            font-size: 14px;
            color: #9da4c0;
        }
        
        @keyframes fadeScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @media (max-width: 900px) {
            .content {
                grid-template-columns: 1fr;
            }
            #map {
                height: 400px;
            }
        }
        
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>🌍 Earthquake Pulse</h1>
            <p>Real-time seismic activity from the USGS earthquake database</p>
        </div>
        
        <div class="content">
            <div class="map-wrapper">
                <canvas id="map"></canvas>
                <div class="loading" id="loading">Loading earthquake data...</div>
            </div>
            
            <div class="controls">
                <div class="stat-card">
                    <div class="stat-label">Total Events</div>
                    <div class="stat-value" id="totalQuakes">–</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-label">Strongest</div>
                    <div class="stat-value" id="maxMag">–</div>
                </div>
                
                <div class="slider-group">
                    <div class="slider-label">
                        <span>Min Magnitude</span>
                        <span id="magValue">4.5</span>
                    </div>
                    <input type="range" id="magSlider" min="2" max="7" step="0.5" value="4.5">
                </div>
                
                <div class="quake-list" id="quakeList">
                    <div class="loading">Fetching earthquakes...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('map');
        const ctx = canvas.getContext('2d');
        const magSlider = document.getElementById('magSlider');
        const magValue = document.getElementById('magValue');
        const totalQuakes = document.getElementById('totalQuakes');
        const maxMag = document.getElementById('maxMag');
        const quakeList = document.getElementById('quakeList');
        const loading = document.getElementById('loading');
        
        let allQuakes = [];
        let filteredQuakes = [];
        
        // Set canvas size
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            redraw();
        }
        
        // Fetch USGS earthquake data
        async function fetchEarthquakes() {
            try {
                const response = await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_month.geojson');
                const data = await response.json();
                allQuakes = data.features || [];
                loading.style.display = 'none';
                updateUI();
                resizeCanvas();
            } catch (e) {
                console.error('Fetch failed:', e);
                loading.textContent = 'Failed to load earthquake data.';
            }
        }
        
        // Convert lat/lng to canvas x/y
        function lngLatToXY(lng, lat) {
            const x = ((lng + 180) / 360) * canvas.width;
            const y = ((90 - lat) / 180) * canvas.height;
            return { x, y };
        }
        
        // Get color by magnitude
        function getMagColor(mag) {
            if (mag < 4.5) return 'rgba(100, 150, 255, 0.4)';
            if (mag < 5.0) return 'rgba(255, 180, 0, 0.5)';
            if (mag < 5.5) return 'rgba(255, 100, 0, 0.6)';
            if (mag < 6.0) return 'rgba(255, 50, 0, 0.7)';
            return 'rgba(255, 0, 0, 0.8)';
        }
        
        // Draw map
        function redraw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Grid
            ctx.strokeStyle = 'rgba(255, 107, 107, 0.1)';
            ctx.lineWidth = 1;
            for (let lat = -80; lat <= 80; lat += 20) {
                const y = ((90 - lat) / 180) * canvas.height;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            
            // Draw equator highlight
            const equatorY = canvas.height / 2;
            ctx.strokeStyle = 'rgba(100, 200, 255, 0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, equatorY);
            ctx.lineTo(canvas.width, equatorY);
            ctx.stroke();
            
            // Draw earthquakes
            filteredQuakes.forEach(quake => {
                const { lng, lat, mag } = quake;
                const { x, y } = lngLatToXY(lng, lat);
                const size = Math.pow(mag - 2, 1.5) * 1.5;
                
                // Glow
                const glow = ctx.createRadialGradient(x, y, 0, x, y, size * 3);
                glow.addColorStop(0, getMagColor(mag));
                glow.addColorStop(1, 'rgba(255, 107, 107, 0)');
                ctx.fillStyle = glow;
                ctx.fillRect(x - size * 3, y - size * 3, size * 6, size * 6);
                
                // Dot
                ctx.fillStyle = getMagColor(mag);
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        // Update UI
        function updateUI() {
            const minMag = parseFloat(magSlider.value);
            filteredQuakes = allQuakes.map(f => {
                const props = f.properties;
                return {
                    mag: props.mag,
                    lng: f.geometry.coordinates[0],
                    lat: f.geometry.coordinates[1],
                    place: props.place,
                    time: new Date(props.time).toLocaleString()
                };
            }).filter(q => q.mag >= minMag && q.mag !== null).sort((a, b) => b.mag - a.mag);
            
            totalQuakes.textContent = filteredQuakes.length;
            maxMag.textContent = filteredQuakes.length > 0 ? filteredQuakes[0].mag.toFixed(1) : '–';
            
            // Update list
            quakeList.innerHTML = filteredQuakes.slice(0, 8).map(q => 
                `<div class="quake-item"><span class="quake-mag">${q.mag.toFixed(1)}</span> — ${q.place}</div>`
            ).join('');
            
            redraw();
        }
        
        // Event listeners
        magSlider.addEventListener('input', (e) => {
            magValue.textContent = e.target.value;
            updateUI();
        });
        
        window.addEventListener('resize', resizeCanvas);
        
        // Init
        fetchEarthquakes();
    </script>
</body>
</html>
