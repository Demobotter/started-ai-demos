<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Portfolio Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: linear-gradient(135deg, #0f0620 0%, #1a0a30 50%, #0d1630 100%);
      color: #e0e0ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px;
      overflow-x: hidden;
    }

    main {
      width: 100%;
      max-width: 1200px;
    }

    .hero {
      text-align: center;
      margin-bottom: 40px;
      margin-top: 20px;
      animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero h1 {
      font-size: clamp(32px, 6vw, 56px);
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .hero p {
      font-size: 14px;
      color: #a0a0ff;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    .portfolio-section {
      background: rgba(20, 15, 40, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 30px;
      animation: fadeIn 1s ease-out 0.3s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .section-label {
      font-size: 12px;
      color: #06b6d4;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .portfolio-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: rgba(15, 10, 30, 0.8);
      border: 1px solid rgba(139, 92, 246, 0.15);
      border-radius: 12px;
      padding: 16px;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .stat-card:nth-child(1) { animation-delay: 0.4s; }
    .stat-card:nth-child(2) { animation-delay: 0.5s; }
    .stat-card:nth-child(3) { animation-delay: 0.6s; }

    .stat-label {
      font-size: 11px;
      color: #a0a0ff;
      font-weight: 400;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #06b6d4;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .stat-change {
      font-size: 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 500;
    }

    .change-up {
      color: #10b981;
    }

    .change-down {
      color: #ef4444;
    }

    .coins-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .coin-card {
      background: rgba(15, 10, 30, 0.5);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 12px;
      padding: 16px;
      transition: all 0.3s ease;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .coin-card:hover {
      border-color: rgba(139, 92, 246, 0.4);
      background: rgba(20, 15, 40, 0.7);
    }

    .coin-card:nth-child(1) { animation-delay: 0.5s; }
    .coin-card:nth-child(2) { animation-delay: 0.6s; }
    .coin-card:nth-child(3) { animation-delay: 0.7s; }
    .coin-card:nth-child(4) { animation-delay: 0.8s; }
    .coin-card:nth-child(5) { animation-delay: 0.9s; }
    .coin-card:nth-child(6) { animation-delay: 1s; }

    .coin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .coin-name {
      font-size: 16px;
      font-weight: 600;
      color: #e0e0ff;
    }

    .coin-symbol {
      font-size: 12px;
      color: #a0a0ff;
      font-family: 'IBM Plex Mono', monospace;
    }

    .coin-price {
      font-size: 24px;
      font-weight: 700;
      color: #06b6d4;
      margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
    }

    .coin-change {
      font-size: 13px;
      font-weight: 500;
      font-family: 'IBM Plex Mono', monospace;
      margin-bottom: 12px;
    }

    .coin-sparkline {
      width: 100%;
      height: 40px;
      margin-bottom: 8px;
      display: block;
    }

    .update-time {
      font-size: 11px;
      color: #6060c0;
      font-family: 'IBM Plex Mono', monospace;
      text-align: right;
    }

    .info {
      text-align: center;
      margin-top: 30px;
      font-size: 12px;
      color: #6060c0;
      font-family: 'IBM Plex Mono', monospace;
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 768px) {
      .coins-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="hero">
      <h1>Crypto Portfolio Tracker</h1>
      <p>Real-time prices of the top cryptocurrencies</p>
    </div>

    <div class="portfolio-section">
      <div class="section-label">Market Overview</div>
      <div class="portfolio-stats">
        <div class="stat-card">
          <div class="stat-label">Bitcoin</div>
          <div class="stat-value" id="btc-price">--</div>
          <div class="stat-change" id="btc-change"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Ethereum</div>
          <div class="stat-value" id="eth-price">--</div>
          <div class="stat-change" id="eth-change"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total 6-Coin</div>
          <div class="stat-value" id="total-price">--</div>
          <div class="stat-change">USD</div>
        </div>
      </div>
    </div>

    <div class="portfolio-section">
      <div class="section-label">Top Cryptocurrencies</div>
      <div class="coins-grid" id="coinsGrid"></div>
    </div>

    <div class="info">
      <div>Real-time data from CoinGecko API · Updates every 5 seconds</div>
      <div style="margin-top: 8px; color: #4040a0;">All prices in USD</div>
    </div>
  </main>

  <script>
    const coins = [
      { id: 'bitcoin', name: 'Bitcoin', symbol: 'BTC' },
      { id: 'ethereum', name: 'Ethereum', symbol: 'ETH' },
      { id: 'cardano', name: 'Cardano', symbol: 'ADA' },
      { id: 'solana', name: 'Solana', symbol: 'SOL' },
      { id: 'ripple', name: 'Ripple', symbol: 'XRP' },
      { id: 'polkadot', name: 'Polkadot', symbol: 'DOT' }
    ];

    const coinData = {};
    const priceHistory = {};

    // Initialize price history for sparklines
    coins.forEach(coin => {
      priceHistory[coin.id] = [];
    });

    async function fetchPrices() {
      try {
        const ids = coins.map(c => c.id).join(',');
        const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true&include_market_cap=true`);
        const data = await response.json();

        let totalPrice = 0;

        coins.forEach(coin => {
          const price = data[coin.id]?.usd || 0;
          const change24h = data[coin.id]?.usd_24h_change || 0;

          coinData[coin.id] = { price, change24h };
          totalPrice += price;

          // Update price history for sparklines (max 50 points)
          priceHistory[coin.id].push(price);
          if (priceHistory[coin.id].length > 50) {
            priceHistory[coin.id].shift();
          }
        });

        updateUI(totalPrice);
      } catch (error) {
        console.error('Error fetching crypto prices:', error);
      }
    }

    function updateUI(totalPrice) {
      // Update top 3 cards
      const btcData = coinData['bitcoin'] || {};
      const ethData = coinData['ethereum'] || {};

      document.getElementById('btc-price').textContent = `$${btcData.price?.toLocaleString('en-US', { maximumFractionDigits: 0 }) || '--'}`;
      document.getElementById('btc-change').innerHTML = `<span class="${btcData.change24h >= 0 ? 'change-up' : 'change-down'}">${btcData.change24h >= 0 ? '+' : ''}${btcData.change24h?.toFixed(2) || 0}%</span>`;

      document.getElementById('eth-price').textContent = `$${ethData.price?.toLocaleString('en-US', { maximumFractionDigits: 0 }) || '--'}`;
      document.getElementById('eth-change').innerHTML = `<span class="${ethData.change24h >= 0 ? 'change-up' : 'change-down'}">${ethData.change24h >= 0 ? '+' : ''}${ethData.change24h?.toFixed(2) || 0}%</span>`;

      document.getElementById('total-price').textContent = `$${totalPrice.toLocaleString('en-US', { maximumFractionDigits: 0 })}`;

      // Update coin cards
      const grid = document.getElementById('coinsGrid');
      if (grid.children.length === 0) {
        // First render: create all coin cards
        coins.forEach(coin => {
          const card = createCoinCard(coin);
          grid.appendChild(card);
        });
      }

      // Update existing cards
      coins.forEach(coin => {
        const card = document.querySelector(`[data-coin="${coin.id}"]`);
        if (card) {
          updateCoinCard(card, coin);
        }
      });
    }

    function createCoinCard(coin) {
      const card = document.createElement('div');
      card.className = 'coin-card';
      card.setAttribute('data-coin', coin.id);
      card.innerHTML = `
        <div class="coin-header">
          <div>
            <div class="coin-name">${coin.name}</div>
            <div class="coin-symbol">${coin.symbol}</div>
          </div>
        </div>
        <div class="coin-price" data-price="">--</div>
        <div class="coin-change" data-change=""></div>
        <canvas class="coin-sparkline" data-sparkline="" width="250" height="40"></canvas>
        <div class="update-time">Updated just now</div>
      `;
      return card;
    }

    function updateCoinCard(card, coin) {
      const data = coinData[coin.id] || {};
      const history = priceHistory[coin.id] || [];

      // Update price and change
      card.querySelector('[data-price]').textContent = `$${data.price?.toLocaleString('en-US', { maximumFractionDigits: 2 }) || '--'}`;
      card.querySelector('[data-change]').innerHTML = `<span class="${data.change24h >= 0 ? 'change-up' : 'change-down'}">${data.change24h >= 0 ? '+' : ''}${data.change24h?.toFixed(2) || 0}% (24h)</span>`;

      // Draw sparkline
      const canvas = card.querySelector('[data-sparkline]');
      if (canvas && history.length > 1) {
        drawSparkline(canvas, history);
      }
    }

    function drawSparkline(canvas, prices) {
      const ctx = canvas.getContext('2d');
      const w = canvas.offsetWidth;
      const h = canvas.offsetHeight;

      // High DPI
      const dpr = window.devicePixelRatio || 1;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      ctx.scale(dpr, dpr);

      // Clear
      ctx.clearRect(0, 0, w, h);

      if (prices.length < 2) return;

      // Find min/max
      const min = Math.min(...prices);
      const max = Math.max(...prices);
      const range = max - min || 1;

      // Draw gradient line
      ctx.strokeStyle = '#06b6d4';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      ctx.beginPath();
      prices.forEach((price, i) => {
        const x = (i / (prices.length - 1)) * w;
        const y = h - ((price - min) / range) * (h - 8) - 4;
        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      });
      ctx.stroke();

      // Fill area under curve
      const gradient = ctx.createLinearGradient(0, 0, 0, h);
      gradient.addColorStop(0, 'rgba(6, 182, 212, 0.3)');
      gradient.addColorStop(1, 'rgba(6, 182, 212, 0)');

      ctx.strokeStyle = 'transparent';
      ctx.lineTo(w, h);
      ctx.lineTo(0, h);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();
    }

    // Initial fetch and then every 5 seconds
    fetchPrices();
    setInterval(fetchPrices, 5000);
  </script>
</body>
</html>
