<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Earthquake Heatmap</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Sora', sans-serif;
      background: linear-gradient(135deg, #0a1428 0%, #1f0d3e 50%, #2a0845 100%);
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }
    .hero {
      text-align: center;
    }
    .hero h1 {
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 700;
      background: linear-gradient(90deg, #ff9500, #ff6b35);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      margin-bottom: 10px;
    }
    .hero p {
      font-size: 0.95rem;
      color: #a0a0a0;
      max-width: 500px;
    }
    .container {
      width: 100%;
      max-width: 1200px;
      background: rgba(20, 25, 50, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    #heatmap {
      width: 100%;
      height: auto;
      display: block;
      background: #1a2850;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .legend {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      font-size: 0.9rem;
      color: #b0b0b0;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .legend-bar {
      width: 200px;
      height: 20px;
      background: linear-gradient(90deg, #0066ff, #00d9ff, #ffff00, #ff9500, #ff0000);
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .stats {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }
    .stat-item {
      text-align: center;
    }
    .stat-value {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.5rem;
      font-weight: 600;
      color: #ffaa00;
    }
    .stat-label {
      font-size: 0.85rem;
      color: #808080;
      margin-top: 5px;
    }
    @media (max-width: 768px) {
      .container { padding: 20px; }
      .hero h1 { font-size: 1.8rem; }
      .legend { gap: 10px; }
      .legend-bar { width: 120px; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Earthquake Heatmap</h1>
    <p>Last 7 days of global seismic activity (magnitude ≥4.5)</p>
  </div>

  <div class="container">
    <svg id="heatmap" viewBox="0 0 3600 1800" preserveAspectRatio="xMidYMid meet"></svg>
    
    <div class="legend">
      <span>Low</span>
      <div class="legend-bar"></div>
      <span>High</span>
    </div>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-value" id="quake-count">–</div>
        <div class="stat-label">Earthquakes detected</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="max-intensity">–</div>
        <div class="stat-label">Max intensity (cell)</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="hotspot">–</div>
        <div class="stat-label">Hottest region</div>
      </div>
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────────────
    // PURE HEADLESS LOGIC — testable in node
    // ─────────────────────────────────────────────────────
    
    function buildGrid(width, height) {
      const grid = [];
      for (let i = 0; i < height; i++) {
        grid[i] = new Array(width).fill(0);
      }
      return grid;
    }

    function addQuakeToGrid(grid, lat, lng, width, height) {
      // Mercator-like bins: lat ∈ [-85, 85], lng ∈ [-180, 180]
      // Grid cells: width=36 (10° per cell), height=18 (10° per cell)
      const cellSize = 10;
      const latOffset = 85; // max absolute latitude
      const lngOffset = 180;

      // Normalize to [0, 1]
      let normLat = (lat + latOffset) / (2 * latOffset);
      let normLng = (lng + lngOffset) / (2 * lngOffset);

      // Clamp
      normLat = Math.max(0, Math.min(1, normLat));
      normLng = Math.max(0, Math.min(1, normLng));

      // Map to grid
      const col = Math.floor(normLng * width);
      const row = Math.floor(normLat * height);

      if (col >= 0 && col < width && row >= 0 && row < height) {
        grid[row][col]++;
      }
    }

    function normalizeGrid(grid) {
      let max = 0;
      for (let row of grid) {
        for (let val of row) {
          if (val > max) max = val;
        }
      }
      if (max === 0) max = 1; // avoid divide-by-zero

      const normalized = [];
      for (let i = 0; i < grid.length; i++) {
        normalized[i] = [];
        for (let j = 0; j < grid[i].length; j++) {
          normalized[i][j] = (grid[i][j] / max) * 100;
        }
      }
      return normalized;
    }

    function getColorForValue(val) {
      // val ∈ [0, 100]
      // blue → cyan → yellow → orange → red
      if (val < 20) {
        const t = val / 20;
        return interpolateColor([0, 102, 255], [0, 217, 255], t); // blue → cyan
      } else if (val < 40) {
        const t = (val - 20) / 20;
        return interpolateColor([0, 217, 255], [255, 255, 0], t); // cyan → yellow
      } else if (val < 60) {
        const t = (val - 40) / 20;
        return interpolateColor([255, 255, 0], [255, 149, 0], t); // yellow → orange
      } else {
        const t = (val - 60) / 40;
        return interpolateColor([255, 149, 0], [255, 0, 0], t); // orange → red
      }
    }

    function interpolateColor(c1, c2, t) {
      const r = Math.round(c1[0] + (c2[0] - c1[0]) * t);
      const g = Math.round(c1[1] + (c2[1] - c1[1]) * t);
      const b = Math.round(c1[2] + (c2[2] - c1[2]) * t);
      return `rgb(${r},${g},${b})`;
    }

    function findHotspot(grid) {
      let maxVal = 0, maxRow = 0, maxCol = 0;
      for (let i = 0; i < grid.length; i++) {
        for (let j = 0; j < grid[i].length; j++) {
          if (grid[i][j] > maxVal) {
            maxVal = grid[i][j];
            maxRow = i;
            maxCol = j;
          }
        }
      }
      // Reverse-map grid cell to lat/lng
      const cellSize = 10;
      const lat = 85 - (maxRow * cellSize + cellSize / 2);
      const lng = -180 + (maxCol * cellSize + cellSize / 2);
      return { lat: Math.round(lat), lng: Math.round(lng), val: Math.round(maxVal) };
    }

    function getRegionName(lat, lng) {
      if (lat > 35 && lng > 70 && lng < 140) return "Asia Pacific";
      if (lat > 30 && lng > -30 && lng < 50) return "Africa & Middle East";
      if (lat > 35 && lng > -180 && lng < -60) return "Americas";
      if (lat > 45 && lng > -30 && lng < 150) return "Europe & Asia";
      if (lat < -20) return "Australia & Oceania";
      return "Equatorial";
    }

    // ─────────────────────────────────────────────────────
    // DOM RENDERING
    // ─────────────────────────────────────────────────────

    async function render() {
      try {
        const response = await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/4.5_week.geojson');
        const geojson = await response.json();
        const features = geojson.features || [];

        // Build grid
        const GRID_WIDTH = 36, GRID_HEIGHT = 18;
        const grid = buildGrid(GRID_WIDTH, GRID_HEIGHT);

        features.forEach(feature => {
          const coords = feature.geometry.coordinates;
          const lng = coords[0], lat = coords[1];
          addQuakeToGrid(grid, lat, lng, GRID_WIDTH, GRID_HEIGHT);
        });

        // Normalize
        const normalized = normalizeGrid(grid);

        // Find stats
        const hotspot = findHotspot(normalized);
        const maxIntensity = Math.round(hotspot.val);

        // Render SVG
        const svg = document.getElementById('heatmap');
        svg.innerHTML = '';

        const cellWidth = 3600 / GRID_WIDTH;
        const cellHeight = 1800 / GRID_HEIGHT;

        for (let i = 0; i < GRID_HEIGHT; i++) {
          for (let j = 0; j < GRID_WIDTH; j++) {
            const val = normalized[i][j];
            const color = getColorForValue(val);
            const x = j * cellWidth;
            const y = i * cellHeight;

            const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            rect.setAttribute('x', x);
            rect.setAttribute('y', y);
            rect.setAttribute('width', cellWidth);
            rect.setAttribute('height', cellHeight);
            rect.setAttribute('fill', color);
            rect.setAttribute('stroke', 'rgba(200, 200, 200, 0.1)');
            rect.setAttribute('stroke-width', 1);
            svg.appendChild(rect);

            if (val > 5) {
              const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
              text.setAttribute('x', x + cellWidth / 2);
              text.setAttribute('y', y + cellHeight / 2);
              text.setAttribute('text-anchor', 'middle');
              text.setAttribute('dominant-baseline', 'middle');
              text.setAttribute('font-size', '32');
              text.setAttribute('font-family', 'IBM Plex Mono');
              text.setAttribute('font-weight', '600');
              text.setAttribute('fill', val > 60 ? '#000' : '#fff');
              text.setAttribute('opacity', '0.7');
              text.textContent = Math.round(grid[i][j]);
              svg.appendChild(text);
            }
          }
        }

        // Update stats
        document.getElementById('quake-count').textContent = features.length.toLocaleString();
        document.getElementById('max-intensity').textContent = maxIntensity;
        document.getElementById('hotspot').textContent = getRegionName(hotspot.lat, hotspot.lng);

      } catch (error) {
        console.error('Error loading earthquake data:', error);
        document.getElementById('quake-count').textContent = 'Error';
      }
    }

    // Load on page ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', render);
    } else {
      render();
    }
  </script>
</body>
</html>
