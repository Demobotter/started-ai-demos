<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradient Palette Extractor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background: linear-gradient(135deg, #0f0f1e 0%, #1a0033 50%, #0f1f2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255, 0, 212, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    .container {
      width: 100%;
      max-width: 900px;
      animation: containerFadeIn 0.6s ease-out;
    }

    @keyframes containerFadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero {
      text-align: center;
      margin-bottom: 60px;
      animation: heroSlideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes heroSlideDown {
      from {
        opacity: 0;
        transform: translateY(-40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(42px, 8vw, 72px);
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #00d4ff 0%, #ff00d4 50%, #00d4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      text-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
    }

    .hero p {
      font-size: 18px;
      color: #b8b8d8;
      font-weight: 400;
      line-height: 1.4;
    }

    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      animation: mainFadeIn 0.7s ease-out 0.2s both;
    }

    @keyframes mainFadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .input-section {
      display: flex;
      flex-direction: column;
    }

    .input-section label {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    #gradientInput {
      background: rgba(15, 15, 30, 0.6);
      border: 2px solid #00d4ff;
      border-radius: 12px;
      padding: 16px;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      color: #fff;
      min-height: 120px;
      resize: vertical;
      backdrop-filter: blur(10px);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
    }

    #gradientInput:focus {
      outline: none;
      border-color: #ff00d4;
      box-shadow: 
        0 0 20px rgba(0, 212, 255, 0.3),
        inset 0 0 20px rgba(0, 212, 255, 0.05);
    }

    #gradientInput::placeholder {
      color: #666;
    }

    .preview-section {
      display: flex;
      flex-direction: column;
    }

    .preview-label {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    #gradientPreview {
      width: 100%;
      height: 200px;
      border-radius: 12px;
      border: 2px solid #00d4ff;
      box-shadow: 
        0 0 30px rgba(0, 212, 255, 0.2),
        inset 0 0 30px rgba(0, 212, 255, 0.05);
      animation: previewFadeIn 0.6s ease-out 0.3s both;
    }

    @keyframes previewFadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .output-section {
      grid-column: 1 / -1;
      animation: outputFadeIn 0.7s ease-out 0.4s both;
    }

    @keyframes outputFadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .output-section h2 {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    .format-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .format-tab {
      background: rgba(15, 15, 30, 0.4);
      border: 1px solid #444;
      color: #b8b8d8;
      padding: 10px 18px;
      border-radius: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      backdrop-filter: blur(8px);
    }

    .format-tab:hover {
      border-color: #00d4ff;
      color: #00d4ff;
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
    }

    .format-tab.active {
      background: rgba(0, 212, 255, 0.15);
      border-color: #00d4ff;
      color: #00d4ff;
      box-shadow: 
        0 0 20px rgba(0, 212, 255, 0.2),
        inset 0 0 10px rgba(0, 212, 255, 0.05);
    }

    .output-box {
      background: rgba(15, 15, 30, 0.6);
      border: 2px solid #00d4ff;
      border-radius: 12px;
      padding: 20px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      color: #00d4ff;
      min-height: 120px;
      max-height: 250px;
      overflow-y: auto;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
      white-space: pre-wrap;
      word-break: break-all;
    }

    .output-box::-webkit-scrollbar {
      width: 8px;
    }

    .output-box::-webkit-scrollbar-track {
      background: rgba(0, 212, 255, 0.05);
      border-radius: 4px;
    }

    .output-box::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, 0.3);
      border-radius: 4px;
    }

    .output-box::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 212, 255, 0.5);
    }

    .color-chips {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .color-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .chip-swatch {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      border: 2px solid #00d4ff;
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }

    .chip-swatch:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px rgba(0, 212, 255, 0.4);
    }

    .chip-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: #b8b8d8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .copy-btn {
      background: rgba(0, 212, 255, 0.15);
      border: 1px solid #00d4ff;
      color: #00d4ff;
      padding: 10px 16px;
      border-radius: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      margin-top: 12px;
    }

    .copy-btn:hover {
      background: rgba(0, 212, 255, 0.25);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
    }

    .copy-btn:active {
      transform: scale(0.98);
    }

    .status {
      color: #ff6b9d;
      font-size: 13px;
      margin-top: 12px;
      min-height: 18px;
      font-family: 'Space Mono', monospace;
    }

    @media (max-width: 768px) {
      .main-content {
        grid-template-columns: 1fr;
        gap: 30px;
      }

      .output-section {
        grid-column: 1;
      }

      .hero h1 {
        font-size: clamp(32px, 6vw, 52px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Gradient Palette</h1>
      <p>Paste a CSS gradient, extract color stops in any format</p>
    </div>

    <div class="main-content">
      <div class="input-section">
        <label for="gradientInput">Your Gradient</label>
        <textarea 
          id="gradientInput" 
          placeholder="linear-gradient(90deg, #ff0000 0%, #0000ff 100%)
or
radial-gradient(circle, #fff 0%, #000 100%)
or any CSS gradient..."
        ></textarea>
      </div>

      <div class="preview-section">
        <div class="preview-label">Live Preview</div>
        <div id="gradientPreview"></div>
      </div>

      <div class="output-section">
        <h2>Color Palette</h2>
        <div class="format-tabs">
          <button class="format-tab active" data-format="hex">Hex Array</button>
          <button class="format-tab" data-format="rgb">RGB</button>
          <button class="format-tab" data-format="tailwind">Tailwind</button>
          <button class="format-tab" data-format="scss">SCSS</button>
          <button class="format-tab" data-format="css">CSS Vars</button>
        </div>
        <div class="output-box" id="outputBox"></div>
        <button class="copy-btn" id="copyBtn">Copy Code</button>
        <div class="status" id="status"></div>
        <div class="color-chips" id="colorChips"></div>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById('gradientInput');
    const preview = document.getElementById('gradientPreview');
    const outputBox = document.getElementById('outputBox');
    const colorChips = document.getElementById('colorChips');
    const status = document.getElementById('status');
    const copyBtn = document.getElementById('copyBtn');
    const formatTabs = document.querySelectorAll('.format-tab');

    let currentFormat = 'hex';
    let extractedColors = [];

    // Parse CSS gradient and extract color stops
    function parseGradient(css) {
      const colors = [];
      const colorRegex = /#[0-9a-f]{3,6}|rgb\([^)]+\)|rgba\([^)]+\)|[a-z]+/gi;
      const matches = css.match(colorRegex) || [];
      
      for (let match of matches) {
        if (isValidColor(match)) {
          colors.push(normalizeColor(match));
        }
      }

      return colors.length > 0 ? colors : null;
    }

    function isValidColor(str) {
      const hex = /^#[0-9a-f]{3,6}$/i.test(str);
      const rgb = /^rgba?\([^)]+\)$/i.test(str);
      const named = /^(red|blue|green|yellow|orange|purple|pink|cyan|magenta|white|black|gray|grey)$/i.test(str);
      return hex || rgb || named;
    }

    function normalizeColor(color) {
      if (color.startsWith('#')) return color.toUpperCase();
      if (color.toLowerCase() === 'red') return '#FF0000';
      if (color.toLowerCase() === 'blue') return '#0000FF';
      if (color.toLowerCase() === 'green') return '#00FF00';
      if (color.toLowerCase() === 'yellow') return '#FFFF00';
      if (color.toLowerCase() === 'orange') return '#FFA500';
      if (color.toLowerCase() === 'purple') return '#800080';
      if (color.toLowerCase() === 'cyan') return '#00FFFF';
      if (color.toLowerCase() === 'magenta') return '#FF00FF';
      if (color.toLowerCase() === 'white') return '#FFFFFF';
      if (color.toLowerCase() === 'black') return '#000000';
      if (color.toLowerCase() === 'pink') return '#FFC0CB';
      if (color.toLowerCase() === 'gray' || color.toLowerCase() === 'grey') return '#808080';
      
      if (color.startsWith('rgb')) {
        const match = color.match(/\d+/g);
        if (match && match.length >= 3) {
          const r = parseInt(match[0]).toString(16).padStart(2, '0');
          const g = parseInt(match[1]).toString(16).padStart(2, '0');
          const b = parseInt(match[2]).toString(16).padStart(2, '0');
          return `#${r}${g}${b}`.toUpperCase();
        }
      }
      return null;
    }

    function formatOutput(colors, format) {
      if (format === 'hex') {
        return colors.join('\n');
      } else if (format === 'rgb') {
        return colors.map(hex => {
          const r = parseInt(hex.slice(1, 3), 16);
          const g = parseInt(hex.slice(3, 5), 16);
          const b = parseInt(hex.slice(5, 7), 16);
          return `rgb(${r}, ${g}, ${b})`;
        }).join('\n');
      } else if (format === 'tailwind') {
        return colors.map((hex, i) => `'${i}': '${hex.toLowerCase()}',`).join('\n');
      } else if (format === 'scss') {
        return colors.map((hex, i) => `$color-${i}: ${hex.toLowerCase()};`).join('\n');
      } else if (format === 'css') {
        return colors.map((hex, i) => `--color-${i}: ${hex.toLowerCase()};`).join('\n');
      }
      return '';
    }

    function updateOutput() {
      const gradientCSS = input.value.trim();
      
      if (!gradientCSS) {
        preview.style.background = 'linear-gradient(135deg, #00d4ff 0%, #ff00d4 100%)';
        outputBox.textContent = 'Enter a gradient to extract colors...';
        colorChips.innerHTML = '';
        status.textContent = '';
        return;
      }

      // Validate and set preview
      try {
        preview.style.background = gradientCSS;
      } catch (e) {
        status.textContent = '❌ Invalid gradient CSS';
        return;
      }

      // Extract colors
      extractedColors = parseGradient(gradientCSS);

      if (extractedColors && extractedColors.length > 0) {
        outputBox.textContent = formatOutput(extractedColors, currentFormat);
        status.textContent = `✅ Extracted ${extractedColors.length} color${extractedColors.length !== 1 ? 's' : ''}`;
        
        // Render color chips
        colorChips.innerHTML = extractedColors.map((color, i) => `
          <div class="color-chip">
            <div class="chip-swatch" style="background-color: ${color};"></div>
            <div class="chip-label">${color}</div>
          </div>
        `).join('');
      } else {
        outputBox.textContent = 'No colors found. Use hex (#fff), rgb(255,0,0), or color names.';
        status.textContent = '';
        colorChips.innerHTML = '';
      }
    }

    input.addEventListener('input', updateOutput);

    formatTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        formatTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFormat = tab.dataset.format;
        if (extractedColors.length > 0) {
          outputBox.textContent = formatOutput(extractedColors, currentFormat);
        }
      });
    });

    copyBtn.addEventListener('click', () => {
      const text = outputBox.textContent;
      navigator.clipboard.writeText(text).then(() => {
        status.textContent = '✅ Copied to clipboard!';
        setTimeout(() => {
          if (extractedColors.length > 0) {
            status.textContent = `✅ Extracted ${extractedColors.length} color${extractedColors.length !== 1 ? 's' : ''}`;
          }
        }, 2000);
      }).catch(() => {
        status.textContent = '❌ Copy failed';
      });
    });

    // Load default on init
    input.value = 'linear-gradient(135deg, #00d4ff 0%, #ff00d4 50%, #00d4ff 100%)';
    updateOutput();
  </script>
</body>
</html>
