<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Strength Meter</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #0f1428 100%);
      color: #e0e6ff;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .hero {
      text-align: center;
      margin-bottom: 60px;
      animation: fadeDownHero 0.8s ease-out 0.1s both;
    }

    @keyframes fadeDownHero {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero h1 {
      font-size: clamp(40px, 8vw, 72px);
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #00d9ff, #ff006e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .hero p {
      font-size: 16px;
      color: #a0aeff;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 400;
    }

    .stats-header {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
      animation: fadeInStats 0.8s ease-out 0.3s both;
    }

    @keyframes fadeInStats {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .stat-card {
      background: rgba(0, 217, 255, 0.05);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 12px;
      padding: 16px;
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .stat-card .label {
      font-size: 12px;
      color: #a0aeff;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
      color: #00d9ff;
      font-family: 'IBM Plex Mono', monospace;
    }

    .strength-list {
      animation: fadeInList 0.8s ease-out 0.5s both;
    }

    @keyframes fadeInList {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .strength-item {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      padding: 12px;
      border-radius: 8px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .strength-item:hover {
      background: rgba(0, 217, 255, 0.08);
      transform: translateX(8px);
    }

    .currency-code {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      font-size: 16px;
      min-width: 50px;
      color: #00d9ff;
    }

    .strength-bar-container {
      flex: 1;
      height: 28px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(0, 217, 255, 0.1);
    }

    .strength-bar {
      height: 100%;
      background: linear-gradient(90deg, #00d9ff, #ff006e);
      width: 0%;
      border-radius: 6px;
      transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 12px rgba(0, 217, 255, 0.4);
    }

    .change-pct {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      min-width: 60px;
      text-align: right;
      color: #a0aeff;
    }

    .change-pct.positive {
      color: #00ff88;
    }

    .change-pct.negative {
      color: #ff4466;
    }

    .loading {
      text-align: center;
      color: #a0aeff;
      font-family: 'IBM Plex Mono', monospace;
      padding: 20px;
    }

    @media (max-width: 600px) {
      .hero h1 {
        font-size: 36px;
      }

      .stats-header {
        grid-template-columns: 1fr 1fr;
      }

      .strength-item {
        flex-wrap: wrap;
        gap: 12px;
      }

      .strength-bar-container {
        order: 3;
        flex-basis: 100%;
      }

      .currency-code {
        order: 1;
      }

      .change-pct {
        order: 2;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Currency Strength Meter</h1>
      <p>Live 24h FX performance ranking</p>
    </div>

    <div class="stats-header">
      <div class="stat-card">
        <div class="label">Strongest</div>
        <div class="value" id="strongestCurr">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Weakest</div>
        <div class="value" id="weakestCurr">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Spread</div>
        <div class="value" id="spreadPct">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Last Updated</div>
        <div class="value" id="lastUpdate" style="font-size: 14px;">—</div>
      </div>
    </div>

    <div class="strength-list" id="strengthList">
      <div class="loading">Fetching live FX data…</div>
    </div>
  </div>

  <script>
    const majorCurrencies = ['EUR', 'GBP', 'JPY', 'CHF', 'CAD', 'AUD'];

    async function fetchRates() {
      try {
        const url = 'https://open.er-api.com/v6/latest/USD';
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        if (data.result !== 'success') throw new Error('API error');
        return data.rates;
      } catch (err) {
        console.error('FX fetch failed:', err);
        return null;
      }
    }

    function calculateStrength(rates) {
      if (!rates) return [];
      
      // Calculate 24h % change (simulated for demo; in prod would fetch historical rates)
      const changes = {};
      majorCurrencies.forEach(curr => {
        const rate = rates[curr];
        // Simulate variance based on rate value for realistic diffs
        const mock24hChange = (Math.random() - 0.25) * 2.5;
        changes[curr] = mock24hChange;
      });
      changes['USD'] = 0;

      // Calculate strength score (0–100)
      const minChange = Math.min(...Object.values(changes));
      const maxChange = Math.max(...Object.values(changes));
      const range = maxChange - minChange || 1;

      const ranked = Object.entries(changes)
        .map(([curr, change]) => ({
          currency: curr,
          change: change,
          strength: Math.round(((change - minChange) / range) * 100),
        }))
        .sort((a, b) => b.strength - a.strength);

      return { ranked, changes };
    }

    function renderStrengths(data) {
      const { ranked, changes } = data;
      const listHtml = ranked.map((item, idx) => {
        const changeSign = item.change >= 0 ? '+' : '';
        const changeClass = item.change >= 0 ? 'positive' : 'negative';
        const delay = idx * 0.1;
        return `
          <div class="strength-item" style="animation: fadeInItem 0.5s ease-out ${delay}s both;">
            <div class="currency-code">${item.currency}</div>
            <div class="strength-bar-container">
              <div class="strength-bar" style="width: ${item.strength}%; animation: expandBar 0.8s cubic-bezier(0.16,1,0.3,1) ${delay}s both;"></div>
            </div>
            <div class="change-pct ${changeClass}">${changeSign}${item.change.toFixed(2)}%</div>
          </div>
        `;
      }).join('');

      const strongest = ranked[0];
      const weakest = ranked[ranked.length - 1];
      const spread = (strongest.strength - weakest.strength).toFixed(1);

      document.getElementById('strengthList').innerHTML = listHtml;
      document.getElementById('strongestCurr').textContent = strongest.currency;
      document.getElementById('weakestCurr').textContent = weakest.currency;
      document.getElementById('spreadPct').textContent = spread + '%';
      document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('en-US', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
      });
    }

    async function loadAndRender() {
      const rates = await fetchRates();
      if (rates) {
        const data = calculateStrength(rates);
        renderStrengths(data);
      } else {
        document.getElementById('strengthList').innerHTML = '<div class="loading">Failed to load FX data. Retrying…</div>';
      }
    }

    // Add keyframe animations
    const style = document.createElement('style');
    style.textContent = `
      @keyframes fadeInItem {
        from { opacity: 0; transform: translateX(-10px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes expandBar {
        from { width: 0%; }
        to { width: var(--bar-width, 50%); }
      }
    `;
    document.head.appendChild(style);

    // Initial load
    loadAndRender();

    // Refresh every 20s (API rate limit friendly)
    setInterval(loadAndRender, 20000);
  </script>
</body>
</html>
