<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Depth Scale</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: radial-gradient(circle at 20% 50%, #0a0a1a 0%, #000000 50%, #001a2e 100%);
            color: #e0e0ff;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(40px, 8vw, 72px);
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #00d9ff, #00ffaa, #ff00ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 16px;
            color: #aaaacc;
            letter-spacing: 2px;
        }

        .main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: stretch;
        }

        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            animation: fadeInLeft 0.8s ease-out 0.1s backwards;
        }

        .distance-display {
            background: rgba(0, 217, 255, 0.1);
            border: 2px solid #00d9ff;
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }

        .distance-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 700;
            color: #00ffaa;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .distance-unit {
            font-size: 14px;
            color: #aaaacc;
            letter-spacing: 2px;
        }

        .slider-group {
            margin-bottom: 32px;
        }

        .slider-label {
            display: block;
            font-size: 12px;
            color: #aaaacc;
            margin-bottom: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: linear-gradient(90deg, #00d9ff, #00ffaa, #ff00ff);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #00ffaa;
            cursor: pointer;
            box-shadow: 0 0 16px rgba(0, 255, 170, 0.6);
        }

        input[type="range"]::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #00ffaa;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 16px rgba(0, 255, 170, 0.6);
        }

        .unit-toggle {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .unit-btn {
            flex: 1;
            padding: 12px;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid #00d9ff;
            color: #00d9ff;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            letter-spacing: 1px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .unit-btn.active {
            background: #00d9ff;
            color: #000000;
        }

        .unit-btn:hover {
            border-color: #00ffaa;
            color: #00ffaa;
        }

        .visualization {
            animation: fadeInRight 0.8s ease-out 0.2s backwards;
        }

        .bars-container {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #00d9ff;
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(10px);
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .bar-group {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
            animation: slideInRight 0.6s ease-out backwards;
        }

        .bar-group:nth-child(1) { animation-delay: 0.3s; }
        .bar-group:nth-child(2) { animation-delay: 0.35s; }
        .bar-group:nth-child(3) { animation-delay: 0.4s; }
        .bar-group:nth-child(4) { animation-delay: 0.45s; }
        .bar-group:nth-child(5) { animation-delay: 0.5s; }
        .bar-group:nth-child(6) { animation-delay: 0.55s; }
        .bar-group:nth-child(7) { animation-delay: 0.6s; }
        .bar-group:nth-child(8) { animation-delay: 0.65s; }
        .bar-group:nth-child(9) { animation-delay: 0.7s; }

        .bar-label {
            min-width: 80px;
            font-size: 12px;
            color: #aaaacc;
            text-align: right;
            letter-spacing: 1px;
        }

        .bar-fill {
            height: 24px;
            border-radius: 6px;
            background: linear-gradient(90deg, #00d9ff, #00ffaa);
            transition: width 0.3s ease;
            min-width: 4px;
            box-shadow: 0 0 12px rgba(0, 217, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        .bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: shimmer 2s infinite;
        }

        .bar-value {
            min-width: 100px;
            font-size: 12px;
            color: #00ffaa;
            font-weight: 700;
            letter-spacing: 1px;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @media (max-width: 768px) {
            .main {
                grid-template-columns: 1fr;
                gap: 32px;
            }

            h1 {
                font-size: clamp(32px, 6vw, 48px);
            }

            .distance-value {
                font-size: 36px;
            }

            .bar-label {
                min-width: 60px;
                font-size: 11px;
            }

            .bar-value {
                min-width: 80px;
                font-size: 11px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Solar Depth</h1>
            <p class="subtitle">EXPLORE COSMIC DISTANCES</p>
        </header>

        <div class="main">
            <div class="hero">
                <div class="distance-display">
                    <div class="distance-value" id="distanceValue">1.5</div>
                    <div class="distance-unit" id="distanceUnit">MILLION KM</div>
                </div>

                <div class="slider-group">
                    <label class="slider-label">Distance Slider</label>
                    <input type="range" id="distanceSlider" min="0" max="100" value="50">
                </div>

                <div class="unit-toggle">
                    <button class="unit-btn active" data-unit="km">km</button>
                    <button class="unit-btn" data-unit="au">au</button>
                    <button class="unit-btn" data-unit="ly">light-years</button>
                </div>
            </div>

            <div class="visualization">
                <div class="bars-container" id="barsContainer">
                    <!-- bars generated by JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Solar system bodies with distances from Earth (in km)
        const bodies = [
            { name: 'Moon', km: 384_400, color: '#e0e0ff' },
            { name: 'Sun', km: 149_600_000, color: '#ffaa00' },
            { name: 'Mercury', km: 77_300_000, color: '#aa8844' },
            { name: 'Venus', km: 41_400_000, color: '#ffdd99' },
            { name: 'Mars', km: 225_000_000, color: '#ff6644' },
            { name: 'Jupiter', km: 628_000_000, color: '#cc8844' },
            { name: 'Saturn', km: 1_275_000_000, color: '#ddbb88' },
            { name: 'Neptune', km: 4_495_000_000, color: '#4488ff' },
            { name: 'Proxima Centauri', km: 39_900_000_000_000, color: '#ff88ff' }
        ];

        const AU_IN_KM = 149_600_000;
        const LY_IN_KM = 9_461_000_000_000;

        let currentUnit = 'km';
        let currentDistance = 1_500_000_000; // 1 AU in km

        function updateDisplay() {
            const distanceValue = document.getElementById('distanceValue');
            const distanceUnit = document.getElementById('distanceUnit');
            const slider = document.getElementById('distanceSlider');
            
            const sliderValue = parseFloat(slider.value);

            // Map slider (0-100) to exponential distance range
            // 0 = 1 million km, 100 = 100 trillion km
            const logMin = Math.log(1_000_000);
            const logMax = Math.log(100_000_000_000_000);
            const logDistance = logMin + (sliderValue / 100) * (logMax - logMin);
            currentDistance = Math.exp(logDistance);

            let displayValue;
            let displayUnit;

            if (currentUnit === 'km') {
                displayValue = formatNumber(currentDistance);
                displayUnit = 'KM';
            } else if (currentUnit === 'au') {
                displayValue = (currentDistance / AU_IN_KM).toFixed(2);
                displayUnit = 'AU';
            } else if (currentUnit === 'ly') {
                displayValue = (currentDistance / LY_IN_KM).toFixed(4);
                displayUnit = 'LIGHT-YEARS';
            }

            distanceValue.textContent = displayValue;
            distanceUnit.textContent = displayUnit;

            renderBars();
        }

        function formatNumber(num) {
            if (num >= 1e12) return (num / 1e12).toFixed(1) + "T";
            if (num >= 1e9) return (num / 1e9).toFixed(1) + "B";
            if (num >= 1e6) return (num / 1e6).toFixed(1) + "M";
            if (num >= 1e3) return (num / 1e3).toFixed(1) + "K";
            if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            return num.toFixed(0);
        }

        function renderBars() {
            const container = document.getElementById('barsContainer');
            container.innerHTML = '';

            const maxDist = Math.max(...bodies.map(b => b.km));
            const scaleFactor = 100 / Math.log(maxDist);

            bodies.forEach((body, idx) => {
                const barGroup = document.createElement('div');
                barGroup.className = 'bar-group';
                barGroup.style.animationDelay = (0.3 + idx * 0.05) + 's';

                const label = document.createElement('div');
                label.className = 'bar-label';
                label.textContent = body.name;

                const barFill = document.createElement('div');
                barFill.className = 'bar-fill';
                barFill.style.background = body.color;

                // Width is log-scaled for visibility across huge range
                const logDist = Math.log(body.km);
                const logMax = Math.log(maxDist);
                const percentWidth = (logDist / logMax) * 100;
                barFill.style.width = Math.max(2, percentWidth) + '%';

                const value = document.createElement('div');
                value.className = 'bar-value';
                value.textContent = formatNumber(body.km);

                barGroup.appendChild(label);
                barGroup.appendChild(barFill);
                barGroup.appendChild(value);

                container.appendChild(barGroup);
            });
        }

        // Event listeners
        document.getElementById('distanceSlider').addEventListener('input', updateDisplay);

        document.querySelectorAll('.unit-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentUnit = e.target.dataset.unit;
                updateDisplay();
            });
        });

        // Initial render
        updateDisplay();
    </script>
</body>
</html>
