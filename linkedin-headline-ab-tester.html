<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeadlineStudio — LinkedIn Headline A/B Tester</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;800&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f6f3;--surface:#fff;--s2:#f0ede8;--border:#ddd6ce;--text:#1a1815;--muted:#8a8278;--accent:#6366f1;--al:rgba(99,102,241,.08);--r:11px;--max:800px}
body{font-family:'Hanken Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased}
header{border-bottom:1px solid var(--border);padding:20px 28px;display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.logo{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.15rem;letter-spacing:-.02em}
.logo span{color:var(--accent)}
.badge{font-size:.65rem;font-weight:700;color:var(--muted);border:1px solid var(--border);padding:5px 11px;border-radius:20px;letter-spacing:.05em;text-transform:uppercase}
.wrap{max-width:var(--max);margin:0 auto;padding:0 28px}
.hero{padding:48px 0 36px;text-align:center}
.hero h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(1.8rem,5vw,2.6rem);letter-spacing:-.03em;line-height:1.15;margin-bottom:10px}
.hero h1 em{font-style:normal;color:var(--accent)}
.hero p{color:var(--muted);max-width:420px;margin:0 auto;font-size:.95rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:32px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.field+.field{margin-top:20px}
label{display:block;font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
textarea,input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Hanken Grotesk',sans-serif;font-size:.93rem;padding:13px 15px;line-height:1.6;transition:border-color .15s,box-shadow .15s}
textarea{min-height:80px;resize:vertical}
textarea:focus,input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
textarea::placeholder,input::placeholder{color:#bbb5ae}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:540px){.row2{grid-template-columns:1fr}}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.chip{font-family:'Hanken Grotesk',sans-serif;font-size:.7rem;font-weight:600;background:var(--s2);border:1px solid var(--border);color:var(--muted);padding:5px 13px;border-radius:20px;cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--accent);color:var(--accent);background:var(--al)}
.btn{width:100%;margin-top:26px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:.93rem;padding:16px;cursor:pointer;transition:background .15s,transform .1s}
.btn:hover{background:#5558e3}
.btn:active{transform:scale(.98)}
.loading{display:none;text-align:center;padding:56px 0}
.loading.on{display:block}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--muted);font-size:.85rem}
#results{display:none}
#results.on{display:block}
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.rh h2{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:-.02em}
.reset{font-family:'Hanken Grotesk',sans-serif;font-size:.7rem;font-weight:700;background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:20px;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.05em}
.reset:hover{border-color:var(--text);color:var(--text)}
.var{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start;box-shadow:0 1px 2px rgba(0,0,0,.02);transition:border-color .15s}
.var:hover{border-color:#ccc0b5}
.var.win{border-color:var(--accent);background:var(--al)}
.rank{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:.8rem;min-width:28px;text-align:center;color:var(--muted);flex-shrink:0}
.var.win .rank{color:var(--accent)}
.main{flex:1;min-width:0}
.vtext{font-size:.92rem;font-weight:600;margin-bottom:6px;line-height:1.4}
.meta{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.tag{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 9px;border-radius:20px;background:var(--s2);color:var(--muted);border:1px solid var(--border)}
.win-badge{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--accent)}
.notes{font-size:.8rem;color:var(--muted);line-height:1.4}
.score{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-left:8px}
.bar{width:50px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.fill{height:100%;background:var(--accent);border-radius:3px}
.num{font-family:'Bricolage Grotesque',sans-serif;font-size:.75rem;font-weight:700;color:var(--muted);min-width:30px;text-align:right}
.var.win .num{color:var(--accent)}
.copy{font-family:'Hanken Grotesk',sans-serif;font-size:.68rem;font-weight:700;background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:18px;cursor:pointer;transition:all .15s;white-space:nowrap}
.copy:hover{border-color:var(--accent);color:var(--accent)}
.copy.ok{border-color:#10b981;color:#10b981}
.insight{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;margin-top:14px}
.insight h3{font-family:'Bricolage Grotesque',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.insight p{font-size:.84rem;line-height:1.6;color:var(--text)}
footer{border-top:1px solid var(--border);padding:32px 28px;text-align:center;color:var(--muted);font-size:.7rem;margin-top:48px}
</style>
</head>
<body>
<header>
  <div class="logo">Headline<span>Studio</span></div>
  <div class="badge">Demo</div>
</header>

<div class="wrap">
  <div class="hero">
    <h1>Test your LinkedIn headline<br>against <em>50 variations</em></h1>
    <p>Paste your current headline. Get 8 tested alternatives ranked by engagement potential.</p>
  </div>

  <div id="inp">
    <div class="card">
      <div class="field">
        <label>Your current headline</label>
        <div class="chips">
          <button class="chip" onclick="load('pm')">Product Manager</button>
          <button class="chip" onclick="load('dev')">Software Engineer</button>
          <button class="chip" onclick="load('founder')">Founder/CEO</button>
          <button class="chip" onclick="load('marketer')">Marketing</button>
        </div>
        <textarea id="current" placeholder="e.g. Product Manager at Stripe | GTM Strategy | B2B SaaS"></textarea>
      </div>
      <div class="row2 field">
        <div>
          <label>Your industry</label>
          <input id="industry" type="text" placeholder="e.g. SaaS, Fintech, E-commerce">
        </div>
        <div>
          <label>Your goal</label>
          <input id="goal" type="text" placeholder="e.g. Attract investors, Get hired, Land clients">
        </div>
      </div>
      <button class="btn" onclick="test()">Test 50 Variations →</button>
    </div>
  </div>

  <div class="loading" id="load">
    <div class="spinner"></div>
    <p>Running variations through engagement model…</p>
  </div>

  <div id="results">
    <div class="rh">
      <h2>8 Top Performers</h2>
      <button class="reset" onclick="reset()">← Start over</button>
    </div>
    <div id="list"></div>
    <div class="insight" id="insight"></div>
  </div>
</div>

<footer>HeadlineStudio · Demo by Started AI · Not a real service</footer>

<script>
const SAMPLES={
  pm:{current:'Product Manager at Stripe | GTM Strategy | B2B SaaS',industry:'SaaS',goal:'Attract investors'},
  dev:{current:'Senior Software Engineer | React & TypeScript | Remote-first advocate',industry:'Fintech',goal:'Get hired'},
  founder:{current:'Founder & CEO at CloudMetrics | AI-Powered Analytics',industry:'AI/ML',goal:'Land enterprise deals'},
  marketer:{current:'Head of Growth @ DTC Brand | 7-figure revenue specialist',industry:'E-commerce',goal:'Build personal brand'}
};

function load(k){const s=SAMPLES[k];document.getElementById('current').value=s.current;document.getElementById('industry').value=s.industry;document.getElementById('goal').value=s.goal}

const TEMPLATES=[
  (c,i,g)=>c.replace(/\|.*/,'').trim()+' | '+g.split(',')[0].trim()+' specialist',
  (c,i,g)=>c.split('|')[0].trim()+' | Helping '+i.split(',')[0]+' teams scale',
  (c,i,g)=>c.split('|')[0].trim()+' | '+i.split(',')[0]+' founder',
  (c,i,g)=>'🚀 '+c.split('|')[0].trim()+' | '+g.split(',')[0],
  (c,i,g)=>c.split('|')[0].trim()+' | I build products in '+i.split(',')[0],
  (c,i,g)=>c.replace(/at\s+\w+/,'').split('|')[0].trim()+' | '+i.split(',')[0]+' → '+g.split(',')[0],
  (c,i,g)=>c.split('|')[0].trim()+' • Passionate about '+i.split(',')[0].toLowerCase(),
  (c,i,g)=>c.split('|')[0].trim()+' | Open to opportunities in '+g.split(',')[0]
];

const SCORES=[88,79,76,82,71,85,77,73];
const INSIGHTS={
  88:'Your current headline + updated positioning ranks highest — specificity + clear value',
  87:'Adding a persona shift signal (founder, builder) resonates strongest with this audience',
  86:'Industry-specific language triggers 23% more profile views than generic titles',
  85:'Emoji + urgency language outperforms neutral headlines by engagement metrics',
  82:'Role clarity + second skill set combination is tested-strong for this profile',
  81:'Opportunity framing typically attracts 2x more inbounds than industry focus alone'
};

function test(){
  const current=document.getElementById('current').value.trim();
  if(!current){document.getElementById('current').focus();return}
  const industry=document.getElementById('industry').value.trim()||'tech';
  const goal=document.getElementById('goal').value.trim()||'grow reach';
  document.getElementById('inp').style.display='none';
  document.getElementById('load').classList.add('on');
  document.getElementById('results').classList.remove('on');
  setTimeout(()=>{
    const items=TEMPLATES.map((fn,i)=>({
      text:fn(current,industry,goal),
      score:Math.min(99,SCORES[i]+Math.round((Math.random()-.5)*5)),
      rationale:['Specificity + value prop','Audience + benefit','Role clarity','Pattern interrupt','Personal mission','Industry pivot','Passion signal','Opportunity framing'][i]
    }));
    items.sort((a,b)=>b.score-a.score);
    document.getElementById('list').innerHTML=items.map((it,i)=>`
      <div class="var ${i===0?'win':''}">
        <div class="rank">${i===0?'★':'#'+(i+1)}</div>
        <div class="main">
          <div class="vtext">${esc(it.text)}</div>
          <div class="meta"><span class="tag">${it.rationale}</span>${i===0?'<span class="win-badge">Highest engagement</span>':''}</div>
          <div class="notes">${it.score}% estimated engagement vs your current</div>
        </div>
        <div class="score">
          <div class="bar"><div class="fill" style="width:${it.score}%"></div></div>
          <div class="num">${it.score}%</div>
        </div>
        <button class="copy" onclick="cp(this,${JSON.stringify(it.text)})">Copy</button>
      </div>`).join('');
    const top=items[0];
    document.getElementById('insight').innerHTML=`<h3>Why this wins</h3><p>${INSIGHTS[top.score]||'This variation combines tested engagement patterns: specificity, value clarity, and audience targeting. LinkedIn algorithms favor headlines that include job title + industry + clear benefit.'}</p>`;
    document.getElementById('load').classList.remove('on');
    document.getElementById('results').classList.add('on');
  },1400);
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function cp(btn,text){navigator.clipboard.writeText(text).then(()=>{btn.textContent='Copied ✓';btn.classList.add('ok');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('ok')},2000)})}
function reset(){document.getElementById('results').classList.remove('on');document.getElementById('inp').style.display='block';document.getElementById('current').value='';document.getElementById('industry').value='';document.getElementById('goal').value=''}
</script>
</body>
</html>
