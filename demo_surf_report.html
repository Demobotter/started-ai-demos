<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surf & Marine Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg1:#06141f;--bg2:#0a2233;--bg3:#072530;
    --teal:#2dd4bf;--cyan:#38bdf8;--ink:#e7f6f8;--muted:#7ba0ad;
    --card:rgba(255,255,255,.05);--border:rgba(56,189,248,.18);--radius:18px;
  }
  body{
    font-family:'Inter',sans-serif;color:var(--ink);min-height:100vh;
    background:radial-gradient(1200px 600px at 50% -10%,#0e2c3d 0%,var(--bg1) 60%);
    padding:32px 18px 60px;display:flex;flex-direction:column;align-items:center;
  }
  .wrap{width:100%;max-width:780px}
  header{text-align:center;margin-bottom:26px;animation:fade .8s ease both}
  h1{font-family:'Sora',sans-serif;font-size:clamp(28px,6vw,42px);font-weight:700;
     background:linear-gradient(90deg,var(--teal),var(--cyan));-webkit-background-clip:text;
     background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px}
  .sub{color:var(--muted);margin-top:8px;font-size:15px}
  .search{display:flex;gap:10px;margin:0 auto 22px;max-width:460px;animation:fade .8s .1s ease both}
  input{flex:1;padding:14px 16px;border-radius:14px;border:1px solid var(--border);
    background:var(--card);color:var(--ink);font-size:15px;font-family:inherit;outline:none}
  input:focus{border-color:var(--cyan)}
  button{padding:14px 22px;border:none;border-radius:14px;cursor:pointer;font-weight:600;
    font-family:inherit;font-size:15px;color:#04161d;
    background:linear-gradient(90deg,var(--teal),var(--cyan));transition:transform .15s,box-shadow .15s}
  button:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(45,212,191,.3)}
  button:active{transform:translateY(0)}
  .status{text-align:center;min-height:22px;margin-bottom:16px;font-size:14px}
  .status.load{color:var(--cyan)}.status.err{color:#f87171}.status.ok{color:var(--teal)}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    backdrop-filter:blur(10px);overflow:hidden;animation:rise .6s ease both;display:none}
  .wave-box{position:relative;height:160px;background:linear-gradient(180deg,#0a2a3a,#072530);overflow:hidden}
  canvas{position:absolute;inset:0;width:100%;height:100%}
  .place{position:absolute;top:14px;left:18px;z-index:2}
  .place .name{font-family:'Sora',sans-serif;font-size:20px;font-weight:700}
  .place .ctry{color:var(--muted);font-size:13px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border)}
  .cell{background:var(--bg3);padding:18px 14px;text-align:center}
  .cell .lbl{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.6px}
  .cell .val{font-family:'Sora',sans-serif;font-size:24px;font-weight:700;margin-top:6px}
  .cell .unit{font-size:13px;color:var(--muted);font-weight:500}
  .verdict{padding:16px 18px;text-align:center;font-size:15px;font-weight:600;border-top:1px solid var(--border)}
  @media(max-width:560px){.grid{grid-template-columns:repeat(2,1fr)}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🌊 Surf &amp; Marine Report</h1>
    <p class="sub">Live wave height, swell &amp; sea temperature for any coast on Earth</p>
  </header>
  <div class="search">
    <input id="q" placeholder="Try a coastal city — Sydney, Lisbon, Honolulu…" value="Sydney">
    <button id="go">Check</button>
  </div>
  <div id="status" class="status"></div>
  <div class="panel" id="panel">
    <div class="wave-box">
      <canvas id="cv"></canvas>
      <div class="place"><div class="name" id="pname">—</div><div class="ctry" id="pctry">—</div></div>
    </div>
    <div class="grid">
      <div class="cell"><div class="lbl">Wave Height</div><div class="val" id="wh">—<span class="unit"> m</span></div></div>
      <div class="cell"><div class="lbl">Swell Period</div><div class="val" id="wp">—<span class="unit"> s</span></div></div>
      <div class="cell"><div class="lbl">Direction</div><div class="val" id="wd">—</div></div>
      <div class="cell"><div class="lbl">Sea Temp</div><div class="val" id="st">—<span class="unit"> °C</span></div></div>
    </div>
    <div class="verdict" id="verdict"></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const DIRS=['N','NE','E','SE','S','SW','W','NW'];
function dirName(deg){return DIRS[Math.round((deg%360)/45)%8]}
function verdict(h,p){
  if(h==null)return{t:'No marine data for this spot',c:'#7ba0ad'};
  if(h<0.3)return{t:'🟦 Flat — glassy, barely rideable',c:'#38bdf8'};
  if(h<0.8)return{t:'🟩 Small & clean — great for beginners',c:'#2dd4bf'};
  if(h<1.6)return{t:'🟨 Fun size — solid waves, go surf',c:'#fbbf24'};
  if(h<2.6)return{t:'🟧 Pumping — experienced surfers',c:'#fb923c'};
  return{t:'🟥 Heavy — big-wave conditions, caution',c:'#f87171'};
}
// wave animation driven by real height
let amp=14,raf=null;
function animate(){
  const cv=$('cv'),ctx=cv.getContext('2d');
  const w=cv.width=cv.offsetWidth,h=cv.height=cv.offsetHeight;
  let t=0;
  function frame(){
    ctx.clearRect(0,0,w,h);
    for(let layer=0;layer<3;layer++){
      ctx.beginPath();
      const base=h*0.55+layer*16, a=amp*(1-layer*0.22), sp=0.012+layer*0.004;
      ctx.moveTo(0,h);
      for(let x=0;x<=w;x+=4){
        const y=base+Math.sin(x*sp+t+layer)*a+Math.sin(x*sp*0.5+t*0.7)*a*0.4;
        ctx.lineTo(x,y);
      }
      ctx.lineTo(w,h);ctx.closePath();
      const g=ctx.createLinearGradient(0,base-amp,0,h);
      const al=0.30-layer*0.07;
      g.addColorStop(0,`rgba(56,189,248,${al+0.15})`);
      g.addColorStop(1,`rgba(45,212,191,${al})`);
      ctx.fillStyle=g;ctx.fill();
    }
    t+=0.04;raf=requestAnimationFrame(frame);
  }
  if(raf)cancelAnimationFrame(raf);
  frame();
}
async function go(){
  const q=$('q').value.trim();
  if(!q)return;
  setStatus('Searching…','load');$('panel').style.display='none';
  try{
    const gr=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1`).then(r=>r.json());
    if(!gr.results||!gr.results.length){setStatus('Place not found — try another city','err');return;}
    const p=gr.results[0];
    const mr=await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${p.latitude}&longitude=${p.longitude}&current=wave_height,wave_direction,wave_period,sea_surface_temperature`).then(r=>r.json());
    const c=mr.current||{};
    const wh=c.wave_height;
    $('pname').textContent=p.name;
    $('pctry').textContent=[p.admin1,p.country].filter(Boolean).join(', ');
    $('wh').innerHTML=(wh!=null?wh.toFixed(1):'—')+'<span class="unit"> m</span>';
    $('wp').innerHTML=(c.wave_period!=null?c.wave_period.toFixed(0):'—')+'<span class="unit"> s</span>';
    $('wd').textContent=c.wave_direction!=null?dirName(c.wave_direction):'—';
    $('st').innerHTML=(c.sea_surface_temperature!=null?c.sea_surface_temperature.toFixed(1):'—')+'<span class="unit"> °C</span>';
    const v=verdict(wh,c.wave_period);
    const vd=$('verdict');vd.textContent=v.t;vd.style.color=v.c;
    amp=wh!=null?Math.min(8+wh*16,46):10;
    $('panel').style.display='block';
    if(wh==null)setStatus('⚠️ Inland spot — no marine data. Try a coastal city.','err');
    else setStatus(`✓ Live marine data for ${p.name}`,'ok');
    requestAnimationFrame(animate);
  }catch(e){setStatus('Network error — try again',' err');}
}
function setStatus(t,c){const s=$('status');s.textContent=t;s.className='status '+(c||'').trim();}
$('go').onclick=go;
$('q').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
go();
</script>
</body>
</html>
