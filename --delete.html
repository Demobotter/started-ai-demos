<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carbon Impact Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@10..48,400;10..48,600;10..48,700&family=Cousine:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Cousine', monospace;
      background: linear-gradient(135deg, #0f3d0f 0%, #1a4d2e 50%, #0d2818 100%);
      color: #f5f5f5;
      min-height: 100vh;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    .container { max-width: 1200px; margin: 0 auto; }

    /* HERO */
    header {
      text-align: center;
      margin-bottom: 60px;
      animation: fadeInUp 0.8s cubic-bezier(.16,1,.3,1);
    }
    h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: clamp(36px, 8vw, 68px);
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #a3c14a 0%, #52b788 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subhead {
      font-size: 18px;
      color: #c8d8c8;
      font-weight: 400;
      max-width: 600px;
      margin: 0 auto;
    }

    /* SCENARIO CARDS */
    .scenarios-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 50px;
      animation: fadeInUp 1s cubic-bezier(.16,1,.3,1) 0.1s backwards;
    }
    .scenario-card {
      background: rgba(82, 183, 136, 0.08);
      border: 1px solid rgba(163, 193, 74, 0.2);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 28px;
      transition: all 0.3s ease;
      animation: slideUp 0.6s cubic-bezier(.16,1,.3,1) backwards;
    }
    .scenario-card:nth-child(1) { animation-delay: 0.15s; }
    .scenario-card:nth-child(2) { animation-delay: 0.2s; }
    .scenario-card:nth-child(3) { animation-delay: 0.25s; }

    .scenario-card:hover {
      border-color: rgba(163, 193, 74, 0.5);
      background: rgba(82, 183, 136, 0.12);
      transform: translateY(-4px);
    }
    .scenario-name {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .scenario-label { font-size: 12px; color: #a3c14a; text-transform: uppercase; letter-spacing: 0.5px; }

    .scenario-inputs {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #a3c14a;
      font-weight: 600;
    }
    input[type="number"] {
      background: rgba(15, 61, 15, 0.4);
      border: 1px solid rgba(163, 193, 74, 0.3);
      border-radius: 8px;
      padding: 10px 12px;
      color: #f5f5f5;
      font-family: 'Cousine', monospace;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input[type="number"]:focus {
      outline: none;
      border-color: rgba(163, 193, 74, 0.7);
      background: rgba(15, 61, 15, 0.6);
    }
    .scenario-total {
      background: rgba(163, 193, 74, 0.15);
      border: 1px solid rgba(163, 193, 74, 0.4);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #a3c14a;
      margin-bottom: 12px;
    }
    .scenario-delta {
      font-size: 13px;
      text-align: center;
      color: #c8d8c8;
      min-height: 18px;
    }
    .delta-negative { color: #52b788; }
    .delta-positive { color: #ff6b6b; }

    .add-scenario-btn {
      background: rgba(163, 193, 74, 0.2);
      border: 1px solid rgba(163, 193, 74, 0.4);
      color: #a3c14a;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .add-scenario-btn:hover {
      background: rgba(163, 193, 74, 0.35);
      border-color: rgba(163, 193, 74, 0.7);
    }
    .add-scenario-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* COMPARISON CHART */
    .chart-section {
      background: rgba(82, 183, 136, 0.08);
      border: 1px solid rgba(163, 193, 74, 0.2);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 40px;
      margin-bottom: 40px;
      animation: fadeInUp 1.1s cubic-bezier(.16,1,.3,1) 0.3s backwards;
    }
    .chart-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 30px;
      color: #a3c14a;
    }
    .chart-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .chart-bar {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .bar-label {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 600;
      min-width: 120px;
      font-size: 14px;
    }
    .bar-wrapper {
      flex: 1;
      height: 50px;
      background: rgba(15, 61, 15, 0.5);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    .bar-fill {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 12px;
      border-radius: 8px;
      transition: width 0.5s cubic-bezier(.16,1,.3,1);
      font-weight: 600;
      font-size: 13px;
      color: #f5f5f5;
    }
    .bar-fill.scenario-1 { background: linear-gradient(90deg, #5b7fde, #7b9cff); }
    .bar-fill.scenario-2 { background: linear-gradient(90deg, #52b788, #7dd3a0); }
    .bar-fill.scenario-3 { background: linear-gradient(90deg, #ff6b6b, #ff8787); }

    .bar-value {
      font-size: 12px;
      color: #a3c14a;
      min-width: 80px;
      text-align: right;
    }

    /* INSIGHTS */
    .insights-section {
      background: rgba(82, 183, 136, 0.08);
      border: 1px solid rgba(163, 193, 74, 0.2);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 40px;
      animation: fadeInUp 1.2s cubic-bezier(.16,1,.3,1) 0.4s backwards;
    }
    .insights-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #a3c14a;
    }
    .insight-item {
      padding: 12px 0;
      font-size: 14px;
      color: #c8d8c8;
      line-height: 1.6;
    }

    /* CONTROLS */
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 40px;
      animation: fadeInUp 1.3s cubic-bezier(.16,1,.3,1) 0.5s backwards;
    }
    button {
      background: rgba(163, 193, 74, 0.25);
      border: 1px solid rgba(163, 193, 74, 0.5);
      color: #a3c14a;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Cousine', monospace;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }
    button:hover {
      background: rgba(163, 193, 74, 0.4);
      border-color: rgba(163, 193, 74, 0.8);
      transform: translateY(-2px);
    }

    /* ANIMATIONS */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .scenarios-grid { grid-template-columns: 1fr; }
      .chart-section { padding: 24px; }
      h1 { font-size: clamp(28px, 7vw, 48px); }
      .chart-bar { flex-direction: column; align-items: flex-start; }
      .bar-label { min-width: auto; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Carbon Impact Simulator</h1>
      <p class="subhead">Compare lifestyle scenarios and see which changes save the most CO₂</p>
    </header>

    <div class="scenarios-grid" id="scenariosContainer"></div>

    <div class="chart-section">
      <div class="chart-title">Annual CO₂ Comparison</div>
      <div class="chart-container" id="chartContainer"></div>
    </div>

    <div class="insights-section">
      <div class="insights-title">💡 Insights</div>
      <div id="insights"></div>
    </div>

    <div class="controls">
      <button onclick="resetAll()">Reset All</button>
      <button onclick="exportJSON()">Export as JSON</button>
    </div>
  </div>

  <script>
    // EPA conversion factors (kg CO2e per year)
    const FACTORS = {
      electricity: 0.385,  // per kWh/month
      gas: 5.3,            // per therm/month
      miles: 0.411,        // per mile/month
      flight: 0.255,       // per flight/year
      diet: { omnivore: 2700, vegetarian: 1900, vegan: 1500 }
    };

    // Default scenarios
    const defaultScenarios = [
      {
        name: 'My Current Life',
        color: 'scenario-1',
        electricity: 450,
        gas: 35,
        miles: 800,
        flights: 10,
        diet: 'omnivore'
      },
      {
        name: 'If I Go Vegan',
        color: 'scenario-2',
        electricity: 450,
        gas: 35,
        miles: 800,
        flights: 10,
        diet: 'vegan'
      },
      {
        name: 'If I Switch to EV',
        color: 'scenario-3',
        electricity: 450,
        gas: 35,
        miles: 0,  // EV, no driving emissions
        flights: 10,
        diet: 'omnivore'
      }
    ];

    let scenarios = JSON.parse(JSON.stringify(defaultScenarios));

    function calculateCO2(scenario) {
      const electricity = scenario.electricity * FACTORS.electricity * 12;
      const gas = scenario.gas * FACTORS.gas * 12;
      const miles = scenario.miles * FACTORS.miles * 12;
      const flight = scenario.flights * FACTORS.flight;
      const diet = FACTORS.diet[scenario.diet] || FACTORS.diet.omnivore;
      const total = electricity + gas + miles + flight + diet;
      return Math.round(total);
    }

    function render() {
      renderScenarios();
      renderChart();
      renderInsights();
    }

    function renderScenarios() {
      const container = document.getElementById('scenariosContainer');
      container.innerHTML = '';
      scenarios.forEach((s, idx) => {
        const co2 = calculateCO2(s);
        const baseline = calculateCO2(scenarios[0]);
        const delta = co2 - baseline;
        const deltaPct = ((delta / baseline) * 100).toFixed(1);
        const deltaHtml = idx === 0 ? '' : `<div class="scenario-delta ${delta < 0 ? 'delta-negative' : 'delta-positive'}">vs baseline: ${delta < 0 ? '−' : '+'}${Math.abs(delta).toLocaleString()} kg (${delta < 0 ? '−' : '+'}${Math.abs(deltaPct)}%)</div>`;

        const card = document.createElement('div');
        card.className = 'scenario-card';
        card.innerHTML = `
          <div class="scenario-name">
            <span class="scenario-label">${idx === 0 ? 'Baseline' : 'Alternative ' + idx}</span>
            ${s.name}
          </div>
          <div class="scenario-inputs">
            <div class="input-group">
              <label>Electricity (kWh/month)</label>
              <input type="number" value="${s.electricity}" onchange="updateScenario(${idx}, 'electricity', this.value)" min="0" max="1000">
            </div>
            <div class="input-group">
              <label>Gas (therms/month)</label>
              <input type="number" value="${s.gas}" onchange="updateScenario(${idx}, 'gas', this.value)" min="0" max="100">
            </div>
            <div class="input-group">
              <label>Driving (miles/month)</label>
              <input type="number" value="${s.miles}" onchange="updateScenario(${idx}, 'miles', this.value)" min="0" max="5000">
            </div>
            <div class="input-group">
              <label>Flights (per year)</label>
              <input type="number" value="${s.flights}" onchange="updateScenario(${idx}, 'flights', this.value)" min="0" max="50">
            </div>
            <div class="input-group">
              <label>Diet</label>
              <select onchange="updateScenario(${idx}, 'diet', this.value)" style="background: rgba(15, 61, 15, 0.4); border: 1px solid rgba(163, 193, 74, 0.3); border-radius: 8px; padding: 10px 12px; color: #f5f5f5; font-family: 'Cousine', monospace; font-size: 14px;">
                <option value="omnivore" ${s.diet === 'omnivore' ? 'selected' : ''}>Omnivore</option>
                <option value="vegetarian" ${s.diet === 'vegetarian' ? 'selected' : ''}>Vegetarian</option>
                <option value="vegan" ${s.diet === 'vegan' ? 'selected' : ''}>Vegan</option>
              </select>
            </div>
          </div>
          <div class="scenario-total">${co2.toLocaleString()} kg</div>
          ${deltaHtml}
        `;
        container.appendChild(card);
      });
    }

    function renderChart() {
      const container = document.getElementById('chartContainer');
      container.innerHTML = '';
      const maxCO2 = Math.max(...scenarios.map(calculateCO2));
      scenarios.forEach((s, idx) => {
        const co2 = calculateCO2(s);
        const width = (co2 / maxCO2) * 100;
        const bar = document.createElement('div');
        bar.className = 'chart-bar';
        bar.innerHTML = `
          <div class="bar-label">${s.name}</div>
          <div class="bar-wrapper">
            <div class="bar-fill ${s.color}" style="width: ${width}%">${width > 15 ? Math.round(width) + '%' : ''}</div>
          </div>
          <div class="bar-value">${co2.toLocaleString()} kg</div>
        `;
        container.appendChild(bar);
      });
    }

    function renderInsights() {
      const container = document.getElementById('insights');
      container.innerHTML = '';
      const co2Values = scenarios.map(calculateCO2);
      const baseline = co2Values[0];
      const maxSavings = Math.max(...scenarios.slice(1).map((_, idx) => baseline - co2Values[idx + 1]));
      const maxSavingsIdx = scenarios.slice(1).findIndex((_, idx) => baseline - co2Values[idx + 1] === maxSavings) + 1;

      if (maxSavings > 0) {
        const insight = document.createElement('div');
        insight.className = 'insight-item';
        insight.innerHTML = `<strong>🌿 Biggest savings:</strong> "${scenarios[maxSavingsIdx].name}" saves <strong>${maxSavings.toLocaleString()} kg CO₂/year</strong> (${((maxSavings / baseline) * 100).toFixed(1)}% reduction)`;
        container.appendChild(insight);
      }

      const highest = scenarios.reduce((prev, curr, idx) => co2Values[idx] > co2Values[prev] ? idx : prev, 0);
      const insight2 = document.createElement('div');
      insight2.className = 'insight-item';
      insight2.innerHTML = `<strong>📊 Highest footprint:</strong> "${scenarios[highest].name}" at <strong>${co2Values[highest].toLocaleString()} kg CO₂/year</strong>`;
      container.appendChild(insight2);

      const insight3 = document.createElement('div');
      insight3.className = 'insight-item';
      insight3.innerHTML = `<strong>🎯 US average:</strong> ~16,000 kg CO₂e/year. Your baseline is <strong>${baseline < 16000 ? '👍 below' : '⚠️ above'}</strong> average.`;
      container.appendChild(insight3);
    }

    function updateScenario(idx, key, value) {
      scenarios[idx][key] = isNaN(value) ? value : Number(value);
      render();
    }

    function resetAll() {
      scenarios = JSON.parse(JSON.stringify(defaultScenarios));
      render();
    }

    function exportJSON() {
      const data = scenarios.map((s, idx) => ({
        scenario: s.name,
        ...s,
        total_co2_kg: calculateCO2(s),
        vs_baseline_kg: calculateCO2(s) - calculateCO2(scenarios[0])
      }));
      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'carbon-scenarios.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    // Initial render
    render();
  </script>
</body>
</html>
