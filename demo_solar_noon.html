<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solar Noon Finder</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      font-family: 'Sora', sans-serif;
      background: linear-gradient(135deg, #fff8f0 0%, #ffe8d6 50%, #ffd9b8 100%);
      color: #2d2d2d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    main {
      max-width: 800px;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      padding: 40px 30px;
      animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .hero {
      text-align: center;
      margin-bottom: 30px;
      animation: fadeIn 0.6s ease-out 0.1s both;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .sun-icon {
      width: 60px;
      height: 60px;
      margin: 0 auto 15px;
      background: linear-gradient(135deg, #ffa500, #ffb84d);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 0 30px rgba(255, 165, 0, 0.4);
    }
    
    h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 700;
      background: linear-gradient(135deg, #ffa500, #ff8c00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }
    
    .tagline {
      font-size: 14px;
      color: #888;
      margin-bottom: 20px;
    }
    
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 25px;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @media (max-width: 500px) {
      .controls {
        grid-template-columns: 1fr;
      }
    }
    
    .control-group {
      display: flex;
      flex-direction: column;
    }
    
    label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      margin-bottom: 6px;
      font-family: 'IBM Plex Mono', monospace;
    }
    
    input[type="text"],
    input[type="date"] {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Sora', sans-serif;
      transition: all 0.3s ease;
    }
    
    input[type="text"]:focus,
    input[type="date"]:focus {
      outline: none;
      border-color: #ffa500;
      box-shadow: 0 0 0 3px rgba(255, 165, 0, 0.1);
    }
    
    .search-btn {
      padding: 10px 18px;
      background: linear-gradient(135deg, #ffa500, #ff8c00);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 20px;
      font-family: 'Sora', sans-serif;
      grid-column: 1 / -1;
    }
    
    .search-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(255, 165, 0, 0.3);
    }
    
    .search-btn:active {
      transform: translateY(0);
    }
    
    .results {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 30px;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }
    
    .stat-card {
      background: linear-gradient(135deg, rgba(255, 165, 0, 0.05), rgba(255, 200, 124, 0.05));
      border: 1px solid rgba(255, 165, 0, 0.2);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.5s ease-out forwards;
    }
    
    .stat-card:nth-child(1) { animation-delay: 0.35s; }
    .stat-card:nth-child(2) { animation-delay: 0.40s; }
    .stat-card:nth-child(3) { animation-delay: 0.45s; }
    .stat-card:nth-child(4) { animation-delay: 0.50s; }
    
    .stat-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 6px;
      font-family: 'IBM Plex Mono', monospace;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #ffa500;
      line-height: 1.2;
      word-break: break-word;
    }
    
    .arc-container {
      margin-top: 35px;
      padding: 20px;
      background: linear-gradient(180deg, rgba(255, 250, 240, 0.5), rgba(255, 245, 230, 0.5));
      border-radius: 12px;
      border: 1px solid rgba(255, 165, 0, 0.1);
      text-align: center;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
    }
    
    .arc-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 12px;
      font-family: 'IBM Plex Mono', monospace;
    }
    
    svg {
      max-width: 100%;
      height: auto;
    }
    
    .error {
      color: #d9534f;
      font-size: 13px;
      margin-top: 10px;
      padding: 10px 12px;
      background: rgba(217, 83, 79, 0.05);
      border-radius: 6px;
      border-left: 3px solid #d9534f;
      animation: slideUp 0.3s ease-out;
    }
    
    .loading {
      color: #ffa500;
      font-size: 13px;
      font-style: italic;
      margin-top: 10px;
      animation: fadeIn 0.3s ease-out;
    }
    
    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="hero">
      <div class="sun-icon">☀️</div>
      <h1>Solar Noon Finder</h1>
      <p class="tagline">When is the sun highest in the sky today?</p>
    </div>
    
    <div class="controls">
      <div class="control-group">
        <label for="city">City or Location</label>
        <input type="text" id="city" placeholder="e.g., Melbourne, Tokyo, London" value="Melbourne">
      </div>
      <div class="control-group">
        <label for="date">Date</label>
        <input type="date" id="date">
      </div>
      <button class="search-btn" onclick="calculate()">Calculate</button>
    </div>
    
    <div id="status"></div>
    <div id="results" class="results"></div>
    <div id="arcContainer" class="arc-container" style="display:none;"></div>
  </main>
  
  <script>
    // Set default date to today
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('date').value = today;
    document.getElementById('date').max = today;
    
    // Auto-calculate on load
    window.addEventListener('load', () => setTimeout(calculate, 300));
    
    // Solar math functions
    function dayOfYear(year, month, day) {
      const daysInMonth = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
      if (year % 4 === 0 && (year % 100 !== 0 || year % 400 === 0)) daysInMonth[1] = 29;
      let doy = 0;
      for (let i = 0; i < month - 1; i++) doy += daysInMonth[i];
      return doy + day;
    }
    
    function solarDeclination(doy) {
      const angle = 23.44 * Math.PI / 180;
      return angle * Math.sin((2 * Math.PI * (doy - 81)) / 365.25);
    }
    
    function equationOfTime(doy) {
      const b = (2 * Math.PI * (doy - 1)) / 365;
      return 229.2 * (0.000075 + 0.001868 * Math.cos(b) - 0.032077 * Math.sin(b) -
                      0.014615 * Math.cos(2*b) - 0.040849 * Math.sin(2*b));
    }
    
    function solarNoonTime(doy, longEast) {
      const eot = equationOfTime(doy);
      const lonCorr = -longEast * 4;
      const clockNoon = 12 * 60 + eot + lonCorr / 60;
      return clockNoon;
    }
    
    function solarAltitudeAtNoon(lat, doy) {
      const decl = solarDeclination(doy);
      const latRad = lat * Math.PI / 180;
      const altRad = Math.PI / 2 - Math.abs(latRad - decl);
      return Math.max(0, Math.min(90, altRad * 180 / Math.PI));
    }
    
    function sunriseSunset(lat, doy) {
      const decl = solarDeclination(doy);
      const latRad = lat * Math.PI / 180;
      const cosHA = -Math.tan(latRad) * Math.tan(decl);
      
      if (Math.abs(cosHA) > 1) return { sunrise: null, sunset: null };
      
      const ha = Math.acos(cosHA);
      const sunrise_ut = (12 - ha * 180 / Math.PI / 15) * 60;
      const sunset_ut = (12 + ha * 180 / Math.PI / 15) * 60;
      return { sunrise: sunrise_ut, sunset: sunset_ut };
    }
    
    function minutesToTime(mins) {
      const h = Math.floor(mins / 60);
      const m = Math.round(mins % 60);
      return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
    }
    
    async function calculate() {
      const city = document.getElementById('city').value.trim();
      const dateStr = document.getElementById('date').value;
      const statusDiv = document.getElementById('status');
      const resultsDiv = document.getElementById('results');
      const arcDiv = document.getElementById('arcContainer');
      
      if (!city || !dateStr) {
        statusDiv.innerHTML = '<div class="error">Please enter a city and date.</div>';
        return;
      }
      
      statusDiv.innerHTML = '<div class="loading">🔍 Finding location...</div>';
      resultsDiv.innerHTML = '';
      arcDiv.style.display = 'none';
      
      try {
        // Geocode
        const geoUrl = 'https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(city) + '&count=1&language=en&format=json';
        const geoResp = await fetch(geoUrl);
        if (!geoResp.ok) throw new Error('Geocoding failed');
        
        const geoData = await geoResp.json();
        if (!geoData.results || geoData.results.length === 0) {
          throw new Error('Location "' + city + '" not found');
        }
        
        const loc = geoData.results[0];
        const lat = loc.latitude;
        const lng = loc.longitude;
        const locName = loc.name + (loc.admin1 ? ', ' + loc.admin1 : '') + (loc.country ? ', ' + loc.country : '');
        
        // Parse date
        const parts = dateStr.split('-');
        const year = parseInt(parts[0]);
        const month = parseInt(parts[1]);
        const day = parseInt(parts[2]);
        const doy = dayOfYear(year, month, day);
        
        // Calculate solar data
        const noonMins = solarNoonTime(doy, lng);
        const altitude = solarAltitudeAtNoon(lat, doy);
        const sr = sunriseSunset(lat, doy);
        
        statusDiv.innerHTML = '';
        let resultsHtml = '<div class="stat-card"><div class="stat-label">Solar Noon</div><div class="stat-value">' + minutesToTime(noonMins) + '</div></div>' +
                          '<div class="stat-card"><div class="stat-label">Altitude</div><div class="stat-value">' + altitude.toFixed(1) + '°</div></div>';
        
        if (sr.sunrise !== null) {
          resultsHtml += '<div class="stat-card"><div class="stat-label">Sunrise (UTC)</div><div class="stat-value">' + minutesToTime(sr.sunrise) + '</div></div>' +
                         '<div class="stat-card"><div class="stat-label">Sunset (UTC)</div><div class="stat-value">' + minutesToTime(sr.sunset) + '</div></div>';
        } else {
          resultsHtml += '<div class="stat-card"><div class="stat-label">Daylight</div><div class="stat-value" style="font-size: 16px;">Midnight Sun</div></div>';
        }
        
        resultsDiv.innerHTML = resultsHtml;
        
        // Draw sun path arc
        arcDiv.innerHTML = '<div class="arc-label">Sun Path for ' + locName + '</div>' + drawSunArc(altitude, lat, doy);
        arcDiv.style.display = 'block';
        
      } catch (err) {
        statusDiv.innerHTML = '<div class="error">❌ ' + err.message + '</div>';
      }
    }
    
    function drawSunArc(altitude, lat, doy) {
      const w = 400, h = 200;
      const cx = w / 2, cy = h * 0.75;
      const maxR = 120;
      const r = (altitude / 90) * maxR;
      const sunX = cx;
      const sunY = cy - r;
      const gradId = 'grad_' + Math.random().toString(36).slice(2);
      
      let svg = '<svg width="100%" height="200" viewBox="0 0 ' + w + ' ' + h + '" style="max-width: 100%; height: auto;">' +
        '<defs><linearGradient id="' + gradId + '" x1="0%" y1="0%" x2="100%" y2="100%">' +
        '<stop offset="0%" style="stop-color:#ff8c00;stop-opacity:0.3" />' +
        '<stop offset="100%" style="stop-color:#ffa500;stop-opacity:0.1" />' +
        '</linearGradient></defs>' +
        '<line x1="20" y1="' + cy + '" x2="' + (w - 20) + '" y2="' + cy + '" stroke="#ddd" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>' +
        '<text x="' + (w - 50) + '" y="' + (cy - 8) + '" font-size="12" fill="#999" font-family="IBM Plex Mono">Horizon</text>' +
        '<path d="M ' + (cx - maxR) + ' ' + cy + ' A ' + maxR + ' ' + maxR + ' 0 0 1 ' + (cx + maxR) + ' ' + cy + '" fill="none" stroke="url(#' + gradId + ')" stroke-width="3" opacity="0.8"/>' +
        '<circle cx="' + sunX + '" cy="' + sunY + '" r="20" fill="#ffa500" filter="drop-shadow(0 0 15px rgba(255, 165, 0, 0.6))"/>' +
        '<circle cx="' + sunX + '" cy="' + sunY + '" r="18" fill="#ffb84d" opacity="0.7"/>' +
        '<line x1="' + cx + '" y1="' + cy + '" x2="' + sunX + '" y2="' + sunY + '" stroke="#ffa500" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>' +
        '<text x="' + (cx + 10) + '" y="' + (cy - (r * 0.5) + 15) + '" font-size="13" fill="#ff8c00" font-weight="bold" font-family="IBM Plex Mono">' + altitude.toFixed(1) + '°</text>' +
        '<text x="' + cx + '" y="' + (cy + 35) + '" text-anchor="middle" font-size="12" fill="#666" font-family="IBM Plex Mono">S ← Solar Noon → N</text>' +
        '</svg>';
      
      return svg;
    }
  </script>
</body>
</html>
