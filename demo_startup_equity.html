<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Equity Dilution Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 50%, #1a2847 100%);
            color: #f0f0f0;
            overflow-x: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            animation: fadeInScale 0.6s ease-out;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.98);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out 0.1s backwards;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(32px, 6vw, 52px);
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(120deg, #ffb84d 0%, #ff7a00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 16px;
            color: #b0b0c0;
            font-weight: 500;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 32px;
            animation: slideUp 0.6s ease-out;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:nth-child(1) { animation-delay: 0.2s; }
        .card:nth-child(2) { animation-delay: 0.3s; }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #ffb84d;
            margin-bottom: 8px;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #f0f0f0;
            font-size: 14px;
            transition: all 0.2s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #ffb84d;
            background: rgba(255, 255, 255, 0.12);
        }

        button {
            font-family: 'Syne', sans-serif;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(120deg, #ffb84d, #ff7a00);
            color: #000;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 184, 77, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #f0f0f0;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 11px;
            padding: 8px 12px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .rounds-list {
            grid-column: 1 / -1;
            animation: slideUp 0.6s ease-out 0.4s backwards;
        }

        .round-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .round-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .round-info {
            flex: 1;
        }

        .round-name {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .round-detail {
            font-size: 12px;
            color: #b0b0c0;
        }

        .round-stake {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #ffb84d;
            margin: 0 16px;
        }

        .chart-container {
            grid-column: 1 / -1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            animation: slideUp 0.6s ease-out 0.5s backwards;
        }

        .chart-title {
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9090a0;
            margin-bottom: 20px;
        }

        .bar-wrapper {
            margin-bottom: 20px;
        }

        .bar-label {
            font-size: 12px;
            color: #b0b0c0;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .bar-chart {
            display: flex;
            height: 40px;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
        }

        .bar-segment {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: #000;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .founder-segment {
            background: linear-gradient(to right, #ffb84d, #ff9a30);
        }

        .investor-segment {
            background: linear-gradient(to right, #4efa3d, #00d9ff);
        }

        .metrics-grid {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            animation: fadeIn 0.6s ease-out 0.6s backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .metric {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s;
        }

        .metric:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        .metric-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9090a0;
            margin-bottom: 6px;
        }

        .metric-value {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #ffb84d;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 16px;
            }

            .card {
                padding: 20px;
            }

            h1 {
                font-size: 28px;
            }

            .grid {
                gap: 16px;
            }

            .round-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .round-stake {
                align-self: flex-start;
                margin: 8px 0 0 0;
            }

            .metrics-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Startup Equity</h1>
            <p class="subtitle">Watch your stake dilute in real time</p>
        </header>

        <div class="grid">
            <div class="card">
                <div class="control-group">
                    <label for="premoney">Pre-money valuation ($M)</label>
                    <input type="number" id="premoney" value="10" min="0.1" step="0.5">
                </div>

                <div class="control-group">
                    <label for="investment">Investment amount ($M)</label>
                    <input type="number" id="investment" value="2" min="0.1" step="0.5">
                </div>

                <div class="control-group">
                    <label for="roundname">Round name</label>
                    <input type="text" id="roundname" placeholder="e.g., Seed, Series A">
                </div>

                <button class="btn-primary" onclick="addRound()">Add Funding Round</button>
            </div>

            <div class="card">
                <div class="control-group">
                    <label>Your current stake</label>
                    <div style="font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 700; color: #ffb84d; margin-top: 8px;" id="founderStake">100%</div>
                </div>

                <div class="control-group" style="margin-top: 32px;">
                    <label>Company valuation</label>
                    <div style="font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; color: #ff7a00;" id="postmoneyVal">$12M</div>
                </div>
            </div>
        </div>

        <div class="rounds-list" id="roundsList"></div>

        <div class="chart-container">
            <div class="chart-title">Cap Table (Current Round)</div>
            <div class="bar-wrapper">
                <div class="bar-label">Equity Distribution</div>
                <div class="bar-chart" id="capTable"></div>
            </div>
        </div>

        <div class="metrics-grid" id="metricsGrid"></div>
    </div>

    <script>
        let rounds = [];

        function calculate() {
            let founderStake = 100;
            let postMoneyVal = parseFloat(document.getElementById('premoney').value);

            rounds.forEach((round, idx) => {
                const postMoney = round.premoney + round.investment;
                round.investorStake = (round.investment / postMoney) * 100;
                round.founderStake = founderStake * (round.premoney / postMoney);
                founderStake = round.founderStake;
                postMoneyVal = postMoney;
            });

            updateUI(founderStake, postMoneyVal);
        }

        function addRound() {
            const premoney = parseFloat(document.getElementById('premoney').value);
            const investment = parseFloat(document.getElementById('investment').value);
            const name = document.getElementById('roundname').value || `Round ${rounds.length + 1}`;

            if (premoney <= 0 || investment <= 0) {
                alert('Please enter valid values');
                return;
            }

            rounds.push({ name, premoney, investment, founderStake: 0, investorStake: 0 });
            document.getElementById('roundname').value = '';
            calculate();
        }

        function removeRound(idx) {
            rounds.splice(idx, 1);
            calculate();
        }

        function updateUI(founderStake, postMoneyVal) {
            document.getElementById('founderStake').textContent = founderStake.toFixed(1) + '%';
            document.getElementById('postmoneyVal').textContent = '$' + postMoneyVal.toFixed(1) + 'M';

            // Update rounds list
            const roundsList = document.getElementById('roundsList');
            roundsList.innerHTML = '';
            rounds.forEach((r, idx) => {
                const item = document.createElement('div');
                item.className = 'round-item';
                item.innerHTML = `
                    <div class="round-info">
                        <div class="round-name">${r.name}</div>
                        <div class="round-detail">$${r.investment}M at $${r.premoney}M pre-money</div>
                    </div>
                    <div class="round-stake">${r.investorStake.toFixed(1)}%</div>
                    <button class="btn-secondary" onclick="removeRound(${idx})">Remove</button>
                `;
                roundsList.appendChild(item);
            });

            // Update cap table
            const capTable = document.getElementById('capTable');
            capTable.innerHTML = '';

            if (rounds.length === 0) {
                const seg = document.createElement('div');
                seg.className = 'bar-segment founder-segment';
                seg.style.width = '100%';
                seg.textContent = 'You 100%';
                capTable.appendChild(seg);
            } else {
                const lastRound = rounds[rounds.length - 1];
                const allInvestors = rounds.reduce((sum, r) => sum + r.investorStake, 0);

                if (founderStake > 0.1) {
                    const seg = document.createElement('div');
                    seg.className = 'bar-segment founder-segment';
                    seg.style.width = founderStake + '%';
                    seg.textContent = founderStake.toFixed(1) + '%';
                    capTable.appendChild(seg);
                }

                rounds.forEach((r, idx) => {
                    const seg = document.createElement('div');
                    seg.className = 'bar-segment investor-segment';
                    seg.style.width = r.investorStake + '%';
                    seg.style.opacity = 0.8 - (idx * 0.15);
                    seg.textContent = r.investorStake.toFixed(1) + '%';
                    capTable.appendChild(seg);
                });
            }

            // Update metrics
            const metricsGrid = document.getElementById('metricsGrid');
            metricsGrid.innerHTML = '';

            const totalRaised = rounds.reduce((sum, r) => sum + r.investment, 0);
            const metrics = [
                { label: 'Rounds raised', value: rounds.length },
                { label: 'Total capital ($M)', value: totalRaised.toFixed(1) },
                { label: 'Post-money value ($M)', value: postMoneyVal.toFixed(1) },
                { label: 'Your stake %', value: founderStake.toFixed(1) + '%' }
            ];

            metrics.forEach(m => {
                const metric = document.createElement('div');
                metric.className = 'metric';
                metric.innerHTML = `
                    <div class="metric-label">${m.label}</div>
                    <div class="metric-value">${m.value}</div>
                `;
                metricsGrid.appendChild(metric);
            });
        }

        // Initial calculation
        calculate();
    </script>
</body>
</html>
