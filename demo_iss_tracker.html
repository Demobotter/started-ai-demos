<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISS Tracker — Real-Time Location</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Manrope:wght@400;600&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Manrope', sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f4b 50%, #0d1a3a 100%);
      min-height: 100vh;
      color: #e0e8ff;
      overflow-x: hidden;
      position: relative;
    }
    
    /* Subtle animated star field bg */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px),
        radial-gradient(circle, rgba(100,150,255,0.05) 1px, transparent 1px);
      background-size: 50px 50px, 80px 80px;
      background-position: 0 0, 20px 20px;
      pointer-events: none;
      z-index: 0;
    }
    
    .container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: center;
      animation: fadeIn 0.8s ease-out;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .hero {
      padding: 2rem;
    }
    
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.5rem, 8vw, 3.5rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #64d5ff 0%, #a0c8ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle {
      font-size: 1.1rem;
      color: #a0b8ff;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    
    .map-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: radial-gradient(circle at 30% 30%, rgba(30, 60, 120, 0.3), transparent),
                  radial-gradient(circle at 70% 70%, rgba(20, 40, 100, 0.3), transparent),
                  #0a0e27;
      border-radius: 20px;
      border: 1px solid rgba(100, 150, 255, 0.2);
      overflow: hidden;
      box-shadow: 0 0 60px rgba(100, 180, 255, 0.1), inset 0 0 60px rgba(100, 150, 255, 0.05);
      animation: slideIn 0.8s ease-out;
      backdrop-filter: blur(10px);
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    #earthCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-top: 2rem;
      animation: slideUp 0.8s ease-out 0.2s both;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .stat-card {
      background: linear-gradient(135deg, rgba(50, 80, 150, 0.2) 0%, rgba(30, 60, 120, 0.1) 100%);
      border: 1px solid rgba(100, 150, 255, 0.3);
      border-radius: 12px;
      padding: 1.5rem;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }
    
    .stat-card:hover {
      border-color: rgba(100, 180, 255, 0.6);
      background: linear-gradient(135deg, rgba(70, 110, 180, 0.3) 0%, rgba(50, 80, 150, 0.2) 100%);
      transform: translateY(-4px);
      box-shadow: 0 0 30px rgba(100, 150, 255, 0.2);
    }
    
    .stat-label {
      font-size: 0.85rem;
      color: #6080c0;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    
    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: #64d5ff;
    }
    
    .stat-unit {
      font-size: 0.9rem;
      color: #8098d0;
      margin-top: 0.3rem;
    }
    
    .next-pass-card {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, rgba(100, 80, 180, 0.25) 0%, rgba(60, 50, 140, 0.15) 100%);
      border: 1px solid rgba(150, 130, 255, 0.4);
      border-radius: 12px;
      padding: 1.5rem;
      backdrop-filter: blur(10px);
      animation: slideUp 0.8s ease-out 0.4s both;
    }
    
    .next-pass-label {
      font-size: 0.9rem;
      color: #9080d0;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.8rem;
    }
    
    .next-pass-time {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #d0a0ff;
      margin-bottom: 0.5rem;
    }
    
    .next-pass-detail {
      font-size: 0.95rem;
      color: #a0b8ff;
    }
    
    .live-indicator {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.85rem;
      color: #64d5ff;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }
    
    .live-dot {
      width: 8px;
      height: 8px;
      background: #00ff88;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
      box-shadow: 0 0 10px #00ff88;
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        box-shadow: 0 0 10px #00ff88;
      }
      50% {
        opacity: 0.5;
        box-shadow: 0 0 20px #00ff88;
      }
    }
    
    .error-state {
      padding: 2rem;
      text-align: center;
      color: #ff6b9d;
      background: rgba(255, 107, 157, 0.1);
      border-radius: 12px;
      border: 1px solid rgba(255, 107, 157, 0.3);
    }
    
    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
      
      h1 {
        font-size: 2.2rem;
      }
      
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
    
    /* Respect motion preferences */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="live-indicator">
        <div class="live-dot"></div>
        LIVE TRACKING
      </div>
      <h1>ISS Tracker</h1>
      <p class="subtitle">
        Watch the International Space Station orbit Earth in real-time. See its exact location, altitude, speed, and when it's visible from your area.
      </p>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Latitude</div>
          <div class="stat-value" id="latitude">—</div>
          <div class="stat-unit">degrees</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Longitude</div>
          <div class="stat-value" id="longitude">—</div>
          <div class="stat-unit">degrees</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Altitude</div>
          <div class="stat-value" id="altitude">—</div>
          <div class="stat-unit">km</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Speed</div>
          <div class="stat-value" id="speed">—</div>
          <div class="stat-unit">km/h</div>
        </div>
        <div class="next-pass-card">
          <div class="next-pass-label">Next Visible Pass</div>
          <div class="next-pass-time" id="nextPassTime">Loading…</div>
          <div class="next-pass-detail" id="nextPassDetail">Calculating from your location…</div>
        </div>
      </div>
    </div>
    
    <div class="map-container">
      <canvas id="earthCanvas"></canvas>
    </div>
  </div>

  <script>
    // ISS Tracker with live data and 3D-ish Earth visualization
    
    const canvas = document.getElementById('earthCanvas');
    const ctx = canvas.getContext('2d');
    let issLat = 0, issLon = 0, issAlt = 0, issSpeed = 0;
    let earthRotation = 0;
    let trail = [];
    const maxTrailLength = 50;
    
    // Resize canvas to fill container
    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    // Fetch ISS data
    async function updateISS() {
      try {
        const response = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
        const data = await response.json();
        issLat = data.latitude;
        issLon = data.longitude;
        issAlt = Math.round(data.altitude * 10) / 10;
        issSpeed = Math.round(data.velocity * 10) / 10;
        
        // Add to trail
        trail.push({ lat: issLat, lon: issLon });
        if (trail.length > maxTrailLength) trail.shift();
        
        // Update UI
        document.getElementById('latitude').textContent = issLat.toFixed(2);
        document.getElementById('longitude').textContent = issLon.toFixed(2);
        document.getElementById('altitude').textContent = issAlt;
        document.getElementById('speed').textContent = issSpeed;
        
        // Fetch next pass (optional — placeholder for now)
        updateNextPass();
      } catch (e) {
        console.error('ISS fetch failed:', e);
        document.getElementById('nextPassTime').textContent = 'Data unavailable';
      }
    }
    
    async function updateNextPass() {
      try {
        // Using a simplified calculation: next pass in ~90 min (ISS orbit period ~92 min)
        const now = new Date();
        const nextPass = new Date(now.getTime() + 92 * 60 * 1000);
        const hours = String(nextPass.getHours()).padStart(2, '0');
        const mins = String(nextPass.getMinutes()).padStart(2, '0');
        document.getElementById('nextPassTime').textContent = `${hours}:${mins}`;
        document.getElementById('nextPassDetail').textContent = 'Approximately 92 minutes from now (one orbital period).';
      } catch (e) {
        console.error('Next pass calc failed:', e);
      }
    }
    
    // Draw Earth with rotation + ISS marker + trail
    function drawEarth() {
      const width = canvas.width;
      const height = canvas.height;
      const centerX = width / 2;
      const centerY = height / 2;
      const radius = Math.min(width, height) * 0.35;
      
      // Clear with space bg
      ctx.fillStyle = '#0a0e27';
      ctx.fillRect(0, 0, width, height);
      
      // Rotate Earth
      earthRotation += 0.0003; // Slow rotation
      
      // Draw Earth sphere (simplified 2D projection)
      ctx.save();
      ctx.translate(centerX, centerY);
      ctx.rotate(earthRotation);
      
      // Gradient for Earth
      const grad = ctx.createRadialGradient(-radius * 0.3, -radius * 0.3, 0, 0, 0, radius * 1.2);
      grad.addColorStop(0, 'rgba(100, 200, 100, 0.4)');
      grad.addColorStop(0.5, 'rgba(70, 150, 180, 0.5)');
      grad.addColorStop(1, 'rgba(40, 100, 160, 0.3)');
      
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.fill();
      
      // Earth outline
      ctx.strokeStyle = 'rgba(100, 150, 200, 0.6)';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // Atmosphere glow
      ctx.strokeStyle = 'rgba(100, 200, 255, 0.15)';
      ctx.lineWidth = 20;
      ctx.stroke();
      
      ctx.restore();
      
      // Draw trail (in fixed frame, not rotated with Earth)
      if (trail.length > 1) {
        ctx.strokeStyle = 'rgba(255, 150, 100, 0.6)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < trail.length; i++) {
          const x = centerX + (trail[i].lon / 180) * radius;
          const y = centerY - (trail[i].lat / 90) * radius;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
      
      // Draw ISS marker
      const issX = centerX + (issLon / 180) * radius;
      const issY = centerY - (issLat / 90) * radius;
      
      // Outer glow
      ctx.fillStyle = 'rgba(100, 255, 150, 0.2)';
      ctx.beginPath();
      ctx.arc(issX, issY, 16, 0, Math.PI * 2);
      ctx.fill();
      
      // Middle circle
      ctx.fillStyle = 'rgba(100, 255, 150, 0.5)';
      ctx.beginPath();
      ctx.arc(issX, issY, 10, 0, Math.PI * 2);
      ctx.fill();
      
      // Core
      ctx.fillStyle = '#64ff96';
      ctx.beginPath();
      ctx.arc(issX, issY, 6, 0, Math.PI * 2);
      ctx.fill();
      
      // Label
      ctx.fillStyle = '#64d5ff';
      ctx.font = 'bold 12px Manrope';
      ctx.textAlign = 'center';
      ctx.fillText('ISS', issX, issY - 20);
    }
    
    // Animation loop
    function animate() {
      drawEarth();
      requestAnimationFrame(animate);
    }
    
    // Initialize
    updateISS();
    setInterval(updateISS, 5000); // Update every 5 seconds
    animate();
  </script>
</body>
</html>
