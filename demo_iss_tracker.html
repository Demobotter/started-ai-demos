<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISS Live Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: radial-gradient(circle at 20% 50%, #0b1026 0%, #05070f 100%);
      color: #e0e0ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* Star field background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(2px 2px at 20% 30%, #fff, rgba(255, 255, 255, 0)),
        radial-gradient(2px 2px at 60% 70%, #fff, rgba(255, 255, 255, 0)),
        radial-gradient(1px 1px at 50% 50%, #fff, rgba(255, 255, 255, 0)),
        radial-gradient(1px 1px at 80% 10%, #fff, rgba(255, 255, 255, 0)),
        radial-gradient(2px 2px at 90% 60%, #fff, rgba(255, 255, 255, 0)),
        radial-gradient(1px 1px at 30% 80%, #fff, rgba(255, 255, 255, 0)),
        radial-gradient(1px 1px at 70% 40%, #fff, rgba(255, 255, 255, 0));
      background-repeat: repeat;
      background-size: 200% 200%, 300% 300%, 250% 250%, 400% 400%, 350% 350%, 280% 280%, 320% 320%;
      opacity: 0.4;
      z-index: 0;
      pointer-events: none;
    }

    main {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1000px;
    }

    .hero {
      text-align: center;
      margin-bottom: 40px;
      animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero h1 {
      font-size: clamp(32px, 6vw, 56px);
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .hero p {
      font-size: 14px;
      color: #a0a0ff;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 40px;
      animation: fadeIn 1s ease-out 0.3s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 800px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

    .map-card {
      background: rgba(15, 25, 50, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .map-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(0, 217, 255, 0.05) 0%, transparent 100%);
      pointer-events: none;
    }

    .map-label {
      font-size: 12px;
      color: #00ff88;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
      font-family: 'IBM Plex Mono', monospace;
    }

    canvas {
      width: 100%;
      height: 300px;
      display: block;
      border-radius: 8px;
      background: rgba(5, 7, 15, 0.8);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .stat-card {
      background: rgba(15, 25, 50, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 12px;
      padding: 16px;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .stat-card:nth-child(1) { animation-delay: 0.4s; }
    .stat-card:nth-child(2) { animation-delay: 0.5s; }
    .stat-card:nth-child(3) { animation-delay: 0.6s; }
    .stat-card:nth-child(4) { animation-delay: 0.7s; }

    .stat-label {
      font-size: 11px;
      color: #a0a0ff;
      font-weight: 400;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #00d9ff;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.5px;
    }

    .location-card {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, rgba(0, 217, 255, 0.1) 0%, rgba(0, 255, 136, 0.05) 100%);
      border: 1px solid rgba(0, 255, 136, 0.3);
      border-radius: 12px;
      padding: 16px;
      font-size: 14px;
      color: #e0e0ff;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.8s both;
    }

    .location-label {
      font-size: 11px;
      color: #00ff88;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .info {
      text-align: center;
      margin-top: 30px;
      font-size: 12px;
      color: #6060c0;
      font-family: 'IBM Plex Mono', monospace;
    }

    .pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .pulse {
        animation: none;
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="hero">
      <h1>ISS Live Tracker</h1>
      <p>Where is the International Space Station right now?</p>
    </div>

    <div class="container">
      <div class="map-card">
        <div class="map-label">LIVE ORBIT MAP</div>
        <canvas id="mapCanvas"></canvas>
      </div>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Altitude</div>
          <div class="stat-value" id="altitude">--</div>
          <div class="stat-label" style="margin-top: 4px; color: #6060c0;">km</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Speed</div>
          <div class="stat-value" id="speed">--</div>
          <div class="stat-label" style="margin-top: 4px; color: #6060c0;">km/h</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Latitude</div>
          <div class="stat-value" id="latitude">--</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Longitude</div>
          <div class="stat-value" id="longitude">--</div>
        </div>
        <div class="location-card">
          <div class="location-label">Current Location</div>
          <div id="location" style="margin-top: 8px; font-size: 14px;">Fetching...</div>
        </div>
      </div>
    </div>

    <div class="info">
      <div>Real-time data from wheretheiss.at · Updates every 4 seconds</div>
      <div style="margin-top: 8px; color: #4040a0;">The ISS orbits Earth every 90 minutes at ~27,500 km/h</div>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    
    // High DPI support
    const dpr = window.devicePixelRatio || 1;
    canvas.width = canvas.offsetWidth * dpr;
    canvas.height = canvas.offsetHeight * dpr;
    ctx.scale(dpr, dpr);

    const positions = [];
    const maxTrail = 30;
    let currentPos = null;

    function drawMap() {
      const w = canvas.offsetWidth;
      const h = canvas.offsetHeight;
      const padding = 20;

      // Clear
      ctx.fillStyle = 'rgba(5, 7, 15, 0.5)';
      ctx.fillRect(0, 0, w, h);

      // Equirectangular projection: lng [-180, 180] → x [0, w], lat [90, -90] → y [0, h]
      const lngToX = (lng) => ((lng + 180) / 360) * (w - 2 * padding) + padding;
      const latToY = (lat) => ((90 - lat) / 180) * (h - 2 * padding) + padding;

      // Draw grid lines
      ctx.strokeStyle = 'rgba(0, 217, 255, 0.1)';
      ctx.lineWidth = 1;
      for (let lng = -180; lng <= 180; lng += 60) {
        const x = lngToX(lng);
        ctx.beginPath();
        ctx.moveTo(x, padding);
        ctx.lineTo(x, h - padding);
        ctx.stroke();
      }
      for (let lat = -90; lat <= 90; lat += 45) {
        const y = latToY(lat);
        ctx.beginPath();
        ctx.moveTo(padding, y);
        ctx.lineTo(w - padding, y);
        ctx.stroke();
      }

      // Draw equator highlight
      ctx.strokeStyle = 'rgba(0, 255, 136, 0.15)';
      ctx.lineWidth = 2;
      const equatorY = latToY(0);
      ctx.beginPath();
      ctx.moveTo(padding, equatorY);
      ctx.lineTo(w - padding, equatorY);
      ctx.stroke();

      // Draw trail
      if (positions.length > 1) {
        ctx.strokeStyle = 'rgba(0, 217, 255, 0.4)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        positions.forEach((pos, idx) => {
          const x = lngToX(pos.lng);
          const y = latToY(pos.lat);
          if (idx === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }
        });
        ctx.stroke();
      }

      // Draw ISS marker
      if (currentPos) {
        const x = lngToX(currentPos.lng);
        const y = latToY(currentPos.lat);

        // Glow
        const gradient = ctx.createRadialGradient(x, y, 0, x, y, 20);
        gradient.addColorStop(0, 'rgba(0, 217, 255, 0.5)');
        gradient.addColorStop(1, 'rgba(0, 217, 255, 0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(x - 20, y - 20, 40, 40);

        // ISS dot
        ctx.fillStyle = '#00d9ff';
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();

        // Outer ring
        ctx.strokeStyle = 'rgba(0, 255, 136, 0.8)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y, 8, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function latlngToLocation(lat, lng) {
      // Rough geocoding: hardcode ocean vs land for common regions
      const regions = [
        { name: 'North Atlantic', lat: [0, 80], lng: [-80, 0] },
        { name: 'South Atlantic', lat: [-80, 0], lng: [-80, 0] },
        { name: 'North Pacific', lat: [0, 80], lng: [120, 180] },
        { name: 'South Pacific', lat: [-80, 0], lng: [120, 180] },
        { name: 'Indian Ocean', lat: [-60, 30], lng: [40, 120] },
        { name: 'Arctic Ocean', lat: [80, 90], lng: [-180, 180] },
        { name: 'Over North America', lat: [15, 75], lng: [-170, -50] },
        { name: 'Over Europe', lat: [35, 75], lng: [-10, 40] },
        { name: 'Over Asia', lat: [-10, 75], lng: [60, 150] },
        { name: 'Over Australia', lat: [-50, -10], lng: [110, 160] },
        { name: 'Over Africa', lat: [-35, 40], lng: [-20, 55] },
      ];

      for (const region of regions) {
        if (lat >= region.lat[0] && lat <= region.lat[1] && lng >= region.lng[0] && lng <= region.lng[1]) {
          return region.name;
        }
      }

      return `${lat.toFixed(1)}°N, ${lng.toFixed(1)}°E`;
    }

    async function updateISS() {
      try {
        const response = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
        const data = await response.json();

        currentPos = {
          lat: data.latitude,
          lng: data.longitude,
        };

        // Maintain trail
        positions.unshift(currentPos);
        if (positions.length > maxTrail) {
          positions.pop();
        }

        // Update stats
        document.getElementById('altitude').textContent = Math.round(data.altitude).toLocaleString();
        document.getElementById('speed').textContent = Math.round(data.velocity).toLocaleString();
        document.getElementById('latitude').textContent = data.latitude.toFixed(2) + '°';
        document.getElementById('longitude').textContent = data.longitude.toFixed(2) + '°';

        const location = latlngToLocation(data.latitude, data.longitude);
        document.getElementById('location').textContent = location;

        drawMap();
      } catch (error) {
        console.error('Error fetching ISS data:', error);
        document.getElementById('location').textContent = 'Error fetching data';
      }
    }

    // Initial fetch and then every 4 seconds
    updateISS();
    setInterval(updateISS, 4000);

    // Redraw on resize
    window.addEventListener('resize', () => {
      canvas.width = canvas.offsetWidth * (window.devicePixelRatio || 1);
      canvas.height = canvas.offsetHeight * (window.devicePixelRatio || 1);
      ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
      drawMap();
    });
  </script>
</body>
</html>
