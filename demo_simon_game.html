<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simon Says</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2a 50%, #0a0a1a 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    .container {
      max-width: 500px;
      width: 100%;
      animation: fadeIn 0.8s cubic-bezier(.16,1,.3,1);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .hero {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      font-family: 'Chakra Petch', sans-serif;
      font-size: clamp(36px, 8vw, 48px);
      font-weight: 700;
      background: linear-gradient(120deg, #ff00ff, #00ffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 13px;
      color: #a0a0d0;
      margin-bottom: 20px;
    }

    .game-board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 30px;
      aspect-ratio: 1;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }

    .button {
      border: none;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.1s ease;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      font-weight: 700;
      font-family: 'Chakra Petch', sans-serif;
    }

    .button:hover:not(.disabled) {
      transform: scale(1.05);
    }

    .button:active:not(.disabled) {
      transform: scale(0.98);
    }

    .button.disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .button.red {
      background: linear-gradient(135deg, #ff1744, #ff6e40);
      box-shadow: 0 0 30px rgba(255, 23, 68, 0.4);
    }

    .button.red.active {
      background: linear-gradient(135deg, #ff5252, #ff9100);
      box-shadow: 0 0 50px rgba(255, 23, 68, 0.8);
    }

    .button.yellow {
      background: linear-gradient(135deg, #ffea00, #ffc400);
      box-shadow: 0 0 30px rgba(255, 234, 0, 0.4);
      color: #333;
    }

    .button.yellow.active {
      background: linear-gradient(135deg, #ffeb3b, #ffb300);
      box-shadow: 0 0 50px rgba(255, 234, 0, 0.8);
    }

    .button.blue {
      background: linear-gradient(135deg, #2196f3, #1e88e5);
      box-shadow: 0 0 30px rgba(33, 150, 243, 0.4);
    }

    .button.blue.active {
      background: linear-gradient(135deg, #42a5f5, #1976d2);
      box-shadow: 0 0 50px rgba(33, 150, 243, 0.8);
    }

    .button.green {
      background: linear-gradient(135deg, #00e676, #00c853);
      box-shadow: 0 0 30px rgba(0, 230, 118, 0.4);
      color: #000;
    }

    .button.green.active {
      background: linear-gradient(135deg, #69f0ae, #00aa44);
      box-shadow: 0 0 50px rgba(0, 230, 118, 0.8);
    }

    .controls {
      backdrop-filter: blur(10px);
      background: rgba(255, 0, 255, 0.05);
      border: 1px solid rgba(255, 0, 255, 0.2);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }

    .score-display {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
    }

    .score-card {
      background: rgba(0, 217, 255, 0.1);
      border: 1px solid rgba(0, 217, 255, 0.3);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .score-label {
      font-size: 11px;
      color: #00d9ff;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .score-value {
      font-family: 'Chakra Petch', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }

    .button-container {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .action-btn {
      flex: 1;
      padding: 12px;
      border: 1px solid rgba(255, 0, 255, 0.3);
      background: rgba(255, 0, 255, 0.1);
      color: #ff00ff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s ease;
      font-family: 'Manrope', sans-serif;
    }

    .action-btn:hover {
      border-color: #ff00ff;
      background: rgba(255, 0, 255, 0.2);
    }

    .action-btn:active {
      transform: scale(0.98);
    }

    .status {
      font-size: 12px;
      color: #a0a0d0;
      text-align: center;
      height: 16px;
      min-height: 16px;
    }

    .status.waiting {
      color: #00d9ff;
    }

    .status.playing {
      color: #00e676;
    }

    .status.gameover {
      color: #ff1744;
    }

    @media (max-width: 500px) {
      .game-board {
        max-width: 280px;
        gap: 10px;
      }

      .controls {
        padding: 16px;
      }

      .score-value {
        font-size: 20px;
      }

      .action-btn {
        font-size: 12px;
        padding: 10px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>SIMON</h1>
      <p class="subtitle">Watch, listen, and repeat the pattern</p>
    </div>

    <div class="game-board">
      <button class="button red" data-color="red"></button>
      <button class="button yellow" data-color="yellow"></button>
      <button class="button blue" data-color="blue"></button>
      <button class="button green" data-color="green"></button>
    </div>

    <div class="controls">
      <div class="score-display">
        <div class="score-card">
          <div class="score-label">Level</div>
          <div class="score-value" id="level">1</div>
        </div>
        <div class="score-card">
          <div class="score-label">Best</div>
          <div class="score-value" id="best">1</div>
        </div>
      </div>

      <div class="status waiting" id="status">Press Start</div>

      <div class="button-container">
        <button class="action-btn" id="startBtn">Start</button>
        <button class="action-btn" id="resetBtn">Reset</button>
      </div>
    </div>
  </div>

  <script>
    const buttons = document.querySelectorAll('.button');
    const levelDisplay = document.getElementById('level');
    const bestDisplay = document.getElementById('best');
    const statusDisplay = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    let sequence = [];
    let playerSequence = [];
    let level = 1;
    let bestLevel = 1;
    let isPlayingSequence = false;
    let gameActive = false;
    let gameOver = false;

    const colors = ['red', 'yellow', 'blue', 'green'];
    const frequencies = { red: 440, yellow: 554, blue: 659, green: 784 };

    // Audio context
    let audioContext;
    try {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      console.log('Web Audio API not available');
    }

    function playSound(color, duration = 300) {
      if (!audioContext || audioContext.state === 'suspended') return;

      const now = audioContext.currentTime;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();

      osc.connect(gain);
      gain.connect(audioContext.destination);

      osc.frequency.value = frequencies[color];
      osc.type = 'sine';

      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + duration / 1000);

      osc.start(now);
      osc.stop(now + duration / 1000);
    }

    function flashButton(color) {
      const button = document.querySelector(`.button.${color}`);
      button.classList.add('active');
      playSound(color);

      setTimeout(() => {
        button.classList.remove('active');
      }, 300);
    }

    function playSequence() {
      isPlayingSequence = true;
      buttons.forEach(btn => btn.classList.add('disabled'));

      let delay = 600;
      for (let i = 0; i < sequence.length; i++) {
        setTimeout(() => {
          flashButton(sequence[i]);
        }, delay + i * 600);
      }

      setTimeout(() => {
        isPlayingSequence = false;
        buttons.forEach(btn => btn.classList.remove('disabled'));
        statusDisplay.textContent = 'Your turn';
        statusDisplay.className = 'status playing';
        playerSequence = [];
      }, delay + sequence.length * 600 + 200);
    }

    function startGame() {
      sequence = [];
      playerSequence = [];
      level = 1;
      gameActive = true;
      gameOver = false;
      statusDisplay.className = 'status waiting';
      buttons.forEach(btn => btn.classList.remove('disabled'));
      addToSequence();
    }

    function addToSequence() {
      const randomColor = colors[Math.floor(Math.random() * 4)];
      sequence.push(randomColor);
      levelDisplay.textContent = level;

      setTimeout(() => {
        playSequence();
      }, 800);
    }

    function handleButtonClick(color) {
      if (!gameActive || isPlayingSequence || gameOver) return;

      playerSequence.push(color);
      flashButton(color);

      if (playerSequence[playerSequence.length - 1] !== sequence[playerSequence.length - 1]) {
        gameOver = true;
        statusDisplay.textContent = `Game Over! Level: ${level}`;
        statusDisplay.className = 'status gameover';
        buttons.forEach(btn => btn.classList.add('disabled'));
        gameActive = false;

        if (level > bestLevel) {
          bestLevel = level;
          bestDisplay.textContent = bestLevel;
        }
        return;
      }

      if (playerSequence.length === sequence.length) {
        gameActive = false;
        level++;
        bestLevel = Math.max(bestLevel, level);
        bestDisplay.textContent = bestLevel;

        setTimeout(() => {
          addToSequence();
        }, 1000);
      }
    }

    buttons.forEach(button => {
      button.addEventListener('click', () => {
        handleButtonClick(button.dataset.color);
      });
    });

    startBtn.addEventListener('click', () => {
      if (!gameActive && !isPlayingSequence) {
        startGame();
      }
    });

    resetBtn.addEventListener('click', () => {
      sequence = [];
      playerSequence = [];
      level = 1;
      gameActive = false;
      gameOver = false;
      isPlayingSequence = false;
      levelDisplay.textContent = '1';
      statusDisplay.textContent = 'Press Start';
      statusDisplay.className = 'status waiting';
      buttons.forEach(btn => btn.classList.remove('disabled', 'active'));
    });

    // Resume audio context on user interaction
    document.addEventListener('click', () => {
      if (audioContext && audioContext.state === 'suspended') {
        audioContext.resume();
      }
    });
  </script>
</body>
</html>
