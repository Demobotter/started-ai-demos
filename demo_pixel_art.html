<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Art Canvas — Draw & Export</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700&family=Albert+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0012; --panel:rgba(20,10,30,.85); --txt:#f5e5ff;
    --mut:#a89aad; --c1:#ff006e; --c2:#8338ec; --c3:#3a86ff; --c4:#06ffa5;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Albert Sans',sans-serif;background:linear-gradient(135deg,var(--c2),#1a0033);color:var(--txt);overflow:hidden;display:flex;align-items:center;justify-content:center;padding:16px}
  .container{width:100%;max-width:500px}
  .hero{text-align:center;margin-bottom:24px;animation:fadeInDown .6s ease-out}
  h1{font-family:'Unbounded',sans-serif;font-size:32px;font-weight:700;margin-bottom:4px;letter-spacing:-1px;text-shadow:0 4px 12px rgba(0,0,0,.4)}
  .sub{font-size:13px;color:var(--mut);margin-bottom:12px}
  .controls{background:var(--panel);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;margin-bottom:20px;animation:fadeInUp .5s ease-out}
  .ctrl-row{display:flex;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .ctrl-row:last-child{margin-bottom:0}
  .ctrl-label{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;font-weight:600;flex:0 0 80px}
  .color-picker{width:44px;height:44px;border:2px solid var(--c1);border-radius:8px;cursor:pointer;background:#fff;display:flex;align-items:center;justify-content:center}
  .color-picker input{width:100%;height:100%;cursor:pointer;opacity:0}
  .size-select, .btn-ctrl{padding:8px 12px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.04);color:var(--txt);border-radius:8px;font-family:'Albert Sans',sans-serif;cursor:pointer;font-size:12px;transition:.15s}
  .size-select:hover, .btn-ctrl:hover{background:rgba(255,255,255,.1)}
  .btn-ctrl.active{background:var(--c4);color:var(--bg);border-color:var(--c4)}
  .canvas-wrap{display:flex;justify-content:center;margin-bottom:20px}
  #canvas{border:2px solid var(--c1);border-radius:8px;background:#1a0033;box-shadow:0 8px 24px rgba(255,0,110,.15);image-rendering:pixelated;image-rendering:-moz-crisp-edges;image-rendering:crisp-edges}
  .actions{display:flex;gap:10px;flex-wrap:wrap}
  .btn{flex:1;min-width:120px;padding:12px;border:1.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:var(--txt);border-radius:10px;cursor:pointer;font-family:'Unbounded',sans-serif;font-weight:600;font-size:13px;transition:.2s;letter-spacing:.3px}
  .btn:hover{background:rgba(255,255,255,.1);border-color:var(--c4)}
  .btn.primary{background:linear-gradient(135deg,var(--c1),var(--c2));border-color:var(--c1);color:#fff}
  .btn.primary:hover{transform:scale(1.02)}
  .presets{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
  .preset{padding:8px;border:1px solid rgba(255,255,255,.1);border-radius:6px;cursor:pointer;font-size:11px;text-align:center;background:rgba(255,255,255,.03);transition:.15s;color:var(--mut)}
  .preset:hover{background:rgba(255,255,255,.08);color:var(--txt)}
  .preset-color{display:inline-block;width:16px;height:16px;border-radius:3px;margin-right:4px;vertical-align:middle}
  @keyframes fadeInDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @media(prefers-reduced-motion:reduce){*{animation:none;transition:none}}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>🎨 Pixel Art Canvas</h1>
    <div class="sub">Draw pixel art, save your creation</div>
  </div>
  <div class="controls">
    <div class="ctrl-row">
      <div class="ctrl-label">Size</div>
      <select class="size-select" id="size">
        <option value="8">8×8 (small)</option>
        <option value="16" selected>16×16 (medium)</option>
        <option value="32">32×32 (large)</option>
      </select>
      <button class="btn-ctrl" id="grid-toggle">🔲 Grid</button>
      <button class="btn-ctrl active" id="show-grid">Show</button>
    </div>
    <div class="ctrl-row">
      <div class="ctrl-label">Color</div>
      <div class="color-picker">
        <input type="color" id="color" value="#ff006e">
      </div>
      <button class="btn-ctrl" id="eyedropper">👁️ Pick</button>
    </div>
    <div class="ctrl-row">
      <div class="ctrl-label">Presets</div>
      <div class="presets" id="presets"></div>
    </div>
  </div>
  <div class="canvas-wrap">
    <canvas id="canvas" width="256" height="256"></canvas>
  </div>
  <div class="actions">
    <button class="btn primary" id="download">⬇️ Download PNG</button>
    <button class="btn" id="clear">🗑️ Clear</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const colorInput = document.getElementById('color');
const sizeSelect = document.getElementById('size');
const showGridBtn = document.getElementById('show-grid');
const downloadBtn = document.getElementById('download');
const clearBtn = document.getElementById('clear');
const eyedropperBtn = document.getElementById('eyedropper');
const presetsDiv = document.getElementById('presets');

let gridSize = 16, pixelSize = 16, showGrid = true, eyedropperMode = false, currentColor = '#ff006e';
let pixels = Array(gridSize * gridSize).fill('#1a0033');

const presetColors = ['#ff006e', '#8338ec', '#3a86ff', '#06ffa5', '#ffbe0b', '#fb5607', '#ff006e', '#8338ec', '#3a86ff'];

function initPresets() {
  presets.innerHTML = presetColors.map((col, i) => `
    <div class="preset" style="background:${col};border-color:${col}" data-col="${col}">
      <div class="preset-color" style="background:${col}"></div>
    </div>
  `).join('');
  presetsDiv.querySelectorAll('.preset').forEach(p => {
    p.onclick = () => { currentColor = p.dataset.col; colorInput.value = currentColor; eyedropperMode = false; eyedropperBtn.classList.remove('active'); };
  });
}

function updateCanvasSize() {
  const newSize = parseInt(sizeSelect.value);
  if(newSize !== gridSize) {
    gridSize = newSize;
    pixelSize = Math.max(4, 256 / gridSize);
    pixels = Array(gridSize * gridSize).fill('#1a0033');
  }
  draw();
}

function draw() {
  ctx.fillStyle = '#1a0033';
  ctx.fillRect(0, 0, 256, 256);
  
  pixels.forEach((col, i) => {
    const row = Math.floor(i / gridSize);
    const col_idx = i % gridSize;
    ctx.fillStyle = col;
    ctx.fillRect(col_idx * pixelSize, row * pixelSize, pixelSize, pixelSize);
  });
  
  if(showGrid) {
    ctx.strokeStyle = 'rgba(255,255,255,.1)';
    ctx.lineWidth = 1;
    for(let i = 0; i <= gridSize; i++) {
      ctx.beginPath();
      ctx.moveTo(i * pixelSize, 0);
      ctx.lineTo(i * pixelSize, 256);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * pixelSize);
      ctx.lineTo(256, i * pixelSize);
      ctx.stroke();
    }
  }
}

canvas.onclick = (e) => {
  if(eyedropperMode) {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) / (pixelSize);
    const y = (e.clientY - rect.top) / (pixelSize);
    const idx = Math.floor(y) * gridSize + Math.floor(x);
    if(idx >= 0 && idx < pixels.length) {
      currentColor = pixels[idx];
      colorInput.value = currentColor;
      eyedropperMode = false;
      eyedropperBtn.classList.remove('active');
    }
  } else {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) / pixelSize;
    const y = (e.clientY - rect.top) / pixelSize;
    const idx = Math.floor(y) * gridSize + Math.floor(x);
    if(idx >= 0 && idx < pixels.length) {
      pixels[idx] = currentColor;
      draw();
    }
  }
};

colorInput.oninput = (e) => {
  currentColor = e.target.value;
};

sizeSelect.onchange = updateCanvasSize;

showGridBtn.onclick = () => {
  showGrid = !showGrid;
  showGridBtn.textContent = showGrid ? '🔲 Grid' : '  Grid';
  showGridBtn.classList.toggle('active');
  draw();
};

eyedropperBtn.onclick = () => {
  eyedropperMode = !eyedropperMode;
  eyedropperBtn.classList.toggle('active');
  canvas.style.cursor = eyedropperMode ? 'crosshair' : 'default';
};

downloadBtn.onclick = () => {
  const link = document.createElement('a');
  link.href = canvas.toDataURL('image/png');
  link.download = 'pixel-art.png';
  link.click();
};

clearBtn.onclick = () => {
  if(confirm('Clear the canvas?')) {
    pixels = Array(gridSize * gridSize).fill('#1a0033');
    draw();
  }
};

initPresets();
draw();
</script>
</body>
</html>
