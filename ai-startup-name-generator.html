<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Startup Name Generator — Your Brand in 10 Seconds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0f1318;--card:#15191f;--line:#1f2a37;--ink:#f0f1f3;--dim:#9ca3af;--faint:#6b7280;--accent:#10b981;--accent2:#059669;--alt:#6366f1;--warn:#fbbf24}
  body{background:var(--bg);color:var(--ink);font-family:'Sora',sans-serif;min-height:100vh;line-height:1.55}
  ::selection{background:var(--accent);color:var(--bg)}
  .wrap{max-width:1000px;margin:0 auto;padding:60px 22px 80px}
  .kick{font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:var(--accent2);margin-bottom:14px;font-weight:600}
  h1{font-size:clamp(36px,6.5vw,56px);line-height:1.05;letter-spacing:-.015em;font-weight:700}
  h1 em{font-style:italic;color:var(--accent)}
  .sub{color:var(--dim);margin-top:12px;font-size:15px;max-width:600px;line-height:1.6}
  .input-section{max-width:600px;margin-top:36px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px 26px;box-shadow:0 24px 60px -28px rgba(0,0,0,.5)}
  .field{margin-bottom:20px}
  label{display:block;font-size:13px;color:var(--dim);margin-bottom:8px;font-weight:500}
  textarea{width:100%;background:#0a0d11;border:1px solid var(--line);border-radius:12px;padding:14px;color:var(--ink);font-family:'Sora',sans-serif;font-size:15px;line-height:1.6;resize:vertical;min-height:100px;transition:border-color .15s}
  textarea:focus{outline:none;border-color:var(--accent)}
  textarea::placeholder{color:var(--faint)}
  button{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#000;border:none;border-radius:11px;padding:13px 32px;font-weight:600;font-size:15px;cursor:pointer;transition:all .2s;font-family:inherit}
  button:hover{transform:translateY(-2px);box-shadow:0 12px 32px -8px var(--accent)}
  button:active{transform:translateY(0)}
  .result-section{margin-top:48px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
  .name-card{background:linear-gradient(160deg,#0a1520,#0f1318);border:1px solid var(--line);border-radius:14px;padding:20px;text-align:center;transition:all .2s}
  .name-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 12px 32px -8px rgba(16,185,129,.15)}
  .name-card.fade{animation:f .4s cubic-bezier(.16,1,.3,1) backwards}
  .name-text{font-family:'IBM Plex Mono',monospace;font-size:clamp(20px,3vw,28px);font-weight:600;color:var(--accent);line-height:1.2;margin-bottom:12px;word-break:break-word}
  .tone-badge{display:inline-block;font-size:11px;background:rgba(99,102,241,.2);color:#a5b4fc;padding:4px 10px;border-radius:6px;margin-bottom:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
  .tone-badge.playful{background:rgba(234,179,8,.2);color:#fcd34d}
  .tone-badge.technical{background:rgba(59,130,246,.2);color:#93c5fd}
  .tone-badge.bold{background:rgba(239,68,68,.2);color:#fca5a5}
  .tone-badge.minimal{background:rgba(107,114,128,.2);color:#d1d5db}
  .domain-check{font-size:12px;color:var(--faint);margin-top:8px}
  .domain-check.available{color:var(--accent)}
  .domain-check.crowded{color:var(--warn)}
  .empty{text-align:center;padding:40px 20px;color:var(--dim)}
  .empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}
  footer{margin-top:48px;color:var(--faint);font-size:12px;text-align:center}
  @keyframes f{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @media(max-width:768px){
    .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
    h1{font-size:clamp(28px,5vw,40px)}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="kick">Branding</div>
  <h1>Your brand in <em>10 seconds</em></h1>
  <p class="sub">Tell us your startup idea in 2–3 sentences. We'll generate 10 creative names with tone categories and domain viability hints.</p>

  <div class="input-section">
    <div class="card">
      <div class="field">
        <label>Describe your startup idea</label>
        <textarea id="idea" placeholder="E.g., A mobile app that helps remote teams collaborate on design projects in real-time."></textarea>
      </div>
      <button onclick="generate()">Generate Names</button>
    </div>
  </div>

  <div id="out"></div>

  <footer>Generated in your browser · built by an AI agent on Base44</footer>
</div>

<script>
const $=id=>document.getElementById(id);
const out=$('out');

const prefixes=['Sync','Flow','Volt','Wave','Pulse','Shift','Prime','Spark','Nova','Nexus','Swift','Prism','Apex','Core','Meta','Omni','Turbo','Pixel','Zenith','Orbit'];
const suffixes=['Labs','Hub','Forge','Vault','Stream','Pulse','Link','Sky','Grid','Mesh','Loop','Lens','Drift','Path','Flux','Sphere','Node','Gate','Phase','Wave'];
const descriptors=['Smart','Quick','Cloud','Swift','Bright','Fresh','Sharp','Agile','Smooth','Bold','Pure','Open','Real','Live','True','Near','Deep','Fast'];
const adjectives=['Flex','Sync','Pro','AI','Auto','Smart','Instant','Dynamic','Quantum','Cyber','Digital','Future','Hyper','Ultra','Mega'];

function generateName(seed,toneType){
  const names=[];
  const rng=Math.seededRandom(seed);
  
  // Compound word
  names.push(descriptors[Math.floor(rng()*descriptors.length)]+suffixes[Math.floor(rng()*suffixes.length)]);
  
  // Prefix + suffix
  names.push(prefixes[Math.floor(rng()*prefixes.length)]+suffixes[Math.floor(rng()*suffixes.length)]);
  
  // Made-up (syllable + pattern)
  const syllables=['Ne','Vo','Lu','Xa','Zy','Ti','Qui','Zep','Flux','Helix'];
  const endings=['or','ex','us','ia','yx','o','io','ane','wave','sync'];
  names.push((syllables[Math.floor(rng()*syllables.length)]+endings[Math.floor(rng()*endings.length)]).charAt(0).toUpperCase()+(syllables[Math.floor(rng()*syllables.length)]+endings[Math.floor(rng()*endings.length)]).slice(1));
  
  // Acronym
  const letters='ACDEFLMNPQRSTVWXYZ';
  names.push(letters.charAt(Math.floor(rng()*letters.length))+letters.charAt(Math.floor(rng()*letters.length))+letters.charAt(Math.floor(rng()*letters.length))+letters.charAt(Math.floor(rng()*letters.length)));
  
  // Adjective + tech
  names.push(adjectives[Math.floor(rng()*adjectives.length)]+suffixes[Math.floor(rng()*suffixes.length)]);
  
  return names[0];
}

Math.seededRandom=function(seed){
  const x=Math.sin(seed)*10000;
  return x-Math.floor(x);
};

function checkDomain(name){
  if(name.length<5) return {status:'crowded',hint:'short domains are rare'};
  if(name.length>16) return {status:'crowded',hint:'too long'};
  const vowels=name.match(/[aeiou]/gi)||[];
  if(vowels.length<1 || vowels.length>name.length-2) return {status:'crowded',hint:'unusual letter balance'};
  return {status:'available',hint:'.com likely available'};
}

function getTone(name){
  const tones=['playful','technical','bold','minimal','serious'];
  return tones[name.charCodeAt(0)%tones.length];
}

function generate(){
  const idea=($('idea').value||'').trim();
  if(!idea||idea.length<10){
    out.innerHTML='<div class="empty"><div class="empty-icon">💡</div><div>Describe your idea to generate names (at least 10 characters)</div></div>';
    return;
  }

  const names=new Set();
  const idxSeed=idea.charCodeAt(0)*17;
  for(let i=0;i<12;i++){
    const seed=idxSeed+i*7;
    let candidate=generateName(seed);
    // Regenerate if duplicate
    let attempts=0;
    while(names.has(candidate)&&attempts<3){
      candidate=generateName(seed+attempts*11);
      attempts++;
    }
    names.add(candidate);
  }

  const namesList=Array.from(names).slice(0,10);
  const html=`<div class="result-section"><div class="grid">`+namesList.map((name,idx)=>{
    const {status,hint}=checkDomain(name);
    const tone=getTone(name);
    return `<div class="name-card fade" style="animation-delay:${idx*40}ms"><div class="name-text">${name}</div><div class="tone-badge ${tone}">${tone}</div><div class="domain-check ${status}">✓ ${hint}</div></div>`;
  }).join('')+`</div></div>`;

  out.innerHTML=html;
}

$('idea').addEventListener('keydown',e=>{if(e.key==='Enter'&&e.ctrlKey) generate()});
</script>
</body>
</html>
