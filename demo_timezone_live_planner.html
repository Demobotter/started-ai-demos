<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timezone Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Space Mono", monospace;
      background: linear-gradient(120deg, #0a0e27 0%, #1a1f3a 50%, #0d1b2a 100%);
      min-height: 100vh;
      padding: 40px 20px;
      color: #eee;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .hero {
      grid-column: 1 / -1;
      text-align: center;
      margin-bottom: 40px;
      animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .hero-emoji {
      font-size: 4rem;
      margin-bottom: 16px;
      display: inline-block;
      animation: spin 6s linear infinite;
    }

    .hero h1 {
      font-family: "Inconsolata", monospace;
      font-size: clamp(32px, 8vw, 64px);
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      background: linear-gradient(90deg, #00ffff, #00ff88, #00ffff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: 14px;
      color: #aaa;
      max-width: 600px;
      margin: 0 auto;
    }

    .controls {
      background: rgba(0, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 12px;
      padding: 28px;
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s backwards;
    }

    .control-group {
      margin-bottom: 24px;
      animation: fadeIn 0.6s ease 0.15s backwards;
    }

    .control-group label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #00ffaa;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .time-input {
      width: 100%;
      padding: 12px;
      background: rgba(0, 255, 255, 0.08);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 6px;
      color: #00ffff;
      font-family: "Inconsolata", monospace;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 2px;
      transition: all 0.2s ease;
    }

    .time-input:focus {
      outline: none;
      border-color: #00ffff;
      background: rgba(0, 255, 255, 0.15);
      box-shadow: 0 0 16px rgba(0, 255, 255, 0.3);
    }

    .zones {
      display: grid;
      gap: 16px;
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.15s backwards;
    }

    .zone-card {
      background: rgba(0, 255, 136, 0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 255, 136, 0.2);
      border-radius: 10px;
      padding: 16px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }

    .zone-card:hover {
      background: rgba(0, 255, 136, 0.12);
      border-color: rgba(0, 255, 136, 0.4);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 255, 136, 0.15);
    }

    .zone-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #00ffaa;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .zone-time {
      font-size: 28px;
      font-weight: 700;
      font-family: "Inconsolata", monospace;
      letter-spacing: 1px;
      color: #00ffff;
      margin-bottom: 8px;
    }

    .zone-offset {
      font-size: 12px;
      color: #aaa;
      font-weight: 400;
    }

    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes spin {
      from { transform: rotateZ(0deg); }
      to { transform: rotateZ(360deg); }
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
        gap: 30px;
      }
      .hero h1 {
        font-size: clamp(24px, 6vw, 44px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="hero-emoji">🌍</div>
      <h1>TIMEZONE PLANNER</h1>
      <p>Set a reference time and see what it is across 12 major timezones instantly.</p>
    </div>

    <div class="controls">
      <div class="control-group">
        <label>Reference Time (HH:MM)</label>
        <input type="time" id="refTime" value="09:00" class="time-input">
      </div>
    </div>

    <div class="zones" id="zonesGrid"></div>
  </div>

  <script>
    // PURE LOGIC — headless testable
    const ZONES = [
      { name: "New York", abbr: "EST", offset: -5 },
      { name: "London", abbr: "GMT", offset: 0 },
      { name: "Dubai", abbr: "GST", offset: 4 },
      { name: "Mumbai", abbr: "IST", offset: 5.5 },
      { name: "Bangkok", abbr: "ICT", offset: 7 },
      { name: "Singapore", abbr: "SGT", offset: 8 },
      { name: "Hong Kong", abbr: "HKT", offset: 8 },
      { name: "Tokyo", abbr: "JST", offset: 9 },
      { name: "Sydney", abbr: "AEDT", offset: 10 },
      { name: "Auckland", abbr: "NZDT", offset: 12 },
      { name: "Los Angeles", abbr: "PST", offset: -8 },
      { name: "Mexico City", abbr: "CST", offset: -6 },
    ];

    function parseTime(timeStr) {
      const [h, m] = timeStr.split(':').map(Number);
      return { hours: h, minutes: m };
    }

    function timeToString(h, m) {
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    }

    function calculateZoneTime(refHours, refMinutes, offset) {
      let h = refHours + Math.floor(offset);
      let m = refMinutes + Math.round((offset % 1) * 60);
      if (m >= 60) { m -= 60; h += 1; }
      if (m < 0) { m += 60; h -= 1; }
      h = ((h % 24) + 24) % 24;
      return { hours: h, minutes: m };
    }

    function formatOffset(offset) {
      const sign = offset >= 0 ? '+' : '';
      if (offset === Math.floor(offset)) {
        return `UTC ${sign}${offset}`;
      } else {
        return `UTC ${sign}${offset.toFixed(1)}`;
      }
    }

    // TEST
    function test() {
      const ref = parseTime('09:00');
      const nycTime = calculateZoneTime(ref.hours, ref.minutes, -5);
      console.assert(nycTime.hours === 4, 'NYC 4:00 from 9:00 UTC');
      
      const tokyoTime = calculateZoneTime(ref.hours, ref.minutes, 9);
      console.assert(tokyoTime.hours === 18, 'Tokyo 18:00 from 9:00 UTC');
      
      console.log('✓ Timezone logic tests passed');
    }
    test();

    // UI
    function render() {
      const timeStr = document.getElementById('refTime').value;
      const ref = parseTime(timeStr);
      const grid = document.getElementById('zonesGrid');
      grid.innerHTML = '';

      ZONES.forEach(zone => {
        const zt = calculateZoneTime(ref.hours, ref.minutes, zone.offset);
        const card = document.createElement('div');
        card.className = 'zone-card';
        card.innerHTML = `
          <div class="zone-label">${zone.name} • ${zone.abbr}</div>
          <div class="zone-time">${timeToString(zt.hours, zt.minutes)}</div>
          <div class="zone-offset">${formatOffset(zone.offset)}</div>
        `;
        grid.appendChild(card);
      });
    }

    document.getElementById('refTime').addEventListener('change', render);
    document.getElementById('refTime').addEventListener('input', render);
    render();
  </script>
</body>
</html>
