<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Meter — Text Sentiment Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..120,400;12..120,600;12..120,700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Bricolage Grotesque', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 50%, #0f1a2e 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* HERO */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
            animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: clamp(42px, 8vw, 72px);
            font-weight: 700;
            background: linear-gradient(90deg, #00d4ff, #ff00d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #a0a0b0;
            font-weight: 400;
            margin-bottom: 2rem;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* MAIN GRID */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* INPUT SECTION */
        .input-section {
            backdrop-filter: blur(20px);
            background: rgba(0, 20, 50, 0.5);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 16px;
            padding: 2rem;
        }

        .input-label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 1rem;
            font-family: 'Geist Mono', monospace;
            font-size: 1rem;
            color: #fff;
            resize: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        /* OUTPUT SECTION */
        .output-section {
            backdrop-filter: blur(20px);
            background: rgba(0, 20, 50, 0.5);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 16px;
            padding: 2rem;
        }

        .output-label {
            font-size: 0.95rem;
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* METER */
        .meter-container {
            margin-bottom: 2rem;
        }

        .meter-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #a0a0b0;
            margin-bottom: 0.5rem;
            font-family: 'Geist Mono', monospace;
        }

        .meter-emotions {
            display: flex;
            font-size: 0.75rem;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #808090;
        }

        .meter-bar-bg {
            width: 100%;
            height: 24px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .meter-bar {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #ff00d4);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 12px;
        }

        /* STATS */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            transition: border-color 0.3s, background 0.3s;
        }

        .stat-box:hover {
            border-color: rgba(0, 212, 255, 0.5);
            background: rgba(0, 212, 255, 0.05);
        }

        .stat-value {
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            font-weight: 700;
            color: #00d4ff;
            font-family: 'Geist Mono', monospace;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #a0a0b0;
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* EMOTION CHIPS */
        .emotion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .emotion-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }

        .emotion-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* HIGHLIGHTED TEXT */
        .highlight-section {
            margin-top: 2rem;
        }

        .highlight-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .highlight-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 1.2rem;
            line-height: 1.8;
            font-size: 0.95rem;
            max-height: 150px;
            overflow-y: auto;
        }

        .highlight-box::-webkit-scrollbar {
            width: 6px;
        }

        .highlight-box::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 3px;
        }

        .highlight-box::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.4);
            border-radius: 3px;
        }

        .highlight-box::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 212, 255, 0.6);
        }

        .emotion-span {
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .emotion-span.sad {
            background: rgba(100, 150, 255, 0.3);
            color: #64b3ff;
        }

        .emotion-span.angry {
            background: rgba(255, 100, 100, 0.3);
            color: #ff6464;
        }

        .emotion-span.happy {
            background: rgba(255, 200, 100, 0.3);
            color: #ffc864;
        }

        .emotion-span.love {
            background: rgba(255, 100, 180, 0.3);
            color: #ff64b4;
        }

        .emotion-span:hover {
            transform: scale(1.1);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.3);
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            color: #606070;
            padding: 2rem;
            font-size: 0.95rem;
        }

        /* ACCESSIBILITY */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* FOCUS VISIBLE */
        button:focus-visible,
        textarea:focus-visible {
            outline: 2px solid #00d4ff;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Emotion Meter</h1>
            <p class="subtitle">Analyze the sentiment hidden in your words</p>
        </div>

        <div class="main-grid">
            <div class="input-section">
                <label class="input-label">Paste your text</label>
                <textarea id="textInput" placeholder="Share your thoughts, a story, a message, or anything on your mind..."></textarea>
            </div>

            <div class="output-section">
                <div class="output-label">Sentiment Analysis</div>

                <div class="meter-container">
                    <div class="meter-emotions">
                        <span>😢 Sad</span>
                        <span>😠 Angry</span>
                        <span>😐 Neutral</span>
                        <span>😊 Happy</span>
                        <span>❤️ Love</span>
                    </div>
                    <div class="meter-bar-bg">
                        <div class="meter-bar" id="meterBar"></div>
                    </div>
                    <div class="meter-label">
                        <span id="sentimentLabel">Enter text to analyze</span>
                        <span id="sentimentScore">0%</span>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-value" id="wordCount">0</div>
                        <div class="stat-label">Words Found</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="emotionCount">0</div>
                        <div class="stat-label">Emotional Words</div>
                    </div>
                </div>

                <div class="emotion-chips" id="emotionChips"></div>

                <div class="highlight-section">
                    <div class="highlight-title">Highlighted Emotions</div>
                    <div class="highlight-box" id="highlightBox">
                        <p class="empty-state">Emotional words will be highlighted here</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Emotion lexicon
        const emotionLexicon = {
            sad: {
                words: ['sad', 'depressed', 'unhappy', 'miserable', 'gloomy', 'down', 'low', 'blue', 'sorrowful', 'heartbroken', 'devastated', 'grief', 'crying', 'tears', 'hopeless', 'lonely', 'dejected', 'melancholy', 'disappointed', 'hurt'],
                color: 'sad',
                emoji: '😢',
                value: -2
            },
            angry: {
                words: ['angry', 'furious', 'mad', 'livid', 'rage', 'hate', 'despise', 'hostile', 'aggressive', 'bitter', 'resentful', 'irritated', 'annoyed', 'vicious', 'cruel', 'nasty', 'outraged', 'enraged', 'seething', 'fuming'],
                color: 'angry',
                emoji: '😠',
                value: -1
            },
            happy: {
                words: ['happy', 'joyful', 'delighted', 'excited', 'wonderful', 'fantastic', 'great', 'amazing', 'awesome', 'beautiful', 'lovely', 'excellent', 'brilliant', 'fun', 'cheerful', 'glad', 'thrilled', 'ecstatic', 'laugh', 'smile'],
                color: 'happy',
                emoji: '😊',
                value: 1
            },
            love: {
                words: ['love', 'adore', 'cherish', 'beloved', 'caring', 'compassion', 'kindness', 'tender', 'affection', 'warm', 'grateful', 'thankful', 'blessed', 'grateful', 'beautiful', 'precious', 'sacred', 'genuine', 'heartfelt', 'embrace'],
                color: 'love',
                emoji: '❤️',
                value: 2
            }
        };

        const textInput = document.getElementById('textInput');
        const meterBar = document.getElementById('meterBar');
        const sentimentLabel = document.getElementById('sentimentLabel');
        const sentimentScore = document.getElementById('sentimentScore');
        const wordCountEl = document.getElementById('wordCount');
        const emotionCountEl = document.getElementById('emotionCount');
        const emotionChips = document.getElementById('emotionChips');
        const highlightBox = document.getElementById('highlightBox');

        function parseText(text) {
            const lowerText = text.toLowerCase();
            const words = lowerText.match(/\b[\w'-]+\b/g) || [];
            
            const foundEmotions = {
                sad: [],
                angry: [],
                happy: [],
                love: []
            };

            let totalScore = 0;
            const emotionCounts = { sad: 0, angry: 0, happy: 0, love: 0 };

            for (const [emotion, data] of Object.entries(emotionLexicon)) {
                data.words.forEach(word => {
                    words.forEach((textWord, idx) => {
                        if (textWord === word) {
                            foundEmotions[emotion].push(textWord);
                            emotionCounts[emotion]++;
                            totalScore += data.value;
                        }
                    });
                });
            }

            return {
                words,
                foundEmotions,
                emotionCounts,
                totalScore
            };
        }

        function getSentimentName(score) {
            if (score < -1.5) return 'Very Sad';
            if (score < -0.5) return 'Sad';
            if (score < 0.5) return 'Neutral';
            if (score < 1.5) return 'Happy';
            return 'Loving';
        }

        function getMeterPosition(score) {
            // Map score range to 0-100%
            // -4 = 0%, 0 = 50%, +4 = 100%
            const normalized = Math.max(-4, Math.min(4, score));
            return ((normalized + 4) / 8) * 100;
        }

        function updateAnalysis() {
            const text = textInput.value.trim();
            
            if (!text) {
                meterBar.style.width = '0%';
                sentimentLabel.textContent = 'Enter text to analyze';
                sentimentScore.textContent = '0%';
                wordCountEl.textContent = '0';
                emotionCountEl.textContent = '0';
                emotionChips.innerHTML = '';
                highlightBox.innerHTML = '<p class="empty-state">Emotional words will be highlighted here</p>';
                return;
            }

            const analysis = parseText(text);
            const totalEmotionalWords = Object.values(analysis.emotionCounts).reduce((a, b) => a + b, 0);
            
            // Calculate sentiment score
            const meterPos = getMeterPosition(analysis.totalScore);
            const sentimentName = getSentimentName(analysis.totalScore);

            // Update meter
            meterBar.style.width = meterPos + '%';
            sentimentLabel.textContent = sentimentName;
            sentimentScore.textContent = Math.round(meterPos) + '%';

            // Update stats
            wordCountEl.textContent = analysis.words.length;
            emotionCountEl.textContent = totalEmotionalWords;

            // Update emotion chips
            emotionChips.innerHTML = '';
            for (const [emotion, words] of Object.entries(analysis.foundEmotions)) {
                if (words.length > 0) {
                    const data = emotionLexicon[emotion];
                    const chip = document.createElement('div');
                    chip.className = 'emotion-chip';
                    chip.style.animationDelay = `${Object.keys(analysis.foundEmotions).indexOf(emotion) * 0.05}s`;
                    chip.innerHTML = `<span class="emotion-dot" style="background: ${data.color === 'sad' ? '#64b3ff' : data.color === 'angry' ? '#ff6464' : data.color === 'happy' ? '#ffc864' : '#ff64b4'};"></span>${data.emoji} ${emotion} (${words.length})`;
                    emotionChips.appendChild(chip);
                }
            }

            // Highlight emotions in text
            let highlightedText = text;
            const allEmotionWords = [];
            for (const [emotion, words] of Object.entries(analysis.foundEmotions)) {
                words.forEach(word => {
                    allEmotionWords.push({ word, emotion });
                });
            }

            // Sort by word position (longest first to avoid overlaps)
            allEmotionWords.sort((a, b) => b.word.length - a.word.length);

            const regex = new RegExp(`\\b(${allEmotionWords.map(e => e.word).filter((v, i, a) => a.indexOf(v) === i).join('|')})\\b`, 'gi');
            
            highlightedText = text.replace(regex, (match) => {
                const lower = match.toLowerCase();
                let emotionType = '';
                for (const [emotion, data] of Object.entries(emotionLexicon)) {
                    if (data.words.includes(lower)) {
                        emotionType = emotion;
                        break;
                    }
                }
                return `<span class="emotion-span ${emotionType}">${match}</span>`;
            });

            highlightBox.innerHTML = highlightedText || '<p class="empty-state">No emotional words found</p>';
        }

        textInput.addEventListener('input', updateAnalysis);
        
        // Initial load
        updateAnalysis();
    </script>
</body>
</html>
