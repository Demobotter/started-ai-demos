<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compound Interest & Growth Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Manrope', sans-serif;
      background: linear-gradient(135deg, #0f1b3c 0%, #1a2f5e 50%, #0d1a35 100%);
      color: #e0e7ff;
      overflow-x: hidden;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .hero {
      text-align: center;
      margin-bottom: 60px;
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .hero h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(40px, 8vw, 72px);
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #4ade80, #22d3ee, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }
    
    .hero p {
      font-size: 18px;
      color: #cbd5e1;
      font-weight: 400;
      letter-spacing: 0.3px;
    }
    
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }
    
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        gap: 30px;
      }
    }
    
    .card {
      background: rgba(15, 27, 60, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(34, 211, 238, 0.2);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }
    
    .controls-group {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    
    .control {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .control label {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: #cbd5e1;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .input-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    input[type="range"] {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #4ade80, #22d3ee, #60a5fa);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }
    
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #22d3ee, #4ade80);
      cursor: pointer;
      box-shadow: 0 0 12px rgba(34, 211, 238, 0.4);
      transition: box-shadow 0.2s ease;
    }
    
    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.7);
    }
    
    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #22d3ee, #4ade80);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 12px rgba(34, 211, 238, 0.4);
      transition: box-shadow 0.2s ease;
    }
    
    input[type="range"]::-moz-range-thumb:hover {
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.7);
    }
    
    .value-display {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: #22d3ee;
      min-width: 80px;
      text-align: right;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 32px;
    }
    
    @media (max-width: 900px) {
      .stats-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
    
    .stat-box {
      background: rgba(79, 39, 131, 0.2);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }
    
    .stat-label {
      font-size: 12px;
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 6px;
    }
    
    .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 24px;
      color: #a78bfa;
    }
    
    .chart-container {
      background: rgba(15, 27, 60, 0.4);
      border-radius: 12px;
      padding: 24px;
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
    }
    
    svg {
      width: 100%;
      height: 100%;
    }
    
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>💰 Compound Growth Calculator</h1>
      <p>Watch your money grow exponentially over time</p>
    </div>
    
    <div class="layout">
      <div class="card">
        <div class="controls-group">
          <div class="control">
            <label>Principal Amount ($)</label>
            <div class="input-row">
              <input type="range" id="principal" min="100" max="100000" step="100" value="10000" />
              <div class="value-display" id="principalDisplay">$10,000</div>
            </div>
          </div>
          
          <div class="control">
            <label>Annual Interest Rate (%)</label>
            <div class="input-row">
              <input type="range" id="rate" min="0.5" max="20" step="0.5" value="7" />
              <div class="value-display" id="rateDisplay">7.0%</div>
            </div>
          </div>
          
          <div class="control">
            <label>Compounds Per Year</label>
            <div class="input-row">
              <select id="compounds" style="flex: 1; padding: 8px 12px; background: rgba(34, 211, 238, 0.1); border: 1px solid rgba(34, 211, 238, 0.3); border-radius: 8px; color: #22d3ee; font-family: 'Manrope', sans-serif; font-size: 14px; cursor: pointer;">
                <option value="1">Annually</option>
                <option value="2">Semi-Annually</option>
                <option value="4">Quarterly</option>
                <option value="12" selected>Monthly</option>
              </select>
            </div>
          </div>
          
          <div class="control">
            <label>Time Period (Years)</label>
            <div class="input-row">
              <input type="range" id="years" min="1" max="50" step="1" value="10" />
              <div class="value-display" id="yearsDisplay">10 yr</div>
            </div>
          </div>
          
          <div class="stats-grid">
            <div class="stat-box">
              <div class="stat-label">Final Amount</div>
              <div class="stat-value" id="finalAmount">$19,672</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">Interest Earned</div>
              <div class="stat-value" id="interestEarned">$9,672</div>
            </div>
          </div>
        </div>
      </div>
      
      <div class="card">
        <div class="chart-container">
          <svg id="chart" viewBox="0 0 500 300" preserveAspectRatio="xMidYMid meet">
            <defs>
              <linearGradient id="fillGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.3" />
                <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0.05" />
              </linearGradient>
            </defs>
            <g id="chartContent"></g>
          </svg>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // Pure logic function (testable in node)
    function calculateCompoundGrowth(principal, annualRate, compoundsPerYear, years) {
      const rateDecimal = annualRate / 100;
      const periods = years * compoundsPerYear;
      const ratePerPeriod = rateDecimal / compoundsPerYear;
      const finalAmount = principal * Math.pow(1 + ratePerPeriod, periods);
      const interestEarned = finalAmount - principal;
      return { finalAmount, interestEarned };
    }
    
    function generateChartData(principal, annualRate, compoundsPerYear, years) {
      const points = [];
      const rateDecimal = annualRate / 100;
      const compoundsPerYear_ = compoundsPerYear;
      
      for (let y = 0; y <= years; y++) {
        const periods = y * compoundsPerYear_;
        const ratePerPeriod = rateDecimal / compoundsPerYear_;
        const balance = principal * Math.pow(1 + ratePerPeriod, periods);
        points.push({ year: y, balance });
      }
      
      return points;
    }
    
    // DOM elements
    const principalInput = document.getElementById('principal');
    const rateInput = document.getElementById('rate');
    const compoundsInput = document.getElementById('compounds');
    const yearsInput = document.getElementById('years');
    
    const principalDisplay = document.getElementById('principalDisplay');
    const rateDisplay = document.getElementById('rateDisplay');
    const yearsDisplay = document.getElementById('yearsDisplay');
    const finalAmountDisplay = document.getElementById('finalAmount');
    const interestEarnedDisplay = document.getElementById('interestEarned');
    const chartContent = document.getElementById('chartContent');
    
    function formatCurrency(value) {
      return '$' + Math.round(value).toLocaleString('en-US');
    }
    
    function drawChart(principal, annualRate, compoundsPerYear, years) {
      const data = generateChartData(principal, annualRate, compoundsPerYear, years);
      const maxBalance = Math.max(...data.map(d => d.balance));
      const padding = 40;
      const chartWidth = 500 - 2 * padding;
      const chartHeight = 300 - 2 * padding;
      
      let pathD = `M ${padding} ${300 - padding}`;
      data.forEach((point, idx) => {
        const x = padding + (point.year / years) * chartWidth;
        const y = 300 - padding - (point.balance / maxBalance) * chartHeight;
        pathD += ` L ${x} ${y}`;
      });
      
      chartContent.innerHTML = '';
      
      // Grid lines
      for (let i = 0; i <= 5; i++) {
        const y = padding + (i / 5) * chartHeight;
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', padding);
        line.setAttribute('y1', y);
        line.setAttribute('x2', 500 - padding);
        line.setAttribute('y2', y);
        line.setAttribute('stroke', 'rgba(34, 211, 238, 0.1)');
        line.setAttribute('stroke-width', '1');
        chartContent.appendChild(line);
      }
      
      // Fill area
      let fillD = pathD + ` L ${500 - padding} ${300 - padding} Z`;
      const area = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      area.setAttribute('d', fillD);
      area.setAttribute('fill', 'url(#fillGradient)');
      chartContent.appendChild(area);
      
      // Line
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      line.setAttribute('d', pathD);
      line.setAttribute('fill', 'none');
      line.setAttribute('stroke', 'url(#lineGradient)');
      line.setAttribute('stroke-width', '3');
      line.setAttribute('stroke-linecap', 'round');
      line.setAttribute('stroke-linejoin', 'round');
      chartContent.appendChild(line);
      
      // Add line gradient
      const defs = document.querySelector('defs');
      let lineGrad = defs.querySelector('#lineGradient');
      if (lineGrad) defs.removeChild(lineGrad);
      lineGrad = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
      lineGrad.setAttribute('id', 'lineGradient');
      lineGrad.setAttribute('x1', '0%');
      lineGrad.setAttribute('y1', '0%');
      lineGrad.setAttribute('x2', '0%');
      lineGrad.setAttribute('y2', '100%');
      
      const stop1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
      stop1.setAttribute('offset', '0%');
      stop1.setAttribute('style', 'stop-color:#4ade80;stop-opacity:1');
      lineGrad.appendChild(stop1);
      
      const stop2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
      stop2.setAttribute('offset', '100%');
      stop2.setAttribute('style', 'stop-color:#22d3ee;stop-opacity:1');
      lineGrad.appendChild(stop2);
      
      defs.appendChild(lineGrad);
      
      // Axis labels
      const xLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      xLabel.setAttribute('x', 500 - padding);
      xLabel.setAttribute('y', 300 - 5);
      xLabel.setAttribute('fill', '#cbd5e1');
      xLabel.setAttribute('font-size', '12');
      xLabel.setAttribute('text-anchor', 'end');
      xLabel.textContent = `${years}yr`;
      chartContent.appendChild(xLabel);
      
      const yLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      yLabel.setAttribute('x', padding - 10);
      yLabel.setAttribute('y', padding + 5);
      yLabel.setAttribute('fill', '#cbd5e1');
      yLabel.setAttribute('font-size', '12');
      yLabel.setAttribute('text-anchor', 'end');
      yLabel.textContent = formatCurrency(maxBalance);
      chartContent.appendChild(yLabel);
    }
    
    function update() {
      const principal = parseFloat(principalInput.value);
      const rate = parseFloat(rateInput.value);
      const compounds = parseInt(compoundsInput.value);
      const years = parseInt(yearsInput.value);
      
      // Update displays
      principalDisplay.textContent = formatCurrency(principal);
      rateDisplay.textContent = rate.toFixed(1) + '%';
      yearsDisplay.textContent = years + ' yr';
      
      const { finalAmount, interestEarned } = calculateCompoundGrowth(principal, rate, compounds, years);
      finalAmountDisplay.textContent = formatCurrency(finalAmount);
      interestEarnedDisplay.textContent = formatCurrency(interestEarned);
      
      drawChart(principal, rate, compounds, years);
    }
    
    // Event listeners
    principalInput.addEventListener('input', update);
    rateInput.addEventListener('input', update);
    compoundsInput.addEventListener('change', update);
    yearsInput.addEventListener('input', update);
    
    // Initial render
    update();
  </script>
</body>
</html>
