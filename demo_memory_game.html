<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match — Classic Card Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; 
            height: 100%; 
            font-family: 'Manrope', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 2rem 1rem;
            gap: 2rem;
        }
        
        /* Hero */
        .hero {
            text-align: center;
            animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .hero h1 {
            font-family: 'Sora', sans-serif;
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #e0d9ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }
        .hero p {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 400;
        }
        
        /* Controls */
        .controls {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }
        .controls label {
            font-size: 0.95rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }
        .btn-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-family: 'Sora', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(255, 255, 255, 0.15);
            color: white;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.4);
        }
        .btn.active {
            background: rgba(255, 255, 255, 0.35);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        
        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .stat-card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            display: block;
            margin-bottom: 0.5rem;
        }
        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        /* Game Board */
        .game-board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 1rem;
            width: 100%;
            max-width: 380px;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
            margin: 1rem 0;
        }
        
        .card {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            cursor: pointer;
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            user-select: none;
            position: relative;
            transform-style: preserve-3d;
            perspective: 1000px;
            backdrop-filter: blur(10px);
        }
        
        .card:hover:not(.matched):not(.locked) {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .card.flipped {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .card.matched {
            background: rgba(144, 238, 144, 0.2);
            border-color: rgba(144, 238, 144, 0.5);
            pointer-events: none;
        }
        
        .card.locked {
            pointer-events: none;
        }
        
        /* Victory Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease-out forwards;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.95) 0%, rgba(118, 75, 162, 0.95) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 3rem 2rem;
            text-align: center;
            animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .modal-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: bounce 0.8s infinite;
        }
        .modal-title {
            font-family: 'Sora', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 1rem;
        }
        .modal-stats {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 2rem;
            line-height: 1.8;
        }
        .modal-btn {
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.25);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            font-family: 'Sora', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: translateY(-2px);
        }
        
        /* Animations */
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        
        @media (max-width: 600px) {
            main {
                padding: 1.5rem 1rem;
                gap: 1.5rem;
            }
            .hero h1 {
                font-size: clamp(2rem, 7vw, 2.5rem);
            }
            .game-board {
                grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
                gap: 0.75rem;
                max-width: 320px;
            }
            .card {
                font-size: 2rem;
            }
            .controls {
                flex-direction: column;
                gap: 1rem;
            }
            .btn-group {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <main>
        <div class="hero">
            <h1>🎮 Memory Match</h1>
            <p>Find all matching pairs to win!</p>
        </div>
        
        <div class="controls">
            <label>Difficulty:</label>
            <div class="btn-group">
                <button class="btn active" data-difficulty="4">Easy (4 pairs)</button>
                <button class="btn" data-difficulty="6">Medium (6 pairs)</button>
                <button class="btn" data-difficulty="8">Hard (8 pairs)</button>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <span class="stat-value" id="moves">0</span>
                <span class="stat-label">Moves</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="time">0s</span>
                <span class="stat-label">Time</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="matches">0</span>
                <span class="stat-label">Matched</span>
            </div>
        </div>
        
        <div class="game-board" id="gameBoard"></div>
        
        <div class="modal" id="modal">
            <div class="modal-content">
                <div class="modal-icon">🎉</div>
                <div class="modal-title">You Won!</div>
                <div class="modal-stats" id="modalStats"></div>
                <button class="modal-btn" onclick="location.reload()">Play Again</button>
            </div>
        </div>
    </main>

    <script>
        // Game state
        const gameState = {
            pairs: [],
            flipped: [],
            matched: new Set(),
            moves: 0,
            startTime: null,
            timer: null,
            locked: false,
            difficulty: 4
        };

        // Emoji pairs
        const emojiPairs = [
            ['🌟', '⭐'],
            ['🍕', '🍔'],
            ['🎉', '🎊'],
            ['🌈', '☀️'],
            ['🦋', '🐝'],
            ['🎸', '🎹'],
            ['🌺', '🌸'],
            ['🚀', '✈️']
        ];

        // ========== HEADLESS LOGIC (for node testing) ==========
        function shuffleArray(arr) {
            const result = [...arr];
            for (let i = result.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }
            return result;
        }

        function createDeck(numPairs) {
            const selected = emojiPairs.slice(0, numPairs);
            const deck = [];
            selected.forEach(([a, b]) => {
                deck.push(a);
                deck.push(b);
            });
            return shuffleArray(deck);
        }

        function checkMatch(card1, card2) {
            return card1 === card2;
        }

        function isVictory(matchedCount, totalCards) {
            return matchedCount === totalCards / 2;
        }

        // ========== DOM & INTERACTION ==========
        function initGame(difficulty) {
            gameState.difficulty = difficulty;
            gameState.pairs = createDeck(difficulty);
            gameState.flipped = [];
            gameState.matched.clear();
            gameState.moves = 0;
            gameState.locked = false;
            gameState.startTime = Date.now();
            
            clearInterval(gameState.timer);
            gameState.timer = setInterval(updateTimer, 1000);
            
            updateStats();
            renderBoard();
        }

        function renderBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            gameState.pairs.forEach((emoji, idx) => {
                const card = document.createElement('div');
                card.className = 'card';
                if (gameState.flipped.includes(idx)) {
                    card.textContent = emoji;
                    card.classList.add('flipped');
                }
                if (gameState.matched.has(idx)) {
                    card.classList.add('matched');
                }
                if (gameState.locked) {
                    card.classList.add('locked');
                }
                card.onclick = () => flipCard(idx);
                board.appendChild(card);
            });
        }

        function flipCard(idx) {
            if (gameState.locked || gameState.flipped.includes(idx) || gameState.matched.has(idx)) {
                return;
            }
            gameState.flipped.push(idx);
            renderBoard();
            
            if (gameState.flipped.length === 2) {
                gameState.locked = true;
                checkPair();
            }
        }

        function checkPair() {
            const [idx1, idx2] = gameState.flipped;
            const match = checkMatch(gameState.pairs[idx1], gameState.pairs[idx2]);
            gameState.moves++;
            updateStats();
            
            if (match) {
                gameState.matched.add(idx1);
                gameState.matched.add(idx2);
                gameState.flipped = [];
                gameState.locked = false;
                renderBoard();
                
                if (isVictory(gameState.matched.size, gameState.pairs.length)) {
                    endGame();
                }
            } else {
                setTimeout(() => {
                    gameState.flipped = [];
                    gameState.locked = false;
                    renderBoard();
                }, 1000);
            }
        }

        function updateTimer() {
            if (!gameState.startTime) return;
            const elapsed = Math.floor((Date.now() - gameState.startTime) / 1000);
            document.getElementById('time').textContent = elapsed + 's';
        }

        function updateStats() {
            document.getElementById('moves').textContent = gameState.moves;
            document.getElementById('matches').textContent = gameState.matched.size / 2;
        }

        function endGame() {
            clearInterval(gameState.timer);
            const elapsed = Math.floor((Date.now() - gameState.startTime) / 1000);
            const pairs = gameState.matched.size / 2;
            document.getElementById('modalStats').textContent = 
                `${pairs} pairs matched in ${gameState.moves} moves\n${elapsed} seconds`;
            document.getElementById('modal').classList.add('show');
        }

        // Difficulty buttons
        document.querySelectorAll('[data-difficulty]').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('[data-difficulty]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                initGame(parseInt(btn.dataset.difficulty));
            };
        });

        // Start game
        initGame(4);
    </script>
</body>
</html>
