<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hue Ring — Live Color Harmony</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Sora, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0d0015 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }
    
    .container {
      width: 100%;
      max-width: 900px;
      animation: fadeInUp 0.8s ease-out;
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .hero {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeInDown 0.8s ease-out;
    }
    
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .hero h1 {
      font-size: clamp(32px, 8vw, 56px);
      font-weight: 700;
      background: linear-gradient(90deg, #ff006e, #00d9ff, #ffb700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    
    .hero p {
      font-size: 16px;
      color: #a0a0d0;
      font-weight: 400;
    }
    
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 40px;
      animation: slideInLeft 0.8s ease-out 0.1s both;
    }
    
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    @media (max-width: 768px) {
      .controls {
        grid-template-columns: 1fr;
      }
    }
    
    .control-group {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }
    
    .control-group:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }
    
    .control-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a0a0d0;
      margin-bottom: 12px;
      display: block;
    }
    
    select, input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    select:hover, input[type="text"]:hover {
      border-color: rgba(255, 255, 255, 0.3);
    }
    
    select:focus, input[type="text"]:focus {
      outline: none;
      border-color: #00d9ff;
      background: rgba(0, 217, 255, 0.1);
    }
    
    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      animation: slideInUp 0.8s ease-out 0.2s both;
    }
    
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @media (max-width: 768px) {
      .main-content {
        grid-template-columns: 1fr;
      }
    }
    
    .canvas-wrapper {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 380px;
    }
    
    #colorWheel {
      display: block;
      cursor: crosshair;
      filter: drop-shadow(0 0 30px rgba(0, 217, 255, 0.3));
      transition: filter 0.3s ease;
    }
    
    #colorWheel:hover {
      filter: drop-shadow(0 0 50px rgba(0, 217, 255, 0.5));
    }
    
    .swatches {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .swatch {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: all 0.3s ease;
      animation: fadeIn 0.6s ease-out;
      animation-fill-mode: both;
    }
    
    .swatch:nth-child(1) { animation-delay: 0.3s; }
    .swatch:nth-child(2) { animation-delay: 0.4s; }
    .swatch:nth-child(3) { animation-delay: 0.5s; }
    .swatch:nth-child(4) { animation-delay: 0.6s; }
    .swatch:nth-child(5) { animation-delay: 0.7s; }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .swatch:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateX(4px);
    }
    
    .swatch-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    
    .color-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.3);
      flex-shrink: 0;
      box-shadow: 0 0 15px currentColor;
    }
    
    .swatch-label {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .swatch-hex {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: #a0a0d0;
      user-select: all;
      word-break: break-all;
    }
    
    .info {
      font-size: 12px;
      color: #707090;
      margin-top: 8px;
      text-align: center;
    }
    
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Hue Ring</h1>
      <p>Click the color wheel to explore harmonies</p>
    </div>
    
    <div class="controls">
      <div class="control-group">
        <label class="control-label">Harmony Mode</label>
        <select id="harmonySelect">
          <option value="complementary">Complementary</option>
          <option value="analogous">Analogous</option>
          <option value="triadic">Triadic</option>
          <option value="tetradic">Tetradic</option>
          <option value="monochromatic">Monochromatic</option>
        </select>
      </div>
      <div class="control-group">
        <label class="control-label">Base Hue (0–360°)</label>
        <input type="text" id="hueInput" value="0" maxlength="3">
      </div>
    </div>
    
    <div class="main-content">
      <div class="canvas-wrapper">
        <svg id="colorWheel" width="320" height="320" viewBox="0 0 320 320"></svg>
      </div>
      
      <div class="swatches" id="swatchesContainer"></div>
    </div>
  </div>

  <script>
    const svg = document.getElementById('colorWheel');
    const harmonySelect = document.getElementById('harmonySelect');
    const hueInput = document.getElementById('hueInput');
    const swatchesContainer = document.getElementById('swatchesContainer');

    function drawColorWheel(baseHue = 0) {
      svg.innerHTML = '';
      const cx = 160, cy = 160, radius = 140;
      
      // Outer ring: full hue spectrum
      const steps = 360;
      for (let i = 0; i < steps; i++) {
        const hue = i;
        const angle1 = (i * Math.PI * 2) / steps - Math.PI / 2;
        const angle2 = ((i + 1) * Math.PI * 2) / steps - Math.PI / 2;
        
        const x1 = cx + Math.cos(angle1) * radius;
        const y1 = cy + Math.sin(angle1) * radius;
        const x2 = cx + Math.cos(angle2) * radius;
        const y2 = cy + Math.sin(angle2) * radius;
        
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', `M ${cx} ${cy} L ${x1} ${y1} A ${radius} ${radius} 0 0 1 ${x2} ${y2} Z`);
        path.setAttribute('fill', `hsl(${hue}, 100%, 50%)`);
        svg.appendChild(path);
      }
      
      // Center gray circle
      const center = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      center.setAttribute('cx', cx);
      center.setAttribute('cy', cy);
      center.setAttribute('r', 20);
      center.setAttribute('fill', '#404060');
      svg.appendChild(center);
      
      // Base hue indicator (triangular pointer)
      const baseAngle = (baseHue * Math.PI * 2) / 360 - Math.PI / 2;
      const pointerX = cx + Math.cos(baseAngle) * (radius - 15);
      const pointerY = cy + Math.sin(baseAngle) * (radius - 15);
      
      const indicator = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      indicator.setAttribute('cx', pointerX);
      indicator.setAttribute('cy', pointerY);
      indicator.setAttribute('r', 10);
      indicator.setAttribute('fill', 'white');
      indicator.setAttribute('stroke', `hsl(${baseHue}, 100%, 50%)`);
      indicator.setAttribute('stroke-width', 3);
      svg.appendChild(indicator);
    }

    function hslToHex(h, s, l) {
      s /= 100;
      l /= 100;
      const c = (1 - Math.abs(2 * l - 1)) * s;
      const x = c * (1 - Math.abs((h / 60) % 2 - 1));
      const m = l - c / 2;
      let r = 0, g = 0, b = 0;
      
      if (h < 60) { r = c; g = x; }
      else if (h < 120) { r = x; g = c; }
      else if (h < 180) { g = c; b = x; }
      else if (h < 240) { g = x; b = c; }
      else if (h < 300) { r = x; b = c; }
      else { r = c; b = x; }
      
      const toHex = (val) => {
        const hex = Math.round((val + m) * 255).toString(16);
        return hex.length === 1 ? '0' + hex : hex;
      };
      
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`.toUpperCase();
    }

    function getHarmonyColors(baseHue, mode) {
      const colors = [];
      
      switch (mode) {
        case 'complementary':
          colors.push({ hue: baseHue, label: 'Base' });
          colors.push({ hue: (baseHue + 180) % 360, label: 'Complement' });
          break;
        case 'analogous':
          colors.push({ hue: (baseHue - 30) % 360, label: 'Analogous 1' });
          colors.push({ hue: baseHue, label: 'Base' });
          colors.push({ hue: (baseHue + 30) % 360, label: 'Analogous 2' });
          break;
        case 'triadic':
          colors.push({ hue: baseHue, label: 'Base' });
          colors.push({ hue: (baseHue + 120) % 360, label: 'Tertiary 1' });
          colors.push({ hue: (baseHue + 240) % 360, label: 'Tertiary 2' });
          break;
        case 'tetradic':
          colors.push({ hue: baseHue, label: 'Base' });
          colors.push({ hue: (baseHue + 90) % 360, label: 'Secondary 1' });
          colors.push({ hue: (baseHue + 180) % 360, label: 'Complement' });
          colors.push({ hue: (baseHue + 270) % 360, label: 'Secondary 2' });
          break;
        case 'monochromatic':
          colors.push({ hue: baseHue, saturation: 100, lightness: 20, label: 'Dark' });
          colors.push({ hue: baseHue, saturation: 100, lightness: 40, label: 'Medium Dark' });
          colors.push({ hue: baseHue, saturation: 100, lightness: 60, label: 'Medium' });
          colors.push({ hue: baseHue, saturation: 100, lightness: 80, label: 'Light' });
          break;
      }
      
      return colors;
    }

    function updateSwatches(baseHue, mode) {
      const colors = getHarmonyColors(baseHue, mode);
      swatchesContainer.innerHTML = '';
      
      colors.forEach((color, idx) => {
        const s = color.saturation !== undefined ? color.saturation : 100;
        const l = color.lightness !== undefined ? color.lightness : 50;
        const hex = hslToHex(color.hue, s, l);
        
        const swatch = document.createElement('div');
        swatch.className = 'swatch';
        swatch.innerHTML = `
          <div class="swatch-header">
            <div class="color-dot" style="background-color: ${hex}; color: ${hex};"></div>
            <span class="swatch-label">${color.label}</span>
          </div>
          <div class="swatch-hex">${hex}</div>
          <div class="info">Click to copy</div>
        `;
        swatch.addEventListener('click', () => {
          navigator.clipboard.writeText(hex);
          swatch.style.background = 'rgba(0, 217, 255, 0.15)';
          setTimeout(() => {
            swatch.style.background = 'rgba(255, 255, 255, 0.05)';
          }, 500);
        });
        
        swatchesContainer.appendChild(swatch);
      });
    }

    function handleWheelClick(e) {
      const rect = svg.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const cx = 160, cy = 160;
      
      const dx = x - cx;
      const dy = y - cy;
      let angle = Math.atan2(dy, dx) * 180 / Math.PI + 90;
      angle = (angle + 360) % 360;
      
      const distance = Math.sqrt(dx * dx + dy * dy);
      if (distance > 30) {
        hueInput.value = Math.round(angle);
        const baseHue = Math.round(angle);
        const mode = harmonySelect.value;
        drawColorWheel(baseHue);
        updateSwatches(baseHue, mode);
      }
    }

    hueInput.addEventListener('change', (e) => {
      let hue = parseInt(e.target.value) || 0;
      hue = ((hue % 360) + 360) % 360;
      hueInput.value = hue;
      drawColorWheel(hue);
      updateSwatches(hue, harmonySelect.value);
    });

    harmonySelect.addEventListener('change', (e) => {
      const baseHue = parseInt(hueInput.value) || 0;
      updateSwatches(baseHue, e.target.value);
    });

    svg.addEventListener('click', handleWheelClick);

    // Initialize
    drawColorWheel(0);
    updateSwatches(0, 'complementary');
  </script>
</body>
</html>
