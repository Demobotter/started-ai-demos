<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loan Payoff Timeline</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;800&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: "Hanken Grotesk", sans-serif;
      background: linear-gradient(135deg, #0d1b2a 0%, #1a2f4b 50%, #0d1b2a 100%);
      color: #e8eef7;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      padding: 40px 20px;
      gap: 40px;
      min-height: 100vh;
    }

    /* Hero */
    .hero {
      animation: fadeInDown 0.8s ease-out;
    }

    .hero h1 {
      font-family: "Bricolage Grotesque", sans-serif;
      font-size: clamp(36px, 8vw, 64px);
      font-weight: 800;
      background: linear-gradient(120deg, #4ade80 0%, #10b981 50%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      letter-spacing: -1px;
    }

    .hero p {
      font-size: 16px;
      color: #a8b5c7;
      max-width: 600px;
      line-height: 1.6;
    }

    /* Main container */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      animation: fadeInUp 0.8s ease-out 0.15s both;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
        gap: 30px;
      }
    }

    /* Controls panel */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .control-group label {
      font-family: "Bricolage Grotesque", sans-serif;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #06b6d4;
    }

    .control-group .display {
      font-size: 28px;
      font-weight: 700;
      color: #4ade80;
      font-family: "Bricolage Grotesque", sans-serif;
    }

    .control-group input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #1e3a5f 0%, #2d5a8c 100%);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #06b6d4 0%, #10b981 100%);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(6, 182, 212, 0.6);
      transition: box-shadow 0.2s;
    }

    .control-group input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 16px rgba(6, 182, 212, 0.8);
    }

    .control-group input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #06b6d4 0%, #10b981 100%);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px rgba(6, 182, 212, 0.6);
      transition: box-shadow 0.2s;
    }

    .control-group input[type="range"]::-moz-range-thumb:hover {
      box-shadow: 0 0 16px rgba(6, 182, 212, 0.8);
    }

    /* Stats cards */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    .stat-card {
      padding: 16px;
      border-radius: 12px;
      background: rgba(30, 58, 95, 0.4);
      border: 1px solid rgba(6, 182, 212, 0.2);
      backdrop-filter: blur(8px);
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }

    .stat-card .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #7a8fa8;
      margin-bottom: 6px;
    }

    .stat-card .value {
      font-size: 22px;
      font-weight: 700;
      color: #4ade80;
      font-family: "Bricolage Grotesque", sans-serif;
    }

    /* Timeline */
    .timeline-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .timeline-label {
      font-family: "Bricolage Grotesque", sans-serif;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #06b6d4;
      animation: fadeInUp 0.8s ease-out 0.25s both;
    }

    .timeline {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 80px;
      padding: 16px;
      border-radius: 12px;
      background: rgba(30, 58, 95, 0.3);
      border: 1px solid rgba(6, 182, 212, 0.15);
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }

    .timeline-block {
      flex: 1;
      min-width: 20px;
      height: 60px;
      border-radius: 8px;
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 12px rgba(251, 191, 36, 0.2);
    }

    .timeline-block:hover {
      transform: scale(1.05) translateY(-4px);
      box-shadow: 0 8px 20px rgba(251, 191, 36, 0.4);
    }

    .timeline-block.early {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
    }

    .timeline-block.early:hover {
      box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4);
    }

    .timeline-block.mid {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2);
    }

    .timeline-block.mid:hover {
      box-shadow: 0 8px 20px rgba(245, 158, 11, 0.4);
    }

    .timeline-block.late {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    }

    .timeline-block.late:hover {
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
    }

    /* Tooltip */
    .tooltip {
      position: fixed;
      background: rgba(13, 27, 42, 0.95);
      color: #e8eef7;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid rgba(6, 182, 212, 0.3);
      font-size: 13px;
      pointer-events: none;
      z-index: 1000;
      max-width: 200px;
      backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .tooltip.visible {
      opacity: 1;
    }

    /* Animations */
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }

    /* Mobile */
    @media (max-width: 480px) {
      body {
        padding: 30px 16px;
        gap: 30px;
      }

      .hero h1 {
        font-size: clamp(28px, 7vw, 44px);
      }

      .controls {
        gap: 18px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .timeline-block {
        min-width: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Loan Payoff Timeline</h1>
    <p>Adjust your loan parameters and watch your payment schedule visualize in real time. See exactly when you'll be debt-free.</p>
  </div>

  <div class="container">
    <!-- Controls -->
    <div class="controls">
      <div class="control-group">
        <label for="principal">Loan Amount</label>
        <div class="display">$<span id="principalDisplay">50000</span></div>
        <input type="range" id="principal" min="10000" max="500000" step="5000" value="50000">
      </div>

      <div class="control-group">
        <label for="rate">Annual Interest Rate</label>
        <div class="display"><span id="rateDisplay">5.5</span>%</div>
        <input type="range" id="rate" min="2" max="12" step="0.1" value="5.5">
      </div>

      <div class="control-group">
        <label for="monthly">Monthly Payment</label>
        <div class="display">$<span id="monthlyDisplay">1000</span></div>
        <input type="range" id="monthly" min="100" max="3000" step="50" value="1000">
      </div>

      <div class="stats">
        <div class="stat-card">
          <div class="label">Time to Payoff</div>
          <div class="value"><span id="months">50</span> mo</div>
        </div>
        <div class="stat-card">
          <div class="label">Total Interest</div>
          <div class="value">$<span id="totalInterest">2500</span></div>
        </div>
      </div>
    </div>

    <!-- Timeline -->
    <div class="timeline-section">
      <div class="timeline-label">Payment Schedule</div>
      <div class="timeline" id="timeline"></div>
    </div>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script>
    // Pure loan math (headless-testable)
    function calculatePayoff(principal, annualRate, monthlyPayment) {
      let balance = principal;
      const monthlyRate = annualRate / 100 / 12;
      let month = 0;
      let totalInterest = 0;
      const schedule = [];

      const maxIterations = 600;
      while (balance > 0 && month < maxIterations) {
        month++;
        const interestPayment = balance * monthlyRate;
        const principalPayment = monthlyPayment - interestPayment;

        if (principalPayment <= 0) {
          month = 0;
          break;
        }

        balance -= principalPayment;
        totalInterest += interestPayment;
        schedule.push({
          month,
          principalPayment,
          interestPayment,
          balance: Math.max(0, balance)
        });
      }

      return {
        months: month,
        totalInterest: Math.round(totalInterest),
        schedule
      };
    }

    // DOM elements
    const principalInput = document.getElementById('principal');
    const rateInput = document.getElementById('rate');
    const monthlyInput = document.getElementById('monthly');
    const principalDisplay = document.getElementById('principalDisplay');
    const rateDisplay = document.getElementById('rateDisplay');
    const monthlyDisplay = document.getElementById('monthlyDisplay');
    const monthsDisplay = document.getElementById('months');
    const totalInterestDisplay = document.getElementById('totalInterest');
    const timeline = document.getElementById('timeline');
    const tooltip = document.getElementById('tooltip');

    function updateDisplay() {
      const principal = parseInt(principalInput.value);
      const rate = parseFloat(rateInput.value);
      const monthly = parseInt(monthlyInput.value);

      principalDisplay.textContent = principal.toLocaleString();
      rateDisplay.textContent = rate.toFixed(1);
      monthlyDisplay.textContent = monthly.toLocaleString();

      const result = calculatePayoff(principal, rate, monthly);
      monthsDisplay.textContent = result.months;
      totalInterestDisplay.textContent = result.totalInterest.toLocaleString();

      timeline.innerHTML = '';
      if (result.months === 0 || result.months > 600) {
        timeline.innerHTML = '<p style="color: #a8b5c7; font-size: 13px;">Monthly payment is too low — loan will never payoff.</p>';
        return;
      }

      const thresholdEarly = result.months * 0.33;
      const thresholdMid = result.months * 0.67;

      result.schedule.forEach((payment, idx) => {
        const block = document.createElement('div');
        block.className = 'timeline-block';

        if (idx < thresholdEarly) {
          block.classList.add('early');
        } else if (idx < thresholdMid) {
          block.classList.add('mid');
        } else {
          block.classList.add('late');
        }

        block.addEventListener('mouseenter', (e) => {
          tooltip.textContent = `Month ${payment.month}: $${Math.round(payment.principalPayment).toLocaleString()} principal`;
          tooltip.classList.add('visible');
        });

        block.addEventListener('mousemove', (e) => {
          tooltip.style.left = (e.clientX + 10) + 'px';
          tooltip.style.top = (e.clientY - 10) + 'px';
        });

        block.addEventListener('mouseleave', () => {
          tooltip.classList.remove('visible');
        });

        timeline.appendChild(block);
      });
    }

    principalInput.addEventListener('input', updateDisplay);
    rateInput.addEventListener('input', updateDisplay);
    monthlyInput.addEventListener('input', updateDisplay);

    updateDisplay();
  </script>
</body>
</html>
