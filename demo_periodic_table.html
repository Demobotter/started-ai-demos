<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Periodic Table Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Syne', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e7ff;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            animation-delay: 0s;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero h1 {
            font-size: clamp(32px, 8vw, 72px);
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #00ffcc 0%, #00ff88 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 16px;
            color: #a0afd9;
            margin-bottom: 20px;
        }

        /* Search Bar */
        .search-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
            animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            animation-delay: 0.1s;
        }

        .search-bar input {
            padding: 12px 20px;
            border: 1px solid #00ffcc;
            border-radius: 8px;
            background: rgba(0, 255, 204, 0.05);
            color: #e0e7ff;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 14px;
            width: 300px;
            max-width: 100%;
            transition: all 0.3s ease;
        }

        .search-bar input:focus {
            outline: none;
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .search-bar button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #00ffcc 0%, #00ff88 100%);
            border: none;
            border-radius: 8px;
            color: #0a0e27;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .search-bar button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 255, 204, 0.3);
        }

        /* Table Grid */
        .table-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 10px;
            margin-bottom: 40px;
            animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            animation-delay: 0.2s;
        }

        @media (max-width: 768px) {
            .table-container {
                grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
                gap: 8px;
            }
        }

        .element {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 8px;
            background: rgba(0, 255, 204, 0.05);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 8px;
            text-align: center;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .element::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 30%, rgba(0, 255, 204, 0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .element:hover {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.15);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .element:hover::before {
            opacity: 1;
        }

        .element-number {
            font-size: 10px;
            color: #a0afd9;
            font-family: 'IBM Plex Mono', monospace;
            line-height: 1;
        }

        .element-symbol {
            font-size: 24px;
            font-weight: 700;
            color: #00ffcc;
            line-height: 1;
            margin: 4px 0;
        }

        .element-name {
            font-size: 10px;
            color: #e0e7ff;
            font-family: 'IBM Plex Mono', monospace;
            line-height: 1.2;
        }

        .element-mass {
            font-size: 8px;
            color: #7a8bc4;
            font-family: 'IBM Plex Mono', monospace;
            margin-top: 2px;
        }

        .element.hidden {
            opacity: 0.2;
            pointer-events: none;
        }

        /* Detail Panel */
        .detail-panel {
            position: fixed;
            right: -400px;
            top: 0;
            width: 380px;
            height: 100vh;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(0, 255, 204, 0.3);
            padding: 30px 24px;
            overflow-y: auto;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
        }

        .detail-panel.active {
            right: 0;
        }

        .detail-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #00ffcc;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .detail-close:hover {
            color: #00ff88;
            transform: rotate(90deg);
        }

        .detail-symbol {
            font-size: 80px;
            font-weight: 700;
            color: #00ffcc;
            line-height: 1;
            margin-bottom: 8px;
        }

        .detail-name {
            font-size: 28px;
            font-weight: 700;
            color: #e0e7ff;
            margin-bottom: 4px;
        }

        .detail-number {
            font-size: 14px;
            color: #a0afd9;
            font-family: 'IBM Plex Mono', monospace;
            margin-bottom: 20px;
        }

        .detail-section {
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 255, 204, 0.2);
        }

        .detail-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .detail-label {
            font-size: 12px;
            color: #7a8bc4;
            font-family: 'IBM Plex Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .detail-value {
            font-size: 16px;
            color: #e0e7ff;
            margin-bottom: 8px;
        }

        .detail-fact {
            font-size: 14px;
            color: #a0afd9;
            line-height: 1.6;
            font-style: italic;
        }

        .no-match {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 20px;
            color: #7a8bc4;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .detail-panel {
                width: 100%;
                right: -100%;
            }
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .table-container {
                grid-template-columns: repeat(5, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Periodic Table</h1>
            <p>Explore the elements. Click any element to learn more.</p>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search element name or symbol...">
            <button onclick="clearSearch()">Clear</button>
        </div>

        <div class="table-container" id="tableContainer"></div>
    </div>

    <div class="detail-panel" id="detailPanel">
        <button class="detail-close" onclick="closeDetail()">✕</button>
        <div class="detail-symbol" id="detailSymbol"></div>
        <div class="detail-name" id="detailName"></div>
        <div class="detail-number" id="detailNumber"></div>
        
        <div class="detail-section">
            <div class="detail-label">Atomic Mass</div>
            <div class="detail-value" id="detailMass"></div>
        </div>

        <div class="detail-section">
            <div class="detail-label">Category</div>
            <div class="detail-value" id="detailCategory"></div>
        </div>

        <div class="detail-section">
            <div class="detail-label">Electron Configuration</div>
            <div class="detail-value" id="detailConfig"></div>
        </div>

        <div class="detail-section">
            <div class="detail-label">Discovery</div>
            <div class="detail-value" id="detailDiscovery"></div>
        </div>

        <div class="detail-section">
            <div class="detail-label">Fun Fact</div>
            <div class="detail-fact" id="detailFact"></div>
        </div>
    </div>

    <script>
        const elements = [
            { num: 1, symbol: 'H', name: 'Hydrogen', mass: '1.008', category: 'Nonmetal', config: '1s¹', discovery: '1766', fact: 'Most abundant element in the universe.' },
            { num: 2, symbol: 'He', name: 'Helium', mass: '4.003', category: 'Noble Gas', config: '1s²', discovery: '1868', fact: 'Second lightest element; never solidifies under normal pressure.' },
            { num: 3, symbol: 'Li', name: 'Lithium', mass: '6.941', category: 'Alkali Metal', config: '[He]2s¹', discovery: '1817', fact: 'Lightest solid metal; used in batteries and mood stabilizers.' },
            { num: 4, symbol: 'Be', name: 'Beryllium', mass: '9.012', category: 'Alkaline Earth', config: '[He]2s²', discovery: '1798', fact: 'One of the hardest metals; used in X-ray windows.' },
            { num: 5, symbol: 'B', name: 'Boron', mass: '10.811', category: 'Metalloid', config: '[He]2s²2p¹', discovery: '1808', fact: 'Essential micronutrient for plants; used in glass and ceramics.' },
            { num: 6, symbol: 'C', name: 'Carbon', mass: '12.011', category: 'Nonmetal', config: '[He]2s²2p²', discovery: 'Ancient', fact: 'Forms more compounds than any other element; basis of all life.' },
            { num: 7, symbol: 'N', name: 'Nitrogen', mass: '14.007', category: 'Nonmetal', config: '[He]2s²2p³', discovery: '1772', fact: '78% of atmosphere; inert diatomic form crucial to life.' },
            { num: 8, symbol: 'O', name: 'Oxygen', mass: '15.999', category: 'Nonmetal', config: '[He]2s²2p⁴', discovery: '1774', fact: 'Supports combustion; essential for aerobic respiration.' },
            { num: 9, symbol: 'F', name: 'Fluorine', mass: '18.998', category: 'Halogen', config: '[He]2s²2p⁵', discovery: '1810', fact: 'Most electronegative element; extremely reactive.' },
            { num: 10, symbol: 'Ne', name: 'Neon', mass: '20.180', category: 'Noble Gas', config: '[He]2s²2p⁶', discovery: '1898', fact: 'Used in iconic neon signs; glows red when electrified.' },
            { num: 11, symbol: 'Na', name: 'Sodium', mass: '22.990', category: 'Alkali Metal', config: '[Ne]3s¹', discovery: '1807', fact: 'Essential for nerve function; reacts violently with water.' },
            { num: 12, symbol: 'Mg', name: 'Magnesium', mass: '24.305', category: 'Alkaline Earth', config: '[Ne]3s²', discovery: '1808', fact: 'Center of chlorophyll molecule; bright white flame.' },
            { num: 13, symbol: 'Al', name: 'Aluminum', mass: '26.982', category: 'Metal', config: '[Ne]3s²3p¹', discovery: '1825', fact: 'Most abundant metal in Earth\'s crust; highly recyclable.' },
            { num: 14, symbol: 'Si', name: 'Silicon', mass: '28.086', category: 'Metalloid', config: '[Ne]3s²3p²', discovery: '1824', fact: 'Second most abundant element in crust; basis of computer chips.' },
            { num: 15, symbol: 'P', name: 'Phosphorus', mass: '30.974', category: 'Nonmetal', config: '[Ne]3s²3p³', discovery: '1669', fact: 'Glows in dark (phosphorescence); key to life molecules.' },
            { num: 16, symbol: 'S', name: 'Sulfur', mass: '32.065', category: 'Nonmetal', config: '[Ne]3s²3p⁴', discovery: 'Ancient', fact: 'Yellow solid with rotten egg smell when burned.' },
            { num: 17, symbol: 'Cl', name: 'Chlorine', mass: '35.453', category: 'Halogen', config: '[Ne]3s²3p⁵', discovery: '1774', fact: 'Toxic yellow-green gas; used to disinfect water.' },
            { num: 18, symbol: 'Ar', name: 'Argon', mass: '39.948', category: 'Noble Gas', config: '[Ne]3s²3p⁶', discovery: '1894', fact: 'Third most abundant gas in atmosphere; used in welding.' },
            { num: 19, symbol: 'K', name: 'Potassium', mass: '39.098', category: 'Alkali Metal', config: '[Ar]4s¹', discovery: '1807', fact: 'Essential for muscle function; reacts violently with water.' },
            { num: 20, symbol: 'Ca', name: 'Calcium', mass: '40.078', category: 'Alkaline Earth', config: '[Ar]4s²', discovery: '1808', fact: 'Essential for bones and teeth; fifth most abundant element.' },
            { num: 26, symbol: 'Fe', name: 'Iron', mass: '55.845', category: 'Transition Metal', config: '[Ar]3d⁶4s²', discovery: 'Ancient', fact: 'Most used metal; core of Earth\'s outer core.' },
            { num: 29, symbol: 'Cu', name: 'Copper', mass: '63.546', category: 'Transition Metal', config: '[Ar]3d¹⁰4s¹', discovery: 'Ancient', fact: 'Excellent conductor; green patina forms over time.' },
            { num: 30, symbol: 'Zn', name: 'Zinc', mass: '65.390', category: 'Transition Metal', config: '[Ar]3d¹⁰4s²', discovery: '1746', fact: 'Used for galvanizing; essential mineral for immunity.' },
            { num: 47, symbol: 'Ag', name: 'Silver', mass: '107.868', category: 'Transition Metal', config: '[Kr]4d¹⁰5s¹', discovery: 'Ancient', fact: 'Best conductor; prized for jewelry and photography.' },
            { num: 79, symbol: 'Au', name: 'Gold', mass: '196.967', category: 'Transition Metal', config: '[Xe]4f¹⁴5d¹⁰6s¹', discovery: 'Ancient', fact: 'Most precious metal; virtually indestructible.' },
            { num: 92, symbol: 'U', name: 'Uranium', mass: '238.029', category: 'Actinide', config: '[Rn]5f³6d¹7s²', discovery: '1789', fact: 'Heaviest naturally occurring element; radioactive.' },
        ];

        let filteredElements = [...elements];

        function renderTable() {
            const container = document.getElementById('tableContainer');
            container.innerHTML = '';

            if (filteredElements.length === 0) {
                container.innerHTML = '<div class="no-match">No elements found. Try a different search.</div>';
                return;
            }

            filteredElements.forEach((el, idx) => {
                const div = document.createElement('div');
                div.className = 'element';
                div.style.animationDelay = (idx * 20) + 'ms';
                div.innerHTML = `
                    <div class="element-number">${el.num}</div>
                    <div class="element-symbol">${el.symbol}</div>
                    <div class="element-name">${el.name}</div>
                    <div class="element-mass">${el.mass}</div>
                `;
                div.onclick = () => showDetail(el);
                container.appendChild(div);
            });
        }

        function showDetail(el) {
            document.getElementById('detailSymbol').textContent = el.symbol;
            document.getElementById('detailName').textContent = el.name;
            document.getElementById('detailNumber').textContent = `Atomic #${el.num}`;
            document.getElementById('detailMass').textContent = el.mass;
            document.getElementById('detailCategory').textContent = el.category;
            document.getElementById('detailConfig').textContent = el.config;
            document.getElementById('detailDiscovery').textContent = el.discovery;
            document.getElementById('detailFact').textContent = el.fact;
            document.getElementById('detailPanel').classList.add('active');
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('active');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            if (query === '') {
                filteredElements = [...elements];
            } else {
                filteredElements = elements.filter(el =>
                    el.name.toLowerCase().includes(query) ||
                    el.symbol.toLowerCase().includes(query)
                );
            }
            renderTable();
        });

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            filteredElements = [...elements];
            renderTable();
        }

        renderTable();
    </script>
</body>
</html>
