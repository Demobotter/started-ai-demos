<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubjectLab — Cold Email Subject Line Tester</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf9f7;--surface:#fff;--s2:#f2f0ed;--border:#e4e1db;--text:#1a1916;--muted:#8a8680;--accent:#d4500a;--al:rgba(212,80,10,.08);--r:10px;--max:760px}
body{font-family:'Hanken Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased}
header{border-bottom:1px solid var(--border);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:-.03em}
.logo span{color:var(--accent)}
.badge{font-size:.7rem;font-weight:600;color:var(--muted);border:1px solid var(--border);padding:4px 10px;border-radius:20px;letter-spacing:.05em;text-transform:uppercase}
.wrap{max-width:var(--max);margin:0 auto;padding:0 24px}
.hero{padding:56px 0 40px;text-align:center}
.hero h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(1.9rem,5vw,2.9rem);letter-spacing:-.04em;line-height:1.1;margin-bottom:12px}
.hero h1 em{font-style:normal;color:var(--accent)}
.hero p{color:var(--muted);max-width:440px;margin:0 auto}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.field+.field{margin-top:22px}
label{display:block;font-size:.74rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
textarea,input,select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Hanken Grotesk',sans-serif;font-size:.95rem;padding:12px 14px;line-height:1.5;transition:border-color .15s,box-shadow .15s;appearance:none;-webkit-appearance:none}
textarea{min-height:88px;resize:vertical}
textarea:focus,input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(212,80,10,.1)}
textarea::placeholder,input::placeholder{color:#c8c3bb}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:520px){.two{grid-template-columns:1fr}}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.chip{font-family:'Hanken Grotesk',sans-serif;font-size:.74rem;font-weight:600;background:var(--s2);border:1px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:20px;cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--accent);color:var(--accent);background:var(--al)}
.btn{width:100%;margin-top:24px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.95rem;padding:15px;cursor:pointer;transition:background .15s,transform .1s}
.btn:hover{background:#bb4308}
.btn:active{transform:scale(.99)}
.loading{display:none;text-align:center;padding:52px 0}
.loading.on{display:block}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--muted);font-size:.88rem}
#results{display:none}
#results.on{display:block}
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.rh h2{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.05rem;letter-spacing:-.02em}
.rbtn{font-family:'Hanken Grotesk',sans-serif;font-size:.74rem;font-weight:600;background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .15s}
.rbtn:hover{border-color:var(--text);color:var(--text)}
.row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:8px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 2px rgba(0,0,0,.03);transition:border-color .15s}
.row:hover{border-color:#ccc8c0}
.row.top{border-color:var(--accent);background:var(--al)}
.rank{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.85rem;min-width:26px;text-align:center;color:var(--muted)}
.row.top .rank{color:var(--accent)}
.main{flex:1;min-width:0}
.stext{font-size:.95rem;font-weight:500;margin-bottom:5px}
.meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tag{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:20px;background:var(--s2);color:var(--muted);border:1px solid var(--border)}
.win{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--accent)}
.sb{display:flex;align-items:center;gap:8px;min-width:90px}
.bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.fill{height:100%;background:var(--accent);border-radius:2px}
.snum{font-family:'Space Grotesk',sans-serif;font-size:.74rem;font-weight:700;color:var(--muted);min-width:30px;text-align:right}
.row.top .snum{color:var(--accent)}
.cbtn{font-family:'Hanken Grotesk',sans-serif;font-size:.72rem;font-weight:600;background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 11px;border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap}
.cbtn:hover{border-color:var(--accent);color:var(--accent)}
.cbtn.ok{border-color:#22c55e;color:#22c55e}
.insight{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-top:12px}
.insight h3{font-family:'Space Grotesk',sans-serif;font-size:.74rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.insight p{font-size:.88rem;line-height:1.55}
footer{border-top:1px solid var(--border);padding:28px 24px;text-align:center;color:var(--muted);font-size:.74rem;margin-top:56px}
</style>
</head>
<body>
<header>
  <div class="logo">Subject<span>Lab</span></div>
  <div class="badge">Demo</div>
</header>
<div class="wrap">
  <div class="hero">
    <h1>Find the subject line<br>that <em>actually gets opened</em></h1>
    <p>Describe your cold email. Get 8 subject line variations ranked by predicted open-rate.</p>
  </div>

  <div id="inp">
    <div class="card">
      <div class="field">
        <label>What's the email about?</label>
        <div class="chips">
          <button class="chip" onclick="load('saas')">SaaS outreach</button>
          <button class="chip" onclick="load('agency')">Agency pitch</button>
          <button class="chip" onclick="load('partner')">Partnership ask</button>
          <button class="chip" onclick="load('followup')">Follow-up</button>
        </div>
        <textarea id="ctx" placeholder="e.g. Reaching out to Shopify founders about our analytics tool that reduces cart abandonment — users recover $4k/month on average within 60 days..."></textarea>
      </div>
      <div class="two field">
        <div>
          <label>Target audience</label>
          <input id="tgt" type="text" placeholder="e.g. Shopify store owners">
        </div>
        <div>
          <label>Tone</label>
          <select id="tone">
            <option value="direct">Direct &amp; punchy</option>
            <option value="curious">Curiosity-driven</option>
            <option value="personal">Personal &amp; warm</option>
            <option value="data">Data-led</option>
          </select>
        </div>
      </div>
      <button class="btn" onclick="go()">Generate &amp; Rank Subject Lines →</button>
    </div>
  </div>

  <div class="loading" id="load">
    <div class="spinner"></div>
    <p>Generating and scoring variations…</p>
  </div>

  <div id="results">
    <div class="rh">
      <h2>8 Ranked Subject Lines</h2>
      <button class="rbtn" onclick="reset()">← Start over</button>
    </div>
    <div id="list"></div>
    <div class="insight" id="insight"></div>
  </div>
</div>
<footer>SubjectLab · Demo by Started AI · Not a real service</footer>

<script>
const S={
  saas:{ctx:"Reaching out to Shopify founders about our analytics tool — it shows exactly which product pages leak revenue. Average users recover $4k/month within 60 days.",tgt:"Shopify store owners doing $10k–$100k/mo",tone:"data"},
  agency:{ctx:"Pitching our paid ads agency to DTC brands. We do Meta + TikTok, 3.8x average ROAS across 40+ clients. First month is performance-based — no retainer.",tgt:"DTC brand founders",tone:"direct"},
  partner:{ctx:"Asking a B2B podcast host to co-promote our newsletter. We have 22k subscribers, 48% open rate, audience is SaaS founders.",tgt:"B2B podcast hosts",tone:"personal"},
  followup:{ctx:"Following up after no reply to our first cold email about a productivity tool for remote engineering teams. Sent 5 days ago.",tgt:"Engineering managers at remote startups",tone:"curious"}
};
function load(k){const s=S[k];document.getElementById('ctx').value=s.ctx;document.getElementById('tgt').value=s.tgt;document.getElementById('tone').value=s.tone}

function xM(c){const m=c.match(/(\$[\d,k]+|\d+[\d,.]*\s*(?:x|%|k|\/mo)?)/i);return m?m[1]:'key metric'}
function xN(c){const m=c.match(/(\d+)\+/);return m?m[1]+'+':'50+'}
function xT(c){for(const t of['analytics','ads','revenue','churn','bookings','ROAS','performance','conversions','pipeline','email','growth','SEO'])if(c.toLowerCase().includes(t))return t;return'results'}
function xB(c){const m=c.match(/(?:that|which|and)\s+([^,.]{8,45})/i);return m?m[1].trim():'boost results'}
function xTgt(t){if(!t)return'founders';return t.trim().split(/\s+/).slice(-2).join(' ').toLowerCase()}

const L={
  direct:[
    (c,t)=>`${xM(c)} improvement — here's how`,
    (c,t)=>`Quick question for ${xTgt(t)}`,
    (c,t)=>`${xN(c)} ${xTgt(t)} made this switch`,
    (c,t)=>`Stop losing ${xT(c)} revenue`,
    (c,t)=>`${xB(c)} — guaranteed`,
    (c,t)=>`This fixed ${xT(c)} for ${xN(c)} teams`,
    (c,t)=>`${xTgt(t)}: have you tried this?`,
    (c,t)=>`One thing killing your ${xT(c)}`
  ],
  curious:[
    (c,t)=>`Why is your ${xT(c)} still flat?`,
    (c,t)=>`What ${xTgt(t)} don't know about ${xT(c)}`,
    (c,t)=>`The ${xT(c)} fix nobody talks about`,
    (c,t)=>`Are you making this ${xT(c)} mistake?`,
    (c,t)=>`Honest question about ${xB(c).toLowerCase()}`,
    (c,t)=>`I checked your ${xT(c)} — interesting`,
    (c,t)=>`What if ${xT(c)} problems weren't inevitable?`,
    (c,t)=>`This might explain your ${xT(c)} drop`
  ],
  personal:[
    (c,t)=>`Loved what you're building — quick thought`,
    (c,t)=>`A fellow ${xTgt(t)} told me to reach out`,
    (c,t)=>`Saw your post — had to share this`,
    (c,t)=>`Re: your ${xT(c)} challenge`,
    (c,t)=>`${xB(c)} — thought of you`,
    (c,t)=>`Genuinely think this helps ${xTgt(t)}`,
    (c,t)=>`Short intro + something useful for you`,
    (c,t)=>`Fellow ${xTgt(t)} here — quick ask`
  ],
  data:[
    (c,t)=>`${xM(c)} in 60 days — data inside`,
    (c,t)=>`${xN(c)} ${xTgt(t)} saw this result`,
    (c,t)=>`The ${xT(c)} benchmark for ${xTgt(t)} [2026]`,
    (c,t)=>`How ${xTgt(t)} ${xB(c).toLowerCase()} — case study`,
    (c,t)=>`${xM(c)}: where do you rank?`,
    (c,t)=>`We analyzed 100 ${xTgt(t)} — here's what works`,
    (c,t)=>`Your ${xT(c)} vs industry average`,
    (c,t)=>`${xN(c)}x ${xT(c)} ROI — reproducible?`
  ]
};
const BS={
  direct:[82,88,71,79,74,85,77,80],
  curious:[86,79,91,83,74,80,77,88],
  personal:[80,73,88,82,70,85,78,76],
  data:[87,80,75,83,89,91,77,84]
};
const TAGS={
  direct:['Metric','Question','Social proof','Pain point','Value prop','Case study','Hook','Insight'],
  curious:['Diagnostic','Insight','Contrarian','Question','Honest','Research','Reframe','Pattern'],
  personal:['Warm open','Referral','Timely','Empathy','Relevant','Genuine','Brief','Peer'],
  data:['Metric','Proof','Benchmark','Case study','Comparison','Research','Data gap','ROI']
};
const INS={
  'Metric':'leading with a specific number creates instant credibility and sets a concrete expectation',
  'Question':'direct questions create an open loop the reader feels compelled to close',
  'Social proof':'peer validation reduces skepticism before the email even opens',
  'Pain point':'naming a specific pain signals you understand their situation better than generic outreach',
  'Contrarian':'challenging a common assumption signals unique insight worth reading',
  'Diagnostic':'implying you already know something about their situation is immediately compelling',
  'Case study':'real results outperform vague claims — specificity builds credibility fast',
  'Benchmark':'comparing to industry standards creates an information gap people want to close',
  'Warm open':'a non-transactional opener lowers defenses immediately',
  'Research':'data-backed claims are harder to dismiss and signal genuine effort'
};

function go(){
  const ctx=document.getElementById('ctx').value.trim();
  if(!ctx){document.getElementById('ctx').focus();return}
  const tgt=document.getElementById('tgt').value.trim()||'founders';
  const tone=document.getElementById('tone').value;
  document.getElementById('inp').style.display='none';
  document.getElementById('load').classList.add('on');
  document.getElementById('results').classList.remove('on');
  setTimeout(()=>{
    const items=L[tone].map((fn,i)=>({
      text:fn(ctx,tgt),
      tag:TAGS[tone][i],
      score:Math.min(99,BS[tone][i]+Math.round((Math.random()-.5)*6))
    }));
    items.sort((a,b)=>b.score-a.score);
    document.getElementById('list').innerHTML=items.map((it,i)=>`
      <div class="row ${i===0?'top':''}">
        <div class="rank">${i===0?'★':'#'+(i+1)}</div>
        <div class="main">
          <div class="stext">${esc(it.text)}</div>
          <div class="meta"><span class="tag">${it.tag}</span>${i===0?'<span class="win">Top pick</span>':''}</div>
        </div>
        <div class="sb"><div class="bar"><div class="fill" style="width:${it.score}%"></div></div><div class="snum">${it.score}%</div></div>
        <button class="cbtn" onclick="cp(this,${JSON.stringify(it.text)})">Copy</button>
      </div>`).join('');
    const top=items[0];
    const ins=INS[top.tag]||'this framing pattern consistently outperforms generic openers for cold outreach';
    document.getElementById('insight').innerHTML=`<h3>Why #1 scores highest</h3><p>The top line uses a <strong>${top.tag.toLowerCase()}</strong> approach — ${ins}. For <em>${tgt}</em>, this tends to outperform generic openers by triggering pattern interruption before the preview text is even read.</p>`;
    document.getElementById('load').classList.remove('on');
    document.getElementById('results').classList.add('on');
  },1200);
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function cp(btn,text){navigator.clipboard.writeText(text).then(()=>{btn.textContent='Copied ✓';btn.classList.add('ok');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('ok')},2000)})}
function reset(){document.getElementById('results').classList.remove('on');document.getElementById('inp').style.display='block';document.getElementById('ctx').value='';document.getElementById('tgt').value=''}
</script>
</body>
</html>
