<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nations at a Glance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Geist', sans-serif; }
    
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 50%, #0d1828 100%);
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 40px;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
      overflow: hidden;
    }

    .hero {
      margin-bottom: 32px;
      animation: slideDown 0.8s cubic-bezier(0.16,1,0.3,1);
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 400;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, #14b8a6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .hero p {
      font-size: 16px;
      color: #a0aec0;
      max-width: 600px;
    }

    .workspace {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      overflow: hidden;
      @media (max-width: 900px) {
        grid-template-columns: 1fr;
      }
    }

    .plot-area {
      background: rgba(26, 31, 58, 0.5);
      border: 1px solid rgba(20, 184, 166, 0.2);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(8px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: inset 0 0 40px rgba(6, 182, 212, 0.05);
    }

    svg {
      flex: 1;
      min-height: 300px;
      animation: fadeIn 0.6s ease-out 0.3s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 24px;
      @media (max-width: 768px) {
        grid-template-columns: 1fr;
      }
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: slideUp 0.6s ease-out 0.2s both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .control-group label {
      font-size: 13px;
      font-weight: 500;
      color: #cbd5e1;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .range-input {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(20, 184, 166, 0.2);
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #14b8a6, #06b6d4);
      cursor: pointer;
      box-shadow: 0 0 12px rgba(6, 182, 212, 0.5);
      transition: box-shadow 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.8);
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #14b8a6, #06b6d4);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 12px rgba(6, 182, 212, 0.5);
      transition: box-shadow 0.2s;
    }

    .value-display {
      font-size: 13px;
      color: #06b6d4;
      font-weight: 500;
      min-width: 60px;
      text-align: right;
    }

    .tooltip {
      position: fixed;
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      pointer-events: none;
      border: 1px solid rgba(20, 184, 166, 0.3);
      z-index: 1000;
      white-space: nowrap;
      animation: tooltipPop 0.2s ease-out;
    }

    @keyframes tooltipPop {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .stat-summary {
      margin-top: 24px;
      padding: 16px;
      background: rgba(6, 182, 212, 0.05);
      border: 1px solid rgba(6, 182, 212, 0.1);
      border-radius: 12px;
      font-size: 13px;
      color: #a0aec0;
      animation: slideUp 0.6s ease-out 0.4s both;
    }

    .stat-summary strong {
      color: #06b6d4;
    }

    @media (max-width: 768px) {
      .container {
        padding: 24px 16px;
      }

      .hero h1 {
        font-size: 32px;
      }

      .controls {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Nations at a Glance</h1>
      <p>Explore global wealth and life expectancy. Drag the sliders to filter by GDP and lifespan.</p>
    </div>

    <div class="workspace">
      <div class="plot-area">
        <svg id="scatter" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet" style="min-height: 400px;"></svg>
        <div class="controls">
          <div class="control-group">
            <label>GDP per Capita Range</label>
            <div class="range-input">
              <input type="range" id="gdpMin" min="0" max="200000" value="0" step="1000">
              <span class="value-display" id="gdpMinVal">$0</span>
            </div>
            <div class="range-input">
              <input type="range" id="gdpMax" min="0" max="200000" value="200000" step="1000">
              <span class="value-display" id="gdpMaxVal">$200k</span>
            </div>
          </div>
          <div class="control-group">
            <label>Life Expectancy Range</label>
            <div class="range-input">
              <input type="range" id="lifeMin" min="40" max="90" value="40" step="1">
              <span class="value-display" id="lifeMinVal">40 yrs</span>
            </div>
            <div class="range-input">
              <input type="range" id="lifeMax" min="40" max="90" value="90" step="1">
              <span class="value-display" id="lifeMaxVal">90 yrs</span>
            </div>
          </div>
        </div>
        <div class="stat-summary" id="statSummary"></div>
      </div>
    </div>
  </div>

  <div id="tooltip" class="tooltip" style="display: none;"></div>

  <script>
    // Static World Bank snapshot (2023)
    const countries = [
      { name: "Luxembourg", gdp: 145000, life: 82.6, pop: 0.67, continent: "Europe" },
      { name: "Switzerland", gdp: 140000, life: 84.0, pop: 8.75, continent: "Europe" },
      { name: "Norway", gdp: 120000, life: 83.5, pop: 5.4, continent: "Europe" },
      { name: "United States", gdp: 85000, life: 78.8, pop: 340, continent: "Americas" },
      { name: "Australia", gdp: 70000, life: 83.1, pop: 26.5, continent: "Oceania" },
      { name: "Canada", gdp: 65000, life: 82.3, pop: 39, continent: "Americas" },
      { name: "Germany", gdp: 62000, life: 82.3, pop: 84, continent: "Europe" },
      { name: "United Kingdom", gdp: 60000, life: 81.4, pop: 68, continent: "Europe" },
      { name: "France", gdp: 58000, life: 82.7, pop: 68, continent: "Europe" },
      { name: "Japan", gdp: 55000, life: 84.5, pop: 125, continent: "Asia" },
      { name: "South Korea", gdp: 48000, life: 82.8, pop: 52, continent: "Asia" },
      { name: "Spain", gdp: 45000, life: 83.5, pop: 48, continent: "Europe" },
      { name: "Italy", gdp: 43000, life: 84.1, pop: 57, continent: "Europe" },
      { name: "Czech Republic", gdp: 32000, life: 79.5, pop: 10.5, continent: "Europe" },
      { name: "Poland", gdp: 20000, life: 77.9, pop: 37, continent: "Europe" },
      { name: "Mexico", gdp: 12000, life: 75.1, pop: 130, continent: "Americas" },
      { name: "Brazil", gdp: 11000, life: 76.3, pop: 217, continent: "Americas" },
      { name: "China", gdp: 13000, life: 77.8, pop: 1400, continent: "Asia" },
      { name: "India", gdp: 2800, life: 71.5, pop: 1417, continent: "Asia" },
      { name: "Nigeria", gdp: 2200, life: 54.3, pop: 223, continent: "Africa" },
      { name: "Kenya", gdp: 2400, life: 66.8, pop: 54, continent: "Africa" },
      { name: "South Africa", gdp: 7000, life: 65.5, pop: 60, continent: "Africa" },
      { name: "Bangladesh", gdp: 2700, life: 72.4, pop: 173, continent: "Asia" },
      { name: "Vietnam", gdp: 4000, life: 73.2, pop: 98, continent: "Asia" },
      { name: "Indonesia", gdp: 5500, life: 72.1, pop: 277, continent: "Asia" },
      { name: "Thailand", gdp: 8000, life: 76.7, pop: 71, continent: "Asia" },
      { name: "Turkey", gdp: 13000, life: 78.1, pop: 86, continent: "Asia" },
      { name: "Saudi Arabia", gdp: 32000, life: 75.7, pop: 36, continent: "Asia" },
      { name: "UAE", gdp: 65000, life: 78.9, pop: 9.9, continent: "Asia" },
      { name: "Israel", gdp: 52000, life: 82.9, pop: 9.5, continent: "Asia" },
      { name: "New Zealand", gdp: 52000, life: 82.0, pop: 5.2, continent: "Oceania" },
      { name: "Singapore", gdp: 72000, life: 83.8, pop: 5.9, continent: "Asia" },
    ];

    const continentColors = {
      "Europe": "#06b6d4",
      "Asia": "#f59e0b",
      "Americas": "#ec4899",
      "Africa": "#8b5cf6",
      "Oceania": "#10b981"
    };

    // Utility functions
    function normalizeGDP(gdp, minGDP, maxGDP) {
      return (gdp - minGDP) / (maxGDP - minGDP);
    }

    function normalizeLife(life, minLife, maxLife) {
      return (life - minLife) / (maxLife - minLife);
    }

    function bubbleRadius(pop) {
      return Math.sqrt(pop * 10) * 0.8;
    }

    function formatGDP(val) {
      return val >= 1000 ? `$${(val / 1000).toFixed(0)}k` : `$${val}`;
    }

    // SVG rendering
    function renderScatter(minGDP, maxGDP, minLife, maxLife) {
      const svg = document.getElementById("scatter");
      svg.innerHTML = "";

      // Add gradient defs
      const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
      const feTurbulence = document.createElementNS("http://www.w3.org/2000/svg", "feTurbulence");
      feTurbulence.setAttribute("type", "fractalNoise");
      feTurbulence.setAttribute("baseFrequency", "0.02");
      feTurbulence.setAttribute("numOctaves", "4");
      feTurbulence.setAttribute("result", "noise");
      defs.appendChild(feTurbulence);
      svg.appendChild(defs);

      // Add grid lines
      for (let i = 0; i <= 10; i++) {
        const vLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
        vLine.setAttribute("x1", (i * 100).toString());
        vLine.setAttribute("y1", "0");
        vLine.setAttribute("x2", (i * 100).toString());
        vLine.setAttribute("y2", "600");
        vLine.setAttribute("stroke", "rgba(20,184,166,0.1)");
        vLine.setAttribute("stroke-width", "1");
        svg.appendChild(vLine);

        const hLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
        hLine.setAttribute("x1", "0");
        hLine.setAttribute("y1", (i * 60).toString());
        hLine.setAttribute("x2", "1000");
        hLine.setAttribute("y2", (i * 60).toString());
        hLine.setAttribute("stroke", "rgba(20,184,166,0.1)");
        hLine.setAttribute("stroke-width", "1");
        svg.appendChild(hLine);
      }

      // Axis labels
      const axisStyle = 'font-family: "Geist", sans-serif; font-size: 12px; fill: #94a3b8;';

      // X-axis label
      const xLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
      xLabel.setAttribute("x", "500");
      xLabel.setAttribute("y", "590");
      xLabel.setAttribute("text-anchor", "middle");
      xLabel.setAttribute("style", axisStyle);
      xLabel.textContent = "GDP per Capita ($)";
      svg.appendChild(xLabel);

      // Y-axis label
      const yLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
      yLabel.setAttribute("x", "-300");
      yLabel.setAttribute("y", "15");
      yLabel.setAttribute("text-anchor", "middle");
      yLabel.setAttribute("transform", "rotate(-90)");
      yLabel.setAttribute("style", axisStyle);
      yLabel.textContent = "Life Expectancy (years)";
      svg.appendChild(yLabel);

      // Filter and sort countries
      let filtered = countries.filter(c => c.gdp >= minGDP && c.gdp <= maxGDP && c.life >= minLife && c.life <= maxLife);

      // Find min/max for normalization
      const minGDPAll = Math.min(...countries.map(c => c.gdp));
      const maxGDPAll = Math.max(...countries.map(c => c.gdp));
      const minLifeAll = Math.min(...countries.map(c => c.life));
      const maxLifeAll = Math.max(...countries.map(c => c.life));

      // Render bubbles
      filtered.forEach(c => {
        const x = (normalizeGDP(c.gdp, minGDPAll, maxGDPAll) * 950) + 25;
        const y = 575 - (normalizeLife(c.life, minLifeAll, maxLifeAll) * 550);
        const r = bubbleRadius(c.pop);
        const color = continentColors[c.continent];

        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", x.toString());
        circle.setAttribute("cy", y.toString());
        circle.setAttribute("r", r.toString());
        circle.setAttribute("fill", color);
        circle.setAttribute("fill-opacity", "0.7");
        circle.setAttribute("stroke", "rgba(255,255,255,0.2)");
        circle.setAttribute("stroke-width", "1.5");
        circle.style.cursor = "pointer";
        circle.style.transition = "fill-opacity 0.2s, stroke-width 0.2s";

        circle.addEventListener("mouseenter", (e) => showTooltip(e, c));
        circle.addEventListener("mouseleave", hideTooltip);
        circle.addEventListener("mousemove", (e) => showTooltip(e, c));

        circle.addEventListener("mouseenter", () => {
          circle.setAttribute("fill-opacity", "1");
          circle.setAttribute("stroke-width", "3");
        });

        circle.addEventListener("mouseleave", () => {
          circle.setAttribute("fill-opacity", "0.7");
          circle.setAttribute("stroke-width", "1.5");
        });

        svg.appendChild(circle);

        // Label for large bubbles
        if (c.pop > 100) {
          const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
          text.setAttribute("x", x.toString());
          text.setAttribute("y", (y + 4).toString());
          text.setAttribute("text-anchor", "middle");
          text.setAttribute("font-size", "11");
          text.setAttribute("fill", "#fff");
          text.setAttribute("font-weight", "500");
          text.setAttribute("pointer-events", "none");
          text.textContent = c.name.split(" ")[0];
          svg.appendChild(text);
        }
      });

      updateStats(filtered.length, countries.length);
    }

    function showTooltip(e, country) {
      const tooltip = document.getElementById("tooltip");
      tooltip.textContent = `${country.name} • $${(country.gdp / 1000).toFixed(1)}k GDP • ${country.life.toFixed(1)} yrs`;
      tooltip.style.display = "block";
      tooltip.style.left = (e.clientX + 12) + "px";
      tooltip.style.top = (e.clientY - 8) + "px";
    }

    function hideTooltip() {
      document.getElementById("tooltip").style.display = "none";
    }

    function updateStats(shown, total) {
      const summary = document.getElementById("statSummary");
      summary.innerHTML = `<strong>${shown} of ${total}</strong> countries matching your filters • Bubble size = population`;
    }

    // Event listeners
    document.getElementById("gdpMin").addEventListener("input", (e) => {
      const val = parseInt(e.target.value);
      document.getElementById("gdpMinVal").textContent = formatGDP(val);
      const max = parseInt(document.getElementById("gdpMax").value);
      if (val > max) document.getElementById("gdpMax").value = val;
      render();
    });

    document.getElementById("gdpMax").addEventListener("input", (e) => {
      const val = parseInt(e.target.value);
      document.getElementById("gdpMaxVal").textContent = formatGDP(val);
      const min = parseInt(document.getElementById("gdpMin").value);
      if (val < min) document.getElementById("gdpMin").value = val;
      render();
    });

    document.getElementById("lifeMin").addEventListener("input", (e) => {
      const val = parseInt(e.target.value);
      document.getElementById("lifeMinVal").textContent = val + " yrs";
      const max = parseInt(document.getElementById("lifeMax").value);
      if (val > max) document.getElementById("lifeMax").value = val;
      render();
    });

    document.getElementById("lifeMax").addEventListener("input", (e) => {
      const val = parseInt(e.target.value);
      document.getElementById("lifeMaxVal").textContent = val + " yrs";
      const min = parseInt(document.getElementById("lifeMin").value);
      if (val < min) document.getElementById("lifeMin").value = val;
      render();
    });

    function render() {
      const minGDP = parseInt(document.getElementById("gdpMin").value);
      const maxGDP = parseInt(document.getElementById("gdpMax").value);
      const minLife = parseInt(document.getElementById("lifeMin").value);
      const maxLife = parseInt(document.getElementById("lifeMax").value);
      renderScatter(minGDP, maxGDP, minLife, maxLife);
    }

    // Initial render
    render();
  </script>
</body>
</html>
