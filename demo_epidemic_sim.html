<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epidemic Simulator — Watch Viral Spread</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Syne', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1535 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }
        
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(20, 10, 40, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #ff0099;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(255, 0, 153, 0.3);
        }
        
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff0099, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .tagline {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
            font-size: 1rem;
        }
        
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }
        
        .grid-container {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #00ffcc;
            border-radius: 10px;
            padding: 15px;
        }
        
        canvas {
            width: 100%;
            height: auto;
            border-radius: 8px;
            background: #000;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .control-group {
            background: rgba(255, 0, 153, 0.05);
            border: 1px solid rgba(255, 0, 153, 0.3);
            border-radius: 10px;
            padding: 15px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #00ffcc;
        }
        
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(90deg, #ff0099, #00ffcc);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00ffcc;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.8);
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00ffcc;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.8);
        }
        
        .value-display {
            display: inline-block;
            background: rgba(0, 255, 204, 0.1);
            color: #00ffcc;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
            font-size: 0.85rem;
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        
        .stat {
            background: rgba(0, 0, 0, 0.2);
            border-left: 3px solid #00ffcc;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9rem;
        }
        
        .stat-label {
            color: #aaa;
            font-size: 0.8rem;
        }
        
        .stat-value {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 700;
            font-size: 1.2rem;
        }
        
        .stat.healthy .stat-value { color: #4caf50; }
        .stat.infected .stat-value { color: #ff6b6b; }
        .stat.recovered .stat-value { color: #00bcd4; }
        
        .button-group {
            display: flex;
            gap: 10px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #ff0099, #ff6b9d);
            color: white;
        }
        
        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(255, 0, 153, 0.6);
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: rgba(0, 255, 204, 0.1);
            color: #00ffcc;
            border: 1px solid #00ffcc;
        }
        
        .btn-secondary:hover {
            background: rgba(0, 255, 204, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }
        
        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦠 Epidemic Simulator</h1>
        <p class="tagline">Watch how disease spreads through a population. Adjust parameters & see it unfold.</p>
        
        <div class="content">
            <div class="grid-container">
                <canvas id="simulationCanvas" width="400" height="400"></canvas>
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <label>Infection Rate: <span class="value-display" id="infectionDisplay">0.05</span></label>
                    <input type="range" id="infectionRate" min="0.01" max="0.2" step="0.01" value="0.05">
                    <small style="color: #888; margin-top: 5px; display: block;">Chance a healthy person gets infected per frame</small>
                </div>
                
                <div class="control-group">
                    <label>Recovery Time: <span class="value-display" id="recoveryDisplay">100</span> frames</label>
                    <input type="range" id="recoveryTime" min="20" max="300" step="10" value="100">
                    <small style="color: #888; margin-top: 5px; display: block;">How long infected people stay sick</small>
                </div>
                
                <div class="control-group">
                    <label>Movement Speed: <span class="value-display" id="speedDisplay">1.0</span></label>
                    <input type="range" id="movementSpeed" min="0.5" max="3" step="0.1" value="1.0">
                    <small style="color: #888; margin-top: 5px; display: block;">How fast people move around</small>
                </div>
                
                <div class="stats">
                    <div class="stat healthy">
                        <div class="stat-label">Healthy</div>
                        <div class="stat-value" id="healthyCount">250</div>
                    </div>
                    <div class="stat infected">
                        <div class="stat-label">Infected</div>
                        <div class="stat-value" id="infectedCount">0</div>
                    </div>
                    <div class="stat recovered">
                        <div class="stat-label">Recovered</div>
                        <div class="stat-value" id="recoveredCount">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Frame</div>
                        <div class="stat-value" id="frameCount">0</div>
                    </div>
                </div>
                
                <div class="button-group">
                    <button class="btn-primary" onclick="resetSimulation()">Reset</button>
                    <button class="btn-secondary" onclick="togglePause()" id="pauseBtn">Pause</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('simulationCanvas');
        const ctx = canvas.getContext('2d');
        const cellSize = 10;
        const gridWidth = Math.floor(canvas.width / cellSize);
        const gridHeight = Math.floor(canvas.height / cellSize);
        const totalCells = gridWidth * gridHeight;
        
        let persons = [];
        let frameCount = 0;
        let isPaused = false;
        
        const State = {
            HEALTHY: 0,
            INFECTED: 1,
            RECOVERED: 2
        };
        
        class Person {
            constructor(x, y) {
                this.x = x + Math.random() * (cellSize - 1);
                this.y = y + Math.random() * (cellSize - 1);
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.state = State.HEALTHY;
                this.infectionAge = 0;
            }
            
            update() {
                const speed = parseFloat(document.getElementById('movementSpeed').value);
                this.x += this.vx * speed;
                this.y += this.vy * speed;
                
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                
                this.x = Math.max(0, Math.min(canvas.width, this.x));
                this.y = Math.max(0, Math.min(canvas.height, this.y));
                
                if (this.state === State.INFECTED) {
                    this.infectionAge++;
                    const recoveryTime = parseInt(document.getElementById('recoveryTime').value);
                    if (this.infectionAge > recoveryTime) {
                        this.state = State.RECOVERED;
                    }
                }
            }
            
            draw() {
                let color = '#4caf50';
                if (this.state === State.INFECTED) {
                    color = '#ff6b6b';
                } else if (this.state === State.RECOVERED) {
                    color = '#00bcd4';
                }
                
                ctx.fillStyle = color;
                ctx.fillRect(Math.floor(this.x / cellSize) * cellSize, Math.floor(this.y / cellSize) * cellSize, cellSize - 1, cellSize - 1);
            }
            
            infect() {
                if (this.state === State.HEALTHY) {
                    this.state = State.INFECTED;
                    this.infectionAge = 0;
                }
            }
        }
        
        function initSimulation() {
            persons = [];
            for (let i = 0; i < 250; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                persons.push(new Person(x, y));
            }
            persons[0].infect();
            frameCount = 0;
        }
        
        function updateStats() {
            const healthy = persons.filter(p => p.state === State.HEALTHY).length;
            const infected = persons.filter(p => p.state === State.INFECTED).length;
            const recovered = persons.filter(p => p.state === State.RECOVERED).length;
            
            document.getElementById('healthyCount').textContent = healthy;
            document.getElementById('infectedCount').textContent = infected;
            document.getElementById('recoveredCount').textContent = recovered;
            document.getElementById('frameCount').textContent = frameCount;
        }
        
        function simulate() {
            if (!isPaused) {
                for (let person of persons) {
                    person.update();
                }
                
                const infectionRate = parseFloat(document.getElementById('infectionRate').value);
                for (let i = 0; i < persons.length; i++) {
                    if (persons[i].state === State.INFECTED) {
                        for (let j = 0; j < persons.length; j++) {
                            if (i !== j && persons[j].state === State.HEALTHY) {
                                const dx = persons[i].x - persons[j].x;
                                const dy = persons[i].y - persons[j].y;
                                const distance = Math.sqrt(dx * dx + dy * dy);
                                if (distance < 30 && Math.random() < infectionRate) {
                                    persons[j].infect();
                                }
                            }
                        }
                    }
                }
                
                frameCount++;
            }
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let person of persons) {
                person.draw();
            }
            
            updateStats();
            requestAnimationFrame(simulate);
        }
        
        function resetSimulation() {
            isPaused = false;
            document.getElementById('pauseBtn').textContent = 'Pause';
            initSimulation();
        }
        
        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? 'Resume' : 'Pause';
        }
        
        document.getElementById('infectionRate').addEventListener('input', (e) => {
            document.getElementById('infectionDisplay').textContent = e.target.value;
        });
        
        document.getElementById('recoveryTime').addEventListener('input', (e) => {
            document.getElementById('recoveryDisplay').textContent = e.target.value;
        });
        
        document.getElementById('movementSpeed').addEventListener('input', (e) => {
            document.getElementById('speedDisplay').textContent = e.target.value;
        });
        
        initSimulation();
        simulate();
    </script>
</body>
</html>
