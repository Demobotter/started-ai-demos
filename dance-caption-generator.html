<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caption Pack for Dance Creators</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D0D0F;--card:#16161A;--border:#2A2A30;--text:#F0EEF8;--muted:#7A7880;--accent:#9B5CF6;--accent-light:rgba(155,92,246,.12);--accent2:#E040FB;--radius:12px;--rsm:8px}
body{font-family:'Hanken Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:10px}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:17px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badge{font-size:11px;background:var(--accent-light);color:var(--accent);padding:3px 10px;border-radius:20px;font-weight:600;border:1px solid rgba(155,92,246,.25)}
main{flex:1;max-width:720px;margin:0 auto;width:100%;padding:40px 20px 60px}
.hero{text-align:center;margin-bottom:36px}
.hero h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(26px,5vw,36px);font-weight:700;line-height:1.15;letter-spacing:-.5px;margin-bottom:10px}
.hero h1 span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--muted);font-size:15px;max-width:480px;margin:0 auto;line-height:1.6}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:26px;margin-bottom:18px}
.card h2{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;margin-bottom:18px;color:var(--text)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:6px}
.fg.full{grid-column:1/-1}
label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
input,select,textarea{font-family:'Hanken Grotesk',sans-serif;font-size:14px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--rsm);background:#1E1E24;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(155,92,246,.15)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
select option{background:#1E1E24}
.vibe-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.vibe-opt input[type=radio]{display:none}
.vibe-lbl{display:block;text-align:center;padding:10px 6px;border:1.5px solid var(--border);border-radius:var(--rsm);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;background:#1E1E24}
.vibe-opt input:checked+.vibe-lbl{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.vibe-lbl:hover{border-color:var(--accent);color:var(--accent)}
.platform-grid{display:flex;gap:8px;flex-wrap:wrap}
.plat-opt input[type=checkbox]{display:none}
.plat-lbl{display:block;padding:7px 14px;border:1.5px solid var(--border);border-radius:20px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;background:#1E1E24}
.plat-opt input:checked+.plat-lbl{border-color:var(--accent2);background:rgba(224,64,251,.1);color:var(--accent2)}
.btn{width:100%;padding:14px;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:var(--rsm);font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;margin-top:4px}
.btn:hover{opacity:.9}.btn:active{transform:scale(.99)}.btn:disabled{opacity:.4;cursor:not-allowed}
.results{display:none}.results.visible{display:block}
.section-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:14px}
.caption-card{background:#1E1E24;border:1px solid var(--border);border-radius:var(--rsm);padding:18px;margin-bottom:12px;position:relative}
.cap-platform{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin-bottom:4px}
.cap-style{font-size:11px;color:var(--muted);margin-bottom:10px}
.cap-text{font-size:14px;line-height:1.7;color:var(--text);white-space:pre-wrap;word-break:break-word}
.cap-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.char-badge{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--card);border:1px solid var(--border);color:var(--muted)}
.copy-btn{padding:5px 14px;font-size:12px;font-weight:600;background:var(--card);border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--muted);font-family:'Hanken Grotesk',sans-serif;transition:all .15s}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}.copy-btn.copied{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:15px;display:none}.loading.visible{display:block}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
footer{text-align:center;padding:20px;font-size:12px;color:var(--muted);border-top:1px solid var(--border)}
@media(max-width:560px){.form-grid{grid-template-columns:1fr}.vibe-grid{grid-template-columns:repeat(2,1fr)}.card{padding:18px}}
</style>
</head>
<body>
<header>
  <span class="logo">DanceCaptions</span>
  <span class="badge">Caption Generator</span>
</header>
<main>
  <div class="hero">
    <h1>Caption Pack for<br><span>Dance Creators</span></h1>
    <p>Describe your dance video — get 6 ready-to-post captions with hooks, hashtags, and platform-specific formatting.</p>
  </div>
  <div class="card">
    <h2>Tell us about your video</h2>
    <div class="form-grid">
      <div class="fg">
        <label>Dance Style</label>
        <select id="style">
          <option>Hip-Hop</option>
          <option>Contemporary</option>
          <option>Ballet</option>
          <option selected>Street / Urban</option>
          <option>Salsa / Latin</option>
          <option>Breakdancing</option>
          <option>Tap</option>
          <option>Freestyle</option>
          <option>K-Pop / Cover</option>
          <option>Other</option>
        </select>
      </div>
      <div class="fg">
        <label>Video Type</label>
        <select id="vtype">
          <option selected>Original choreography</option>
          <option>Trending audio / challenge</option>
          <option>Tutorial / breakdown</option>
          <option>Performance footage</option>
          <option>Practice / behind the scenes</option>
          <option>Collab with another creator</option>
        </select>
      </div>
      <div class="fg full">
        <label>Song / Audio (optional)</label>
        <input type="text" id="song" placeholder="e.g. 'Die With A Smile' — Lady Gaga & Bruno Mars" value="HUMBLE. — Kendrick Lamar">
      </div>
      <div class="fg full">
        <label>Describe your video in a sentence</label>
        <textarea id="desc" placeholder="e.g. Solo freestyle in the park, golden hour, slow-mo at the end">Crew routine in the subway, 4 people, ends with a freeze at the last beat drop</textarea>
      </div>
      <div class="fg full">
        <label>Vibe / Tone</label>
        <div class="vibe-grid">
          <label class="vibe-opt"><input type="radio" name="vibe" value="hype" checked><span class="vibe-lbl">🔥 Hype</span></label>
          <label class="vibe-opt"><input type="radio" name="vibe" value="raw"><span class="vibe-lbl">💪 Raw & Real</span></label>
          <label class="vibe-opt"><input type="radio" name="vibe" value="artsy"><span class="vibe-lbl">🎨 Artsy</span></label>
          <label class="vibe-opt"><input type="radio" name="vibe" value="funny"><span class="vibe-lbl">😂 Funny</span></label>
          <label class="vibe-opt"><input type="radio" name="vibe" value="inspirational"><span class="vibe-lbl">✨ Inspirational</span></label>
          <label class="vibe-opt"><input type="radio" name="vibe" value="minimal"><span class="vibe-lbl">🤍 Minimal</span></label>
        </div>
      </div>
      <div class="fg full">
        <label>Platforms</label>
        <div class="platform-grid">
          <label class="plat-opt"><input type="checkbox" value="TikTok" checked><span class="plat-lbl">TikTok</span></label>
          <label class="plat-opt"><input type="checkbox" value="Instagram Reels" checked><span class="plat-lbl">Instagram Reels</span></label>
          <label class="plat-opt"><input type="checkbox" value="YouTube Shorts"><span class="plat-lbl">YouTube Shorts</span></label>
          <label class="plat-opt"><input type="checkbox" value="Twitter/X"><span class="plat-lbl">Twitter/X</span></label>
        </div>
      </div>
    </div>
    <button class="btn" id="genBtn" onclick="generate()">💃 Generate My Captions</button>
  </div>
  <div class="loading" id="loading"><div class="spinner"></div>Crafting your caption pack…</div>
  <div class="results" id="results">
    <div class="card">
      <div class="section-lbl">Your Caption Pack</div>
      <div id="captions-out"></div>
      <button class="btn" onclick="generate()" style="background:#1E1E24;color:var(--accent);border:1.5px solid var(--accent);margin-top:4px">↺ Regenerate</button>
    </div>
  </div>
</main>
<footer>Demo — DanceCaptions · started.ai</footer>
<script>
const C = {
  hype:{
    TikTok:[
      (d)=>`WE WENT CRAZY 🔥🔥🔥\n\n${d.desc}. Can't stop watching this one.\n\n${d.song?`🎵 ${d.song}\n\n`:''}`+`#${d.style.replace(/\//g,'').replace(/ /g,'')}dance #dancevideo #foryou #viral #crew`,
      (d)=>`NOT US GOING OFF LIKE THIS 😤💥\n\n${d.style} x ${d.vtype} and it hit different.\n\n${d.song?`🎵 ${d.song}\n\n`:''}`+`#dancetok #${d.style.toLowerCase().replace(/\//g,'').replace(/ /g,'')} #fyp #trend`
    ],
    'Instagram Reels':[
      (d)=>`The freeze at the end tho 🥶⚡\n\n${d.desc}.\n\n${d.song?`🎵 ${d.song}`:''}`,
      (d)=>`Squad mode: ON 🖤\n\n${d.desc}. This one's for the culture.\n\n${d.song?`🎵 ${d.song}\n\n`:''}#dance #reels #${d.style.toLowerCase().replace(/\//g,'').replace(/ /g,'')} #dancecrew`
    ],
    'YouTube Shorts':[
      (d)=>`${d.desc} — and it ended PERFECTLY 🔥\n\n${d.song?`Song: ${d.song}`:'#dance #shorts #${d.style}'}`
    ],
    'Twitter/X':[
      (d)=>`we locked in and this happened 🔥\n\n${d.song?`(${d.song})`:''}`,
    ]
  },
  raw:{
    TikTok:[
      (d)=>`no studio. no budget. just us.\n\n${d.desc}.\n\n${d.song?`🎵 ${d.song}\n\n`:''}`+`#reallife #dancevideo #${d.style.toLowerCase().replace(/\//g,'').replace(/ /g,'')} #fyp`,
      (d)=>`this is what practice looks like 💪\n\n${d.vtype} — unfiltered, unedited energy.\n${d.song?`🎵 ${d.song}\n\n`:''}`+`#dancetok #grind #process #${d.style.toLowerCase().replace(/\//g,'').replace(/ /g,'')}`
    ],
    'Instagram Reels':[
      (d)=>`Raw. Real. Us.\n\n${d.desc}.\n${d.song?`🎵 ${d.song}`:''}`,
    ],
    'YouTube Shorts':[(d)=>`${d.desc} — just pure movement. No edits.\n${d.song?`Song: ${d.song}`:''}`],
    'Twitter/X':[(d)=>`we just showed up and danced. that's it.\n${d.song?`(${d.song})`:''}`,]
  },
  artsy:{
    TikTok:[
      (d)=>`movement as language 🎨\n\n${d.desc}.\n\n${d.song?`🎵 ${d.song}\n\n`:''}`+`#danceart #${d.style.toLowerCase().replace(/\//g,'').replace(/ /g,'')} #artistsoftiktok #movement`,
    ],
    'Instagram Reels':[(d)=>`When the body says what words can't.\n\n${d.desc}.\n${d.song?`🎵 ${d.song}`:''}`],
    'YouTube Shorts':[(d)=>`${d.desc}. Movement is the message.\n${d.song?`Song: ${d.song}`:''}`],
    'Twitter/X':[(d)=>`dancing is just visual poetry and i will die on this hill\n${d.song?`(${d.song})`:''}`,]
  },
  funny:{
    TikTok:[
      (d)=>`we practiced this for 3 hours and it STILL looks like this 😭💀\n\n${d.desc}.\n${d.song?`🎵 ${d.song}\n\n`:''}`+`#dancefail #relatable #fyp #dancetok`,
      (d)=>`my friends when I said "it'll be easy" 💀💀💀\n\n${d.desc}.\n${d.song?`🎵 ${d.song}\n\n`:''}`+`#fyp #viral #dancechallenge`
    ],
    'Instagram Reels':[(d)=>`Nobody:\nUs at 2am: ${d.desc} 💀\n${d.song?`🎵 ${d.song}`:''}`],
    'YouTube Shorts':[(d)=>`Asked for a simple dance video. Got: ${d.desc} 😭`],
    'Twitter/X':[(d)=>`we do not have our lives together and this video is proof\n${d.song?`(${d.song})`:''}`,]
  },
  inspirational:{
    TikTok:[
      (d)=>`Every rep. Every hour. Every early morning.\n\nThis is what it looks like when you don't quit 🙏✨\n\n${d.desc}.\n${d.song?`🎵 ${d.song}\n\n`:''}`+`#dancemotivation #keepgoing #${d.style.toLowerCase().replace(/\//g,'').replace(/ /g,'')} #fyp`,
    ],
    'Instagram Reels':[(d)=>`You don't rise to the level of your goals — you fall to the level of your training.\n\nWe trained 🙏\n\n${d.desc}.\n${d.song?`🎵 ${d.song}`:''}`],
    'YouTube Shorts':[(d)=>`${d.desc}. Every step was earned.\n${d.song?`Song: ${d.song}`:''}`],
    'Twitter/X':[(d)=>`kept going when it was hard. worth it.\n${d.song?`(${d.song})`:''}`,]
  },
  minimal:{
    TikTok:[(d)=>`${d.desc}.\n${d.song?`🎵 ${d.song}\n`:''}\n#${d.style.toLowerCase().replace(/\//g,'').replace(/ /g,'')} #dance`],
    'Instagram Reels':[(d)=>`${d.desc}.\n${d.song?`🎵 ${d.song}`:''}`],
    'YouTube Shorts':[(d)=>`${d.desc}.\n${d.song?`Song: ${d.song}`:''}`],
    'Twitter/X':[(d)=>`${d.desc}.`]
  }
};

function generate(){
  const d={
    style:document.getElementById('style').value,
    vtype:document.getElementById('vtype').value,
    song:document.getElementById('song').value.trim(),
    desc:document.getElementById('desc').value.trim()||'Dance video',
    vibe:document.querySelector('input[name="vibe"]:checked').value,
    platforms:[...document.querySelectorAll('.plat-opt input:checked')].map(e=>e.value)
  };
  if(!d.platforms.length){alert('Select at least one platform!');return}
  document.getElementById('loading').classList.add('visible');
  document.getElementById('results').classList.remove('visible');
  document.getElementById('genBtn').disabled=true;
  setTimeout(()=>{
    const vibeC=C[d.vibe]||C.hype;
    let html='';
    d.platforms.forEach(plat=>{
      const arr=vibeC[plat]||C.hype[plat]||[];
      const fn=arr[Math.floor(Math.random()*arr.length)];
      if(!fn)return;
      const text=fn(d);
      const chars=text.length;
      const limit=plat==='TikTok'?2200:plat==='Instagram Reels'?2200:plat==='YouTube Shorts'?100:280;
      const warn=chars>limit;
      html+=`<div class="caption-card">
        <div class="cap-platform">${plat}</div>
        <div class="cap-style">${d.vibe.charAt(0).toUpperCase()+d.vibe.slice(1)} · ${d.style}</div>
        <div class="cap-text" id="cap-${plat.replace(/\s+|\//g,'-')}">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
        <div class="cap-footer">
          <span class="char-badge ${warn?'warn':''}">${chars} chars</span>
          <button class="copy-btn" onclick="copyC('cap-${plat.replace(/\s+|\//g,'-')}',this)">Copy</button>
        </div>
      </div>`;
    });
    document.getElementById('captions-out').innerHTML=html;
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('results').classList.add('visible');
    document.getElementById('genBtn').disabled=false;
    document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
  },800);
}
function copyC(id,btn){
  const t=document.getElementById(id).innerText;
  navigator.clipboard.writeText(t).then(()=>{btn.textContent='Copied!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied')},2000)});
}
</script>
</body>
</html>
