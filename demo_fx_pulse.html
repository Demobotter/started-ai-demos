<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX Pulse — Live Forex Rates</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Sora', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e7ff;
            min-height: 100vh;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .header h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p {
            font-size: 1rem;
            opacity: 0.7;
            margin-bottom: 1.5rem;
        }
        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .refresh-btn, .pause-btn {
            padding: 0.75rem 1.5rem;
            border: 1px solid #60a5fa;
            background: rgba(96, 165, 250, 0.1);
            color: #60a5fa;
            border-radius: 8px;
            font-family: 'Sora', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .refresh-btn:hover, .pause-btn:hover {
            background: rgba(96, 165, 250, 0.2);
            transform: translateY(-2px);
        }
        .refresh-btn.loading {
            opacity: 0.5;
            pointer-events: none;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .card {
            background: rgba(20, 29, 51, 0.6);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            animation: shimmer 3s infinite;
        }
        .card:hover {
            border-color: rgba(96, 165, 250, 0.4);
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(96, 165, 250, 0.1);
        }
        .card-pair {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1.1rem;
            font-weight: 600;
            color: #60a5fa;
            margin-bottom: 1rem;
        }
        .card-rate {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: -0.5px;
        }
        .card-change {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .arrow {
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }
        .arrow.up {
            color: #34d399;
        }
        .arrow.down {
            color: #f87171;
        }
        .card-change.up {
            color: #34d399;
        }
        .card-change.down {
            color: #f87171;
        }
        .card-timestamp {
            font-size: 0.75rem;
            opacity: 0.5;
            font-family: 'IBM Plex Mono', monospace;
        }
        .footer {
            text-align: center;
            opacity: 0.6;
            font-size: 0.9rem;
            padding: 1rem;
            border-top: 1px solid rgba(96, 165, 250, 0.1);
            margin-top: 2rem;
        }
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes shimmer {
            to {
                left: 100%;
            }
        }
        @media (max-width: 640px) {
            .header h1 {
                font-size: 2rem;
            }
            .grid {
                gap: 1rem;
            }
            .card {
                padding: 1rem;
            }
            .card-rate {
                font-size: 1.5rem;
            }
        }
        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💱 FX Pulse</h1>
            <p>Real-time global forex rates</p>
        </div>
        <div class="controls">
            <button class="refresh-btn" id="refreshBtn">⟳ Refresh Now</button>
            <button class="pause-btn" id="pauseBtn">⏸ Pause Auto-Update</button>
        </div>
        <div class="grid" id="grid"></div>
        <div class="footer">
            <span id="lastUpdated">Loading data...</span> • Auto-updates every 15s
        </div>
    </div>

    <script>
        const pairs = [
            { from: 'USD', to: 'EUR', label: 'USD → EUR' },
            { from: 'USD', to: 'GBP', label: 'USD → GBP' },
            { from: 'USD', to: 'JPY', label: 'USD → JPY' },
            { from: 'EUR', to: 'GBP', label: 'EUR → GBP' },
            { from: 'GBP', to: 'JPY', label: 'GBP → JPY' },
            { from: 'AUD', to: 'USD', label: 'AUD → USD' }
        ];

        let previousRates = {};
        let autoUpdateInterval = null;
        let isPaused = false;
        const grid = document.getElementById('grid');
        const refreshBtn = document.getElementById('refreshBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const lastUpdatedEl = document.getElementById('lastUpdated');

        async function fetchRates() {
            try {
                refreshBtn.classList.add('loading');
                const rates = {};
                for (const pair of pairs) {
                    const key = `${pair.from}/${pair.to}`;
                    try {
                        const response = await fetch(`https://api.frankfurter.app/latest?from=${pair.from}&to=${pair.to}`);
                        const data = await response.json();
                        rates[key] = data.rates[pair.to];
                    } catch (e) {
                        console.error(`Failed to fetch ${key}:`, e);
                        rates[key] = null;
                    }
                }
                renderRates(rates);
                previousRates = rates;
                lastUpdatedEl.textContent = `Last updated: ${new Date().toLocaleTimeString('en-AU', { timeZone: 'UTC' })} UTC`;
                refreshBtn.classList.remove('loading');
            } catch (error) {
                console.error('Error fetching rates:', error);
                refreshBtn.classList.remove('loading');
            }
        }

        function renderRates(rates) {
            grid.innerHTML = '';
            pairs.forEach(pair => {
                const key = `${pair.from}/${pair.to}`;
                const rate = rates[key];
                const prevRate = previousRates[key];
                const change = prevRate ? rate - prevRate : 0;
                const changePercent = prevRate ? ((change / prevRate) * 100).toFixed(2) : 0;
                const direction = change > 0 ? 'up' : change < 0 ? 'down' : 'neutral';

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-pair">${pair.label}</div>
                    <div class="card-rate">${rate ? rate.toFixed(4) : '—'}</div>
                    <div class="card-change ${direction}">
                        <span class="arrow ${direction}">${direction === 'up' ? '↑' : direction === 'down' ? '↓' : '→'}</span>
                        <span>${changePercent > 0 ? '+' : ''}${changePercent}%</span>
                    </div>
                    <div class="card-timestamp">${new Date().toLocaleTimeString('en-AU', { timeZone: 'UTC' })}</div>
                `;
                grid.appendChild(card);
            });
        }

        function startAutoUpdate() {
            if (!isPaused) {
                autoUpdateInterval = setInterval(() => {
                    if (!isPaused) {
                        fetchRates();
                    }
                }, 15000);
            }
        }

        refreshBtn.addEventListener('click', fetchRates);
        pauseBtn.addEventListener('click', () => {
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? '▶ Resume Auto-Update' : '⏸ Pause Auto-Update';
            pauseBtn.style.opacity = isPaused ? '0.6' : '1';
        });

        // Initial load and auto-update
        fetchRates();
        startAutoUpdate();

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (autoUpdateInterval) clearInterval(autoUpdateInterval);
        });
    </script>
</body>
</html>
