<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX Pulse — Live Currency Strength Grid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            --navy: #0a0e27;
            --lime: #00ff88;
            --lime-dark: #00cc6a;
            --lime-muted: #00cc6a33;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border-dark: #1a1f3a;
            --cell-neutral: #0f1229;
            --cell-up: #001a00;
            --cell-down: #1a0000;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, var(--navy) 0%, #0d1d3f 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s cubic-bezier(.16,1,.3,1);
        }

        h1 {
            font-size: clamp(32px, 6vw, 56px);
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--lime) 0%, #00ff88aa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 0.5px;
        }

        .controls-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s cubic-bezier(.16,1,.3,1) 0.1s backwards;
        }

        @media (max-width: 768px) {
            .controls-section {
                grid-template-columns: 1fr;
            }
        }

        .control-box {
            background: rgba(15, 18, 41, 0.6);
            border: 1px solid var(--border-dark);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(8px);
        }

        .control-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'IBM Plex Mono', monospace;
            margin-bottom: 12px;
            display: block;
        }

        .currency-select {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 8px;
        }

        .currency-btn {
            padding: 10px 12px;
            background: var(--cell-neutral);
            border: 1px solid var(--border-dark);
            color: var(--text-secondary);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(.16,1,.3,1);
            text-transform: uppercase;
        }

        .currency-btn:hover {
            border-color: var(--lime);
            color: var(--lime);
            transform: translateY(-2px);
        }

        .currency-btn.active {
            background: var(--lime);
            color: var(--navy);
            border-color: var(--lime);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .amount-display {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .amount-value {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 24px;
            font-weight: 600;
            color: var(--lime);
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--cell-neutral);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--lime);
            cursor: pointer;
            box-shadow: 0 0 12px rgba(0, 255, 136, 0.5);
            transition: all 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.3);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--lime);
            cursor: pointer;
            border: none;
            box-shadow: 0 0 12px rgba(0, 255, 136, 0.5);
            transition: all 0.2s;
        }

        .grid-header {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 0.5px;
            margin-bottom: 24px;
            animation: fadeInUp 0.8s cubic-bezier(.16,1,.3,1) 0.2s backwards;
        }

        .currency-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            animation: fadeInUp 0.8s cubic-bezier(.16,1,.3,1) 0.3s backwards;
        }

        @media (max-width: 600px) {
            .currency-grid {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            }
        }

        .currency-cell {
            background: var(--cell-neutral);
            border: 1px solid var(--border-dark);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(.16,1,.3,1);
            position: relative;
            overflow: hidden;
        }

        .currency-cell::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--lime-muted) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.4s cubic-bezier(.16,1,.3,1);
            pointer-events: none;
        }

        .currency-cell.stronger {
            background: rgba(0, 20, 0, 0.8);
            border-color: rgba(0, 255, 136, 0.3);
        }

        .currency-cell.stronger::before {
            opacity: 0.2;
        }

        .currency-cell.weaker {
            background: rgba(26, 0, 0, 0.8);
            border-color: rgba(255, 80, 80, 0.3);
        }

        .currency-cell.weaker::before {
            opacity: 0.15;
            background: linear-gradient(135deg, rgba(255, 80, 80, 0.2) 0%, transparent 100%);
        }

        .currency-cell:hover {
            border-color: var(--lime);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 255, 136, 0.15);
        }

        .cell-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .cell-flag {
            font-size: 20px;
            line-height: 1;
        }

        .cell-code {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .cell-rate {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .cell-converted {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 16px;
            font-weight: 600;
            color: var(--lime);
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-family: 'IBM Plex Mono', monospace;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--lime);
            margin-left: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .error {
            text-align: center;
            padding: 40px 20px;
            color: #ff5050;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .timestamp {
            font-size: 11px;
            color: var(--text-secondary);
            font-family: 'IBM Plex Mono', monospace;
            margin-top: 20px;
            text-align: center;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>FX Pulse</h1>
            <p class="subtitle">Live currency strength grid · Real ECB rates</p>
        </header>

        <div class="controls-section">
            <div class="control-box">
                <label class="control-label">Base Currency</label>
                <div class="currency-select" id="currencySelect"></div>
            </div>
            <div class="control-box">
                <label class="control-label">Convert Amount</label>
                <div class="slider-container">
                    <div class="amount-display">
                        <span class="amount-value" id="amountDisplay">1.00</span>
                        <span style="font-size: 12px; color: var(--text-secondary);" id="baseCodeDisplay">USD</span>
                    </div>
                    <input type="range" id="amountSlider" min="0.1" max="1000" value="1" step="0.1">
                </div>
            </div>
        </div>

        <div class="grid-header" id="gridHeader"></div>
        <div class="currency-grid" id="currencyGrid"></div>
        <div class="timestamp" id="timestamp"></div>
    </div>

    <script>
        const MAJOR_CURRENCIES = [
            { code: 'USD', flag: '🇺🇸' },
            { code: 'EUR', flag: '🇪🇺' },
            { code: 'GBP', flag: '🇬🇧' },
            { code: 'JPY', flag: '🇯🇵' },
            { code: 'CHF', flag: '🇨🇭' },
            { code: 'CAD', flag: '🇨🇦' },
            { code: 'AUD', flag: '🇦🇺' },
            { code: 'NZD', flag: '🇳🇿' },
            { code: 'CNY', flag: '🇨🇳' },
            { code: 'INR', flag: '🇮🇳' },
            { code: 'SGD', flag: '🇸🇬' },
            { code: 'HKD', flag: '🇭🇰' },
            { code: 'MXN', flag: '🇲🇽' },
            { code: 'BRL', flag: '🇧🇷' },
            { code: 'ZAR', flag: '🇿🇦' },
            { code: 'SEK', flag: '🇸🇪' },
        ];

        let currentBase = 'USD';
        let rates = {};
        let rateDate = '';

        const amountSlider = document.getElementById('amountSlider');
        const amountDisplay = document.getElementById('amountDisplay');
        const baseCodeDisplay = document.getElementById('baseCodeDisplay');
        const currencySelect = document.getElementById('currencySelect');
        const currencyGrid = document.getElementById('currencyGrid');
        const gridHeader = document.getElementById('gridHeader');
        const timestamp = document.getElementById('timestamp');

        amountSlider.addEventListener('input', (e) => {
            const amount = parseFloat(e.target.value);
            amountDisplay.textContent = amount.toFixed(2);
            renderGrid();
        });

        async function fetchRates(base) {
            try {
                const response = await fetch(`https://api.frankfurter.app/latest?from=${base}`);
                if (!response.ok) throw new Error('API failed');
                const data = await response.json();
                rates = data.rates;
                rateDate = data.date;
                currentBase = base;
                renderUI();
            } catch (err) {
                currencyGrid.innerHTML = `<div class="error">⚠ Could not fetch rates. Refresh to retry.</div>`;
                console.error(err);
            }
        }

        function renderUI() {
            renderBaseButtons();
            renderGrid();
            updateHeader();
            updateTimestamp();
        }

        function renderBaseButtons() {
            currencySelect.innerHTML = '';
            MAJOR_CURRENCIES.forEach(({ code }) => {
                const btn = document.createElement('button');
                btn.className = `currency-btn ${code === currentBase ? 'active' : ''}`;
                btn.textContent = code;
                btn.onclick = () => fetchRates(code);
                currencySelect.appendChild(btn);
            });
        }

        function renderGrid() {
            if (!Object.keys(rates).length) {
                currencyGrid.innerHTML = '<div class="loading">Loading rates</div>';
                return;
            }

            const amount = parseFloat(amountSlider.value);
            const baseRate = rates[currentBase] || 1;
            const averageRate = Object.values(rates).reduce((a, b) => a + b, 0) / Object.values(rates).length;

            currencyGrid.innerHTML = '';
            MAJOR_CURRENCIES.forEach(({ code, flag }) => {
                const rateValue = rates[code];
                if (!rateValue) return;

                // Strength: compare to average. Higher = stronger (fewer units per base).
                const strength = 1 / rateValue;
                const avgStrength = 1 / averageRate;
                const isStronger = strength > avgStrength;

                const converted = amount * rateValue;

                const cell = document.createElement('div');
                cell.className = `currency-cell ${isStronger ? 'stronger' : 'weaker'}`;
                cell.onclick = () => fetchRates(code);

                cell.innerHTML = `
                    <div class="cell-header">
                        <span class="cell-flag">${flag}</span>
                        <span class="cell-code">${code}</span>
                    </div>
                    <div class="cell-rate">1 ${currentBase} = ${rateValue.toFixed(4)} ${code}</div>
                    <div class="cell-converted">${converted.toFixed(2)}</div>
                `;
                currencyGrid.appendChild(cell);
            });
        }

        function updateHeader() {
            gridHeader.textContent = `ECB Reference Rates • ${rateDate}`;
        }

        function updateTimestamp() {
            const now = new Date();
            timestamp.textContent = `Last updated: ${now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true })} • Frankfurter.app`;
        }

        // Init
        fetchRates(currentBase);
        setInterval(updateTimestamp, 1000);
    </script>
</body>
</html>
