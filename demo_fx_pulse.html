<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX Pulse — Live Currency Strength Grid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
            color: #e0e6ff;
            overflow-x: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
        }

        /* Hero Section */
        .hero {
            margin-bottom: 3rem;
            text-align: center;
            opacity: 0;
            animation: fadeSlideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #00ff88 0%, #00ccff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.1rem;
            font-weight: 300;
            color: #a0a8d8;
            max-width: 600px;
            margin: 0 auto;
        }

        .meta {
            font-size: 0.9rem;
            font-family: 'IBM Plex Mono', monospace;
            color: #7a7fa8;
            margin-top: 1.5rem;
            font-weight: 500;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 2rem;
            align-items: flex-end;
            opacity: 0;
            animation: fadeSlideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .control-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #b0b8d8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .currency-select {
            padding: 0.75rem 1rem;
            border: 2px solid #2a3048;
            background: rgba(30, 35, 50, 0.8);
            color: #e0e6ff;
            border-radius: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .currency-select:hover {
            border-color: #00ff88;
            background: rgba(30, 35, 50, 0.95);
        }

        .currency-select:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 12px rgba(0, 255, 136, 0.2);
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .amount-input {
            padding: 0.75rem 1rem;
            border: 2px solid #2a3048;
            background: rgba(30, 35, 50, 0.8);
            color: #e0e6ff;
            border-radius: 8px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1rem;
            width: 120px;
            transition: all 0.3s ease;
        }

        .amount-input:hover {
            border-color: #00ccff;
            background: rgba(30, 35, 50, 0.95);
        }

        .amount-input:focus {
            outline: none;
            border-color: #00ccff;
            box-shadow: 0 0 12px rgba(0, 204, 255, 0.2);
        }

        /* Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeSlideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
        }

        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 0.75rem;
            }
        }

        @media (max-width: 500px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.6rem;
            }
        }

        .currency-cell {
            padding: 1.25rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
            background: rgba(30, 35, 50, 0.6);
        }

        .currency-cell::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.15), rgba(0, 204, 255, 0.15));
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 0;
        }

        .currency-cell:hover::before {
            opacity: 1;
        }

        .currency-cell:hover {
            border-color: #00ff88;
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 255, 136, 0.15);
        }

        .currency-cell.active {
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3), inset 0 0 20px rgba(0, 255, 136, 0.05);
        }

        .cell-content {
            position: relative;
            z-index: 1;
        }

        .cell-flag {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .cell-code {
            font-size: 0.8rem;
            font-weight: 700;
            color: #a0a8d8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.75rem;
        }

        .cell-rate {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1rem;
            font-weight: 600;
            color: #00ff88;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .cell-converted {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.85rem;
            color: #00ccff;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #7a7fa8;
            font-size: 1rem;
        }

        .error {
            background: rgba(255, 100, 100, 0.1);
            border: 2px solid #ff6464;
            border-radius: 12px;
            padding: 1.5rem;
            color: #ff8888;
            text-align: center;
            margin-bottom: 2rem;
        }

        /* Animations */
        @keyframes fadeSlideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes cellPulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4);
            }
            50% {
                box-shadow: 0 0 0 8px rgba(0, 255, 136, 0);
            }
        }

        .cell-fresh {
            animation: cellPulse 0.6s ease-out;
        }

        /* Respect motion preference */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }

        .footer {
            text-align: center;
            font-size: 0.85rem;
            color: #5a5f88;
            margin-top: 2rem;
        }

        .footer-link {
            color: #7a7fa8;
            text-decoration: none;
            border-bottom: 1px solid #7a7fa8;
        }

        .footer-link:hover {
            color: #00ff88;
            border-bottom-color: #00ff88;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>FX Pulse</h1>
        <p>Real-time currency strength. Pick your base, watch the grid re-pivot.</p>
        <div class="meta" id="metaDate">Loading ECB rates…</div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label for="baseCurrency">Base Currency</label>
            <select id="baseCurrency" class="currency-select">
                <option value="USD">🇺🇸 USD</option>
                <option value="EUR">🇪🇺 EUR</option>
                <option value="GBP">🇬🇧 GBP</option>
                <option value="JPY">🇯🇵 JPY</option>
                <option value="AUD">🇦🇺 AUD</option>
                <option value="CHF">🇨🇭 CHF</option>
                <option value="CAD">🇨🇦 CAD</option>
                <option value="NZD">🇳🇿 NZD</option>
                <option value="CNY">🇨🇳 CNY</option>
                <option value="INR">🇮🇳 INR</option>
                <option value="SGD">🇸🇬 SGD</option>
                <option value="HKD">🇭🇰 HKD</option>
                <option value="SEK">🇸🇪 SEK</option>
                <option value="NOK">🇳🇴 NOK</option>
                <option value="MXN">🇲🇽 MXN</option>
                <option value="BRL">🇧🇷 BRL</option>
            </select>
        </div>
        <div class="control-group">
            <label for="amount">Amount</label>
            <div class="slider-container">
                <input type="number" id="amount" class="amount-input" value="1" min="0.01" step="0.01">
            </div>
        </div>
    </div>

    <div id="content">
        <div class="loading">Fetching live rates…</div>
    </div>

    <div class="footer">
        ECB reference rates · updated every 60 seconds
    </div>

    <script>
        const FLAGS = {
            USD: '🇺🇸', EUR: '🇪🇺', GBP: '🇬🇧', JPY: '🇯🇵', AUD: '🇦🇺',
            CHF: '🇨🇭', CAD: '🇨🇦', NZD: '🇳🇿', CNY: '🇨🇳', INR: '🇮🇳',
            SGD: '🇸🇬', HKD: '🇭🇰', SEK: '🇸🇪', NOK: '🇳🇴', MXN: '🇲🇽',
            BRL: '🇧🇷'
        };

        const CURRENCY_NAMES = {
            USD: 'US Dollar', EUR: 'Euro', GBP: 'British Pound', JPY: 'Japanese Yen', AUD: 'Australian Dollar',
            CHF: 'Swiss Franc', CAD: 'Canadian Dollar', NZD: 'NZ Dollar', CNY: 'Chinese Yuan', INR: 'Indian Rupee',
            SGD: 'Singapore Dollar', HKD: 'Hong Kong Dollar', SEK: 'Swedish Krona', NOK: 'Norwegian Krone', MXN: 'Mexican Peso',
            BRL: 'Brazilian Real'
        };

        const baseCurrencySelect = document.getElementById('baseCurrency');
        const amountInput = document.getElementById('amount');
        const contentDiv = document.getElementById('content');
        const metaDate = document.getElementById('metaDate');

        let currentRates = {};
        let currentBase = 'USD';
        let ratesDate = '';

        async function fetchRates(base) {
            try {
                const response = await fetch(`https://api.frankfurter.app/latest?from=${base}`);
                if (!response.ok) throw new Error('Network error');
                const data = await response.json();
                currentRates = data.rates;
                ratesDate = data.date;
                currentBase = data.base;
                return true;
            } catch (err) {
                console.log('Frankfurter failed, trying fallback…');
                try {
                    const response = await fetch(`https://open.er-api.com/v6/latest/${base}`);
                    if (!response.ok) throw new Error('Network error');
                    const data = await response.json();
                    if (data.result !== 'success') throw new Error('API error');
                    currentRates = data.rates;
                    ratesDate = new Date().toISOString().split('T')[0];
                    currentBase = base;
                    return true;
                } catch (fallbackErr) {
                    console.error('Both APIs failed:', fallbackErr);
                    return false;
                }
            }
        }

        function renderGrid() {
            const amount = parseFloat(amountInput.value) || 1;
            const currencies = Object.keys(FLAGS);

            let html = '<div class="grid-container">';
            for (const currency of currencies) {
                const rate = currentRates[currency];
                const converted = (amount * rate).toFixed(2);
                const isActive = currency === currentBase ? 'active' : '';

                html += `
                    <div class="currency-cell ${isActive}" data-currency="${currency}">
                        <div class="cell-content">
                            <span class="cell-flag">${FLAGS[currency]}</span>
                            <div class="cell-code">${currency}</div>
                            <div class="cell-rate">1 = ${rate.toFixed(4)}</div>
                            <div class="cell-converted">${amount.toFixed(2)} = ${converted}</div>
                        </div>
                    </div>
                `;
            }
            html += '</div>';
            contentDiv.innerHTML = html;

            // Attach click handlers
            document.querySelectorAll('.currency-cell').forEach(cell => {
                cell.addEventListener('click', async () => {
                    const currency = cell.dataset.currency;
                    baseCurrencySelect.value = currency;
                    await loadRates(currency);
                });
            });

            // Add fresh animation to all cells
            document.querySelectorAll('.currency-cell').forEach(cell => {
                cell.classList.add('cell-fresh');
                setTimeout(() => cell.classList.remove('cell-fresh'), 600);
            });
        }

        async function loadRates(base) {
            baseCurrencySelect.value = base;
            contentDiv.innerHTML = '<div class="loading">Fetching rates…</div>';
            const success = await fetchRates(base);
            if (!success) {
                contentDiv.innerHTML = '<div class="error">⚠️ Unable to fetch rates. Please check your connection and try again.</div>';
                return;
            }
            metaDate.textContent = `ECB reference rates · ${ratesDate}`;
            renderGrid();
        }

        baseCurrencySelect.addEventListener('change', (e) => {
            loadRates(e.target.value);
        });

        amountInput.addEventListener('input', () => {
            renderGrid();
        });

        // Initial load
        loadRates('USD');

        // Auto-refresh every 60 seconds
        setInterval(() => {
            if (document.querySelector('.currency-cell')) {
                fetchRates(currentBase).then(() => {
                    metaDate.textContent = `ECB reference rates · ${ratesDate}`;
                    renderGrid();
                });
            }
        }, 60000);
    </script>
</body>
</html>
