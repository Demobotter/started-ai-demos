<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forex Shopping Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Sora, sans-serif;
      background: radial-gradient(circle at 20% 50%, #1a2a4a 0%, #0a0e27 50%, #050710 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      width: 100%;
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero {
      text-align: center;
      margin-bottom: 40px;
      animation: slideDown 0.6s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero h1 {
      font-size: clamp(36px, 8vw, 72px);
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #00d9ff 0%, #ff006e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    .hero p {
      font-size: 18px;
      color: #a0a0c0;
      max-width: 500px;
      margin: 0 auto;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-top: 40px;
    }

    @media (max-width: 900px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 217, 255, 0.3);
      border-radius: 16px;
      padding: 30px;
      backdrop-filter: blur(10px);
      animation: fadeInUp 0.8s ease-out 0.2s backwards;
    }

    .card h2 {
      font-size: 24px;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      animation: fadeIn 0.5s ease-out 0.3s backwards;
    }

    .input-group input,
    .input-group select {
      flex: 1;
      padding: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 8px;
      color: #e0e0e0;
      font-family: Sora, sans-serif;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .input-group input:focus,
    .input-group select:focus {
      outline: none;
      border-color: #00d9ff;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);
    }

    .input-group select {
      cursor: pointer;
    }

    button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%);
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-family: Sora, sans-serif;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 217, 255, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .item-list {
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 20px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      margin-bottom: 8px;
      border-left: 3px solid #00d9ff;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .item-info {
      flex: 1;
      font-size: 14px;
    }

    .item-amount {
      font-weight: 600;
      color: #00d9ff;
    }

    .item-currency {
      color: #a0a0c0;
      font-size: 12px;
    }

    .item-remove {
      background: rgba(255, 100, 130, 0.3);
      border: 1px solid rgba(255, 100, 130, 0.5);
      color: #ff6482;
      padding: 6px 12px;
      font-size: 12px;
      margin-left: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .item-remove:hover {
      background: rgba(255, 100, 130, 0.5);
    }

    .summary-section {
      border-top: 1px solid rgba(0, 217, 255, 0.2);
      padding-top: 20px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      font-size: 14px;
      animation: fadeIn 0.5s ease-out;
    }

    .summary-row.total {
      border-top: 1px solid rgba(0, 217, 255, 0.3);
      margin-top: 10px;
      padding-top: 15px;
      font-size: 18px;
      font-weight: 600;
      color: #00d9ff;
    }

    .base-currency-selector {
      margin-bottom: 20px;
      animation: fadeIn 0.5s ease-out;
    }

    .base-currency-selector label {
      display: block;
      font-size: 12px;
      color: #a0a0c0;
      margin-bottom: 8px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .base-currency-selector select {
      width: 100%;
    }

    .loading {
      text-align: center;
      color: #a0a0c0;
      font-size: 14px;
      padding: 20px;
    }

    .error {
      background: rgba(255, 100, 130, 0.1);
      border: 1px solid rgba(255, 100, 130, 0.5);
      color: #ff6482;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .empty-state {
      text-align: center;
      padding: 30px;
      color: #a0a0c0;
      font-size: 14px;
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Forex Shopping Cart</h1>
      <p>Mix currencies • Live rates • See global cost</p>
    </div>

    <div class="main-grid">
      <div class="card">
        <h2>Add Items</h2>
        <div class="input-group">
          <input type="number" id="amount" placeholder="Amount" min="0" step="0.01" value="">
          <select id="currency">
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="JPY">JPY</option>
            <option value="CHF">CHF</option>
            <option value="CAD">CAD</option>
            <option value="AUD">AUD</option>
            <option value="CNY">CNY</option>
            <option value="INR">INR</option>
            <option value="MXN">MXN</option>
            <option value="BRL">BRL</option>
            <option value="ZAR">ZAR</option>
          </select>
          <button onclick="addItem()">Add</button>
        </div>
        
        <div class="item-list" id="itemList">
          <div class="empty-state">No items yet. Add one above.</div>
        </div>
      </div>

      <div class="card">
        <h2>Total in Your Currency</h2>
        <div class="base-currency-selector">
          <label>View total in:</label>
          <select id="baseCurrency" onchange="updateTotal()">
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="JPY">JPY</option>
            <option value="CHF">CHF</option>
            <option value="CAD">CAD</option>
            <option value="AUD">AUD</option>
            <option value="CNY">CNY</option>
            <option value="INR">INR</option>
            <option value="MXN">MXN</option>
            <option value="BRL">BRL</option>
            <option value="ZAR">ZAR</option>
          </select>
        </div>

        <div id="loadingMessage" class="loading" style="display: none;">Fetching rates...</div>
        <div id="errorMessage" class="error" style="display: none;"></div>
        <div id="summarySection" class="summary-section" style="display: none;">
          <div class="summary-row">
            <span>Subtotal:</span>
            <span id="subtotal">0.00</span>
          </div>
          <div class="summary-row total">
            <span id="baseCurrencyLabel">USD Total:</span>
            <span id="total">0.00</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let items = [];
    let rates = {};

    // Fetch exchange rates from Frankfurter API (free, CORS-ok, no key)
    async function fetchRates() {
      try {
        const response = await fetch('https://api.frankfurter.dev/v1/latest?from=USD');
        const data = await response.json();
        rates = { USD: 1, ...data.rates };
        return true;
      } catch (error) {
        console.error('Rate fetch failed:', error);
        return false;
      }
    }

    function addItem() {
      const amountInput = document.getElementById('amount');
      const currencySelect = document.getElementById('currency');
      const amount = parseFloat(amountInput.value);
      const currency = currencySelect.value;

      if (isNaN(amount) || amount <= 0) {
        alert('Please enter a valid amount');
        return;
      }

      items.push({ amount, currency, id: Date.now() });
      amountInput.value = '';
      currencySelect.value = 'USD';

      renderItems();
      updateTotal();
    }

    function removeItem(id) {
      items = items.filter(item => item.id !== id);
      renderItems();
      updateTotal();
    }

    function renderItems() {
      const list = document.getElementById('itemList');
      if (items.length === 0) {
        list.innerHTML = '<div class="empty-state">No items yet. Add one above.</div>';
        return;
      }

      list.innerHTML = items.map(item => `
        <div class="item">
          <div class="item-info">
            <div class="item-amount">${item.amount.toFixed(2)}</div>
            <div class="item-currency">${item.currency}</div>
          </div>
          <button class="item-remove" onclick="removeItem(${item.id})">Remove</button>
        </div>
      `).join('');
    }

    async function updateTotal() {
      const loading = document.getElementById('loadingMessage');
      const errorMsg = document.getElementById('errorMessage');
      const summary = document.getElementById('summarySection');
      const baseCurrency = document.getElementById('baseCurrency').value;
      const baseCurrencyLabel = document.getElementById('baseCurrencyLabel');

      baseCurrencyLabel.textContent = `${baseCurrency} Total:`;

      if (items.length === 0) {
        summary.style.display = 'none';
        loading.style.display = 'none';
        errorMsg.style.display = 'none';
        return;
      }

      loading.style.display = 'block';
      errorMsg.style.display = 'none';

      const success = await fetchRates();

      if (!success || !rates[baseCurrency]) {
        errorMsg.textContent = 'Failed to fetch exchange rates. Please try again.';
        errorMsg.style.display = 'block';
        loading.style.display = 'none';
        return;
      }

      // Convert all items to base currency
      let total = 0;
      items.forEach(item => {
        // First convert item to USD, then to base currency
        const inUSD = item.amount / rates[item.currency];
        const inBase = inUSD * rates[baseCurrency];
        total += inBase;
      });

      const subtotal = items.reduce((sum, item) => sum + item.amount, 0);

      document.getElementById('subtotal').textContent = 
        items.map(i => `${i.amount.toFixed(2)} ${i.currency}`).join(' + ');
      document.getElementById('total').textContent = total.toFixed(2);

      summary.style.display = 'block';
      loading.style.display = 'none';
    }

    // Initialize on load
    window.addEventListener('load', async () => {
      await fetchRates();
    });

    // Allow Enter key to add item
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && document.activeElement.id === 'amount') {
        addItem();
      }
    });
  </script>
</body>
</html>
