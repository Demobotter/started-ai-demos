<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fear & Greed Index</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Sora', sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0d1828 100%);
      color: #fff;
      overflow-x: hidden;
    }
    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .hero {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeInDown 0.8s ease-out;
    }
    .hero h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(120deg, #00d9ff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      margin-bottom: 0.5rem;
    }
    .hero p {
      font-size: 1rem;
      color: #a0aec0;
      font-style: italic;
    }
    .gauge-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }
    .gauge-container {
      position: relative;
      width: 280px;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    svg.gauge {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 20px rgba(0, 217, 255, 0.3));
    }
    .gauge-label {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
    }
    .gauge-label .value {
      font-size: 3rem;
      font-weight: 700;
      font-family: 'IBM Plex Mono', monospace;
      margin: 0;
      line-height: 1;
    }
    .gauge-label .label {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 0.5rem;
      opacity: 0.8;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 600px;
      margin-top: 2rem;
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }
    .stat-card {
      background: rgba(26, 31, 58, 0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      transition: all 0.3s ease;
    }
    .stat-card:hover {
      border-color: rgba(0, 217, 255, 0.5);
      background: rgba(26, 31, 58, 0.8);
    }
    .stat-card .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a0aec0;
      margin-bottom: 0.5rem;
    }
    .stat-card .value {
      font-size: 1.5rem;
      font-weight: 700;
      font-family: 'IBM Plex Mono', monospace;
      color: #00d9ff;
    }
    .footer {
      position: absolute;
      bottom: 2rem;
      font-size: 0.75rem;
      color: #4a5568;
      text-align: center;
    }
    .loading {
      opacity: 0.6;
      animation: pulse 2s infinite;
    }
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes pulse {
      0%, 100% {
        opacity: 0.6;
      }
      50% {
        opacity: 1;
      }
    }
    @media (max-width: 600px) {
      .hero h1 {
        font-size: 1.8rem;
      }
      .gauge-container {
        width: 220px;
        height: 220px;
      }
      .gauge-label .value {
        font-size: 2.5rem;
      }
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Fear & Greed Index</h1>
      <p>Real-time market sentiment</p>
    </div>

    <div class="gauge-wrapper">
      <div class="gauge-container">
        <svg class="gauge" viewBox="0 0 200 120">
          <!-- Background arc -->
          <defs>
            <linearGradient id="arcGradient" x1="0%" x2="100%">
              <stop offset="0%" style="stop-color:#ff2600;stop-opacity:1" />
              <stop offset="25%" style="stop-color:#ff9900;stop-opacity:1" />
              <stop offset="50%" style="stop-color:#ffd700;stop-opacity:1" />
              <stop offset="75%" style="stop-color:#00dd00;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#00ff00;stop-opacity:1" />
            </linearGradient>
          </defs>
          
          <!-- Outer circle -->
          <circle cx="100" cy="100" r="90" fill="none" stroke="#1a1f3a" stroke-width="2" opacity="0.5" />
          
          <!-- Gradient background arc (0-180 degrees = left to right) -->
          <path d="M 10 100 A 90 90 0 0 1 190 100" fill="none" stroke="url(#arcGradient)" stroke-width="8" stroke-linecap="round" />
          
          <!-- Needle (will be rotated by JS) -->
          <g id="needle" transform="translate(100, 100)">
            <line x1="0" y1="0" x2="0" y2="-75" stroke="#fff" stroke-width="3" stroke-linecap="round" />
            <circle cx="0" cy="0" r="5" fill="#fff" />
          </g>
          
          <!-- Center dot -->
          <circle cx="100" cy="100" r="8" fill="#0a0e27" />
          <circle cx="100" cy="100" r="6" fill="#fff" opacity="0.9" />
        </svg>
        <div class="gauge-label">
          <p class="value" id="indexValue">--</p>
          <p class="label" id="indexLabel">Loading...</p>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="label">Volatility</div>
          <div class="value" id="volatility">--</div>
        </div>
        <div class="stat-card">
          <div class="label">Momentum</div>
          <div class="value" id="momentum">--</div>
        </div>
        <div class="stat-card">
          <div class="label">Social Volume</div>
          <div class="value" id="socialVolume">--</div>
        </div>
        <div class="stat-card">
          <div class="label">Dominance</div>
          <div class="value" id="dominance">--</div>
        </div>
      </div>
    </div>

    <div class="footer">
      <p id="timestamp">Last updated: --</p>
      <p>Updates every 60 seconds • Data: alternative.me</p>
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────
    // PURE LOGIC FUNCTIONS (headless-testable)
    // ─────────────────────────────────────────────────────────────
    
    function rgbToHex(r, g, b) {
      return `#${[r, g, b].map(x => {
        const hex = x.toString(16);
        return hex.length === 1 ? '0' + hex : hex;
      }).join('')}`;
    }

    function interpolateColor(value) {
      const colors = [
        { v: 0, r: 255, g: 38, b: 0 },
        { v: 25, r: 255, g: 153, b: 0 },
        { v: 50, r: 255, g: 215, b: 0 },
        { v: 75, r: 0, g: 221, b: 0 },
        { v: 100, r: 0, g: 255, b: 0 }
      ];
      
      const i = colors.findIndex(c => c.v >= value);
      if (i <= 0) return rgbToHex(colors[0].r, colors[0].g, colors[0].b);
      if (i >= colors.length) return rgbToHex(colors[colors.length-1].r, colors[colors.length-1].g, colors[colors.length-1].b);
      
      const c1 = colors[i-1];
      const c2 = colors[i];
      const ratio = (value - c1.v) / (c2.v - c1.v);
      const r = Math.round(c1.r + (c2.r - c1.r) * ratio);
      const g = Math.round(c1.g + (c2.g - c1.g) * ratio);
      const b = Math.round(c1.b + (c2.b - c1.b) * ratio);
      return rgbToHex(r, g, b);
    }

    function getLabel(value) {
      if (value < 25) return 'EXTREME FEAR';
      if (value < 50) return 'FEAR';
      if (value < 75) return 'GREED';
      return 'EXTREME GREED';
    }

    function getAngle(value) {
      return 180 - (value / 100) * 180;
    }

    // ─────────────────────────────────────────────────────────────
    // DOM & API INTERACTION
    // ─────────────────────────────────────────────────────────────
    
    async function fetchIndex() {
      try {
        const res = await fetch('https://api.alternative.me/fng/?limit=1');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const item = data.data[0];
        return {
          value: parseInt(item.value),
          label: item.value_classification,
          timestamp: new Date(item.timestamp * 1000),
          dominance: item.top_coin ? item.top_coin.name : '--'
        };
      } catch (e) {
        console.error('Fetch error:', e);
        return null;
      }
    }

    function updateGauge(indexValue) {
      const needle = document.getElementById('needle');
      const angle = getAngle(indexValue);
      needle.setAttribute('transform', `translate(100, 100) rotate(${angle})`);
      
      const color = interpolateColor(indexValue);
      needle.querySelector('line').setAttribute('stroke', color);
      needle.querySelector('circle:last-of-type').setAttribute('fill', color);
    }

    function updateUI(data) {
      if (!data) {
        document.getElementById('indexLabel').textContent = 'Error loading data';
        return;
      }
      
      document.getElementById('indexValue').textContent = data.value;
      document.getElementById('indexLabel').textContent = getLabel(data.value);
      document.getElementById('timestamp').textContent = `Last updated: ${data.timestamp.toLocaleTimeString()}`;
      
      updateGauge(data.value);
    }

    async function poll() {
      const data = await fetchIndex();
      updateUI(data);
      setTimeout(poll, 60000); // Update every 60s
    }

    // Initial load
    poll();
  </script>
</body>
</html>
