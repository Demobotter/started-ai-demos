<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cities Compare | Global City Metrics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700;800&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: "Hanken Grotesk", sans-serif;
      background: linear-gradient(135deg, #0f1e3a 0%, #1a2f5a 50%, #0d1a33 100%);
      color: #e8eef7;
      overflow-x: hidden;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    /* HERO */
    .hero {
      text-align: center;
      margin-bottom: 50px;
      animation: fadeInScale 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .hero h1 {
      font-family: "Bricolage Grotesque", sans-serif;
      font-size: clamp(40px, 8vw, 72px);
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #ff6b9d 0%, #c06c84 50%, #6c5ce7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .hero p {
      font-size: 18px;
      color: #a0aec0;
      font-weight: 400;
    }

    /* SELECTOR SECTION */
    .selector {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 20px;
      margin-bottom: 50px;
      align-items: center;
      animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.1s backwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .selector-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .selector-group label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #7c8adb;
    }

    .selector-group select {
      padding: 12px 14px;
      border: 1px solid #4c5aa4;
      border-radius: 8px;
      background: rgba(20, 30, 70, 0.6);
      color: #e8eef7;
      font-family: "Hanken Grotesk", sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .selector-group select:hover {
      border-color: #ff6b9d;
      background: rgba(20, 30, 70, 0.8);
    }

    .selector-group select:focus {
      outline: none;
      border-color: #ff6b9d;
      box-shadow: 0 0 12px rgba(255, 107, 157, 0.3);
    }

    .vs-label {
      font-size: 14px;
      font-weight: 600;
      color: #7c8adb;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .compare-button {
      padding: 12px 28px;
      background: linear-gradient(135deg, #ff6b9d 0%, #c06c84 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-family: "Bricolage Grotesque", sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      align-self: flex-end;
    }

    .compare-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 107, 157, 0.4);
    }

    .compare-button:active {
      transform: translateY(0);
    }

    /* COMPARISON GRID */
    .comparison {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.2s backwards;
    }

    .city-card {
      background: rgba(30, 45, 90, 0.6);
      border: 1px solid #4c5aa4;
      border-radius: 12px;
      padding: 30px;
      backdrop-filter: blur(12px);
      transition: all 0.3s ease;
    }

    .city-card:hover {
      border-color: #ff6b9d;
      box-shadow: 0 8px 24px rgba(255, 107, 157, 0.2);
      transform: translateY(-4px);
    }

    .city-card h2 {
      font-family: "Bricolage Grotesque", sans-serif;
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #ff6b9d 0%, #c06c84 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .city-card .country {
      font-size: 13px;
      color: #a0aec0;
      margin-bottom: 20px;
      font-weight: 500;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(76, 90, 164, 0.3);
      font-size: 14px;
    }

    .metric:last-child {
      border-bottom: none;
    }

    .metric-label {
      color: #7c8adb;
      font-weight: 500;
    }

    .metric-value {
      color: #e8eef7;
      font-weight: 600;
      font-family: "Bricolage Grotesque", sans-serif;
    }

    /* LOADING STATE */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #a0aec0;
      font-size: 16px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid #4c5aa4;
      border-top-color: #ff6b9d;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(220, 38, 38, 0.5);
      color: #fca5a5;
      padding: 16px;
      border-radius: 8px;
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .container {
        padding: 40px 16px;
      }

      .selector {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .compare-button {
        align-self: stretch;
      }

      .comparison {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .city-card h2 {
        font-size: 24px;
      }
    }

    /* REDUCE MOTION */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #7c8adb;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>🌍 Cities Compare</h1>
      <p>Pick two cities, see real data side-by-side</p>
    </div>

    <div class="selector">
      <div class="selector-group">
        <label for="city1">City 1</label>
        <select id="city1">
          <option value="">Select a city...</option>
          <option value="London">London</option>
          <option value="Tokyo">Tokyo</option>
          <option value="New York">New York</option>
          <option value="Paris">Paris</option>
          <option value="Dubai">Dubai</option>
          <option value="Singapore">Singapore</option>
          <option value="Sydney">Sydney</option>
          <option value="Mumbai">Mumbai</option>
          <option value="Berlin">Berlin</option>
          <option value="Toronto">Toronto</option>
          <option value="Mexico City">Mexico City</option>
          <option value="Bangkok">Bangkok</option>
        </select>
      </div>

      <div class="vs-label">VS</div>

      <div class="selector-group">
        <label for="city2">City 2</label>
        <select id="city2">
          <option value="">Select a city...</option>
          <option value="London">London</option>
          <option value="Tokyo">Tokyo</option>
          <option value="New York">New York</option>
          <option value="Paris">Paris</option>
          <option value="Dubai">Dubai</option>
          <option value="Singapore">Singapore</option>
          <option value="Sydney">Sydney</option>
          <option value="Mumbai">Mumbai</option>
          <option value="Berlin">Berlin</option>
          <option value="Toronto">Toronto</option>
          <option value="Mexico City">Mexico City</option>
          <option value="Bangkok">Bangkok</option>
        </select>
      </div>
    </div>

    <button class="compare-button" id="compareBtn">Compare</button>

    <div id="results"></div>
  </div>

  <script>
    const CITY_DATA = {
      "London": { country: "United Kingdom", lat: 51.5074, lng: -0.1278, pop: 9002488, area: 1572, languages: ["English"], currencies: ["GBP"] },
      "Tokyo": { country: "Japan", lat: 35.6762, lng: 139.6503, pop: 13960236, area: 2194, languages: ["Japanese"], currencies: ["JPY"] },
      "New York": { country: "United States", lat: 40.7128, lng: -74.0060, pop: 8336817, area: 783, languages: ["English"], currencies: ["USD"] },
      "Paris": { country: "France", lat: 48.8566, lng: 2.3522, pop: 2161000, area: 105, languages: ["French"], currencies: ["EUR"] },
      "Dubai": { country: "United Arab Emirates", lat: 25.2048, lng: 55.2708, pop: 3331000, area: 4114, languages: ["Arabic", "English"], currencies: ["AED"] },
      "Singapore": { country: "Singapore", lat: 1.3521, lng: 103.8198, pop: 5868104, area: 730, languages: ["English", "Mandarin", "Malay", "Tamil"], currencies: ["SGD"] },
      "Sydney": { country: "Australia", lat: -33.8688, lng: 151.2093, pop: 5312163, area: 12367, languages: ["English"], currencies: ["AUD"] },
      "Mumbai": { country: "India", lat: 19.0760, lng: 72.8777, pop: 20961472, area: 603, languages: ["Hindi", "Marathi", "English"], currencies: ["INR"] },
      "Berlin": { country: "Germany", lat: 52.5200, lng: 13.4050, pop: 3645000, area: 892, languages: ["German"], currencies: ["EUR"] },
      "Toronto": { country: "Canada", lat: 43.6532, lng: -79.3832, pop: 2930000, area: 2731, languages: ["English", "French"], currencies: ["CAD"] },
      "Mexico City": { country: "Mexico", lat: 19.4326, lng: -99.1332, pop: 21500000, area: 2496, languages: ["Spanish"], currencies: ["MXN"] },
      "Bangkok": { country: "Thailand", lat: 13.7563, lng: 100.5018, pop: 8305218, area: 3113, languages: ["Thai"], currencies: ["THB"] }
    };

    const getTimezone = async (lat, lng) => {
      for (let attempt = 0; attempt < 2; attempt++) {
        try {
          const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&timezone=auto`);
          const data = await res.json();
          if (data && data.timezone) return data.timezone;
        } catch (e) { /* retry once */ }
      }
      return "Unknown";
    };

    const formatNumber = (num) => {
      if (num === null || num === undefined) return "—";
      return num.toLocaleString();
    };

    const getKoppenClimate = async (lat, lng) => {
      try {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&daily=temperature_2m_max,precipitation_sum&timezone=auto&past_days=90`);
        const data = await res.json();
        if (!data.daily) return "Temperate";
        
        const temps = data.daily.temperature_2m_max;
        const precip = data.daily.precipitation_sum;
        
        const avgTemp = temps.reduce((a, b) => a + b, 0) / temps.length;
        
        if (avgTemp > 18) return "Tropical";
        if (avgTemp > 0) return "Temperate";
        return "Cold";
      } catch {
        return "Temperate";
      }
    };

    const compareCity = async (city1, city2) => {
      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div>Fetching city data...</div>';

      const d1 = CITY_DATA[city1];
      const d2 = CITY_DATA[city2];

      try {
        const [tz1, climate1, tz2, climate2] = await Promise.all([
          getTimezone(d1.lat, d1.lng),
          getKoppenClimate(d1.lat, d1.lng),
          getTimezone(d2.lat, d2.lng),
          getKoppenClimate(d2.lat, d2.lng)
        ]);

        resultsDiv.innerHTML = `
          <div class="comparison">
            <div class="city-card">
              <h2>${city1}</h2>
              <p class="country">${d1.country}</p>
              <div class="metric">
                <span class="metric-label">Population</span>
                <span class="metric-value">${formatNumber(d1.pop)}</span>
              </div>
              <div class="metric">
                <span class="metric-label">Area (km²)</span>
                <span class="metric-value">${formatNumber(d1.area)}</span>
              </div>
              <div class="metric">
                <span class="metric-label">Latitude</span>
                <span class="metric-value">${d1.lat.toFixed(2)}°</span>
              </div>
              <div class="metric">
                <span class="metric-label">Longitude</span>
                <span class="metric-value">${d1.lng.toFixed(2)}°</span>
              </div>
              <div class="metric">
                <span class="metric-label">Timezone</span>
                <span class="metric-value">${tz1}</span>
              </div>
              <div class="metric">
                <span class="metric-label">Climate</span>
                <span class="metric-value">${climate1}</span>
              </div>
              <div class="metric">
                <span class="metric-label">Languages</span>
                <span class="metric-value">${d1.languages.join(", ")}</span>
              </div>
              <div class="metric">
                <span class="metric-label">Currency</span>
                <span class="metric-value">${d1.currencies.join(", ")}</span>
              </div>
            </div>

            <div class="city-card">
              <h2>${city2}</h2>
              <p class="country">${d2.country}</p>
              <div class="metric">
                <span class="metric-label">Population</span>
                <span class="metric-value">${formatNumber(d2.pop)}</span>
              </div>
              <div class="metric">
                <span class="metric-label">Area (km²)</span>
                <span class="metric-value">${formatNumber(d2.area)}</span>
              </div>
              <div class="metric">
                <span class="metric-label">Latitude</span>
                <span class="metric-value">${d2.lat.toFixed(2)}°</span>
              </div>
              <div class="metric">
                <span class="metric-label">Longitude</span>
                <span class="metric-value">${d2.lng.toFixed(2)}°</span>
              </div>
              <div class="metric">
                <span class="metric-label">Timezone</span>
                <span class="metric-value">${tz2}</span>
              </div>
              <div class="metric">
                <span class="metric-label">Climate</span>
                <span class="metric-value">${climate2}</span>
              </div>
              <div class="metric">
                <span class="metric-label">Languages</span>
                <span class="metric-value">${d2.languages.join(", ")}</span>
              </div>
              <div class="metric">
                <span class="metric-label">Currency</span>
                <span class="metric-value">${d2.currencies.join(", ")}</span>
              </div>
            </div>
          </div>
        `;
      } catch (e) {
        resultsDiv.innerHTML = `<div class="error">Failed to load data. Try again.</div>`;
      }
    };

    document.getElementById("compareBtn").addEventListener("click", () => {
      const city1 = document.getElementById("city1").value;
      const city2 = document.getElementById("city2").value;
      
      if (!city1 || !city2) {
        alert("Please select both cities");
        return;
      }

      if (city1 === city2) {
        alert("Please select different cities");
        return;
      }

      compareCity(city1, city2);
    });

    document.getElementById("city1").addEventListener("keypress", (e) => {
      if (e.key === "Enter") document.getElementById("compareBtn").click();
    });
    document.getElementById("city2").addEventListener("keypress", (e) => {
      if (e.key === "Enter") document.getElementById("compareBtn").click();
    });
  </script>
</body>
</html>
