<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker — Real-Time Budget Insights</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: 'Geist', -apple-system, sans-serif; background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 50%, #0d1419 100%); color: #e0e0e0; overflow-x: hidden; }
    .grain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.03; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" /></filter><rect width="400" height="400" fill="white" filter="url(%23noise)" /></svg>'); z-index: -1; }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; display: flex; flex-direction: column; gap: 40px; animation: fadeIn 0.6s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .hero { text-align: center; margin-bottom: 20px; animation: slideUp 0.6s ease-out 0.1s both; }
    .hero h1 { font-family: 'Instrument Serif', serif; font-size: clamp(36px, 8vw, 72px); font-weight: 700; background: linear-gradient(135deg, #4ade80 0%, #60a5fa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; letter-spacing: -1px; }
    .hero p { font-size: 16px; color: #a0a0a0; font-weight: 400; }
    .content { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; animation: slideUp 0.6s ease-out 0.2s both; }
    @media (max-width: 900px) { .content { grid-template-columns: 1fr; } }
    .input-panel { background: rgba(26, 31, 46, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .input-group { display: flex; gap: 12px; align-items: flex-end; }
    .input-field { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .input-field label { font-size: 12px; font-weight: 500; color: #80a080; text-transform: uppercase; letter-spacing: 0.5px; }
    .input-field input { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(74, 222, 128, 0.3); border-radius: 8px; padding: 10px 12px; color: #e0e0e0; font-family: 'Geist', sans-serif; font-size: 14px; transition: all 0.3s ease; }
    .input-field input:focus { outline: none; border-color: #4ade80; background: rgba(74, 222, 128, 0.05); box-shadow: 0 0 0 2px rgba(74, 222, 128, 0.2); }
    .input-field input::placeholder { color: #606060; }
    button { background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%); color: #000; border: none; border-radius: 8px; padding: 10px 20px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.3s ease; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.5px; }
    button:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(74, 222, 128, 0.3); }
    button:active { transform: translateY(0); }
    .expenses-list { background: rgba(26, 31, 46, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 24px; display: flex; flex-direction: column; gap: 16px; max-height: 500px; overflow-y: auto; }
    .expenses-list h2 { font-family: 'Instrument Serif', serif; font-size: 18px; font-weight: 700; color: #e0e0e0; margin-bottom: 8px; }
    .expense-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(0, 0, 0, 0.3); border-left: 3px solid #60a5fa; border-radius: 6px; font-size: 13px; animation: slideUp 0.3s ease-out; }
    .expense-item.food { border-left-color: #f97316; }
    .expense-item.transport { border-left-color: #06b6d4; }
    .expense-item.entertainment { border-left-color: #a855f7; }
    .expense-item.utilities { border-left-color: #eab308; }
    .expense-item.health { border-left-color: #ec4899; }
    .expense-item.other { border-left-color: #64748b; }
    .expense-info { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .expense-desc { color: #c0c0c0; font-weight: 500; }
    .expense-cat { font-size: 11px; color: #808080; text-transform: uppercase; letter-spacing: 0.3px; }
    .expense-amount { color: #4ade80; font-weight: 700; min-width: 60px; text-align: right; }
    .expense-remove { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; transition: all 0.2s ease; }
    .expense-remove:hover { background: rgba(239, 68, 68, 0.4); border-color: rgba(239, 68, 68, 0.6); }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; animation: slideUp 0.6s ease-out 0.3s both; }
    .stat-box { background: rgba(26, 31, 46, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 20px; text-align: center; }
    .stat-label { font-size: 12px; color: #808080; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .stat-value { font-family: 'Instrument Serif', serif; font-size: 32px; font-weight: 700; color: #4ade80; }
    .stat-box.alert .stat-value { color: #ef4444; }
    .chart-container { background: rgba(26, 31, 46, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 20px; animation: slideUp 0.6s ease-out 0.3s both; }
    .chart-container h2 { font-family: 'Instrument Serif', serif; font-size: 18px; font-weight: 700; color: #e0e0e0; }
    svg { max-width: 100%; height: auto; }
    .legend { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; width: 100%; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #a0a0a0; }
    .legend-color { width: 12px; height: 12px; border-radius: 2px; }
    .empty-state { text-align: center; padding: 40px 20px; color: #606060; font-size: 14px; }
    @media (prefers-reduced-motion: reduce) { * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; } }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="container">
    <div class="hero">
      <h1>Your Money, Mapped</h1>
      <p>Track spending by category. Real data, instant insights.</p>
    </div>
    <div class="content">
      <div class="input-panel">
        <label style="font-size: 12px; color: #80a080; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;">Add Expense</label>
        <div class="input-group">
          <div class="input-field">
            <label for="desc-input">Description</label>
            <input id="desc-input" type="text" placeholder="e.g., Coffee, Gas, Netflix" />
          </div>
          <div class="input-field">
            <label for="amount-input">Amount ($)</label>
            <input id="amount-input" type="number" placeholder="0.00" min="0" step="0.01" />
          </div>
          <button id="add-btn">Add</button>
        </div>
      </div>
      <div class="expenses-list">
        <h2>Recent Expenses</h2>
        <div id="expenses-container">
          <div class="empty-state">No expenses yet. Add one to get started.</div>
        </div>
      </div>
    </div>
    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">Total Spent</div>
        <div class="stat-value">$<span id="total-spent">0.00</span></div>
      </div>
      <div class="stat-box" id="budget-box">
        <div class="stat-label">Budget Alert</div>
        <div class="stat-value">On Track</div>
      </div>
    </div>
    <div class="chart-container">
      <h2>Spending by Category</h2>
      <svg id="pie-chart" width="280" height="280" viewBox="0 0 280 280"></svg>
      <div class="legend" id="legend"></div>
    </div>
  </div>

  <script>
    const categoryRules = {
      food: /coffee|lunch|dinner|breakfast|pizza|burger|restaurant|bar|food|doordash|uber eats|grubhub|taco|sushi|bagel/i,
      transport: /gas|uber|lyft|taxi|bus|train|parking|fuel|car|vehicle|metro/i,
      entertainment: /movie|netflix|spotify|game|steam|concert|tickets|hulu|disney/i,
      utilities: /electric|water|gas bill|internet|phone|utility|rent/i,
      health: /pharmacy|doctor|gym|health|medicine|dental|hospital|gym membership/i
    };

    function detectCategory(desc) {
      for (const [cat, regex] of Object.entries(categoryRules)) {
        if (regex.test(desc)) return cat;
      }
      return 'other';
    }

    let expenses = JSON.parse(localStorage.getItem('expenses')) || [];

    function saveExpenses() {
      localStorage.setItem('expenses', JSON.stringify(expenses));
    }

    function addExpense(desc, amount) {
      if (!desc.trim() || !amount || amount <= 0) return;
      const cat = detectCategory(desc);
      expenses.push({ id: Date.now(), desc, amount: parseFloat(amount), cat });
      saveExpenses();
      render();
    }

    function removeExpense(id) {
      expenses = expenses.filter(e => e.id !== id);
      saveExpenses();
      render();
    }

    function getTotalByCategory() {
      const totals = {};
      expenses.forEach(e => {
        totals[e.cat] = (totals[e.cat] || 0) + e.amount;
      });
      return totals;
    }

    function getTotalSpent() {
      return expenses.reduce((sum, e) => sum + e.amount, 0);
    }

    const catColors = {
      food: '#f97316',
      transport: '#06b6d4',
      entertainment: '#a855f7',
      utilities: '#eab308',
      health: '#ec4899',
      other: '#64748b'
    };

    function renderPieChart() {
      const totals = getTotalByCategory();
      const total = getTotalSpent();
      if (total === 0) {
        document.getElementById('pie-chart').innerHTML = '<text x="140" y="140" text-anchor="middle" fill="#606060" font-size="14">No data yet</text>';
        document.getElementById('legend').innerHTML = '';
        return;
      }

      const svg = document.getElementById('pie-chart');
      svg.innerHTML = '';

      let angle = -90;
      const cx = 140, cy = 140, r = 80;

      for (const [cat, amount] of Object.entries(totals)) {
        const sliceAngle = (amount / total) * 360;
        const startAngle = angle * (Math.PI / 180);
        const endAngle = (angle + sliceAngle) * (Math.PI / 180);

        const x1 = cx + r * Math.cos(startAngle);
        const y1 = cy + r * Math.sin(startAngle);
        const x2 = cx + r * Math.cos(endAngle);
        const y2 = cy + r * Math.sin(endAngle);

        const largeArc = sliceAngle > 180 ? 1 : 0;
        const pathData = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', pathData);
        path.setAttribute('fill', catColors[cat]);
        path.setAttribute('opacity', '0.85');
        path.setAttribute('stroke', 'rgba(26, 31, 46, 0.8)');
        path.setAttribute('stroke-width', '2');

        svg.appendChild(path);
        angle += sliceAngle;
      }

      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      for (const [cat, amount] of Object.entries(totals)) {
        const pct = ((amount / total) * 100).toFixed(1);
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `
          <div class="legend-color" style="background: ${catColors[cat]}"></div>
          <span>${cat} — $${amount.toFixed(2)} (${pct}%)</span>
        `;
        legend.appendChild(item);
      }
    }

    function renderExpensesList() {
      const container = document.getElementById('expenses-container');
      if (expenses.length === 0) {
        container.innerHTML = '<div class="empty-state">No expenses yet. Add one to get started.</div>';
        return;
      }
      container.innerHTML = expenses.map(e => `
        <div class="expense-item ${e.cat}">
          <div class="expense-info">
            <div class="expense-desc">${e.desc}</div>
            <div class="expense-cat">${e.cat}</div>
          </div>
          <div class="expense-amount">$${e.amount.toFixed(2)}</div>
          <button class="expense-remove" onclick="window.removeExpense(${e.id})">Remove</button>
        </div>
      `).join('');
    }

    function updateStats() {
      const total = getTotalSpent();
      document.getElementById('total-spent').textContent = total.toFixed(2);
      const budgetBox = document.getElementById('budget-box');
      if (total > 500) {
        budgetBox.classList.add('alert');
        budgetBox.querySelector('.stat-value').textContent = '⚠️ Over $500';
      } else {
        budgetBox.classList.remove('alert');
        budgetBox.querySelector('.stat-value').textContent = 'On Track';
      }
    }

    function render() {
      renderExpensesList();
      renderPieChart();
      updateStats();
    }

    document.getElementById('add-btn').addEventListener('click', () => {
      const desc = document.getElementById('desc-input').value;
      const amount = document.getElementById('amount-input').value;
      if (desc && amount) {
        addExpense(desc, amount);
        document.getElementById('desc-input').value = '';
        document.getElementById('amount-input').value = '';
      }
    });

    document.getElementById('desc-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('add-btn').click();
    });

    render();
  </script>
</body>
</html>
