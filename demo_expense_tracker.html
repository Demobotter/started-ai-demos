<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      background: linear-gradient(135deg, #0a1428 0%, #1f0d3e 50%, #2a0845 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
      overflow-x: hidden;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

    /* Header */
    .header {
      grid-column: 1 / -1;
      text-align: center;
      margin-bottom: 20px;
    }
    .header h1 {
      font-size: 3rem;
      background: linear-gradient(90deg, #00d9ff 0%, #ff00ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .header p {
      font-size: 0.95rem;
      color: #aaa;
      font-style: italic;
    }

    /* Input Panel */
    .input-panel {
      background: rgba(26, 31, 58, 0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 217, 255, 0.3);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .input-group {
      display: flex;
      gap: 8px;
    }
    input[type="text"], input[type="number"] {
      flex: 1;
      padding: 10px 12px;
      background: rgba(10, 14, 39, 0.8);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 6px;
      color: #fff;
      font-size: 0.95rem;
      font-family: inherit;
    }
    input[type="text"]::placeholder, input[type="number"]::placeholder {
      color: #666;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      outline: none;
      border-color: #00d9ff;
      box-shadow: 0 0 8px rgba(0, 217, 255, 0.3);
    }
    button {
      padding: 10px 16px;
      background: linear-gradient(90deg, #00d9ff 0%, #00a8cc 100%);
      border: none;
      border-radius: 6px;
      color: #000;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 217, 255, 0.4);
    }
    button:active {
      transform: translateY(0);
    }

    /* Budget Section */
    .budget-section {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(255, 107, 107, 0.1);
      border-radius: 6px;
      border-left: 3px solid #ff6b6b;
    }
    .budget-section label {
      font-size: 0.85rem;
      color: #aaa;
      flex-shrink: 0;
    }
    .budget-section input {
      flex: 1;
    }
    .budget-alert {
      display: none;
      padding: 12px;
      background: rgba(255, 107, 107, 0.15);
      border: 1px solid #ff6b6b;
      border-radius: 6px;
      color: #ff9999;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .budget-alert.show {
      display: block;
      animation: pulse 0.5s ease-out;
    }
    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Stats */
    .stats {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }
    .stat-card {
      background: rgba(26, 31, 58, 0.5);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    .stat-label {
      font-size: 0.8rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #00d9ff;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* Pie Chart */
    .chart-container {
      background: rgba(26, 31, 58, 0.5);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1;
    }
    svg {
      width: 100%;
      height: 100%;
      max-width: 300px;
      filter: drop-shadow(0 0 12px rgba(0, 217, 255, 0.2));
    }
    .pie-slice {
      transition: filter 0.2s;
      cursor: pointer;
    }
    .pie-slice:hover {
      filter: brightness(1.2);
    }
    .pie-label {
      font-size: 10px;
      font-weight: 600;
      fill: #fff;
      pointer-events: none;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    /* Legend */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(0, 217, 255, 0.2);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
    }
    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }

    /* Expense List */
    .expense-list {
      background: rgba(26, 31, 58, 0.5);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 12px;
      padding: 20px;
    }
    .expense-list h3 {
      font-size: 1rem;
      margin-bottom: 12px;
      color: #00d9ff;
    }
    .expense-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .expense-item:last-child {
      border-bottom: none;
    }
    .expense-desc {
      flex: 1;
    }
    .expense-cat {
      font-size: 0.75rem;
      color: #aaa;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .expense-text {
      font-weight: 500;
    }
    .expense-amount {
      font-weight: 700;
      font-family: 'IBM Plex Mono', monospace;
      margin-right: 12px;
    }
    .expense-delete {
      background: rgba(255, 107, 107, 0.2);
      border: 1px solid #ff6b6b;
      color: #ff9999;
      padding: 6px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .expense-delete:hover {
      background: rgba(255, 107, 107, 0.3);
      box-shadow: 0 0 8px rgba(255, 107, 107, 0.3);
    }
    .empty-state {
      text-align: center;
      color: #666;
      padding: 20px;
      font-style: italic;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header h1 { font-size: 2rem; }
      .stat-value { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Expense Tracker</h1>
      <p>Log expenses, auto-categorize, track spending.</p>
    </div>

    <div class="input-panel">
      <div class="input-group">
        <input type="text" id="description" placeholder="What did you spend on?" value="">
        <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" value="">
        <button onclick="addExpense()">Add</button>
      </div>

      <div class="budget-section">
        <label>Monthly Budget:</label>
        <input type="number" id="budgetLimit" placeholder="500" min="0" step="1" value="500" onchange="checkBudget()">
      </div>

      <div class="budget-alert" id="budgetAlert">
        ⚠️ You've exceeded your monthly budget!
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total Spent</div>
        <div class="stat-value" id="totalSpent">$0.00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Expenses</div>
        <div class="stat-value" id="expenseCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Categories</div>
        <div class="stat-value" id="categoryCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Budget Remaining</div>
        <div class="stat-value" id="budgetRemaining">$500.00</div>
      </div>
    </div>

    <div class="chart-container">
      <div style="width: 100%; text-align: center;">
        <svg id="pieChart" viewBox="0 0 200 200" style="margin-bottom: 16px;">
          <circle cx="100" cy="100" r="80" fill="rgba(0, 217, 255, 0.1)" />
        </svg>
        <div class="legend" id="legend"></div>
      </div>
    </div>

    <div class="expense-list">
      <h3>Recent Expenses</h3>
      <div id="expenseItems" class="empty-state">No expenses yet. Add one above!</div>
    </div>
  </div>

  <script>
    const CATEGORIES = {
      food: { pattern: /coffee|lunch|breakfast|dinner|food|eat|burger|pizza|sushi|cafe|restaurant/, color: '#FF6B6B' },
      transport: { pattern: /gas|uber|lyft|taxi|bus|train|metro|parking|car|fuel/, color: '#4ECDC4' },
      entertainment: { pattern: /movie|netflix|spotify|gaming|game|concert|show|event/, color: '#95E1D3' },
      utilities: { pattern: /electricity|water|internet|phone|power|bill|gas bill/, color: '#FFD93D' },
      shopping: { pattern: /amazon|store|shop|mall|retail|clothing|clothes/, color: '#A8E6CF' },
      health: { pattern: /doctor|gym|medicine|pharmacy|health|dental|therapy/, color: '#FF8B94' },
      other: { pattern: null, color: '#B5B5B5' }
    };

    let expenses = JSON.parse(localStorage.getItem('expenses') || '[]');

    function detectCategory(desc) {
      const lower = desc.toLowerCase();
      for (const [cat, {pattern}] of Object.entries(CATEGORIES)) {
        if (pattern && pattern.test(lower)) return cat;
      }
      return 'other';
    }

    function addExpense() {
      const desc = document.getElementById('description').value.trim();
      const amt = parseFloat(document.getElementById('amount').value);
      if (!desc || isNaN(amt) || amt <= 0) {
        alert('Please enter a description and amount');
        return;
      }
      const cat = detectCategory(desc);
      expenses.unshift({ desc, amount: amt, category: cat, id: Date.now() });
      localStorage.setItem('expenses', JSON.stringify(expenses));
      document.getElementById('description').value = '';
      document.getElementById('amount').value = '';
      render();
      checkBudget();
    }

    function deleteExpense(id) {
      expenses = expenses.filter(e => e.id !== id);
      localStorage.setItem('expenses', JSON.stringify(expenses));
      render();
      checkBudget();
    }

    function render() {
      const total = expenses.reduce((sum, e) => sum + e.amount, 0);
      document.getElementById('totalSpent').textContent = '$' + total.toFixed(2);
      document.getElementById('expenseCount').textContent = expenses.length;

      const byCategory = {};
      for (const exp of expenses) {
        byCategory[exp.category] = (byCategory[exp.category] || 0) + exp.amount;
      }
      document.getElementById('categoryCount').textContent = Object.keys(byCategory).length;

      // Render pie chart
      renderPie(byCategory, total);

      // Render legend
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      for (const [cat, amt] of Object.entries(byCategory).sort((a, b) => b[1] - a[1])) {
        const pct = ((amt / total) * 100).toFixed(1);
        const color = CATEGORIES[cat].color;
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<div class="legend-color" style="background: ${color}"></div><span>${cat} ${pct}%</span>`;
        legend.appendChild(item);
      }

      // Render expense list
      const list = document.getElementById('expenseItems');
      if (expenses.length === 0) {
        list.className = 'empty-state';
        list.textContent = 'No expenses yet. Add one above!';
        return;
      }
      list.className = '';
      list.innerHTML = expenses.map(e => `
        <div class="expense-item">
          <div class="expense-desc">
            <div class="expense-cat">${e.category}</div>
            <div class="expense-text">${e.desc}</div>
          </div>
          <div class="expense-amount">$${e.amount.toFixed(2)}</div>
          <button class="expense-delete" onclick="deleteExpense(${e.id})">Delete</button>
        </div>
      `).join('');
    }

    function renderPie(byCategory, total) {
      const svg = document.getElementById('pieChart');
      svg.innerHTML = '<circle cx="100" cy="100" r="80" fill="rgba(0, 217, 255, 0.1)" />';

      if (total === 0) return;

      let angle = -90;
      for (const [cat, amt] of Object.entries(byCategory)) {
        const arcAngle = (amt / total) * 360;
        const startAngle = angle;
        const endAngle = angle + arcAngle;

        const x1 = 100 + 80 * Math.cos((startAngle * Math.PI) / 180);
        const y1 = 100 + 80 * Math.sin((startAngle * Math.PI) / 180);
        const x2 = 100 + 80 * Math.cos((endAngle * Math.PI) / 180);
        const y2 = 100 + 80 * Math.sin((endAngle * Math.PI) / 180);

        const large = arcAngle > 180 ? 1 : 0;
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', `M 100 100 L ${x1} ${y1} A 80 80 0 ${large} 1 ${x2} ${y2} Z`);
        path.setAttribute('fill', CATEGORIES[cat].color);
        path.setAttribute('class', 'pie-slice');
        svg.appendChild(path);

        // Label
        const midAngle = startAngle + arcAngle / 2;
        const lx = 100 + 50 * Math.cos((midAngle * Math.PI) / 180);
        const ly = 100 + 50 * Math.sin((midAngle * Math.PI) / 180);
        const pct = Math.round((amt / total) * 100);
        if (pct >= 5) {
          const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          label.setAttribute('x', lx);
          label.setAttribute('y', ly);
          label.setAttribute('class', 'pie-label');
          label.textContent = pct + '%';
          svg.appendChild(label);
        }

        angle = endAngle;
      }
    }

    function checkBudget() {
      const total = expenses.reduce((sum, e) => sum + e.amount, 0);
      const budget = parseFloat(document.getElementById('budgetLimit').value) || 0;
      const remaining = Math.max(0, budget - total);
      document.getElementById('budgetRemaining').textContent = '$' + remaining.toFixed(2);

      const alert = document.getElementById('budgetAlert');
      if (total > budget && budget > 0) {
        alert.classList.add('show');
      } else {
        alert.classList.remove('show');
      }
    }

    document.getElementById('description').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addExpense();
    });

    render();
    checkBudget();
  </script>
</body>
</html>
