<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loan Payoff Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f1628 0%, #1a1f3a 50%, #0f1628 100%);
      color: #e0e6ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(0, 217, 255, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 1;
    }
    .container {
      max-width: 1000px;
      width: 100%;
      position: relative;
      z-index: 2;
    }
    .hero {
      text-align: center;
      margin-bottom: 50px;
      animation: fadeInScale 0.6s ease-out;
    }
    .hero h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(32px, 8vw, 56px);
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #00d9ff 0%, #00f5ff 50%, #00d9ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 16px;
      color: #a0a8c8;
      font-weight: 500;
    }
    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      margin-bottom: 40px;
      animation: fadeIn 0.8s ease-out 0.1s both;
    }
    @media (max-width: 900px) {
      .content {
        grid-template-columns: 1fr;
        gap: 30px;
      }
    }
    .controls-card {
      background: rgba(26, 31, 58, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 0 30px rgba(0, 217, 255, 0.1);
    }
    .control-group {
      margin-bottom: 25px;
    }
    .control-group:last-child {
      margin-bottom: 0;
    }
    .control-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #00d9ff;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .control-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
    }
    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(0, 217, 255, 0.1);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d9ff 0%, #00f5ff 100%);
      cursor: pointer;
      box-shadow: 0 0 15px rgba(0, 217, 255, 0.5);
      transition: box-shadow 0.2s ease;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 25px rgba(0, 217, 255, 0.8);
    }
    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d9ff 0%, #00f5ff 100%);
      border: none;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(0, 217, 255, 0.5);
      transition: box-shadow 0.2s ease;
    }
    input[type="range"]::-moz-range-thumb:hover {
      box-shadow: 0 0 25px rgba(0, 217, 255, 0.8);
    }
    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      animation: fadeIn 0.8s ease-out 0.2s both;
    }
    @media (max-width: 900px) {
      .results-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
    .result-card {
      background: rgba(0, 217, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 217, 255, 0.3);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s ease;
    }
    .result-card:hover {
      border-color: rgba(0, 217, 255, 0.6);
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);
    }
    .result-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #a0a8c8;
      margin-bottom: 6px;
    }
    .result-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(18px, 5vw, 28px);
      font-weight: 700;
      color: #00f5ff;
    }
    .chart-container {
      background: rgba(26, 31, 58, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 0 30px rgba(0, 217, 255, 0.1);
      animation: fadeIn 0.8s ease-out 0.3s both;
    }
    .chart-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #00d9ff;
      margin-bottom: 20px;
    }
    svg {
      width: 100%;
      height: auto;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>💳 Loan Payoff Calculator</h1>
      <p>Visualize your loan payoff timeline with real-time calculations</p>
    </div>

    <div class="content">
      <div class="controls-card">
        <div class="control-group">
          <div class="control-label">
            <span>Loan Principal</span>
            <span class="control-value" id="principalValue">$100,000</span>
          </div>
          <input type="range" id="principal" min="10000" max="500000" value="100000" step="5000">
        </div>
        <div class="control-group">
          <div class="control-label">
            <span>Annual Interest Rate</span>
            <span class="control-value" id="rateValue">6.5%</span>
          </div>
          <input type="range" id="rate" min="0.5" max="12" value="6.5" step="0.1">
        </div>
        <div class="control-group">
          <div class="control-label">
            <span>Loan Term (Years)</span>
            <span class="control-value" id="termValue">30</span>
          </div>
          <input type="range" id="term" min="1" max="30" value="30" step="1">
        </div>
      </div>

      <div class="results-grid">
        <div class="result-card">
          <div class="result-label">Monthly Payment</div>
          <div class="result-value" id="monthlyPayment">$632</div>
        </div>
        <div class="result-card">
          <div class="result-label">Total Interest Paid</div>
          <div class="result-value" id="totalInterest">$128,000</div>
        </div>
        <div class="result-card">
          <div class="result-label">Total Amount Paid</div>
          <div class="result-value" id="totalPaid">$228,000</div>
        </div>
        <div class="result-card">
          <div class="result-label">Payoff Date</div>
          <div class="result-value" id="payoffDate">Jun 2054</div>
        </div>
      </div>
    </div>

    <div class="chart-container">
      <div class="chart-title">Amortization Curve</div>
      <svg id="amortizationChart" viewBox="0 0 600 300" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="principalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0.8" />
            <stop offset="100%" style="stop-color:#00d9ff;stop-opacity:0.1" />
          </linearGradient>
          <linearGradient id="interestGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:0.8" />
            <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:0.1" />
          </linearGradient>
        </defs>
        <!-- Grid -->
        <g stroke="rgba(0,217,255,0.1)" stroke-width="1">
          <line x1="40" y1="50" x2="570" y2="50" />
          <line x1="40" y1="125" x2="570" y2="125" />
          <line x1="40" y1="200" x2="570" y2="200" />
          <line x1="40" y1="275" x2="570" y2="275" />
        </g>
        <!-- Axes -->
        <line x1="40" y1="275" x2="570" y2="275" stroke="rgba(0,217,255,0.3)" stroke-width="2" />
        <line x1="40" y1="50" x2="40" y2="275" stroke="rgba(0,217,255,0.3)" stroke-width="2" />
        <!-- Labels -->
        <text x="20" y="280" font-family="Inter" font-size="12" fill="#a0a8c8" text-anchor="end">0</text>
        <text x="570" y="280" font-family="Inter" font-size="12" fill="#a0a8c8">30yr</text>
        <text x="35" y="45" font-family="Inter" font-size="12" fill="#a0a8c8" text-anchor="end">Max</text>
        <!-- Stacked area chart (principal + interest over term) -->
        <path id="principalPath" fill="url(#principalGrad)" />
        <path id="interestPath" fill="url(#interestGrad)" />
      </svg>
    </div>
  </div>

  <script>
    const principalInput = document.getElementById('principal');
    const rateInput = document.getElementById('rate');
    const termInput = document.getElementById('term');
    
    const principalValue = document.getElementById('principalValue');
    const rateValue = document.getElementById('rateValue');
    const termValue = document.getElementById('termValue');
    
    const monthlyPaymentDisplay = document.getElementById('monthlyPayment');
    const totalInterestDisplay = document.getElementById('totalInterest');
    const totalPaidDisplay = document.getElementById('totalPaid');
    const payoffDateDisplay = document.getElementById('payoffDate');

    function calculateLoan() {
      const principal = parseFloat(principalInput.value);
      const annualRate = parseFloat(rateInput.value);
      const years = parseFloat(termInput.value);
      
      const monthlyRate = annualRate / 100 / 12;
      const numPayments = years * 12;
      
      // Monthly payment formula: P * (r(1+r)^n) / ((1+r)^n - 1)
      const monthlyPayment = principal * 
        (monthlyRate * Math.pow(1 + monthlyRate, numPayments)) / 
        (Math.pow(1 + monthlyRate, numPayments) - 1);
      
      const totalPaid = monthlyPayment * numPayments;
      const totalInterest = totalPaid - principal;
      
      // Update display
      principalValue.textContent = '$' + principal.toLocaleString();
      rateValue.textContent = annualRate.toFixed(1) + '%';
      termValue.textContent = years.toFixed(0);
      
      monthlyPaymentDisplay.textContent = '$' + monthlyPayment.toFixed(0).toLocaleString();
      totalInterestDisplay.textContent = '$' + totalInterest.toFixed(0).toLocaleString();
      totalPaidDisplay.textContent = '$' + totalPaid.toFixed(0).toLocaleString();
      
      // Payoff date
      const now = new Date();
      const payoffDate = new Date(now.getFullYear() + years, now.getMonth(), now.getDate());
      payoffDateDisplay.textContent = payoffDate.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
      
      // Draw amortization curve
      drawAmortizationChart(principal, monthlyRate, numPayments, monthlyPayment);
      
      return { monthlyPayment, totalInterest, totalPaid, monthlyRate, numPayments };
    }

    function drawAmortizationChart(principal, monthlyRate, numPayments, monthlyPayment) {
      const chartWidth = 530;
      const chartHeight = 225;
      const startX = 40;
      const startY = 275;
      
      let principalRemaining = principal;
      let principalPoints = [];
      let interestPoints = [];
      
      for (let i = 0; i <= numPayments; i++) {
        const x = startX + (i / numPayments) * chartWidth;
        
        // Calculate payment split
        const interestPayment = principalRemaining * monthlyRate;
        const principalPayment = Math.max(0, monthlyPayment - interestPayment);
        principalRemaining = Math.max(0, principalRemaining - principalPayment);
        
        // Normalize to chart height
        const principalY = startY - (principalRemaining / principal) * chartHeight;
        const totalY = startY - ((principal - principalRemaining + (principal - principalRemaining) * 0.3) / principal) * chartHeight;
        
        principalPoints.push([x, principalY]);
        interestPoints.push([x, totalY]);
      }
      
      // Create SVG paths
      let principalPath = `M ${startX} ${startY}`;
      principalPoints.forEach((p, i) => {
        if (i === 0) principalPath += ` L ${p[0]} ${p[1]}`;
        else principalPath += ` L ${p[0]} ${p[1]}`;
      });
      principalPath += ` L ${startX + chartWidth} ${startY} Z`;
      
      let interestPath = `M ${startX} ${startY}`;
      interestPoints.forEach((p, i) => {
        if (i === 0) interestPath += ` L ${p[0]} ${p[1]}`;
        else interestPath += ` L ${p[0]} ${p[1]}`;
      });
      interestPath += ` L ${startX + chartWidth} ${startY} Z`;
      
      document.getElementById('principalPath').setAttribute('d', principalPath);
      document.getElementById('interestPath').setAttribute('d', interestPath);
    }

    // Event listeners
    principalInput.addEventListener('input', calculateLoan);
    rateInput.addEventListener('input', calculateLoan);
    termInput.addEventListener('input', calculateLoan);

    // Initial calculation
    calculateLoan();
  </script>
</body>
</html>
