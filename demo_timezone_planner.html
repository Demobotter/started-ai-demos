<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timezone Planner — Meet Across the World</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e8f4f8 0%, #d4e9f0 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
            color: #1a2332;
        }
        
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .hero {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 1rem;
            animation: fadeDown 0.6s ease-out;
        }
        
        h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #00bcd4;
        }
        
        .tagline {
            font-size: 1.1rem;
            color: #666;
            font-weight: 500;
        }
        
        .map-section {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 188, 212, 0.1);
            animation: fadeUp 0.6s ease-out 0.1s both;
        }
        
        .sidebar {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 188, 212, 0.1);
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.6s ease-out 0.2s both;
        }
        
        .add-person {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid #f0f0f0;
        }
        
        input, select {
            padding: 0.75rem;
            border: 2px solid #e8f4f8;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #00bcd4;
            box-shadow: 0 0 0 3px rgba(0, 188, 212, 0.1);
        }
        
        button {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #00bcd4 0%, #0097a7 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            grid-column: 1 / -1;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 188, 212, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .people-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        
        .person-card {
            background: linear-gradient(135deg, #e8f4f8 0%, #d4e9f0 100%);
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid #00bcd4;
            animation: slideIn 0.3s ease-out;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .person-card:hover {
            background: linear-gradient(135deg, #d4e9f0 0%, #b8dfe8 100%);
        }
        
        .person-name {
            font-weight: 600;
            color: #1a2332;
            margin-bottom: 0.3rem;
        }
        
        .person-time {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.95rem;
            color: #00bcd4;
            font-weight: 600;
        }
        
        .person-tz {
            font-size: 0.8rem;
            color: #999;
            margin-top: 0.3rem;
        }
        
        .map-canvas {
            width: 100%;
            height: 300px;
            background: linear-gradient(180deg, #e8f4f8 0%, #d4e9f0 100%);
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border: 2px solid #c0dfe8;
        }
        
        .timeline-section {
            grid-column: 1 / -1;
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 188, 212, 0.1);
            animation: fadeUp 0.6s ease-out 0.3s both;
        }
        
        .timeline-label {
            font-weight: 700;
            color: #1a2332;
            margin-bottom: 1rem;
        }
        
        .timeline {
            position: relative;
            height: 180px;
            background: #f8fafb;
            border-radius: 8px;
            border: 2px solid #e8f4f8;
            padding: 0.5rem;
        }
        
        .timeline-hours {
            display: grid;
            grid-template-columns: repeat(24, 1fr);
            height: 100%;
            position: relative;
        }
        
        .hour-mark {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            font-size: 0.7rem;
            color: #ccc;
            padding-bottom: 0.25rem;
        }
        
        .now-line {
            position: absolute;
            width: 2px;
            height: 100%;
            background: #ff6b6b;
            top: 0;
            animation: pulse 2s infinite;
            z-index: 10;
        }
        
        .person-bar {
            position: absolute;
            height: 1.5rem;
            background: linear-gradient(90deg, #00bcd4 0%, #0097a7 100%);
            border-radius: 4px;
            opacity: 0.7;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: white;
            overflow: hidden;
        }
        
        .person-bar:hover {
            opacity: 1;
            box-shadow: 0 4px 12px rgba(0, 188, 212, 0.4);
        }
        
        .overlap-zone {
            position: absolute;
            height: 100%;
            background: rgba(76, 175, 80, 0.2);
            border-left: 2px solid #4caf50;
            border-right: 2px solid #4caf50;
            z-index: 5;
        }
        
        .meeting-info {
            margin-top: 1rem;
            padding: 1rem;
            background: linear-gradient(135deg, #f1f8e9 0%, #e8f5e9 100%);
            border-left: 4px solid #4caf50;
            border-radius: 8px;
            font-weight: 600;
            color: #2e7d32;
        }
        
        .no-people {
            text-align: center;
            color: #999;
            padding: 2rem;
            font-style: italic;
        }
        
        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
            
            .map-section, .sidebar, .timeline-section {
                grid-column: 1;
            }
        }
        
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>🌍 Timezone Planner</h1>
            <p class="tagline">Find the best time to meet across the world</p>
        </div>
        
        <div class="map-section">
            <h3 style="margin-bottom: 1rem; color: #00bcd4;">World Timezones</h3>
            <canvas class="map-canvas" id="mapCanvas"></canvas>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; font-size: 0.9rem;">
                <div>🌅 UTC-8</div>
                <div>🌍 UTC+0</div>
                <div>🌙 UTC+9</div>
            </div>
        </div>
        
        <div class="sidebar">
            <h3 style="margin-bottom: 1rem; color: #00bcd4;">Add People</h3>
            <div class="add-person">
                <input type="text" id="personName" placeholder="Name (e.g. Alice)">
                <select id="personTZ">
                    <option value="">Select timezone...</option>
                    <option value="America/New_York">America/New_York (UTC-5)</option>
                    <option value="America/Los_Angeles">America/Los_Angeles (UTC-8)</option>
                    <option value="Europe/London">Europe/London (UTC+0)</option>
                    <option value="Europe/Paris">Europe/Paris (UTC+1)</option>
                    <option value="Asia/Tokyo">Asia/Tokyo (UTC+9)</option>
                    <option value="Asia/Singapore">Asia/Singapore (UTC+8)</option>
                    <option value="Australia/Sydney">Australia/Sydney (UTC+10)</option>
                    <option value="Asia/Dubai">Asia/Dubai (UTC+4)</option>
                    <option value="America/Toronto">America/Toronto (UTC-5)</option>
                    <option value="Asia/Hong_Kong">Asia/Hong_Kong (UTC+8)</option>
                </select>
                <button onclick="addPerson()">+ Add Person</button>
            </div>
            
            <div class="people-list" id="peopleList">
                <div class="no-people">No people added. Start adding to see timezones.</div>
            </div>
        </div>
        
        <div class="timeline-section">
            <div class="timeline-label">24-Hour Meeting Timeline (UTC)</div>
            <div class="timeline" id="timeline">
                <div class="timeline-hours" id="timelineHours"></div>
                <div class="overlap-zone hidden" id="overlapZone"></div>
                <div class="now-line" id="nowLine"></div>
            </div>
            <div class="meeting-info" id="meetingInfo">
                Add people to see when they overlap
            </div>
        </div>
    </div>
    
    <script>
        const tzOffsets = {
            'America/New_York': -5,
            'America/Los_Angeles': -8,
            'Europe/London': 0,
            'Europe/Paris': 1,
            'Asia/Tokyo': 9,
            'Asia/Singapore': 8,
            'Australia/Sydney': 10,
            'Asia/Dubai': 4,
            'America/Toronto': -5,
            'Asia/Hong_Kong': 8,
        };
        
        let people = [];
        
        function initTimeline() {
            const hours = document.getElementById('timelineHours');
            hours.innerHTML = '';
            for (let i = 0; i < 24; i++) {
                const mark = document.createElement('div');
                mark.className = 'hour-mark';
                mark.textContent = i + ':00';
                hours.appendChild(mark);
            }
        }
        
        function getLocalTime(tzOffset) {
            const utc = new Date();
            const localTime = new Date(utc.getTime() + utc.getTimezoneOffset() * 60000 + tzOffset * 3600000);
            return localTime;
        }
        
        function formatTime(date) {
            const h = String(date.getHours()).padStart(2, '0');
            const m = String(date.getMinutes()).padStart(2, '0');
            return h + ':' + m;
        }
        
        function addPerson() {
            const name = document.getElementById('personName').value.trim();
            const tz = document.getElementById('personTZ').value;
            
            if (!name || !tz) {
                alert('Please enter a name and select a timezone');
                return;
            }
            
            const offset = tzOffsets[tz];
            people.push({ name, tz, offset });
            
            document.getElementById('personName').value = '';
            document.getElementById('personTZ').value = '';
            
            renderPeople();
            updateTimeline();
        }
        
        function renderPeople() {
            const list = document.getElementById('peopleList');
            
            if (people.length === 0) {
                list.innerHTML = '<div class="no-people">No people added. Start adding to see timezones.</div>';
                return;
            }
            
            list.innerHTML = '';
            people.forEach((person, idx) => {
                const card = document.createElement('div');
                card.className = 'person-card';
                const localTime = getLocalTime(person.offset);
                card.innerHTML = `
                    <div class="person-name">${person.name}</div>
                    <div class="person-time">${formatTime(localTime)}</div>
                    <div class="person-tz" style="display: flex; justify-content: space-between;">
                        <span>${person.tz}</span>
                        <button onclick="removePerson(${idx})" style="padding: 0.2rem 0.5rem; font-size: 0.8rem; background: #ff6b6b; margin: 0;">Remove</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }
        
        function removePerson(idx) {
            people.splice(idx, 1);
            renderPeople();
            updateTimeline();
        }
        
        function updateTimeline() {
            const timeline = document.getElementById('timelineHours');
            const oldBars = timeline.querySelectorAll('.person-bar');
            oldBars.forEach(bar => bar.remove());
            
            if (people.length === 0) {
                document.getElementById('meetingInfo').innerHTML = 'Add people to see when they overlap';
                document.getElementById('overlapZone').classList.add('hidden');
                return;
            }
            
            // Draw person bars (9-17 = working hours)
            const colors = ['#00bcd4', '#1db977', '#fb8c00', '#7e57c2', '#e53935', '#00897b', '#5e35b1', '#c62828'];
            people.forEach((person, idx) => {
                const startHour = (9 - person.offset + 24) % 24;
                const endHour = (17 - person.offset + 24) % 24;
                const width = endHour > startHour ? endHour - startHour : 24 - startHour + endHour;
                const left = (startHour / 24) * 100;
                const barWidth = (width / 24) * 100;
                
                const bar = document.createElement('div');
                bar.className = 'person-bar';
                bar.style.left = left + '%';
                bar.style.width = barWidth + '%';
                bar.style.background = colors[idx % colors.length];
                bar.textContent = person.name.charAt(0);
                bar.style.top = (idx * 1.8) + 'rem';
                timeline.appendChild(bar);
            });
            
            // Find overlap
            let overlapStart = 0;
            let overlapEnd = 24;
            
            people.forEach(person => {
                const startHour = (9 - person.offset + 24) % 24;
                const endHour = (17 - person.offset + 24) % 24;
                if (endHour > startHour) {
                    overlapStart = Math.max(overlapStart, startHour);
                    overlapEnd = Math.min(overlapEnd, endHour);
                } else {
                    // wraps around midnight
                    if (9 - person.offset >= 0) {
                        overlapStart = Math.max(overlapStart, startHour);
                    } else {
                        overlapEnd = Math.min(overlapEnd, endHour);
                    }
                }
            });
            
            if (overlapStart < overlapEnd) {
                const zone = document.getElementById('overlapZone');
                zone.classList.remove('hidden');
                zone.style.left = (overlapStart / 24) * 100 + '%';
                zone.style.width = ((overlapEnd - overlapStart) / 24) * 100 + '%';
                
                const startStr = String(Math.floor(overlapStart)).padStart(2, '0') + ':00';
                const endStr = String(Math.floor(overlapEnd)).padStart(2, '0') + ':00';
                document.getElementById('meetingInfo').innerHTML = `✅ <strong>Best meeting time:</strong> ${startStr} – ${endStr} UTC`;
            } else {
                document.getElementById('overlapZone').classList.add('hidden');
                document.getElementById('meetingInfo').innerHTML = '⚠️ No overlapping work hours found';
            }
        }
        
        function updateNowLine() {
            const now = new Date();
            const utcHour = now.getUTCHours() + now.getUTCMinutes() / 60;
            const left = (utcHour / 24) * 100;
            document.getElementById('nowLine').style.left = left + '%';
        }
        
        // Init
        initTimeline();
        updateNowLine();
        setInterval(updateNowLine, 60000);
    </script>
</body>
</html>
