<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timezone Meeting Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Geist', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0d1829 100%);
            color: #f0f0f0;
            overflow-x: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            animation: fadeInScale 0.6s ease-out;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.98);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(36px, 7vw, 56px);
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 16px;
            color: #a0a0a0;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .panel {
            background: rgba(20, 30, 60, 0.5);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 12px;
            padding: 28px;
            backdrop-filter: blur(10px);
            animation: slideUp 0.5s ease-out 0.1s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel h2 {
            font-family: 'Instrument Serif', serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00d9ff;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .team-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .team-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .team-row input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: #f0f0f0;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .team-row input:focus {
            outline: none;
            border-color: #00d9ff;
            background: rgba(0, 217, 255, 0.08);
            box-shadow: 0 0 12px rgba(0, 217, 255, 0.2);
        }

        .team-row input::placeholder {
            color: #606060;
        }

        select {
            padding: 10px 12px;
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: #f0f0f0;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        select:focus {
            outline: none;
            border-color: #00d9ff;
            box-shadow: 0 0 12px rgba(0, 217, 255, 0.2);
        }

        select option {
            background: #1a1f3a;
            color: #f0f0f0;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            background: rgba(255, 100, 100, 0.8);
            color: #fff;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            background: rgba(255, 100, 100, 1);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 100, 100, 0.3);
        }

        .add-btn {
            background: rgba(0, 255, 136, 0.8);
            color: #000;
            padding: 10px 20px;
            width: 100%;
            margin-top: 12px;
        }

        .add-btn:hover {
            background: rgba(0, 255, 136, 1);
        }

        .duration-input {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            margin-top: 16px;
        }

        .duration-input input {
            flex: 1;
            padding: 10px 12px;
        }

        .duration-input span {
            color: #a0a0a0;
            font-size: 12px;
            padding-bottom: 10px;
        }

        .grid-container {
            grid-column: 1 / -1;
            background: rgba(20, 30, 60, 0.5);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 12px;
            padding: 28px;
            backdrop-filter: blur(10px);
            animation: slideUp 0.5s ease-out 0.2s both;
        }

        .grid-container h2 {
            font-family: 'Instrument Serif', serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00d9ff;
            margin-bottom: 18px;
        }

        .timeline-grid {
            overflow-x: auto;
            padding: 10px 0;
        }

        .grid-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .grid-table td {
            padding: 8px 4px;
            text-align: center;
            border: 1px solid rgba(0, 217, 255, 0.1);
        }

        .grid-table .hour-header {
            background: rgba(0, 217, 255, 0.05);
            color: #00d9ff;
            font-weight: 600;
            padding: 12px 4px;
        }

        .grid-table .person-label {
            text-align: right;
            padding-right: 12px;
            background: rgba(20, 30, 60, 0.8);
            font-weight: 500;
            color: #00ff88;
            min-width: 80px;
        }

        .time-cell {
            width: 24px;
            min-width: 24px;
            height: 24px;
            border-radius: 3px;
            transition: all 0.2s ease;
        }

        .time-cell.available {
            background: rgba(0, 255, 136, 0.6);
        }

        .time-cell.unavailable {
            background: rgba(100, 100, 100, 0.3);
        }

        .time-cell.overlap {
            background: rgba(0, 217, 255, 0.8);
            box-shadow: 0 0 8px rgba(0, 217, 255, 0.5);
        }

        .results {
            margin-top: 20px;
            padding: 16px;
            background: rgba(0, 217, 255, 0.08);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 8px;
            font-size: 13px;
            color: #a0a0a0;
        }

        .results.found {
            background: rgba(0, 255, 136, 0.08);
            border-color: rgba(0, 255, 136, 0.3);
        }

        .results.found .slot {
            color: #00ff88;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: clamp(28px, 6vw, 40px);
            }

            .timeline-grid {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Timezone Meeting Planner</h1>
            <p class="subtitle">Find the perfect time for global teams</p>
        </header>

        <div class="content">
            <div class="panel">
                <h2>🌍 Team Members</h2>
                <div class="team-list" id="teamList">
                    <div class="team-row">
                        <input type="text" class="person-name" placeholder="Name (e.g., Alice)" value="Alice">
                        <select class="person-tz">
                            <option value="0">UTC ±0</option>
                            <option value="-8">PST (UTC -8)</option>
                            <option value="-5">EST (UTC -5)</option>
                            <option value="0">GMT (UTC +0)</option>
                            <option value="1">CET (UTC +1)</option>
                            <option value="5.5">IST (UTC +5:30)</option>
                            <option value="8">SGT (UTC +8)</option>
                            <option value="9">JST (UTC +9)</option>
                            <option value="11">AEDT (UTC +11)</option>
                        </select>
                        <button onclick="removeMember(0)">✕</button>
                    </div>
                    <div class="team-row">
                        <input type="text" class="person-name" placeholder="Name" value="Bob">
                        <select class="person-tz">
                            <option value="-8">PST (UTC -8)</option>
                            <option value="-5">EST (UTC -5)</option>
                            <option value="0">GMT (UTC +0)</option>
                            <option value="1">CET (UTC +1)</option>
                            <option value="5.5">IST (UTC +5:30)</option>
                            <option value="8">SGT (UTC +8)</option>
                            <option value="9">JST (UTC +9)</option>
                            <option value="11">AEDT (UTC +11)</option>
                        </select>
                        <button onclick="removeMember(1)">✕</button>
                    </div>
                    <div class="team-row">
                        <input type="text" class="person-name" placeholder="Name" value="Chen">
                        <select class="person-tz">
                            <option value="8">SGT (UTC +8)</option>
                            <option value="-8">PST (UTC -8)</option>
                            <option value="-5">EST (UTC -5)</option>
                            <option value="0">GMT (UTC +0)</option>
                            <option value="1">CET (UTC +1)</option>
                            <option value="5.5">IST (UTC +5:30)</option>
                            <option value="9">JST (UTC +9)</option>
                            <option value="11">AEDT (UTC +11)</option>
                        </select>
                        <button onclick="removeMember(2)">✕</button>
                    </div>
                </div>
                <button class="add-btn" onclick="addMember()">+ Add Member</button>

                <div class="duration-input">
                    <label style="color: #a0a0a0; font-size: 12px; flex: 1;">Meeting Duration (hours)</label>
                    <input type="number" id="duration" value="1" min="0.5" max="8" step="0.5" style="width: 60px;">
                </div>
            </div>

            <div class="panel">
                <h2>⏰ Quick Stats</h2>
                <div id="stats" style="color: #a0a0a0; line-height: 1.8;">
                    <p><strong>Team size:</strong> <span id="teamSize">3</span> people</p>
                    <p><strong>Timezones:</strong> <span id="tzSpread">—</span></p>
                    <p><strong>Awake window:</strong> 9am–5pm each</p>
                    <p style="margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(0, 217, 255, 0.2); color: #00ff88;">
                        <strong>Overlapping hours:</strong> <span id="overlapCount">—</span>
                    </p>
                </div>
            </div>

            <div class="grid-container">
                <h2>📅 24-Hour Availability Grid (UTC)</h2>
                <p style="font-size: 12px; color: #a0a0a0; margin-bottom: 12px;">🟢 = awake window · 🔵 = overlap found</p>
                <div class="timeline-grid">
                    <table class="grid-table" id="gridTable"></table>
                </div>
                <div class="results" id="results"></div>
            </div>
        </div>
    </div>

    <script>
        let team = [
            { name: 'Alice', tz: 0 },
            { name: 'Bob', tz: -5 },
            { name: 'Chen', tz: 8 }
        ];

        function addMember() {
            const panel = document.querySelector('.team-list');
            const idx = team.length;
            team.push({ name: '', tz: 0 });
            const row = document.createElement('div');
            row.className = 'team-row';
            row.innerHTML = '<input type="text" class="person-name" placeholder="Name"><select class="person-tz"><option value="0">UTC ±0</option><option value="-8">PST (UTC -8)</option><option value="-5">EST (UTC -5)</option><option value="0">GMT (UTC +0)</option><option value="1">CET (UTC +1)</option><option value="5.5">IST (UTC +5:30)</option><option value="8">SGT (UTC +8)</option><option value="9">JST (UTC +9)</option><option value="11">AEDT (UTC +11)</option></select><button onclick="removeMember(' + idx + ')">✕</button>';
            panel.appendChild(row);
            render();
        }

        function removeMember(idx) {
            team.splice(idx, 1);
            render();
        }

        function getTeamData() {
            const rows = document.querySelectorAll('.team-row');
            const updated = [];
            rows.forEach((row, idx) => {
                const name = row.querySelector('.person-name').value || ('Person ' + (idx+1));
                const tz = parseFloat(row.querySelector('.person-tz').value) || 0;
                updated.push({ name: name, tz: tz });
            });
            return updated;
        }

        function render() {
            team = getTeamData();
            document.getElementById('teamSize').textContent = team.length;
            
            const tzs = team.map(t => t.tz);
            const minTz = Math.min(...tzs);
            const maxTz = Math.max(...tzs);
            const spread = maxTz - minTz;
            document.getElementById('tzSpread').textContent = spread === 0 ? 'Same' : (spread + ' hours apart');

            renderGrid();
        }

        function renderGrid() {
            const duration = parseFloat(document.getElementById('duration').value) || 1;
            const grid = document.getElementById('gridTable');
            grid.innerHTML = '';

            // Header row with hours
            let headerHtml = '<tr><td class="person-label">Time (UTC)</td>';
            for (let h = 0; h < 24; h++) {
                headerHtml += '<td class="hour-header">' + h + '</td>';
            }
            headerHtml += '</tr>';
            grid.innerHTML += headerHtml;

            // Each person's row
            team.forEach(person => {
                let rowHtml = '<tr><td class="person-label">' + person.name + '</td>';
                for (let utcHour = 0; utcHour < 24; utcHour++) {
                    const localHour = (utcHour + person.tz) % 24;
                    const isAwake = localHour >= 9 && localHour < 17;
                    const cellClass = isAwake ? 'available' : 'unavailable';
                    rowHtml += '<td class="time-cell ' + cellClass + '"></td>';
                }
                rowHtml += '</tr>';
                grid.innerHTML += rowHtml;
            });

            // Overlap row
            let overlapHtml = '<tr><td class="person-label" style="color: #00ff88;">🔵 Overlap</td>';
            let overlapCount = 0;
            let overlapSlots = [];
            for (let utcHour = 0; utcHour <= 24 - Math.ceil(duration); utcHour++) {
                let allAwake = true;
                for (const person of team) {
                    for (let offset = 0; offset < duration; offset++) {
                        const checkHour = (utcHour + offset + person.tz) % 24;
                        if (checkHour < 9 || checkHour >= 17) {
                            allAwake = false;
                            break;
                        }
                    }
                    if (!allAwake) break;
                }
                if (allAwake) {
                    overlapCount++;
                    const endHour = (utcHour + duration) % 24;
                    overlapSlots.push(String(utcHour).padStart(2, '0') + ':00–' + String(Math.floor(endHour)).padStart(2, '0') + ':00');
                }
            }
            for (let h = 0; h < 24; h++) {
                const isOverlap = team.length > 0 && overlapSlots.some(slot => {
                    const start = parseInt(slot.split('–')[0]);
                    const end = parseInt(slot.split('–')[1].split(':')[0]);
                    return h >= start && h < end;
                });
                overlapHtml += '<td class="time-cell ' + (isOverlap ? 'overlap' : 'unavailable') + '"></td>';
            }
            overlapHtml += '</tr>';
            grid.innerHTML += overlapHtml;

            document.getElementById('overlapCount').textContent = overlapCount > 0 ? (overlapCount + ' slot(s) found') : 'None found';

            // Results
            const resultsDiv = document.getElementById('results');
            if (overlapCount > 0) {
                resultsDiv.className = 'results found';
                resultsDiv.innerHTML = '✅ <strong>' + overlapCount + '</strong> possible ' + duration + 'h meeting window(s): <br><span class="slot">' + overlapSlots.join(', ') + '</span>';
            } else {
                resultsDiv.className = 'results';
                resultsDiv.innerHTML = '❌ No overlapping awake hours found. Try expanding sleep windows or reducing meeting duration.';
            }
        }

        // Listen for changes
        document.addEventListener('change', render);
        document.addEventListener('input', render);

        render();
    </script>
</body>
</html>
