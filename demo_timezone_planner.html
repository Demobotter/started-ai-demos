<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timezone Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background: linear-gradient(135deg, #e8f4f8 0%, #f0f8fc 100%);
            color: #1a2332;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: clamp(32px, 5vw, 56px);
            margin-bottom: 10px;
            color: #1a2332;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .map-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .map-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1a2332;
        }

        .tz-map {
            width: 100%;
            height: 300px;
            background: linear-gradient(90deg, 
                #fff5cc 0%, #fff5cc 8%,    /* UTC-8 to -7 */
                #ffe8b6 8%, #ffe8b6 17%,   /* UTC-7 to -6 */
                #ffd6a0 17%, #ffd6a0 25%, /* UTC-6 to -5 */
                #ffcc99 25%, #ffcc99 33%, /* UTC-5 to -4 */
                #d4f1ff 33%, #d4f1ff 42%, /* UTC-4 to -1 */
                #c9e9ff 42%, #c9e9ff 50%, /* UTC-1 to 0 */
                #b3e0ff 50%, #b3e0ff 58%, /* UTC+0 to +1 */
                #9ed6ff 58%, #9ed6ff 67%, /* UTC+1 to +3 */
                #87cfff 67%, #87cfff 75%, /* UTC+3 to +5 */
                #6fc8ff 75%, #6fc8ff 83%, /* UTC+5 to +7 */
                #5ac0ff 83%, #5ac0ff 92%, /* UTC+7 to +9 */
                #48b8ff 92%, #48b8ff 100% /* UTC+9 to +12 */
            );
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "IBM Plex Mono", monospace;
            font-size: 12px;
            color: #1a2332;
            position: relative;
            overflow: hidden;
        }

        .tz-label {
            position: absolute;
            font-weight: 600;
            font-size: 13px;
        }

        .sidebar-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
        }

        .sidebar-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1a2332;
        }

        .add-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        input, select {
            padding: 10px 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: "Inter", sans-serif;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #00bcd4;
            box-shadow: 0 0 0 3px rgba(0, 188, 212, 0.1);
        }

        .add-btn {
            grid-column: 1 / -1;
            padding: 12px 16px;
            background: #00bcd4;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .add-btn:hover {
            background: #00acc1;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 188, 212, 0.3);
        }

        .people-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .person-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #f0f4f8 100%);
            border: 2px solid #e0e8f0;
            border-radius: 12px;
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            animation: slideIn 0.4s ease forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .person-card:hover {
            border-color: #00bcd4;
            box-shadow: 0 4px 12px rgba(0, 188, 212, 0.15);
        }

        .person-card.highlighted {
            background: linear-gradient(135deg, #b3e0ff 0%, #87cfff 100%);
            border-color: #00bcd4;
        }

        .person-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .person-name {
            font-weight: 600;
            font-size: 14px;
            color: #1a2332;
        }

        .person-time {
            font-family: "IBM Plex Mono", monospace;
            font-size: 14px;
            font-weight: 600;
            color: #00bcd4;
        }

        .person-tz {
            font-size: 12px;
            color: #999;
        }

        .remove-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .remove-btn:hover {
            background: #ff5252;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 14px;
        }

        .timeline-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 40px;
        }

        .timeline-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1a2332;
        }

        .timeline-wrapper {
            position: relative;
            height: 200px;
            background: #f9f9f9;
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
        }

        .timeline-scale {
            display: flex;
            position: relative;
            height: 100%;
            min-width: 100%;
        }

        .hour-block {
            flex: 1;
            min-width: 40px;
            border-right: 1px solid #eee;
            position: relative;
        }

        .hour-label {
            font-family: "IBM Plex Mono", monospace;
            font-size: 11px;
            color: #999;
            position: absolute;
            top: -20px;
            left: 4px;
        }

        .now-line {
            position: absolute;
            top: 0;
            width: 3px;
            height: 100%;
            background: #ff6b6b;
            animation: pulse 2s infinite;
            z-index: 10;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .work-bar {
            position: absolute;
            height: 40px;
            background: linear-gradient(90deg, #00bcd4, #00acc1);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: white;
            font-weight: 600;
            overflow: hidden;
            top: 60px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .work-bar:hover {
            box-shadow: 0 4px 12px rgba(0, 188, 212, 0.4);
        }

        .work-bar.bar0 { background: linear-gradient(90deg, #ff9999, #ff7777); }
        .work-bar.bar1 { background: linear-gradient(90deg, #99ff99, #77ff99); }
        .work-bar.bar2 { background: linear-gradient(90deg, #9999ff, #7777ff); }
        .work-bar.bar3 { background: linear-gradient(90deg, #ffff99, #ffff77); }
        .work-bar.bar4 { background: linear-gradient(90deg, #ff99ff, #ff77ff); }

        .overlap-zone {
            position: absolute;
            background: rgba(76, 175, 80, 0.2);
            border: 2px solid #4CAF50;
            border-radius: 4px;
            height: 40px;
            top: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: #2e7d32;
            z-index: 5;
        }

        .meeting-info {
            margin-top: 20px;
            padding: 16px;
            background: #f0fdf4;
            border-left: 4px solid #4CAF50;
            border-radius: 6px;
            font-size: 14px;
            color: #2e7d32;
        }

        .no-overlap {
            background: #fef3f2;
            border-left-color: #ff6b6b;
            color: #c41c1c;
        }

        @media (max-width: 900px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 28px;
            }
            .add-form {
                grid-template-columns: 1fr;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏰ Timezone Planner</h1>
        <p class="subtitle">Find the best time to meet across the world</p>

        <div class="content">
            <div class="map-section">
                <div class="map-title">World Time Zones</div>
                <div class="tz-map" id="tzMap">
                    <div class="tz-label" style="left: 4%; top: 50%; transform: translateY(-50%);">UTC-8</div>
                    <div class="tz-label" style="left: 12%; top: 50%; transform: translateY(-50%);">UTC-7</div>
                    <div class="tz-label" style="left: 21%; top: 50%; transform: translateY(-50%);">UTC-6</div>
                    <div class="tz-label" style="left: 29%; top: 50%; transform: translateY(-50%);">UTC-5</div>
                    <div class="tz-label" style="left: 38%; top: 50%; transform: translateY(-50%);">UTC-1</div>
                    <div class="tz-label" style="left: 46%; top: 50%; transform: translateY(-50%);">UTC+0</div>
                    <div class="tz-label" style="left: 54%; top: 50%; transform: translateY(-50%);">UTC+1</div>
                    <div class="tz-label" style="left: 63%; top: 50%; transform: translateY(-50%);">UTC+3</div>
                    <div class="tz-label" style="left: 71%; top: 50%; transform: translateY(-50%);">UTC+5</div>
                    <div class="tz-label" style="left: 79%; top: 50%; transform: translateY(-50%);">UTC+7</div>
                    <div class="tz-label" style="left: 87%; top: 50%; transform: translateY(-50%);">UTC+9</div>
                    <div class="tz-label" style="left: 96%; top: 50%; transform: translateY(-50%);">UTC+12</div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">Add People</div>
                <div class="add-form">
                    <input type="text" id="nameInput" placeholder="Name" maxlength="20">
                    <select id="tzSelect">
                        <option value="">Select Timezone</option>
                        <option value="UTC-8">America/Los_Angeles (UTC-8)</option>
                        <option value="UTC-7">America/Denver (UTC-7)</option>
                        <option value="UTC-6">America/Chicago (UTC-6)</option>
                        <option value="UTC-5">America/New_York (UTC-5)</option>
                        <option value="UTC-4">America/Toronto (UTC-4)</option>
                        <option value="UTC+0">Europe/London (UTC+0)</option>
                        <option value="UTC+1">Europe/Paris (UTC+1)</option>
                        <option value="UTC+2">Europe/Istanbul (UTC+2)</option>
                        <option value="UTC+3">Asia/Moscow (UTC+3)</option>
                        <option value="UTC+5">Asia/Karachi (UTC+5)</option>
                        <option value="UTC+5:30">Asia/Kolkata (UTC+5:30)</option>
                        <option value="UTC+7">Asia/Bangkok (UTC+7)</option>
                        <option value="UTC+8">Asia/Singapore (UTC+8)</option>
                        <option value="UTC+9">Asia/Tokyo (UTC+9)</option>
                        <option value="UTC+10">Australia/Sydney (UTC+10)</option>
                        <option value="UTC+12">Pacific/Auckland (UTC+12)</option>
                    </select>
                    <button class="add-btn" onclick="addPerson()">Add Person</button>
                </div>
                <div class="people-list" id="peopleList">
                    <div class="empty-state">Add people to get started</div>
                </div>
            </div>
        </div>

        <div class="timeline-section">
            <div class="timeline-title">24-Hour Meeting Timeline (UTC)</div>
            <div class="timeline-wrapper">
                <div class="timeline-scale" id="timeline">
                    <div class="now-line" id="nowLine" style="left: 0;"></div>
                </div>
            </div>
            <div class="meeting-info" id="meetingInfo">Add people to see meeting times</div>
        </div>
    </div>

    <script>
        const people = {};
        let nextId = 0;

        function parseUTC(utcStr) {
            const match = utcStr.match(/UTC([+-])(\d+)(?::(\d+))?/);
            if (!match) return 0;
            const sign = match[1] === '+' ? 1 : -1;
            const hours = parseInt(match[2]);
            const minutes = match[3] ? parseInt(match[3]) : 0;
            return sign * (hours + minutes / 60);
        }

        function getCurrentUTC() {
            return new Date().getUTCHours() + new Date().getUTCMinutes() / 60;
        }

        function getLocalTime(utcStr) {
            const offset = parseUTC(utcStr);
            const now = new Date();
            const utcHours = now.getUTCHours();
            const utcMinutes = now.getUTCMinutes();
            let localHours = utcHours + offset;
            let localMinutes = utcMinutes;
            
            while (localHours < 0) localHours += 24;
            while (localHours >= 24) localHours -= 24;
            
            return {
                hours: Math.floor(localHours),
                minutes: localMinutes,
                str: String(Math.floor(localHours)).padStart(2, '0') + ':' + String(localMinutes).padStart(2, '0')
            };
        }

        function getWorkHourRange(utcStr) {
            const offset = parseUTC(utcStr);
            // Assume 9am-5pm local time
            let workStart = 9 - offset;
            let workEnd = 17 - offset;
            
            while (workStart < 0) workStart += 24;
            while (workStart >= 24) workStart -= 24;
            while (workEnd < 0) workEnd += 24;
            while (workEnd >= 24) workEnd -= 24;
            
            return { start: workStart, end: workEnd };
        }

        function addPerson() {
            const name = document.getElementById('nameInput').value.trim();
            const tz = document.getElementById('tzSelect').value;
            
            if (!name || !tz) {
                alert('Please fill in both fields');
                return;
            }
            
            const id = nextId++;
            people[id] = { name, tz, id };
            
            document.getElementById('nameInput').value = '';
            document.getElementById('tzSelect').value = '';
            
            render();
        }

        function removePerson(id) {
            delete people[id];
            render();
        }

        function render() {
            renderPeopleList();
            renderTimeline();
        }

        function renderPeopleList() {
            const list = document.getElementById('peopleList');
            const peopleArray = Object.values(people);
            
            if (peopleArray.length === 0) {
                list.innerHTML = '<div class="empty-state">Add people to get started</div>';
                return;
            }
            
            list.innerHTML = peopleArray.map((p, i) => {
                const time = getLocalTime(p.tz);
                return `
                    <div class="person-card" onclick="highlightPerson(${p.id})">
                        <div class="person-info">
                            <div class="person-name">${p.name}</div>
                            <div class="person-time">${time.str}</div>
                            <div class="person-tz">${p.tz}</div>
                        </div>
                        <button class="remove-btn" onclick="event.stopPropagation(); removePerson(${p.id})">Remove</button>
                    </div>
                `;
            }).join('');
        }

        function highlightPerson(id) {
            // Could add highlight on timeline here
        }

        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            const scale = timeline.querySelector('.timeline-scale') || timeline;
            
            // Create hour blocks
            let html = '<div class="now-line" id="nowLine" style="left: 0;"></div>';
            for (let h = 0; h < 24; h++) {
                html += `<div class="hour-block"><div class="hour-label">${h}:00</div></div>`;
            }
            
            // Add work bars for each person
            const peopleArray = Object.values(people);
            peopleArray.forEach((p, i) => {
                const range = getWorkHourRange(p.tz);
                let startPx, widthPx;
                
                if (range.start <= range.end) {
                    startPx = (range.start / 24) * 100;
                    widthPx = ((range.end - range.start) / 24) * 100;
                } else {
                    startPx = (range.start / 24) * 100;
                    widthPx = ((24 - range.start + range.end) / 24) * 100;
                }
                
                html += `<div class="work-bar bar${i % 5}" style="left: ${startPx}%; width: ${widthPx}%;" title="${p.name}: ${getLocalTime(p.tz).str}">${p.name}</div>`;
            });
            
            // Calculate and show overlap
            if (peopleArray.length > 0) {
                const overlapRange = getOverlapRange();
                if (overlapRange) {
                    const { start, end } = overlapRange;
                    const startPx = (start / 24) * 100;
                    const widthPx = ((end - start) / 24) * 100;
                    html += `<div class="overlap-zone" style="left: ${startPx}%; width: ${widthPx}%;">Best Time</div>`;
                }
            }
            
            scale.innerHTML = html;
            updateNowLine();
        }

        function getOverlapRange() {
            const peopleArray = Object.values(people);
            if (peopleArray.length === 0) return null;
            
            const ranges = peopleArray.map(p => {
                const range = getWorkHourRange(p.tz);
                return { start: range.start, end: range.end };
            });
            
            let overlapStart = Math.max(...ranges.map(r => r.start));
            let overlapEnd = Math.min(...ranges.map(r => r.end));
            
            // Simple check: if all ranges overlap in a straightforward way
            if (overlapStart <= overlapEnd) {
                return { start: overlapStart, end: overlapEnd };
            }
            
            // For wrapping ranges, return null (no simple overlap)
            return null;
        }

        function updateNowLine() {
            const nowLine = document.getElementById('nowLine');
            if (nowLine) {
                const utc = getCurrentUTC();
                const leftPx = (utc / 24) * 100;
                nowLine.style.left = leftPx + '%';
            }
        }

        function updateMeetingInfo() {
            const peopleArray = Object.values(people);
            const info = document.getElementById('meetingInfo');
            
            if (peopleArray.length === 0) {
                info.textContent = 'Add people to see meeting times';
                info.classList.remove('no-overlap');
                return;
            }
            
            const overlap = getOverlapRange();
            if (overlap) {
                const startHour = Math.floor(overlap.start);
                const endHour = Math.ceil(overlap.end);
                info.textContent = `✓ Best meeting time: ${startHour}:00 — ${endHour}:00 UTC`;
                info.classList.remove('no-overlap');
            } else {
                info.textContent = '✗ No common working hours (9am-5pm local time). Consider extending hours or shifting schedules.';
                info.classList.add('no-overlap');
            }
        }

        // Tick every second
        setInterval(() => {
            renderPeopleList();
            updateNowLine();
        }, 1000);

        // Initial render
        render();
        updateMeetingInfo();
    </script>
</body>
</html>
