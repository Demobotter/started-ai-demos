<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seismic Explorer — Live Earthquake Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Sora', sans-serif;
      background: linear-gradient(135deg, #0f1419 0%, #1a2a3a 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: clamp(24px, 5vw, 40px);
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #52b788, #ffd60a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    .filter-btn {
      padding: 8px 14px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: #e0e0e0;
      border-radius: 6px;
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
    }

    .filter-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }

    .filter-btn.active {
      background: #52b788;
      border-color: #52b788;
      color: #0f1419;
    }

    #mapContainer {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .marker {
      position: absolute;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .marker:hover {
      transform: scale(1.3);
      filter: brightness(1.2);
    }

    #modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(5px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }

    #modal.show {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-card {
      background: linear-gradient(135deg, rgba(31,45,61,0.95), rgba(26,42,58,0.95));
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 30px;
      max-width: 400px;
      width: 90%;
      animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
      color: #e0e0e0;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-card h2 {
      font-size: 22px;
      margin-bottom: 15px;
      word-break: break-word;
    }

    .modal-card p {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      font-family: 'IBM Plex Mono', monospace;
    }

    .modal-card .label {
      color: #52b788;
      font-weight: 600;
    }

    .modal-card .usgs-link {
      margin-top: 20px;
    }

    .modal-card a {
      color: #ffd60a;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s;
    }

    .modal-card a:hover {
      text-decoration: underline;
    }

    .close-modal {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      color: #e0e0e0;
      font-size: 28px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .close-modal:hover {
      color: #ffd60a;
      transform: rotate(90deg);
    }

    footer {
      padding: 15px 20px;
      background: rgba(0,0,0,0.3);
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 12px;
      font-family: 'IBM Plex Mono', monospace;
      color: #888;
      text-align: center;
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 16px;
      color: #52b788;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @media (max-width: 600px) {
      h1 { font-size: 20px; }
      .controls { gap: 8px; }
      .filter-btn { padding: 6px 10px; font-size: 12px; }
      .modal-card { padding: 20px; max-width: 90%; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🌍 Seismic Explorer</h1>
    <p style="font-size: 14px; opacity: 0.7; margin-bottom: 10px;">Real-time global earthquakes (24h)</p>
    <div class="controls">
      <button class="filter-btn active" data-mag="all">All Magnitudes</button>
      <button class="filter-btn" data-mag="4.0">4.0+</button>
      <button class="filter-btn" data-mag="5.0">5.0+</button>
      <button class="filter-btn" data-mag="6.0">6.0+</button>
    </div>
  </header>

  <div id="mapContainer">
    <canvas id="mapCanvas"></canvas>
    <div class="loading" id="loading">Loading earthquakes…</div>
  </div>

  <div id="modal">
    <button class="close-modal" onclick="closeModal()">✕</button>
    <div class="modal-card" id="modalContent"></div>
  </div>

  <footer>
    <span id="lastUpdate">Last updated: —</span>
  </footer>

  <script>
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    const loading = document.getElementById('loading');
    const modal = document.getElementById('modal');

    let earthquakes = [];
    let filteredEarthquakes = [];
    let currentFilter = 'all';

    // Canvas setup
    function resizeCanvas() {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      drawMap();
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Fetch USGS data
    async function fetchEarthquakes() {
      try {
        const response = await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/significant_day.geojson');
        const data = await response.json();
        earthquakes = data.features.map(f => ({
          mag: f.properties.mag || 0,
          depth: f.properties.depth || 0,
          lat: f.geometry.coordinates[1],
          lng: f.geometry.coordinates[0],
          time: new Date(f.properties.time),
          title: f.properties.title,
          url: f.properties.url
        }));
        updateLastUpdate();
        loading.style.display = 'none';
        applyFilter(currentFilter);
      } catch (e) {
        console.error('Fetch failed:', e);
        loading.textContent = 'Failed to load earthquakes. Retrying in 10s…';
        setTimeout(fetchEarthquakes, 10000);
      }
    }

    function updateLastUpdate() {
      const now = new Date();
      document.getElementById('lastUpdate').textContent = `Last updated: ${now.toLocaleTimeString()} UTC`;
    }

    // Map drawing (simple mercator projection)
    function drawMap() {
      // Clear canvas
      ctx.fillStyle = 'rgba(15, 20, 25, 0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw grid
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= 18; i++) {
        const x = (canvas.width / 18) * i;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let i = 0; i <= 9; i++) {
        const y = (canvas.height / 9) * i;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }

      // Draw earthquakes
      filteredEarthquakes.forEach(eq => {
        const x = ((eq.lng + 180) / 360) * canvas.width;
        const y = ((90 - eq.lat) / 180) * canvas.height;
        const size = Math.max(3, eq.mag * 1.5);
        
        // Color by magnitude
        let color;
        if (eq.mag < 5) color = '#52b788';
        else if (eq.mag < 6) color = '#ffd60a';
        else if (eq.mag < 7) color = '#ff9500';
        else color = '#d62828';

        // Glow
        const gradient = ctx.createRadialGradient(x, y, 0, x, y, size * 2);
        gradient.addColorStop(0, color + '40');
        gradient.addColorStop(1, color + '00');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(x, y, size * 2, 0, Math.PI * 2);
        ctx.fill();

        // Main circle
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();

        // Store for click detection
        eq.canvasX = x;
        eq.canvasY = y;
        eq.canvasSize = size;
      });
    }

    // Filter handling
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentFilter = e.target.dataset.mag;
        applyFilter(currentFilter);
      });
    });

    function applyFilter(mag) {
      if (mag === 'all') {
        filteredEarthquakes = earthquakes;
      } else {
        const threshold = parseFloat(mag);
        filteredEarthquakes = earthquakes.filter(eq => eq.mag >= threshold);
      }
      drawMap();
    }

    // Click detection
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      for (let eq of filteredEarthquakes) {
        const dist = Math.sqrt((x - eq.canvasX) ** 2 + (y - eq.canvasY) ** 2);
        if (dist < eq.canvasSize * 3) {
          showModal(eq);
          return;
        }
      }
    });

    function showModal(eq) {
      const content = document.getElementById('modalContent');
      const timeStr = eq.time.toLocaleString('en-US', { timeZone: 'UTC' }) + ' UTC';
      content.innerHTML = `
        <h2>${eq.mag.toFixed(1)} magnitude</h2>
        <p><span class="label">Location:</span> ${eq.title}</p>
        <p><span class="label">Magnitude:</span> ${eq.mag.toFixed(2)}</p>
        <p><span class="label">Depth:</span> ${eq.depth.toFixed(1)} km</p>
        <p><span class="label">Latitude:</span> ${eq.lat.toFixed(2)}°</p>
        <p><span class="label">Longitude:</span> ${eq.lng.toFixed(2)}°</p>
        <p><span class="label">Time (UTC):</span> ${timeStr}</p>
        <div class="usgs-link">
          <a href="${eq.url}" target="_blank">View on USGS →</a>
        </div>
      `;
      modal.classList.add('show');
    }

    function closeModal() {
      modal.classList.remove('show');
    }

    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    // Auto-refresh every 60s
    setInterval(fetchEarthquakes, 60000);

    // Initial load
    fetchEarthquakes();
  </script>
</body>
</html>
