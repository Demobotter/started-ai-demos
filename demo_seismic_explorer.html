<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TREMOR — Live Earthquake Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700&family=Fraunces:opsz@9..144;wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #faf8f3;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #2a2a2a;
    }

    @supports (font-variation-settings: normal) {
      body {
        font-feature-settings: "ss01" 1;
      }
    }

    /* Hero + Header */
    header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 2rem;
      background: linear-gradient(180deg, #faf8f3 0%, #faf8f3 70%, transparent 100%);
      pointer-events: none;
    }

    header h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(32px, 7vw, 56px);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #d4604b 0%, #8b5cf6 50%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    header p {
      font-size: 0.9rem;
      color: #666;
      font-weight: 400;
      letter-spacing: 0.01em;
      text-transform: uppercase;
      animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
      opacity: 0;
    }

    /* Canvas */
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* Controls */
    .controls {
      position: absolute;
      bottom: 2rem;
      left: 2rem;
      right: 2rem;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      pointer-events: auto;
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
      opacity: 0;
    }

    .control-group {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    input, select, button {
      font-family: inherit;
      padding: 0.6rem 1rem;
      border: 2px solid #ddd;
      border-radius: 0.5rem;
      background: white;
      color: #2a2a2a;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #d4604b;
      box-shadow: 0 0 0 3px rgba(212, 96, 75, 0.1);
    }

    button {
      background: linear-gradient(135deg, #d4604b 0%, #8b5cf6 100%);
      color: white;
      border: none;
      font-weight: 600;
      padding: 0.7rem 1.5rem;
      cursor: pointer;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(212, 96, 75, 0.2);
    }

    button:active {
      transform: translateY(0);
    }

    /* Stats panel */
    .stats {
      position: absolute;
      top: 10rem;
      right: 2rem;
      z-index: 20;
      background: rgba(250, 248, 243, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid #ddd;
      border-radius: 1rem;
      padding: 1.5rem;
      min-width: 220px;
      animation: slideInRight 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
      opacity: 0;
    }

    .stat-item {
      margin-bottom: 1rem;
      font-size: 0.85rem;
    }

    .stat-item:last-child {
      margin-bottom: 0;
    }

    .stat-label {
      color: #999;
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
    }

    .stat-value {
      font-size: 1.4rem;
      font-family: 'Fraunces', serif;
      font-weight: 600;
      color: #d4604b;
    }

    /* Loading */
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      text-align: center;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #ddd;
      border-top-color: #d4604b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Mobile */
    @media (max-width: 768px) {
      header {
        padding: 1rem;
      }

      header h1 {
        font-size: clamp(24px, 8vw, 40px);
        margin-bottom: 0.3rem;
      }

      header p {
        font-size: 0.75rem;
      }

      .controls {
        bottom: 1rem;
        left: 1rem;
        right: 1rem;
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }

      .stats {
        top: auto;
        right: 1rem;
        bottom: 8rem;
        min-width: 180px;
        padding: 1rem;
      }

      input, select, button {
        padding: 0.5rem 0.75rem;
        font-size: 0.85rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>TREMOR</h1>
    <p>Live Earthquake Explorer — Real-time USGS seismic data</p>
  </header>

  <canvas id="canvas"></canvas>

  <div class="stats">
    <div class="stat-item">
      <div class="stat-label">Earthquakes (24h)</div>
      <div class="stat-value" id="quakeCount">—</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Largest (M)</div>
      <div class="stat-value" id="largestMag">—</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Latest Update</div>
      <div class="stat-value" id="lastUpdate">—</div>
    </div>
  </div>

  <div class="controls">
    <div class="control-group">
      <input type="text" id="searchInput" placeholder="Search location (e.g. California, Japan)" />
      <select id="minMag">
        <option value="2.5">Mag 2.5+</option>
        <option value="4.0">Mag 4.0+</option>
        <option value="5.0">Mag 5.0+</option>
        <option value="6.0">Mag 6.0+</option>
      </select>
      <button id="filterBtn">Filter</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Loading live earthquake data...</p>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const loadingEl = document.getElementById('loading');
    const searchInput = document.getElementById('searchInput');
    const minMagSelect = document.getElementById('minMag');
    const filterBtn = document.getElementById('filterBtn');
    const quakeCountEl = document.getElementById('quakeCount');
    const largestMagEl = document.getElementById('largestMag');
    const lastUpdateEl = document.getElementById('lastUpdate');

    let earthquakes = [];
    let filteredEarthquakes = [];
    let bounds = null;
    let dpr = window.devicePixelRatio || 1;

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);
    }

    function fetchEarthquakes() {
      loadingEl.style.display = 'block';
      fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_day.geojson')
        .then(r => r.json())
        .then(data => {
          earthquakes = data.features.map(f => ({
            mag: f.properties.mag,
            place: f.properties.place,
            time: new Date(f.properties.time),
            lat: f.geometry.coordinates[1],
            lng: f.geometry.coordinates[0],
            depth: f.geometry.coordinates[2]
          }));
          filterEarthquakes();
          computeBounds();
          loadingEl.style.display = 'none';
          animate();
        })
        .catch(e => {
          console.error('Fetch error:', e);
          loadingEl.textContent = 'Error loading data. Please try again.';
        });
    }

    function filterEarthquakes() {
      const minMag = parseFloat(minMagSelect.value);
      const search = searchInput.value.toLowerCase();
      filteredEarthquakes = earthquakes.filter(eq => {
        const magMatch = eq.mag >= minMag;
        const locMatch = !search || eq.place.toLowerCase().includes(search);
        return magMatch && locMatch;
      });
      updateStats();
    }

    function updateStats() {
      quakeCountEl.textContent = filteredEarthquakes.length;
      if (filteredEarthquakes.length > 0) {
        const largest = Math.max(...filteredEarthquakes.map(e => e.mag)).toFixed(1);
        largestMagEl.textContent = largest;
        const latest = new Date(filteredEarthquakes[0].time);
        lastUpdateEl.textContent = latest.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      } else {
        largestMagEl.textContent = '—';
        lastUpdateEl.textContent = '—';
      }
    }

    function computeBounds() {
      if (filteredEarthquakes.length === 0) {
        bounds = { minLat: -90, maxLat: 90, minLng: -180, maxLng: 180 };
        return;
      }
      bounds = {
        minLat: Math.min(...filteredEarthquakes.map(e => e.lat)),
        maxLat: Math.max(...filteredEarthquakes.map(e => e.lat)),
        minLng: Math.min(...filteredEarthquakes.map(e => e.lng)),
        maxLng: Math.max(...filteredEarthquakes.map(e => e.lng))
      };
      const latSpan = bounds.maxLat - bounds.minLat;
      const lngSpan = bounds.maxLng - bounds.minLng;
      const padding = 0.1;
      bounds.minLat -= latSpan * padding;
      bounds.maxLat += latSpan * padding;
      bounds.minLng -= lngSpan * padding;
      bounds.maxLng += lngSpan * padding;
    }

    function project(lat, lng) {
      const x = ((lng - bounds.minLng) / (bounds.maxLng - bounds.minLng)) * (canvas.width / dpr);
      const y = ((bounds.maxLat - lat) / (bounds.maxLat - bounds.minLat)) * (canvas.height / dpr);
      return { x, y };
    }

    function drawBackground() {
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height / dpr);
      gradient.addColorStop(0, '#faf8f3');
      gradient.addColorStop(1, '#f0ebe0');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);

      // Subtle grid
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.lineWidth = 1;
      const step = 40;
      for (let x = 0; x < canvas.width / dpr; x += step) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height / dpr);
        ctx.stroke();
      }
      for (let y = 0; y < canvas.height / dpr; y += step) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width / dpr, y);
        ctx.stroke();
      }
    }

    function drawEarthquakes() {
      filteredEarthquakes.forEach((eq, i) => {
        const { x, y } = project(eq.lat, eq.lng);
        const size = Math.max(2, eq.mag * 2);
        const hue = 180 - (eq.mag / 7) * 180; // Red for high mag, blue for low
        const color = `hsl(${hue}, 80%, 50%)`;

        // Outer glow
        ctx.fillStyle = `hsla(${hue}, 80%, 50%, 0.2)`;
        ctx.beginPath();
        ctx.arc(x, y, size * 1.5, 0, Math.PI * 2);
        ctx.fill();

        // Main circle
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();

        // Border
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.lineWidth = 1;
        ctx.stroke();
      });
    }

    function drawLabels() {
      ctx.font = '12px Bricolage Grotesque';
      ctx.fillStyle = '#2a2a2a';
      ctx.textAlign = 'center';

      // Show top 5 largest earthquakes with labels
      const topQuakes = filteredEarthquakes.slice().sort((a, b) => b.mag - a.mag).slice(0, 5);
      topQuakes.forEach(eq => {
        const { x, y } = project(eq.lat, eq.lng);
        const label = `M${eq.mag.toFixed(1)}`;
        const textX = x;
        const textY = y - (eq.mag * 2) - 10;
        ctx.fillText(label, textX, textY);
      });
    }

    function animate() {
      drawBackground();
      drawEarthquakes();
      drawLabels();
      requestAnimationFrame(animate);
    }

    filterBtn.addEventListener('click', () => {
      filterEarthquakes();
      computeBounds();
    });

    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        filterBtn.click();
      }
    });

    window.addEventListener('resize', () => {
      resizeCanvas();
      computeBounds();
    });

    resizeCanvas();
    fetchEarthquakes();
  </script>
</body>
</html>
