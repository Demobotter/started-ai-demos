<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Converter — Live FX Rates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e14;
      --card: rgba(15, 23, 35, 0.75);
      --line: rgba(255, 255, 255, 0.06);
      --text: #f0f4f9;
      --muted: #8a94a6;
      --accent: #00d9ff;
      --accent2: #ff6b9d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      overflow-x: hidden;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .dot {
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 0 0 var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 var(--accent); }
      70% { box-shadow: 0 0 0 8px rgba(0, 217, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 217, 255, 0); }
    }
    .sub {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .hero {
      margin-bottom: 32px;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }
    @media (max-width: 768px) {
      .controls { grid-template-columns: 1fr; }
    }
    .ctl {
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ctl label {
      font-size: 10px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .ctl input, .ctl select {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      transition: 0.15s;
    }
    .ctl input:focus, .ctl select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0, 217, 255, 0.1);
    }
    .result-box {
      background: linear-gradient(135deg, rgba(0, 217, 255, 0.1), rgba(255, 107, 157, 0.08));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 28px;
      text-align: center;
      animation: fadeIn 0.4s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .result-amount {
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .result-desc {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .rate-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    .rate-card {
      background: var(--card);
      backdrop-filter: blur(8px);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      transition: 0.2s;
    }
    .rate-card:hover {
      border-color: var(--accent);
      background: rgba(0, 217, 255, 0.05);
    }
    .rate-pair {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .rate-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .rate-time {
      font-size: 10px;
      color: var(--muted);
    }
    .status {
      font-size: 11px;
      color: var(--muted);
      margin-top: 16px;
    }
    .status.live {
      color: var(--accent);
    }
    button {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: 0.15s;
      font-size: 13px;
    }
    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1><span class="dot"></span>Currency Tracker</h1>
      <div class="sub">Real-time FX rates. Pick a base currency → see live exchange rates to major currencies. Updates every 30 seconds.</div>
    </div>

    <div class="controls">
      <div class="ctl">
        <label>Base Currency</label>
        <select id="base">
          <option value="USD">USD</option>
          <option value="EUR">EUR</option>
          <option value="GBP">GBP</option>
          <option value="JPY">JPY</option>
          <option value="AUD">AUD</option>
          <option value="CAD">CAD</option>
          <option value="CHF">CHF</option>
          <option value="INR">INR</option>
          <option value="SGD">SGD</option>
          <option value="HKD">HKD</option>
        </select>
      </div>
      <div class="ctl">
        <label>Amount</label>
        <input type="number" id="amount" value="100" min="0" step="0.01">
      </div>
      <div class="ctl">
        <label>&nbsp;</label>
        <button onclick="fetchRates()">🔄 Fetch Rates</button>
      </div>
    </div>

    <div id="result" style="display:none;">
      <div class="result-box">
        <div class="result-amount" id="resultAmount">—</div>
        <div class="result-desc" id="resultDesc"></div>
      </div>
    </div>

    <div class="rate-grid" id="rateGrid">
      <div style="text-align: center; color: var(--muted); font-size: 12px; grid-column: 1/-1;">Loading rates…</div>
    </div>

    <div class="status" id="status">Last update: never</div>
  </div>

  <script>
    const targets = ['USD', 'EUR', 'GBP', 'JPY', 'AUD', 'CAD', 'CHF', 'INR', 'CNY', 'MXN', 'KRW', 'BRL'];
    let lastUpdate = null;

    async function fetchRates() {
      const base = document.getElementById('base').value;
      const amount = parseFloat(document.getElementById('amount').value) || 0;
      const status = document.getElementById('status');
      status.innerHTML = '⏳ Fetching…';

      try {
        const res = await fetch(`https://api.frankfurter.app/latest?from=${base}&to=${targets.join(',')}`);
        if (!res.ok) throw new Error('API failed');
        const data = await res.json();
        const rates = data.rates;
        lastUpdate = new Date();

        // Show result
        if (amount > 0) {
          const resultDiv = document.getElementById('result');
          resultDiv.style.display = 'block';
          document.getElementById('resultAmount').textContent = `${(amount * rates['USD']).toFixed(2)} USD`;
          document.getElementById('resultDesc').textContent = `${amount} ${base} = ${(amount * rates['USD']).toFixed(2)} USD at current market rates`;
        }

        // Build rate cards
        const grid = document.getElementById('rateGrid');
        grid.innerHTML = '';
        targets.forEach(tgt => {
          if (tgt === base) return;
          const rate = rates[tgt] || 0;
          const card = document.createElement('div');
          card.className = 'rate-card';
          card.innerHTML = `
            <div class="rate-pair">${base} → ${tgt}</div>
            <div class="rate-value">${rate.toFixed(rate > 1000 ? 0 : 4)}</div>
            <div class="rate-time">1 ${base} = ${rate.toFixed(rate > 1000 ? 0 : 4)} ${tgt}</div>
          `;
          grid.appendChild(card);
        });

        status.textContent = `✓ Live (${lastUpdate.toLocaleTimeString()})`;
        status.classList.add('live');
      } catch (e) {
        status.textContent = '✗ Error fetching rates — retrying…';
        status.classList.remove('live');
        setTimeout(fetchRates, 2000);
      }
    }

    // Fetch on load and every 30 seconds
    fetchRates();
    setInterval(fetchRates, 30000);

    // Auto-fetch on dropdown change
    document.getElementById('base').addEventListener('change', fetchRates);
    document.getElementById('amount').addEventListener('change', fetchRates);
  </script>
</body>
</html>
