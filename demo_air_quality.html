<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Quality Now — Live AQI Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Sora', sans-serif;
            overflow-x: hidden;
        }

        body {
            background: radial-gradient(ellipse 120% 100% at 50% 0%, #1a1a2e, #0d0d1b);
            color: #e0e0e0;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 32px;
            animation: fadeInDown 0.8s cubic-bezier(.16,1,.3,1);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 8px;
            animation: fadeInDown 0.8s cubic-bezier(.16,1,.3,1) 0.1s both;
        }

        .header h1 {
            font-size: clamp(36px, 8vw, 72px);
            font-weight: 700;
            background: linear-gradient(135deg, #52b788 0%, #a3c14a 50%, #ffd60a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 16px;
            color: #a0a0b0;
            font-weight: 300;
        }

        /* Search Section */
        .search-section {
            display: flex;
            gap: 12px;
            justify-content: center;
            animation: fadeInDown 0.8s cubic-bezier(.16,1,.3,1) 0.2s both;
        }

        .search-input {
            padding: 14px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-family: 'Sora', sans-serif;
            font-size: 15px;
            color: #e0e0e0;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(.16,1,.3,1);
            width: 100%;
            max-width: 400px;
        }

        .search-input:focus {
            outline: none;
            border-color: rgba(82, 183, 136, 0.5);
            background: rgba(82, 183, 136, 0.1);
            box-shadow: 0 0 20px rgba(82, 183, 136, 0.2);
        }

        .search-input::placeholder {
            color: #606070;
        }

        .search-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #52b788, #40907b);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-family: 'Sora', sans-serif;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(.16,1,.3,1);
            white-space: nowrap;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(82, 183, 136, 0.25);
        }

        .search-btn:active {
            transform: translateY(0);
        }

        /* Main Content */
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
            animation: fadeInDown 0.8s cubic-bezier(.16,1,.3,1) 0.3s both;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        /* Gauge Section */
        .gauge-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
            background: rgba(30, 30, 50, 0.6);
            border: 1px solid rgba(82, 183, 136, 0.15);
            border-radius: 16px;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .gauge-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(82, 183, 136, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: pulseGlow 3s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .gauge-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 24px;
            z-index: 2;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        .gauge-value {
            text-align: center;
            animation: slideIn 0.6s cubic-bezier(.16,1,.3,1) 0.4s both;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .aqi-number {
            font-size: 56px;
            font-weight: 700;
            font-family: 'IBM Plex Mono', monospace;
            margin-bottom: 8px;
            transition: color 0.4s ease-out;
        }

        .aqi-label {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.4s ease-out;
        }

        .aqi-verdict {
            margin-top: 16px;
            font-size: 14px;
            color: #a0a0b0;
            font-weight: 300;
            max-width: 280px;
            line-height: 1.6;
        }

        .city-info {
            font-size: 13px;
            color: #707080;
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-family: 'IBM Plex Mono', monospace;
        }

        /* Pollutants Section */
        .pollutants {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
        }

        .pollutant-card {
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            backdrop-filter: blur(20px);
            transition: all 0.3s cubic-bezier(.16,1,.3,1);
            animation: fadeInUp 0.6s cubic-bezier(.16,1,.3,1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pollutant-card:nth-child(1) { animation-delay: 0.5s; }
        .pollutant-card:nth-child(2) { animation-delay: 0.6s; }
        .pollutant-card:nth-child(3) { animation-delay: 0.7s; }
        .pollutant-card:nth-child(4) { animation-delay: 0.8s; }

        .pollutant-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(82, 183, 136, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
        }

        .pollutant-name {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a0a0b0;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .pollutant-value {
            font-size: 24px;
            font-weight: 700;
            font-family: 'IBM Plex Mono', monospace;
            margin-bottom: 12px;
            color: #e0e0e0;
        }

        .pollutant-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .pollutant-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #52b788, #a3c14a);
            border-radius: 3px;
            width: 0;
            animation: barFill 1s cubic-bezier(.16,1,.3,1) forwards;
        }

        @keyframes barFill {
            from { width: 0; }
            to { width: var(--bar-width); }
        }

        .pollutant-unit {
            font-size: 11px;
            color: #707080;
            font-family: 'IBM Plex Mono', monospace;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #a0a0b0;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(82, 183, 136, 0.2);
            border-top-color: #52b788;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error State */
        .error {
            text-align: center;
            padding: 40px 20px;
            color: #d62828;
            font-size: 16px;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: #606070;
            letter-spacing: 0.5px;
        }

        .footer a {
            color: #52b788;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: #a3c14a;
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 32px;
            }

            .search-section {
                flex-direction: column;
                gap: 10px;
            }

            .search-input {
                max-width: 100%;
            }

            .gauge-section {
                padding: 24px;
            }

            .gauge-container {
                width: 160px;
                height: 160px;
            }

            .aqi-number {
                font-size: 42px;
            }

            .aqi-label {
                font-size: 15px;
            }

            .pollutant-card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Air Quality Now</h1>
            <p>Real-time pollution levels worldwide</p>
        </div>

        <div class="search-section">
            <input 
                type="text" 
                id="cityInput" 
                class="search-input" 
                placeholder="Enter city name (e.g., Melbourne, Delhi, Tokyo)"
                autocomplete="off"
            >
            <button class="search-btn" id="searchBtn">Search</button>
        </div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading Melbourne air quality...</p>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>Live data · <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> · Data updated every 15 minutes</p>
    </div>

    <script>
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const contentDiv = document.getElementById('content');

        const AQI_BANDS = [
            { min: 0, max: 20, label: 'Good', color: '#52b788', verdict: 'Air quality is excellent. Enjoy outdoor activities.' },
            { min: 20, max: 40, label: 'Fair', color: '#a3c14a', verdict: 'Air quality is acceptable. Most people can be active outdoors.' },
            { min: 40, max: 60, label: 'Moderate', color: '#ffd60a', verdict: 'Air quality is moderate. Some groups may experience health effects.' },
            { min: 60, max: 80, label: 'Poor', color: '#ff9500', verdict: 'Air quality is poor. Everyone may begin to experience health effects.' },
            { min: 80, max: 100, label: 'Very Poor', color: '#d62828', verdict: 'Air quality is very poor. Health warnings in effect.' },
            { min: 100, max: Infinity, label: 'Extremely Poor', color: '#8b2fc9', verdict: 'Air quality is hazardous. Avoid outdoor activities.' }
        ];

        function getAQIBand(aqi) {
            return AQI_BANDS.find(band => aqi >= band.min && aqi < band.max);
        }

        function drawGauge(canvas, aqi, band) {
            const ctx = canvas.getContext('2d');
            const size = canvas.offsetWidth;
            const radius = size / 2 - 20;
            const centerX = size / 2;
            const centerY = size / 2;

            canvas.width = size;
            canvas.height = size;

            // Background arc
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 12;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, Math.PI, 2 * Math.PI);
            ctx.stroke();

            // Fill arc (animated by CSS/JS)
            const maxAQI = 150;
            const fillAngle = Math.PI + (Math.PI * Math.min(aqi, maxAQI)) / maxAQI;
            
            ctx.strokeStyle = band.color;
            ctx.lineWidth = 12;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, Math.PI, fillAngle);
            ctx.stroke();

            // Center text (handled by HTML)
        }

        function showLoading() {
            contentDiv.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Fetching air quality data...</p>
                </div>
            `;
        }

        function showError(message) {
            contentDiv.innerHTML = `
                <div class="error">
                    <p>❌ ${message}</p>
                    <p style="font-size: 13px; margin-top: 8px; color: #a0a0b0;">Try another city or check your spelling.</p>
                </div>
            `;
        }

        async function fetchAirQuality(city) {
            try {
                showLoading();

                // Geocode the city
                const geoRes = await fetch(
                    `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en`
                );
                const geoData = await geoRes.json();

                if (!geoData.results || geoData.results.length === 0) {
                    showError(`City "${city}" not found. Try another location.`);
                    return;
                }

                const { latitude, longitude, name, country, admin1 } = geoData.results[0];

                // Fetch air quality
                const aqRes = await fetch(
                    `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${latitude}&longitude=${longitude}&current=pm10,pm2_5,ozone,nitrogen_dioxide,european_aqi&timezone=auto`
                );
                const aqData = await aqRes.json();

                const current = aqData.current;
                const aqi = Math.round(current.european_aqi);
                const pm25 = Math.round(current.pm2_5 * 10) / 10;
                const pm10 = Math.round(current.pm10 * 10) / 10;
                const o3 = Math.round(current.ozone * 10) / 10;
                const no2 = Math.round(current.nitrogen_dioxide * 10) / 10;

                const band = getAQIBand(aqi);
                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                contentDiv.innerHTML = `
                    <div class="content">
                        <div class="gauge-section">
                            <div class="gauge-container">
                                <canvas id="aqiCanvas"></canvas>
                            </div>
                            <div class="gauge-value">
                                <div class="aqi-number" style="color: ${band.color};">${aqi}</div>
                                <div class="aqi-label" style="color: ${band.color};">${band.label}</div>
                                <div class="aqi-verdict">${band.verdict}</div>
                                <div class="city-info">${name}${admin1 ? ', ' + admin1 : ''}, ${country}</div>
                                <div class="city-info" style="margin-top: 8px;">Updated ${time}</div>
                            </div>
                        </div>

                        <div class="pollutants">
                            <div class="pollutant-card">
                                <div class="pollutant-name">PM 2.5</div>
                                <div class="pollutant-value">${pm25}</div>
                                <div class="pollutant-bar-bg">
                                    <div class="pollutant-bar-fill" style="--bar-width: ${Math.min(pm25 / 35 * 100, 100)}%;"></div>
                                </div>
                                <div class="pollutant-unit">µg/m³</div>
                            </div>
                            <div class="pollutant-card">
                                <div class="pollutant-name">PM 10</div>
                                <div class="pollutant-value">${pm10}</div>
                                <div class="pollutant-bar-bg">
                                    <div class="pollutant-bar-fill" style="--bar-width: ${Math.min(pm10 / 50 * 100, 100)}%;"></div>
                                </div>
                                <div class="pollutant-unit">µg/m³</div>
                            </div>
                            <div class="pollutant-card">
                                <div class="pollutant-name">Ozone (O₃)</div>
                                <div class="pollutant-value">${o3}</div>
                                <div class="pollutant-bar-bg">
                                    <div class="pollutant-bar-fill" style="--bar-width: ${Math.min(o3 / 80 * 100, 100)}%;"></div>
                                </div>
                                <div class="pollutant-unit">µg/m³</div>
                            </div>
                            <div class="pollutant-card">
                                <div class="pollutant-name">NO₂</div>
                                <div class="pollutant-value">${no2}</div>
                                <div class="pollutant-bar-bg">
                                    <div class="pollutant-bar-fill" style="--bar-width: ${Math.min(no2 / 100 * 100, 100)}%;"></div>
                                </div>
                                <div class="pollutant-unit">µg/m³</div>
                            </div>
                        </div>
                    </div>
                `;

                // Draw gauge after content renders
                setTimeout(() => {
                    const canvas = document.getElementById('aqiCanvas');
                    if (canvas) drawGauge(canvas, aqi, band);
                }, 0);

            } catch (err) {
                console.error(err);
                showError('Error fetching air quality data. Please try again.');
            }
        }

        searchBtn.addEventListener('click', () => {
            const city = cityInput.value.trim();
            if (city) fetchAirQuality(city);
        });

        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const city = cityInput.value.trim();
                if (city) fetchAirQuality(city);
            }
        });

        // Load Melbourne on startup
        fetchAirQuality('Melbourne');
    </script>
</body>
</html>
