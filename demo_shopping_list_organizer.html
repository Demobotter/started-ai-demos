<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Shopping List — Auto-Organize & Share</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f3d0f; --surface:#1a4d2e; --txt:#f1f5f1; --txt-dim:#c1d1c1; 
    --accent:#52b788; --accent-dark:#2d6a4f; --accent-bright:#74d896;
    --border:rgba(82,183,136,.15); --glass:rgba(30,77,50,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:Karla,sans-serif;background:linear-gradient(135deg,var(--bg),var(--surface));color:var(--txt);overflow-x:hidden}
  .container{max-width:1000px;margin:0 auto;padding:24px 20px}
  header{margin-bottom:40px;animation:fadeInDown .6s cubic-bezier(.16,1,.3,1)}
  h1{font-size:clamp(32px,7vw,56px);font-weight:700;letter-spacing:-1px;margin-bottom:8px}
  .tagline{font-size:16px;color:var(--txt-dim);line-height:1.5}
  .hero-accent{display:inline-block;width:12px;height:12px;border-radius:50%;background:var(--accent-bright);margin-right:8px;animation:pulse 2s infinite}
  @keyframes fadeInDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(82,183,136,.6)}70%{box-shadow:0 0 0 12px rgba(82,183,136,0)}100%{box-shadow:0 0 0 0 rgba(82,183,136,0)}}
  
  .input-section{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:32px;animation:fadeInUp .6s .1s cubic-bezier(.16,1,.3,1) both}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  
  textarea{width:100%;min-height:120px;background:rgba(15,61,15,.5);border:1px solid var(--border);border-radius:12px;color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:14px;padding:16px;resize:vertical;outline:none;transition:border-color .2s}
  textarea:focus{border-color:var(--accent)}
  
  .btn-group{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
  button{padding:10px 20px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:10px;cursor:pointer;font-family:Karla,sans-serif;font-weight:500;font-size:14px;transition:.18s}
  button:hover{background:var(--accent);color:var(--bg)}
  button:active{transform:scale(.98)}
  button.primary{background:var(--accent);color:var(--bg)}
  button.primary:hover{background:var(--accent-bright)}
  
  .stats{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
  .stat-card{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:13px;text-align:center;min-width:100px}
  .stat-card .n{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:20px;color:var(--accent-bright);display:block;margin-bottom:4px}
  
  .categories{display:flex;flex-direction:column;gap:16px;animation:fadeInUp .6s .2s cubic-bezier(.16,1,.3,1) both}
  .category{background:var(--glass);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:.2s}
  .category-header{padding:16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;transition:background .2s}
  .category-header:hover{background:rgba(82,183,136,.05)}
  .category-icon{font-size:20px;margin-right:12px}
  .category-title{font-weight:600;font-size:15px;flex:1}
  .category-count{font-size:12px;color:var(--txt-dim)}
  .toggle{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:var(--accent);transition:transform .3s}
  .toggle.collapsed{transform:rotate(-90deg)}
  
  .category-content{padding:0 16px 16px;display:flex;flex-direction:column;gap:8px;max-height:500px;overflow-y:auto;animation:slideDown .3s cubic-bezier(.16,1,.3,1)}
  @keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:500px}}
  .category.collapsed .category-content{display:none}
  
  .item{display:flex;align-items:center;justify-content:space-between;padding:10px;background:rgba(15,61,15,.5);border-radius:8px;border:1px solid rgba(82,183,136,.1);transition:.15s}
  .item:hover{background:rgba(82,183,136,.08);border-color:var(--border)}
  .item-name{font-size:14px;flex:1}
  .item-remove{background:transparent;border:none;color:var(--txt-dim);cursor:pointer;padding:4px 8px;font-size:16px;transition:.15s}
  .item-remove:hover{color:#ff6b6b}
  
  .add-item{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:20px;margin-top:24px;animation:fadeInUp .6s .3s cubic-bezier(.16,1,.3,1) both}
  .add-item h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.5px}
  .add-form{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .add-form input{flex:1;min-width:150px;padding:10px 12px;background:rgba(15,61,15,.5);border:1px solid var(--border);border-radius:8px;color:var(--txt);font-family:Karla,sans-serif;outline:none;transition:border-color .2s}
  .add-form input:focus{border-color:var(--accent)}
  .add-form select{padding:10px 12px;background:rgba(15,61,15,.5);border:1px solid var(--border);border-radius:8px;color:var(--txt);font-family:Karla,sans-serif;cursor:pointer;outline:none}
  
  .export-section{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:20px;margin-top:24px;animation:fadeInUp .6s .4s cubic-bezier(.16,1,.3,1) both}
  .export-section h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.5px}
  .export-btns{display:flex;gap:10px;flex-wrap:wrap}
  
  .empty-state{text-align:center;padding:40px 20px;color:var(--txt-dim);font-size:14px}
  .empty-state-icon{font-size:40px;margin-bottom:12px;opacity:.6}
  
  @media(max-width:640px){
    .container{padding:16px 12px}
    h1{font-size:28px}
    .btn-group,.export-btns{flex-direction:column}
    button{width:100%}
    .stats{flex-direction:column}
  }
  
  @media(prefers-reduced-motion:reduce){
    *{animation:none !important;transition:none !important}
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><span class="hero-accent"></span>Smart Shopping</h1>
    <p class="tagline">Paste your list. We'll organize it by category. Add, remove, download, or share instantly.</p>
  </header>

  <div class="input-section">
    <label for="input" style="display:block;margin-bottom:8px;font-weight:500;font-size:14px">Paste or type your shopping items (one per line):</label>
    <textarea id="input" placeholder="apples&#10;chicken breast&#10;milk&#10;pasta&#10;frozen peas&#10;olive oil"></textarea>
    <div class="btn-group">
      <button class="primary" onclick="organize()">📋 Organize</button>
      <button onclick="document.getElementById('input').value=''">Clear</button>
    </div>
  </div>

  <div id="stats" style="display:none" class="stats">
    <div class="stat-card"><span class="n" id="stat-total">0</span>Items</div>
    <div class="stat-card"><span class="n" id="stat-cats">0</span>Categories</div>
  </div>

  <div id="output" style="display:none">
    <div id="categories-container" class="categories"></div>
    
    <div class="add-item">
      <h3>+ Add Item</h3>
      <div class="add-form">
        <input type="text" id="new-item-name" placeholder="Item name" autocomplete="off">
        <select id="new-item-cat">
          <option value="">Select category</option>
          <option value="Produce">Produce</option>
          <option value="Dairy">Dairy</option>
          <option value="Meat">Meat</option>
          <option value="Frozen">Frozen</option>
          <option value="Pantry">Pantry</option>
          <option value="Snacks">Snacks</option>
          <option value="Drinks">Drinks</option>
          <option value="Other">Other</option>
        </select>
        <button style="flex:0;padding:10px 16px" onclick="addItem()">+ Add</button>
      </div>
    </div>

    <div class="export-section">
      <h3>📤 Download or Copy</h3>
      <div class="export-btns">
        <button onclick="downloadText()">📝 .txt</button>
        <button onclick="downloadMarkdown()">📑 .md</button>
        <button onclick="downloadHTML()">🌐 .html</button>
        <button onclick="copyClipboard()">📋 Copy All</button>
      </div>
    </div>
  </div>

  <div id="empty" class="empty-state">
    <div class="empty-state-icon">🛒</div>
    <p>Paste your shopping list above to get started</p>
  </div>
</div>

<script>
const CATEGORIES = {
  Produce: ['apple','banana','carrot','lettuce','tomato','onion','potato','broccoli','spinach','kale','strawberry','orange','lemon','lime','grape','melon','peach','pear','celery','parsley','cilantro','basil','cucumber','zucchini','squash','pepper','bell pepper','eggplant','avocado','mushroom','blueberry','raspberry','blackberry'],
  Dairy: ['milk','yogurt','cheese','butter','cream','eggs','egg','cheddar','mozzarella','feta','parmesan','ricotta','sour cream','whipped cream'],
  Meat: ['chicken','beef','pork','fish','turkey','salmon','tuna','bacon','ham','ground meat','steak','ribs','lamb','sausage','hotdog','ground beef'],
  Frozen: ['frozen peas','ice cream','frozen pizza','frozen berries','frozen vegetables','frozen fries','frozen chicken','freezer'],
  Pantry: ['rice','pasta','flour','beans','canned','oil','vinegar','honey','sugar','salt','pepper','spice','nuts','almond','cashew','peanut','walnut','sesame','coconut','soy sauce','worcestershire','balsamic','olive oil','canola oil','vegetable oil','cornstarch','baking powder','yeast','bread','cereal','oats','granola','jam','peanut butter','jelly'],
  Snacks: ['chips','crackers','granola','popcorn','cookies','candy','chocolate','pretzel','trail mix','protein bar','fruit bar','jerky','hummus','nuts mix','granola bar'],
  Drinks: ['coffee','tea','juice','soda','cola','sprite','coke','milk','water','wine','beer','orange juice','apple juice','cranberry','lemonade','smoothie','coconut water','energy drink','gatorade','kombucha']
};

let items = [];

function categorize(text) {
  const lower = text.toLowerCase().trim();
  for (const [cat, keywords] of Object.entries(CATEGORIES)) {
    if (keywords.some(kw => lower.includes(kw))) {
      return cat;
    }
  }
  return 'Other';
}

function organize() {
  const text = document.getElementById('input').value;
  if (!text.trim()) {
    document.getElementById('output').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
    document.getElementById('stats').style.display = 'none';
    return;
  }
  
  items = text.split('\n')
    .map(line => line.trim())
    .filter(line => line.length > 0)
    .map(name => ({ name, cat: categorize(name), id: Math.random() }));
  
  items.sort((a, b) => {
    if (a.cat !== b.cat) return a.cat.localeCompare(b.cat);
    return a.name.localeCompare(b.name);
  });

  render();
}

function render() {
  const grouped = {};
  items.forEach(item => {
    if (!grouped[item.cat]) grouped[item.cat] = [];
    grouped[item.cat].push(item);
  });

  const cats = Object.keys(grouped).sort();
  const icons = { Produce: '🥬', Dairy: '🧀', Meat: '🥩', Frozen: '❄️', Pantry: '🥫', Snacks: '🍿', Drinks: '🥤', Other: '📦' };

  let html = '';
  cats.forEach(cat => {
    const list = grouped[cat];
    html += `
      <div class="category" id="cat-${cat}">
        <div class="category-header" onclick="toggleCat('${cat}')">
          <span class="category-icon">${icons[cat] || '📦'}</span>
          <span class="category-title">${cat}</span>
          <span class="category-count">${list.length}</span>
          <span class="toggle">▼</span>
        </div>
        <div class="category-content">
          ${list.map(item => `
            <div class="item">
              <span class="item-name">${item.name}</span>
              <button class="item-remove" onclick="removeItem('${item.id}')">×</button>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  });

  document.getElementById('categories-container').innerHTML = html;
  document.getElementById('stat-total').textContent = items.length;
  document.getElementById('stat-cats').textContent = cats.length;
  document.getElementById('output').style.display = 'block';
  document.getElementById('empty').style.display = 'none';
  document.getElementById('stats').style.display = 'flex';
}

function toggleCat(cat) {
  document.getElementById(`cat-${cat}`).classList.toggle('collapsed');
}

function removeItem(id) {
  items = items.filter(i => i.id !== parseFloat(id));
  render();
}

function addItem() {
  const name = document.getElementById('new-item-name').value;
  const cat = document.getElementById('new-item-cat').value;
  if (!name.trim()) return;
  
  const finalCat = cat || categorize(name);
  items.push({ name, cat: finalCat, id: Math.random() });
  items.sort((a, b) => {
    if (a.cat !== b.cat) return a.cat.localeCompare(b.cat);
    return a.name.localeCompare(b.name);
  });
  
  document.getElementById('new-item-name').value = '';
  document.getElementById('new-item-cat').value = '';
  render();
}

function downloadText() {
  let txt = items.map(i => `☐ ${i.name}`).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/plain,' + encodeURIComponent(txt);
  a.download = 'shopping-list.txt';
  a.click();
}

function downloadMarkdown() {
  const grouped = {};
  items.forEach(item => {
    if (!grouped[item.cat]) grouped[item.cat] = [];
    grouped[item.cat].push(item);
  });

  let md = '# Shopping List\n\n';
  Object.keys(grouped).sort().forEach(cat => {
    md += `## ${cat}\n${grouped[cat].map(i => `- [ ] ${i.name}`).join('\n')}\n\n`;
  });

  const a = document.createElement('a');
  a.href = 'data:text/markdown,' + encodeURIComponent(md);
  a.download = 'shopping-list.md';
  a.click();
}

function downloadHTML() {
  const grouped = {};
  items.forEach(item => {
    if (!grouped[item.cat]) grouped[item.cat] = [];
    grouped[item.cat].push(item);
  });

  let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Shopping List</title><style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:20px}.cat{margin-bottom:24px}h2{color:#2d6a4f;margin-bottom:12px}label{display:block;margin:8px 0;font-size:14px}</style></head><body><h1>Shopping List</h1>`;
  
  Object.keys(grouped).sort().forEach(cat => {
    html += `<div class="cat"><h2>${cat}</h2>${grouped[cat].map(i => `<label><input type="checkbox"> ${i.name}</label>`).join('')}</div>`;
  });
  
  html += '</body></html>';
  const a = document.createElement('a');
  a.href = 'data:text/html,' + encodeURIComponent(html);
  a.download = 'shopping-list.html';
  a.click();
}

function copyClipboard() {
  const txt = items.map(i => `☐ ${i.name}`).join('\n');
  navigator.clipboard.writeText(txt).then(() => {
    alert('Copied to clipboard!');
  });
}

document.getElementById('new-item-name').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') addItem();
});
</script>
</body>
</html>
