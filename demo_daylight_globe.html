<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>☀️ Daylight Around the World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: radial-gradient(ellipse at center, #1a2a4a 0%, #0a0f20 100%);
      color: #e8e8e8;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      max-width: 900px;
      width: 100%;
      animation: fadeIn 0.6s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .hero {
      text-align: center;
      margin-bottom: 40px;
      animation: slideDown 0.8s cubic-bezier(.16,1,.3,1);
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hero h1 {
      font-family: 'Sora', sans-serif;
      font-size: clamp(36px, 8vw, 56px);
      font-weight: 700;
      background: linear-gradient(135deg, #ffa500 0%, #ffff00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .hero p {
      font-size: 16px;
      color: #b0b8c8;
      font-weight: 400;
    }
    .search-section {
      margin-bottom: 40px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeIn 1s ease-out 0.2s both;
    }
    #cityInput {
      padding: 12px 16px;
      border: 2px solid #2a4a6a;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: #e8e8e8;
      font-family: inherit;
      font-size: 16px;
      flex: 1;
      max-width: 300px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    #cityInput:focus {
      outline: none;
      border-color: #ffa500;
      box-shadow: 0 0 12px rgba(255,165,0,0.3);
    }
    button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #ffa500, #ffff00);
      color: #1a2a4a;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(255,165,0,0.3);
    }
    button:active {
      transform: translateY(0);
    }
    .status {
      text-align: center;
      font-size: 14px;
      height: 20px;
      margin-bottom: 20px;
      animation: fadeIn 0.6s ease-out 0.1s both;
    }
    .status.success { color: #5dd65d; font-weight: 500; }
    .status.loading { color: #ffa500; font-weight: 500; }
    .status.error { color: #ff6b6b; font-weight: 500; }
    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 30px;
      animation: fadeIn 1s ease-out 0.3s both;
    }
    .arc-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    svg {
      filter: drop-shadow(0 4px 12px rgba(255,165,0,0.15));
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .stat-card {
      background: rgba(255,165,0,0.05);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,165,0,0.2);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      transition: all 0.3s;
    }
    .stat-card:hover {
      background: rgba(255,165,0,0.08);
      border-color: rgba(255,165,0,0.4);
      transform: translateY(-2px);
    }
    .stat-card .label {
      font-size: 13px;
      color: #8a9ac8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-size: 24px;
      font-weight: 600;
      color: #ffa500;
      font-family: 'Sora', sans-serif;
    }
    .now-status {
      text-align: center;
      font-size: 18px;
      font-weight: 500;
      color: #ffff00;
      margin-top: 20px;
    }
    @media (max-width: 768px) {
      .content {
        grid-template-columns: 1fr;
      }
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>☀️ Daylight Around the World</h1>
      <p>Live sunrise and sunset times for any city on Earth</p>
    </div>
    
    <div class="search-section">
      <input type="text" id="cityInput" placeholder="Enter city name..." value="Melbourne">
      <button onclick="searchCity()">Search</button>
    </div>
    
    <div class="status" id="status"></div>
    
    <div class="content">
      <div class="arc-section">
        <svg id="arcSVG" width="280" height="280" viewBox="0 0 280 280">
          <!-- Placeholder, filled by JS -->
        </svg>
        <div class="now-status" id="nowStatus"></div>
      </div>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="label">🌅 Sunrise</div>
          <div class="value" id="sunrise">—</div>
        </div>
        <div class="stat-card">
          <div class="label">🌇 Sunset</div>
          <div class="value" id="sunset">—</div>
        </div>
        <div class="stat-card">
          <div class="label">⏱️ Day Length</div>
          <div class="value" id="dayLength">—</div>
        </div>
        <div class="stat-card">
          <div class="label">📍 Location</div>
          <div class="value" id="location" style="font-size: 16px;">—</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Pure functions for headless testing
    function dayLengthMins(sunriseISO, sunsetISO) {
      if (!sunriseISO || !sunsetISO) return 0;
      const sunrise = new Date(sunriseISO);
      const sunset = new Date(sunsetISO);
      return Math.max(0, Math.round((sunset - sunrise) / 60000));
    }

    function arcProgress(now, sunriseISO, sunsetISO) {
      if (!sunriseISO || !sunsetISO) return 0;
      const sunrise = new Date(sunriseISO);
      const sunset = new Date(sunsetISO);
      const nowTime = new Date(now);
      if (nowTime < sunrise || nowTime > sunset) return nowTime > sunset ? 1 : 0;
      return Math.min(1, Math.max(0, (nowTime - sunrise) / (sunset - sunrise)));
    }

    function fmtDuration(mins) {
      if (mins < 0) mins = 0;
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return `${h}h ${m}m`;
    }

    function fmtTime(isoStr) {
      if (!isoStr) return '—';
      const d = new Date(isoStr);
      return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }

    // API fetch wrapper
    async function fetchCityData(city) {
      const status = document.getElementById('status');
      status.textContent = 'Searching...';
      status.className = 'status loading';
      
      try {
        // Geocode
        const geoResp = await fetch(
          `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`
        );
        const geoData = await geoResp.json();
        if (!geoData.results || !geoData.results[0]) {
          throw new Error('City not found');
        }
        const loc = geoData.results[0];
        const lat = loc.latitude;
        const lng = loc.longitude;
        const locName = `${loc.name}${loc.admin1 ? ', ' + loc.admin1 : ''}${loc.country ? ', ' + loc.country : ''}`;

        // Fetch sun times (daily forecast)
        const sunResp = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&daily=sunrise,sunset&timezone=auto`
        );
        const sunData = await sunResp.json();
        if (!sunData.daily || !sunData.daily.sunrise || !sunData.daily.sunrise[0]) {
          throw new Error('Could not fetch sun times');
        }
        const sunrise = sunData.daily.sunrise[0];
        const sunset = sunData.daily.sunset[0];
        const now = new Date();

        // Update UI
        document.getElementById('sunrise').textContent = fmtTime(sunrise);
        document.getElementById('sunset').textContent = fmtTime(sunset);
        document.getElementById('dayLength').textContent = fmtDuration(dayLengthMins(sunrise, sunset));
        document.getElementById('location').textContent = locName;

        // Update arc
        const progress = arcProgress(now, sunrise, sunset);
        drawArc(progress);

        // Update status
        const isDaytime = now >= new Date(sunrise) && now <= new Date(sunset);
        if (isDaytime) {
          const minsUntilSunset = Math.round((new Date(sunset) - now) / 60000);
          document.getElementById('nowStatus').textContent = `Daytime · ${fmtDuration(minsUntilSunset)} until sunset`;
        } else {
          const minsUntilSunrise = Math.round((new Date(sunrise) - now) / 60000);
          document.getElementById('nowStatus').textContent = `Nighttime · ${fmtDuration(minsUntilSunrise)} until sunrise`;
        }

        status.textContent = `✓ ${locName}`;
        status.className = 'status success';
      } catch (err) {
        status.textContent = `✗ ${err.message}`;
        status.className = 'status error';
      }
    }

    function drawArc(progress) {
      const svg = document.getElementById('arcSVG');
      svg.innerHTML = '';
      
      const cx = 140, cy = 140, r = 100;
      
      // Background arc
      const bgPath = `M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}`;
      const bgArc = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      bgArc.setAttribute('d', bgPath);
      bgArc.setAttribute('fill', 'none');
      bgArc.setAttribute('stroke', 'rgba(255,165,0,0.2)');
      bgArc.setAttribute('stroke-width', '8');
      bgArc.setAttribute('stroke-linecap', 'round');
      svg.appendChild(bgArc);
      
      // Progress arc
      const angle = progress * 180;
      const radians = (angle * Math.PI) / 180;
      const x = cx + r * Math.cos(Math.PI - radians);
      const y = cy - r * Math.sin(Math.PI - radians);
      const arc = angle > 90 ? 1 : 0;
      const progressPath = `M ${cx - r} ${cy} A ${r} ${r} 0 ${arc} 1 ${x} ${y}`;
      const progressArc = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      progressArc.setAttribute('d', progressPath);
      progressArc.setAttribute('fill', 'none');
      progressArc.setAttribute('stroke', 'url(#sunGradient)');
      progressArc.setAttribute('stroke-width', '8');
      progressArc.setAttribute('stroke-linecap', 'round');
      svg.appendChild(progressArc);
      
      // Gradient def
      const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
      const gradient = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
      gradient.setAttribute('id', 'sunGradient');
      gradient.setAttribute('x1', '0%');
      gradient.setAttribute('x2', '100%');
      const stop1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
      stop1.setAttribute('offset', '0%');
      stop1.setAttribute('stop-color', '#ff6b00');
      const stop2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
      stop2.setAttribute('offset', '100%');
      stop2.setAttribute('stop-color', '#ffff00');
      gradient.appendChild(stop1);
      gradient.appendChild(stop2);
      defs.appendChild(gradient);
      svg.appendChild(defs);
      
      // Sun dot
      const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      dot.setAttribute('cx', x);
      dot.setAttribute('cy', y);
      dot.setAttribute('r', '8');
      dot.setAttribute('fill', '#ffff00');
      dot.setAttribute('filter', 'drop-shadow(0 0 6px rgba(255,255,0,0.8))');
      svg.appendChild(dot);
    }

    function searchCity() {
      const city = document.getElementById('cityInput').value.trim();
      if (city) fetchCityData(city);
    }

    // Allow Enter key in input
    document.getElementById('cityInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchCity();
    });

    // Load default on page load
    window.addEventListener('load', () => {
      fetchCityData('Melbourne');
    });
  </script>
</body>
</html>
