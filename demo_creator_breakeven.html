<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Breakeven Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a0f2e 0%, #2d1b4e 50%, #1a3a52 100%);
            color: #f0f0f0;
            overflow-x: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            animation: fadeInScale 0.6s ease-out;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.98);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out 0.1s backwards;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(32px, 6vw, 56px);
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(120deg, #4efa3d 0%, #00d9ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 16px;
            color: #b0b0c0;
            font-weight: 500;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 32px;
            animation: slideUp 0.6s ease-out;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:nth-child(1) { animation-delay: 0.2s; }
        .card:nth-child(2) { animation-delay: 0.3s; }

        .control-group {
            margin-bottom: 28px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #00d9ff;
            margin-bottom: 8px;
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(to right, #4efa3d, #00d9ff);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4efa3d;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(78, 250, 61, 0.6);
            transition: all 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(78, 250, 61, 0.8);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4efa3d;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 12px rgba(78, 250, 61, 0.6);
            transition: all 0.2s;
        }

        input[type="range"]::-moz-range-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(78, 250, 61, 0.8);
        }

        .value-display {
            min-width: 70px;
            text-align: right;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: #4efa3d;
        }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-top: 40px;
            animation: fadeIn 0.6s ease-out 0.4s backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .metric {
            background: rgba(78, 250, 61, 0.1);
            border: 1px solid rgba(78, 250, 61, 0.3);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .metric:hover {
            background: rgba(78, 250, 61, 0.15);
            border-color: rgba(78, 250, 61, 0.6);
            transform: translateY(-4px);
        }

        .metric-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9090a0;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .metric-value {
            font-family: 'Syne', sans-serif;
            font-size: clamp(18px, 4vw, 28px);
            font-weight: 700;
            color: #4efa3d;
        }

        .metric.loss {
            background: rgba(255, 100, 100, 0.1);
            border-color: rgba(255, 100, 100, 0.3);
        }

        .metric.loss .metric-value {
            color: #ff6464;
        }

        .metric.loss:hover {
            background: rgba(255, 100, 100, 0.15);
            border-color: rgba(255, 100, 100, 0.6);
        }

        .chart-container {
            grid-column: 1 / -1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            min-height: 300px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            animation: slideUp 0.6s ease-out 0.5s backwards;
        }

        .bar {
            width: 12%;
            min-width: 30px;
            background: linear-gradient(to top, #4efa3d, #00d9ff);
            border-radius: 8px 8px 0 0;
            position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 -4px 16px rgba(78, 250, 61, 0.4);
        }

        .bar:hover {
            opacity: 0.8;
            transform: scaleY(1.05);
        }

        .bar.negative {
            background: linear-gradient(to top, #ff6464, #ff8888);
            box-shadow: 0 -4px 16px rgba(255, 100, 100, 0.4);
        }

        .bar-label {
            position: absolute;
            bottom: -24px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 11px;
            color: #b0b0c0;
            font-weight: 600;
        }

        .bar-value {
            position: absolute;
            top: -28px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: #4efa3d;
            white-space: nowrap;
        }

        .bar.negative .bar-value {
            color: #ff6464;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 16px;
            }

            .card {
                padding: 20px;
            }

            h1 {
                font-size: 28px;
            }

            .results {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .chart-container {
                min-height: 250px;
                padding: 16px;
            }

            .bar {
                min-width: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Creator Breakeven</h1>
            <p class="subtitle">Your path to profit</p>
        </header>

        <div class="grid">
            <div class="card">
                <div class="control-group">
                    <label for="costSlider">Cost per unit ($)</label>
                    <div class="input-row">
                        <input type="range" id="costSlider" min="0" max="500" value="50" step="1">
                        <div class="value-display" id="costValue">$50</div>
                    </div>
                </div>

                <div class="control-group">
                    <label for="priceSlider">Sell price ($)</label>
                    <div class="input-row">
                        <input type="range" id="priceSlider" min="0" max="5000" value="200" step="10">
                        <div class="value-display" id="priceValue">$200</div>
                    </div>
                </div>

                <div class="control-group">
                    <label for="feeSlider">Platform fee (%)</label>
                    <div class="input-row">
                        <input type="range" id="feeSlider" min="0" max="50" value="15" step="1">
                        <div class="value-display" id="feeValue">15%</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="control-group">
                    <label>Profit per unit</label>
                    <div style="font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 700; color: #4efa3d; margin-top: 12px;" id="profitPerUnit">$127.50</div>
                </div>

                <div class="control-group" style="margin-top: 32px;">
                    <label>ROI %</label>
                    <div style="font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 700; color: #00d9ff;" id="roiPercent">155%</div>
                </div>
            </div>
        </div>

        <div class="results" id="results"></div>

        <div class="chart-container" id="chart"></div>
    </div>

    <script>
        const costSlider = document.getElementById('costSlider');
        const priceSlider = document.getElementById('priceSlider');
        const feeSlider = document.getElementById('feeSlider');

        const costValue = document.getElementById('costValue');
        const priceValue = document.getElementById('priceValue');
        const feeValue = document.getElementById('feeValue');

        const profitPerUnit = document.getElementById('profitPerUnit');
        const roiPercent = document.getElementById('roiPercent');
        const resultsContainer = document.getElementById('results');
        const chartContainer = document.getElementById('chart');

        const volumes = [10, 50, 100, 500, 1000];

        function calculate() {
            const cost = parseFloat(costSlider.value);
            const price = parseFloat(priceSlider.value);
            const fee = parseFloat(feeSlider.value);

            // Update display values
            costValue.textContent = `$${cost.toFixed(0)}`;
            priceValue.textContent = `$${price.toFixed(0)}`;
            feeValue.textContent = `${fee.toFixed(0)}%`;

            // After-fee price per unit
            const afterFeePrice = price * (1 - fee / 100);
            const profit = afterFeePrice - cost;
            const roi = cost > 0 ? (profit / cost) * 100 : 0;

            profitPerUnit.textContent = `$${profit.toFixed(2)}`;
            roiPercent.textContent = `${roi.toFixed(0)}%`;

            // Generate result cards for each volume
            resultsContainer.innerHTML = '';
            volumes.forEach(vol => {
                const totalProfit = profit * vol;
                const isNegative = totalProfit < 0;
                const metric = document.createElement('div');
                metric.className = `metric ${isNegative ? 'loss' : ''}`;
                metric.innerHTML = `
                    <div class="metric-label">${vol} units</div>
                    <div class="metric-value">${isNegative ? '-' : ''}$${Math.abs(totalProfit).toFixed(0)}</div>
                `;
                resultsContainer.appendChild(metric);
            });

            // Update chart
            updateChart(profit);
        }

        function updateChart(profitPerUnit) {
            chartContainer.innerHTML = '';

            const maxVolume = 1000;
            const profits = volumes.map(v => profitPerUnit * v);
            const maxProfit = Math.max(...profits.filter(p => p > 0), 1);
            const minProfit = Math.min(...profits.filter(p => p < 0), 0);
            const range = maxProfit - minProfit;

            volumes.forEach((vol, idx) => {
                const profit = profits[idx];
                const isNegative = profit < 0;
                const heightPercent = range > 0 ? ((profit - minProfit) / range) * 100 : 50;

                const bar = document.createElement('div');
                bar.className = `bar ${isNegative ? 'negative' : ''}`;
                bar.style.height = `${Math.max(heightPercent, 5)}%`;

                if (profit !== 0) {
                    const valueLabel = document.createElement('div');
                    valueLabel.className = 'bar-value';
                    valueLabel.textContent = `$${Math.abs(profit).toFixed(0)}`;
                    bar.appendChild(valueLabel);
                }

                const label = document.createElement('div');
                label.className = 'bar-label';
                label.textContent = `${vol}`;
                bar.appendChild(label);

                chartContainer.appendChild(bar);
            });
        }

        // Event listeners
        costSlider.addEventListener('input', calculate);
        priceSlider.addEventListener('input', calculate);
        feeSlider.addEventListener('input', calculate);

        // Initial calculation
        calculate();
    </script>
</body>
</html>
