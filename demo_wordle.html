<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WORDLE — Guess the Daily Word</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Sora', sans-serif;
      background: linear-gradient(135deg, #2d1b4e 0%, #1a0f2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e0e0e0;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      width: 100%;
      animation: fadeIn 0.8s cubic-bezier(.16,1,.3,1);
    }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .hero {
      text-align: center;
      margin-bottom: 30px;
      animation: slideDown 0.6s cubic-bezier(.16,1,.3,1) 0.1s both;
    }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    .hero h1 {
      font-size: clamp(48px, 10vw, 72px);
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #ff00ff, #00d9ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -2px;
    }
    .hero p { font-size: 14px; color: #b0b0c0; margin-bottom: 15px; }
    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
      font-size: 13px;
      font-family: 'IBM Plex Mono', monospace;
    }
    .stat-label { color: #80808a; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 18px; font-weight: 700; color: #00d9ff; }
    .game-board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-bottom: 30px;
      animation: slideInUp 0.6s cubic-bezier(.16,1,.3,1) 0.2s both;
    }
    @keyframes slideInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .tile {
      aspect-ratio: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(0, 217, 255, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: #e0e0e0;
      text-transform: uppercase;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }
    .tile.filled { border-color: rgba(0, 217, 255, 0.5); background: rgba(0, 217, 255, 0.1); }
    .tile.green { background: linear-gradient(135deg, #00ff88, #00d9ff); border-color: rgba(0, 255, 136, 0.8); color: #000; box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); }
    .tile.yellow { background: linear-gradient(135deg, #ffd700, #ffb347); border-color: rgba(255, 215, 0, 0.8); color: #000; box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
    .tile.gray { background: rgba(80, 80, 100, 0.3); border-color: rgba(80, 80, 100, 0.5); color: #80808a; }
    .keyboard { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; animation: slideInUp 0.6s cubic-bezier(.16,1,.3,1) 0.3s both; }
    .keyboard-row { display: flex; justify-content: center; gap: 4px; }
    .key {
      padding: 10px 6px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 6px;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      transition: all 0.2s;
      min-width: 32px;
      text-align: center;
    }
    .key:hover:not(.disabled) { background: rgba(0, 217, 255, 0.2); border-color: rgba(0, 217, 255, 0.5); transform: translateY(-2px); }
    .key.green { background: rgba(0, 255, 136, 0.3); border-color: rgba(0, 255, 136, 0.6); color: #00ff88; }
    .key.yellow { background: rgba(255, 215, 0, 0.3); border-color: rgba(255, 215, 0, 0.6); color: #ffd700; }
    .key.gray { background: rgba(80, 80, 100, 0.3); border-color: rgba(80, 80, 100, 0.5); color: #80808a; opacity: 0.6; cursor: not-allowed; }
    .message { text-align: center; font-size: 16px; font-weight: 600; margin-bottom: 15px; min-height: 20px; color: #00d9ff; animation: slideDown 0.4s cubic-bezier(.16,1,.3,1); }
    .message.win { color: #00ff88; animation: bounce 0.6s cubic-bezier(.16,1,.3,1); }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .message.lose { color: #ff6b9d; }
    .button {
      width: 100%;
      padding: 12px 24px;
      background: linear-gradient(135deg, #ff00ff, #00d9ff);
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255, 0, 255, 0.3); }
    .button:active { transform: translateY(0); }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>WORDLE</h1>
      <p>Guess the 5-letter word in 6 tries</p>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Tries</div>
        <div class="stat-value" id="triesLeft">6</div>
      </div>
      <div class="stat">
        <div class="stat-label">Status</div>
        <div class="stat-value" id="status">Playing</div>
      </div>
    </div>
    <div id="message" class="message"></div>
    <div class="game-board" id="gameBoard"></div>
    <div class="keyboard" id="keyboard"></div>
    <button class="button" id="newGameBtn">New Game</button>
  </div>
  <script>
    const WORDS = ['ABOUT','ABOVE','ABUSE','ACTOR','ACUTE','ADMIT','ADOPT','ADULT','AFTER','AGAIN','AGENT','AGREE','AHEAD','ALARM','ALBUM','ALERT','ALIKE','ALIVE','ALLOW','ALONE','ALONG','ALTER','ANGEL','ANGER','ANGLE','ANGRY','APART','APPLE','APPLY','ARENA','ARGUE','ARISE','ARRAY','ARROW','ASIDE','ASSET','AVOID','AWAIT','AWAKE','AWARD','AWARE','BADLY','BAKER','BASES','BASIC','BASIS','BEACH','BEGAN','BEGIN','BEING','BELOW','BENCH','BERRY','BIRTH','BLACK','BLAME','BLANK','BLAST','BLEED','BLESS','BLIND','BLOCK','BLOOD','BLOWN','BOARD','BOATS','BOBBY','BOOST','BOOTH','BOUND','BRAIN','BRAND','BRASS','BRAVE','BREAD','BREAK','BREED','BRIEF','BRING','BROAD','BROKE','BROWN','BUILD','BUILT','BURST','BUYER','CABLE','CARRY','CASES','CATCH','CAUSE','CHAIN','CHAIR','CHAOS','CHARM','CHART','CHASE','CHEAP','CHECK','CHEEK','CHEER','CHESS','CHEST','CHIEF','CHILD','CHINA','CHOSE','CIVIL','CLAIM','CLASS','CLEAN','CLEAR','CLICK','CLIMB','CLOSE','COACH','COAST','COLON','COLOR','COMES','CORAL','COUCH','COULD','COUNT','COURT','COVER','CRACK','CRAFT','CRASH','CRAZY','CREAM','CRIME','CROSS','CROWD','CROWN','CRUDE','CRUSH','CURVE','CYCLE','DAILY','DAIRY','DANCE','DATED','DEALS','DEALT','DEATH','DEBUT','DELAY','DELTA','DENSE','DEPTH','DOING','DOUBT','DRAFT','DRAMA','DRANK','DRAWN','DREAM','DRESS','DRIED','DRINK','DRIVE','DROWN','DRUGS','DRUMS','DRUNK','EARLY','EARTH','EIGHT','ELITE','EMPTY','ENEMY','ENJOY','ENTER','ENTRY','EQUAL','ERROR','EVENT','EVERY','EXACT','EXIST','EXTRA','FAITH','FALSE','FAULT','FIBER','FIELD','FIFTH','FIFTY','FIGHT','FINAL','FIRST','FIXED','FLASH','FLEET','FLESH','FLIES','FLOAT','FLOOR','FLUSH','FOCAL','FOCUS','FORCE','FORTH','FORTY','FORUM','FOUND','FRAME','FRANK','FRAUD','FRESH','FRONT','FROST','FRUIT','FULLY','FUNDS','FUNNY','GAMES','GAMMA','GAUGE','GHOST','GIANT','GIVEN','GLASS','GLOBE','GLORY','GOALS','GOATS','GOING','GRACE','GRADE','GRAIN','GRANT','GRASS','GRAVE','GREAT','GREEN','GROSS','GROUP','GROWS','GUARD','GUESS','GUEST','GUIDE','GUILT','HAPPY','HARSH','HAST ACH','REACT','READS','READY','REALM','REBEL','REFER','RELAX','REMIX','REPAY','REPLY','RESET','RESULT','RETAIN','REVEAL','REVISE','RIBS','RICE','RICH','RIDER','RIDGE','RIFLE','RIGHT','RIGID','RINGS','RIOTS','RISEN','RISKS','RIVAL','RIVER','ROADS','ROAST','ROBOT','ROCKS','ROCKY','ROGER','ROLES','ROMAN','ROOFS','ROOMS','ROOTS','ROPES','ROSES','ROUGH','ROUND','ROUTE','ROYAL','RULES','RURAL','SADLY','SAFER','SAINT','SALES','SALON','SANDY','SATIN','SAUCE','SCALE','SCARE','SCENE','SCOPE','SCORE','SCOUT','SCRAP','SEATS','SEEDS','SEEKS','SEEMS','SEIZE','SELLS','SENDS','SENSE','SEVEN','SHADE','SHAKE','SHALL','SHAME','SHAPE','SHARE','SHARP','SHEEP','SHEER','SHELF','SHELL','SHIFT','SHINE','SHIPS','SHOCK','SHOES','SHOOT','SHOPS','SHORE','SHORT','SHOWN','SHOWS','SIDES','SIEGE','SIGHT','SIGNS','SILLY','SINCE','SITES','SIXTH','SIZED','SKATE','SKILL','SKINS','SKIPS','SKULL','SLACK','SLANT','SLATE','SLAVE','SLEEP','SLEET','SLICE','SLIDE','SLIME','SLOPE','SLOTS','SMART','SMASH','SMELL','SMILE','SMITH','SMOKE','SNAKE','SNAPS','SNEAK','SNORE','SNOWY','SOAKS','SOAPS','SOCKS','SODAS','SOILS','SOLAR','SOLID','SOLVE','SONGS','SONIC','SORTS','SOULS','SOUTH','SPACE','SPARK','SPEAK','SPEAR','SPEED','SPELL','SPEND','SPENT','SPICE','SPICY','SPIKE','SPINE','SPLIT','SPOIL','SPOKE','SPOON','SPORT','SPOTS','SPRAY','STAFF','STAGE','STAKE','STALL','STAMP','STAND','STARE','START','STATE','STAYS','STEAK','STEAL','STEAM','STEEL','STEEP','STEER','STEMS','STEPS','STICK','STIFF','STILL','STING','STINK','STOCK','STOLE','STONE','STOOD','STOOL','STOPS','STORE','STORM','STORY','STOVE','STRAP','STRAW','STRIP','STUCK','STUDY','STUFF','STUMP','STUNG','STYLE','SUGAR','SUITS','SUNNY','SUPER','SURGE','SWAMP','SWAPS','SWEAR','SWEAT','SWEEP','SWEET','SWIFT','SWIMS','SWINE','SWIRL','SWISS','SWORD','TABLE','TAKEN','TAKES','TALES','TALKS','TANKS','TAPES','TASKS','TASTE','TAXES','TEACH','TEAMS','TEARS','TEENS','TELLS','TEMPO','TENDS','TENSE','TENTH','TENTS','TERMS','TEXAS','THANK','THEFT','THEIR','THEME','THERE','THESE','THICK','THIEF','THING','THINK','THIRD','THOSE','THREE','THREW','THROW','THUMB','TIDAL','TIDES','TIGER','TIGHT','TIMER','TIMES','TIRED','TOAST','TODAY','TOKEN','TONES','TOOLS','TOOTH','TOPIC','TORCH','TOTAL','TOUCH','TOUGH','TOURS','TOWEL','TOWER','TOWNS','TOXIC','TRACE','TRACK','TRACT','TRADE','TRAIL','TRAIN','TRAIT','TRAMP','TRASH','TREAT','TREES','TREND','TRIAL','TRIBE','TRICK','TRIED','TRIES','TRIMS','TRIPS','TROOP','TROUT','TRUCE','TRUCK','TRULY','TRUMP','TRUNK','TRUST','TRUTH','TUBES','TULIP','TUMOR','TUNED','TURNS','TWICE','TWINS','TWIST','TYPES','ULTRA','UNCLE','UNDER','UNDUE','UNION','UNITE','UNITY','UNITS','UNTIL','UPPER','UPSET','URGED','USAGE','USHER','USUAL','VALID','VALUE','VALVE','VAULT','VENOM','VENUE','VERGE','VERSE','VIDEO','VIRUS','VISIT','VISTA','VOCAL','VOICE','VOTER','VOTES','VOWEL','WAGES','WAGON','WAIST','WAITS','WAKES','WALKS','WALLS','WANTS','WARDS','WARMS','WARNS','WASTE','WATCH','WATER','WAVED','WAVES','WEARY','WEARS','WEAVE','WEEKS','WELLS','WELSH','WHEAT','WHEEL','WHERE','WHICH','WHILE','WHITE','WHOLE','WHOSE','WICKS','WIDE','WIDEN','WIDER','WIDOW','WINDS','WINES','WINGS','WINKS','WIRES','WITCH','WOMAN','WOMEN','WOODS','WOODY','WORDS','WORLD','WORRY','WORSE','WORST','WORTH','WOULD','WOUND','WRIST','WRITE','WRONG','YACHT','YARDS','YARNS','YEAST','YELLS','YIELD','YOUNG','YOURS','YOUTH','ZONED','ZONES'];
    let dailyWord = '';
    let currentRow = 0;
    let currentCol = 0;
    let gameOver = false;
    let won = false;
    function getDailyWord() {
      const today = new Date().toDateString();
      const hash = today.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
      return WORDS[hash % WORDS.length];
    }
    function initGame() {
      dailyWord = getDailyWord();
      currentRow = 0;
      currentCol = 0;
      gameOver = false;
      won = false;
      renderBoard();
      renderKeyboard();
      updateStats();
      document.getElementById('message').textContent = '';
    }
    function renderBoard() {
      const board = document.getElementById('gameBoard');
      board.innerHTML = '';
      for (let i = 0; i < 30; i++) {
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.id = `tile-${Math.floor(i/5)}-${i%5}`;
        board.appendChild(tile);
      }
    }
    function renderKeyboard() {
      const keyboard = document.getElementById('keyboard');
      keyboard.innerHTML = '';
      const rows = [['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['Z','X','C','V','B','N','M']];
      rows.forEach(row => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'keyboard-row';
        row.forEach(letter => {
          const key = document.createElement('button');
          key.className = 'key';
          key.textContent = letter;
          key.id = `key-${letter}`;
          key.onclick = () => guessLetter(letter);
          rowDiv.appendChild(key);
        });
        keyboard.appendChild(rowDiv);
      });
    }
    function updateStats() {
      document.getElementById('triesLeft').textContent = 6 - currentRow;
      document.getElementById('status').textContent = won ? 'Won' : gameOver ? 'Lost' : 'Playing';
    }
    function guessLetter(letter) {
      if (gameOver || currentCol === 5) return;
      const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
      tile.textContent = letter;
      tile.classList.add('filled');
      currentCol++;
      if (currentCol === 5) handleEnter();
    }
    function handleEnter() {
      if (currentCol !== 5) return;
      const guess = [];
      for (let i = 0; i < 5; i++) guess.push(document.getElementById(`tile-${currentRow}-${i}`).textContent);
      const guessWord = guess.join('');
      if (!WORDS.includes(guessWord)) { document.getElementById('message').textContent = 'Not a valid word'; return; }
      const result = checkGuess(guessWord);
      applyFeedback(result);
      if (guessWord === dailyWord) { won = true; gameOver = true; document.getElementById('message').textContent = '🎉 You Won!'; document.getElementById('message').classList.add('win'); }
      else if (currentRow === 5) { gameOver = true; document.getElementById('message').textContent = 'Game Over: ' + dailyWord; document.getElementById('message').classList.add('lose'); }
      currentRow++;
      currentCol = 0;
      updateStats();
    }
    function checkGuess(guess) {
      const result = ['gray','gray','gray','gray','gray'];
      const wl = dailyWord.split('');
      for (let i = 0; i < 5; i++) if (guess[i] === wl[i]) { result[i] = 'green'; wl[i] = null; }
      for (let i = 0; i < 5; i++) if (result[i] === 'gray' && wl.includes(guess[i])) { result[i] = 'yellow'; wl[wl.indexOf(guess[i])] = null; }
      return result;
    }
    function applyFeedback(result) {
      for (let i = 0; i < 5; i++) {
        const tile = document.getElementById(`tile-${currentRow}-${i}`);
        const letter = tile.textContent;
        tile.classList.add(result[i]);
        const keyEl = document.getElementById(`key-${letter}`);
        if (result[i] === 'green') { keyEl.classList.add('green'); keyEl.classList.remove('yellow','gray'); }
        else if (result[i] === 'yellow' && !keyEl.classList.contains('green')) keyEl.classList.add('yellow');
        else if (result[i] === 'gray' && !keyEl.classList.contains('green','yellow')) { keyEl.classList.add('gray'); }
      }
    }
    document.addEventListener('keydown', (e) => {
      if (gameOver) return;
      const letter = e.key.toUpperCase();
      if (/^[A-Z]$/.test(letter)) guessLetter(letter);
      else if (e.key === 'Enter') handleEnter();
      else if (e.key === 'Backspace') {
        if (currentCol > 0) {
          currentCol--;
          const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
          tile.textContent = '';
          tile.classList.remove('filled');
        }
      }
    });
    document.getElementById('newGameBtn').addEventListener('click', initGame);
    initGame();
  </script>
</body>
</html>
