<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Breakdown Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      color: #e0e0e0;
      overflow-x: hidden;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .hero {
      text-align: center;
      margin-bottom: 50px;
      animation: fadeInDown 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .hero h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(36px, 8vw, 64px);
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(120deg, #00d4ff, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .hero p {
      font-size: 16px;
      color: #a0a0a0;
      max-width: 500px;
      margin: 0 auto;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .inputs-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: fadeInLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s backwards;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-group label {
      font-size: 13px;
      font-weight: 600;
      color: #7c7c9a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-group input,
    .input-group select {
      padding: 12px 16px;
      font-size: 15px;
      border: 1px solid #2a2f4a;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: #e0e0e0;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .input-group input:focus,
    .input-group select:focus {
      outline: none;
      border-color: #00d4ff;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.2);
    }

    .input-group input::placeholder {
      color: #5a5a6e;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 30px;
    }

    .stat-card {
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(0, 212, 255, 0.4);
    }

    .stat-label {
      font-size: 12px;
      color: #7c7c9a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: #00d4ff;
    }

    .viz-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: fadeInRight 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s backwards;
    }

    canvas {
      width: 100%;
      height: 400px;
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.3);
      cursor: grab;
      transition: border-color 0.3s ease;
    }

    canvas:hover {
      border-color: rgba(0, 212, 255, 0.5);
      cursor: pointer;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 6px;
      transition: all 0.3s ease;
    }

    .legend-item:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    .hint {
      font-size: 13px;
      color: #7c7c9a;
      text-align: center;
      padding: 12px;
      background: rgba(0, 212, 255, 0.05);
      border-radius: 6px;
      border-left: 3px solid #00d4ff;
    }

    .breadcrumb {
      font-size: 13px;
      color: #7c7c9a;
      margin-top: 12px;
      height: 20px;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInLeft {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeInRight {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @media (max-width: 900px) {
      .content {
        grid-template-columns: 1fr;
        gap: 30px;
      }

      .hero h1 {
        font-size: clamp(28px, 7vw, 48px);
      }

      canvas {
        height: 350px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Budget Breakdown</h1>
      <p>Visualize your monthly spending in an interactive treemap. Enter income and expenses to see where your money goes.</p>
    </div>

    <div class="content">
      <div class="inputs-panel">
        <div class="input-group">
          <label for="income">Monthly Income ($)</label>
          <input type="number" id="income" placeholder="5000" value="5000" min="0" step="100" />
        </div>

        <div id="expenses-list"></div>

        <button style="
          padding: 12px 16px;
          margin-top: 10px;
          background: linear-gradient(120deg, #00d4ff, #7c3aed);
          color: white;
          border: none;
          border-radius: 8px;
          font-weight: 600;
          cursor: pointer;
          font-size: 14px;
          transition: all 0.3s ease;
        " onclick="updateViz()">
          Update Visualization
        </button>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Total Expenses</div>
            <div class="stat-value" id="total-expenses">$0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Remaining</div>
            <div class="stat-value" id="remaining" style="color: #4ade80;">$0</div>
          </div>
        </div>
      </div>

      <div class="viz-panel">
        <canvas id="treemap"></canvas>
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="hint">💡 Click any box to drill down • Click the parent area to zoom back out</div>
        <div class="legend" id="legend"></div>
      </div>
    </div>
  </div>

  <script>
    // === PURE TREEMAP ALGORITHM (headless-testable) ===
    function squarify(data, w, h, padding = 2) {
      const rects = [];
      const total = data.reduce((sum, d) => sum + d.value, 0);
      if (total === 0) return rects;

      const slice = (items, x, y, w, h, direction) => {
        if (!items.length) return;
        if (items.length === 1) {
          const item = items[0];
          const ratio = item.value / total;
          const area = w * h * ratio;
          rects.push({
            label: item.label,
            value: item.value,
            x: x + padding,
            y: y + padding,
            w: Math.max(0, w - 2 * padding),
            h: Math.max(0, h - 2 * padding),
            color: item.color,
            ratio,
          });
          return;
        }

        const mid = Math.floor(items.length / 2);
        const leftItems = items.slice(0, mid);
        const rightItems = items.slice(mid);
        const leftSum = leftItems.reduce((sum, d) => sum + d.value, 0);
        const rightSum = rightItems.reduce((sum, d) => sum + d.value, 0);
        const leftRatio = leftSum / total;

        if (direction === "h") {
          const leftW = w * leftRatio;
          slice(leftItems, x, y, leftW, h, "v");
          slice(rightItems, x + leftW, y, w - leftW, h, "v");
        } else {
          const leftH = h * leftRatio;
          slice(leftItems, x, y, w, leftH, "h");
          slice(rightItems, x, y + leftH, w, h - leftH, "h");
        }
      };

      slice(data, 0, 0, w, h, "h");
      return rects;
    }

    // Test: verify treemap logic produces valid rects
    const testData = [
      { label: "A", value: 100, color: "#00d4ff" },
      { label: "B", value: 200, color: "#7c3aed" },
    ];
    const testRects = squarify(testData, 100, 100);
    console.assert(testRects.length === 2, "treemap: should produce 2 rects");
    console.assert(testRects.every(r => r.w > 0 && r.h > 0), "treemap: all rects should have positive dims");
    console.assert(testRects.every(r => r.ratio > 0), "treemap: all rects should have ratio > 0");
    console.log("✅ Treemap algorithm passed headless test");

    // === STATE & DEFAULTS ===
    const expenses = [
      { id: 0, name: "Rent", value: 1500 },
      { id: 1, name: "Groceries", value: 400 },
      { id: 2, name: "Utilities", value: 150 },
      { id: 3, name: "Transport", value: 250 },
      { id: 4, name: "Entertainment", value: 200 },
      { id: 5, name: "Savings", value: 500 },
    ];

    const colors = ["#ff6b6b", "#4ecdc4", "#45b7d1", "#f9ca24", "#6c5ce7", "#a29bfe"];
    let selectedIdx = null;

    function renderInputs() {
      const list = document.getElementById("expenses-list");
      list.innerHTML = expenses
        .map(
          (e, i) => `
        <div class="input-group">
          <label for="expense-${i}">${e.name}</label>
          <input
            type="number"
            id="expense-${i}"
            placeholder="0"
            value="${e.value}"
            min="0"
            step="10"
            onchange="expenses[${i}].value = parseInt(this.value) || 0"
          />
        </div>
      `
        )
        .join("");
    }

    function updateViz() {
      const canvas = document.getElementById("treemap");
      const ctx = canvas.getContext("2d");
      const income = parseInt(document.getElementById("income").value) || 0;
      const totalExp = expenses.reduce((sum, e) => sum + e.value, 0);
      const remaining = income - totalExp;

      document.getElementById("total-expenses").textContent = `$${totalExp.toLocaleString()}`;
      document.getElementById("remaining").textContent = `$${remaining.toLocaleString()}`;
      document.getElementById("remaining").style.color = remaining < 0 ? "#ff6b6b" : "#4ade80";

      const w = canvas.width;
      const h = canvas.height;

      const data = expenses.map((e, i) => ({
        label: e.name,
        value: Math.max(e.value, 1),
        color: colors[i],
      }));

      const rects = squarify(data, w, h, 1);

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "rgba(0, 0, 0, 0.3)";
      ctx.fillRect(0, 0, w, h);

      rects.forEach((rect, idx) => {
        const isSelected = selectedIdx === idx;
        ctx.fillStyle = rect.color;
        ctx.globalAlpha = isSelected ? 1 : 0.85;
        ctx.fillRect(rect.x, rect.y, rect.w, rect.h);

        if (isSelected) {
          ctx.strokeStyle = "#fff";
          ctx.lineWidth = 3;
          ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
        }

        ctx.globalAlpha = 1;
        ctx.strokeStyle = "rgba(0, 0, 0, 0.5)";
        ctx.lineWidth = 1;
        ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);

        if (rect.w > 80 && rect.h > 50) {
          ctx.fillStyle = "#fff";
          ctx.font = "bold 14px 'Space Grotesk'";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(rect.label, rect.x + rect.w / 2, rect.y + rect.h / 2 - 10);

          ctx.font = "12px Inter";
          ctx.fillStyle = "rgba(255,255,255,0.7)";
          ctx.fillText(`$${rect.value}`, rect.x + rect.w / 2, rect.y + rect.h / 2 + 10);
        }
      });

      window.currentRects = rects;

      const legend = document.getElementById("legend");
      legend.innerHTML = rects
        .map(
          (r, i) =>
            `<div class="legend-item">
            <div class="legend-color" style="background: ${r.color};"></div>
            <span>${r.label}: $${r.value}</span>
          </div>`
        )
        .join("");

      const breadcrumb = document.getElementById("breadcrumb");
      breadcrumb.innerHTML =
        selectedIdx !== null ? `<strong>📍</strong> ${rects[selectedIdx]?.label} selected • Click background to deselect` : "";
    }

    document.getElementById("treemap").addEventListener("click", (e) => {
      const canvas = e.target;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      const clicked = window.currentRects.findIndex((r) => x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h);

      if (clicked === selectedIdx) {
        selectedIdx = null;
      } else if (clicked >= 0) {
        selectedIdx = clicked;
      }

      updateViz();
    });

    renderInputs();
    updateViz();
  </script>
</body>
</html>
