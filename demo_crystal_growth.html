<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Growth Lattice</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Manrope', -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #e0e0e0;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 40px;
            align-items: start;
        }
        
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
                gap: 30px;
            }
        }
        
        .hero {
            margin-bottom: 30px;
        }
        
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(42px, 6vw, 72px);
            font-weight: 700;
            background: linear-gradient(135deg, #00d9ff 0%, #ff00ff 50%, #00d9ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            margin-bottom: 10px;
            line-height: 1.1;
            animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .tagline {
            font-size: 16px;
            color: #b0b0b0;
            max-width: 400px;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
        }
        
        canvas {
            border: 2px solid #00d9ff;
            border-radius: 12px;
            background: #0a0a1a;
            box-shadow: 0 0 40px rgba(0, 217, 255, 0.3),
                        inset 0 0 30px rgba(0, 217, 255, 0.1);
            display: block;
            width: 100%;
            max-width: 800px;
            height: auto;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
            margin-bottom: 20px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
        }
        
        .stat {
            background: rgba(0, 217, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            animation: statPulse 0.6s ease-in-out infinite alternate;
        }
        
        .stat:nth-child(2) { animation-delay: 0.1s; }
        .stat:nth-child(3) { animation-delay: 0.2s; }
        
        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        
        .stat-value {
            font-family: 'Space Grotesk', monospace;
            font-size: 20px;
            font-weight: 700;
            color: #00d9ff;
        }
        
        .controls {
            background: rgba(15, 52, 96, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 16px;
            padding: 30px;
            animation: fadeInRight 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }
        
        .control-group {
            margin-bottom: 28px;
        }
        
        .control-group:last-child {
            margin-bottom: 0;
        }
        
        .control-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #00d9ff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        
        .control-value {
            font-size: 14px;
            color: #ff00ff;
            font-weight: 700;
        }
        
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(to right, rgba(0, 217, 255, 0.2), rgba(255, 0, 255, 0.2));
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d9ff, #ff00ff);
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.6);
            transition: transform 0.2s ease;
        }
        
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d9ff, #ff00ff);
            border: none;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.6);
            transition: transform 0.2s ease;
        }
        
        input[type="range"]::-moz-range-thumb:hover {
            transform: scale(1.3);
        }
        
        button {
            width: 100%;
            padding: 12px 20px;
            margin-top: 20px;
            background: linear-gradient(135deg, #00d9ff, #ff00ff);
            color: #0a0a1a;
            border: none;
            border-radius: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 8px 24px rgba(0, 217, 255, 0.3);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 217, 255, 0.5);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes statPulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }
        
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <div class="hero">
                <h1>✨ Crystal Growth</h1>
                <p class="tagline">Watch geometric crystals form and grow in real-time. Adjust growth speed, nucleation density, and cooling rate to shape the lattice.</p>
            </div>
            <canvas id="crystalCanvas" width="600" height="600"></canvas>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Crystals</div>
                    <div class="stat-value" id="crystalCount">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Growth</div>
                    <div class="stat-value" id="totalGrowth">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Frame</div>
                    <div class="stat-value" id="frameCount">0</div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <div class="control-label">
                    <span>Growth Speed</span>
                    <span class="control-value" id="speedVal">1.0x</span>
                </div>
                <input type="range" id="speedSlider" min="0.5" max="3" step="0.1" value="1">
            </div>
            
            <div class="control-group">
                <div class="control-label">
                    <span>Nucleation Density</span>
                    <span class="control-value" id="nucleationVal">0.02</span>
                </div>
                <input type="range" id="nucleationSlider" min="0.01" max="0.1" step="0.01" value="0.02">
            </div>
            
            <div class="control-group">
                <div class="control-label">
                    <span>Cooling Rate</span>
                    <span class="control-value" id="coolingVal">0.95</span>
                </div>
                <input type="range" id="coolingSlider" min="0.8" max="0.99" step="0.01" value="0.95">
            </div>
            
            <button onclick="resetCrystals()">Reset Lattice</button>
        </div>
    </div>

    <script>
        // Pure logic — headless-testable
        function initCrystalGrid(size) {
            const grid = Array(size).fill(null).map(() => Array(size).fill(0));
            // Seed single crystal in center
            grid[Math.floor(size / 2)][Math.floor(size / 2)] = 1;
            return grid;
        }
        
        function growCrystals(grid, nucleationDensity, coolingRate, growthSpeed) {
            const size = grid.length;
            let newGrowth = 0;
            
            // Create growth copy to avoid mid-iteration overwrites
            const updated = grid.map(row => [...row]);
            
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    if (grid[y][x] === 0) {
                        // Empty cell — check for nucleation or neighbor growth
                        let neighborGrowth = false;
                        
                        // Check 8 neighbors
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                const ny = y + dy;
                                const nx = x + dx;
                                if (ny >= 0 && ny < size && nx >= 0 && nx < size && grid[ny][nx] > 0) {
                                    neighborGrowth = true;
                                    break;
                                }
                            }
                            if (neighborGrowth) break;
                        }
                        
                        if (neighborGrowth && Math.random() < coolingRate * growthSpeed) {
                            updated[y][x] = Math.random() * 0.8 + 0.2; // Growth value (color intensity)
                            newGrowth++;
                        } else if (Math.random() < nucleationDensity && grid[y][x] === 0) {
                            // Spontaneous nucleation
                            updated[y][x] = Math.random() * 0.3 + 0.7;
                            newGrowth++;
                        }
                    }
                }
            }
            
            return { grid: updated, newGrowth };
        }
        
        function countCrystals(grid) {
            let count = 0;
            for (let row of grid) {
                for (let val of row) {
                    if (val > 0) count++;
                }
            }
            return count;
        }
        
        // Headless test
        if (typeof module !== 'undefined' && module.exports) {
            module.exports = { initCrystalGrid, growCrystals, countCrystals };
        }
        
        // Browser logic
        const canvas = document.getElementById('crystalCanvas');
        const ctx = canvas.getContext('2d');
        
        const speedSlider = document.getElementById('speedSlider');
        const nucleationSlider = document.getElementById('nucleationSlider');
        const coolingSlider = document.getElementById('coolingSlider');
        
        const speedVal = document.getElementById('speedVal');
        const nucleationVal = document.getElementById('nucleationVal');
        const coolingVal = document.getElementById('coolingVal');
        
        const crystalCountEl = document.getElementById('crystalCount');
        const totalGrowthEl = document.getElementById('totalGrowth');
        const frameCountEl = document.getElementById('frameCount');
        
        const GRID_SIZE = 100;
        let grid = initCrystalGrid(GRID_SIZE);
        let totalGrowthCount = 0;
        let frameCount = 0;
        let animationId = null;
        let running = true;
        
        function renderGrid() {
            const cellSize = canvas.width / GRID_SIZE;
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw crystals with color intensity
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if (grid[y][x] > 0) {
                        const intensity = grid[y][x];
                        // Cyan to magenta gradient based on intensity
                        const hue = 200 + intensity * 100;
                        const sat = 100;
                        const light = 50 + intensity * 20;
                        ctx.fillStyle = `hsl(${hue}, ${sat}%, ${light}%)`;
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                    }
                }
            }
        }
        
        function animate() {
            const speedMult = parseFloat(speedSlider.value);
            const nucleationDensity = parseFloat(nucleationSlider.value);
            const coolingRate = parseFloat(coolingSlider.value);
            
            const { grid: newGrid, newGrowth } = growCrystals(grid, nucleationDensity, coolingRate, speedMult);
            grid = newGrid;
            totalGrowthCount += newGrowth;
            frameCount++;
            
            renderGrid();
            
            crystalCountEl.textContent = countCrystals(grid);
            totalGrowthEl.textContent = totalGrowthCount;
            frameCountEl.textContent = frameCount;
            
            if (running) {
                animationId = requestAnimationFrame(animate);
            }
        }
        
        function resetCrystals() {
            grid = initCrystalGrid(GRID_SIZE);
            totalGrowthCount = 0;
            frameCount = 0;
            crystalCountEl.textContent = '0';
            totalGrowthEl.textContent = '0';
            frameCountEl.textContent = '0';
            renderGrid();
        }
        
        // Event listeners
        speedSlider.addEventListener('input', (e) => {
            speedVal.textContent = parseFloat(e.target.value).toFixed(1) + 'x';
        });
        
        nucleationSlider.addEventListener('input', (e) => {
            nucleationVal.textContent = parseFloat(e.target.value).toFixed(2);
        });
        
        coolingSlider.addEventListener('input', (e) => {
            coolingVal.textContent = parseFloat(e.target.value).toFixed(2);
        });
        
        // Start animation
        animate();
    </script>
</body>
</html>
