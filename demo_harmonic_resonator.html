<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harmonic Resonator</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      --accent-cyan: #00d9ff;
      --accent-magenta: #ff00ff;
      --accent-pink: #ff1493;
      --dark-bg: #0a0a1a;
      --dark-surface: rgba(15,10,30,0.8);
    }

    body {
      font-family: 'IBM Plex Mono', monospace;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0033 50%, #0f1f2e 100%);
      color: #e0e0ff;
      overflow-x: hidden;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 50%, rgba(0,217,255,0.05) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(255,0,255,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .hero {
      text-align: center;
      animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(42px, 8vw, 72px);
      font-weight: 800;
      letter-spacing: -2px;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-magenta), var(--accent-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .hero p {
      font-size: 14px;
      color: #999;
      font-family: 'IBM Plex Mono', monospace;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
      animation: fadeInUp 0.6s ease-out 0.2s backwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .canvas-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    canvas {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: rgba(10, 15, 40, 0.9);
      border: 2px solid var(--accent-cyan);
      border-radius: 12px;
      cursor: crosshair;
      display: block;
    }

    .spectrum-label {
      font-size: 11px;
      color: var(--accent-cyan);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .controls-section {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 24px;
      background: rgba(20, 15, 40, 0.6);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 12px;
      backdrop-filter: blur(20px);
    }

    .control-label {
      font-size: 12px;
      color: var(--accent-cyan);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .control-value {
      font-size: 24px;
      color: var(--accent-cyan);
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
    }

    input[type="range"] {
      width: 100%;
      height: 8px;
      appearance: none;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-magenta));
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
      cursor: pointer;
      box-shadow: 0 0 12px rgba(0, 217, 255, 0.6);
      transition: all 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.8);
    }

    input[type="range"]::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
      cursor: pointer;
      border: none;
      box-shadow: 0 0 12px rgba(0, 217, 255, 0.6);
      transition: all 0.2s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.8);
    }

    .preset-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      padding: 12px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 1px solid var(--accent-cyan);
      background: transparent;
      color: var(--accent-cyan);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: rgba(0, 217, 255, 0.1);
      border-color: var(--accent-magenta);
      color: var(--accent-magenta);
      box-shadow: 0 0 12px rgba(0, 217, 255, 0.3);
    }

    button:active {
      transform: scale(0.95);
    }

    .waveform-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .waveform-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 8px;
    }

    .waveform-btn {
      padding: 10px 8px;
      font-size: 10px;
    }

    .waveform-btn.active {
      background: rgba(0, 217, 255, 0.2);
      border-color: var(--accent-magenta);
      color: var(--accent-magenta);
      box-shadow: 0 0 12px rgba(255, 0, 255, 0.5);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      animation: fadeInUp 0.6s ease-out 0.3s backwards;
    }

    .stat-box {
      padding: 20px;
      background: rgba(20, 15, 40, 0.6);
      border-left: 3px solid var(--accent-cyan);
      border-radius: 8px;
      backdrop-filter: blur(20px);
    }

    .stat-label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 20px;
      color: var(--accent-cyan);
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .main-grid {
        grid-template-columns: 1fr;
      }

      .preset-buttons {
        grid-template-columns: 1fr;
      }

      .waveform-buttons {
        grid-template-columns: 1fr 1fr;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: clamp(32px, 6vw, 56px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-delay: 0 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>🎵 Harmonic Resonator</h1>
      <p>Explore pure tones, overtones, and waveforms with live spectrum visualization.</p>
    </div>

    <div class="main-grid">
      <div class="canvas-section">
        <div class="spectrum-label">Live Frequency Spectrum</div>
        <canvas id="spectrum-canvas" width="800" height="450"></canvas>
      </div>

      <div class="controls-section">
        <div class="control-group">
          <div class="control-label">Fundamental Frequency</div>
          <div class="control-value"><span id="freq-display">440</span> Hz</div>
          <input type="range" id="frequency-slider" min="20" max="2000" value="440" step="1">
          <div style="font-size: 11px; color: #666; margin-top: 8px;">
            A4 = 440 Hz · Middle C = 262 Hz
          </div>
        </div>

        <div class="control-group">
          <div class="control-label">Waveform</div>
          <div class="waveform-buttons">
            <button class="waveform-btn active" data-waveform="sine">Sine</button>
            <button class="waveform-btn" data-waveform="square">Square</button>
            <button class="waveform-btn" data-waveform="sawtooth">Sawtooth</button>
            <button class="waveform-btn" data-waveform="triangle">Triangle</button>
          </div>
        </div>

        <div class="control-group">
          <div class="control-label">Chord Presets</div>
          <div class="preset-buttons">
            <button data-chord="major">Major Triad</button>
            <button data-chord="minor">Minor Triad</button>
            <button data-chord="fifth">Perfect Fifth</button>
            <button data-chord="octave">Octave</button>
          </div>
        </div>

        <button id="play-btn" style="padding: 16px; font-size: 12px; background: rgba(0,217,255,0.2); border-color: var(--accent-magenta); color: var(--accent-magenta);">► PLAY TONE</button>
        <button id="stop-btn" style="padding: 16px; font-size: 12px;">⏹ STOP</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">Peak Frequency</div>
        <div class="stat-value"><span id="peak-freq">440</span> Hz</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Harmonic Series</div>
        <div class="stat-value"><span id="harmonic-count">1</span> visible</div>
      </div>
    </div>
  </div>

  <script>
    // === AUDIO CONTEXT SETUP ===
    let audioContext;
    let oscillator;
    let gainNode;
    let analyser;
    let isPlaying = false;
    let currentFrequency = 440;
    let currentWaveform = 'sine';

    function initAudio() {
      if (audioContext) return;
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      gainNode = audioContext.createGain();
      gainNode.connect(audioContext.destination);
      gainNode.gain.value = 0.3; // Keep volume safe
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 2048;
      analyser.connect(gainNode);
    }

    function startTone(freq) {
      initAudio();
      if (isPlaying) stopTone();
      
      oscillator = audioContext.createOscillator();
      oscillator.type = currentWaveform;
      oscillator.frequency.setValueAtTime(freq, audioContext.currentTime);
      oscillator.connect(analyser);
      oscillator.start();
      isPlaying = true;
      currentFrequency = freq;
      document.getElementById('play-btn').textContent = '⏸ PLAYING';
    }

    function stopTone() {
      if (oscillator) {
        oscillator.stop();
        oscillator.disconnect();
      }
      isPlaying = false;
      document.getElementById('play-btn').textContent = '► PLAY TONE';
    }

    function setWaveform(type) {
      currentWaveform = type;
      if (isPlaying) {
        const wasPlaying = isPlaying;
        stopTone();
        if (wasPlaying) startTone(currentFrequency);
      }
    }

    // === CANVAS VISUALIZATION ===
    const canvas = document.getElementById('spectrum-canvas');
    const ctx = canvas.getContext('2d');
    let dataArray = new Uint8Array(1024);

    function drawSpectrum() {
      if (!analyser) {
        // Empty state
        ctx.fillStyle = 'rgba(10, 15, 40, 0.9)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#666';
        ctx.font = '14px IBM Plex Mono';
        ctx.textAlign = 'center';
        ctx.fillText('Click PLAY TONE to start', canvas.width / 2, canvas.height / 2);
        return;
      }

      analyser.getByteFrequencyData(dataArray);

      // Clear canvas
      ctx.fillStyle = 'rgba(10, 15, 40, 0.9)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw frequency bins as bars (fixed to fit within canvas)
      const numBars = 128; // Render 128 bars instead of 256
      const barWidth = canvas.width / numBars;
      let barHeight;
      let x = 0;

      for (let i = 0; i < numBars; i++) {
        const binIndex = Math.floor((i / numBars) * 256);
        barHeight = (dataArray[binIndex] / 255) * canvas.height;

        // Gradient color by frequency
        const hue = (i / numBars) * 120; // Cyan to Magenta spectrum
        const saturation = 100;
        const lightness = 50;
        ctx.fillStyle = `hsl(${hue}, ${saturation}%, ${lightness}%)`;

        ctx.fillRect(x, canvas.height - barHeight, barWidth - 1, barHeight);
        x += barWidth;
      }

      // Draw grid lines for note references
      ctx.strokeStyle = 'rgba(0, 217, 255, 0.1)';
      ctx.lineWidth = 1;
      for (let i = 1; i < 10; i++) {
        const xPos = (canvas.width / 10) * i;
        ctx.beginPath();
        ctx.moveTo(xPos, 0);
        ctx.lineTo(xPos, canvas.height);
        ctx.stroke();
      }

      // Peak detection label
      let maxFreq = 0;
      let maxEnergy = 0;
      for (let i = 0; i < dataArray.length; i++) {
        if (dataArray[i] > maxEnergy) {
          maxEnergy = dataArray[i];
          maxFreq = (i * audioContext.sampleRate) / analyser.fftSize;
        }
      }

      if (maxEnergy > 30) {
        document.getElementById('peak-freq').textContent = Math.round(maxFreq);
        document.getElementById('harmonic-count').textContent = Math.floor(maxFreq / currentFrequency);
      }

      requestAnimationFrame(drawSpectrum);
    }

    // === EVENT LISTENERS ===
    document.getElementById('frequency-slider').addEventListener('input', (e) => {
      currentFrequency = parseFloat(e.target.value);
      document.getElementById('freq-display').textContent = currentFrequency;
      if (isPlaying && oscillator) {
        oscillator.frequency.setTargetAtTime(currentFrequency, audioContext.currentTime, 0.1);
      }
    });

    document.getElementById('play-btn').addEventListener('click', () => {
      if (isPlaying) {
        stopTone();
      } else {
        startTone(currentFrequency);
      }
    });

    document.getElementById('stop-btn').addEventListener('click', stopTone);

    // Waveform buttons
    document.querySelectorAll('.waveform-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.waveform-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        setWaveform(e.target.dataset.waveform);
      });
    });

    // Chord presets
    const chordMap = {
      major: [1, 1.25, 1.5], // 1:1.25:1.5 ratio (C-E-G)
      minor: [1, 1.2, 1.5], // 1:1.2:1.5 ratio (C-Eb-G)
      fifth: [1, 1.5], // Perfect fifth (C-G)
      octave: [1, 2] // Octave (C-C')
    };

    document.querySelectorAll('[data-chord]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const chordKey = e.target.dataset.chord;
        const ratios = chordMap[chordKey];
        const baseFreq = currentFrequency;
        
        // Play stacked chord (optional: could layer multiple oscillators)
        // For simplicity, just jump to first harmonic
        startTone(baseFreq);
        alert(`Playing ${chordKey.toUpperCase()} chord\nRatios: ${ratios.join(' : ')}`);
      });
    });

    // Start visualization loop
    drawSpectrum();
  </script>
</body>
</html>
