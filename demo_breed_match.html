<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breed Match — Find Your Dog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Manrope', sans-serif;
            background: linear-gradient(135deg, #fff8f3 0%, #fff0e6 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
            color: #2c2c2c;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .hero {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeSlideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) ease-out;
        }
        
        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ff6b6b 0%, #ffa94d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .tagline {
            font-size: 1.1rem;
            color: #666;
            font-weight: 500;
        }
        
        .quiz-container {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            animation: fadeSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) ease-out 0.2s both;
        }
        
        .question-group {
            margin-bottom: 2.5rem;
            animation: fadeIn 0.6s ease-out;
        }
        
        .question-group.hidden {
            display: none;
        }
        
        .question-label {
            font-family: 'Syne', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #ff6b6b;
        }
        
        .options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.8rem;
        }
        
        .option {
            display: flex;
            align-items: center;
            padding: 1rem;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            background: #fafafa;
        }
        
        .option:hover {
            border-color: #ffa94d;
            background: #fff9f0;
            transform: translateX(4px);
        }
        
        .option input[type="radio"] {
            margin-right: 1rem;
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #ff6b6b;
        }
        
        .option label {
            cursor: pointer;
            flex: 1;
            font-weight: 600;
        }
        
        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            animation: fadeSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) ease-out 0.4s both;
        }
        
        button {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b 0%, #ffa94d 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.3);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #ff6b6b;
        }
        
        .btn-secondary:hover {
            background: #e8e8e8;
        }
        
        .result-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
            animation: fadeScaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) ease-out;
        }
        
        .result-card.hidden {
            display: none;
        }
        
        .breed-image {
            width: 200px;
            height: 200px;
            border-radius: 16px;
            margin: 0 auto 1.5rem;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            animation: fadeSlideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) ease-out;
        }
        
        .breed-name {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: #ff6b6b;
        }
        
        .breed-facts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }
        
        .fact {
            background: linear-gradient(135deg, #fff8f3 0%, #fff0e6 100%);
            padding: 1rem;
            border-radius: 12px;
            border-left: 4px solid #ff6b6b;
        }
        
        .fact-label {
            font-size: 0.85rem;
            color: #999;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        
        .fact-value {
            font-family: 'Syne', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: #ff6b6b;
        }
        
        .breed-description {
            font-size: 1rem;
            line-height: 1.6;
            color: #666;
            margin: 1.5rem 0;
            text-align: left;
        }
        
        .progress {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            justify-content: center;
        }
        
        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f0f0f0;
            transition: all 0.3s;
        }
        
        .progress-dot.active {
            background: #ff6b6b;
            width: 24px;
            border-radius: 4px;
        }
        
        @keyframes fadeSlideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeScaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        @media (max-width: 600px) {
            .quiz-container {
                padding: 1.5rem;
            }
            
            .breed-name {
                font-size: 2rem;
            }
            
            .breed-facts {
                grid-template-columns: 1fr;
            }
        }
        
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>🐕 Breed Match</h1>
            <p class="tagline">Find your perfect dog breed in 5 questions</p>
        </div>
        
        <div class="quiz-container" id="quizContainer">
            <div class="progress" id="progress"></div>
            
            <div class="question-group" data-question="0">
                <div class="question-label">What size do you prefer?</div>
                <div class="options">
                    <label class="option">
                        <input type="radio" name="size" value="small">
                        <label>Small (under 25 lbs)</label>
                    </label>
                    <label class="option">
                        <input type="radio" name="size" value="medium">
                        <label>Medium (25-60 lbs)</label>
                    </label>
                    <label class="option">
                        <input type="radio" name="size" value="large">
                        <label>Large (over 60 lbs)</label>
                    </label>
                </div>
            </div>
            
            <div class="question-group hidden" data-question="1">
                <div class="question-label">Energy level?</div>
                <div class="options">
                    <label class="option">
                        <input type="radio" name="energy" value="low">
                        <label>Low (calm, relaxed)</label>
                    </label>
                    <label class="option">
                        <input type="radio" name="energy" value="medium">
                        <label>Medium (active)</label>
                    </label>
                    <label class="option">
                        <input type="radio" name="energy" value="high">
                        <label>High (very active, athletic)</label>
                    </label>
                </div>
            </div>
            
            <div class="question-group hidden" data-question="2">
                <div class="question-label">Favorite traits?</div>
                <div class="options">
                    <label class="option">
                        <input type="radio" name="trait" value="friendly">
                        <label>Friendly & social</label>
                    </label>
                    <label class="option">
                        <input type="radio" name="trait" value="protective">
                        <label>Protective & loyal</label>
                    </label>
                    <label class="option">
                        <input type="radio" name="trait" value="smart">
                        <label>Smart & trainable</label>
                    </label>
                </div>
            </div>
            
            <div class="question-group hidden" data-question="3">
                <div class="question-label">Grooming tolerance?</div>
                <div class="options">
                    <label class="option">
                        <input type="radio" name="grooming" value="low">
                        <label>Low maintenance</label>
                    </label>
                    <label class="option">
                        <input type="radio" name="grooming" value="medium">
                        <label>Medium upkeep</label>
                    </label>
                    <label class="option">
                        <input type="radio" name="grooming" value="high">
                        <label>High (regular brushing)</label>
                    </label>
                </div>
            </div>
            
            <div class="question-group hidden" data-question="4">
                <div class="question-label">Experience with dogs?</div>
                <div class="options">
                    <label class="option">
                        <input type="radio" name="experience" value="first-time">
                        <label>First-time owner</label>
                    </label>
                    <label class="option">
                        <input type="radio" name="experience" value="some">
                        <label>Some experience</label>
                    </label>
                    <label class="option">
                        <input type="radio" name="experience" value="experienced">
                        <label>Experienced handler</label>
                    </label>
                </div>
            </div>
            
            <div class="button-group">
                <button class="btn-secondary" id="prevBtn" onclick="prevQuestion()" style="display: none;">← Back</button>
                <button class="btn-primary" id="nextBtn" onclick="nextQuestion()">Next</button>
            </div>
        </div>
        
        <div class="result-card hidden" id="resultCard">
            <img class="breed-image" id="breedImage" src="" alt="breed">
            <div class="breed-name" id="breedName"></div>
            <div class="breed-facts">
                <div class="fact">
                    <div class="fact-label">Size</div>
                    <div class="fact-value" id="breedSize"></div>
                </div>
                <div class="fact">
                    <div class="fact-label">Energy</div>
                    <div class="fact-value" id="breedEnergy"></div>
                </div>
                <div class="fact">
                    <div class="fact-label">Lifespan</div>
                    <div class="fact-value" id="breedLifespan"></div>
                </div>
                <div class="fact">
                    <div class="fact-label">Intelligence</div>
                    <div class="fact-value" id="breedIntelligence"></div>
                </div>
            </div>
            <div class="breed-description" id="breedDescription"></div>
            <div class="button-group">
                <button class="btn-primary" onclick="resetQuiz()">Try Again</button>
            </div>
        </div>
    </div>
    
    <script>
        const breeds = {
            'golden-retriever': {
                name: 'Golden Retriever',
                size: 'Large',
                energy: 'High',
                lifespan: '10-12 yrs',
                intelligence: 'Very High',
                description: 'Friendly, intelligent, and devoted. Excellent family dogs with a gentle nature. Love swimming and retrieving.',
                image: 'https://images.dog.ceo/breeds/retriever-golden/n02099601_11003.jpg',
                score: { 'size-small': 0, 'size-medium': 0, 'size-large': 5, 'energy-low': 0, 'energy-medium': 3, 'energy-high': 5, 'trait-friendly': 5, 'trait-protective': 2, 'trait-smart': 4, 'grooming-low': 2, 'grooming-medium': 3, 'grooming-high': 3, 'experience-first-time': 3, 'experience-some': 3, 'experience-experienced': 5 }
            },
            'french-bulldog': {
                name: 'French Bulldog',
                size: 'Small',
                energy: 'Low',
                lifespan: '10-12 yrs',
                intelligence: 'High',
                description: 'Compact, muscular, and affectionate. Perfect for apartments. Playful but not overly demanding.',
                image: 'https://images.dog.ceo/breeds/bulldog-french/kayla.jpg',
                score: { 'size-small': 5, 'size-medium': 2, 'size-large': 0, 'energy-low': 5, 'energy-medium': 3, 'energy-high': 0, 'trait-friendly': 5, 'trait-protective': 2, 'trait-smart': 3, 'grooming-low': 4, 'grooming-medium': 3, 'grooming-high': 1, 'experience-first-time': 5, 'experience-some': 4, 'experience-experienced': 3 }
            },
            'german-shepherd': {
                name: 'German Shepherd',
                size: 'Large',
                energy: 'High',
                lifespan: '9-13 yrs',
                intelligence: 'Very High',
                description: 'Intelligent, versatile, and loyal. Excellent working dogs. Thrive with training and purpose.',
                image: 'https://images.dog.ceo/breeds/germanshepherd/n02106662_1000.jpg',
                score: { 'size-small': 0, 'size-medium': 0, 'size-large': 5, 'energy-low': 0, 'energy-medium': 2, 'energy-high': 5, 'trait-friendly': 3, 'trait-protective': 5, 'trait-smart': 5, 'grooming-low': 1, 'grooming-medium': 4, 'grooming-high': 3, 'experience-first-time': 1, 'experience-some': 3, 'experience-experienced': 5 }
            },
            'beagle': {
                name: 'Beagle',
                size: 'Small',
                energy: 'High',
                lifespan: '12-15 yrs',
                intelligence: 'High',
                description: 'Curious, merry, and pack-oriented. Excellent scent trackers. Love outdoor adventures.',
                image: 'https://images.dog.ceo/breeds/beagle/n02088364_11136.jpg',
                score: { 'size-small': 4, 'size-medium': 3, 'size-large': 0, 'energy-low': 0, 'energy-medium': 4, 'energy-high': 5, 'trait-friendly': 5, 'trait-protective': 2, 'trait-smart': 3, 'grooming-low': 5, 'grooming-medium': 3, 'grooming-high': 1, 'experience-first-time': 3, 'experience-some': 4, 'experience-experienced': 4 }
            },
            'poodle': {
                name: 'Poodle',
                size: 'Medium',
                energy: 'High',
                lifespan: '12-15 yrs',
                intelligence: 'Very High',
                description: 'Highly intelligent and athletic. Excellent learners. Requires regular grooming. Comes in three sizes.',
                image: 'https://images.dog.ceo/breeds/poodle-standard/myfirstpoodle.jpg',
                score: { 'size-small': 4, 'size-medium': 5, 'size-large': 4, 'energy-low': 1, 'energy-medium': 3, 'energy-high': 5, 'trait-friendly': 4, 'trait-protective': 2, 'trait-smart': 5, 'grooming-low': 0, 'grooming-medium': 3, 'grooming-high': 5, 'experience-first-time': 2, 'experience-some': 5, 'experience-experienced': 5 }
            },
            'dachshund': {
                name: 'Dachshund',
                size: 'Small',
                energy: 'Medium',
                lifespan: '12-16 yrs',
                intelligence: 'High',
                description: 'Curious and courageous despite their size. Great apartment dogs. Can be stubborn.',
                image: 'https://images.dog.ceo/breeds/dachshund/cooper1.jpg',
                score: { 'size-small': 5, 'size-medium': 2, 'size-large': 0, 'energy-low': 3, 'energy-medium': 5, 'energy-high': 2, 'trait-friendly': 4, 'trait-protective': 3, 'trait-smart': 3, 'grooming-low': 4, 'grooming-medium': 3, 'grooming-high': 1, 'experience-first-time': 4, 'experience-some': 5, 'experience-experienced': 3 }
            },
            'labrador': {
                name: 'Labrador Retriever',
                size: 'Large',
                energy: 'High',
                lifespan: '10-12 yrs',
                intelligence: 'Very High',
                description: 'Outgoing, even-tempered, and athletic. Superb family dogs and service animals. Love water.',
                image: 'https://images.dog.ceo/breeds/retriever-lab/dukeandprincess.jpg',
                score: { 'size-small': 0, 'size-medium': 1, 'size-large': 5, 'energy-low': 0, 'energy-medium': 3, 'energy-high': 5, 'trait-friendly': 5, 'trait-protective': 3, 'trait-smart': 4, 'grooming-low': 4, 'grooming-medium': 5, 'grooming-high': 2, 'experience-first-time': 4, 'experience-some': 5, 'experience-experienced': 5 }
            },
            'shiba-inu': {
                name: 'Shiba Inu',
                size: 'Small',
                energy: 'Medium',
                lifespan: '12-16 yrs',
                intelligence: 'High',
                description: 'Alert, confident, and dignified. Independent streak. Loyal to family, reserved with strangers.',
                image: 'https://images.dog.ceo/breeds/shiba/shiba18.jpg',
                score: { 'size-small': 5, 'size-medium': 2, 'size-large': 0, 'energy-low': 3, 'energy-medium': 5, 'energy-high': 2, 'trait-friendly': 2, 'trait-protective': 4, 'trait-smart': 4, 'grooming-low': 2, 'grooming-medium': 3, 'grooming-high': 4, 'experience-first-time': 1, 'experience-some': 3, 'experience-experienced': 5 }
            },
            'corgi': {
                name: 'Corgi',
                size: 'Small',
                energy: 'Medium',
                lifespan: '12-13 yrs',
                intelligence: 'Very High',
                description: 'Short-legged herders with big personalities. Alert and affectionate. Love games and activity.',
                image: 'https://images.dog.ceo/breeds/corgi-cardigan/corgipuppy.jpg',
                score: { 'size-small': 5, 'size-medium': 3, 'size-large': 0, 'energy-low': 2, 'energy-medium': 5, 'energy-high': 4, 'trait-friendly': 5, 'trait-protective': 3, 'trait-smart': 5, 'grooming-low': 2, 'grooming-medium': 3, 'grooming-high': 4, 'experience-first-time': 4, 'experience-some': 5, 'experience-experienced': 4 }
            },
            'border-collie': {
                name: 'Border Collie',
                size: 'Medium',
                energy: 'High',
                lifespan: '12-15 yrs',
                intelligence: 'Genius',
                description: 'Regarded as the most intelligent dog breed. Incredibly athletic and energetic. Need mental stimulation.',
                image: 'https://images.dog.ceo/breeds/collie-border/codyIMG_1204.jpg',
                score: { 'size-small': 3, 'size-medium': 5, 'size-large': 2, 'energy-low': 0, 'energy-medium': 2, 'energy-high': 5, 'trait-friendly': 3, 'trait-protective': 2, 'trait-smart': 5, 'grooming-low': 2, 'grooming-medium': 4, 'grooming-high': 3, 'experience-first-time': 0, 'experience-some': 2, 'experience-experienced': 5 }
            }
        };
        
        let currentQuestion = 0;
        const answers = {};
        
        function getScore(breed, question, answer) {
            const key = question + '-' + answer;
            return breed.score[key] || 0;
        }
        
        function initProgress() {
            const progress = document.getElementById('progress');
            progress.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const dot = document.createElement('div');
                dot.className = 'progress-dot' + (i === 0 ? ' active' : '');
                progress.appendChild(dot);
            }
        }
        
        function updateProgress() {
            const dots = document.querySelectorAll('.progress-dot');
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentQuestion);
            });
        }
        
        function showQuestion(n) {
            const questions = document.querySelectorAll('.question-group');
            if (n >= questions.length) n = questions.length - 1;
            if (n < 0) n = 0;
            currentQuestion = n;
            
            questions.forEach((q, i) => {
                q.classList.toggle('hidden', i !== n);
            });
            
            document.getElementById('prevBtn').style.display = n > 0 ? 'block' : 'none';
            document.getElementById('nextBtn').textContent = n === 4 ? 'Get Result' : 'Next';
            updateProgress();
        }
        
        function nextQuestion() {
            const questions = document.querySelectorAll('.question-group');
            const names = ['size', 'energy', 'trait', 'grooming', 'experience'];
            const checked = document.querySelector(`input[name="${names[currentQuestion]}"]:checked`);
            
            if (!checked) {
                alert('Please select an option');
                return;
            }
            
            answers[names[currentQuestion]] = checked.value;
            
            if (currentQuestion === 4) {
                showResult();
            } else {
                currentQuestion++;
                showQuestion(currentQuestion);
            }
        }
        
        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion(currentQuestion);
            }
        }
        
        function showResult() {
            const scores = {};
            Object.keys(breeds).forEach(key => {
                const breed = breeds[key];
                let score = 0;
                
                Object.entries(answers).forEach(([question, answer]) => {
                    score += getScore(breed, question, answer);
                });
                
                scores[key] = score;
            });
            
            const bestBreed = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            const breed = breeds[bestBreed];
            
            document.getElementById('quizContainer').classList.add('hidden');
            document.getElementById('resultCard').classList.remove('hidden');
            document.getElementById('breedName').textContent = breed.name;
            document.getElementById('breedImage').src = breed.image;
            document.getElementById('breedSize').textContent = breed.size;
            document.getElementById('breedEnergy').textContent = breed.energy;
            document.getElementById('breedLifespan').textContent = breed.lifespan;
            document.getElementById('breedIntelligence').textContent = breed.intelligence;
            document.getElementById('breedDescription').textContent = breed.description;
        }
        
        function resetQuiz() {
            currentQuestion = 0;
            Object.keys(answers).forEach(key => delete answers[key]);
            document.querySelectorAll('input[type="radio"]').forEach(input => input.checked = false);
            document.getElementById('quizContainer').classList.remove('hidden');
            document.getElementById('resultCard').classList.add('hidden');
            showQuestion(0);
        }
        
        initProgress();
        showQuestion(0);
    </script>
</body>
</html>
