<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Element Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background: linear-gradient(135deg, #0a1428 0%, #1a2a4a 100%);
      color: #e0e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #d4af37 0%, #ffd700 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 400;
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 1rem;
      color: #a0b0c0;
      font-style: italic;
    }

    .main {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 2rem;
      align-items: start;
    }

    .periodic-section {
      animation: fadeLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .section-title {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #d4af37;
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .periodic-table {
      display: grid;
      grid-template-columns: repeat(18, 1fr);
      gap: 0.4rem;
      background: rgba(255, 255, 255, 0.02);
      padding: 1rem;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(212, 175, 55, 0.1);
    }

    .element {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      border: 2px solid transparent;
      padding: 0.5rem;
      font-size: 0.75rem;
      text-align: center;
    }

    .element:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
    }

    .element.selected {
      border-color: #d4af37;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.6), inset 0 0 10px rgba(212, 175, 55, 0.2);
      transform: scale(1.15);
    }

    .element.metal { background: linear-gradient(135deg, #d4af37 0%, #b89129 100%); color: #0a1428; }
    .element.nonmetal { background: linear-gradient(135deg, #00d9ff 0%, #00a8cc 100%); color: #0a1428; }
    .element.gas { background: linear-gradient(135deg, #00ff00 0%, #00aa00 100%); color: #0a1428; }
    .element.metalloid { background: linear-gradient(135deg, #ff6b9d 0%, #cc3366 100%); color: #fff; }

    .symbol { font-weight: 700; font-size: 0.9rem; }
    .number { font-size: 0.6rem; opacity: 0.7; }

    .detail-section {
      animation: fadeRight 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .detail-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 12px;
      padding: 2rem;
      backdrop-filter: blur(10px);
      margin-bottom: 1.5rem;
    }

    .detail-empty {
      text-align: center;
      color: #70808a;
      padding: 3rem 1rem;
      font-style: italic;
    }

    .element-name {
      font-family: 'Instrument Serif', serif;
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #d4af37;
      font-weight: 400;
    }

    .element-symbol {
      font-size: 1.2rem;
      color: #a0b0c0;
      margin-bottom: 1.5rem;
    }

    .shells-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 180px;
      margin: 2rem 0;
      position: relative;
    }

    .nucleus {
      position: absolute;
      width: 16px;
      height: 16px;
      background: #d4af37;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.8);
      z-index: 10;
    }

    .shell {
      position: absolute;
      border: 2px solid;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shell1 { width: 50px; height: 50px; border-color: #00d9ff; }
    .shell2 { width: 90px; height: 90px; border-color: #00ff00; }
    .shell3 { width: 130px; height: 130px; border-color: #ff6b9d; }
    .shell4 { width: 170px; height: 170px; border-color: #ffa500; }

    .electron {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #00d9ff;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(0, 217, 255, 0.8);
    }

    .facts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .fact {
      background: rgba(212, 175, 55, 0.1);
      border-left: 3px solid #d4af37;
      padding: 1rem;
      border-radius: 4px;
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      animation-fill-mode: both;
    }

    .fact:nth-child(1) { animation-delay: 0.1s; }
    .fact:nth-child(2) { animation-delay: 0.2s; }
    .fact:nth-child(3) { animation-delay: 0.3s; }
    .fact:nth-child(4) { animation-delay: 0.4s; }

    .fact-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a0b0c0;
      margin-bottom: 0.4rem;
    }

    .fact-value {
      font-size: 1.2rem;
      font-weight: 600;
      color: #e0e8f0;
    }

    .uses {
      font-size: 0.9rem;
      line-height: 1.6;
      color: #b0c0d0;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 1024px) {
      .main {
        grid-template-columns: 1fr;
      }

      .periodic-table {
        grid-template-columns: repeat(12, 1fr);
      }

      .element {
        font-size: 0.65rem;
      }
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 1.8rem;
      }

      .periodic-table {
        grid-template-columns: repeat(10, 1fr);
        gap: 0.3rem;
        padding: 0.5rem;
      }

      .element {
        font-size: 0.55rem;
      }

      .detail-card {
        padding: 1rem;
      }

      .element-name {
        font-size: 1.4rem;
      }

      .facts {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Element Explorer</h1>
      <p class="subtitle">Discover the building blocks of matter</p>
    </header>

    <div class="main">
      <div class="periodic-section">
        <div class="section-title">Periodic Table</div>
        <div class="periodic-table" id="periodicTable"></div>
      </div>

      <div class="detail-section">
        <div class="section-title">Element Details</div>
        <div id="detailPanel">
          <div class="detail-card">
            <div class="detail-empty">← Click an element to explore</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const elements = [
      { num: 1, symbol: 'H', name: 'Hydrogen', electrons: 1, type: 'nonmetal', density: 0.00008, melting: -259.16, uses: 'Fuel, balloons, water' },
      { num: 2, symbol: 'He', name: 'Helium', electrons: 2, type: 'gas', density: 0.0001785, melting: -272.2, uses: 'Balloons, welding, cooling' },
      { num: 3, symbol: 'Li', name: 'Lithium', electrons: 3, type: 'metal', density: 0.534, melting: 180.54, uses: 'Batteries, alloys' },
      { num: 4, symbol: 'Be', name: 'Beryllium', electrons: 4, type: 'metal', density: 1.85, melting: 1287, uses: 'Aerospace, electronics' },
      { num: 5, symbol: 'B', name: 'Boron', electrons: 5, type: 'metalloid', density: 2.34, melting: 2076, uses: 'Detergents, glass, semiconductors' },
      { num: 6, symbol: 'C', name: 'Carbon', electrons: 6, type: 'nonmetal', density: 2.26, melting: 3823, uses: 'Life, diamonds, graphite' },
      { num: 7, symbol: 'N', name: 'Nitrogen', electrons: 7, type: 'nonmetal', density: 0.0012, melting: -210.01, uses: 'Fertilizers, explosives' },
      { num: 8, symbol: 'O', name: 'Oxygen', electrons: 8, type: 'nonmetal', density: 0.001429, melting: -218.79, uses: 'Respiration, combustion, water' },
      { num: 9, symbol: 'F', name: 'Fluorine', electrons: 9, type: 'nonmetal', density: 0.001696, melting: -219.6, uses: 'Refrigerants, toothpaste' },
      { num: 10, symbol: 'Ne', name: 'Neon', electrons: 10, type: 'gas', density: 0.0009, melting: -248.59, uses: 'Neon signs, lighting' },
      { num: 26, symbol: 'Fe', name: 'Iron', electrons: 26, type: 'metal', density: 7.874, melting: 1538, uses: 'Steel, construction, tools' },
      { num: 29, symbol: 'Cu', name: 'Copper', electrons: 29, type: 'metal', density: 8.96, melting: 1084.62, uses: 'Wiring, coins, pipes' },
      { num: 47, symbol: 'Ag', name: 'Silver', electrons: 47, type: 'metal', density: 10.49, melting: 961.78, uses: 'Jewelry, electronics, mirrors' },
      { num: 79, symbol: 'Au', name: 'Gold', electrons: 79, type: 'metal', density: 19.3, melting: 1064.18, uses: 'Jewelry, electronics, coins' },
      { num: 80, symbol: 'Hg', name: 'Mercury', electrons: 80, type: 'metal', density: 13.5336, melting: -38.83, uses: 'Thermometers, barometers' },
      { num: 82, symbol: 'Pb', name: 'Lead', electrons: 82, type: 'metal', density: 11.34, melting: 327.46, uses: 'Batteries, shielding' },
      { num: 92, symbol: 'U', name: 'Uranium', electrons: 92, type: 'metal', density: 19.1, melting: 1135, uses: 'Nuclear fuel, medical' }
    ];

    function getElectronShells(electrons) {
      const shells = [];
      let remaining = electrons;
      const maxPerShell = [2, 8, 18, 32, 32, 18, 8];
      for (let i = 0; i < maxPerShell.length && remaining > 0; i++) {
        const count = Math.min(remaining, maxPerShell[i]);
        shells.push(count);
        remaining -= count;
      }
      return shells;
    }

    const table = document.getElementById('periodicTable');
    const detailPanel = document.getElementById('detailPanel');

    elements.forEach(el => {
      const div = document.createElement('div');
      div.className = `element ${el.type}`;
      div.innerHTML = `<span class="number">${el.num}</span><span class="symbol">${el.symbol}</span>`;
      div.addEventListener('click', () => selectElement(el, div));
      table.appendChild(div);
    });

    function selectElement(element, el) {
      document.querySelectorAll('.element').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');

      const shells = getElectronShells(element.electrons);
      let html = `<div class="detail-card">
        <div class="element-name">${element.name}</div>
        <div class="element-symbol">${element.symbol} · Atomic #${element.num}</div>
        <div class="shells-container">
          <div class="nucleus"></div>`;
      
      shells.forEach((count, shellIdx) => {
        const angle = (360 / count);
        html += `<div class="shell shell${shellIdx + 1}">`;
        for (let i = 0; i < count; i++) {
          const rad = (i * angle) * Math.PI / 180;
          const shellRadius = 25 + shellIdx * 20;
          const x = Math.cos(rad) * shellRadius;
          const y = Math.sin(rad) * shellRadius;
          html += `<div class="electron" style="transform: translate(${x}px, ${y}px);"></div>`;
        }
        html += `</div>`;
      });

      html += `</div>
        <div class="facts">
          <div class="fact">
            <div class="fact-label">Electrons</div>
            <div class="fact-value">${element.electrons}</div>
          </div>
          <div class="fact">
            <div class="fact-label">Density (g/cm³)</div>
            <div class="fact-value">${element.density}</div>
          </div>
          <div class="fact">
            <div class="fact-label">Melting Point (°C)</div>
            <div class="fact-value">${element.melting}</div>
          </div>
          <div class="fact">
            <div class="fact-label">Category</div>
            <div class="fact-value" style="text-transform: capitalize;">${element.type}</div>
          </div>
        </div>
        <div class="detail-card" style="margin-top: 1rem;">
          <div class="fact-label">Common Uses</div>
          <div class="uses">${element.uses}</div>
        </div>
      </div>`;

      detailPanel.innerHTML = html;
    }

    // Auto-select hydrogen on load
    setTimeout(() => selectElement(elements[0], document.querySelectorAll('.element')[0]), 100);
  </script>
</body>
</html>
