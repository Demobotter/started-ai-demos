<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Simulator — Financial Projection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Geist', sans-serif;
            background: linear-gradient(135deg, #faf8f6 0%, #f0e6de 100%);
            color: #2d2d2d;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease;
        }
        .header h1 {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 400;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
            color: #1a1a1a;
        }
        .header p {
            font-size: 1.05rem;
            color: #666;
            font-weight: 500;
        }
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            align-items: start;
            margin-bottom: 2rem;
        }
        .controls {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            animation: fadeInUp 0.8s ease 0.1s both;
        }
        .control-group {
            margin-bottom: 2rem;
        }
        .control-group:last-child {
            margin-bottom: 0;
        }
        label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            color: #2d2d2d;
            margin-bottom: 0.75rem;
        }
        input[type="range"],
        input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'Geist', sans-serif;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input[type="range"] {
            padding: 0;
            height: 6px;
            background: #e5e5e5;
            border: none;
            border-radius: 4px;
            -webkit-appearance: none;
            appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #1a1a1a;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s;
        }
        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #1a1a1a;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }
        input[type="range"]:hover::-webkit-slider-thumb {
            background: #3d3d3d;
        }
        input[type="number"] {
            font-family: 'Geist', sans-serif;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #1a1a1a;
        }
        .value-display {
            display: inline-block;
            float: right;
            font-weight: 600;
            color: #1a1a1a;
            font-family: 'Geist', sans-serif;
        }
        .chart-container {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            animation: fadeInUp 0.8s ease 0.2s both;
        }
        canvas {
            width: 100%;
            height: 300px;
            display: block;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }
        .stat-card {
            background: #faf8f6;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            animation: fadeInUp 0.8s ease 0.3s both;
        }
        .stat-label {
            font-size: 0.85rem;
            color: #999;
            font-weight: 500;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1a1a1a;
            font-family: 'Geist', sans-serif;
        }
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @media (max-width: 900px) {
            .content {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 2.2rem;
            }
        }
        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Wealth Simulator</h1>
            <p>Project your financial growth over time</p>
        </div>
        
        <div class="content">
            <div class="controls">
                <div class="control-group">
                    <label>Starting Amount: <span class="value-display" id="startDisplay">$10,000</span></label>
                    <input type="range" id="startAmount" min="0" max="100000" step="1000" value="10000">
                </div>
                
                <div class="control-group">
                    <label>Annual Contribution: <span class="value-display" id="contribDisplay">$2,000</span></label>
                    <input type="range" id="contribution" min="0" max="25000" step="500" value="2000">
                </div>
                
                <div class="control-group">
                    <label>Expected Return (%): <span class="value-display" id="returnDisplay">7.0%</span></label>
                    <input type="range" id="returnRate" min="0" max="20" step="0.5" value="7">
                </div>
                
                <div class="control-group">
                    <label>Years to Project: <span class="value-display" id="yearsDisplay">30</span></label>
                    <input type="range" id="years" min="1" max="50" step="1" value="30">
                </div>
            </div>
            
            <div class="chart-container">
                <canvas id="chart"></canvas>
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-label">Total Invested</div>
                        <div class="stat-value" id="totalInvested">$70,000</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Final Amount</div>
                        <div class="stat-value" id="finalAmount">$181,000</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        
        const startInput = document.getElementById('startAmount');
        const contribInput = document.getElementById('contribution');
        const returnInput = document.getElementById('returnRate');
        const yearsInput = document.getElementById('years');
        
        function formatCurrency(val) {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(val);
        }
        
        function updateValues() {
            const start = parseFloat(startInput.value);
            const contrib = parseFloat(contribInput.value);
            const rate = parseFloat(returnInput.value) / 100;
            const years = parseInt(yearsInput.value);
            
            document.getElementById('startDisplay').textContent = formatCurrency(start);
            document.getElementById('contribDisplay').textContent = formatCurrency(contrib);
            document.getElementById('returnDisplay').textContent = (parseFloat(returnInput.value)).toFixed(1) + '%';
            document.getElementById('yearsDisplay').textContent = years;
            
            let balance = start;
            let totalInvested = start;
            const data = [balance];
            
            for (let y = 1; y <= years; y++) {
                balance = balance * (1 + rate) + contrib;
                totalInvested += contrib;
                data.push(balance);
            }
            
            document.getElementById('totalInvested').textContent = formatCurrency(totalInvested);
            document.getElementById('finalAmount').textContent = formatCurrency(balance);
            
            drawChart(data, years);
        }
        
        function drawChart(data, years) {
            const width = canvas.offsetWidth;
            const height = canvas.offsetHeight;
            canvas.width = width;
            canvas.height = height;
            
            const padding = 40;
            const graphWidth = width - 2 * padding;
            const graphHeight = height - 2 * padding;
            
            const maxValue = Math.max(...data) * 1.1;
            const minValue = 0;
            
            ctx.fillStyle = '#faf8f6';
            ctx.fillRect(0, 0, width, height);
            
            // Grid lines
            ctx.strokeStyle = '#eee';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padding + (graphHeight / 5) * i;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(width - padding, y);
                ctx.stroke();
            }
            
            // Axes
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, height - padding);
            ctx.lineTo(width - padding, height - padding);
            ctx.stroke();
            
            // Plot line
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 3;
            ctx.beginPath();
            for (let i = 0; i < data.length; i++) {
                const x = padding + (graphWidth / years) * i;
                const y = height - padding - (data[i] / maxValue) * graphHeight;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            
            // Fill under line
            ctx.fillStyle = 'rgba(26, 26, 26, 0.05)';
            ctx.lineTo(width - padding, height - padding);
            ctx.lineTo(padding, height - padding);
            ctx.closePath();
            ctx.fill();
            
            // Labels
            ctx.fillStyle = '#666';
            ctx.font = '12px Geist';
            ctx.textAlign = 'center';
            for (let i = 0; i <= years; i += Math.max(1, Math.floor(years / 10))) {
                const x = padding + (graphWidth / years) * i;
                ctx.fillText(i, x, height - padding + 20);
            }
            
            ctx.textAlign = 'right';
            for (let i = 0; i <= 5; i++) {
                const val = (maxValue / 5) * i;
                const y = height - padding - (graphHeight / 5) * i;
                ctx.fillText(formatCurrency(val), padding - 10, y + 4);
            }
        }
        
        startInput.addEventListener('input', updateValues);
        contribInput.addEventListener('input', updateValues);
        returnInput.addEventListener('input', updateValues);
        yearsInput.addEventListener('input', updateValues);
        
        window.addEventListener('resize', updateValues);
        updateValues();
    </script>
</body>
</html>
