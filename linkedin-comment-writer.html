<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Comment Reply Writer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F0F4FF;--card:#FFFFFF;--border:#DDEAFF;--text:#111827;--muted:#6B7280;--accent:#2563EB;--accent-light:#EFF6FF;--radius:12px;--rsm:8px}
body{font-family:'Hanken Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:10px}
.logo{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:17px;color:var(--accent)}
.badge{font-size:11px;background:var(--accent-light);color:var(--accent);padding:3px 10px;border-radius:20px;font-weight:600;border:1px solid rgba(37,99,235,.2)}
main{flex:1;max-width:740px;margin:0 auto;width:100%;padding:36px 20px 60px}
.hero{text-align:center;margin-bottom:32px}
.hero h1{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(24px,5vw,36px);font-weight:700;line-height:1.15;letter-spacing:-.4px;margin-bottom:8px}
.hero p{color:var(--muted);font-size:15px;max-width:480px;margin:0 auto;line-height:1.6}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:26px;margin-bottom:16px}
.card h2{font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:600;margin-bottom:18px}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.fg:last-child{margin-bottom:0}
label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
input,select,textarea{font-family:'Hanken Grotesk',sans-serif;font-size:14px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea{resize:vertical;min-height:90px;line-height:1.5}
.tone-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.t-opt input[type=radio]{display:none}
.t-lbl{display:block;text-align:center;padding:9px 6px;border:1.5px solid var(--border);border-radius:var(--rsm);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;background:var(--bg)}
.t-opt input:checked+.t-lbl{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.t-lbl:hover{border-color:var(--accent);color:var(--accent)}
.btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--rsm);font-family:'Hanken Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s,transform .1s;margin-top:4px}
.btn:hover{background:#1D4ED8}.btn:active{transform:scale(.99)}.btn:disabled{opacity:.5;cursor:not-allowed}
.results{display:none}.results.visible{display:block}
.reply-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rsm);padding:18px;margin-bottom:12px;position:relative}
.reply-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.reply-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent)}
.reply-text{font-size:14px;line-height:1.7;color:var(--text);white-space:pre-wrap}
.char-badge{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--card);border:1px solid var(--border);color:var(--muted)}
.copy-btn{padding:5px 14px;font-size:12px;font-weight:600;background:var(--card);border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--muted);font-family:'Hanken Grotesk',sans-serif;transition:all .15s}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}.copy-btn.copied{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:15px;display:none}.loading.visible{display:block}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
footer{text-align:center;padding:20px;font-size:12px;color:var(--muted);border-top:1px solid var(--border)}
@media(max-width:520px){.tone-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header>
  <span class="logo">CommentCraft</span>
  <span class="badge">LinkedIn Replies</span>
</header>
<main>
  <div class="hero">
    <h1>LinkedIn Comment<br>Reply Writer for Founders</h1>
    <p>Paste a comment on your post — get 5 thoughtful, on-brand replies that grow your audience without sounding like a bot.</p>
  </div>
  <div class="card">
    <h2>Your Post Context</h2>
    <div class="fg">
      <label>What was your post about?</label>
      <textarea id="post" placeholder="e.g. I shared how we hit $1M ARR without any paid ads, just content and referrals">I posted about how I fired our agency and went all-in on founder-led content — we 3x'd inbound leads in 90 days</textarea>
    </div>
    <div class="fg">
      <label>The Comment You're Replying To</label>
      <textarea id="comment" placeholder="Paste the comment here…">This is gold. I've been thinking about doing the same but worried about the time commitment. How many hours per week does it actually take?</textarea>
    </div>
    <div class="fg">
      <label>Your Name / Brand</label>
      <input type="text" id="name" value="Alex Chen" placeholder="e.g. Sarah or Loom or Acme Inc">
    </div>
    <div class="fg">
      <label>Your Tone</label>
      <div class="tone-grid">
        <label class="t-opt"><input type="radio" name="tone" value="founder" checked><span class="t-lbl">🚀 Founder</span></label>
        <label class="t-opt"><input type="radio" name="tone" value="warm"><span class="t-lbl">🤝 Warm</span></label>
        <label class="t-opt"><input type="radio" name="tone" value="expert"><span class="t-lbl">🎓 Expert</span></label>
        <label class="t-opt"><input type="radio" name="tone" value="concise"><span class="t-lbl">✂️ Concise</span></label>
      </div>
    </div>
    <button class="btn" id="genBtn" onclick="generate()">✍️ Write My Replies</button>
  </div>
  <div class="loading" id="loading"><div class="spinner"></div>Crafting your replies…</div>
  <div class="results" id="results">
    <div class="card">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:14px">5 Reply Options</div>
      <div id="replies-out"></div>
      <button class="btn" onclick="generate()" style="background:var(--bg);color:var(--accent);border:1.5px solid var(--accent);margin-top:4px">↺ New Variations</button>
    </div>
  </div>
</main>
<footer>Demo — CommentCraft · started.ai</footer>
<script>
const R={
  founder:[
    (d)=>`Great question, ${d.commenterHint}. Honest answer: around 4–6 hours/week once you find your rhythm. The first month is heavier — maybe 10hrs. But here's what changes: it compounds. That content is still pulling leads 6 months later. An ad campaign stops the second you stop paying.`,
    (d)=>`The time question is the right one to ask. For us it was about 5hrs/week. But here's the real shift — we stopped thinking of it as "content creation" and started treating it like sales calls. Once it clicks that way, the time feels different.`,
    (d)=>`Real talk: month 1 was hard. Probably 8-10 hours. By month 3, 3-4 hours. The framework matters more than the volume. Happy to share what actually worked if that's helpful.`,
    (d)=>`Totally get the hesitation. My honest take: the time wasn't the hard part. The hard part was publishing things that felt too personal or too specific. Once we got over that, the rest was just process.`,
    (d)=>`5 hours/week average for us, but front-loaded. The system matters — we batch it every Tuesday morning. The results compounded so fast that it quickly became the highest-leverage thing on the calendar.`
  ],
  warm:[
    (d)=>`That's such a valid concern — and honestly, it held me back for a while too. The real answer is about 5 hours/week once you settle in. The trick is batching. One morning a week turned it from a chore into something we actually looked forward to.`,
    (d)=>`Really appreciate you asking this! Time-wise it's about 4–6 hours/week for us. The first few weeks are the hardest, then it becomes just part of how you work. Happy to walk through our process if that would help!`,
    (d)=>`This is exactly what I wished someone had told me before we started: it's less time than you think, but it takes longer to set up than you'd expect. Roughly 5 hours/week ongoing. Worth every minute.`,
    (d)=>`Honestly, I was so worried about the time too. What surprised me most was that it actually replaced other things — less time on cold outreach, less time on pitches. The content does some of that work for you. Net-net it felt like a trade-off, not an addition.`,
    (d)=>`Great question! It ranges — some weeks 3 hours, some 7. But the key was finding our "content voice" early. Once that clicked, it stopped feeling like work. If you want, I can share the simple framework we use?`
  ],
  expert:[
    (d)=>`The time investment follows a predictable curve: weeks 1–4 average 8–10 hours as you build your content system. Months 2–3 drop to 5–6 hours. By month 4, most founders settle at 3–5 hours/week with compounding returns.`,
    (d)=>`Time commitment is the most common objection, and the data from our experience: 4.5 hours/week average over 90 days. The key variable isn't hours — it's content-to-distribution ratio. Most founders over-invest in creation, under-invest in engagement.`,
    (d)=>`Three variables determine your time investment: (1) content format — long-form takes 2x longer, (2) repurposing system — we turn 1 piece into 5, (3) how quickly you develop your POV. For us: 5hrs/week, $0 spend, 3x inbound. The math works.`,
    (d)=>`Two phases. Phase 1 (setup, weeks 1–6): 8–10hrs/week. Phase 2 (steady state): 4–5hrs/week. The bottleneck isn't time — it's the first 10 pieces of content you publish. After that, the feedback loop teaches you what to make.`,
    (d)=>`Empirically: 4–6 hours/week at scale. The non-obvious insight is that the time ROI inverts over time. Your first 10 posts generate almost no leads. Posts 30–50 drive disproportionate results. It's a lagging indicator, which is why most founders quit too early.`
  ],
  concise:[
    (d)=>`About 5 hrs/week once you have a system. First month is harder — maybe 10. Worth it.`,
    (d)=>`Honest answer: 4–6 hrs/week. The first month is the bottleneck. After that it's just rhythm.`,
    (d)=>`~5 hours/week. Batched on Tuesdays. Took 60 days to feel natural. ROI showed up at day 45.`,
    (d)=>`Time: 5 hrs/week average. Result: 3x inbound. It compounds in a way ads don't.`,
    (d)=>`Less than you think. More than zero. About 5 hours/week for us. Happy to share the system.`
  ]
};

function generate(){
  const d={
    post:document.getElementById('post').value,
    comment:document.getElementById('comment').value,
    name:document.getElementById('name').value||'Alex',
    tone:document.querySelector('input[name="tone"]:checked').value,
    commenterHint:'friend'
  };
  document.getElementById('loading').classList.add('visible');
  document.getElementById('results').classList.remove('visible');
  document.getElementById('genBtn').disabled=true;
  setTimeout(()=>{
    const arr=R[d.tone]||R.founder;
    const shuffled=[...arr].sort(()=>Math.random()-.5);
    let html='';
    shuffled.forEach((fn,i)=>{
      const text=fn(d);
      html+=`<div class="reply-card">
        <div class="reply-meta">
          <span class="reply-label">Option ${i+1}</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="char-badge">${text.length} chars</span>
            <button class="copy-btn" onclick="copyR(this,'${encodeURIComponent(text)}')">Copy</button>
          </div>
        </div>
        <div class="reply-text">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
      </div>`;
    });
    document.getElementById('replies-out').innerHTML=html;
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('results').classList.add('visible');
    document.getElementById('genBtn').disabled=false;
    document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
  },800);
}
function copyR(btn,enc){
  navigator.clipboard.writeText(decodeURIComponent(enc)).then(()=>{btn.textContent='Copied!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied')},2000)});
}
</script>
</body>
</html>
