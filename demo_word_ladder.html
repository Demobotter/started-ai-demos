<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Ladder Solver</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Albert+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Albert Sans', sans-serif;
            background: linear-gradient(135deg, #1a0a2e 0%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 50px;
            animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .hero h1 {
            font-family: 'Unbounded', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            background: linear-gradient(135deg, #ff006e, #8338ec, #3a86ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.1rem;
            color: #a0a0c0;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s backwards;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
        }

        .form-field label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #b0b0d0;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-field input {
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            font-family: 'Albert Sans', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-field input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: #ff006e;
            box-shadow: 0 0 12px rgba(255, 0, 110, 0.3);
        }

        .input-group.full {
            grid-column: 1 / -1;
        }

        .btn-solve {
            grid-column: 1 / -1;
            padding: 14px 24px;
            background: linear-gradient(135deg, #ff006e, #8338ec);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Unbounded', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 0, 110, 0.4);
        }

        .btn-solve:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 110, 0.6);
        }

        .btn-solve:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-solve:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .results-section {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s backwards;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .result-card h2 {
            font-family: 'Unbounded', sans-serif;
            font-size: 1.3rem;
            color: #3a86ff;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .ladder-display {
            background: rgba(0, 0, 0, 0.3);
            border-left: 4px solid #ff006e;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Unbounded', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 1px;
            line-height: 2;
            color: #00ff88;
            word-break: break-all;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .stat-label {
            font-size: 0.8rem;
            color: #a0a0c0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-family: 'Unbounded', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #ff006e;
        }

        .error-card {
            background: rgba(255, 0, 110, 0.1);
            border: 1px solid rgba(255, 0, 110, 0.3);
            border-radius: 8px;
            padding: 16px;
            color: #ff6ba6;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #a0a0c0;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #ff006e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        @media (max-width: 600px) {
            .hero h1 {
                font-size: 2rem;
            }

            .input-group {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .input-section,
            .result-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Word Ladder</h1>
            <p>Find the shortest path from one word to another, changing one letter at a time</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <div class="form-field">
                    <label for="startWord">Start Word</label>
                    <input type="text" id="startWord" placeholder="e.g., CAT" maxlength="10" autocomplete="off">
                </div>
                <div class="form-field">
                    <label for="endWord">End Word</label>
                    <input type="text" id="endWord" placeholder="e.g., DOG" maxlength="10" autocomplete="off">
                </div>
            </div>
            <button class="btn-solve" onclick="solveLadder()">Find Ladder</button>
        </div>

        <div class="results-section" id="resultsSection" style="display: none;">
            <div id="resultsContent"></div>
        </div>
    </div>

    <script>
        // Minimal word list (4-5 letter words)
        const WORD_LIST = [
            'at', 'be', 'by', 'do', 'go', 'he', 'id', 'if', 'in', 'is', 'it', 'me', 'my', 'no', 'of', 'on', 'or', 'so', 'to', 'up', 'us', 'we',
            'cat', 'dog', 'hat', 'rat', 'bat', 'mat', 'sat', 'pat', 'fat', 'vat', 'hot', 'dot', 'not', 'got', 'lot', 'pot', 'bit', 'fit', 'hit', 'kit', 'lit', 'pit', 'sit', 'wit', 'bad', 'dad', 'had', 'lad', 'mad', 'pad', 'sad', 'bid', 'did', 'hid', 'kid', 'lid', 'rid', 'bog', 'cog', 'fog', 'hog', 'jog', 'log', 'bag', 'gag', 'hag', 'lag', 'nag', 'rag', 'sag', 'tag', 'wag', 'big', 'dig', 'fig', 'gig', 'jig', 'pig', 'wig', 'bud', 'cud', 'dud', 'mud', 'bug', 'dug', 'hug', 'jug', 'mug', 'pug', 'rug', 'tug', 'bus', 'bun', 'fun', 'gun', 'nun', 'pun', 'run', 'sun', 'but', 'cut', 'gut', 'hut', 'jut', 'nut', 'put', 'rut', 'tut', 'buy', 'guy', 'can', 'fan', 'man', 'pan', 'ran', 'tan', 'van', 'ban', 'car', 'far', 'jar', 'tar', 'war', 'bar', 'cow', 'bow', 'how', 'low', 'mow', 'now', 'row', 'sow', 'tow', 'wow', 'box', 'cox', 'fox', 'pox', 'boy', 'coy', 'joy', 'soy', 'toy',
            'ball', 'call', 'fall', 'gall', 'hall', 'mall', 'tall', 'wall', 'bell', 'cell', 'dell', 'fell', 'hell', 'jell', 'sell', 'tell', 'well', 'yell', 'bill', 'dill', 'fill', 'gill', 'hill', 'kill', 'mill', 'pill', 'sill', 'till', 'will', 'bull', 'dull', 'full', 'gull', 'hull', 'lull', 'mull', 'pull', 'band', 'hand', 'land', 'sand', 'wand', 'bend', 'fend', 'lend', 'mend', 'rend', 'send', 'tend', 'vend', 'bind', 'find', 'kind', 'mind', 'wind', 'bond', 'fond', 'pond', 'bunk', 'dunk', 'funk', 'gunk', 'hunk', 'junk', 'punk', 'sunk', 'bank', 'hank', 'lank', 'rank', 'sank', 'tank', 'yank', 'bark', 'dark', 'hark', 'lark', 'mark', 'park', 'bask', 'cask', 'mask', 'task', 'bath', 'math', 'path', 'beat', 'feat', 'heat', 'meat', 'neat', 'peat', 'seat', 'best', 'fest', 'jest', 'lest', 'nest', 'pest', 'rest', 'test', 'vest', 'west', 'zest', 'boat', 'coat', 'goat', 'moat', 'bone', 'cone', 'done', 'gone', 'hone', 'lone', 'none', 'tone', 'zone', 'book', 'cook', 'hook', 'look', 'took', 'boot', 'foot', 'hoot', 'loot', 'moot', 'root', 'soot', 'toot', 'born', 'corn', 'horn', 'morn', 'porn', 'torn', 'worn', 'both', 'doth', 'goth', 'moth', 'bows', 'cows', 'dows', 'hows', 'lows', 'mows', 'rows', 'sows', 'tows', 'vows', 'wows', 'boys', 'coys', 'joys', 'soys', 'toys', 'coat', 'coal', 'cost', 'fast', 'cast', 'last', 'mast', 'past', 'vast', 'ease', 'lease', 'please', 'tease', 'case', 'base', 'vase', 'wise', 'rise', 'size', 'size', 'dose', 'hose', 'lose', 'nose', 'pose', 'rose',
            'bread', 'dread', 'tread', 'break', 'creak', 'freak', 'steak', 'bleak', 'speak', 'sneak', 'blend', 'spend', 'trend', 'blood', 'flood', 'brood', 'block', 'clock', 'flock', 'knock', 'shock', 'stock', 'brown', 'clown', 'crown', 'drown', 'frown', 'grown', 'drawn', 'black', 'blank', 'clank', 'flank', 'plank', 'prank', 'shank', 'spank', 'swank', 'thank', 'brand', 'grand', 'stand', 'bland', 'gland', 'blend', 'slept', 'wept', 'crept', 'swept', 'adept', 'inept'
        ];

        function hammingDistance(word1, word2) {
            if (word1.length !== word2.length) return Infinity;
            let distance = 0;
            for (let i = 0; i < word1.length; i++) {
                if (word1[i] !== word2[i]) distance++;
            }
            return distance;
        }

        function bfs(start, end) {
            start = start.toUpperCase();
            end = end.toUpperCase();

            if (start === end) return [start];
            if (start.length !== end.length) return null;

            const wordSet = new Set(WORD_LIST.map(w => w.toUpperCase()));
            if (!wordSet.has(start) || !wordSet.has(end)) return null;

            const queue = [[start, [start]]];
            const visited = new Set([start]);

            while (queue.length > 0) {
                const [currentWord, path] = queue.shift();

                if (currentWord === end) {
                    return path;
                }

                for (const word of wordSet) {
                    if (!visited.has(word) && hammingDistance(currentWord, word) === 1) {
                        visited.add(word);
                        queue.push([word, [...path, word]]);
                    }
                }
            }

            return null;
        }

        function solveLadder() {
            const startWord = document.getElementById('startWord').value.trim();
            const endWord = document.getElementById('endWord').value.trim();
            const resultsSection = document.getElementById('resultsSection');
            const resultsContent = document.getElementById('resultsContent');

            if (!startWord || !endWord) {
                resultsContent.innerHTML = '<div class="error-card">Please enter both a start and end word.</div>';
                resultsSection.style.display = 'block';
                return;
            }

            if (startWord.length !== endWord.length) {
                resultsContent.innerHTML = `<div class="error-card">Words must be the same length (${startWord.length} vs ${endWord.length} letters).</div>`;
                resultsSection.style.display = 'block';
                return;
            }

            resultsContent.innerHTML = '<div class="loading"><div class="spinner"></div> Solving...</div>';
            resultsSection.style.display = 'block';

            // Simulate async work
            setTimeout(() => {
                const ladder = bfs(startWord, endWord);

                if (ladder) {
                    const steps = ladder.length - 1;
                    const ladderDisplay = ladder.map((w, i) => `${i === 0 ? '→ ' : '→ '}${w}`).join('\n');
                    resultsContent.innerHTML = `
                        <div class="result-card">
                            <h2>✓ Solution Found!</h2>
                            <div class="ladder-display">${ladderDisplay}</div>
                            <div class="stats">
                                <div class="stat-box">
                                    <div class="stat-label">Steps</div>
                                    <div class="stat-value">${steps}</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-label">Words</div>
                                    <div class="stat-value">${ladder.length}</div>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    resultsContent.innerHTML = `<div class="error-card">No path found from "${startWord}" to "${endWord}". Try different words!</div>`;
                }
            }, 300);
        }

        document.getElementById('startWord').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') solveLadder();
        });

        document.getElementById('endWord').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') solveLadder();
        });

        // Preload with example
        document.getElementById('startWord').value = 'CAT';
        document.getElementById('endWord').value = 'DOG';
    </script>
</body>
</html>
