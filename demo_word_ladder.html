<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Ladder Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(135deg, #0f2447 0%, #1a3a52 50%, #0d2236 100%);
      color: #e0e7ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      width: 100%;
    }
    .hero {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeSlideIn 0.8s cubic-bezier(.16,1,.3,1);
    }
    .hero h1 {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #64d5ff 0%, #4ecca3 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 1rem;
      color: #a0adc7;
      margin-bottom: 24px;
    }
    .game-card {
      background: rgba(15, 36, 71, 0.6);
      border: 1px solid rgba(100, 213, 255, 0.3);
      border-radius: 16px;
      padding: 32px;
      backdrop-filter: blur(10px);
      animation: fadeSlideIn 1s cubic-bezier(.16,1,.3,1) 0.1s backwards;
    }
    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .difficulty-selector {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .diff-btn {
      flex: 1;
      min-width: 100px;
      padding: 12px 16px;
      border: 2px solid rgba(100, 213, 255, 0.3);
      border-radius: 12px;
      background: transparent;
      color: #a0adc7;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .diff-btn:hover {
      border-color: #64d5ff;
      background: rgba(100, 213, 255, 0.1);
      color: #64d5ff;
    }
    .diff-btn.active {
      background: linear-gradient(135deg, #64d5ff 0%, #4ecca3 100%);
      border-color: transparent;
      color: #0f2447;
      font-weight: 700;
    }
    .game-state {
      display: none;
    }
    .game-state.active {
      display: block;
    }
    .word-path {
      background: rgba(25, 55, 95, 0.5);
      border: 1px solid rgba(78, 204, 163, 0.3);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .path-item {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.1rem;
      font-weight: 500;
      color: #4ecca3;
      display: inline-block;
      margin-right: 12px;
      margin-bottom: 8px;
      animation: slideIn 0.4s cubic-bezier(.16,1,.3,1);
    }
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-12px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    .path-divider {
      color: #64d5ff;
      margin: 0 8px;
      opacity: 0.6;
    }
    .target {
      background: rgba(78, 204, 163, 0.1);
      border: 2px solid #4ecca3;
      border-radius: 12px;
      padding: 12px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      color: #4ecca3;
      text-align: center;
      text-transform: uppercase;
      margin-top: 12px;
    }
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .word-input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid rgba(100, 213, 255, 0.3);
      border-radius: 12px;
      background: rgba(13, 34, 54, 0.8);
      color: #e0e7ff;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1rem;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }
    .word-input:focus {
      outline: none;
      border-color: #64d5ff;
      background: rgba(13, 34, 54, 1);
      box-shadow: 0 0 12px rgba(100, 213, 255, 0.2);
    }
    .submit-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #64d5ff 0%, #4ecca3 100%);
      color: #0f2447;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(100, 213, 255, 0.3);
    }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
      padding: 16px;
      background: rgba(78, 204, 163, 0.05);
      border: 1px solid rgba(78, 204, 163, 0.2);
      border-radius: 12px;
    }
    .stat-item {
      text-align: center;
    }
    .stat-label {
      font-size: 0.875rem;
      color: #a0adc7;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #4ecca3;
      font-family: 'IBM Plex Mono', monospace;
    }
    .message {
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 0.95rem;
      animation: slideIn 0.4s cubic-bezier(.16,1,.3,1);
    }
    .message.error {
      background: rgba(255, 82, 82, 0.15);
      border: 1px solid rgba(255, 82, 82, 0.3);
      color: #ff5252;
    }
    .message.success {
      background: rgba(78, 204, 163, 0.15);
      border: 1px solid rgba(78, 204, 163, 0.3);
      color: #4ecca3;
    }
    .message.info {
      background: rgba(100, 213, 255, 0.15);
      border: 1px solid rgba(100, 213, 255, 0.3);
      color: #64d5ff;
    }
    .new-game-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #64d5ff 0%, #4ecca3 100%);
      border: none;
      border-radius: 12px;
      color: #0f2447;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .new-game-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(100, 213, 255, 0.3);
    }
    .hint {
      font-size: 0.875rem;
      color: #a0adc7;
      text-align: center;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(100, 213, 255, 0.1);
    }
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>🪜 Word Ladder</h1>
      <p>Transform one word into another by changing one letter at a time</p>
    </div>

    <div class="game-card">
      <!-- Difficulty Selector -->
      <div id="difficultySelector" class="difficulty-selector">
        <button class="diff-btn active" data-difficulty="easy">Easy</button>
        <button class="diff-btn" data-difficulty="medium">Medium</button>
        <button class="diff-btn" data-difficulty="hard">Hard</button>
      </div>

      <!-- Game State -->
      <div id="gameState" class="game-state active">
        <div id="messageBox"></div>

        <div class="stats">
          <div class="stat-item">
            <div class="stat-label">Moves</div>
            <div class="stat-value" id="moveCount">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Best Known</div>
            <div class="stat-value" id="bestMoves">—</div>
          </div>
        </div>

        <div class="word-path">
          <div>
            <span class="path-item" id="pathStart"></span>
            <div id="pathItems"></div>
            <span class="target" id="targetWord"></span>
          </div>
        </div>

        <div class="input-group">
          <input type="text" class="word-input" id="wordInput" placeholder="Type next word..." maxlength="5">
          <button class="submit-btn" id="submitBtn">Go</button>
        </div>

        <div class="hint" id="hint"></div>
      </div>

      <!-- Win State -->
      <div id="winState" class="game-state">
        <div class="message success">
          <strong>🎉 Success!</strong> You completed the word ladder in <span id="winMoves">0</span> moves!
        </div>
        <button class="new-game-btn">New Game</button>
      </div>
    </div>
  </div>

    class WordLadderGame {
      constructor() {
        this.difficulty = 'easy';
        this.puzzle = null;
        this.path = [];
        this.setupEventListeners();
        this.startNewGame();
      }

      setupEventListeners() {
        document.querySelectorAll('.diff-btn').forEach(btn => {
          btn.addEventListener('click', (e) => this.changeDifficulty(e.target.dataset.difficulty));
        });
        document.getElementById('submitBtn').addEventListener('click', () => this.submitWord());
        document.getElementById('wordInput').addEventListener('keypress', (e) => {
          if (e.key === 'Enter') this.submitWord();
        });
        document.querySelectorAll('.new-game-btn').forEach(btn => {
          btn.addEventListener('click', () => this.startNewGame());
        });
      }

      changeDifficulty(difficulty) {
        if (this.path.length > 0) return; // Can't change mid-game
        this.difficulty = difficulty;
        document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`[data-difficulty="${difficulty}"]`).classList.add('active');
        this.startNewGame();
      }

      startNewGame() {
        const puzzles = PUZZLES[this.difficulty];
        this.puzzle = puzzles[Math.floor(Math.random() * puzzles.length)];
        this.path = [this.puzzle.start];
        this.render();
        this.showMessage('', '');
        document.getElementById('wordInput').focus();
      }

      isValidWord(word) {
        return WORD_LIST.has(word.toLowerCase()) || word.toLowerCase() === this.puzzle.target.toLowerCase();
      }

      differsByOneChar(word1, word2) {
        if (word1.length !== word2.length) return false;
        let differences = 0;
        for (let i = 0; i < word1.length; i++) {
          if (word1[i] !== word2[i]) differences++;
          if (differences > 1) return false;
        }
        return differences === 1;
      }

      submitWord() {
        const input = document.getElementById('wordInput');
        const word = input.value.trim().toLowerCase();
        input.value = '';

        if (!word) {
          this.showMessage('Please enter a word', 'error');
          return;
        }

        if (word.length !== 5) {
          this.showMessage('Words must be 5 letters', 'error');
          return;
        }

        if (!this.isValidWord(word)) {
          this.showMessage(`"${word}" is not a valid word`, 'error');
          return;
        }

        if (!this.differsByOneChar(this.path[this.path.length - 1], word)) {
          this.showMessage(`"${word}" must differ by exactly 1 letter from "${this.path[this.path.length - 1]}"`, 'error');
          return;
        }

        if (this.path.includes(word)) {
          this.showMessage(`Already used "${word}"`, 'error');
          return;
        }

        this.path.push(word);

        if (word === this.puzzle.target.toLowerCase()) {
          this.win();
        } else {
          this.render();
          this.showMessage(`Great! ${this.path.length - 1} step${this.path.length > 2 ? 's' : ''} taken`, 'success');
          document.getElementById('wordInput').focus();
        }
      }

      win() {
        const moves = this.path.length - 1;
        document.getElementById('gameState').classList.remove('active');
        document.getElementById('winState').classList.add('active');
        document.getElementById('winMoves').textContent = moves;
      }

      render() {
        document.getElementById('pathStart').textContent = this.path[0].toUpperCase();
        const items = this.path.slice(1, -1).map((w, i) => 
          `<span class="path-item">${w.toUpperCase()}</span> <span class="path-divider">→</span> `
        ).join('');
        document.getElementById('pathItems').innerHTML = items + (this.path.length > 1 ? '<span class="path-divider">→</span>' : '');
        document.getElementById('targetWord').textContent = this.puzzle.target.toUpperCase();
        document.getElementById('moveCount').textContent = this.path.length - 1;
        document.getElementById('bestMoves').textContent = this.puzzle.best;
      }

      showMessage(text, type) {
        const box = document.getElementById('messageBox');
        if (!text) {
          box.innerHTML = '';
          return;
        }
        box.innerHTML = `<div class="message ${type}">${text}</div>`;
      }
    }

    // Initialize game
    window.addEventListener('load', () => {
      new WordLadderGame();
    });
  </script>
</body>
</html>
