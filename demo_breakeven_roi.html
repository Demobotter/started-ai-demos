<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break-Even & ROI Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Manrope', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 50%, #0d1425 100%);
            color: #e0e0ff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            animation: slideUp 0.6s cubic-bezier(.16,1,.3,1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeIn 0.8s ease-out 0.1s backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .hero h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(36px, 8vw, 72px);
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #60a5fa, #34d399, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .hero p {
            font-size: 18px;
            color: #a0b0ff;
            font-weight: 500;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
                gap: 30px;
            }
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 28px;
            animation: slideInLeft 0.6s cubic-bezier(.16,1,.3,1) 0.15s backwards;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .slider-label {
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #60a5fa;
        }

        .slider-value {
            font-size: 24px;
            font-weight: 700;
            color: #fbbf24;
            font-family: 'Syne', sans-serif;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 4px;
            background: linear-gradient(90deg, #ef4444, #f97316, #eab308, #22c55e, #06b6d4);
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
            accent-color: #60a5fa;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            cursor: pointer;
            box-shadow: 0 0 12px rgba(96, 165, 250, 0.6), 0 0 24px rgba(96, 165, 250, 0.3);
            border: 2px solid #fff;
        }

        input[type="range"]::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            cursor: pointer;
            box-shadow: 0 0 12px rgba(96, 165, 250, 0.6), 0 0 24px rgba(96, 165, 250, 0.3);
            border: 2px solid #fff;
        }

        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            animation: slideInRight 0.6s cubic-bezier(.16,1,.3,1) 0.2s backwards;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 768px) {
            .metrics {
                grid-template-columns: 1fr;
            }
        }

        .metric-card {
            backdrop-filter: blur(12px);
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .metric-card:hover {
            border-color: rgba(96, 165, 250, 0.6);
            background: rgba(30, 41, 59, 0.9);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(96, 165, 250, 0.2);
        }

        .metric-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #a0b0ff;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: clamp(20px, 5vw, 32px);
            font-weight: 800;
            font-family: 'Syne', sans-serif;
            color: #fbbf24;
            line-height: 1.2;
        }

        .metric-unit {
            font-size: 14px;
            color: #60a5fa;
            margin-left: 4px;
            font-weight: 500;
        }

        .chart-container {
            animation: slideInRight 0.6s cubic-bezier(.16,1,.3,1) 0.25s backwards;
            backdrop-filter: blur(12px);
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 12px;
            padding: 24px;
        }

        canvas {
            width: 100%;
            height: auto;
            display: block;
        }

        .zone-legend {
            display: flex;
            gap: 16px;
            margin-top: 16px;
            flex-wrap: wrap;
            font-size: 13px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        .color-loss {
            background-color: rgba(239, 68, 68, 0.6);
        }

        .color-breakeven {
            background-color: rgba(251, 191, 36, 0.6);
        }

        .color-profit {
            background-color: rgba(52, 211, 153, 0.6);
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>📊 Break-Even & ROI</h1>
            <p>Investment Returns at a Glance</p>
        </div>

        <div class="content">
            <div class="controls">
                <div class="slider-group">
                    <label class="slider-label">Initial Investment ($)</label>
                    <div class="slider-value" id="investmentValue">$5,000</div>
                    <input type="range" id="investment" min="1000" max="50000" step="1000" value="5000">
                </div>

                <div class="slider-group">
                    <label class="slider-label">Monthly Profit ($)</label>
                    <div class="slider-value" id="profitValue">$500</div>
                    <input type="range" id="monthlyProfit" min="100" max="5000" step="100" value="500">
                </div>

                <div class="slider-group">
                    <label class="slider-label">Months to Analyze</label>
                    <div class="slider-value" id="monthsValue">12</div>
                    <input type="range" id="months" min="3" max="60" step="1" value="12">
                </div>

                <div class="metrics">
                    <div class="metric-card">
                        <div class="metric-label">Total Profit</div>
                        <div class="metric-value" id="totalProfit">$6,000<span class="metric-unit"></span></div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Avg Per Month</div>
                        <div class="metric-value" id="avgProfit">$500<span class="metric-unit"></span></div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Break-Even Month</div>
                        <div class="metric-value" id="breakEvenMonth">Month <span id="breakEvenNum">10</span></div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">ROI %</div>
                        <div class="metric-value" id="roiPercent">120<span class="metric-unit">%</span></div>
                    </div>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="chart" width="400" height="300"></canvas>
                <div class="zone-legend">
                    <div class="legend-item">
                        <div class="legend-color color-loss"></div>
                        <span>Loss Zone</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color color-breakeven"></div>
                        <span>Break-Even</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color color-profit"></div>
                        <span>Profit Zone</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const investmentInput = document.getElementById('investment');
        const profitInput = document.getElementById('monthlyProfit');
        const monthsInput = document.getElementById('months');
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');

        function formatCurrency(value) {
            return '$' + Math.floor(value).toLocaleString();
        }

        function updateChart() {
            const investment = parseFloat(investmentInput.value);
            const monthlyProfit = parseFloat(profitInput.value);
            const months = parseInt(monthsInput.value);

            // Update display values
            document.getElementById('investmentValue').textContent = formatCurrency(investment);
            document.getElementById('profitValue').textContent = formatCurrency(monthlyProfit);
            document.getElementById('monthsValue').textContent = months;

            // Calculate metrics
            const totalProfit = monthlyProfit * months;
            const avgProfit = totalProfit / months;
            const roi = (totalProfit / investment) * 100;
            
            // Find break-even month
            let breakEvenMonth = Math.ceil(investment / monthlyProfit);
            if (breakEvenMonth > months) breakEvenMonth = null;

            // Update metric cards
            document.getElementById('totalProfit').textContent = formatCurrency(totalProfit);
            document.getElementById('avgProfit').textContent = formatCurrency(avgProfit);
            document.getElementById('roiPercent').textContent = Math.round(roi);
            
            if (breakEvenMonth) {
                document.getElementById('breakEvenNum').textContent = breakEvenMonth;
            } else {
                document.getElementById('breakEvenNum').textContent = `>${months}`;
            }

            // Draw chart
            drawChart(investment, monthlyProfit, months, breakEvenMonth);
        }

        function drawChart(investment, monthlyProfit, months, breakEvenMonth) {
            const width = canvas.offsetWidth;
            const height = canvas.offsetHeight;
            canvas.width = width;
            canvas.height = height;

            const padding = 40;
            const chartWidth = width - padding * 2;
            const chartHeight = height - padding * 2;

            // Calculate max value for y-axis
            const maxCumulative = Math.max(investment * 2, monthlyProfit * months * 1.2);
            const minCumulative = -investment * 0.2;

            // Draw background zones
            ctx.fillStyle = 'rgba(239, 68, 68, 0.08)';
            const zeroY = padding + (chartHeight * (maxCumulative) / (maxCumulative - minCumulative));
            ctx.fillRect(padding, zeroY, chartWidth, chartHeight - (zeroY - padding));

            ctx.fillStyle = 'rgba(52, 211, 153, 0.08)';
            ctx.fillRect(padding, padding, chartWidth, zeroY - padding);

            // Draw grid lines
            ctx.strokeStyle = 'rgba(96, 165, 250, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padding + (chartHeight * i) / 5;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(width - padding, y);
                ctx.stroke();

                const x = padding + (chartWidth * i) / 5;
                ctx.beginPath();
                ctx.moveTo(x, padding);
                ctx.lineTo(x, height - padding);
                ctx.stroke();
            }

            // Draw axes
            ctx.strokeStyle = 'rgba(160, 176, 255, 0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padding, height - padding);
            ctx.lineTo(width - padding, height - padding);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, height - padding);
            ctx.stroke();

            // Draw axis labels
            ctx.fillStyle = '#a0b0ff';
            ctx.font = '12px Manrope';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';

            for (let i = 0; i <= 5; i++) {
                const monthLabel = Math.round((months * i) / 5);
                const x = padding + (chartWidth * i) / 5;
                ctx.fillText(monthLabel, x, height - padding + 12);
            }

            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            for (let i = 0; i <= 5; i++) {
                const value = minCumulative + ((maxCumulative - minCumulative) * i) / 5;
                const y = height - padding - (chartHeight * i) / 5;
                ctx.fillText('$' + Math.round(value / 1000) + 'k', padding - 12, y);
            }

            // Draw cumulative profit line with gradient
            ctx.lineWidth = 3;
            ctx.strokeStyle = 'rgba(96, 165, 250, 0.8)';
            ctx.beginPath();

            let pathY = [];
            for (let month = 0; month <= months; month++) {
                const cumulative = (monthlyProfit * month) - investment;
                const x = padding + (chartWidth * month) / months;
                const y = height - padding - ((cumulative - minCumulative) / (maxCumulative - minCumulative)) * chartHeight;
                
                if (month === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
                pathY.push({ x, y, cumulative });
            }
            ctx.stroke();

            // Draw break-even point
            if (breakEvenMonth) {
                const x = padding + (chartWidth * breakEvenMonth) / months;
                const y = height - padding;
                
                ctx.fillStyle = 'rgba(251, 191, 36, 0.8)';
                ctx.beginPath();
                ctx.arc(x, y, 6, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = 'rgba(251, 191, 36, 0.4)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x, padding);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // Draw data points
            ctx.fillStyle = 'rgba(252, 165, 11, 0.9)';
            pathY.forEach(point => {
                ctx.beginPath();
                ctx.arc(point.x, point.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // Event listeners
        investmentInput.addEventListener('input', updateChart);
        profitInput.addEventListener('input', updateChart);
        monthsInput.addEventListener('input', updateChart);
        window.addEventListener('resize', updateChart);

        // Initial draw
        updateChart();
    </script>
</body>
</html>
