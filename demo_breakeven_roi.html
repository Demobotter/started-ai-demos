<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Break-Even ROI Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(135deg, #0f0f1e 0%, #1a0f2e 50%, #0d1428 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #e0e0e0;
    }
    .container {
      max-width: 900px;
      width: 100%;
    }
    .hero {
      text-align: center;
      margin-bottom: 40px;
    }
    .hero h1 {
      font-size: 3.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #00d9ff 0%, #ff00ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      letter-spacing: -1px;
    }
    .hero p {
      font-size: 1.1rem;
      color: #b0b0c0;
      font-weight: 400;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 30px;
    }
    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
      .hero h1 { font-size: 2.5rem; }
    }
    .card {
      background: rgba(26, 31, 58, 0.5);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 12px;
      padding: 25px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }
    .card:hover {
      border-color: rgba(0, 217, 255, 0.5);
      background: rgba(26, 31, 58, 0.7);
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.1);
    }
    .card h2 {
      font-size: 1.2rem;
      margin-bottom: 20px;
      color: #00d9ff;
      font-weight: 600;
    }
    .input-group {
      margin-bottom: 18px;
    }
    .input-group label {
      display: block;
      font-size: 0.95rem;
      margin-bottom: 6px;
      color: #c0c0d0;
      font-weight: 500;
    }
    .input-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid rgba(0, 217, 255, 0.3);
      border-radius: 6px;
      background: rgba(10, 14, 39, 0.8);
      color: #e0e0e0;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .input-group input:focus {
      outline: none;
      border-color: #00d9ff;
      box-shadow: 0 0 10px rgba(0, 217, 255, 0.2);
      background: rgba(10, 14, 39, 1);
    }
    .slider-group {
      margin-bottom: 20px;
    }
    .slider-group label {
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
      margin-bottom: 8px;
      color: #c0c0d0;
      font-weight: 500;
    }
    .slider-group input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(90deg, rgba(0,217,255,0.2), rgba(255,0,255,0.2));
      border-radius: 5px;
      outline: none;
      cursor: pointer;
    }
    .slider-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d9ff, #ff00ff);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
    }
    .slider-group input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d9ff, #ff00ff);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
    }
    .result-card {
      background: rgba(0, 217, 255, 0.05);
      border: 2px solid rgba(0, 217, 255, 0.3);
      border-radius: 12px;
      padding: 25px;
      text-align: center;
      grid-column: 1 / -1;
      transition: all 0.3s ease;
    }
    .result-card.negative { border-color: rgba(255, 100, 100, 0.5); background: rgba(255, 100, 100, 0.05); }
    .result-card.positive { border-color: rgba(0, 217, 255, 0.5); background: rgba(0, 217, 255, 0.1); }
    .result-label {
      font-size: 1rem;
      color: #a0a0b0;
      margin-bottom: 10px;
      font-weight: 500;
    }
    .result-value {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #00d9ff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-detail {
      font-size: 0.95rem;
      color: #c0c0d0;
      line-height: 1.5;
    }
    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
      margin-top: 10px;
    }
    .status-badge.profitable { background: rgba(0, 217, 255, 0.2); color: #00d9ff; }
    .status-badge.loss { background: rgba(255, 100, 100, 0.2); color: #ff6464; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hero { animation: fadeIn 0.6s ease; }
    .card { animation: fadeIn 0.6s ease 0.1s both; }
    .result-card { animation: fadeIn 0.6s ease 0.2s both; }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Break-Even ROI</h1>
      <p>How many conversions until you profit?</p>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Costs</h2>
        <div class="input-group">
          <label for="product-cost">Product/Service Cost ($)</label>
          <input type="number" id="product-cost" value="100" min="0" step="1">
        </div>
        <div class="input-group">
          <label for="marketing-budget">Marketing Budget ($)</label>
          <input type="number" id="marketing-budget" value="5000" min="0" step="100">
        </div>
        <div class="input-group">
          <label for="cac">Customer Acquisition Cost ($)</label>
          <input type="number" id="cac" value="50" min="0" step="1">
        </div>
      </div>

      <div class="card">
        <h2>Revenue</h2>
        <div class="input-group">
          <label for="price">Sale Price ($)</label>
          <input type="number" id="price" value="200" min="0" step="1">
        </div>
        <div class="slider-group">
          <label for="conv-rate">Conversion Rate: <span id="conv-rate-display">3%</span></label>
          <input type="range" id="conv-rate" value="3" min="0.1" max="20" step="0.1">
        </div>
        <div class="slider-group">
          <label for="repeat">Repeat Purchase Rate: <span id="repeat-display">0%</span></label>
          <input type="range" id="repeat" value="0" min="0" max="100" step="5">
        </div>
      </div>

      <div class="result-card">
        <div class="result-label">Break-Even Point</div>
        <div class="result-value" id="breakeven">0</div>
        <div class="result-detail">
          <p id="result-text">Sales needed to recoup costs and marketing spend</p>
          <div id="status-badge" class="status-badge"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Pure logic: calculate break-even
    function calculateBreakEven(productCost, marketingBudget, cac, price, convRate, repeatRate) {
      const unitMargin = price - productCost;
      if (unitMargin <= 0) return Infinity;
      
      // Total cost = fixed marketing + variable CAC
      // Revenue per customer = (unit margin) * (1 + repeat rate)
      const totalCostPerCustomer = cac;
      const revenuePerCustomer = unitMargin * (1 + repeatRate / 100);
      
      // Fixed cost amortized across customers
      const customersNeeded = Math.ceil(marketingBudget / (revenuePerCustomer - totalCostPerCustomer));
      
      // Sales = customers * conversion rate, but we want conversions to hit customersNeeded
      const salesNeeded = Math.ceil(customersNeeded / (convRate / 100));
      
      return { customersNeeded, salesNeeded, unitMargin, revenuePerCustomer };
    }

    // Headless test
    {
      const r = calculateBreakEven(100, 5000, 50, 200, 3, 0);
      console.assert(r.salesNeeded > 0, 'Sales > 0');
      console.assert(r.unitMargin === 100, 'Unit margin correct');
    }

    const inputs = {
      productCost: document.getElementById('product-cost'),
      marketingBudget: document.getElementById('marketing-budget'),
      cac: document.getElementById('cac'),
      price: document.getElementById('price'),
      convRate: document.getElementById('conv-rate'),
      repeat: document.getElementById('repeat'),
    };

    function update() {
      const pc = parseFloat(inputs.productCost.value) || 0;
      const mb = parseFloat(inputs.marketingBudget.value) || 0;
      const cac = parseFloat(inputs.cac.value) || 0;
      const p = parseFloat(inputs.price.value) || 0;
      const cr = parseFloat(inputs.convRate.value) || 0.1;
      const rp = parseFloat(inputs.repeat.value) || 0;

      document.getElementById('conv-rate-display').textContent = cr.toFixed(1) + '%';
      document.getElementById('repeat-display').textContent = rp.toFixed(0) + '%';

      const result = calculateBreakEven(pc, mb, cac, p, cr, rp);
      const breakeven = result.salesNeeded;
      const isProfitable = breakeven < Infinity && breakeven > 0;

      document.getElementById('breakeven').textContent = isProfitable ? breakeven.toLocaleString() : '∞';
      document.getElementById('result-text').textContent = 
        isProfitable 
          ? `You need ${breakeven.toLocaleString()} sales to break even. At ${cr.toFixed(1)}% conversion, that's ~${(breakeven / (cr / 100)).toLocaleString()} leads.`
          : 'Unit margin too low or negative. Adjust pricing or costs.';

      const badge = document.getElementById('status-badge');
      if (!isProfitable) {
        badge.textContent = '⚠️ Not Profitable';
        badge.className = 'status-badge loss';
        document.querySelector('.result-card').className = 'result-card negative';
      } else if (breakeven < 100) {
        badge.textContent = '🚀 Very Achievable';
        badge.className = 'status-badge profitable';
        document.querySelector('.result-card').className = 'result-card positive';
      } else {
        badge.textContent = '📈 Possible';
        badge.className = 'status-badge profitable';
        document.querySelector('.result-card').className = 'result-card positive';
      }
    }

    Object.values(inputs).forEach(el => el.addEventListener('input', update));
    update();
  </script>
</body>
</html>
