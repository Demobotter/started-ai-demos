<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Strength Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jetbrains+Mono:wght@400;600;700&family=Cabinet+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a12;
      --panel: rgba(15, 15, 25, 0.85);
      --line: rgba(255, 255, 255, 0.08);
      --txt: #f0f0f5;
      --mut: #8a8f9e;
      --weak: #ff4757;
      --fair: #ffa502;
      --good: #2ed573;
      --strong: #26de81;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Cabinet Grotesk', sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, #1a1a2e 100%);
      color: var(--txt);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }
    
    .container {
      max-width: 520px;
      width: 100%;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .hero {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .hero h1 {
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 12px;
      letter-spacing: -0.8px;
    }
    
    .dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #26de81;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(38, 222, 129, 0.5);
      }
      50% {
        box-shadow: 0 0 0 12px rgba(38, 222, 129, 0);
      }
    }
    
    .hero p {
      color: var(--mut);
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.9;
    }
    
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 28px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      animation: fadeIn 0.6s 0.1s both cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .input-group {
      margin-bottom: 28px;
    }
    
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--mut);
      margin-bottom: 10px;
    }
    
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      font-family: 'Jetbrains Mono', monospace;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--txt);
      transition: all 0.2s;
      outline: none;
    }
    
    input[type="password"]:focus,
    input[type="text"]:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(38, 222, 129, 0.4);
      box-shadow: 0 0 0 3px rgba(38, 222, 129, 0.1);
    }
    
    .toggle-show {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--mut);
      cursor: pointer;
      margin-top: 8px;
      transition: color 0.2s;
    }
    
    .toggle-show:hover {
      color: var(--txt);
    }
    
    .toggle-show input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #26de81;
    }
    
    .strength-meter {
      margin-bottom: 20px;
    }
    
    .meter-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--mut);
      margin-bottom: 8px;
    }
    
    .meter-bar {
      height: 8px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      overflow: hidden;
    }
    
    .meter-fill {
      height: 100%;
      width: 0%;
      background: var(--weak);
      border-radius: 6px;
      transition: width 0.3s ease, background 0.3s ease;
    }
    
    .meter-fill.fair {
      background: var(--fair);
    }
    
    .meter-fill.good {
      background: var(--good);
    }
    
    .meter-fill.strong {
      background: var(--strong);
    }
    
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .stat-box {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      transition: all 0.3s;
    }
    
    .stat-box.highlight {
      background: rgba(38, 222, 129, 0.08);
      border-color: rgba(38, 222, 129, 0.3);
    }
    
    .stat-value {
      font-family: 'Jetbrains Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--txt);
      margin-bottom: 4px;
    }
    
    .stat-label {
      font-size: 11px;
      color: var(--mut);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .details {
      background: rgba(255, 255, 255, 0.02);
      border-left: 3px solid var(--good);
      border-radius: 6px;
      padding: 14px;
      margin-bottom: 16px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--txt);
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: opacity 0.3s, max-height 0.3s;
    }
    
    .details.show {
      opacity: 1;
      max-height: 200px;
    }
    
    .details.weak {
      border-left-color: var(--weak);
    }
    
    .details.fair {
      border-left-color: var(--fair);
    }
    
    .details.good {
      border-left-color: var(--good);
    }
    
    .details.strong {
      border-left-color: var(--strong);
    }
    
    .suggestions {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--txt);
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: opacity 0.3s, max-height 0.3s;
    }
    
    .suggestions.show {
      opacity: 1;
      max-height: 300px;
    }
    
    .suggestions h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--mut);
      margin-bottom: 10px;
    }
    
    .suggestion-item {
      margin-bottom: 8px;
      padding-left: 12px;
      border-left: 2px solid rgba(38, 222, 129, 0.3);
    }
    
    @media (max-width: 480px) {
      .card {
        padding: 20px;
      }
      
      .stats {
        grid-template-columns: 1fr;
      }
      
      .hero h1 {
        font-size: 32px;
      }
    }
    
    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1><span class="dot"></span>Password Strength</h1>
      <p>Enter a password to analyze its strength, entropy, and estimated crack time.</p>
    </div>
    
    <div class="card">
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter any password…" autofocus>
        <label class="toggle-show">
          <input type="checkbox" id="toggleShow">
          Show password
        </label>
      </div>
      
      <div class="strength-meter">
        <div class="meter-label">
          <span>Strength</span>
          <span id="strengthLabel">—</span>
        </div>
        <div class="meter-bar">
          <div class="meter-fill" id="meterFill"></div>
        </div>
      </div>
      
      <div class="stats">
        <div class="stat-box" id="entropyBox">
          <div class="stat-value" id="entropy">—</div>
          <div class="stat-label">Entropy Bits</div>
        </div>
        <div class="stat-box" id="timeBox">
          <div class="stat-value" id="crackTime">—</div>
          <div class="stat-label">Crack Time (avg)</div>
        </div>
      </div>
      
      <div class="details" id="details"></div>
      
      <div class="suggestions" id="suggestions"></div>
    </div>
  </div>
  
  <script>
    const passwordInput = document.getElementById('password');
    const toggleCheckbox = document.getElementById('toggleShow');
    const meterFill = document.getElementById('meterFill');
    const strengthLabel = document.getElementById('strengthLabel');
    const entropySpan = document.getElementById('entropy');
    const crackTimeSpan = document.getElementById('crackTime');
    const detailsDiv = document.getElementById('details');
    const suggestionsDiv = document.getElementById('suggestions');
    const entropyBox = document.getElementById('entropyBox');
    const timeBox = document.getElementById('timeBox');
    
    function analyzePassword(pwd) {
      const result = {
        length: pwd.length,
        hasLower: /[a-z]/.test(pwd),
        hasUpper: /[A-Z]/.test(pwd),
        hasDigit: /[0-9]/.test(pwd),
        hasSpecial: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pwd),
      };
      
      // Calculate character set size
      let charsetSize = 0;
      if (result.hasLower) charsetSize += 26;
      if (result.hasUpper) charsetSize += 26;
      if (result.hasDigit) charsetSize += 10;
      if (result.hasSpecial) charsetSize += 32;
      
      // Shannon entropy = log2(charset ^ length)
      result.entropy = result.length > 0 ? Math.log2(Math.pow(charsetSize, result.length)) : 0;
      
      // Estimate crack time: assume 1 billion guesses/sec
      // Average time = (2^entropy) / (2 * guesses_per_sec)
      const guessesPerSec = 1e9;
      const totalCombinations = Math.pow(charsetSize, result.length);
      result.crackTimeSeconds = totalCombinations / (2 * guessesPerSec);
      
      // Classify strength
      if (result.length === 0) {
        result.strength = 'empty';
      } else if (result.entropy < 30) {
        result.strength = 'weak';
      } else if (result.entropy < 60) {
        result.strength = 'fair';
      } else if (result.entropy < 100) {
        result.strength = 'good';
      } else {
        result.strength = 'strong';
      }
      
      return result;
    }
    
    function formatTime(seconds) {
      if (seconds === 0) return '< 1 sec';
      if (seconds < 60) return Math.round(seconds) + ' sec';
      if (seconds < 3600) return (seconds / 60).toFixed(1) + ' min';
      if (seconds < 86400) return (seconds / 3600).toFixed(1) + ' hrs';
      if (seconds < 86400 * 365) return (seconds / 86400).toFixed(1) + ' days';
      if (seconds < 86400 * 365 * 100) return (seconds / (86400 * 365)).toFixed(1) + ' yrs';
      return '> 100 yrs';
    }
    
    function render(pwd) {
      if (!pwd) {
        meterFill.style.width = '0%';
        meterFill.className = 'meter-fill';
        strengthLabel.textContent = '—';
        entropySpan.textContent = '—';
        crackTimeSpan.textContent = '—';
        detailsDiv.classList.remove('show');
        suggestionsDiv.classList.remove('show');
        entropyBox.classList.remove('highlight');
        timeBox.classList.remove('highlight');
        return;
      }
      
      const result = analyzePassword(pwd);
      
      // Update meter
      const strengthPercent = Math.min(100, (result.entropy / 128) * 100);
      meterFill.style.width = strengthPercent + '%';
      meterFill.className = 'meter-fill ' + result.strength;
      
      // Update labels
      const strengthNames = {
        empty: 'Empty',
        weak: 'Weak',
        fair: 'Fair',
        good: 'Good',
        strong: 'Very Strong'
      };
      strengthLabel.textContent = strengthNames[result.strength];
      
      // Update stats
      entropySpan.textContent = result.entropy.toFixed(1);
      crackTimeSpan.textContent = formatTime(result.crackTimeSeconds);
      entropyBox.classList.toggle('highlight', result.strength !== 'weak' && result.strength !== 'empty');
      timeBox.classList.toggle('highlight', result.strength !== 'weak' && result.strength !== 'empty');
      
      // Build details
      const details = [
        `<strong>Length:</strong> ${result.length} characters`,
        `<strong>Charset:</strong> ${[result.hasLower && 'lowercase', result.hasUpper && 'UPPERCASE', result.hasDigit && 'digits', result.hasSpecial && 'special chars'].filter(Boolean).join(', ')}`,
        `<strong>Entropy:</strong> ${result.entropy.toFixed(1)} bits (log₂ of possible combinations)`,
      ];
      
      detailsDiv.innerHTML = details.join('<br>');
      detailsDiv.className = 'details show ' + result.strength;
      
      // Build suggestions
      const suggestions = [];
      if (result.length < 8) suggestions.push('Increase length to at least 8 characters');
      if (result.length < 12) suggestions.push('Aim for 12+ characters for better security');
      if (!result.hasUpper) suggestions.push('Add uppercase letters (A–Z)');
      if (!result.hasDigit) suggestions.push('Add numbers (0–9)');
      if (!result.hasSpecial) suggestions.push('Add special characters (!@#$%^&*) for maximum strength');
      if (result.strength === 'strong') suggestions.push('✓ Excellent password! Well done.');
      
      if (suggestions.length > 0) {
        suggestionsDiv.innerHTML = '<h3>Suggestions</h3>' + suggestions.map(s => `<div class="suggestion-item">${s}</div>`).join('');
        suggestionsDiv.classList.add('show');
      } else {
        suggestionsDiv.classList.remove('show');
      }
    }
    
    passwordInput.addEventListener('input', (e) => {
      render(e.target.value);
    });
    
    toggleCheckbox.addEventListener('change', (e) => {
      passwordInput.type = e.target.checked ? 'text' : 'password';
    });
    
    // Initial render
    render('');
  </script>
</body>
</html>
