<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Manrope', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.6s cubic-bezier(.16,1,.3,1);
        }
        
        .header h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(40px, 8vw, 72px);
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #ff006e, #00d9ff, #ff006e);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }
        
        .header p {
            font-size: 18px;
            color: #999;
            font-weight: 400;
        }
        
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 50px;
        }
        
        @media (max-width: 900px) {
            .content {
                grid-template-columns: 1fr;
                gap: 30px;
            }
        }
        
        .controls {
            animation: fadeInUp 0.6s cubic-bezier(.16,1,.3,1) 0.1s backwards;
        }
        
        .control-group {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        .control-label {
            display: block;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00d9ff;
            margin-bottom: 12px;
        }
        
        input[type="color"] {
            width: 100%;
            height: 60px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 12px;
            cursor: pointer;
            background: none;
        }
        
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: linear-gradient(90deg, #ff006e, #00d9ff);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #00d9ff;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(0, 217, 255, 0.6);
            transition: all 0.2s;
        }
        
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.9);
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #00d9ff;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 12px rgba(0, 217, 255, 0.6);
            transition: all 0.2s;
        }
        
        input[type="range"]::-moz-range-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.9);
        }
        
        .range-value {
            display: inline-block;
            margin-top: 8px;
            font-size: 12px;
            color: #666;
            background: rgba(0, 217, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
        }
        
        .preview {
            animation: fadeInUp 0.6s cubic-bezier(.16,1,.3,1) 0.2s backwards;
        }
        
        .preview h2 {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #00d9ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .palette-swatch {
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(.16,1,.3,1);
            border: 2px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        .palette-swatch::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.1);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .palette-swatch:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .palette-swatch:hover::before {
            opacity: 1;
        }
        
        .swatch-label {
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
            z-index: 1;
            margin-bottom: 8px;
        }
        
        .swatch-code {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            z-index: 1;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 8px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }
        
        .export-section {
            background: rgba(0, 217, 255, 0.1);
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 12px;
            padding: 24px;
            margin-top: 24px;
        }
        
        .export-codes {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .code-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 8px;
            padding: 12px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: #00d9ff;
            word-break: break-all;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .code-box:hover {
            background: rgba(0, 217, 255, 0.1);
            border-color: rgba(0, 217, 255, 0.5);
        }
        
        .copy-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00d9ff, #ff006e);
            color: #0a0e27;
            border: none;
            border-radius: 8px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0, 217, 255, 0.4);
        }
        
        .copy-btn:active {
            transform: translateY(0);
        }
        
        .copy-feedback {
            display: none;
            color: #4ecca3;
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
            font-weight: 600;
        }
        
        .copy-feedback.show {
            display: block;
            animation: fadeInUp 0.3s cubic-bezier(.16,1,.3,1);
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 Color Palette Builder</h1>
            <p>Design beautiful, harmonious color schemes in seconds</p>
        </div>
        
        <div class="content">
            <div class="controls">
                <div class="control-group">
                    <label class="control-label">Base Color</label>
                    <input type="color" id="baseColor" value="#ff006e">
                </div>
                
                <div class="control-group">
                    <label class="control-label">Hue Shift</label>
                    <input type="range" id="hueShift" min="-120" max="120" value="0">
                    <div class="range-value" id="hueValue">0°</div>
                </div>
                
                <div class="control-group">
                    <label class="control-label">Saturation</label>
                    <input type="range" id="saturation" min="0" max="200" value="100">
                    <div class="range-value" id="satValue">100%</div>
                </div>
                
                <div class="control-group">
                    <label class="control-label">Lightness</label>
                    <input type="range" id="lightness" min="0" max="200" value="100">
                    <div class="range-value" id="lightValue">100%</div>
                </div>
                
                <div class="control-group">
                    <label class="control-label">Contrast</label>
                    <input type="range" id="contrast" min="0.5" max="2" step="0.1" value="1">
                    <div class="range-value" id="contrastValue">1.0x</div>
                </div>
            </div>
            
            <div class="preview">
                <h2>Live Palette</h2>
                <div class="palette-grid" id="paletteGrid"></div>
                
                <div class="export-section">
                    <label class="control-label" style="margin-bottom: 16px;">Export Hex Codes</label>
                    <div class="export-codes" id="exportCodes"></div>
                    <button class="copy-btn" id="copyBtn">Copy All Codes</button>
                    <div class="copy-feedback" id="copyFeedback">✓ Copied to clipboard!</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function hexToHSL(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;
            
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            
            if (max === min) {
                h = s = 0;
            } else {
                let d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            
            return [h * 360, s * 100, l * 100];
        }
        
        function hslToHex(h, s, l) {
            s /= 100;
            l /= 100;
            
            let c = (1 - Math.abs(2 * l - 1)) * s;
            let x = c * (1 - Math.abs((h / 60) % 2 - 1));
            let m = l - c / 2;
            
            let r, g, b;
            if (h < 60) {
                r = c; g = x; b = 0;
            } else if (h < 120) {
                r = x; g = c; b = 0;
            } else if (h < 180) {
                r = 0; g = c; b = x;
            } else if (h < 240) {
                r = 0; g = x; b = c;
            } else if (h < 300) {
                r = x; g = 0; b = c;
            } else {
                r = c; g = 0; b = x;
            }
            
            r = Math.round((r + m) * 255);
            g = Math.round((g + m) * 255);
            b = Math.round((b + m) * 255);
            
            return "#" + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
        }
        
        function generatePalette() {
            const baseColor = document.getElementById('baseColor').value;
            const hueShift = parseInt(document.getElementById('hueShift').value);
            const saturation = parseInt(document.getElementById('saturation').value);
            const lightness = parseInt(document.getElementById('lightness').value);
            const contrast = parseFloat(document.getElementById('contrast').value);
            
            document.getElementById('hueValue').textContent = hueShift + '°';
            document.getElementById('satValue').textContent = saturation + '%';
            document.getElementById('lightValue').textContent = lightness + '%';
            document.getElementById('contrastValue').textContent = contrast.toFixed(1) + 'x';
            
            const [baseH, baseS, baseL] = hexToHSL(baseColor);
            
            const h = (baseH + hueShift + 360) % 360;
            const s = Math.min(100, (baseS * saturation) / 100);
            const l = Math.min(100, Math.max(0, (baseL * lightness) / 100));
            
            const palette = {
                primary: hslToHex(h, s, l),
                secondary: hslToHex((h + 120) % 360, s * 0.8, l * 0.9),
                accent: hslToHex((h + 240) % 360, s, l * 1.1),
                success: hslToHex(120, 60, l * 0.8),
                neutral: hslToHex(h, 0, l * 0.5),
                background: hslToHex(h, s * 0.1, l * 0.95)
            };
            
            renderPalette(palette);
            renderExportCodes(palette);
        }
        
        function renderPalette(palette) {
            const grid = document.getElementById('paletteGrid');
            grid.innerHTML = '';
            
            Object.entries(palette).forEach(([name, color], idx) => {
                const swatch = document.createElement('div');
                swatch.className = 'palette-swatch';
                swatch.style.backgroundColor = color;
                swatch.style.animationDelay = (idx * 0.05) + 's';
                
                const textColor = getContrastColor(color);
                swatch.innerHTML = `
                    <div class="swatch-label" style="color: ${textColor};">${name}</div>
                    <div class="swatch-code" style="color: ${textColor}; border-color: ${textColor};">${color}</div>
                `;
                
                swatch.addEventListener('click', () => {
                    navigator.clipboard.writeText(color);
                    showCopyFeedback('Color copied!');
                });
                
                grid.appendChild(swatch);
            });
        }
        
        function getContrastColor(hexColor) {
            const r = parseInt(hexColor.slice(1, 3), 16);
            const g = parseInt(hexColor.slice(3, 5), 16);
            const b = parseInt(hexColor.slice(5, 7), 16);
            const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            return luminance > 0.5 ? '#000000' : '#ffffff';
        }
        
        function renderExportCodes(palette) {
            const exportDiv = document.getElementById('exportCodes');
            exportDiv.innerHTML = '';
            
            Object.entries(palette).forEach(([name, color]) => {
                const box = document.createElement('div');
                box.className = 'code-box';
                box.textContent = color;
                box.addEventListener('click', () => {
                    navigator.clipboard.writeText(color);
                    showCopyFeedback('Color copied!');
                });
                exportDiv.appendChild(box);
            });
        }
        
        function showCopyFeedback(msg) {
            const feedback = document.getElementById('copyFeedback');
            feedback.textContent = msg;
            feedback.classList.add('show');
            setTimeout(() => feedback.classList.remove('show'), 2000);
        }
        
        document.getElementById('baseColor').addEventListener('change', generatePalette);
        document.getElementById('hueShift').addEventListener('input', generatePalette);
        document.getElementById('saturation').addEventListener('input', generatePalette);
        document.getElementById('lightness').addEventListener('input', generatePalette);
        document.getElementById('contrast').addEventListener('input', generatePalette);
        
        document.getElementById('copyBtn').addEventListener('click', () => {
            const codes = Array.from(document.querySelectorAll('.code-box'))
                .map(box => box.textContent)
                .join('\n');
            navigator.clipboard.writeText(codes);
            showCopyFeedback('All codes copied!');
        });
        
        generatePalette();
    </script>
</body>
</html>
