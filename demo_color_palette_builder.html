<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palette Studio — Build & Preview Color Schemes</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Sora', sans-serif;
            background: linear-gradient(135deg, #f5f5f3 0%, #fffaf7 100%);
            color: #2c2c2c;
            min-height: 100vh;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        .container {
            max-width: 920px;
            margin: 0 auto;
        }

        /* Hero */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #2c3e50 0%, #6b5b95 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.1rem;
            color: #666;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Main grid */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .workspace {
                grid-template-columns: 1fr;
            }
        }

        /* Left: controls */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            animation: fadeInLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
        }

        .control-group {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            transition: box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .control-group:hover {
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
        }

        .control-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
            color: #2c2c2c;
        }

        .color-input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        input[type="color"] {
            width: 100%;
            height: 48px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        input[type="color"]:hover {
            border-color: #6b5b95;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #6b5b95;
        }

        /* Harmony tabs */
        .harmony-tabs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }

        .harmony-btn {
            padding: 0.6rem 0.75rem;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: 'Sora', sans-serif;
        }

        .harmony-btn:hover {
            border-color: #6b5b95;
        }

        .harmony-btn.active {
            background: linear-gradient(135deg, #6b5b95 0%, #8b7fa6 100%);
            color: white;
            border-color: transparent;
        }

        /* Palette swatches */
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        .swatch {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .swatch:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
        }

        .swatch-color {
            height: 80px;
            width: 100%;
            transition: background-color 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: flex-end;
            padding: 0.75rem;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .swatch-label {
            padding: 0.75rem;
            background: white;
            text-align: center;
            font-size: 0.75rem;
            color: #666;
            border-top: 1px solid #f0f0f0;
            font-family: 'IBM Plex Mono', monospace;
        }

        /* Action buttons */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        button {
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: 'Sora', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6b5b95 0%, #8b7fa6 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(107, 91, 149, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #2c2c2c;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
            border-color: #6b5b95;
        }

        /* Right: preview */
        .preview-section {
            animation: fadeInRight 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        .preview-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            margin-bottom: 1.5rem;
        }

        .preview-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1.5rem;
        }

        .mockup {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .mockup-hero {
            height: 100px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .mockup-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .mockup-btn {
            padding: 0.75rem;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            cursor: pointer;
            font-family: 'Sora', sans-serif;
        }

        .mockup-btn-primary {
            background: var(--color-primary);
            color: white;
        }

        .mockup-btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }

        .mockup-btn-secondary {
            background: var(--color-accent);
            color: white;
        }

        .mockup-btn-secondary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .mockup-text {
            padding: 1rem;
            background: var(--color-light);
            border-radius: 6px;
            color: var(--color-dark);
            font-size: 0.9rem;
            line-height: 1.6;
            transition: all 0.3s;
        }

        .mockup-badge {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            background: var(--color-accent);
            color: white;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #2c2c2c;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            opacity: 0;
            animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            pointer-events: none;
            z-index: 1000;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }

        @media (max-width: 768px) {
            .palette-grid {
                grid-template-columns: 1fr;
            }

            .harmony-tabs {
                grid-template-columns: repeat(2, 1fr);
            }

            .hero h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>🎨 Palette Studio</h1>
            <p>Build harmonious color schemes. Pick a base, watch harmonies generate live, preview in a real UI mockup.</p>
        </div>

        <div class="workspace">
            <!-- Left: Controls -->
            <div class="controls">
                <!-- Base Color Picker -->
                <div class="control-group">
                    <label>Base Color</label>
                    <div class="color-input-row">
                        <input type="color" id="colorPicker" value="#6b5b95">
                        <input type="text" id="hexInput" value="#6b5b95" placeholder="#000000">
                    </div>
                </div>

                <!-- Harmony Mode -->
                <div class="control-group">
                    <label>Harmony Mode</label>
                    <div class="harmony-tabs">
                        <button class="harmony-btn active" data-mode="complementary">Complementary</button>
                        <button class="harmony-btn" data-mode="analogous">Analogous</button>
                        <button class="harmony-btn" data-mode="triadic">Triadic</button>
                        <button class="harmony-btn" data-mode="monochromatic">Monochromatic</button>
                    </div>
                </div>

                <!-- Palette Swatches -->
                <div class="control-group">
                    <label>Generated Palette</label>
                    <div class="palette-grid" id="paletteGrid">
                        <!-- Swatches generated by JS -->
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button class="btn-primary" id="randomBtn">🎲 Randomize</button>
                    <button class="btn-secondary" id="resetBtn">↺ Reset</button>
                </div>
            </div>

            <!-- Right: Live Preview -->
            <div class="preview-section">
                <div class="preview-card">
                    <div class="preview-title">Live UI Preview</div>
                    <div class="mockup">
                        <div class="mockup-hero">Your App Hero</div>
                        <div class="mockup-buttons">
                            <button class="mockup-btn mockup-btn-primary">Primary Action</button>
                            <button class="mockup-btn mockup-btn-secondary">Secondary</button>
                        </div>
                        <div class="mockup-text">
                            This is how your palette looks in a real interface. The colors update <strong>live</strong> as you adjust them. 
                            <div style="margin-top: 0.5rem;"><span class="mockup-badge">Status Badge</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Color utility functions
        function hexToHsl(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;

            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;

            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }

            return { h: h * 360, s: s * 100, l: l * 100 };
        }

        function hslToHex(h, s, l) {
            s /= 100;
            l /= 100;
            const k = n => (n + h / 30) % 12;
            const a = s * Math.min(l, 1 - l);
            const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
            return "#" + [f(0), f(8), f(4)].map(x => {
                const hex = Math.round(x * 255).toString(16);
                return hex.length === 1 ? '0' + hex : hex;
            }).join('').toUpperCase();
        }

        function generateHarmony(baseHex, mode) {
            const { h, s, l } = hexToHsl(baseHex);
            let colors = [baseHex];

            if (mode === 'complementary') {
                colors.push(hslToHex((h + 180) % 360, s, l));
                colors.push(hslToHex((h + 180) % 360, Math.max(0, s - 20), l + 10));
                colors.push(hslToHex(h, s, Math.max(20, l - 20)));
            } else if (mode === 'analogous') {
                colors.push(hslToHex((h + 30) % 360, s, l));
                colors.push(hslToHex((h - 30 + 360) % 360, s, l));
                colors.push(hslToHex(h, s, Math.max(20, l - 15)));
            } else if (mode === 'triadic') {
                colors.push(hslToHex((h + 120) % 360, s, l));
                colors.push(hslToHex((h + 240) % 360, s, l));
                colors.push(hslToHex(h, Math.max(0, s - 15), l + 10));
            } else if (mode === 'monochromatic') {
                colors.push(hslToHex(h, s, Math.max(20, l - 20)));
                colors.push(hslToHex(h, s, l + 15));
                colors.push(hslToHex(h, Math.max(0, s - 20), l + 5));
            }

            return colors;
        }

        function isLight(hex) {
            const { l } = hexToHsl(hex);
            return l > 50;
        }

        function renderPalette(colors) {
            const grid = document.getElementById('paletteGrid');
            grid.innerHTML = '';
            colors.forEach((color, idx) => {
                const swatch = document.createElement('div');
                swatch.className = 'swatch';
                const textColor = isLight(color) ? '#2c2c2c' : '#ffffff';
                swatch.innerHTML = `
                    <div class="swatch-color" style="background-color: ${color}; color: ${textColor};">${color}</div>
                    <div class="swatch-label">${idx === 0 ? 'Primary' : idx === 1 ? 'Secondary' : idx === 2 ? 'Accent' : 'Neutral'}</div>
                `;
                swatch.addEventListener('click', () => copyToClipboard(color));
                grid.appendChild(swatch);
            });
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = `Copied: ${text}`;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            });
        }

        function updatePreview(colors) {
            const root = document.documentElement;
            root.style.setProperty('--color-primary', colors[0]);
            root.style.setProperty('--color-secondary', colors[1]);
            root.style.setProperty('--color-accent', colors[2]);
            root.style.setProperty('--color-light', colors[3]);
            root.style.setProperty('--color-dark', isLight(colors[0]) ? '#2c2c2c' : '#ffffff');
        }

        function updateAll() {
            const hex = document.getElementById('hexInput').value;
            const mode = document.querySelector('.harmony-btn.active').dataset.mode;
            const colors = generateHarmony(hex, mode);
            renderPalette(colors);
            updatePreview(colors);
        }

        // Event listeners
        document.getElementById('colorPicker').addEventListener('input', (e) => {
            document.getElementById('hexInput').value = e.target.value;
            updateAll();
        });

        document.getElementById('hexInput').addEventListener('input', (e) => {
            if (/^#[0-9A-F]{6}$/i.test(e.target.value)) {
                document.getElementById('colorPicker').value = e.target.value;
                updateAll();
            }
        });

        document.querySelectorAll('.harmony-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.harmony-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                updateAll();
            });
        });

        document.getElementById('randomBtn').addEventListener('click', () => {
            const randomHex = '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0').toUpperCase();
            document.getElementById('colorPicker').value = randomHex;
            document.getElementById('hexInput').value = randomHex;
            updateAll();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            document.getElementById('colorPicker').value = '#6b5b95';
            document.getElementById('hexInput').value = '#6b5b95';
            document.querySelector('.harmony-btn[data-mode="complementary"]').click();
            updateAll();
        });

        // Initialize on load
        updateAll();
    </script>
</body>
</html>
