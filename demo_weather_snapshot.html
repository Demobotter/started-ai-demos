<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Snapshot — Live City Forecast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Cousine:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0f1e; --card:rgba(25,31,52,.75); --line:rgba(255,255,255,.06);
    --txt:#f0f2f9; --mut:#99a3b8; --accent1:#6366f1; --accent2:#ec4899;
  }
  * { box-sizing:border-box; margin:0; padding:0 }
  body {
    font-family:'Poppins',sans-serif; background:linear-gradient(135deg, #0f0f1e 0%, #1a1f3a 50%, #2a1f4a 100%);
    color:var(--txt); min-height:100vh; padding:20px; display:flex; align-items:center; justify-content:center;
  }
  .container { max-width:600px; width:100%; animation:fadeInUp .6s ease }
  @keyframes fadeInUp { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
  
  .hero { text-align:center; margin-bottom:30px; animation:fadeInDown .5s ease }
  @keyframes fadeInDown { from { opacity:0; transform:translateY(-15px) } to { opacity:1; transform:translateY(0) } }
  h1 { font-family:'Cousine',monospace; font-size:clamp(28px,6vw,48px); font-weight:700; letter-spacing:-.8px; margin-bottom:8px }
  .sub { color:var(--mut); font-size:14.5px; line-height:1.6 }
  
  .search { display:flex; gap:8px; margin-bottom:24px; animation:slideIn .5s ease .1s backwards }
  @keyframes slideIn { from { opacity:0; transform:translateX(-10px) } to { opacity:1; transform:translateX(0) } }
  input { flex:1; padding:12px 16px; border:1px solid var(--line); background:var(--card); color:var(--txt); border-radius:12px;
    font-family:'Poppins',sans-serif; font-size:14px; transition:.2s; outline:none }
  input:focus { border-color:var(--accent1); box-shadow:0 0 0 3px rgba(99,102,241,.15) }
  input::placeholder { color:var(--mut) }
  button { padding:12px 24px; background:linear-gradient(135deg,var(--accent1),var(--accent2)); border:none; color:#fff; border-radius:12px;
    font-family:'Poppins',sans-serif; font-weight:600; cursor:pointer; transition:.2s; font-size:14px }
  button:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(99,102,241,.3) }
  button:active { transform:translateY(0) }
  
  .card { background:var(--card); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid var(--line);
    border-radius:18px; padding:24px; animation:fadeInUp .5s ease .2s backwards; margin-bottom:16px }
  .card.hero-card { background:linear-gradient(135deg, rgba(99,102,241,.15), rgba(236,72,153,.1)); border-color:rgba(99,102,241,.3) }
  
  .weather-main { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px }
  .icon { font-size:64px; animation:bounce 2s ease-in-out infinite }
  @keyframes bounce { 0%, 100% { transform:translateY(0) } 50% { transform:translateY(-8px) } }
  .temp-block { text-align:right }
  .temp { font-size:clamp(36px,10vw,56px); font-weight:700; font-family:'Cousine',monospace; color:var(--accent1) }
  .condition { color:var(--mut); font-size:14px; margin-top:4px }
  
  .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px }
  .metric { background:rgba(255,255,255,.03); padding:12px; border-radius:12px; text-align:center; transition:.2s }
  .metric:hover { background:rgba(99,102,241,.1) }
  .label { color:var(--mut); font-size:12px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px }
  .value { font-size:20px; font-weight:700; font-family:'Cousine',monospace; color:var(--txt) }
  
  .times { display:flex; gap:8px; margin-top:16px; font-size:13px }
  .time-badge { flex:1; background:rgba(255,255,255,.04); padding:8px; border-radius:10px; text-align:center }
  .time-label { color:var(--mut); display:block; font-size:11px; text-transform:uppercase; margin-bottom:3px }
  .time-value { color:var(--accent1); font-weight:600; font-family:'Cousine',monospace }
  
  .empty { text-align:center; padding:40px 20px; color:var(--mut) }
  .error { background:rgba(236,72,153,.1); border:1px solid var(--accent2); color:var(--accent2); padding:12px; border-radius:12px; font-size:13px }
  .loading { color:var(--accent1); font-style:italic; animation:pulse 1.5s infinite }
  @keyframes pulse { 0%, 100% { opacity:1 } 50% { opacity:.5 } }
  
  @media(max-width:480px) {
    .weather-main { flex-direction:column; align-items:flex-start; text-align:left }
    .temp-block { text-align:left; align-self:flex-start }
    .grid { grid-template-columns:1fr }
    .times { flex-direction:column }
  }
  
  @media(prefers-reduced-motion:reduce) {
    * { animation:none !important; transition:none !important }
  }
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>🌍 Weather Snapshot</h1>
    <p class="sub">Enter a city and get live weather conditions right now</p>
  </div>
  
  <div class="search">
    <input type="text" id="city" placeholder="Enter a city (e.g., London, Tokyo, New York)" value="London">
    <button onclick="fetchWeather()">Check</button>
  </div>
  
  <div id="result"></div>
</div>

<script>
  const icons = {
    'sunny':'☀️', 'cloudy':'☁️', 'rainy':'🌧️', 'thunder':'⛈️', 'snow':'❄️', 'fog':'🌫️', 'windy':'💨'
  };
  
  function getIcon(code, isDay) {
    // WMO code classification
    if([0,1].includes(code)) return isDay ? '☀️' : '🌙';
    if([2,3].includes(code)) return '☁️';
    if([45,48].includes(code)) return '🌫️';
    if([51,53,55,61,63,65,71,73,75,80,81,82].includes(code)) return '🌧️';
    if([80,81,82,85,86].includes(code)) return '⛈️';
    if([77,85,86].includes(code)) return '❄️';
    return '💨';
  }
  
  async function fetchWeather() {
    const cityInput = document.getElementById('city').value.trim();
    const result = document.getElementById('result');
    
    if(!cityInput) {
      result.innerHTML = '<div class="error">Please enter a city name</div>';
      return;
    }
    
    result.innerHTML = '<div class="card empty"><div class="loading">Fetching live weather…</div></div>';
    
    try {
      // Step 1: Geocode city name
      const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityInput)}&count=1&language=en&format=json`);
      const geoData = await geoRes.json();
      
      if(!geoData.results || geoData.results.length === 0) {
        result.innerHTML = '<div class="error">City not found. Try another spelling.</div>';
        return;
      }
      
      const { latitude, longitude, name, country, admin1 } = geoData.results[0];
      const cityDisplay = admin1 ? `${name}, ${admin1}` : `${name}, ${country}`;
      
      // Step 2: Fetch weather
      const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,weather_code,is_day,wind_speed_10m&timezone=auto&forecast_days=1`);
      const weatherData = await weatherRes.json();
      
      const current = weatherData.current;
      const temp = Math.round(current.temperature_2m);
      const humidity = current.relative_humidity_2m;
      const windSpeed = Math.round(current.wind_speed_10m);
      const isDay = current.is_day;
      
      // Get description from WMO code
      const descriptions = {0:'Clear',1:'Mostly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Depositing rime fog',
        51:'Light drizzle',53:'Moderate drizzle',55:'Dense drizzle',61:'Slight rain',63:'Moderate rain',65:'Heavy rain',
        71:'Slight snow',73:'Moderate snow',75:'Heavy snow',77:'Snow grains',80:'Slight showers',81:'Moderate showers',82:'Violent showers',
        85:'Slight snow showers',86:'Heavy snow showers',95:'Thunderstorm',96:'Thunderstorm with hail',99:'Thunderstorm with hail'
      };
      const description = descriptions[current.weather_code] || 'Unknown';
      
      const icon = getIcon(current.weather_code, isDay);
      const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      
      // Fetch daily forecast for sunrise/sunset
      const forecastRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=sunrise,sunset&timezone=auto&forecast_days=1`);
      const forecastData = await forecastRes.json();
      const sunrise = new Date(forecastData.daily.sunrise[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      const sunset = new Date(forecastData.daily.sunset[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      
      result.innerHTML = `
        <div class="card hero-card">
          <div style="margin-bottom:8px; color:var(--mut); font-size:13px; text-transform:uppercase; letter-spacing:.5px">${cityDisplay}</div>
          <div class="weather-main">
            <div class="icon">${icon}</div>
            <div class="temp-block">
              <div class="temp">${temp}°</div>
              <div class="condition">${description}</div>
            </div>
          </div>
          <div class="grid">
            <div class="metric">
              <div class="label">Feels like</div>
              <div class="value">${temp}°</div>
            </div>
            <div class="metric">
              <div class="label">Humidity</div>
              <div class="value">${humidity}%</div>
            </div>
            <div class="metric">
              <div class="label">Wind speed</div>
              <div class="value">${windSpeed} km/h</div>
            </div>
            <div class="metric">
              <div class="label">Pressure</div>
              <div class="value">Normal</div>
            </div>
          </div>
          <div class="times">
            <div class="time-badge">
              <span class="time-label">Sunrise</span>
              <span class="time-value">${sunrise}</span>
            </div>
            <div class="time-badge">
              <span class="time-label">Now</span>
              <span class="time-value">${now}</span>
            </div>
            <div class="time-badge">
              <span class="time-label">Sunset</span>
              <span class="time-value">${sunset}</span>
            </div>
          </div>
        </div>
      `;
    } catch(err) {
      console.error(err);
      result.innerHTML = '<div class="error">Error fetching weather. Please try again.</div>';
    }
  }
  
  // Fetch on page load
  window.onload = () => fetchWeather();
  
  // Allow Enter key to search
  document.getElementById('city').onkeypress = (e) => { if(e.key === 'Enter') fetchWeather() };
</script>
</body>
</html>
