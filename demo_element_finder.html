<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧪 Element Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@10..48,400;10..48,700&family=Hanken+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Hanken Grotesk', sans-serif;
      background: linear-gradient(135deg, #0a0a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      overflow-x: hidden;
    }

    /* Starfield texture overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(2px 2px at 20px 30px, #00ffcc, rgba(0,255,204,0)),
                        radial-gradient(2px 2px at 60px 70px, #ff00ff, rgba(255,0,255,0)),
                        radial-gradient(1px 1px at 50px 50px, #00ffff, rgba(0,255,255,0));
      background-size: 500px 500px;
      opacity: 0.15;
      z-index: -1;
      pointer-events: none;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .hero {
      text-align: center;
      margin-bottom: 50px;
      animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: clamp(42px, 8vw, 72px);
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00ffcc, #ff00ff, #00ffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 18px;
      color: #aaa;
      font-weight: 400;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
      animation: fadeInUp 0.6s ease-out 0.2s backwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .filter-btn {
      padding: 10px 20px;
      border: 2px solid #00ffcc;
      background: transparent;
      color: #00ffcc;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Hanken Grotesk', sans-serif;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      font-size: 14px;
    }

    .filter-btn:hover {
      background: rgba(0, 255, 204, 0.1);
      transform: scale(1.05);
    }

    .filter-btn.active {
      background: linear-gradient(90deg, #00ffcc, #ff00ff);
      border-color: transparent;
      color: #000;
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
    }

    .grid-container {
      background: rgba(10, 10, 46, 0.6);
      border: 1px solid #00ffcc;
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(10px);
      animation: fadeInUp 0.6s ease-out 0.3s backwards;
      margin-bottom: 40px;
    }

    .element-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
      gap: 8px;
    }

    .element {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px solid #00ffcc;
      border-radius: 6px;
      background: rgba(0, 255, 204, 0.05);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    .element::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 0, 255, 0.2), rgba(0, 255, 255, 0.2));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .element:hover {
      background: rgba(0, 255, 204, 0.15);
      border-color: #ff00ff;
      transform: scale(1.08);
      box-shadow: 0 0 12px rgba(0, 255, 204, 0.4);
    }

    .element:hover::before {
      opacity: 1;
    }

    .element.metal { border-color: #ffd700; }
    .element.metal:hover { border-color: #ffed4e; box-shadow: 0 0 12px rgba(255, 215, 0, 0.4); }

    .element.nonmetal { border-color: #00ffcc; }
    .element.nonmetal:hover { border-color: #00ffff; box-shadow: 0 0 12px rgba(0, 255, 255, 0.4); }

    .element.noble { border-color: #ff00ff; }
    .element.noble:hover { border-color: #ff69ff; box-shadow: 0 0 12px rgba(255, 0, 255, 0.4); }

    .element-number {
      font-size: 9px;
      opacity: 0.7;
      line-height: 1;
    }

    .element-symbol {
      font-size: 14px;
      font-weight: 700;
      margin: 2px 0;
    }

    .element-name {
      font-size: 8px;
      opacity: 0.6;
    }

    .detail-panel {
      background: linear-gradient(135deg, rgba(0, 255, 204, 0.1), rgba(255, 0, 255, 0.1));
      border: 2px solid #ff00ff;
      border-radius: 12px;
      padding: 30px;
      backdrop-filter: blur(10px);
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeInUp 0.6s ease-out 0.4s backwards;
    }

    .detail-panel.empty {
      color: #666;
      font-size: 18px;
      text-align: center;
    }

    .detail-content {
      animation: detailFade 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes detailFade {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .detail-symbol {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 64px;
      font-weight: 700;
      background: linear-gradient(90deg, #00ffcc, #ff00ff, #00ffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .detail-name {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #fff;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }

    .detail-item {
      border-left: 3px solid #00ffcc;
      padding-left: 12px;
    }

    .detail-item.active {
      border-left-color: #ff00ff;
    }

    .detail-label {
      font-size: 12px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .detail-value {
      font-family: 'Hanken Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: #00ffcc;
    }

    .detail-item.active .detail-value {
      color: #ff00ff;
    }

    @media (max-width: 768px) {
      main {
        padding: 20px 12px;
      }

      h1 {
        font-size: clamp(36px, 7vw, 52px);
      }

      .element-grid {
        grid-template-columns: repeat(auto-fit, minmax(50px, 1fr));
        gap: 6px;
      }

      .element {
        font-size: 10px;
      }

      .detail-symbol {
        font-size: 48px;
      }

      .detail-name {
        font-size: 20px;
      }

      .detail-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="hero">
      <h1>🧪 Element Finder</h1>
      <p class="subtitle">Click any element to see its atomic properties</p>
    </div>

    <div class="controls">
      <button class="filter-btn active" data-filter="all">All Elements</button>
      <button class="filter-btn" data-filter="metal">Metals</button>
      <button class="filter-btn" data-filter="nonmetal">Non-Metals</button>
      <button class="filter-btn" data-filter="noble">Noble Gases</button>
    </div>

    <div class="grid-container">
      <div class="element-grid" id="elementGrid"></div>
    </div>

    <div class="detail-panel empty" id="detailPanel">
      <span>Select an element to see its properties</span>
    </div>
  </main>

  <script>
    const ELEMENTS = [
      { num: 1, symbol: 'H', name: 'Hydrogen', weight: '1.008', config: '1s¹', type: 'nonmetal' },
      { num: 2, symbol: 'He', name: 'Helium', weight: '4.003', config: '1s²', type: 'noble' },
      { num: 3, symbol: 'Li', name: 'Lithium', weight: '6.941', config: '[He] 2s¹', type: 'metal' },
      { num: 4, symbol: 'Be', name: 'Beryllium', weight: '9.012', config: '[He] 2s²', type: 'metal' },
      { num: 5, symbol: 'B', name: 'Boron', weight: '10.811', config: '[He] 2s² 2p¹', type: 'metal' },
      { num: 6, symbol: 'C', name: 'Carbon', weight: '12.011', config: '[He] 2s² 2p²', type: 'nonmetal' },
      { num: 7, symbol: 'N', name: 'Nitrogen', weight: '14.007', config: '[He] 2s² 2p³', type: 'nonmetal' },
      { num: 8, symbol: 'O', name: 'Oxygen', weight: '15.999', config: '[He] 2s² 2p⁴', type: 'nonmetal' },
      { num: 9, symbol: 'F', name: 'Fluorine', weight: '18.998', config: '[He] 2s² 2p⁵', type: 'nonmetal' },
      { num: 10, symbol: 'Ne', name: 'Neon', weight: '20.180', config: '[He] 2s² 2p⁶', type: 'noble' },
      { num: 11, symbol: 'Na', name: 'Sodium', weight: '22.990', config: '[Ne] 3s¹', type: 'metal' },
      { num: 12, symbol: 'Mg', name: 'Magnesium', weight: '24.305', config: '[Ne] 3s²', type: 'metal' },
      { num: 13, symbol: 'Al', name: 'Aluminum', weight: '26.982', config: '[Ne] 3s² 3p¹', type: 'metal' },
      { num: 14, symbol: 'Si', name: 'Silicon', weight: '28.086', config: '[Ne] 3s² 3p²', type: 'nonmetal' },
      { num: 15, symbol: 'P', name: 'Phosphorus', weight: '30.974', config: '[Ne] 3s² 3p³', type: 'nonmetal' },
      { num: 16, symbol: 'S', name: 'Sulfur', weight: '32.065', config: '[Ne] 3s² 3p⁴', type: 'nonmetal' },
      { num: 17, symbol: 'Cl', name: 'Chlorine', weight: '35.453', config: '[Ne] 3s² 3p⁵', type: 'nonmetal' },
      { num: 18, symbol: 'Ar', name: 'Argon', weight: '39.948', config: '[Ne] 3s² 3p⁶', type: 'noble' },
      { num: 26, symbol: 'Fe', name: 'Iron', weight: '55.845', config: '[Ar] 3d⁶ 4s²', type: 'metal' },
      { num: 47, symbol: 'Ag', name: 'Silver', weight: '107.868', config: '[Kr] 4d¹⁰ 5s¹', type: 'metal' },
      { num: 79, symbol: 'Au', name: 'Gold', weight: '196.967', config: '[Xe] 4f¹⁴ 5d¹⁰ 6s¹', type: 'metal' },
      { num: 80, symbol: 'Hg', name: 'Mercury', weight: '200.592', config: '[Xe] 4f¹⁴ 5d¹⁰ 6s²', type: 'metal' },
      { num: 92, symbol: 'U', name: 'Uranium', weight: '238.029', config: '[Rn] 5f³ 6d¹ 7s²', type: 'metal' },
    ];

    let currentFilter = 'all';
    let selectedElement = null;

    function filterElements(type) {
      currentFilter = type;
      const elements = type === 'all' ? ELEMENTS : ELEMENTS.filter(e => e.type === type);
      renderGrid(elements);
      updateFilterButtons();
    }

    function updateFilterButtons() {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === currentFilter);
      });
    }

    function renderGrid(elements) {
      const grid = document.getElementById('elementGrid');
      grid.innerHTML = elements.map(el => `
        <div class="element ${el.type}" data-num="${el.num}">
          <span class="element-number">#${el.num}</span>
          <span class="element-symbol">${el.symbol}</span>
          <span class="element-name">${el.name.substring(0, 8)}</span>
        </div>
      `).join('');

      document.querySelectorAll('.element').forEach(el => {
        el.addEventListener('click', () => {
          const num = parseInt(el.dataset.num);
          selectElement(ELEMENTS.find(e => e.num === num));
        });
      });
    }

    function selectElement(el) {
      selectedElement = el;
      const panel = document.getElementById('detailPanel');
      panel.innerHTML = `
        <div class="detail-content">
          <div class="detail-symbol">${el.symbol}</div>
          <div class="detail-name">${el.name}</div>
          <div class="detail-grid">
            <div class="detail-item active">
              <div class="detail-label">Atomic Number</div>
              <div class="detail-value">${el.num}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Atomic Weight</div>
              <div class="detail-value">${el.weight}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Electron Config</div>
              <div class="detail-value">${el.config}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Category</div>
              <div class="detail-value" style="text-transform: capitalize;">${el.type === 'nonmetal' ? 'Non-Metal' : el.type === 'noble' ? 'Noble Gas' : 'Metal'}</div>
            </div>
          </div>
        </div>
      `;
      panel.classList.remove('empty');
    }

    // Init
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => filterElements(btn.dataset.filter));
    });

    renderGrid(ELEMENTS);
  </script>
</body>
</html>
