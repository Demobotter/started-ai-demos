<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Portfolio Heatmap</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Geist", sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1628 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInScale 0.8s cubic-bezier(.16,1,.3,1);
        }

        h1 {
            font-family: "Instrument Serif", serif;
            font-size: clamp(36px, 8vw, 72px);
            background: linear-gradient(135deg, #00d9ff, #ff00ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .tagline {
            font-size: 16px;
            color: #a0a0a0;
            font-weight: 400;
        }

        .main {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 40px;
            margin-bottom: 40px;
        }

        /* Heatmap Section */
        .heatmap-section {
            animation: slideUpFade 0.8s cubic-bezier(.16,1,.3,1) 0.15s backwards;
        }

        .heatmap-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00d9ff;
        }

        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 8px;
            padding: 24px;
            background: rgba(20, 25, 50, 0.6);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .heatmap-cell {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(.16,1,.3,1);
            font-size: 11px;
            font-weight: 600;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .heatmap-cell:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.4);
        }

        .heatmap-cell .ticker {
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 700;
            z-index: 2;
        }

        .heatmap-cell .change {
            font-size: 9px;
            z-index: 2;
        }

        /* Sidebar Stats */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
            animation: slideInRight 0.8s cubic-bezier(.16,1,.3,1) 0.2s backwards;
        }

        .stat-card {
            padding: 20px;
            background: rgba(20, 25, 50, 0.6);
            border: 1px solid rgba(0, 217, 255, 0.15);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(.16,1,.3,1);
        }

        .stat-card:hover {
            border-color: rgba(0, 217, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.1);
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a0a0a0;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #00d9ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-value.positive {
            background: linear-gradient(135deg, #00ff88, #00d9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-value.negative {
            background: linear-gradient(135deg, #ff4444, #ff0088);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Search Form */
        .search-section {
            margin-top: 40px;
            animation: slideUpFade 0.8s cubic-bezier(.16,1,.3,1) 0.25s backwards;
        }

        .search-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00d9ff;
        }

        .search-form {
            display: flex;
            gap: 12px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            background: rgba(20, 25, 50, 0.6);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 8px;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(.16,1,.3,1);
            backdrop-filter: blur(10px);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #00d9ff;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);
        }

        input[type="text"]::placeholder {
            color: #606080;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #00d9ff, #ff00ff);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(.16,1,.3,1);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 12px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .search-result {
            margin-top: 20px;
            padding: 16px;
            background: rgba(20, 25, 50, 0.6);
            border: 1px solid rgba(0, 217, 255, 0.15);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            display: none;
        }

        .search-result.show {
            display: block;
            animation: slideUpFade 0.3s cubic-bezier(.16,1,.3,1);
        }

        .search-result .ticker {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            color: #00d9ff;
            margin-bottom: 8px;
        }

        .search-result .price {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .search-result .change {
            font-size: 14px;
        }

        /* Mobile Responsive */
        @media (max-width: 900px) {
            .main {
                grid-template-columns: 1fr;
            }

            .heatmap-grid {
                grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            }
        }

        /* Animations */
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💱 Crypto Portfolio Heatmap</h1>
            <p class="tagline">Real-time market sentiment across top cryptocurrencies</p>
        </header>

        <div class="main">
            <div class="heatmap-section">
                <div class="heatmap-title">Top 20 by Market Cap (24h % Change)</div>
                <div class="heatmap-grid" id="heatmap"></div>
            </div>

            <div class="sidebar">
                <div class="stat-card">
                    <div class="stat-label">Portfolio Value</div>
                    <div class="stat-value" id="portfolioValue">$0.00</div>
                </div>

                <div class="stat-card">
                    <div class="stat-label">24h Gain/Loss</div>
                    <div class="stat-value" id="gainLoss">$0.00</div>
                </div>

                <div class="stat-card">
                    <div class="stat-label">Top Performer</div>
                    <div class="stat-value" id="topPerformer">—</div>
                </div>

                <div class="stat-card">
                    <div class="stat-label">Biggest Loser</div>
                    <div class="stat-value" id="biggestLoser">—</div>
                </div>
            </div>
        </div>

        <div class="search-section">
            <div class="search-title">Quick Lookup</div>
            <div class="search-form">
                <input type="text" id="searchInput" placeholder="Search by symbol (e.g., BTC, ETH, SOL)">
                <button onclick="searchCrypto()">Search</button>
            </div>
            <div class="search-result" id="searchResult"></div>
        </div>
    </div>

    <script>
        let allCryptos = [];
        let portfolio = {
            BTC: 0.5,
            ETH: 10,
            SOL: 100,
            XRP: 1000,
            DOGE: 5000
        };

        // Fetch top 20 cryptos with 24h change data
        async function loadHeatmap() {
            try {
                const response = await fetch(
                    'https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&sparkline=false&price_change_percentage=24h'
                );
                const data = await response.json();

                allCryptos = data.map(coin => ({
                    id: coin.id,
                    symbol: coin.symbol.toUpperCase(),
                    name: coin.name,
                    price: coin.current_price,
                    change24h: coin.price_change_percentage_24h || 0,
                    marketCap: coin.market_cap
                }));

                renderHeatmap();
                updateStats();
            } catch (error) {
                console.error('Failed to load crypto data:', error);
                document.getElementById('heatmap').innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #ff4444;">Failed to load data. Please refresh.</p>';
            }
        }

        // Render heatmap grid
        function renderHeatmap() {
            const heatmapEl = document.getElementById('heatmap');
            heatmapEl.innerHTML = '';

            allCryptos.forEach(crypto => {
                const change = crypto.change24h;
                const color = getHeatmapColor(change);
                const cell = document.createElement('div');
                cell.className = 'heatmap-cell';
                cell.style.backgroundColor = color;
                cell.style.color = getTextColor(change);
                cell.innerHTML = `
                    <div class="ticker">${crypto.symbol}</div>
                    <div class="change">${change >= 0 ? '+' : ''}${change.toFixed(1)}%</div>
                `;
                heatmapEl.appendChild(cell);
            });
        }

        // Color intensity mapping
        function getHeatmapColor(change) {
            // change: -100 to +100, map to red-gray-green
            const hue = ((change + 100) / 200) * 120; // 0 (red) to 120 (green)
            const saturation = Math.min(Math.abs(change) * 6, 100);
            const lightness = 45;
            return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        }

        function getTextColor(change) {
            return Math.abs(change) > 40 ? '#000' : '#fff';
        }

        // Update stat cards
        function updateStats() {
            let totalValue = 0;
            let totalGainLoss = 0;
            let topPerformer = null;
            let biggestLoser = null;
            let maxChange = -Infinity;
            let minChange = Infinity;

            Object.entries(portfolio).forEach(([symbol, amount]) => {
                const crypto = allCryptos.find(c => c.symbol === symbol);
                if (crypto) {
                    const value = amount * crypto.price;
                    totalValue += value;
                    totalGainLoss += value * (crypto.change24h / 100);

                    if (crypto.change24h > maxChange) {
                        maxChange = crypto.change24h;
                        topPerformer = `${symbol} +${crypto.change24h.toFixed(1)}%`;
                    }
                    if (crypto.change24h < minChange) {
                        minChange = crypto.change24h;
                        biggestLoser = `${symbol} ${crypto.change24h.toFixed(1)}%`;
                    }
                }
            });

            document.getElementById('portfolioValue').textContent = `$${totalValue.toLocaleString('en-US', { maximumFractionDigits: 2 })}`;
            document.getElementById('gainLoss').textContent = `$${totalGainLoss.toLocaleString('en-US', { maximumFractionDigits: 2 })}`;
            document.getElementById('gainLoss').className = `stat-value ${totalGainLoss >= 0 ? 'positive' : 'negative'}`;
            document.getElementById('topPerformer').textContent = topPerformer || '—';
            document.getElementById('biggestLoser').textContent = biggestLoser || '—';
        }

        // Search functionality
        window.searchCrypto = async function() {
            const query = document.getElementById('searchInput').value.toUpperCase().trim();
            if (!query) return;

            const crypto = allCryptos.find(c => c.symbol === query);
            const resultEl = document.getElementById('searchResult');

            if (crypto) {
                resultEl.innerHTML = `
                    <div class="ticker">${crypto.symbol}</div>
                    <div class="price">$${crypto.price.toLocaleString('en-US', { maximumFractionDigits: 2 })}</div>
                    <div class="change" style="color: ${crypto.change24h >= 0 ? '#00ff88' : '#ff4444'}">
                        ${crypto.change24h >= 0 ? '▲' : '▼'} ${Math.abs(crypto.change24h).toFixed(2)}% (24h)
                    </div>
                `;
                resultEl.classList.add('show');
            } else {
                resultEl.innerHTML = `<div style="color: #ff4444;">Symbol not found in top 20.</div>`;
                resultEl.classList.add('show');
            }
        };

        // Search on Enter key
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchCrypto();
            });
            loadHeatmap();
        });
    </script>
</body>
</html>
