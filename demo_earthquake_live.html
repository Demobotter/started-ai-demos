<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Earthquake Counter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Geist', sans-serif;
      background: linear-gradient(135deg, #0a0f1f 0%, #1a0033 35%, #0f1f3a 70%, #0a0a1f 100%);
      color: #e0e0ff;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(40px, 8vw, 72px);
      font-weight: 800;
      background: linear-gradient(90deg, #00d4ff, #ff1493, #00d4ff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #a0a0c0;
      font-size: 14px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 32px;
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-left: 3px solid #00d4ff;
      border-radius: 12px;
      padding: 16px;
      backdrop-filter: blur(8px);
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #7a7a9e;
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: 'Geist Mono', monospace;
      font-size: 28px;
      font-weight: 600;
      color: #00d4ff;
      line-height: 1;
    }

    .control-section {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(8px);
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
    }

    .control-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #7a7a9e;
      margin-bottom: 12px;
      display: block;
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    input[type="range"] {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #00d4ff, #ff1493);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d4ff, #ff1493);
      cursor: pointer;
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.6);
      transition: box-shadow 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.9);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d4ff, #ff1493);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.6);
      transition: box-shadow 0.2s;
    }

    input[type="range"]::-moz-range-thumb:hover {
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.9);
    }

    .slider-value {
      font-family: 'Geist Mono', monospace;
      font-size: 16px;
      color: #00d4ff;
      min-width: 50px;
      text-align: right;
    }

    .update-timer {
      font-size: 12px;
      color: #7a7a9e;
      margin-top: 12px;
      text-align: center;
    }

    .right-panel {
      display: flex;
      flex-direction: column;
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }

    .quake-header {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .quake-table {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 12px;
      overflow: hidden;
      backdrop-filter: blur(8px);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .quake-list {
      flex: 1;
      overflow-y: auto;
      max-height: 600px;
    }

    .quake-item {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(0, 212, 255, 0.1);
      transition: background 0.2s;
      cursor: pointer;
    }

    .quake-item:hover {
      background: rgba(0, 212, 255, 0.08);
    }

    .quake-item:last-child {
      border-bottom: none;
    }

    .quake-magnitude {
      font-family: 'Geist Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
      padding: 2px 6px;
      display: inline-block;
      border-radius: 4px;
      min-width: 40px;
      text-align: center;
    }

    .mag-1 { background: rgba(34, 197, 94, 0.3); color: #22c55e; }
    .mag-2 { background: rgba(34, 197, 94, 0.25); color: #86efac; }
    .mag-3 { background: rgba(250, 204, 21, 0.3); color: #fbbf24; }
    .mag-4 { background: rgba(249, 115, 22, 0.3); color: #fb923c; }
    .mag-5 { background: rgba(239, 68, 68, 0.3); color: #fca5a5; }
    .mag-6 { background: rgba(220, 38, 38, 0.3); color: #fca5a5; }
    .mag-7 { background: rgba(153, 27, 27, 0.4); color: #f87171; }

    .quake-location {
      font-size: 14px;
      color: #c0c0e0;
      margin-bottom: 3px;
      font-weight: 500;
    }

    .quake-meta {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: #7a7a9e;
      font-family: 'Geist Mono', monospace;
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: #7a7a9e;
    }

    .loading-pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @media (max-width: 900px) {
      .main-grid {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      h1 {
        font-size: clamp(36px, 10vw, 56px);
      }
    }

    @media (max-width: 600px) {
      .stats-grid {
        grid-template-columns: 1fr 1fr;
      }

      .stat-value {
        font-size: 24px;
      }

      .quake-list {
        max-height: 400px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, 0.4);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 212, 255, 0.6);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⚡ Live Earthquake Counter</h1>
      <p class="subtitle">Real-time USGS global seismic data</p>
    </header>

    <div class="main-grid">
      <div class="left-panel">
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-label">Total Quakes (24h)</div>
            <div class="stat-value" id="totalCount">—</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Avg Magnitude</div>
            <div class="stat-value" id="avgMag">—</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Max Magnitude</div>
            <div class="stat-value" id="maxMag">—</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Latest (UTC)</div>
            <div class="stat-value" id="latestTime" style="font-size: 14px;">—</div>
          </div>
        </div>

        <div class="control-section">
          <label class="control-label">Min Magnitude Filter</label>
          <div class="slider-container">
            <input type="range" id="magFilter" min="0" max="9" step="0.1" value="2.5">
            <div class="slider-value" id="filterValue">2.5</div>
          </div>
          <div class="update-timer">Updates every 30s</div>
        </div>
      </div>

      <div class="right-panel">
        <div class="quake-header">Recent Earthquakes</div>
        <div class="quake-table">
          <div class="quake-list" id="quakeList">
            <div class="empty-state loading-pulse">Loading earthquakes...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson';
    const magFilter = document.getElementById('magFilter');
    const filterValue = document.getElementById('filterValue');
    const quakeList = document.getElementById('quakeList');
    const totalCount = document.getElementById('totalCount');
    const avgMag = document.getElementById('avgMag');
    const maxMag = document.getElementById('maxMag');
    const latestTime = document.getElementById('latestTime');

    let allQuakes = [];
    let filteredQuakes = [];

    function getMagnitudeClass(mag) {
      if (mag < 2) return 'mag-1';
      if (mag < 3) return 'mag-2';
      if (mag < 4) return 'mag-3';
      if (mag < 5) return 'mag-4';
      if (mag < 6) return 'mag-5';
      if (mag < 7) return 'mag-6';
      return 'mag-7';
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      return date.toUTCString().slice(17, 25);
    }

    function updateStats() {
      if (filteredQuakes.length === 0) {
        totalCount.textContent = '—';
        avgMag.textContent = '—';
        maxMag.textContent = '—';
        latestTime.textContent = '—';
        return;
      }

      const mags = filteredQuakes.map(q => q.properties.mag);
      const avg = (mags.reduce((a, b) => a + b, 0) / mags.length).toFixed(1);
      const max = Math.max(...mags).toFixed(1);
      const latest = new Date(filteredQuakes[0].properties.time).toLocaleTimeString('en-US', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        timeZone: 'UTC'
      });

      totalCount.textContent = allQuakes.length;
      avgMag.textContent = avg;
      maxMag.textContent = max;
      latestTime.textContent = latest;
    }

    function renderQuakes() {
      if (filteredQuakes.length === 0) {
        quakeList.innerHTML = '<div class="empty-state">No earthquakes matching filter</div>';
        updateStats();
        return;
      }

      quakeList.innerHTML = filteredQuakes
        .slice(0, 50)
        .map(quake => {
          const props = quake.properties;
          const coords = quake.geometry.coordinates;
          const mag = props.mag.toFixed(1);
          const depth = (coords[2]).toFixed(0);
          const location = props.place || 'Unknown';
          const time = new Date(props.time).toLocaleTimeString('en-US', {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            timeZone: 'UTC'
          });

          return `
            <div class="quake-item">
              <div class="quake-magnitude ${getMagnitudeClass(props.mag)}">${mag}</div>
              <div class="quake-location">${location}</div>
              <div class="quake-meta">
                <span>Depth: ${depth} km</span>
                <span>${time} UTC</span>
              </div>
            </div>
          `;
        })
        .join('');

      updateStats();
    }

    function applyFilter() {
      const minMag = parseFloat(magFilter.value);
      filterValue.textContent = minMag.toFixed(1);
      filteredQuakes = allQuakes.filter(q => q.properties.mag >= minMag);
      renderQuakes();
    }

    async function fetchEarthquakes() {
      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        allQuakes = (data.features || []).sort((a, b) => b.properties.time - a.properties.time);
        applyFilter();
      } catch (error) {
        console.error('Fetch error:', error);
        quakeList.innerHTML = `<div class="empty-state">Error loading earthquakes: ${error.message}</div>`;
      }
    }

    magFilter.addEventListener('input', applyFilter);

    fetchEarthquakes();
    setInterval(fetchEarthquakes, 30000);
  </script>
</body>
</html>
