<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradient Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #0f1428 100%);
      color: #e0e6ff;
      min-height: 100vh;
      padding: 2rem;
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Hero Section */
    .hero {
      text-align: center;
      margin-bottom: 3rem;
      animation: heroFadeDown 0.8s ease-out;
    }

    @keyframes heroFadeDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #00d9ff, #ff0080, #00d9ff);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 3s ease-in-out infinite;
      letter-spacing: -1px;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% center; }
      50% { background-position: 100% center; }
    }

    .hero p {
      font-size: 1.1rem;
      color: #a0a6b8;
      font-weight: 400;
    }

    /* Main Grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      animation: fadeInUp 0.8s ease-out 0.1s both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Controls Panel */
    .controls {
      background: rgba(30, 40, 80, 0.3);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 16px;
      padding: 2rem;
      backdrop-filter: blur(10px);
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    .control-group {
      margin-bottom: 1.5rem;
    }

    .control-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: #00d9ff;
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .color-picker-wrapper {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    input[type="color"] {
      width: 80px;
      height: 50px;
      border: 2px solid rgba(0, 217, 255, 0.3);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    input[type="color"]:hover {
      border-color: #00d9ff;
      box-shadow: 0 0 16px rgba(0, 217, 255, 0.4);
    }

    .color-hex {
      flex: 1;
      background: rgba(15, 20, 40, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 0.75rem;
      color: #e0e6ff;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
      cursor: text;
      transition: all 0.2s ease;
    }

    .color-hex:focus {
      outline: none;
      border-color: #00d9ff;
      background: rgba(15, 20, 40, 0.8);
    }

    select {
      width: 100%;
      background: rgba(15, 20, 40, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 0.75rem;
      color: #e0e6ff;
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    select:hover,
    select:focus {
      border-color: #00d9ff;
      outline: none;
      background: rgba(15, 20, 40, 0.8);
    }

    /* Preview Panel */
    .preview {
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }

    .gradient-display {
      width: 100%;
      height: 300px;
      border-radius: 16px;
      border: 2px solid rgba(0, 217, 255, 0.3);
      margin-bottom: 1.5rem;
      box-shadow: 0 20px 60px rgba(0, 217, 255, 0.1);
      transition: all 0.3s ease;
    }

    .gradient-display:hover {
      border-color: #00d9ff;
      box-shadow: 0 20px 80px rgba(0, 217, 255, 0.2);
    }

    .code-block {
      background: rgba(15, 20, 40, 0.8);
      border: 1px solid rgba(0, 217, 255, 0.3);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      position: relative;
      transition: all 0.2s ease;
    }

    .code-block:hover {
      border-color: #00d9ff;
      background: rgba(15, 20, 40, 0.95);
    }

    .code-label {
      font-size: 0.75rem;
      color: #00d9ff;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .code-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      color: #a8f34e;
      word-break: break-all;
      line-height: 1.5;
      max-height: 100px;
      overflow-y: auto;
    }

    .copy-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(0, 217, 255, 0.2);
      border: 1px solid rgba(0, 217, 255, 0.5);
      color: #00d9ff;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .copy-btn:hover {
      background: rgba(0, 217, 255, 0.3);
      border-color: #00d9ff;
      transform: translateY(-2px);
    }

    .copy-btn:active {
      transform: translateY(0);
      background: rgba(0, 217, 255, 0.4);
    }

    .copy-feedback {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: rgba(168, 243, 78, 0.9);
      color: #0a0e27;
      padding: 1rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      animation: slideInUp 0.4s ease-out, slideOutDown 0.4s ease-out 1.6s both;
      z-index: 1000;
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideOutDown {
      from {
        opacity: 1;
        transform: translateY(0);
      }
      to {
        opacity: 0;
        transform: translateY(20px);
      }
    }

    /* Preset Palettes */
    .presets {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(0, 217, 255, 0.2);
    }

    .presets-label {
      font-size: 0.75rem;
      color: #00d9ff;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
      font-weight: 600;
      display: block;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }

    .preset-btn {
      padding: 0.5rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      cursor: pointer;
      font-size: 0.8rem;
      color: #e0e6ff;
      transition: all 0.2s ease;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      position: relative;
      overflow: hidden;
    }

    .preset-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 8px;
      opacity: 0.3;
      transition: opacity 0.2s ease;
    }

    .preset-btn:hover {
      border-color: #00d9ff;
      transform: translateY(-2px);
    }

    .preset-btn:hover::before {
      opacity: 0.6;
    }

    .preset-sunrise::before {
      background: linear-gradient(90deg, #ff6b35, #ffa500);
    }

    .preset-ocean::before {
      background: linear-gradient(90deg, #001f3f, #0074d9);
    }

    .preset-forest::before {
      background: linear-gradient(90deg, #2d5016, #6db83f);
    }

    .preset-cosmic::before {
      background: linear-gradient(90deg, #1a0033, #6600cc);
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      .controls, .preview {
        animation: fadeInUp 0.8s ease-out 0.2s both;
      }

      .gradient-display {
        height: 200px;
      }
    }

    /* Reduce Motion */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Gradient Studio</h1>
      <p>Design stunning CSS gradients in real time</p>
    </div>

    <div class="grid">
      <!-- Controls -->
      <div class="controls">
        <div class="control-group">
          <label for="baseColor">Base Color</label>
          <div class="color-picker-wrapper">
            <input type="color" id="baseColor" value="#00d9ff">
            <input type="text" class="color-hex" id="colorHex" value="#00d9ff" maxlength="7">
          </div>
        </div>

        <div class="control-group">
          <label for="accentColor">Accent Color</label>
          <div class="color-picker-wrapper">
            <input type="color" id="accentColor" value="#ff0080">
            <input type="text" class="color-hex" id="accentHex" value="#ff0080" maxlength="7">
          </div>
        </div>

        <div class="control-group">
          <label for="gradientType">Gradient Type</label>
          <select id="gradientType">
            <option value="linear">Linear (90deg)</option>
            <option value="linear-45">Linear (45deg)</option>
            <option value="linear-vertical">Linear (180deg)</option>
            <option value="radial">Radial</option>
            <option value="conic">Conic</option>
          </select>
        </div>

        <div class="presets">
          <span class="presets-label">Presets</span>
          <div class="preset-grid">
            <button class="preset-btn preset-sunrise" data-colors="#ff6b35,#ffa500">Sunrise</button>
            <button class="preset-btn preset-ocean" data-colors="#001f3f,#0074d9">Ocean</button>
            <button class="preset-btn preset-forest" data-colors="#2d5016,#6db83f">Forest</button>
            <button class="preset-btn preset-cosmic" data-colors="#1a0033,#6600cc">Cosmic</button>
          </div>
        </div>
      </div>

      <!-- Preview -->
      <div class="preview">
        <div class="gradient-display" id="gradientDisplay"></div>

        <div class="code-block">
          <div class="code-label">CSS Background</div>
          <div class="code-text" id="codeOutput">background: linear-gradient(90deg, #00d9ff, #ff0080);</div>
          <button class="copy-btn" id="copyCssBtn">Copy CSS</button>
        </div>

        <div class="code-block">
          <div class="code-label">Tailwind Class</div>
          <div class="code-text" id="tailwindOutput">bg-gradient-to-r from-cyan-400 to-pink-500</div>
          <button class="copy-btn" id="copyTailwindBtn">Copy Tailwind</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Elements
    const baseColorPicker = document.getElementById('baseColor');
    const accentColorPicker = document.getElementById('accentColor');
    const colorHex = document.getElementById('colorHex');
    const accentHex = document.getElementById('accentHex');
    const gradientType = document.getElementById('gradientType');
    const gradientDisplay = document.getElementById('gradientDisplay');
    const codeOutput = document.getElementById('codeOutput');
    const tailwindOutput = document.getElementById('tailwindOutput');
    const copyCssBtn = document.getElementById('copyCssBtn');
    const copyTailwindBtn = document.getElementById('copyTailwindBtn');
    const presetBtns = document.querySelectorAll('.preset-btn');

    // Helper: RGB to Hex
    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? {
        r: parseInt(result[1], 16),
        g: parseInt(result[2], 16),
        b: parseInt(result[3], 16)
      } : null;
    }

    // Helper: get closest Tailwind color
    function getTailwindColor(hex) {
      const tailwindMap = {
        '#00d9ff': 'cyan-400',
        '#ff0080': 'pink-500',
        '#ff6b35': 'orange-600',
        '#ffa500': 'orange-400',
        '#001f3f': 'blue-950',
        '#0074d9': 'blue-600',
        '#2d5016': 'green-900',
        '#6db83f': 'green-500',
        '#1a0033': 'purple-950',
        '#6600cc': 'purple-600'
      };
      return tailwindMap[hex.toUpperCase()] || 'gray-400';
    }

    // Update gradient
    function updateGradient() {
      const baseColor = baseColorPicker.value;
      const accentColor = accentColorPicker.value;
      const type = gradientType.value;

      let gradient = '';
      switch (type) {
        case 'linear':
          gradient = `linear-gradient(90deg, ${baseColor}, ${accentColor})`;
          break;
        case 'linear-45':
          gradient = `linear-gradient(45deg, ${baseColor}, ${accentColor})`;
          break;
        case 'linear-vertical':
          gradient = `linear-gradient(180deg, ${baseColor}, ${accentColor})`;
          break;
        case 'radial':
          gradient = `radial-gradient(circle, ${baseColor}, ${accentColor})`;
          break;
        case 'conic':
          gradient = `conic-gradient(from 0deg, ${baseColor}, ${accentColor})`;
          break;
      }

      // Update display
      gradientDisplay.style.background = gradient;

      // Update CSS code
      codeOutput.textContent = `background: ${gradient};`;

      // Update Tailwind (simplified)
      const tailwindBase = getTailwindColor(baseColor);
      const tailwindAccent = getTailwindColor(accentColor);
      tailwindOutput.textContent = `bg-gradient-to-r from-${tailwindBase} to-${tailwindAccent}`;

      // Update hex inputs
      colorHex.value = baseColor.toUpperCase();
      accentHex.value = accentColor.toUpperCase();
    }

    // Copy to clipboard
    function copyToClipboard(text, source) {
      navigator.clipboard.writeText(text).then(() => {
        const feedback = document.createElement('div');
        feedback.className = 'copy-feedback';
        feedback.textContent = '✓ Copied!';
        document.body.appendChild(feedback);
        setTimeout(() => feedback.remove(), 2000);
      });
    }

    // Event listeners
    baseColorPicker.addEventListener('input', updateGradient);
    accentColorPicker.addEventListener('input', updateGradient);
    gradientType.addEventListener('change', updateGradient);

    colorHex.addEventListener('change', () => {
      if (/^#[0-9A-F]{6}$/i.test(colorHex.value)) {
        baseColorPicker.value = colorHex.value;
        updateGradient();
      }
    });

    accentHex.addEventListener('change', () => {
      if (/^#[0-9A-F]{6}$/i.test(accentHex.value)) {
        accentColorPicker.value = accentHex.value;
        updateGradient();
      }
    });

    copyCssBtn.addEventListener('click', () => {
      copyToClipboard(codeOutput.textContent, 'css');
    });

    copyTailwindBtn.addEventListener('click', () => {
      copyToClipboard(tailwindOutput.textContent, 'tailwind');
    });

    // Preset buttons
    presetBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const [color1, color2] = btn.dataset.colors.split(',');
        baseColorPicker.value = color1;
        accentColorPicker.value = color2;
        updateGradient();
      });
    });

    // Initial render
    updateGradient();
  </script>
</body>
</html>
