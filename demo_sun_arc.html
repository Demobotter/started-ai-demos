<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Hour — Live Sun Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--ink:#fff;--dim:rgba(255,255,255,.72);--faint:rgba(255,255,255,.45);--card:rgba(255,255,255,.08);--line:rgba(255,255,255,.16)}
  html,body{height:100%}
  body{font-family:'Inter',sans-serif;color:var(--ink);overflow-x:hidden;transition:background 1.2s ease;background:#0b1021}
  .sky{position:fixed;inset:0;z-index:-2;transition:background 1.5s ease}
  .stars{position:fixed;inset:0;z-index:-1;opacity:0;transition:opacity 1.5s ease;pointer-events:none}
  .wrap{max-width:760px;margin:0 auto;padding:44px 22px 70px}
  .kick{font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--faint);font-weight:600;display:flex;align-items:center;gap:9px}
  .dot{width:7px;height:7px;border-radius:50%;background:#ffd479;box-shadow:0 0 12px #ffd479;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  h1{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(38px,7vw,64px);line-height:1.0;margin-top:14px;letter-spacing:-.015em}
  h1 em{font-style:italic;color:#ffd479}
  .search{margin-top:24px;display:flex;gap:10px;max-width:440px}
  .search input{flex:1;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 16px;color:#fff;font-size:16px;font-family:inherit;outline:none;backdrop-filter:blur(8px);transition:border-color .15s}
  .search input::placeholder{color:var(--faint)}
  .search input:focus{border-color:#ffd479}
  .search button{background:#ffd479;color:#3a2a08;border:none;border-radius:13px;padding:0 22px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:transform .12s,box-shadow .2s}
  .search button:hover{transform:translateY(-1px);box-shadow:0 8px 24px -8px rgba(255,212,121,.6)}
  .chips{margin-top:13px;display:flex;flex-wrap:wrap;gap:8px}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:13px;color:var(--dim);cursor:pointer;transition:.15s;backdrop-filter:blur(8px)}
  .chip:hover{color:#fff;border-color:#ffd479}
  .stage{margin-top:30px;position:relative;opacity:0;transform:translateY(14px);transition:opacity .7s,transform .7s}
  .stage.on{opacity:1;transform:none}
  .place{font-family:'Fraunces',serif;font-size:26px;font-weight:500}
  .localtime{color:var(--dim);font-size:14px;margin-top:2px}
  .phase{display:inline-block;margin-top:10px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;padding:6px 13px;border-radius:999px;background:rgba(255,212,121,.16);color:#ffe6ad;border:1px solid rgba(255,212,121,.3)}
  .arcbox{margin-top:18px;position:relative;width:100%;aspect-ratio:2/1;min-height:200px}
  svg{width:100%;height:100%;overflow:visible}
  .rail{margin-top:24px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .cell{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 17px;backdrop-filter:blur(10px)}
  .cell .l{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:600}
  .cell .v{font-family:'Fraunces',serif;font-size:26px;margin-top:5px}
  .cell .s{font-size:12px;color:var(--dim);margin-top:1px}
  .gh{grid-column:1/-1;background:linear-gradient(100deg,rgba(255,170,80,.18),rgba(255,120,90,.12));border-color:rgba(255,170,80,.35)}
  footer{margin-top:34px;color:var(--faint);font-size:12px;text-align:center}
  .err{margin-top:18px;color:#ffb4a8;font-size:14px}
  @media(max-width:560px){.rail{grid-template-columns:1fr}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="sky" id="sky"></div>
<canvas class="stars" id="stars"></canvas>
<div class="wrap">
  <div class="kick"><span class="dot"></span>Live sun position · updates every minute</div>
  <h1>Chase the <em>golden hour</em>.</h1>
  <div class="search">
    <input id="q" placeholder="Type a city…" autocomplete="off">
    <button id="go">Track</button>
  </div>
  <div class="chips" id="chips"></div>
  <div id="err"></div>

  <div class="stage" id="stage">
    <div class="place" id="place"></div>
    <div class="localtime" id="ltime"></div>
    <div class="phase" id="phase"></div>
    <div class="arcbox"><svg id="arc" viewBox="0 0 600 300" preserveAspectRatio="xMidYMid meet"></svg></div>
    <div class="rail" id="rail"></div>
  </div>
  <footer>Solar geometry computed live (NOAA algorithm) · geocoding by open-meteo · built by an AI agent on Base44</footer>
</div>
<script>
const $=s=>document.querySelector(s);
const pad=n=>String(n).padStart(2,'0');
const RAD=Math.PI/180, DEG=180/Math.PI;

// ---------- NOAA solar position ----------
function julian(date){return date.getTime()/86400000 + 2440587.5;}
function sunPosition(date, lat, lon){
  // returns {altitude(deg), azimuth(deg from N clockwise)}
  const d = julian(date) - 2451545.0;
  const g = (357.529 + 0.98560028*d)%360;          // mean anomaly
  const q = (280.459 + 0.98564736*d)%360;          // mean longitude
  const L = (q + 1.915*Math.sin(g*RAD) + 0.020*Math.sin(2*g*RAD))%360; // ecliptic long
  const e = 23.439 - 0.00000036*d;                 // obliquity
  let RA = Math.atan2(Math.cos(e*RAD)*Math.sin(L*RAD), Math.cos(L*RAD))*DEG; RA=(RA+360)%360;
  const dec = Math.asin(Math.sin(e*RAD)*Math.sin(L*RAD))*DEG;
  // Greenwich mean sidereal time
  let GMST = (280.46061837 + 360.98564736629*d)%360;
  let LST = (GMST + lon)%360; if(LST<0)LST+=360;
  let H = (LST - RA); H=((H+540)%360)-180;          // hour angle [-180,180]
  const latR=lat*RAD, decR=dec*RAD, HR=H*RAD;
  const alt = Math.asin(Math.sin(latR)*Math.sin(decR)+Math.cos(latR)*Math.cos(decR)*Math.cos(HR))*DEG;
  let az = Math.atan2(-Math.sin(HR), Math.tan(decR)*Math.cos(latR)-Math.sin(latR)*Math.cos(HR))*DEG;
  az=(az+360)%360;
  return {alt, az, dec};
}
// find UTC time today when altitude crosses target going up(rise) or down(set)
function findEvent(lat, lon, baseUTCday, targetAlt, rising){
  // scan minute by minute over 48h window centered on the day, pick first crossing of the local solar day
  let prev=null, prevAlt=null;
  for(let m=0;m<=1440;m++){
    const t=new Date(baseUTCday.getTime()+m*60000);
    const a=sunPosition(t,lat,lon).alt;
    if(prevAlt!==null){
      if(rising && prevAlt<targetAlt && a>=targetAlt) return interp(prev,t,prevAlt,a,targetAlt);
      if(!rising && prevAlt>targetAlt && a<=targetAlt) return interp(prev,t,prevAlt,a,targetAlt);
    }
    prev=t; prevAlt=a;
  }
  return null;
}
function interp(t0,t1,a0,a1,target){
  const f=(target-a0)/(a1-a0);
  return new Date(t0.getTime()+f*(t1.getTime()-t0.getTime()));
}

let state=null, timer=null;
function fmtTime(date, tz){
  return date.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:tz});
}

function skyForAlt(alt){
  if(alt> 6) return ['#7ec8ff','#bfe8ff','#eaf7ff'];        // day
  if(alt> -0.83) return ['#ff9e6d','#ffd27a','#ffeaa0'];    // golden/sunrise-set
  if(alt> -6) return ['#5b4a8a','#c4708f','#ffb27a'];       // civil twilight
  if(alt> -12) return ['#2a2a55','#5b4a8a','#8a5a8a'];      // nautical
  if(alt> -18) return ['#141436','#2a2a55','#3a2a55'];      // astronomical
  return ['#070912','#0d1130','#141436'];                    // night
}
function phaseName(alt, rising){
  if(alt>6) return 'Daytime';
  if(alt>-0.83) return alt>0?'Golden hour':'Golden hour';
  if(alt>-6) return rising?'Dawn · civil twilight':'Dusk · civil twilight';
  if(alt>-12) return 'Nautical twilight';
  if(alt>-18) return 'Astronomical twilight';
  return 'Night';
}

function render(){
  if(!state)return;
  const now=new Date();
  const {lat,lon,tz,name} = state;
  const cur=sunPosition(now,lat,lon);
  // is sun rising now? compare to a minute ago
  const before=sunPosition(new Date(now.getTime()-60000),lat,lon).alt;
  const rising = cur.alt>before;

  // sky
  const [a,b,c]=skyForAlt(cur.alt);
  $('#sky').style.background=`linear-gradient(180deg,${a} 0%,${b} 55%,${c} 100%)`;
  $('#stars').style.opacity = cur.alt<-6 ? .9 : (cur.alt<0?.4:0);

  // events (today, local). Use local midnight in tz -> approximate by UTC day spanning
  const baseUTC=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate(),0,0,0));
  // search window from 12h before to ensure we catch local-day sunrise; use baseUTC-12h
  const win=new Date(baseUTC.getTime()-12*3600000);
  const sunrise=findEvent(lat,lon,win,-0.833,true);
  const sunset =findEvent(lat,lon, sunrise?sunrise:baseUTC,-0.833,false) || findEvent(lat,lon,baseUTC,-0.833,false);
  const noonScan=()=>{let best=-99,bt=null;for(let m=0;m<=1440;m++){const t=new Date(baseUTC.getTime()+m*60000);const al=sunPosition(t,lat,lon).alt;if(al>best){best=al;bt=t;}}return {t:bt,alt:best};};
  const noon=noonScan();
  const ghMorningEnd=findEvent(lat,lon,win,6,true);     // sun reaches 6° (end of soft light)
  const ghEveningStart=findEvent(lat,lon, noon.t||baseUTC,6,false);

  // header
  $('#place').textContent=name;
  $('#ltime').textContent='Local time · '+now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:tz})+'  ·  sun '+cur.alt.toFixed(1)+'° altitude';
  $('#phase').textContent=phaseName(cur.alt,rising)+(cur.alt>-0.83&&cur.alt<6?' ✨':'');

  // arc svg: x = azimuth-ish progress across sky via hour angle proxy; use time-of-day mapping
  drawArc(lat,lon,baseUTC,now,cur);

  // rail
  const tf=d=>d?fmtTime(d,tz):'—';
  const dayLen=(sunrise&&sunset)?(sunset-sunrise):0;
  const dh=Math.floor(dayLen/3600000), dm=Math.round((dayLen%3600000)/60000);
  $('#rail').innerHTML=`
    <div class="cell"><div class="l">Sunrise</div><div class="v">${tf(sunrise)}</div><div class="s">sun crosses horizon</div></div>
    <div class="cell"><div class="l">Sunset</div><div class="v">${tf(sunset)}</div><div class="s">sun dips below</div></div>
    <div class="cell"><div class="l">Solar noon</div><div class="v">${tf(noon.t)}</div><div class="s">highest · ${noon.alt.toFixed(0)}° up</div></div>
    <div class="cell"><div class="l">Day length</div><div class="v">${dayLen?dh+'h '+pad(dm)+'m':'—'}</div><div class="s">sunrise → sunset</div></div>
    <div class="cell gh"><div class="l">Golden hour ✨</div><div class="v">${tf(sunrise)} – ${tf(ghMorningEnd)}  &nbsp;·&nbsp;  ${tf(ghEveningStart)} – ${tf(sunset)}</div><div class="s">warm, soft light for photos (sun below 6°)</div></div>`;
}

function drawArc(lat,lon,baseUTC,now,cur){
  const svg=$('#arc'); const W=600,H=300, hY=235, cx=300;
  // sample altitude across the day, map time->x linearly (0..24h), alt->y
  let pts=[]; let maxAlt=-99;
  for(let m=0;m<=1440;m+=8){const t=new Date(baseUTC.getTime()+m*60000);const al=sunPosition(t,lat,lon).alt;maxAlt=Math.max(maxAlt,al);pts.push([m/1440,al]);}
  const top=Math.max(maxAlt,10);
  const X=f=>40+f*(W-80);
  const Y=al=>hY - (al/top)*(hY-30);
  // path
  let d='';
  pts.forEach((p,i)=>{const x=X(p[0]),y=Y(p[1]);d+=(i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)+' ';});
  // current sun x via fraction of day
  const frac=((now-baseUTC)/86400000);
  const sx=X(frac), sy=Y(cur.alt);
  const sunUp=cur.alt>-0.83;
  svg.innerHTML=`
    <defs>
      <linearGradient id="arcg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ffe6ad" stop-opacity=".9"/><stop offset="1" stop-color="#ffd479" stop-opacity=".15"/>
      </linearGradient>
      <radialGradient id="sung"><stop offset="0" stop-color="#fff7e0"/><stop offset="1" stop-color="#ffb347"/></radialGradient>
      <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <line x1="20" y1="${hY}" x2="${W-20}" y2="${hY}" stroke="rgba(255,255,255,.35)" stroke-width="1.5"/>
    <text x="24" y="${hY+22}" fill="rgba(255,255,255,.5)" font-size="12" font-family="Inter">horizon</text>
    <path d="${d}" fill="none" stroke="url(#arcg)" stroke-width="3" stroke-linecap="round" opacity=".85"/>
    ${sunUp?`<line x1="${sx.toFixed(1)}" y1="${sy.toFixed(1)}" x2="${sx.toFixed(1)}" y2="${hY}" stroke="rgba(255,212,121,.4)" stroke-width="1" stroke-dasharray="3 4"/>`:''}
    <circle cx="${sx.toFixed(1)}" cy="${Math.min(sy,hY+18).toFixed(1)}" r="${sunUp?13:8}" fill="url(#sung)" filter="url(#glow)" opacity="${sunUp?1:.55}"/>
    <text x="${X(0)}" y="${hY+22}" fill="rgba(255,255,255,.45)" font-size="11" font-family="Inter">12am</text>
    <text x="${X(.5)-12}" y="${hY+22}" fill="rgba(255,255,255,.45)" font-size="11" font-family="Inter">12pm</text>
    <text x="${X(1)-26}" y="${hY+22}" fill="rgba(255,255,255,.45)" font-size="11" font-family="Inter">12am</text>`;
}

async function track(city){
  $('#err').textContent='';
  try{
    const r=await fetch('https://geocoding-api.open-meteo.com/v1/search?count=1&name='+encodeURIComponent(city));
    const j=await r.json();
    if(!j.results||!j.results.length){$('#err').innerHTML='<div class="err">Couldn’t find that place — try another city.</div>';return;}
    const g=j.results[0];
    state={lat:g.latitude,lon:g.longitude,tz:g.timezone||'UTC',name:[g.name,g.admin1,g.country].filter(Boolean).join(', ')};
    $('#stage').classList.add('on');
    render();
    if(timer)clearInterval(timer);
    timer=setInterval(render,60000);
  }catch(e){$('#err').innerHTML='<div class="err">Network hiccup — try again.</div>';}
}

// stars
(function(){const c=$('#stars');const ctx=c.getContext('2d');function rs(){c.width=innerWidth;c.height=innerHeight;ctx.clearRect(0,0,c.width,c.height);for(let i=0;i<140;i++){ctx.globalAlpha=Math.random()*.7+.2;ctx.fillStyle='#fff';const r=Math.random()*1.3;ctx.beginPath();ctx.arc(Math.random()*c.width,Math.random()*c.height*.8,r,0,7);ctx.fill();}}rs();addEventListener('resize',rs);})();

const cities=['Melbourne','Reykjavík','Tokyo','Cape Town','Tromsø','New York'];
$('#chips').innerHTML=cities.map(c=>`<span class="chip">${c}</span>`).join('');
$('#chips').addEventListener('click',e=>{if(e.target.classList.contains('chip')){$('#q').value=e.target.textContent;track(e.target.textContent);}});
$('#go').addEventListener('click',()=>track($('#q').value.trim()||'Melbourne'));
$('#q').addEventListener('keydown',e=>{if(e.key==='Enter')track($('#q').value.trim()||'Melbourne');});
track('Melbourne');
</script>
</body>
</html>
