<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocktail ABV Mixer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Albert+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Albert Sans', sans-serif;
            background: linear-gradient(135deg, #1a0033 0%, #2d0066 50%, #1a0033 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        .hero {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-family: 'Unbounded', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #ff6ba6, #00d9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 1.1rem;
            color: #b0b0b0;
            max-width: 500px;
            margin: 0 auto;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: start;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }

        .mixer-panel {
            background: rgba(255, 107, 166, 0.05);
            border: 1px solid rgba(255, 107, 166, 0.2);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            animation: slideInLeft 0.8s ease-out 0.1s backwards;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .mixer-panel h2 {
            font-family: 'Unbounded', sans-serif;
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            color: #ff6ba6;
        }

        .control-group {
            margin-bottom: 1.5rem;
        }

        .control-group label {
            display: block;
            font-size: 0.9rem;
            color: #a0a0a0;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        select, input[type="range"] {
            width: 100%;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 107, 166, 0.3);
            border-radius: 8px;
            color: #e0e0e0;
            font-family: 'Albert Sans', sans-serif;
            font-size: 1rem;
        }

        select:focus, input[type="range"]:focus {
            outline: none;
            border-color: #ff6ba6;
            box-shadow: 0 0 12px rgba(255, 107, 166, 0.3);
        }

        input[type="range"] {
            padding: 0.5rem;
            height: 6px;
            cursor: pointer;
        }

        .amount-display {
            font-size: 0.85rem;
            color: #00d9ff;
            margin-top: 0.4rem;
            text-align: right;
        }

        .stats {
            background: rgba(0, 217, 255, 0.05);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 2rem;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .stat-row:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            color: #a0a0a0;
        }

        .stat-value {
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            color: #00d9ff;
            font-size: 1.1rem;
        }

        .warning {
            background: rgba(255, 100, 0, 0.1);
            border: 1px solid rgba(255, 100, 0, 0.4);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            display: none;
            color: #ffb84d;
            font-size: 0.9rem;
            animation: slideInUp 0.4s ease-out;
        }

        .warning.show {
            display: block;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .visualization {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 2rem;
            animation: slideInRight 0.8s ease-out 0.2s backwards;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        svg {
            filter: drop-shadow(0 10px 30px rgba(0, 217, 255, 0.2));
        }

        .recipe-name {
            background: rgba(255, 107, 166, 0.1);
            border: 1px solid rgba(255, 107, 166, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 2rem;
            text-align: center;
        }

        .recipe-name h3 {
            font-family: 'Unbounded', sans-serif;
            color: #ff6ba6;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .recipe-name p {
            font-size: 0.9rem;
            color: #a0a0a0;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Cocktail ABV Mixer</h1>
        <p>Craft your perfect drink and calculate alcohol strength</p>
    </div>

    <div class="container">
        <div class="mixer-panel">
            <h2>Build Your Cocktail</h2>
            
            <div class="control-group">
                <label for="spirit1">Base Spirit</label>
                <select id="spirit1">
                    <option value="">Select a spirit...</option>
                    <option value="vodka">Vodka (40% ABV)</option>
                    <option value="gin">Gin (40% ABV)</option>
                    <option value="rum">Rum (40% ABV)</option>
                    <option value="whiskey">Whiskey (43% ABV)</option>
                    <option value="tequila">Tequila (40% ABV)</option>
                    <option value="brandy">Brandy (40% ABV)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="amount1">Base Amount: <span id="display1">30</span> ml</label>
                <input type="range" id="amount1" min="0" max="60" value="30" step="5">
            </div>

            <div class="control-group">
                <label for="spirit2">Modifier 1 (Optional)</label>
                <select id="spirit2">
                    <option value="">None</option>
                    <option value="lime">Lime Juice (0% ABV)</option>
                    <option value="lemon">Lemon Juice (0% ABV)</option>
                    <option value="soda">Soda Water (0% ABV)</option>
                    <option value="cola">Cola (0% ABV)</option>
                    <option value="liqueur">Liqueur (35% ABV)</option>
                    <option value="schnapps">Schnapps (20% ABV)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="amount2">Modifier 1 Amount: <span id="display2">20</span> ml</label>
                <input type="range" id="amount2" min="0" max="60" value="20" step="5">
            </div>

            <div class="control-group">
                <label for="spirit3">Modifier 2 (Optional)</label>
                <select id="spirit3">
                    <option value="">None</option>
                    <option value="lime">Lime Juice (0% ABV)</option>
                    <option value="lemon">Lemon Juice (0% ABV)</option>
                    <option value="soda">Soda Water (0% ABV)</option>
                    <option value="cola">Cola (0% ABV)</option>
                    <option value="liqueur">Liqueur (35% ABV)</option>
                    <option value="schnapps">Schnapps (20% ABV)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="amount3">Modifier 2 Amount: <span id="display3">15</span> ml</label>
                <input type="range" id="amount3" min="0" max="60" value="15" step="5">
            </div>

            <div class="stats">
                <div class="stat-row">
                    <span class="stat-label">Total Volume</span>
                    <span class="stat-value" id="totalVolume">65 ml</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Alcohol Content</span>
                    <span class="stat-value" id="abvValue">20.0%</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Pure Alcohol</span>
                    <span class="stat-value" id="pureAlcohol">13.0 ml</span>
                </div>
            </div>

            <div class="warning" id="warning">
                ⚠️ Strong drink! Over 25% ABV — drink responsibly.
            </div>

            <div class="recipe-name">
                <h3 id="recipeName">Custom Mix</h3>
                <p id="recipeDesc">30ml vodka, 20ml lime, 15ml soda</p>
            </div>
        </div>

        <div class="visualization">
            <svg width="200" height="350" viewBox="0 0 200 350" xmlns="http://www.w3.org/2000/svg">
                <!-- Bottle -->
                <rect x="60" y="20" width="40" height="100" fill="rgba(0, 217, 255, 0.15)" stroke="rgba(0, 217, 255, 0.4)" stroke-width="2" rx="4"/>
                <rect x="55" y="10" width="50" height="15" fill="rgba(0, 217, 255, 0.2)" stroke="rgba(0, 217, 255, 0.3)" stroke-width="1" rx="2"/>
                
                <!-- Liquid in bottle (animated) -->
                <rect x="62" y="80" width="36" height="35" id="bottleLiquid" fill="#ff6ba6" opacity="0.6" rx="2"/>
                
                <!-- Glass -->
                <path d="M 80 150 L 70 280 L 130 280 L 120 150 Z" fill="none" stroke="rgba(0, 217, 255, 0.3)" stroke-width="2"/>
                
                <!-- Liquid in glass (main) -->
                <path d="M 72 250 L 74 280 L 126 280 L 128 250 Z" id="glassLiquid" fill="#ff6ba6" opacity="0.7"/>
                
                <!-- Glass shine -->
                <line x1="82" y1="160" x2="80" y2="270" stroke="rgba(255, 255, 255, 0.15)" stroke-width="3" opacity="0.4"/>
                
                <!-- Ice (decorative) -->
                <circle cx="85" cy="240" r="4" fill="rgba(0, 217, 255, 0.4)" opacity="0.6"/>
                <circle cx="105" cy="245" r="3" fill="rgba(0, 217, 255, 0.3)" opacity="0.6"/>
                <circle cx="120" cy="238" r="3.5" fill="rgba(0, 217, 255, 0.35)" opacity="0.6"/>
                
                <!-- Pour stream (animated) -->
                <line x1="80" y1="140" x2="80" y2="250" id="pourStream" stroke="rgba(0, 217, 255, 0.5)" stroke-width="8" opacity="0" stroke-linecap="round"/>
                
                <!-- Glow -->
                <filter id="glow">
                    <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </svg>
        </div>
    </div>

    <script>
        // Liquor database
        const liquors = {
            vodka: { name: 'Vodka', abv: 40 },
            gin: { name: 'Gin', abv: 40 },
            rum: { name: 'Rum', abv: 40 },
            whiskey: { name: 'Whiskey', abv: 43 },
            tequila: { name: 'Tequila', abv: 40 },
            brandy: { name: 'Brandy', abv: 40 },
            lime: { name: 'Lime Juice', abv: 0 },
            lemon: { name: 'Lemon Juice', abv: 0 },
            soda: { name: 'Soda Water', abv: 0 },
            cola: { name: 'Cola', abv: 0 },
            liqueur: { name: 'Liqueur', abv: 35 },
            schnapps: { name: 'Schnapps', abv: 20 }
        };

        // DOM elements
        const spirit1 = document.getElementById('spirit1');
        const amount1 = document.getElementById('amount1');
        const amount1Display = document.getElementById('display1');
        const spirit2 = document.getElementById('spirit2');
        const amount2 = document.getElementById('amount2');
        const amount2Display = document.getElementById('display2');
        const spirit3 = document.getElementById('spirit3');
        const amount3 = document.getElementById('amount3');
        const amount3Display = document.getElementById('display3');
        const totalVolumeEl = document.getElementById('totalVolume');
        const abvValueEl = document.getElementById('abvValue');
        const pureAlcoholEl = document.getElementById('pureAlcohol');
        const warningEl = document.getElementById('warning');
        const recipeNameEl = document.getElementById('recipeName');
        const recipeDescEl = document.getElementById('recipeDesc');
        const glassLiquidEl = document.getElementById('glassLiquid');
        const bottleLiquidEl = document.getElementById('bottleLiquid');
        const pourStreamEl = document.getElementById('pourStream');

        // Update display values
        amount1.addEventListener('input', () => {
            amount1Display.textContent = amount1.value;
            updateCocktail();
        });
        amount2.addEventListener('input', () => {
            amount2Display.textContent = amount2.value;
            updateCocktail();
        });
        amount3.addEventListener('input', () => {
            amount3Display.textContent = amount3.value;
            updateCocktail();
        });

        spirit1.addEventListener('change', updateCocktail);
        spirit2.addEventListener('change', updateCocktail);
        spirit3.addEventListener('change', updateCocktail);

        // Core calculation function
        function calculateABV(ingredients) {
            let totalAlcohol = 0;
            let totalVolume = 0;

            ingredients.forEach(ing => {
                const liquor = liquors[ing.type];
                if (!liquor) return;
                totalAlcohol += (ing.amount * liquor.abv) / 100;
                totalVolume += ing.amount;
            });

            if (totalVolume === 0) return { abv: 0, pureAlcohol: 0, totalVolume: 0 };
            return {
                abv: (totalAlcohol / totalVolume) * 100,
                pureAlcohol: totalAlcohol,
                totalVolume: totalVolume
            };
        }

        // Test headless logic
        function testABVLogic() {
            const test1 = calculateABV([
                { type: 'vodka', amount: 30 },
                { type: 'soda', amount: 20 }
            ]);
            const expected1 = (30 * 40) / 50 / 100; // 24%
            console.assert(Math.abs(test1.abv - 24) < 1, 'Test 1 failed:', test1);

            const test2 = calculateABV([
                { type: 'whiskey', amount: 45 },
                { type: 'lime', amount: 15 }
            ]);
            const expected2 = (45 * 43) / 60 / 100; // 32.25%
            console.assert(Math.abs(test2.abv - 32.25) < 1, 'Test 2 failed:', test2);

            console.log('✅ ABV logic tests passed');
        }
        testABVLogic();

        // Update cocktail visuals and stats
        function updateCocktail() {
            const ingredients = [];

            if (spirit1.value) {
                ingredients.push({ type: spirit1.value, amount: parseInt(amount1.value) });
            }
            if (spirit2.value) {
                ingredients.push({ type: spirit2.value, amount: parseInt(amount2.value) });
            }
            if (spirit3.value) {
                ingredients.push({ type: spirit3.value, amount: parseInt(amount3.value) });
            }

            if (ingredients.length === 0) {
                totalVolumeEl.textContent = '0 ml';
                abvValueEl.textContent = '0.0%';
                pureAlcoholEl.textContent = '0.0 ml';
                recipeNameEl.textContent = 'No Drink';
                recipeDescEl.textContent = 'Select a base spirit';
                warningEl.classList.remove('show');
                return;
            }

            const result = calculateABV(ingredients);
            totalVolumeEl.textContent = Math.round(result.totalVolume) + ' ml';
            abvValueEl.textContent = result.abv.toFixed(1) + '%';
            pureAlcoholEl.textContent = result.pureAlcohol.toFixed(1) + ' ml';

            // Update warning
            if (result.abv > 25) {
                warningEl.classList.add('show');
            } else {
                warningEl.classList.remove('show');
            }

            // Update recipe name
            const baseSpirit = spirit1.value ? liquors[spirit1.value].name : 'Unknown';
            recipeNameEl.textContent = generateCocktailName(baseSpirit, result.abv);

            // Build recipe description
            let desc = `${amount1.value}ml ${baseSpirit.toLowerCase()}`;
            if (spirit2.value) {
                desc += `, ${amount2.value}ml ${liquors[spirit2.value].name.toLowerCase()}`;
            }
            if (spirit3.value) {
                desc += `, ${amount3.value}ml ${liquors[spirit3.value].name.toLowerCase()}`;
            }
            recipeDescEl.textContent = desc;

            // Update glass visualization
            const glassHeight = Math.min(130, (result.totalVolume / 100) * 130);
            const glassStartY = 250 - glassHeight;
            glassLiquidEl.setAttribute('d', `M 72 ${glassStartY} L 74 280 L 126 280 L 128 ${glassStartY} Z`);

            // Color gradient based on ABV (light to dark pink/red)
            const hue = Math.max(0, 340 - (result.abv / 50) * 40); // From pink to red as ABV increases
            const color = `hsl(${hue}, 100%, 50%)`;
            glassLiquidEl.setAttribute('fill', color);

            // Animate pour
            pourStreamEl.style.opacity = '0.6';
            setTimeout(() => {
                pourStreamEl.style.opacity = '0';
            }, 300);
        }

        function generateCocktailName(base, abv) {
            if (abv < 10) return base + ' Spritz';
            if (abv < 20) return base + ' Light';
            if (abv < 30) return base + ' Classic';
            return base + ' Strong';
        }

        // Initialize
        updateCocktail();

        // Respect prefers-reduced-motion
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            document.documentElement.style.setProperty('--animation-duration', '0s');
        }
    </script>
</body>
</html>
