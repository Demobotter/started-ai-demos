<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Currency Strength Ranker</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(135deg, #0f0f2e 0%, #1a1a3e 50%, #0d0d1b 100%);
      color: #e0e0ff;
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero {
      text-align: center;
      margin-bottom: 60px;
      animation: fadeInUp 0.8s ease-out;
    }

    .hero h1 {
      font-size: clamp(32px, 6vw, 56px);
      font-weight: 700;
      background: linear-gradient(90deg, #00d9ff, #00ff88, #ffaa00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .hero p {
      font-size: 16px;
      color: #a0a0cc;
      font-weight: 400;
    }

    .loading {
      text-align: center;
      padding: 40px;
      font-size: 14px;
      color: #6080dd;
      display: none;
    }

    .loading.show {
      display: block;
    }

    .rank-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    .rank-card {
      background: rgba(20, 20, 45, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 150, 255, 0.2);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    .rank-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(0, 217, 255, 0.1), rgba(0, 255, 136, 0.1));
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 0;
    }

    .rank-card:hover::before {
      opacity: 1;
    }

    .rank-card:hover {
      border-color: rgba(100, 200, 255, 0.5);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(100, 200, 255, 0.2);
    }

    .rank-content {
      position: relative;
      z-index: 1;
    }

    .rank-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .currency-code {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      font-family: 'IBM Plex Mono', monospace;
    }

    .rank-position {
      font-size: 12px;
      background: rgba(0, 217, 255, 0.2);
      color: #00d9ff;
      padding: 4px 12px;
      border-radius: 16px;
      font-weight: 600;
    }

    .strength-bar {
      width: 100%;
      height: 6px;
      background: rgba(100, 100, 100, 0.3);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .strength-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease, background-color 0.6s ease;
      background: linear-gradient(90deg, #ff0040, #ffaa00, #00ff88, #00d9ff);
    }

    .strength-value {
      font-size: 14px;
      font-weight: 500;
      color: #a0a0cc;
      font-family: 'IBM Plex Mono', monospace;
    }

    .current-rate {
      font-size: 12px;
      color: #6080dd;
      margin-top: 8px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .stats-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }

    .stat-card {
      background: rgba(20, 20, 45, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 217, 255, 0.3);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: #6080dd;
      font-weight: 500;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #00ff88;
      font-family: 'IBM Plex Mono', monospace;
    }

    .error {
      color: #ff5555;
      padding: 20px;
      text-align: center;
      display: none;
    }

    .error.show {
      display: block;
    }

    @media (max-width: 640px) {
      .container {
        padding: 24px 16px;
      }

      .hero h1 {
        font-size: 28px;
      }

      .rank-grid {
        grid-template-columns: 1fr;
      }

      .stats-section {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Currency Strength Ranker</h1>
      <p>Live FX rates | Real-time global currency rankings</p>
    </div>

    <div class="loading show">
      <p>Fetching live rates...</p>
    </div>

    <div class="error" id="error"></div>

    <div id="content" style="display: none;">
      <div class="stats-section">
        <div class="stat-card">
          <div class="stat-label">Strongest</div>
          <div class="stat-value" id="strongest">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Weakest</div>
          <div class="stat-value" id="weakest">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Updated</div>
          <div class="stat-value" id="timestamp" style="font-size: 14px;">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Base Currency</div>
          <div class="stat-value" style="font-size: 16px;">USD</div>
        </div>
      </div>

      <div class="rank-grid" id="rankGrid"></div>
    </div>
  </div>

  <script>
    const CURRENCIES = ['USD', 'EUR', 'GBP', 'JPY', 'CHF', 'CAD', 'AUD', 'NZD'];
    const API_URL = 'https://api.frankfurter.dev/v1/latest';

    async function fetchRates() {
      try {
        const response = await fetch(`${API_URL}?from=USD&to=${CURRENCIES.join(',')}`);
        if (!response.ok) throw new Error(`API error: ${response.status}`);
        
        const data = await response.json();
        return { USD: 1.0, ...data.rates };
      } catch (err) {
        console.error('Fetch error:', err);
        throw err;
      }
    }

    function calculateStrength(rates) {
      const strengths = {};
      
      for (const curr of CURRENCIES) {
        const rate = rates[curr];
        if (!rate) continue;
        
        // For JPY (rates > 100), invert to normalize
        let normalized = curr === 'JPY' ? 1 / rate : rate;
        strengths[curr] = normalized;
      }

      const vals = Object.values(strengths);
      const min = Math.min(...vals);
      const max = Math.max(...vals);
      
      const result = {};
      for (const [curr, norm] of Object.entries(strengths)) {
        result[curr] = ((norm - min) / (max - min)) * 100;
      }
      
      return result;
    }

    function formatTime(date) {
      return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
    }

    async function updateRanks() {
      const loading = document.querySelector('.loading');
      const error = document.querySelector('.error');
      const content = document.querySelector('#content');
      const rankGrid = document.querySelector('#rankGrid');

      try {
        const rates = await fetchRates();
        const strengths = calculateStrength(rates);

        // Rank by strength
        const ranked = Object.entries(strengths)
          .sort((a, b) => b[1] - a[1])
          .map((entry, i) => ({
            currency: entry[0],
            strength: Math.round(entry[1]),
            rank: i + 1,
            rate: rates[entry[0]]
          }));

        // Render rank cards
        rankGrid.innerHTML = ranked.map(item => {
          const colorStop = (item.strength / 100) * 100;
          return `
            <div class="rank-card">
              <div class="rank-content">
                <div class="rank-header">
                  <div class="currency-code">${item.currency}</div>
                  <div class="rank-position">#${item.rank}</div>
                </div>
                <div class="strength-bar">
                  <div class="strength-fill" style="width: ${item.strength}%; background: linear-gradient(90deg, 
                    hsl(0, 100%, 50%) 0%,
                    hsl(30, 100%, 50%) ${Math.max(0, colorStop - 30)}%,
                    hsl(100, 100%, 50%) ${colorStop}%,
                    hsl(200, 100%, 50%) 100%);"></div>
                </div>
                <div class="strength-value">${item.strength}/100</div>
                <div class="current-rate">1 USD = ${item.rate.toFixed(4)} ${item.currency}</div>
              </div>
            </div>
          `;
        }).join('');

        // Update stats
        document.querySelector('#strongest').textContent = ranked[0].currency;
        document.querySelector('#weakest').textContent = ranked[ranked.length - 1].currency;
        document.querySelector('#timestamp').textContent = formatTime(new Date());

        // Show content, hide loading
        loading.classList.remove('show');
        error.classList.remove('show');
        content.style.display = 'block';
      } catch (err) {
        console.error('Update failed:', err);
        loading.classList.remove('show');
        error.classList.add('show');
        error.textContent = 'Failed to fetch rates. Please refresh.';
      }
    }

    // Initial load
    updateRanks();
    
    // Refresh every 60 seconds
    setInterval(updateRanks, 60000);
  </script>
</body>
</html>
