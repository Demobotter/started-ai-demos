<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX Live — Real-Time Currency Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: rgba(20, 28, 50, 0.8);
            border: 2px solid #00d4ff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2), inset 0 0 20px rgba(0, 212, 255, 0.05);
            animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease 0.2s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .hero h1 {
            font-size: clamp(28px, 6vw, 48px);
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00d4ff, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 14px;
            color: #a0a0c0;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 0.5px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 28px;
            animation: fadeIn 0.8s ease 0.3s both;
        }

        @media (max-width: 500px) {
            .controls {
                grid-template-columns: 1fr;
            }
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 12px;
            text-transform: uppercase;
            color: #00d4ff;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 1px;
            font-family: 'IBM Plex Mono', monospace;
        }

        input, select {
            padding: 12px;
            border: 1px solid #00d4ff;
            background: rgba(0, 212, 255, 0.05);
            color: #fff;
            border-radius: 8px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: #505070;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #00ffcc;
            box-shadow: 0 0 12px rgba(0, 255, 204, 0.3);
            background: rgba(0, 255, 204, 0.08);
        }

        .amount-display {
            font-size: 32px;
            font-weight: 700;
            color: #00ffcc;
            font-family: 'IBM Plex Mono', monospace;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .rate-info {
            font-size: 12px;
            color: #707090;
            margin-bottom: 24px;
            text-align: center;
            animation: fadeIn 0.8s ease 0.4s both;
        }

        .rate {
            color: #00d4ff;
            font-weight: 600;
            font-family: 'IBM Plex Mono', monospace;
        }

        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
            animation: fadeIn 0.8s ease 0.5s both;
        }

        @media (max-width: 500px) {
            .cards {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(0, 255, 204, 0.05));
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .card-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #00d4ff;
            margin-bottom: 6px;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .card-value {
            font-size: 20px;
            color: #00ffcc;
            font-weight: 700;
            font-family: 'IBM Plex Mono', monospace;
        }

        .status {
            font-size: 12px;
            text-align: center;
            color: #707090;
            padding: 12px;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 6px;
            font-family: 'IBM Plex Mono', monospace;
            animation: fadeIn 0.8s ease 0.6s both;
        }

        .status.loading {
            color: #00d4ff;
        }

        .status.error {
            color: #ff4466;
        }

        .status.success {
            color: #00ffcc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>💱 FX Live</h1>
            <p>Real-time currency conversion at your fingertips</p>
        </div>

        <div class="controls">
            <div class="field">
                <label for="amount">Amount</label>
                <input 
                    id="amount" 
                    type="number" 
                    value="100" 
                    min="0" 
                    step="0.01" 
                    placeholder="Enter amount"
                >
            </div>
            <div class="field">
                <label for="from">From</label>
                <select id="from">
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="GBP">GBP</option>
                    <option value="JPY">JPY</option>
                    <option value="AUD">AUD</option>
                    <option value="CAD">CAD</option>
                    <option value="CHF">CHF</option>
                    <option value="CNY">CNY</option>
                    <option value="INR">INR</option>
                    <option value="MXN">MXN</option>
                </select>
            </div>
        </div>

        <div class="controls">
            <div class="field">
                <label for="to">To</label>
                <select id="to">
                    <option value="EUR">EUR</option>
                    <option value="USD">USD</option>
                    <option value="GBP">GBP</option>
                    <option value="JPY">JPY</option>
                    <option value="AUD">AUD</option>
                    <option value="CAD">CAD</option>
                    <option value="CHF">CHF</option>
                    <option value="CNY">CNY</option>
                    <option value="INR">INR</option>
                    <option value="MXN">MXN</option>
                </select>
            </div>
            <div class="field" style="justify-content: flex-end;">
                <div style="height: 22px;"></div>
                <button onclick="convert()" style="
                    padding: 12px 20px;
                    background: linear-gradient(90deg, #00d4ff, #00ffcc);
                    color: #0f3460;
                    border: none;
                    border-radius: 8px;
                    font-weight: 700;
                    cursor: pointer;
                    transition: transform 0.2s ease, box-shadow 0.2s ease;
                    font-family: 'Outfit', sans-serif;
                    font-size: 14px;
                    text-transform: uppercase;
                    letter-spacing: 0.5px;
                " onmouseover="this.style.transform='scale(1.05)'; this.style.boxShadow='0 0 20px rgba(0,212,255,0.4)'" onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='none'">
                    Convert
                </button>
            </div>
        </div>

        <div id="result" style="margin-bottom: 20px; min-height: 50px; animation: fadeIn 0.8s ease 0.4s both;">
            <div class="amount-display" id="resultAmount">—</div>
        </div>

        <div class="rate-info" id="rateInfo">
            Rates last updated: —
        </div>

        <div class="cards">
            <div class="card">
                <div class="card-label">Exchange Rate</div>
                <div class="card-value" id="rate">—</div>
            </div>
            <div class="card">
                <div class="card-label">Pair</div>
                <div class="card-value" id="pair" style="font-size: 16px;">—</div>
            </div>
        </div>

        <div class="status" id="status">Ready to convert</div>
    </div>

    <script>
        let lastRates = null;
        let lastUpdate = null;

        function formatNumber(num) {
            return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function updateStatus(msg, type = 'success') {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = `status ${type}`;
        }

        async function convert() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const from = document.getElementById('from').value;
            const to = document.getElementById('to').value;

            if (amount < 0) {
                updateStatus('Enter a valid amount', 'error');
                return;
            }

            updateStatus('Fetching rates...', 'loading');

            try {
                // Use open.er-api.com instead of Frankfurter (which has CORS issues)
                const url = `https://open.er-api.com/v6/latest?base=${from}`;
                const resp = await fetch(url);
                
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                
                const data = await resp.json();
                
                if (!data.rates || !data.rates[to]) {
                    throw new Error('Currency not found');
                }

                const rate = data.rates[to];
                const converted = amount * rate;
                
                document.getElementById('resultAmount').textContent = formatNumber(converted);
                document.getElementById('rate').textContent = rate.toFixed(4);
                document.getElementById('pair').textContent = `${from}/${to}`;
                
                lastUpdate = new Date();
                const timeStr = lastUpdate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                document.getElementById('rateInfo').textContent = `Rates last updated: ${timeStr}`;
                
                updateStatus(`${amount} ${from} = ${formatNumber(converted)} ${to}`, 'success');
            } catch (err) {
                console.error('Conversion error:', err);
                document.getElementById('resultAmount').textContent = 'Error';
                document.getElementById('rate').textContent = '—';
                document.getElementById('pair').textContent = '—';
                updateStatus(`Failed: ${err.message}`, 'error');
            }
        }

        // Auto-convert on load
        window.addEventListener('load', () => {
            setTimeout(convert, 500);
        });
    </script>
</body>
</html>
