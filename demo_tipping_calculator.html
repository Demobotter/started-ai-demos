<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tipping Calculator Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Sora', sans-serif;
      background: linear-gradient(135deg, #0d1117 0%, #1a1f2e 100%);
      color: #e8e8f0;
      overflow-x: hidden;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .hero {
      text-align: center;
      margin-bottom: 50px;
      animation: slideDown 1s cubic-bezier(.16,1,.3,1);
    }

    @keyframes slideDown {
      from { 
        opacity: 0;
        transform: translateY(-30px);
      }
      to { 
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero h1 {
      font-size: clamp(36px, 8vw, 64px);
      font-weight: 700;
      background: linear-gradient(90deg, #ff6b6b 0%, #ffb26b 50%, #6bcf7f 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .hero p {
      font-size: 16px;
      color: #9ca3af;
      max-width: 500px;
      margin: 0 auto;
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
      animation: fadeIn 1.2s ease-out 0.2s both;
    }

    @media (max-width: 768px) {
      .main {
        grid-template-columns: 1fr;
        gap: 30px;
      }
    }

    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(107, 207, 127, 0.3);
      border-radius: 12px;
      padding: 32px;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(107, 207, 127, 0.4), transparent);
    }

    .controls h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 28px;
      color: #fff;
    }

    .control-group {
      margin-bottom: 32px;
    }

    .control-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #cbd5e1;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .control-group .value {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      color: #6bcf7f;
      font-size: 16px;
    }

    .control-group input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 4px;
      background: linear-gradient(90deg, #ff6b6b 0%, #6bcf7f 100%);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }

    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(107, 207, 127, 0.6);
      transition: all 0.2s ease;
    }

    .control-group input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(107, 207, 127, 0.6);
      border: none;
      transition: all 0.2s ease;
    }

    .control-group input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 20px rgba(107, 207, 127, 0.9);
    }

    .control-group input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 20px rgba(107, 207, 127, 0.9);
    }

    .control-group input[type="number"] {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(107, 207, 127, 0.3);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .control-group input[type="number"]:focus {
      outline: none;
      border-color: #6bcf7f;
      background: rgba(107, 207, 127, 0.1);
      box-shadow: 0 0 12px rgba(107, 207, 127, 0.3);
    }

    .results {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .results h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }

    .breakdown-bar {
      display: flex;
      height: 48px;
      border-radius: 8px;
      overflow: hidden;
      gap: 2px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(107, 207, 127, 0.2);
      margin-bottom: 20px;
      animation: slideIn 0.6s ease-out;
    }

    @keyframes slideIn {
      from { 
        opacity: 0;
        transform: translateX(-20px);
      }
      to { 
        opacity: 1;
        transform: translateX(0);
      }
    }

    .breakdown-bar .bill-part {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
      font-size: 12px;
      transition: all 0.3s ease;
    }

    .breakdown-bar .tip-part {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
      font-size: 12px;
      transition: all 0.3s ease;
    }

    .result-stat {
      background: rgba(107, 207, 127, 0.08);
      border: 1px solid rgba(107, 207, 127, 0.2);
      border-radius: 8px;
      padding: 20px;
      transition: all 0.3s ease;
    }

    .result-stat:hover {
      background: rgba(107, 207, 127, 0.12);
      border-color: rgba(107, 207, 127, 0.4);
      transform: translateY(-2px);
    }

    .result-stat-label {
      font-size: 12px;
      font-weight: 500;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .result-stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 28px;
      font-weight: 700;
      color: #6bcf7f;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 480px) {
      .result-grid {
        grid-template-columns: 1fr;
      }
    }

    .legend {
      display: flex;
      gap: 20px;
      margin-top: 24px;
      font-size: 12px;
      color: #9ca3af;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-item .dot {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }

    .legend-item .dot.bill {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .legend-item .dot.tip {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Tipping Calculator Pro</h1>
      <p>Instantly calculate tips, total cost, and per-person splits with live visual breakdown</p>
    </div>

    <div class="main">
      <div class="card controls">
        <h2>Input</h2>
        
        <div class="control-group">
          <label>
            <span>Bill Amount ($)</span>
            <span class="value" id="billDisplay">50.00</span>
          </label>
          <input type="number" id="bill" value="50" min="0" max="10000" step="0.01">
        </div>

        <div class="control-group">
          <label>
            <span>Tip Percentage (%)</span>
            <span class="value" id="tipPercentDisplay">15%</span>
          </label>
          <input type="range" id="tipPercent" value="15" min="0" max="50" step="1">
        </div>

        <div class="control-group">
          <label>
            <span>Party Size</span>
            <span class="value" id="partySizeDisplay">1</span>
          </label>
          <input type="range" id="partySize" value="1" min="1" max="20" step="1">
        </div>
      </div>

      <div class="card results">
        <h2>Results</h2>

        <div>
          <p class="result-stat-label">Bill vs Tip Breakdown</p>
          <div class="breakdown-bar">
            <div class="bill-part" id="billPart" style="width: 85%;">85%</div>
            <div class="tip-part" id="tipPart" style="width: 15%;">15%</div>
          </div>
          <div class="legend">
            <div class="legend-item">
              <div class="dot bill"></div>
              <span>Bill</span>
            </div>
            <div class="legend-item">
              <div class="dot tip"></div>
              <span>Tip</span>
            </div>
          </div>
        </div>

        <div class="result-grid">
          <div class="result-stat">
            <div class="result-stat-label">Tip Amount</div>
            <div class="result-stat-value" id="tipAmount">$7.50</div>
          </div>
          <div class="result-stat">
            <div class="result-stat-label">Total (with tip)</div>
            <div class="result-stat-value" id="totalAmount">$57.50</div>
          </div>
          <div class="result-stat">
            <div class="result-stat-label">Per Person Cost</div>
            <div class="result-stat-value" id="perPersonCost">$57.50</div>
          </div>
          <div class="result-stat">
            <div class="result-stat-label">Tip Per Person</div>
            <div class="result-stat-value" id="tipPerPerson">$7.50</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const billInput = document.getElementById('bill');
    const tipPercentInput = document.getElementById('tipPercent');
    const partySizeInput = document.getElementById('partySize');

    const billDisplay = document.getElementById('billDisplay');
    const tipPercentDisplay = document.getElementById('tipPercentDisplay');
    const partySizeDisplay = document.getElementById('partySizeDisplay');

    const tipAmount = document.getElementById('tipAmount');
    const totalAmount = document.getElementById('totalAmount');
    const perPersonCost = document.getElementById('perPersonCost');
    const tipPerPerson = document.getElementById('tipPerPerson');

    const billPart = document.getElementById('billPart');
    const tipPart = document.getElementById('tipPart');

    function updateCalculations() {
      const bill = parseFloat(billInput.value) || 0;
      const tipPercent = parseFloat(tipPercentInput.value) || 0;
      const partySize = parseInt(partySizeInput.value) || 1;

      // Calculations
      const tip = bill * (tipPercent / 100);
      const total = bill + tip;
      const perPerson = total / partySize;
      const tipPP = tip / partySize;

      // Update displays
      billDisplay.textContent = bill.toFixed(2);
      tipPercentDisplay.textContent = tipPercent + '%';
      partySizeDisplay.textContent = partySize;

      tipAmount.textContent = '$' + tip.toFixed(2);
      totalAmount.textContent = '$' + total.toFixed(2);
      perPersonCost.textContent = '$' + perPerson.toFixed(2);
      tipPerPerson.textContent = '$' + tipPP.toFixed(2);

      // Update bar
      const billPercent = (bill / total) * 100 || 100;
      const tipPercentVal = (tip / total) * 100 || 0;
      billPart.style.width = billPercent + '%';
      tipPart.style.width = tipPercentVal + '%';
      billPart.textContent = Math.round(billPercent) + '%';
      tipPart.textContent = Math.round(tipPercentVal) + '%';
    }

    billInput.addEventListener('input', updateCalculations);
    tipPercentInput.addEventListener('input', updateCalculations);
    partySizeInput.addEventListener('input', updateCalculations);

    // Initial calc
    updateCalculations();
  </script>
</body>
</html>
