<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle Rain — Interactive Flow Sim</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Space Grotesk", sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a0f3a 100%);
      color: #f0f0f0;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      margin-bottom: 2rem;
      animation: fadeIn 0.8s ease-out;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      background: linear-gradient(90deg, #00ffff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .subtitle {
      color: #a0a0a0;
      font-size: 1rem;
      font-weight: 400;
    }

    .content {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 1.5rem;
    }

    @media (max-width: 1000px) {
      .content {
        grid-template-columns: 1fr;
      }
    }

    .canvas-container {
      position: relative;
      background: radial-gradient(circle at 30% 40%, rgba(0, 255, 255, 0.05) 0%, transparent 100%);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 1.25rem;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 255, 255, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: slideUp 0.8s ease-out 0.1s both;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      animation: slideUp 0.8s ease-out 0.2s both;
    }

    .control-panel {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(0, 255, 255, 0.15);
      border-radius: 1rem;
      padding: 1.25rem;
      backdrop-filter: blur(10px);
    }

    .control-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #00ffff;
      margin-bottom: 0.75rem;
      display: block;
      font-weight: 600;
    }

    .slider {
      width: 100%;
      height: 5px;
      border-radius: 3px;
      background: rgba(0, 255, 255, 0.15);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      margin-bottom: 0.5rem;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00ffff, #ff00ff);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.6);
    }

    .slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00ffff, #ff00ff);
      border: none;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.6);
    }

    .value {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.9rem;
      color: #ff00ff;
      text-align: right;
    }

    .stat {
      background: rgba(255, 0, 255, 0.05);
      border: 1px solid rgba(255, 0, 255, 0.2);
      border-radius: 0.75rem;
      padding: 0.75rem;
      text-align: center;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #a0a0a0;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.25rem;
    }

    .stat-value {
      font-family: "IBM Plex Mono", monospace;
      font-size: 1.5rem;
      color: #00ffff;
      font-weight: 700;
    }

    .button {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 0.75rem;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(.16, 1, .3, 1);
      border: 1px solid rgba(0, 255, 255, 0.3);
      background: rgba(0, 255, 255, 0.05);
      color: #00ffff;
    }

    .button:hover {
      background: rgba(0, 255, 255, 0.15);
      border-color: rgba(0, 255, 255, 0.6);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 255, 255, 0.2);
    }

    .button:active {
      transform: translateY(0);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Particle Rain</h1>
      <p class="subtitle">Watch thousands of particles flow and cascade. Click to create vortices.</p>
    </div>

    <div class="content">
      <div class="canvas-container">
        <canvas id="canvas"></canvas>
      </div>

      <div class="sidebar">
        <div class="control-panel">
          <label class="control-label">Flow Speed</label>
          <input type="range" class="slider" id="speedSlider" min="0.1" max="5" step="0.1" value="1">
          <div class="value" id="speedValue">1.0x</div>
        </div>

        <div class="control-panel">
          <label class="control-label">Particle Count</label>
          <input type="range" class="slider" id="countSlider" min="100" max="5000" step="100" value="2000">
          <div class="value" id="countValue">2000</div>
        </div>

        <div class="control-panel">
          <label class="control-label">Trail Length</label>
          <input type="range" class="slider" id="trailSlider" min="5" max="100" step="5" value="20">
          <div class="value" id="trailValue">20</div>
        </div>

        <div class="stat">
          <div class="stat-label">Vortices</div>
          <div class="stat-value" id="vortexCount">0</div>
        </div>

        <button class="button" id="clearBtn">Reset</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Responsive canvas
    function resizeCanvas() {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Parameters
    let flowSpeed = 1;
    let particleCount = 2000;
    let trailLength = 20;
    let particles = [];
    let vortices = [];

    // Particle class
    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = Math.random() * 0.5 + 0.5; // downward bias
        this.age = 0;
        this.trail = [];
      }

      update(vortices, flowSpeed, trailLength) {
        this.vx += (Math.random() - 0.5) * 0.1; // turbulence
        this.vy += 0.02 * flowSpeed; // gravity

        // Vortex attraction
        for (let v of vortices) {
          const dx = v.x - this.x;
          const dy = v.y - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 200 && dist > 1) {
            const force = (1 / (dist + 10)) * 0.5;
            this.vx += (dx / dist) * force;
            this.vy += (dy / dist) * force;
          }
        }

        this.x += this.vx * flowSpeed;
        this.y += this.vy * flowSpeed;

        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > trailLength) {
          this.trail.shift();
        }

        this.age++;
      }

      isAlive() {
        return this.x > -50 && this.x < canvas.width + 50 && this.y < canvas.height + 50;
      }

      draw(ctx, trailLength) {
        // Trail
        ctx.strokeStyle = `rgba(0, 255, 255, 0.15)`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let i = 0; i < this.trail.length; i++) {
          const p = this.trail[i];
          const alpha = (i / this.trail.length) * 0.3;
          ctx.globalAlpha = alpha;
          if (i === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();
        ctx.globalAlpha = 1;

        // Particle
        ctx.fillStyle = `rgba(255, 0, 255, 0.8)`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Vortex class
    class Vortex {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.life = 120;
      }

      draw(ctx) {
        const alpha = this.life / 120;
        ctx.strokeStyle = `rgba(0, 255, 255, ${alpha * 0.6})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 50, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = `rgba(255, 0, 255, ${alpha * 0.4})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 100, 0, Math.PI * 2);
        ctx.stroke();
      }

      update() {
        this.life--;
      }

      isAlive() {
        return this.life > 0;
      }
    }

    // Initialize particles
    function initParticles(count) {
      particles = [];
      for (let i = 0; i < count; i++) {
        particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height * 0.3));
      }
    }
    initParticles(particleCount);

    // Controls
    document.getElementById('speedSlider').addEventListener('input', (e) => {
      flowSpeed = parseFloat(e.target.value);
      document.getElementById('speedValue').textContent = flowSpeed.toFixed(1) + 'x';
    });

    document.getElementById('countSlider').addEventListener('input', (e) => {
      particleCount = parseInt(e.target.value);
      document.getElementById('countValue').textContent = particleCount;
      initParticles(particleCount);
    });

    document.getElementById('trailSlider').addEventListener('input', (e) => {
      trailLength = parseInt(e.target.value);
      document.getElementById('trailValue').textContent = trailLength;
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      vortices = [];
      initParticles(particleCount);
    });

    // Canvas click for vortex
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      vortices.push(new Vortex(x, y));
    });

    // Animation loop
    function animate() {
      // Clear
      ctx.fillStyle = 'rgba(10, 14, 39, 0.2)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Update and draw particles
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update(vortices, flowSpeed, trailLength);
        if (!particles[i].isAlive()) {
          particles.splice(i, 1);
        } else {
          particles[i].draw(ctx, trailLength);
        }
      }

      // Respawn dead particles
      while (particles.length < particleCount) {
        particles.push(new Particle(Math.random() * canvas.width, -20));
      }

      // Update vortices
      for (let i = vortices.length - 1; i >= 0; i--) {
        vortices[i].update();
        if (!vortices[i].isAlive()) {
          vortices.splice(i, 1);
        } else {
          vortices[i].draw(ctx);
        }
      }

      document.getElementById('vortexCount').textContent = vortices.length;

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
