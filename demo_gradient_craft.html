<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient Craft Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Manrope', sans-serif;
            background: #f8f9fa;
            color: #1a1a1a;
            padding: 32px 24px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .hero {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeInUp 0.6s ease-out;
        }
        .hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(40px, 8vw, 72px);
            font-weight: 800;
            letter-spacing: -1.2px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 50%, #FFE66D 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p {
            font-size: 18px;
            color: #666;
            max-width: 600px;
            margin: 0 auto;
        }
        .studio {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            margin-bottom: 32px;
        }
        .preview-section {
            margin-bottom: 32px;
        }
        .preview-label {
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 12px;
        }
        #gradientPreview {
            width: 100%;
            height: 280px;
            border-radius: 12px;
            transition: background 0.15s ease-out;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
        }
        .controls-section {
            margin-bottom: 32px;
            padding-top: 32px;
            border-top: 1px solid #eee;
        }
        .control-group {
            margin-bottom: 24px;
        }
        .control-label {
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 12px;
            display: block;
        }
        .stops-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .stop-control {
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            border: 2px solid #ddd;
            cursor: pointer;
            transition: all 0.2s;
        }
        .stop-control:hover {
            border-color: #999;
            transform: translateY(-2px);
        }
        .stop-control.active {
            border-color: #4ECDC4;
            background: #e8f9f8;
        }
        .stop-swatch {
            width: 100%;
            height: 32px;
            border-radius: 6px;
            margin-bottom: 8px;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .stop-position {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            align-items: center;
        }
        .stop-position input {
            width: 100%;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            font-family: 'Manrope', monospace;
        }
        .stop-position span {
            font-size: 12px;
            color: #999;
            text-align: center;
        }
        .mode-toggles {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .mode-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-btn:hover {
            border-color: #4ECDC4;
        }
        .mode-btn.active {
            background: #4ECDC4;
            color: white;
            border-color: #4ECDC4;
        }
        .angle-control {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .angle-control input {
            flex: 1;
            height: 8px;
            -webkit-appearance: none;
            appearance: none;
            border-radius: 4px;
            background: #ddd;
            outline: none;
        }
        .angle-control input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4ECDC4;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(78, 205, 196, 0.3);
        }
        .angle-control input::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4ECDC4;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(78, 205, 196, 0.3);
        }
        .angle-display {
            min-width: 60px;
            text-align: right;
            font-family: 'Manrope', monospace;
            font-weight: 600;
            color: #333;
        }
        .color-picker-section {
            margin-top: 16px;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        .color-picker-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            display: block;
        }
        .color-picker-input {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .color-picker-input input[type="color"] {
            width: 60px;
            height: 40px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .color-picker-input input[type="text"] {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'Manrope', monospace;
            font-size: 13px;
        }
        .code-section {
            padding: 16px;
            background: #1a1a1a;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .code-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            display: block;
        }
        #cssCode {
            width: 100%;
            padding: 12px;
            background: #222;
            color: #4ECDC4;
            border: 1px solid #333;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: none;
            margin-bottom: 8px;
        }
        .export-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(78, 205, 196, 0.3);
        }
        .export-btn:active {
            transform: translateY(0);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 640px) {
            body { padding: 24px 16px; }
            .studio { padding: 20px; }
            .stops-container {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
                gap: 10px;
            }
            .hero h1 { font-size: clamp(32px, 7vw, 56px); }
        }
        @media (prefers-reduced-motion: reduce) {
            * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>🎨 Gradient Craft Studio</h1>
            <p>Design stunning CSS gradients with live preview and exportable code</p>
        </div>
        
        <div class="studio">
            <div class="preview-section">
                <label class="preview-label">Live Preview</label>
                <div id="gradientPreview"></div>
            </div>
            
            <div class="controls-section">
                <div class="control-group">
                    <label class="control-label">Gradient Type</label>
                    <div class="mode-toggles">
                        <button class="mode-btn active" data-mode="linear">Linear</button>
                        <button class="mode-btn" data-mode="radial">Radial</button>
                    </div>
                </div>
                
                <div class="control-group" id="angleGroup">
                    <label class="control-label">Direction (Angle)</label>
                    <div class="angle-control">
                        <input type="range" id="angleSlider" min="0" max="360" value="135" step="1">
                        <div class="angle-display"><span id="angleValue">135</span>°</div>
                    </div>
                </div>
                
                <div class="control-group">
                    <label class="control-label">Color Stops</label>
                    <div class="stops-container" id="stopsContainer"></div>
                </div>
                
                <div class="color-picker-section" id="colorPickerSection" style="display:none;">
                    <label class="color-picker-label">Edit Selected Stop</label>
                    <div class="color-picker-input">
                        <input type="color" id="colorPicker" value="#4ECDC4">
                        <input type="text" id="hexValue" value="#4ECDC4" placeholder="#RRGGBB">
                    </div>
                </div>
            </div>
            
            <div class="code-section">
                <label class="code-label">CSS Code (Copy & Paste)</label>
                <textarea id="cssCode" readonly rows="3"></textarea>
                <button class="export-btn" id="copyBtn">📋 Copy to Clipboard</button>
            </div>
        </div>
    </div>

    <script>
        // Default color stops
        const defaultStops = [
            { color: '#FF6B6B', pos: 0 },
            { color: '#FFE66D', pos: 50 },
            { color: '#4ECDC4', pos: 100 }
        ];

        let state = {
            mode: 'linear',
            angle: 135,
            stops: defaultStops.map(s => ({ ...s })),
            selectedStopIdx: 0
        };

        // Core logic: generate CSS gradient code
        function generateGradient(stops, angle, mode) {
            if (!stops || stops.length < 2) return '';
            const sortedStops = [...stops].sort((a, b) => a.pos - b.pos);
            const stopStr = sortedStops.map(s => `${s.color} ${s.pos}%`).join(', ');
            if (mode === 'linear') {
                return `linear-gradient(${angle}deg, ${stopStr})`;
            } else {
                return `radial-gradient(circle, ${stopStr})`;
            }
        }

        function updatePreview() {
            const grad = generateGradient(state.stops, state.angle, state.mode);
            document.getElementById('gradientPreview').style.background = grad;
            document.getElementById('cssCode').value = grad;
        }

        function renderStops() {
            const container = document.getElementById('stopsContainer');
            container.innerHTML = '';
            state.stops.forEach((stop, idx) => {
                const div = document.createElement('div');
                div.className = `stop-control ${idx === state.selectedStopIdx ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="stop-swatch" style="background: ${stop.color};"></div>
                    <div class="stop-position">
                        <input type="range" class="stop-position-slider" data-idx="${idx}" min="0" max="100" value="${stop.pos}" step="1">
                        <span>${stop.pos}%</span>
                    </div>
                `;
                div.addEventListener('click', () => selectStop(idx));
                div.querySelector('.stop-position-slider').addEventListener('input', (e) => {
                    state.stops[idx].pos = parseInt(e.target.value);
                    renderStops();
                    updatePreview();
                });
                container.appendChild(div);
            });
        }

        function selectStop(idx) {
            state.selectedStopIdx = idx;
            const stop = state.stops[idx];
            document.getElementById('colorPicker').value = stop.color;
            document.getElementById('hexValue').value = stop.color;
            document.getElementById('colorPickerSection').style.display = 'block';
            renderStops();
        }

        // Event listeners
        document.querySelectorAll('[data-mode]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                state.mode = e.target.dataset.mode;
                document.getElementById('angleGroup').style.display = state.mode === 'linear' ? 'block' : 'none';
                updatePreview();
            });
        });

        document.getElementById('angleSlider').addEventListener('input', (e) => {
            state.angle = parseInt(e.target.value);
            document.getElementById('angleValue').textContent = state.angle;
            updatePreview();
        });

        document.getElementById('colorPicker').addEventListener('input', (e) => {
            const hex = e.target.value.toUpperCase();
            state.stops[state.selectedStopIdx].color = hex;
            document.getElementById('hexValue').value = hex;
            renderStops();
            updatePreview();
        });

        document.getElementById('hexValue').addEventListener('change', (e) => {
            let hex = e.target.value.toUpperCase();
            if (!hex.startsWith('#')) hex = '#' + hex;
            if (/^#[0-9A-F]{6}$/.test(hex)) {
                state.stops[state.selectedStopIdx].color = hex;
                document.getElementById('colorPicker').value = hex;
                renderStops();
                updatePreview();
            }
        });

        document.getElementById('copyBtn').addEventListener('click', async () => {
            const code = document.getElementById('cssCode').value;
            try {
                await navigator.clipboard.writeText(`background: ${code};`);
                const btn = document.getElementById('copyBtn');
                const orig = btn.textContent;
                btn.textContent = '✅ Copied!';
                setTimeout(() => { btn.textContent = orig; }, 2000);
            } catch (err) {
                alert('Failed to copy. Please copy manually.');
            }
        });

        // Init
        renderStops();
        selectStop(0);
        updatePreview();
    </script>
</body>
</html>
